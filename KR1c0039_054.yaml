body:
  text: 六家詩名物疏卷五十一明馮復京撰大雅蕩之什二烝民篇考釋親云父為考母為妣白虎通曰考成也言有成徳曲禮曰生曰父母妻死曰考妣嬪㗋説文云㗋嚨也素問曰㗋主天氣咽主地氣物理論云咽㗋生之要孔韓奕篇梁山禹貢冀州既載壺口治梁及岐釋山云梁山晉望也注云在夏陽西北臨河上地里志在馮翊夏陽縣故少梁梁山在西北九域志山在龍門之南括地志在同州韓城縣東南一十九里玉海云梁山在京兆府奉天縣北五里古公踰梁山秦立梁山宫又同州韓城縣南十九里亦有梁山漢左馮翊夏陽縣西北詩所謂奕奕梁山也爾雅以為晉望按同州韓城縣今屬陜西西安府古之韓國晉為少梁秦漢之夏陽縣也梁山在其境非大王遷岐所踰之梁山也大王所踰之梁山在乾州西北五里乾州即唐之奉天縣也韓左傳云韓武之穆也通典同州韓城縣古韓國有韓原一統志古韓城在韓城縣南十八里按水經注引王嘯曰涿郡方城縣有韓侯城後魏志亦云范陽郡方城縣有韓侯城此詩下文又有燕師所完奄受北國之文故李氏疑韓國在燕地古方城縣即今順天府固安縣地也存之以備參考受命朱傳云蓋即位除䘮以士服入見天子而聽命王制云諸侯之世子未賜爵視天子之元士以君其國韓詩内傳云諸侯世子三年䘮畢上受爵命于天子白虎通云世子上受爵命衣士服何謙不敢自專也故詩曰韎韐有赩世子始行也覲互見沔水篇朝大宗伯云秋見曰覲大行人云秋覲以比邦國之功覲禮云侯氏禆冕釋幣于禰乘墨車載龍旂弧韣乃朝以瑞玉有繅天子設斧依于戸牖之間左右几天子衮冕負斧依侯氏入門右坐奠圭再拜稽首擯者謁侯氏坐取圭升致命王受之玉侯氏降階東北面再拜稽首擯者延之曰升升成拜乃出記几俟于東箱偏駕不入王門奠圭于繅上入覲互見商頌長發篇箋云覲於宣王而奉享禮周禮内府凡四方之幣獻之金玉齒革兵器凡良貨賄入焉大行人云廟中將幣三享注皆束帛加璧庭實惟國所有小行人云合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼玉人云璧琮九寸諸侯以享天子瑑琮八寸諸侯以享夫人覲禮云四享皆束帛加璧庭實惟國所有注云四當為三初享或用馬或用虎豹之皮其次享三牲魚腊籩豆之實龜也金也丹漆絲纊竹箭也其餘無常貨惟所有分為三享皆以璧帛致之又云奉束帛匹馬卓上九馬隨之奠幣再拜稽首升致命王撫玉侯氏降自西階東面授宰幣西階前再拜稽首以馬出授人九馬隨之事畢綏章傳云綏大綏也王制云天子殺則下大綏諸侯殺則下小綏注綏當為緌有虞氏之旌旗也明堂位云夏后氏之綏注云虞當言緌夏當言旂蓋錯誤也緌謂注旄牛尾于杠首所謂大麾周禮建大麾以田夏采注云徐州貢夏翟之羽虞以為綏後世或無染鳥羽象而用之或以旄牛尾為之綴於幢上所謂注旄於竿首互見干旄旄旌箋云綏所引以登車有采章也説文曰綏車中把也曲禮曰君車己駕僕取貳綏跪乗凡僕人之禮必授人綏乗路馬必朝服不敢授綏少儀曰執君之乗車則坐僕者右帶劔負良綏申之面拖諸幦以散綏升執轡然後步論語曰升車必正立執綏鏤鍚疏云金路無鍚有鉤此金路得有鏤鍚者蓋特賜之巾車云玉路鍚樊纓注鍚馬面當盧刻金為之所謂鏤鍚當盧者當馬之額盧在眉眼之上鞃傳云鞃軾中也考工記輿人為車參分車隧一在前二在後以揉其式以其廣之半為之式崇參分軫圍去一以為式圍孔氏云軾者兩較之間有横木可慿者也淺傳云虎皮淺毛也月令其蟲倮注云虎豹之屬恒淺毛幭傳云幦覆式也玉藻云君羔幦虎犆大夫齋車鹿幦豹犆朝車士齋車鹿幦豹犆注云幦覆苓也少儀曰御負良綏申之面拖諸幦曲禮曰大夫士去國素簚周禮王之䘮車木車犬􅍜疏飾素車犬􅍜素飾藻車鹿淺􅍜革飾駹車然􅍜髤飾漆車豻􅍜雀飾荀子曰絲末彌龍所以養威也禮書云幦若席然施諸軾上諸書幦簚􅍜末俱即幭字金厄疏云毛以厄為厄蟲則金厄者以金接轡之端如厄蟲然鄭易傳以金為小環往往纒搤之往往者言非一二處屠李氏曰同州䣝谷説文云䣝在馮翊郃陽亭朱傳或曰即杜也解頥字義云屠蓋在鎬京東北之地未詳其處或以為在同州䣝谷則太逺或以為即鄠縣之杜陵則其地在鎬京南不當至此也壺説文云壺昆吾圜器也象形從太象其蓋也周禮秋嘗冬蒸其饋獻用兩壺尊掌客上公壺四十夫人致禮八壺侯伯三十二夫人致禮八壺子男二十四夫人致禮六壺禮記五獻之尊門内壺又云尊壺者面其鼻特牲禮視壺濯尊兩壺于阼階東又曰覆兩壺焉蓋在南鄉飲酒尊兩壺于房户間鄉射兩壺斯禁聘禮陳饔或八壺或六壺燕禮卿大夫兩方壺士旅兩圜壺公尊瓦大大射膳尊兩甒卿大夫方壺士旅圜壺少牢尊兩甒士䘮大歛兩瓦甒虞兩甒三禮圖云洗壺受一斛口徑一尺頭髙五寸大中身兑下赤漆中上加青雲氣方壺受一斛腹圜足口方圜壺受一斛腹方足口圜蔌釋器云菜謂之簌孔氏云蔌者菜茹之總名筍爾雅云筍竹萌䈚箭萌天官醢人云箈菹雁醢筍菹魚醢陸璣云筍皆四月生惟巴竹筍八月九月生始出地長數寸䰞以苦酒豉汁浸之可以就酒及食吕覽云和之羙者越駱之菌注越駱山名菌竹筍也筍譜云竹初種根食土而下求乎母也及擢筍冒土而上愛乎子也筍大約不過青緑色本艸木性甲乙氣李英公本艸云竹筍性甘無毒主消渇利水道益氣可久食贈覲禮云天子賜侯氏以車服路先設西上路下四亞之重賜無數在車南諸公奉箧服加命書于其上升自西階東面大史是右侯氏升西面立大史述命侯氏降兩階之間北面再拜稽首升成拜大史加書于服上侯氏受樂記云大路者天子之車也龍旂九旒天子之旌也青黒縁者天子之寳龜也從之以牛羊之羣則所以贈諸侯也侯氏覲禮注云不言諸侯言侯氏者明國殊舍異禮不凡之也貓傳云貓似虎淺毛者也釋獸云虎竊毛謂之虦貓注竊淺也詩曰有貓有虎又云狻麑如虦貓雅翼云虎淺色謂之虦貓而西域傳注稱獅子似虎正黄而有􅏋尾端毛大如斗又詩稱韓土之樂有貓有虎周書記武王之狩禽虎二十有二貓二則是虎之類也按釋獸之文貓即虎之淺毛者以上下文熊羆虎類之知是猛獸非捕鼠之貓也捕鼠之貓形亦似虎又畫地卜食亦如虎其鼻端嘗冷惟夏至一日煖蓋隂類也故應隂氣如此與虎陽獸感風不仝酉陽雜爼云猫一名蒙貴一名鳥圓陸農師以貓食田鼠虎食田彘故詩以譽韓樂失之矣燕朱傳云燕召公之國地里志薊縣故燕國召公所封國都城記云地在燕山之野故國取名焉北燕伯欵始見春秋元命包云箕星散為幽州分為燕國一統志順天府武王封堯後於薊封召公奭于燕即此燕山在薊州玉田縣西北二十里百蠻補傳云蠻夷可通稱北稱蠻猶西稱夷史記匈奴傳居于北蠻追貊傳云追貊戎狄國箋云後追貊為玁狁所逼稍稍東遷疏云貊者東夷之種分居於北故於此時為韓所統周官職方辨九貉之人民注云北方曰貉狄貉𨽻注云征東北夷所獲說文云貉北方豸種孔子曰貉之為言惡也漢書高紀云北貉燕人助漢師古曰貉在東北方三韓之屬皆貉類也地里考云後漢傳有貊耳小水貊濊貊之屬東夷之貊也北國箋云北面之國疏云職方氏正北曰幷州言受王畿北靣之國當是幷州牧黄氏曰今洺州曲梁赤狄也中山安喜鮮虞國真定鼓國稁城西纍肥國皆白狄也壑説文云壑溝也釋言云隍壑也舍人曰隍城池也壑溝也貔釋獸云貔白狐其子豰陸璣云貔似虎或曰似熊一名執夷一名白狐遼東人謂之白羆説文云虎豹屬出貉國書云如虎如貔于商郊曲禮曰前有摯獸則載貔貅莊子曰豐狐文羆摶於山林伏於巖穴夜行晝居求食江湖之上江漢篇淮夷陳傅良云江漢常武二篇同言淮夷以地里考之曰江漢之滸者淮南之夷也若在淮北則江漢非所入之路也曰率彼淮浦省此徐土者淮北之夷也若在淮南則徐土非聮接之地矣孔氏曰召公伐淮夷在淮水南魯僖伐淮夷在淮水北當淮之南北皆有夷也禹貢云淮夷蠙珠暨魚費誓云徂兹淮夷徐戎竝興春秋僖十四年杞辟淮夷遷都諸侯城縁陵十六年鄫為淮夷所病㑹于淮謀鄫後漢東夷傳殷武乙衰敝東夷浸盛遂分遷淮岱漸居中土周公征之遂定東夷厲王無道淮夷入冦王命虢仲征之不克宣王復命召公伐而平之卣疏云鬱人掌和鬱鬯以實彛則鬯當在彛而此及尚書左傳皆云秬鬯一卣者當祭時乃在彛未祭則在卣賜時未祭故卣盛之爾雅云彛卣罍器也卣中尊也孫炎曰尊彛為上罍為下卣居中郭璞曰卣不大不小者周禮鬯人廟用脩注云廟用脩者謂始禘時自饋熟始脩讀曰卣卣中尊謂獻象之屬常武篇太祖傳云命南仲於太祖疏云后稷太祖之廟程楚語云重黎氏世叙天地在周程伯休父其後也當宣王失其官守而為司馬氏韋昭云程國伯爵休父名也失官謂失天地之官而以諸侯為大司馬郡國志雒陽有上程聚古程伯休父之國也一統志上程聚在河南府洛陽縣浦説文云浦水濵也徐曹氏云禹貢徐州東至海北至岱南及淮其地廣人衆矣若淮夷則東夷之種散處淮浦者爾陳氏曰徐大而淮夷小淮夷即徐州之夷而服屬於徐曰徐方者兼徐淮而言之曰徐國者特言徐戎也地里志臨淮徐縣故徐國郡縣志大徐城在泗州徐城縣北三十里徐子國玉海云徐嬴姓伯益佐禹有功封其子若木於徐一統志直𨽻鳯陽府泗州春秋時徐子國徐城在州北五十里三事箋云三農之事太宰云以三農生九糓先鄭云三農平地山澤也𤣥謂原隰及平地朱子云上中下農夫繹箋云繹當作驛傳遽之驛周禮行夫掌邦國傳遽之小事注云傳遽若今時乗傳騎驛而使者也廣雅云郵驛也置亦驛也漢書田儋傳云尸鄉廐置臣瓉曰案廐置謂置馬以傳驛者李陵傳云因騎置以聞師古曰騎置謂驛騎也丹鈆緫録云按説文驛置騎也馹驛傳也合觀之驛主于騎言馬也馹主于傳言車也字書馬逓曰置步逓曰郵漢謂之乘傳如淳曰漢律四馬髙足為置傳四馬中足為馳傳四馬下足為乘傳一馬二馬為軺傳又謂之遽瞻卬篇織説文曰織作布帛之總名内則云女子十年不出執麻枲治絲繭織絍組紃學女事狄爾雅八狄注云八狄在北周官職方氏辨六狄之人民王制云北方曰狄衣羽毛穴居有不粒食者矣明堂位五狄之國風俗通云父子嫂叔同穴無别狄者辟也其行邪辟其類有五一曰月支二曰穢貊三曰匈奴四曰單于五曰白屋召旻篇昬箋云昬椓皆閹人也昬其官名周禮閽人王宫每門四人掌守王宫中門之禁䘮服凶器不入宫潜服賊器不入宫竒服怪民不入宫凡内人公器賔客無帥則幾其出入以時啟閉掌掃門庭天官酒人奄十人注云奄精氣閉藏者漿人奄五人籩人醢人各奄一人醯人鹽人各奄二人冪人奄一人内小臣奄上士四人寺人王之正内五人内竪倍寺人之數地官舂人饎人各奄二人稁人奄八人春官守祧奄八人苴傳云水中浮艸箋云樹上棲苴疏云苴是艸木之枯槁者故在樹未落及已落為水漂皆稱苴也按毛以苴為水中浮艸鄭以棲者居在木上之名謂水上為棲于理未惬故易之云樹上棲苴朱傳云水中浮草棲于木上者意欲合二説為一不知既漂水中何縁仍居木上若如蒲栁等木本生水邊故水中草得棲之則為水浸潤不得枯槁進退求之朱義難通疏粺朱傳云疏糲也粺則精矣九章算術云粟率五十糲米三十粺二十七鑿二十四御二十一六家詩名物疏卷五十一
