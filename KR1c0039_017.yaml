body:
  text: 六家詩名物疏卷十四明馮復京撰國風鄘一鄘通典云衛州新鄉縣西南三十二里有鄘城即鄘國孔氏曰王肅服䖍以鄘在紂都之西孫毓云據鄘風定之方中楚丘之歌鄘在紂都之南明矣一統志鄘城在河南衛輝府城東北一十三里又新鄉縣西南三十二里有古鄘國柏舟篇髦内則云子事父母櫛縰笄緫拂髦男女未冠笄者櫛縰笄緫拂髦緫角注拂髦振去塵著之髦用髪為之象幼時鬌其制未聞又云三月之末擇日翦髪為鬌男角女羈否則男左女右注鬌所遺髪也夾囟曰角午達曰羈玉藻云親沒不髦䘮大記云小斂主人脱髦注云諸侯禮也既夕禮云既殯主人脫髦左傳云豈如弁髦而因以敝之許慎云髦髪至眉箋云禮世子昧爽而朝亦櫛縰笄緫拂髦疏云髦者事父母之餙若父母有先死者於死三日脫之服闋又著之若二親竝沒則因去之項氏云髦者以髪作偽髻垂兩眉之上如今小兒用一帶連雙髻横繫額上是也禮書云子之幼也父母翦髪為之鬌及其長也因以為餙謂之髦存而不忍棄所以順父母之心長而不忘幼所以示人子之禮及親死始猶幸其生焉未忍脫之三日之後則幸生之心已矣脫之可也髦毛長而特出者也故凡物長毛皆謂之髦禮記所謂髦畐尋所謂譽髦皆長毛也牆有茨篇牆互見召南傭說文云垣蔽曰牆釋名云牆障也所以自障蔽也禮書云牆者墉垣之總名茨爾雅茨蒺藜注布地蔓生細葉子有三角刺人陶隱居云多生道上其葉布地子有刺狀如菱而小長安最饒人行多著木履易云據于蒺藜言其凶傷詩云牆有茨不可埽也以刺梗穢也本草衍義云蒺藜有二等一等杜蒺藜即今之道旁布地而生或生牆上有小黄花結芒刺此正是牆有茨者又一種白蒺藜出同州沙苑牧馬處黄紫花作莢結子如羊内腎埤雅云可以茨牆故謂之茨師曠占云嵗欲旱旱草先生旱草蒺藜也韓詩外傳云春植桃李夏得蔭其下秋得食其實春植蒺藜夏不得采其葉秋得其刺焉中冓箋云内冓之言謂宫中所搆成頑與夫人滛昬之語説文冓交積材也象對交之形前漢梁王共傳聴聞中冓之言注應劭曰中冓材構在堂之中也晉灼曰魯詩以為夜也顔師古曰構謂舎之交積材木也應説近之集韻㝤博雅夜也詩中㝤之言吕東萊云中冓當從應顔說盖閫内應奥之處君子偕老篇副釋名云王后首餙曰副副覆也以覆首亦言副貳也兼用衆物成其飾也天官追師掌王后之首服副編次注副之言覆所以覆首為之飾其遺象若今之步摇矣服之以從王祭祀毛傳云編髪為之祭統云君純冕立于阼夫人副禕立于東房廣雅云假結謂之案續漢書輿服志云皇后入廟步摇以黄金為山題貫白珠桂枝相糾八爵九華熊虎赤能天鹿辟邪鄭氏所見之步揺其制盖如此宋玉諷賦云主人之女垂珠步揺則步摇亦古矣鄭氏之說雖未必信然要非編髪為之若編髪則是編矣笄釋名云笄係也所以係冠使不墜也三禮圗云笄簮也士以骨大夫以象士冠禮皮弁爵弁笄同篋周禮弁師掌王之五冕王笄諸侯之繅斿九就玉笄追師掌追衡笄鄭司農云衡維持冠者春秋傳曰衡紞紘綎後鄭云王后之衡笄皆以王為之惟祭服有衡垂於副之兩㫄當耳其下以紞懸瑱笄卷髪者曲禮云女子許嫁笄而字内則云女子十有五而笄二十而嫁雜記女雖未許嫁二十而笄禮之婦人執其禮燕則鬈首案笄今之簮也男子冕弁冠皆得施之婦人十五笄則亦嘗飾耳惟玉笄為后夫人祭服之盛飾祭統副褘則以配褘衣此詩其之翟也則以配揄闕二翟内外命婦服鞠衣展衣褖衣者俱不得用䘮服傳云吉笄者象笄也則卿大夫士及其妻或皆用象與若桑笄箭笄榛笄則䘮服所用或當無貴賤一也此詩毛傳云笄衡笄葢聨引追師追衡笄之文以見笄之為玉也衡笄二物衡垂於當耳笄横於頭上朱傳誤以衡笄為一云笄垂於副之兩㫄當耳其下以紞懸瑱此乃釋衡非釋笄也珈箋云珈之言加也如今步摇上飾古制所有未聞疏云六珈飾之有六說文云婦人首飾从玉珈聲翟傳云褕翟闕翟羽飾衣也箋云侯伯夫人之服自褕翟以下如王后鄭注周禮云翟雉名伊洛而南素質五色皆備成章曰翬江淮而南青質五色皆備成章曰揺王后之服刻繒為之形而采畫之綴于衣以為文章褘衣畫翬者揄狄畫揺者闕狄闕而不畫此三者皆祭服從王祭先王則服褘衣祭先公則服揄翟祭羣小祀則服闕翟今世有圭衣盖三翟之遺俗玉藻云王后褘衣夫人揄狄君命闕翟再命鞠衣一命襢衣士褖衣崔靈恩云王后三翟數皆十二王者之後諸侯夫人三公而下夫人如命數按翟毛氏謂羽飾衣鄭謂刻繒采畫不用真羽六服之色毛云展用丹縠孫毓推之以為褘衣赤褕翟青闕翟黒鞠衣黄展衣赤褖衣黑鄭賈之徒則云褖衣黑展衣白鞠衣黄闕翟赤褕翟青褘衣𤣥古制無稽各以意為説不足多辨髪釋名云髪㧞也㧞擢而出也援神契云髪法星辰真誥云髪者腦之華腦減則髪素雲釋名云雲猶云云衆盛意也又言運也行也說文雲山川氣也从雨云象回轉形也春秋説題辭云雲之為言運也動陰路觸石而起謂之雲含陽而起以精運也禮記云天降時雨山川出雲周禮保章氏以五雲之物辨吉凶水旱降豐荒之祲象鄭司農曰二至二分觀雲氣青為蟲白為䘮赤為兵荒黑為水黄為豐易通卦驗云冬至初陽雲出箕如樹立春少陽雲出房如積水春分正陽雲出軫如白鵠榖雨太陽雲出張如車盖立夏初陰雲出觜如赤珠夏至少陰雲出參如水波寒露正陰雲出井如冠纓霜降太陰雲出鬼上如羊下如蟠石左傳云凡分至啟閉必書雲物為備故也元命包云陰陽聚為雲斗威儀云人君乗水而王其政和平則景雲見景明也言雲氣光明史記若烟非烟若雲非雲郁郁紛紛蕭索輪囷是謂卿雲西京雜記云太平之時雲則五色而為慶三色而成矞瑞應圗云矞雲外赤内黄吕氏春秋云山雲艸莽水雲魚鱗旱雲烟火雨雲水波無不比類其所生以示人初學記云雲師曰屏翳瑱詳見邶充耳釋名云瑱鎮也懸當耳旁不欲令人妄聴自鎮重也象說文云象長鼻牙南越之大獸三嵗一乳爾雅云南方之美者有梁山之犀象焉左傳云象有齒以焚其身運斗樞云瑶光之精散而為象吕氏春秋曰肉之美者髦象之約嶺表録異云象肉有二十種象膽不附肝随月轉在諸肉楚越之間象皆青黑惟西方弗林大食多白象雲南豪族多畜象負重致逺若中國之牛馬本草云身有百獸肉皆自有分叚惟鼻是其本肉酉陽雜俎云象膽随四時在四腿春在前左夏在前右如龜無定體鼻端有爪可拾鍼古訓云孕五嵗始産南州異物志云象之為獸形體特詭身倍數牛目不踰狶鼻為口役望頭若尾馴良承教聴言則跪素牙玉潔載籍所美服重致逺行如丘徙沈懐逺南越志云象牙長丈餘脫其牙則深藏之削木代之可得不爾窮其土得乃已埤雅云象性久識能浮水出沒命在其鼻食物皆以鼻取之其牙生花必因雷聲故古者以為器飾雅翼云象鼻長三丈大如臂能别道之虚實稍虚輙不敢過馴者能拜起從人意世言物象凡有數義望頭如尾有混成之象一曰感雷而齒又生有象焉一曰有進止威儀之象一曰斧象者見星月而没亦合于天象云揥釋名云揥摘也所以摘髪也疏云以象骨搔首因以為飾詩緝云若今之篦皙說文云人色白也从白析聲楊用修云男白曰皙女白曰玭帝史記天官書云太微三光之庭其内五星五帝坐文耀鈎云蒼帝其名靈威仰赤帝其名赤熛怒黄帝其名含樞紐白帝其名曰招拒黑帝其名汁光紀禮正義云天皇北辰耀魄寶又云昊天上帝又名太一帝君以其尊大故有數名也昊天上帝得連上帝而言至于單名皇天單名上帝亦得月令季夏供皇天上帝鄭分之皇天耀魄寶上帝大微五帝亦是大帝單號之事若然大帝得單稱與五帝仝五帝不得兼稱皇天昊天也禮書云周禮有言祀天有言祀昊天上帝有言上帝有言五帝者言天則百神皆預言昊天上帝則統乎天者言五帝則無預乎昊天上帝言上帝則五帝兼存焉五帝與昊天仝稱帝不與昊天仝稱天猶諸侯與天子仝稱君不與天子仝稱王孝經曰郊祀后稷以配天宗祀文王于明堂以配上帝則明堂之祀上帝其為昊天上帝及五帝可知也易曰先王以作樂崇徳殷薦之上帝以配祖考以配祖者天也以配考者五帝也合天與帝而謂之上帝則易孝經之于周禮其義一矣詩書之文未有稱五帝而書亦未有稱昊天上帝者其稱天及上帝類皆泛言之而已展周禮注云展衣以禮見王及賔客之服字當為襢襢之言亶亶誠也禮書云白者陰之純色見王及賔客服之以見王及賔客無事乎飾一於誠焉后禮之懿也清揚孔仲達云以目視清明因名為清揚者眉上之美名因謂眉上眉下皆曰揚目上目下皆曰清故野有蔓草傳云清揚眉目之間猗嗟傳云目下為清顔說文云眉目之間也應劭云顔頟顙也齊人謂之顙汝南淮泗之間曰顔方言云頟顔顙也案頟顙曰顔朱傳云額角豐滿者非正解顔字也以詩文畧補之邦釋名曰大曰邦邦封也封有功于是也媛釋訓云美女曰媛孫炎曰君子之援助桑中篇唐爾雅云唐蒙女蘿女蘿菟絲孫炎曰别三名郭璞云别四名又云蒙王女郭云蒙即唐也女蘿别名博雅云女蘿松蘿也丘絲也本草經云菟絲子一名菟蘆一名菟縷一名唐蒙一名王女一名赤綱一名菟纍生朝鮮川澤田野蔓延艸木之上色黄而細為赤綱色淺而大為菟纍毛有頍者弁傳云女蘿菟絲松蘿也陸璣疏云菟絲蔓連艸上生黄赤如金陶隱居云田野墟落中甚多皆浮生藍紵麻蒿上日華子云苗莖似黄麻線無根苗多附田中艸被纒死或生一叢如席闊開花結子不分明如碎黍米粒八月九月已前採吕氏春秋云或謂絲無根非無根也其根不屬地茯苓是也龜筴傳云下有茯苓上有絲淮南子云絲無根而生茯苓抽絲死抱朴子云絲之艸下有伏之根無此在下則絲不得生於上然實不屬也又内篇云絲初生之根其形似掘取剖其血以和丹服之立變化任意所作案本艸艸部有免絲木部有松蘿松蘿一名女蘿性味及所生全别爾雅云女蘿免絲故毛公有頍者弁傳云女蘿免絲松蘿也陸璣駁之以為二物殊異予謂此非爾雅之誤乃毛公之誤也艸木多有名同實異者絲名女蘿松蘿亦名女蘿小雅所稱之女蘿正是松蘿非絲也書傳言絲根不屬地是也云上有茯苓下有絲鄭漁仲云茯苓生山谷絲生人間清濁異趣何由同居抱朴子言絲初生根似今亦未有見者故圗經疑為别種沫晉書地道記朝歌城本沫邑武丁始遷居之為殷都有新聲靡樂黄氏云沫水在衛之北書酒誥云明大命於妺邦注妺地名紂所都朝歌以北是疏妺與沫一也屬鄘一統志朝歌城在大名府濬縣西七十里紂所都也其南有糟丘酒池土人猶依約識之鄉說文云國離邑民所封鄉也合璧事類云鄉之為言向也衆所向也周禮大司徒五州為鄉使之相賔以鄉三物教萬民而賔興之以鄉八刑糾萬民小司徒頒比法於六鄉之大夫鄉師各掌其所治鄉之教而聽其治鄉大夫各掌其鄉之政教禁令鄉士各掌鄉之獄訟禮書曰鄉之民以禮義為主遂之民以功事為主鄉官之爵鄉學加遂一等鄉所辨有貴賤遂辨老幼廢疾而已鄉徴賦有閭師遂則里宰徴歛而已鄉大祭祀羞牛牲遂凡祭祀共野牲而已鄉官大䘮執纛御匶執斧涖匠師遂官大䘮帟幄先道抱磨共籠而已鄉稽鄉器遂稽稼器鄉三年大比考徳行道藝而興賢者能者遂三嵗大比則興甿明其有功者屬其地治者此鄉遂之辨也然遂之相保相賙相葬相賔不異於鄉鄉之相受相糾不異於遂鄉之田法同於遂遂之軍法同於鄉詩正義云天子六軍出自六鄉諸侯三軍出自三鄉姜三皇紀云炎帝神農氏長于姜水因以為姓國語云姜伯夷之後也韋昭曰伯夷堯秩宗炎帝之後四岳之族正義云列國姜姓齊許申吕之屬不斥其國未知誰國之女也桑中譜云東及兖州桑土之野正義曰禹貢兖州云桑土既蠶注云其地尤宜蠶桑因以名之今濮水之上地有桑間濮陽在濮水之北是有桑土明矣禮記云桑間濮上之音亡國之音也其政散其民流誣上行私而不可止注濮水之上地有桑間者亡國音於此水出昔殷紂使師延作靡靡之樂已而自沈於濮水後師㳙過焉夜聞而寫之為晉平公鼓之桑間在濮陽南郡國志東郡濮陽縣有顓帝冡皇覽曰冡在城門外廣陽里中博物記曰桑中在其中一統志廢濮陽縣在直𨽻大名府開州治西南上宫通典云衛州衛縣有上宫臺麥説文曰麥芒榖秋穜厚薶故謂之麥麥金也金王而生火王而死春秋説題辭云麥之為言殖也寢生觸凍而不息精射刺直故麥含芒事且立也禮記月令云孟夏之月農乃登麥天子乃以彘嘗麥先薦寢廟是月也麥秋至仲秋之月乃勸種麥無或失時夏小正三月祈麥實麥實者五榖之先見者故急祈而記之九月鞠榮鞠艸也鞠榮而樹麥時之急也尚書大傳云秋昬虛星中可以種麥援神契云黑墳宜黍麥吕氏春秋云得時之麥秱長而頸黑二七以為行而服薄䅵而赤色稱之重食之致香以息使人肌澤且有力先時者胕動蚼蛆而多疾後時者弱苗而穗蒼狼薄色而美芒又云孟夏之昔殺三葉而穫大麥狶首生而麥無葉而從事于蓄藏漢書董仲舒説上曰春秋他榖不書至于麥禾不成則書之以此見聖人于五榖最重宿麥管子云夏至而麥熟天子祀大宗其盛以麥榖之始也蔡邕月令章句云百榖各以其初生為春熟為秋故麥以孟夏為秋廣雅云大麥麰也小麥麳也汜勝之書云凡田六道種麥為首子欲富黄金覆謂曳柴壅麥根也夏至後七十日寒地可種宿麥又云麥早種穂強而有節晚種穂小而少實陶隠居云麥有大小穬穬即宿麥亦謂種麥本草圗經云麥有大麥小麥穬麥蕎麥穬麥有二種一種類小麥一種類大麥博物志云啖麥令人多力雅翼云麥者接絶續乏之榖夏之時舊榖已絶新榖未登民于此時乏食而麥最先熟故以為重比他榖獨隔嵗種故號宿麥亦或以為首種秋種冬長春秀夏實備有四時之氣而説文以麥為金者特以其金王而生遇火而死鄭注月令則云麥實有孚甲屬木黍秀舒散屬火麻實有文理屬金菽實孚甲堅合屬水稷五榖之長屬土此據明堂月令四時與中央所食為説古者朝事之豆有麷蕡先儒以麷為熬麥弋朱傳云弋春秋或作姒盖杞女夏后氏之後亦貴族也按春秋左傳定十五年秋七月壬申姒氏卒九月辛已塟定姒榖梁作弋氏定弋庸路史國名紀風俗通云古用國見毛詩在髙唐乃用地故有用姓庸用音相近補傳云鄘本庸姓之國漢有庸光及膠東庸生是其後也鶉之奔奔篇鶉爾雅云鷯鶉其雄鶛牝痺注䳺屬疏䳺即上云鴽鴾母田鼠所化者又云鶉子鳼鴽子鸋注别䳺鶉鶵之名内則云雉鶉鷃運斗樞云機星散為鶉徳義少殘百家則鶉生夏小正云三月田䑕化為鴽鴽鵪也化而之善故盡其辭也鴽為鼠化而之不善故不盡其辭也周書時訓云清明之日桐始華又五日田鼠化為鴽素問云鴽鶉也本草云四月已前未堪食是蝦蟆化為禽經云鴽鶉野則義豢則摶注月令田䑕化為鴽闗東謂之鶉蜀隴謂之循在田得食鳴相呼夜則羣飛晝則草伏馴養之久見食相搏鬭也談苑云至道二年夏秋間京師鬻鶉者積於市門是時雨水絶無蛙聲人有得於水坎者半為鶉半為蛙列子天瑞篇云蛙變為鶉斯不謬矣又田䑕亦為鶉物變非一揆也本草衍義云鶉有雌雄從卵生何言化也嘗于田野屢得其卵初生謂之羅鶉至初秋謂之早秋中秋已後謂之白唐一物四名埤雅云鶉無常居而有常匹俗言此鳥淳惷不越横草遇小草横其前即旋行避礙名之曰淳以此筆談曰古人取象不必大物天文家朱鳥乃取象於鶉鶉有丹白二種此丹鶉也色赤黄鋭上秃下夏出秋藏飛必附草皆火類也雅翼云鶉居易容食易給竄伏淺草随地而安故言上世之俗曰鶉居鷇食尾特秃若衣之短結傳稱子夏貧衣若懸鶉性好鬭物之小而健無若此者按鵪鶉二物但鶉亦䳺類故田鼠化為鴽鄭氏注夏小正傳以為䳺而莊子禽經竝以為鶉也鶉本有雌雄卵生亦或有化為者據夏小正傳云田鼠化列子楊大年云蛙化淮南子本草云蝦蟇化交州記黄魚上化為鶉是又有魚化者矣君傳云國小君禮王制云夫人自稱于諸侯曰寡小君孔安國論語注小君君夫人之稱六家詩名物疏卷十四
