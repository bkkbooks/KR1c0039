body:
  text: 六家詩名物疏卷十一明馮復京撰國風邶三谷風篇谷風釋天云東風謂之谷風孫炎曰谷之言穀穀生也毛傳云隂陽和而谷風至吕氏春秋曰東方曰滔風易緯云春分明庶風至葑毛傳云葑須也爾雅云須葑蓯郭注未詳又云須薞蕪郭注薞蕪似羊蹄葉細味酢可食坊記注云葑蔓菁也陳宋之間謂之葑陸疏云葑蔓菁幽州人或謂之芥方言云蘴蕘蕪菁也陳楚謂之蘴齊魯謂之蕘關之東西謂之蕪菁趙魏之交謂之大芥其小者謂之辛芥其紫華者謂之蘆蔔尚書云荆州厥貢苞匭菁茅周禮醢人菁菹鹿臡注菁蔓菁也急就篇云老菁蘘荷冬日藏本草云蕪菁味苦子主明目圖經云蕪菁四時仍有春食苗夏食心亦謂之薹子秋食莖冬食根河朔尤多種可備飢嵗常食之通中益氣令人肥健南人取北種種之初年相類至二三嵗則變為菘矣嘉話録云諸葛亮所止令兵士獨種蔓菁取其才出甲可生啖一也葉舒可煮食二也久居則隨以滋長三也棄不令惜四也回則易尋采五也冬有根可斸食六也三蜀之人今呼蔓菁為諸葛菜江陵亦然嚴氏云江南有菘江北有蔓菁相似而異埤雅云梗長葉瘦高者為菘葉濶厚短者為蕪菁日華子云蔓菁梗短葉大連地上生濶葉紅色者是按爾雅兩釋須或本一物别三名耳諸書所稱各異爾雅云須葑蓯薞蕪方言云蘴蕘蕪菁大芥坊記注云蔓菁本草圖經云薹子通志云塞北名九英共得十名但郭注薞蕪與本草説蔓菁形味頗異為可疑揚子雲又謂紫華者為蘆蔔不知蔓菁蘆蔔各一種陶隱居言蔓菁子與蘆蔔子相似然蔓菁子紫赤蘆蔔子黃赤而大又不圓兩者全别郭注方言以葑為菘陶郭之誤皆緣江表不産蔓菁耳鄭箋云葑菲根有美時有惡時諸書但言冬食根而不著根何時惡錢氏解下體云凡菜近地之莖葉多黃腐不可食蓋以鄭義為未安而易之矣菲毛傳云菲芴也爾雅云菲芴郭注即土瓜也孫炎曰葍類也又云菲蒠菜郭注菲草生下溼地似蕪菁華紫赤色可食廣雅云土瓜芴也崔實四民月令云二月盡三月可採土瓜根陸疏云菲似葍莖粗葉厚而長有毛三月中蒸煮為茹甘美可作羮幽州人謂之芴爾雅又謂之蒠菜今河內人謂之宿菜按爾雅兩釋菲如郭所言殆是兩物張揖陸璣以為一物然郭所云土瓜絶無形種可的指本草有土瓜乃是月令之王瓜爾雅之鈎藈姑非此菲也畿毛傳云畿門內也讀詩記云韓愈詩白石為門畿蓋以畿為門閫也必有所據可以發明毛氏之説吕氏春秋曰出則以車入則以輦務以自佚命曰佁蹶之機高誘曰佁至也蹶機門內之位也畿機音相近荼爾雅云荼苦菜時訓解云小滿之日苦菜秀苦菜不秀賢人潛伏陸璣云苦菜生山田及澤中得霜甜脆而美所謂堇荼如飴內則云濡豚包苦用苦菜是也儀禮云鉶芼羊苦本草云苦菜味苦一名荼草一名選一名遊冬凌冬不死顔之推云案易通卦驗玄圖云苦菜生于寒秋更冬歷春得夏乃成今中原苦菜則如此也一名遊冬葉似苦苣而細摘斷有白汁花黃似菊江南别有苦菜葉似酸漿其花或紫或白子大如珠熟時或赤或黑此菜可以釋勞案郭璞注爾雅此乃蘵黃蒢也今河北謂之龍葵梁世講禮者以此當苦菜既無宿根至春子方生耳亦大誤也蜀本圖經云春花夏實至秋復生花而不實經冬不凋衍義云苦菜四方皆有在北道則冬方凋斃在南方則冬夏常青葉如苦苣更狹其緑色差淡味苦花與野菊似春夏秋皆旋開花詩緝云經有三荼一曰苦菜二曰委葉三曰英荼此詩誰謂荼苦及唐采苓云采苦采苦綿堇荼如飴之荼皆苦菜也良耜以薅荼蓼之荼委葉也鄭出其東門有女如荼英荼也鴟梟豫所捋荼傳云菼苕疏云薍之秀穗亦英荼之類按爾雅有五荼釋草荼苦菜蒤虎杖蒤委葉蔈荂荼釋木檟苦荼詩中有三焉嚴坦叔論之備矣陶隱居以荼茗為苦菜朱仲晦以谷風之苦菜為良耜之委葉陸農師以苦菜茅秀是一物俱失詳考顔之推以江南之苦菜為蘵云即龍葵然龍葵子無殼苦蘵子有殼又相似而不同薺爾雅蒫薺實疏引詩其甘如薺本草云薺味甘溫主利肝氣和中陶隱居注云薺類多此是今人可食者葉作菹羮亦佳禮云孟夏之月靡草死鄭注薺亭藶之屬春秋繁露云薺以冬美冬水氣也薺甘味也乘于水氣而美者甘勝寒也薺之為言濟與濟大水也淮南子云薺麥冬生而夏死師曠占云嵗欲豐甘草先生甘草薺也雅翼云薺亦應隂之物其枝細靡謂之靡草通志云薺之菜甚小自生園圃或以為薺苨按爾雅又云菥蓂大薺本草菥蓂在草部味辛非可食之薺也陳藏器又以大薺為葶藶然菥蓂葶􅏣總之皆薺類耳昏釋名云昏昏時成禮也姻女因媒也周禮大宗伯云以昏冠之禮親成男女釋親云婦之父為婚婦之黨為婚兄弟涇周官云雍州其川涇汭書云涇屬渭汭孔安國曰言治涇水入於渭廣雅云涇徑也地理志云涇水出安定涇陽縣西岍頭山東南至馮翊陽陵縣入渭行千六百里山海經云涇谷之山涇水出焉東南流注于渭是多白金白玉史記云涇渭非大川以近咸陽得比山川祠漢書云涇水一石其泥數斗關中記云涇與渭洛為關中三川與渭灞滻潦潏澧滈為關中八水初學記云涇與渭水合流三百里清濁不相雜東合漆沮水至潼津入于河按涇水出陜西平涼府鎮原縣西笄頭山至涇州又東南至西安府邠州界又東北至西安府高陵縣入渭渭書云導渭自鳥鼠同穴東會於澧又東過漆沮入於河周官云雍州其浸渭洛春秋説題辭云渭之為言布也渭渭流行貌河圖云鳥獸同穴山地之幹也渭水出其中象天河水經云渭水出隴西首陽縣渭谷亭南鳥鼠山淮南子云渭水多力宜黍地里志云東至京兆府司空縣入河傳涇渭相入而清濁異按渭水源出陜西臨洮府渭源縣漢首陽縣鳥鼠山西北谷流徑鞏昌府秦州又經鳯翔府寶雞縣至岐山縣入西安府武功縣北興平縣南至咸陽縣界豐水南來注之又東過長安縣北與涇水合于高陵東流至華隂縣界入河梁爾雅疏云以土石為隄障絶水者名梁周禮漁人掌以時漁為梁鄭司農云梁水堰堰水而為關空以笱承其空王制云獺祭魚然後虞人入澤梁漢書董卓傳云築梁捕魚笱説文云曲竹捕魚笱也從竹從句句亦聲朱傳云以竹為器承梁之空以取魚者也周禮疏云偃水兩畔中央通水為關孔笱者葦薄以薄承其關孔魚過者以薄承取之按笱之為字從竹不從草則許慎朱子所釋是也賈公彥以為葦薄者蓋以罶為寡婦之笱葦薄為之故也不知所以名寡婦之笱以其功易則笱為功難必是以竹為之民説文云衆萌也萌而無識援神契云民者冥也公羊傳注四民德能居位曰士辟土殖穀曰農巧心勞手以成器物曰工通財貨曰商喪白虎通云人死謂之喪言其亡不可見也生者哀痛之亦稱喪釋名云人死氣絶曰死死澌也就澌消也士曰不祿大夫曰卒諸侯曰薨天子曰崩少壯曰死曰夭未二十而死曰殤尸已在棺曰柩於西壁下塗之曰殯朔望祭曰殷奠所用殷衆也既葬還祭於殯宫曰虞謂虞樂安神使還此也又祭曰卒哭止孝子無時之哭朝夕而已也又祭曰祔祔於祖廟也期而小祥又期而大祥間月而禫亦祭名也周禮大宗伯以凶禮哀邦國之憂以喪禮哀死亡王制云天子七日而殯諸侯五日而殯大夫士庶人三日而殯左傳云天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至禮書云易繫辭曰古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世漸文故為冠絰衰裳帶屨以飾之於是有斬齊功緦袒免之等三年期九月七月三月之别然後情文稱而恩義立矣賈白虎通云商之為言商商其遠近度其有無通四方之物故謂之商賈之為言固固有其用物以待民來以求其利者也行曰商止曰賈周禮太宰以九職任萬民六曰商賈阜通貨賄市師以商賈阜貨而行布凡市偽飾之禁在賈者十有二冬尚書云申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬書大傳云北方者伏方也伏方者萬物之方伏也伏方何以謂之冬冬者中也中也者物方藏于中也陽盛則吁荼萬物而養之外隂盛則呼吸萬物而藏之內故曰呼吸者隂陽之交接萬物之始終爾雅云冬為玄英注氣黑而清英夏小正云十月豺祭獸黑烏浴十二月玄駒賁月令云孟冬之月日在尾昏危中旦七星中其日壬癸其帝顓頊其神玄冥其蟲介其音羽律中應鍾水始氷地始凍雉入大水為蜃虹藏不見天氣上騰地氣下降天地不通閉塞而成冬仲冬之月日在斗昏東壁中旦軫中律中黃鍾氷益壯地始坼鶡旦不鳴虎始交日短至隂陽爭諸生蕩藝始生荔挺出蚯蚓結麋角解水泉動季冬之月日在婺女昏婁中旦氐中律中大吕雁北鄉鵲始巢雉雊雞乳征鳥厲疾氷方盛水澤腹堅是月也日窮于次月窮于紀星回于天數將幾終嵗且更始素問云冬三月此謂閉藏水氷始坼無擾乎陽楚語觀射父云日月會于龍􅔀土氣含收天明昌作百嘉備舍國家于是乎蒸嘗賈逵曰􅔀龍尾也吕覽云冬之德寒寒不信其地不成剛地不成剛則凍閉不開月令注云孟冬日月會于析木之津仲冬日月會于星紀季冬日月會于玄枵漢書魏相奏云北方之神顓頊乘坎執權司冬釋名云冬終也物終成也式微篇中露泥中附黎毛氏云中露泥中衛邑箋云黎國在衛西水經黎陽縣注式微黎侯寓于衛是也又云跨河東徑黎縣故城南注云世謂黎侯城昔黎侯寓于衛詩謂胡為乎泥中毛云邑名疑此城也土城汚下城居小阜魏濮陽郡治也杜預左傳注黎侯國上黨壺關縣有黎亭黃氏曰今潞州上黨黎城壺關三縣皆古黎國地林氏曰周人乘黎河北之要害也古今山川記云黎侯寓衛以中露泥中二邑處之按黎陽縣今廢在直隸大名府濬縣西二里黎縣即廢臨河縣在大名府開州西六十里衛泥中邑即此地也中露古人所未詳潞州屬山西上黨縣今省入州壺關黎城二縣並屬潞州黎侯城在黎城縣東北十八里左傳宣十五年晉侯將伐潞伯宗曰狄有五罪棄仲章而奪黎氏地其三也六月癸卯荀林父敗赤狄于曲梁辛亥滅潞秋七月壬午晉侯治兵于稷以略狄土立黎侯而還依此文則滅黎者赤狄也其事當衛穆公之世此詩不當序於宣公之前毛鄭不云聊以傳疑爾旄丘篇旄丘爾雅云前高旄丘李巡曰謂前高後卑下釋名云前高曰髦丘如馬舉頭垂髦也一統志旄丘在大名府開州城北丘説文云土之高也非人所為也從北從一一地也人居在丘南一曰四方高中央下為丘象形爾雅云丘一成為敦丘再成為陶丘再成鋭上為融丘三成為崑崙丘如乘者乘丘如渚者渚丘水潦所止泥丘方丘胡丘絶高為之京非人為之丘水潦所還埒丘上正章丘澤中有丘都丘堂途梧丘途出其右而還之畫丘途出其前戴丘途出其後曷丘水出其前渻丘水出其後沮丘水出其左正丘水出其右營丘如覆敦者敦丘邐迤沙丘左高咸丘右高臨丘前高旄丘後高陵丘偏高阿丘宛中宛丘丘背有丘為負丘左澤定丘右陵泰丘如畝畝丘如陵陵丘丘上有丘為宛丘陳有宛丘晉有潛丘淮南有州黎丘天下有名丘五三在河南二在河北廣雅云小陵曰丘周禮丘陵動物宜羽植物宜核其民專而長毛公防有鵲巢傳云卭丘也狐説文云狐祅獸也鬼所乘之有三德其色中和小前大後死則首丘本草陶隱居注云江東無狐皆出北方及益州間形似狸而黃譱能為魅圖經云今江南亦時有京洛尤多形似黃狗鼻尖尾大狐之類猯獾貉三種大抵相類頭足小别爾雅云狸狐貒貈醜其足蹯其迹􅚵注蹯皆有掌蹯􅚵指頭處山海經云青丘之國有狐九尾武都之山有玄狐蓬尾名山記云狐者先古之淫婦其名曰紫紫化而為狐故其性多自稱阿紫玉策記云狐及狸狼皆壽八百嵗滿三百嵗暫變為人形北征記云河氷厚數丈氷始合車馬未過須狐先行此物善聽聽水無聲乃過水經注云狐性多疑故俗有狐疑之説管子云代出狐白之皮狐應隂陽之變六月而一見類從曰狐潛上伏不越度阡陌埤雅云狐性好疑貈性好睡又皆藏獸故狐貉之厚以居而蠟祭息民以狐裘也舊説狐有媚珠禮北斗而靈譱變化其為物妖淫故詩又以刺惡易曰小狐汔濟濡其尾亦其尾重譱濡溺故易正以為象狼狐摶物皆以虛擊孤狐從孤省或以此故也雅翼云狐鋭口而大尾色赤所在鳥輒羣而噪之蓋妖祥之禽所占也春秋外傳曰狐埋之狐搰之是以無成功皆執心不定之貌裘説文云裘皮衣也周禮司裘掌為大裘以共王祀天之服中秋獻良裘王所服王乃行羽物季冬獻功裘以待頒賜月令云孟冬天子始裘玉藻云惟君黼裘以誓省當作獮大裘非古也君衣狐白裘錦衣以裼之君之右虎裘厥左狼裘士不衣狐白君子狐青裘豹褎玄綃衣以裼之麛裘青犴褎絞衣以裼之羔裘豹飾緇衣以裼之狐裘黃衣以裼之錦衣狐裘諸侯之服也犬羊之裘不裼不文飾也不裼裘之裼也見美也服之襲也充美也弔則襲不盡飾也君在則裼盡飾也是故尸襲執玉龜襲無事則裼弗敢充也童子不裘不帛禮不盛服不充故大裘不裼白虎通云裘所以佐女工助溫也古者緇衣羔裘黃衣狐裘禽獸衆多獨以狐羔取其輕暖因狐死首丘明君子不忘本也羔取其跪乳遜順也五經要義云古者著裘于內而以繒衣覆之乃加以朝服會之時袒其朝服見裘裏覆衣謂之裼裼之言露可見之詞所以示美呈好而為飾加以朝服謂之襲袒謂之裼大裘不裼反本取其質也按狐裘有三錦衣狐裘天子之朝服諸侯于天子之朝天子卿大夫及諸侯卿大夫在天子之朝亦得服之黃衣狐裘蠟祭後臘先祖之服毛注此狐裘云大夫狐蒼裘蒼青同色所謂君子狐青裘豹袖玄綃衣以裼之者也鄭彼注云君子大夫士也綃綺屬染之以玄於狐青裘相宜狐青裘蓋玄衣之裘皇氏云玄衣謂玄端也狐青裘所施禮無明説皇氏以為畿內諸侯朝服用緇衣畿外用玄衣無所援據鄭注周禮云功裘人功微粗謂狐青麛裘之屬鄭司農云功裘卿大夫所服則二鄭之意皆不以狐青為諸侯之朝服在朝君臣同服卿大夫可推論語云狐貉之厚以居蓋狐譱疑貉譱睡疑斯戒睡斯安燕息者之事也狐青裘必卿大夫之燕服矣都人士狐裘黃黃則庶人亦服黃狐裘先儒以為不裼又春秋之戎服亦以狐裘左傳臧之狐裘敗我于狐駘是也流離爾雅云鳥少美長醜為鶹鷅郭注鶹鷅猶留離詩所謂流離之子陸璣疏云流離梟也自關而西謂梟為流離其子適長大還食其母故張奂云鶹鷅食母許慎云梟不孝鳥是也爾雅又云梟鴟注土梟説文梟食母不孝之鳥故冬至捕梟磔之字從鳥首在木上劉子云炎州有鳥其名曰梟傴伏其子百日而長羽翼既成食母而飛埤雅云梟食母破獍食父舊説梟食母始飛黃帝欲絶其類使百司用之故後世於嵗始祓除凶災取以解祠黃帝漢使東郡送梟五月五日作羮以賜百官此遺象也雅翼云土梟穴土而居故曰土梟而荆楚嵗時記稱鴝鵒為土梟説者云鴝鵒穴居誤矣按梟與梟音近物殊梟者流離也梟者似鵩之鳥也充耳釋名云充耳充塞也塞耳亦所以止聽也淇奧傳云充耳謂之瑱天子玉瑱諸侯以石著箋云所以懸瑱者或名為紞織之人君五色臣則三色而已禮緯云旒垂目纊塞耳示不聽讒不視非也羅氏云瑱以玉為之以纊縳之而屬于紞縣之當耳紞織如絛上屬于衡按辨師云諸侯玉瑱鄭注冬官玉人云公侯四玉一石伯子男三玉二石則諸侯得用玉毛云諸侯以石蓋失之白公子張曰巴浦之犀犂兕象其可盡乎其又以規為瑱也依此文是四獸之牙角可以為瑱檀弓云練角瑱所以垂充耳者謂之紞魯語王后織玄紞夫人加紘綎內子為大帶命婦成祭服列士之妻加之以朝服則自夫人至士妻特有所加而已士喪禮曰瑱用白纊東方朔傳曰黈纊塞耳則人君與士之纊有黃與白之别而已其紞五色三色之辨未詳聞也耳釋名云耳耐也耳有一體屬著兩邊耐耐然也元命包云耳者心之候真誥云耳者身之牖聽衆則牖閉左傳富辰云耳不聽五聲之和為聾目不别五色之章為昧六家詩名物疏卷十一
