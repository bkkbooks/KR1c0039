body:
  text: 六家詩名物疏卷三十一明馮復京撰國風豳三東山篇東山詩緝云三監在周之東周公自西徂東以征之軍屯必依山為固故以東山言之王伯厚云秦漢謂山東山西者皆指太行山東山即商地孔氏曰金縢云周公居東二年周公在東實出入三年裳衣箋云裳衣謂兵服也周禮司服云凡兵事韋辨服注韋辨以韎韋為辨又以為衣裳春秋傳曰晉郤克衣韎韋之跗注是也今時五伯緹衣古兵服之遺色雜問志云韎韋之不注不讀如幅注屬也幅有屬者以淺赤韋為辨又以為衣而素裳白舄也賈公彥云鄭君兩解此注裳亦用韎韋至彼雜問志裳用素者從白舄之義左傳均服振振注戎事上下同服疏云在兵之服皆韋辨行周禮云振旅如戰之陳辨鼓鐸鐲鐃之用茇舍如振旅之陳辨號名之用治兵如振旅之陳辨旗物之用大閲陳車徒如戰之陳周書曰春為牝陳弓為前行夏為方陳㦸為前行季夏為圓陳牙為前行秋為牡陳劍為前行冬為伏陳楯為前行是為五陳左傳鄭伯為魚麗之陳先偏後伍伍承彌縫衛救宋鄭翩願為鸛其御願為鵝蒍敖為宰軍行右轅左追蓐前茅慮無中權後徑楚君之戎分為二廣廣有二卒卒偏之兩魯哀公為支離之卒以侵衛握竒經云四為正四為竒餘竒為握竒解云天地風雲為四正龍虎鳥蛇為四竒六韜云日月星辰斗柄一左一右一向一背此謂天陳丘陵水泉亦有前後左右之列此謂地陳用車用馬用文用武此謂人陳枚周禮大司馬中冬教大閲車徒皆作遂鼓行徒銜枚而進注云枚如箸銜之有繣結項中軍法止語為相疑惑銜枚氏掌司囂國之大祭祀令禁無囂軍旅田役令銜枚蠋爾雅云蚅烏蠋郭云大蟲如指似蠶疏韓奕云鞗革金厄毛亦云厄烏蠋也又云獨者蜀邢云言山中之孤獨者名蜀此蟲更無羣匹韓非子云蠶似蠋人見蠋則毛起廣志云藿蠋有五色者槐香蠋五采有角甚臭埤雅云蠋以絲自褁雅翼云蜀葵中蟲也亦食於藿蠶類而不食桑詩乃稱蒸在桑野者葵藿之下亦桑野之地也蠶致養于人萬百為族蜀則獨行故以比敦然獨宿者或作鳥名禽經曰蜀不獨宿不知何物果裸之實爾雅云果裸之實栝樓孔疏引本草云栝樓如瓜葉形兩兩相值蔓生青黑色六月華七月實如瓜瓣本草經云栝樓根一名地樓一名果裸一名天瓜一名澤姑實名黃瓜主胸痺悅澤人面圖經云根亦名白藥皮黃肉白三四月內生苗引藤蔓葉如甜瓜葉作義有細毛七月開花似葫蘆花淺黃色實在花下大如拳生青至九月熟赤黃色有正圓者有鋭而長者伊威爾雅云蟠鼠負又云蛜威委黍注舊說鼠婦别名說文云委黍鼠􅣁也陸璣云在壁根下甕底土中生似白魚陶隱居云一名鼠負言鼠多在坎中背則負之又一名鼠婦衍義云此濕生蟲也多足其色如蚓背有橫文蹙起大者長三四分水甕及下濕處多埤雅云食之令人善淫劉氏云壁落間小蟲無人掃則出行于室蠨蛸爾雅云蠨蛸長踦疏此小鼅蛛長腳者俗呼為喜子陸璣云一名長腳荆州河內人謂之喜母此蟲來著人衣有親客至有喜也幽州人謂之親客亦如蜘蛛為羅網居之崔豹云蠨蛸身小足長町畽傳云鹿跡也說文云田踐處曰町畽禽獸所踐處也程子云町畽廬傍畦隴董氏曰區種法曰伊尹作為區田一畝之中地長十八丈分十八丈作十五町町間分十四道通人行畽為田里所聚熠耀爾雅云螢火即照舍人云即夜飛有火蟲也本草云螢火一名夜光一名放光一名熠耀一名即照生階地池澤陶隱居曰此是腐草及爛竹根所化初猶未如蟲腹下已有光數日便變而能飛衍義云螢常在大暑前後飛出是得大火之氣而化故如此明照也月令雖云腐草所化然非隂濕處終無古今注云螢火一名耀夜一名景天一名熠耀一名丹良一名燐一名丹鳥一名夜光一名宵燭腐草為之食蚊蚋陳思王螢火論云詩云熠耀宵行章句以為鬼火或謂之燐未為得也天隂沈數雨在於秋日螢火夜飛之時也故曰宵行然腐草木得濕而光亦有明驗衆說並為螢火近得實矣月令季夏之月腐草為螢夏小正曰八月丹鳥羞白鳥丹鳥者謂丹良也白鳥者謂蚊蚋也其謂之鳥也重其養者也有翼者為鳥羞也者進也不盡食也崇有論云螢無胃而育埤雅云今西北多螢大者如棗行而有光正曰宵行以此故也一說螢非熠耀熠耀行蟲耳今卑濕處有蟲如蠶蠋尾後載火行而有光俗謂之熠耀董氏曰熠耀自是一種蟲夜行地上如蠶喉下明如螢故曰宵行楊用修云螢火有二種梁蕭和賦云悅草螢之夜翔此草螢也唐李子卿有水螢賦此水螢也按古今注螢火一名燐故毛公云熠耀燐也燐螢火也孔疏以燐為鬼火而駁毛公非也本草明云螢火一名熠耀而董陸二家復有異論然止云熠耀别一種蟲初未常以宵行為蟲名也朱子始以宵行為蟲名蓋以末章有熠耀其羽疑熠耀但為明貌耳然蟲名可妄造乎楊用修云古人用字有虛有實熠耀之為螢火實也熠耀為倉庚之羽虛也如小雅交交桑扈有鶯其領此言桑扈之領如鶯之文非謂鶯即桑扈也彼謂倉庚之羽如熠耀之明非謂熠耀即倉庚也此說當矣鸛韓詩章句曰鸛水鳥巢居知風穴處知雨天將雨而蟻出壅土鸛鳥見之長鳴而喜陸璣疏云鸛鸛雀也似鴻而大長頸赤喙白身黑尾翅樹上作窠大如車輪卵如三升杯望見人按其子令伏徑舍去一名負釜一名黑尻一名背竈一名皂裙又泥其巢一傍為池含水滿之取魚置池中稍稍以食其雛若殺其子則一村致旱災陶隱居云鸛有兩種似鵠而巢樹者為白鸛黑色曲頸者為烏鸛本草衍義云鸛頭無丹項無烏帶身如鶴者是兼不善唳但以喙相擊而鳴禽經云鸛仰鳴則晴俯鳴則隂博物志云鸛伏卵時數入水卵冷則不毈取礜石周圍繞卵以助暖氣自然論云鸛影接而懷卵雜俎云江淮謂羣鸛旋飛為鸛井鸛亦好羣飛人探巢取鸛子六十里旱能羣飛薄霄激雨雨為之散北夢瑣言云南方有鸛食蛇每遇巨石如道士禹步其石阞然而轉因得而噉垤疏云蟻穴處將欲隂雨水泉上潤穴處者先知之避濕而上冢釋蟲云蚍蜉大蟻小者蟻蠪朾蟻螱飛蟻其子蚳記蛾子時術之方言垤封場也楚郢以南蟻土謂之垤垤中齊語也埤雅云蟻將雨則出而壅土成峯方言曰其場謂之坻亦或謂之垤垤從至以蟻之微而能為垤用其至故也今蟻取小蟲入穴輒壞垤窒穴蓋防其逸亦以窒雨一名蟻封朔地蟻封大有如冢者所謂蟻冢蓋出於此易林震之蹇曰蟻封戶穴大雨將集皇爾雅云黃白騜疏曰馬有黃處有白處者曰騜駁爾雅云駵白駁孫炎曰駵赤色也邢昺曰謂馬有駵處有白處者曰駁易說卦云乾為駁馬禮斗威儀云君乘火而王南海輸駁馬埤雅徐鉉曰疑象駮文晉侯乘駁乳虎見之而伏則象駮之文理或然也駁亦馬之上色故古者國君乘之縭爾雅云婦人之褘謂之褵褵緌也孫炎曰褘帨巾也郭璞曰即今之香纓也褘邪交絡帶繫於體因名為褘緌繫也此女子既嫁之所著示繫屬於人義見禮記詩云親結其縭謂母送女重結其所繫著以申戒之說者以褘為帨巾失之韓詩注云縭帶也孔疏云按昏禮言結帨此言結縭則縭當是帨非香纓廣雅云大巾幃昏禮記曰父送女命之曰戒之敬之夙夜毋違命母施襟結帨曰勉之敬之夙夜毋違宫事庶母及門內施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視諸襟鞶破斧篇四國傳云四國管蔡商奄也書蔡仲之命云惟周公位冢宰羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘降霍叔于庶人三年不齒書序云成王東伐淮夷遂踐奄作成王政成王既踐奄將遷其君于蒲姑周公告召公作將蒲姑杜預云樂安博昌北有蒲姑城奄闕不知所在鄭云奄蓋在淮夷之地亦未能詳成王先伐淮夷遂滅奄奄似逺于淮夷也作雒解云武王克殷乃立王子祿父俾守商祀建管叔于東建蔡叔霍叔于殷俾監殷臣武王崩周公立相天子三叔及殷東徐奄及熊盈以叛二年乃作師旅臨衛攻殷殷大震潰降辟三叔王子祿父北奔管叔經而卒乃囚蔡叔于郭淩凡所征熊盈族十有七國俘維九邑俾康叔宇于殷俾中旄父宇于東書傳云管蔡流言奄君薄姑謂祿父曰成王幼周公見疑矣此百世之時也請舉事然後祿父及三監畔左傳周有徐奄注二國嬴姓按管今河南開封府鄭州蔡今河南汝寧府上蔡縣霍今山西平陽府霍州商謂公子祿父都紂故都朝歌故城在今大名府濬縣奄地未詳所在左傳云蒲姑商奄吾東土也又云魯公因商奄之民則奄是東方之國近魯之地也括地志兗州府曲阜縣奄至即奄國之地疑此即杜氏所謂迸散在魯者其後故得奄名非奄之初封在曲阜也書序稱成王踐奄則四國流言之日周公但討而定之未嘗滅其國至歸政後成王始滅之而徙其君耳孟子云周公相武王誅紂伐奄則周公凡兩次伐奄猶未能蕩平蓋奄本忠于商為周家反覆之臣也錡傳曰鑿屬曰錡韓詩云木屬銶傳曰木屬曰銶韓詩云鑿屬也一解云今之獨頭斧伐柯篇柯考王記車人云柯長三尺博三寸厚一寸有半五分其長以其一為之首注云首六寸謂關頭斧也柯其柄也又云半矩謂之宣一宣有半謂之欘一欘有半謂之柯一柯有半謂之磬折籩爾雅云竹豆謂之籩鄭注云籩竹器如豆者其實皆容四升周禮籩人掌四籩之實朝事之籩其實麷蕡白黑形鹽膴鮑魚鱐饋食之籩其實棗栗桃乾䕩榛實加籩之實蓤芡栗脯蓤芡栗脯羞籩之實糗餌粉餈凡祭祀共其籩薦羞之實喪事及賔客之事共其薦籩羞籩九嬪凡祭祀贊后薦徹豆籩內宗掌宗廟之祭祀薦加豆籩外宗掌宗廟之祭祀佐王后薦玉豆視豆籩掌客凡諸侯之禮夫人致禮八籩侯伯夫人致禮八籩子男夫人致禮六籩禮記鼎俎竒而籩豆偶陰陽之義也籩豆之實水土之品也又云薦用雕纂禮書士喪特牲籩有巾則簋敦豆有巾可知魯用雕纂士喪禮籩無縢則士大夫吉祭之籩有縢無雕可知儀禮圖云士冠脯醢脯用籩醢用豆士昏醴賔脯醢鄉飲脯醢衆賔辨有脯醢鄉射薦用籩脯五膱醢以豆聘禮醴賔脯醢又延几于室薦脯醢燕禮大射禮獻賔獻公獻卿薦脯醢士喪始死奠脯醢小斂朝夕奠脯醢特牲主人獻賔薦脯醢以上皆一豆一籩士冠再醮兩豆葵菹螺醢兩籩栗脯大斂毼豆兩籩無縢士虞及獻祝特牲及主婦致爵於主人以上皆兩豆兩籩既夕遣奠少牢賔尸皆四豆四籩士昏禮夫婦席婦饋舅姑聘禮歸饔公食大夫士喪朔月奠皆有豆無籩蓋豆重而籩輕豆爾雅云木豆謂之豆周禮醢人掌四豆之實朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡茆菹麋臡饋食之豆其實葵菹螺醢脾析蠯醢蜃蚳醢豚拍魚醢加豆之實芹菹兔醢深蒲醓醢菭菹雁醢筍菹魚醢羞豆之實酏食糝食凡祭祀共薦羞之豆實賔客喪紀亦如之掌客凡諸侯之禮豆四十夫人致禮八豆侯伯三十有一夫人致禮八豆子男豆二十有四夫人致禮六豆禮器云禮有以多為貴者天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六有以少為貴者諸侯相朝無籩豆之薦明堂位云薦用玉豆又云夏后氏以楬豆殷玉豆周獻豆注云楬無異物之飾也獻疏刻之祭統云君執鸞刀羞嚌夫人薦豆又云夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人受尸執足注校豆中央直者也鐙豆下跗鄉飲酒六十者三豆七十者四豆八十者五豆九十者六豆所以明養老也聘禮有司堂上八豆西夾六豆公食大夫六豆上大夫八豆士昏四豆士喪毼豆兩既夕四豆士虞四豆特牲兩豆少牢四豆有司徹四豆考工記旊人為豆實三而成觳崇尺器中膞豆中縣三禮圖云豆以木受四升高尺二寸漆赤中大夫以上畫以雲氣諸侯加象飾口天子玉飾邢氏云豆高一尺口足徑一尺校徑二寸楚茨傳云豆謂內羞庶羞也九罭篇九罭爾雅云緵罟謂之九罭九罭魚網也孫炎曰九罭魚之所入有九囊也郭璞曰今之百囊罟亦謂之靁今江東謂之緵疏云緵促細目能得小魚韓詩說云九罭取蝦芘也鱒爾雅云鮅鱒注鯶子赤眼陸璣云鱒似鯶魚而鱗細于鯶赤眼多細文埤雅云鱒魚圓魴魚方鱒好獨行雅翼云鱒目中赤色一道橫貫瞳魚之美者今俗謂之赤眼食螺蚌多祗獨行亦有兩三頭同行者極難取見網輒遁袞衣尚書云豫欲觀古人之象日月星辰山龍華蟲作㑹宗彞藻火粉米黼黻絺繡以五采彰施于五色作服孔安國曰日月星為三辰華象章華蟲雉也畫三辰山龍華蟲于衣服旌旗㑹五采也以五采成此畫宗廟彞樽亦以山龍華蟲為飾藻水草有文者火為火字粉若粟氷米若聚米黼若斧形黻為兩已相背葛之精者曰絺五色備曰繡天子服日月而下諸侯自龍袞而下至黼黻士服藻火大夫加粉米上得兼下下不得僭上周禮司服王之吉服享先王則袞冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕公之服自袞冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服注袞卷龍衣也古天子冕服十二章至周以日月星辰畫于旌旗而冕服九章登龍于山登火于宗彞尊其神明也九章一龍二山三華蟲四火五宗彞皆畫以為繢六藻七粉米八黼九黻皆絺以為繡袞之衣五章裳四章凡九也鷩畫以雉謂華蟲也其衣三章裳四章凡七毳畫虎蜼謂宗彞也其衣三章裳二章凡五希刺粉米無畫其衣一章裳二章凡三𤣥者衣無文裳刺黻而已是以謂𤣥焉凡冕服皆𤣥衣纁裳自公之袞冕至卿大夫之𤣥冕皆其朝聘天子及助祭之服諸侯非二王後其餘皆𤣥冕而祭于己賈公彥曰古人為日月星辰于衣取其明也山取為人所仰龍取能變化華蟲取文理衣是陽陽至輕浮畫亦輕浮故衣繪也宗彞者彞尊有虎彞蜼彞因號虎蜼為宗彞并為一章虎取其嚴猛蜼取其有智以其卬鼻長尾大雨則懸于樹以尾塞鼻是其智也藻取有文火取其明粉米共為一章取其潔亦取養人黼謂白黑為形則斧文近刃白近上黑取斷割焉黻黑與青為形兩已相背取臣民背惡向善亦取君臣有合離之義希繡鄭讀希為黹黹紩也裳主隂刺是沈深之義故裳刺也考工記云白與黑謂之黼黑與青謂之黻五采備謂之繡土以黃其象方天時變火以圜山以章水以龍鳥獸蛇雜四時五色之位以章之謂之巧釋文云袞六冕之第二者也畫為九章天子畫升龍于衣上公但畫降龍按袞者卷也言龍首卷然以袞為名據先儒之說謂虞有十二章周制惟九章孔安國所謂十二章者日也月也星辰也山也龍也華蟲也皆畫于衣藻也火也粉也米也黼也黻也皆刺于裳鄭氏所謂九章者除日月星加宗彞以華蟲為一粉米為一鄭氏差次冕服之等則以黼黻最下孔氏則裳重黼黻粉米次之藻火又次之說者謂衣在上為陽故所尊在先裳在下為隂故所重在後而所云士服藻火大夫加粉米則皆刺在裳而衣上無文矣古禮湮亡莫得而辨然天之大數不過十二王者制作皆以十二象天使天子于上公其衣但有升龍降龍之異恐非所以示上下之别或者以龍德為重故衣以袞名其實周亦十二章郊特牲云祭之日王被袞冕以象天也龍章而設日月以象天也鄭君云設日月畫于衣服旌旗據此文則袞冕之文亦畫日月鄭又謂之魯禮要其文稱王被服袞冕非魯事也鄭注辨師云袞衣之冕十二斿鷩衣之冕九斿毳衣之冕七斿希衣之冕五斿𤣥衣之冕三斿即以斿數為章數何不可哉顧氏說書則分華蟲為二云華取文章雉取耿介是衣有十三章而其說不得通矣狼跋篇胡疏云老狼頷垂胡說文云胡牛顄垂也釋名胡互也在咽下垂能斂互物赤舄周禮屨人掌王及后之服屨為赤舄黑舄注云復下曰舄單下曰屨凡屨舄各象裳色王吉服有九舄有三等赤舄為上冕服之舄諸侯與王同下有白舄黑舄王后吉服六惟祭服有舄𤣥舄為上褘衣之舄也下有青舄赤舄鞠衣以下皆屨耳舄飾如繢之次赤繶者王黑舄之飾黃繶者王后𤣥舄之飾青絇者王白舄之飾言繶必有絇純言絇亦有繶純三者相將王及后之赤舄皆黑飾后之青舄白飾絇謂之拘著舄屨之頭以為行戒繶縫中紃純緣也天子諸侯吉事皆舄其餘惟服冕衣翟著舄耳賈公彥曰繶者牙底相接之縫綴絛于其中絇謂屨頭狀如刀衣以絛為鼻或謂用繒一寸屈之為絇所以受繫穿貫者也純以為口緣也釋名云復其下曰舄舄臘也行禮久立地或泥濕故復其末下使乾臘也方言曰屨中有木者謂之復舄六家詩名物疏卷三十一
