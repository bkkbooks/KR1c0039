body:
  text: 六家詩名物疏卷十二明馮復京撰國風邶四簡兮篇方傳云方四方也以干羽為萬舞用之宗廟山川書云柴望秩于山川禮記云諸侯方祀祭山川嵗遍又云天子祭天下名山大川諸侯祭名山大川之在其地者周禮大宗伯以薶沈祭山林川澤司服毳冕以祀山川大司樂奏㽔賔歌函鍾舞大夏以祭山川舞師教兵舞帥而舞山川之祭祀爾雅云祭山曰庪懸祭川曰浮沈按毛解方云四方而繼以用之山川則山川為四方矣以社以方傳云迎四方氣于郊鄭康成釋舞師云四方四望也其說各異舞師教羽舞帥而舞四方之祭祀教兵舞帥而舞山川之祭祀而毛云以干羽為萬舞用之山川者天子禮大山川與四望别諸侯惟祭域內山川而已此傳之四方非周官舞師之四方也萬毛傳云以干羽為萬舞鄭注此及魯頌萬舞洋洋皆云干舞也左隱五年傳云考仲子之宫將萬焉公問羽數于衆仲疏萬是舞之大名左莊二十八傳云子元欲蠱文夫人為館于其宫側而振萬焉夫人聞之泣曰先君以是舞也習戎備也公羊宣八年有事于太廟仲遂卒于垂壬午猶繹萬入去籥傳云萬者何干舞也籥者何籥舞也何休云干謂盾也能為人扞難而不使害人故聖王貴之以為武樂萬者其篇名武王以萬人服天下民服之故名之云爾籥所吹以節舞也吹籥而舞文樂之長夏小正云二月丁亥萬入用籥劉炫左氏說云羽者為文萬者為武武則左執朱干右秉玉戚文則左執籥右秉翟韓詩說云萬以夷狄大鳥羽異義公羊說云樂萬舞以鴻羽取其徑輕一舉千里按吕東萊讀詩記云萬者二舞之總名干舞者武舞之别名也籥舞者文舞之别名也文舞又謂之羽舞以今考之書大禹謨舞干羽于兩階孔安國云舞文舞于賔主階間抑武事是干舞亦得為文舞矣左傳將萬而問羽數何休說云婦人無武事獨奏文樂夏小正萬入用籥是羽舞籥舞名萬矣息媯聞振萬曰先君以是舞習戎備是干舞名萬矣依左傳疏萬是舞之大名孔傳干亦文舞者蓋取干以自蔽不主殺敵故云文其實干是武舞也萬專為干舞自是大戴公羊之說左傳注已不依用魯頌萬舞洋洋商頌萬舞有奕商魯之廟其舞豈應存武而廢文耶毛釋萬兼干羽而言義優于鄭又何休云武王以萬人服天下故舞名萬殊不知商已有萬舞矣舞吕氏春秋云陶唐氏之始隂多滯伏民氣壅閼故作舞以宣導之山海經云帝俊八子始為舞左傳衆仲云天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下又云季札觀周樂舞象簫南籥大武韶濩大夏韶簫注云象簫南籥文王之樂韶濩殷湯樂周禮舞師掌教兵舞帥而舞山川之祭祀教帗舞帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀教皇舞帥而舞旱暵之事凡野舞則皆教之凡小祭祀不興舞鼓人職注云兵謂干戚帗列五采繒為之舞師職注云羽析白羽為之形如帗皇析五采羽為之亦如帗又云大司樂以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武雲門之舞圜丘奏之咸池之舞方丘奏之九㲈之舞宗廟奏之樂師教國子小舞凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞注云旄舞者旄牛之尾干舞者兵舞人舞者手舞鄭司農云社稷以帗宗廟以羽四方以皇辟雍以旄兵事以干星辰以人後鄭云四方以羽宗廟以人山川以干旱暵以皇大胥掌學士之版以待致諸子春入學合舞以六樂之㑹正舞位以序出入舞者籥師祭祀鼓羽籥之舞賔客饗食亦如之司干掌舞器諸子凡樂正舞位授舞器司兵祭祀授舞者兵司戈盾祭祀授旅賁殳故士戈盾韎師掌教韎樂祭祀則帥其屬而舞之旄人掌教舞散樂舞夷樂文王世子云養老下管象舞大武注云象周武王伐紂之樂以管播其聲又為之舞內則云十三舞勺成童舞象二十而冠舞大夏明堂位云升歌清廟下管象朱干玉戚冕而舞大武皮辨素積裼而舞大夏樂記云屈伸俯仰綴兆舒疾樂之文也夔始制樂以賞諸侯其治民勞者其舞行綴逺其治民逸者其舞行綴短又云舞動其容也先鼓以警戒三步以見方再始以著往復亂以飭歸奮疾而不拔極幽而不隱疏云謂作大武之樂也又云總干而山立武王之事也發揚蹈厲大公之志也武亂皆坐周召之治也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子祭統云及舞君為東上冕而總干率羣臣以樂皇尸又云舞莫重于武宿夜庭說文云庭宫中也讀詩記云庭在大門之內寢門之外玉海云堂下至門謂之庭莊子循本云庭堂外地也虎說文云虎山獸之君也爾雅云甝白虎虪黑虎熊虎醜其子狗絶有力麙方言云陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳或謂之於䖘自關東西或謂之伯都易曰雲從龍風從虎運斗樞云樞星散為虎通卦驗云立秋虎始嘯易又云大人虎變其文炳也月令云仲冬虎始交考異郵云三九二十七七者陽氣成故虎七月而生陽立于七故虎首尾長七尺般般文者隂陽雜也元命包云猛虎嘯谷風起類相動也論衡云虎出有時猶龍見有期也隂物以冬見陽蟲以夏出漢紀楊賜曰虎者金行參伐之精狠戾之獸博物志云虎知衝破又能畫地卜食今人有畫物上下者推其竒偶謂之虎卜雅翼云虎性至猛烈雖遭逐猶徘徊顧步搏物不過三躍不中則捨之夜以一目放光一目看物獵人候而射之目光墮地得之如白石子生三日即有食牛之氣轡爾雅云鑣謂之钀載轡謂之轙轡首謂之革注钀馬勒旁鐵也轙車軛上環轡所貫也革轡靶勒釋名云轡拂也言牽引拂戾以制馬也轡之為飾有銜勒羈韁鞚之類以成其用也銜在口中之言也勒絡也絡其頭而引之鑣包也在旁包斂其口也羈檢也所以持制之也韁疆也繫之使不得出疆限也韁亦曰靮故埤蒼曰靮馬韁也鞚控制之義家語曰善御馬者正身以總轡組禮記疏云組紃俱為絛也皇氏云組是綬也然則薄濶為組似繩者為紃說文云組綬屬其小者以為纓周禮典絲凡飾邦器者受文織絲組漢書云錦繡纂組害女工者也籥爾雅云大籥謂之産其中謂之仲小者謂之箹注籥如笛三孔而短小毛傳云籥六孔廣雅云籥謂之笛有七孔釋文云以竹為之長三尺執之以舞周禮笙師掌教吹籥鄭注籥如笛三孔又云籥師掌教國子舞羽吹籥祭祀則鼓羽籥之舞賔客饗食亦如之文王世子云春夏學干戈秋冬學羽籥陳𤾉云籥所以為聲聲由陽來故執籥于左左陽故也趙岐孟子注云執籥以節衆也何休公羊注云籥所吹以節舞釋名云籥躍也氣躍出也宋書樂志云籥不知誰所造今凱容宣烈舞所執羽籥是翟爾雅云鸐山雉郭璞曰尾長者今俗呼山雞禹貢徐州羽畎夏翟傳云羽中旌旄羽山之谷有之禽經注云山雉長尾尤珍護之林木之森鬱者不入恐觸其尾也雨則避于嵓石之下恐濡濕也久雨亦不出而求食死者甚衆樂書云容自隂作故秉翟于右右隂故也左傳五雉爾雅十二雉而舞之所取者特翟山雉耳以其羽猶可用為儀執之以舞所以為蔽翼者也又云記曰比音而樂之及干戚旄羽謂之樂又曰干戚旄狄以舞之言羽又言狄何也后之六服褘衣搖狄闕狄褘衣繢翬狄于衣爾雅謂素質五色皆備成章者也揄狄繢揄狄于衣爾雅謂青質皆備成章者也所謂羽者豈翬狄揄狄之羽與古今注云殷高宗時有雊雉之祥服章多用翟羽周制以為王后夫人之車服按陳氏樂書其釋翟也既以為山雞其釋羽舞也又以為翬鷂一家之說自相抵梧然翬鷂皆有狄名后之五路重翟厭翟安知不以青素質五色成章者飾之或翟是雉之通名舞師注羽舞析白羽白雉為瑞鳥不易得必是鍾氏之所染矣赭說文云赤土也郭山海經注云紫赤色子虛賦云其土則丹青赭堊錫爵禮記云祭有畀輝胞翟閽寺者惠下之道也翟者樂吏之賤者也毛傳云見惠不過一散朱傳云即儀禮燕飲而獻工之禮按鄭以公庭為宗廟故引畀翟朱不拘祭祀故引獻工畀翟在祭之末惠以五升之散獻工之禮則鄉飲酒鄉射燕禮大射俱有之大略卒歌主人獻工一人拜不興受爵主人拜送爵鄉飲鄉射于阼階上燕禮大射于西階上薦脯醢使人相祭工飲不拜既爵授主人爵衆工則不拜受爵辨有脯醢不祭工不辭洗笙入主人獻之于西階上一人拜盡階不升堂受爵主人拜送爵階前坐祭立飲不拜既爵升授主人爵衆笙則不拜受爵坐祭立飲辨有脯醢不祭惟大射不獻笙略下樂也然合此二說推之此碩人非士復非府史何者若士則尸飲九已有散爵之獻若府史亦恐不在工歌之列殆是樂正之下衆工禮云賤吏是也爵說文云禮器也象爵之形中有鬯酒又持之也所以飲器象爵者取其鳴節節足足也周禮太宰祀五帝大神示享先王贊玉爵內宰后祼獻贊瑤爵梓人為飲器勺一升爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣食一豆肉飲一豆酒中人之量也鄭注觚當為觶豆當為斗月令反執爵于大寢命曰勞酒禮器琥璜爵又云宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角明堂位爵夏后氏以盞殷以斚周以爵又云爵用玉盞仍雕加以璧散璧角少儀客爵居左其飲居右介爵酢爵僎爵皆居右韓詩說云爵盡也足也二升曰觚觚寡也飲當寡少三升曰觶觶適也飲當自適也四升曰角角觸也不能自適觸罪過也五升曰散散訕也飲不自節為人所謗訕也總名曰爵其實曰觴觴者餉也觥亦五升所以罰不敬非所以餉不得名觴三禮圖云爵受一升尾長六寸博二寸傅翼兊下方足漆赤雲氣禮書云祭統尸酢夫人執柄夫人受尸執足柄其尾也有足而尾命之以爵蓋制若雀然也吉禮之爵全篆明堂位加以璧散璧角則天子自觶而上用玉矣燕禮大射以象觚象觶獻公則諸侯之爵用象矣燕禮司正飲角觶士喪禮奠亦角觶蓋大夫飾以角士木而已喪奠用角觶攝盛也觶中觴也先儒言諸觴皆形制同而升數異然爵如雀觚不圎形安得而同哉書稱上宗奉同則周爵又謂同也埤雅云崔豹古今注曰九月雀入水不則多淫泆酒善使人淫泆故一升曰爵所以戒也榛說文云果實如小栗榛木也今書傳通作榛詩義疏云榛栗屬有二種其一種之皮葉皆如栗其子小形如杼子表皮黑味亦如栗所謂樹之榛栗者也其一種枝莖如木蓼生高丈餘作胡桃味遼代上黨皆饒周禮籩人云饋食之籩其實榛曲禮云婦人之贄椇榛棗栗內則云棗栗榛柿爾雅翼云榛枝莖如木蓼葉如牛李色高丈餘子如小栗核中悉如李生則胡桃味膏燭又美亦可噉漁陽遼代上黨皆饒鄭注禮曰似栗而小關中鄜坊甚多然則其字從秦蓋此意也又一種大小枝葉如栗其子形如杼味亦如栗所謂樹之榛栗者是大木非榛楛之榛若女贄則宜兩者皆可用本草圖經云桂陽有而叢生實大如杏子中仁皮子形色與栗無異但差小耳又有奧栗皆與栗同子圎而細或云即也今此色惟江湖有之按說文以榛為木而為果然則山有榛之榛當作而樹之榛栗宜為榛矣詩義疏爾雅翼皆云有二種但莖如木蓼既似櫟樹之形子形如杼復似櫟樹之實羅氏以樹榛之榛為大木而所云生高丈餘者又非小木兩榛俱有實如栗今之榛實較胡桃與栗並自不同未知何以别異本草注于栗條下且引陸璣疏則所謂如杏子中仁與奧栗皆樹榛之榛矣既未詳古人㫖趣聊備釋云隰釋名云隰蟄也隰蟄意也說文曰隰坂下隰也尚書傳云下而平者謂之隰隰之言猶濕也周禮大司徒以土㑹之法辨五地之物生五曰原隰其動物宜裸物其植物宜叢物其民豐肉而庳苓爾雅云蘦大苦郭云今甘草也蔓延生葉似荷青黃莖赤有節節有枝相當或云蘦似地黃疏唐風采苓首陽之顚是也蘦苓字異音義同本草云解百藥毒為九土之精安和七十二種石一千二百種草久服輕身延年一名密甘一名美草一名密草一名蕗草圗經云甘草河西川谷積沙山及上郡今陜西河東州郡皆有之春生青苗高一二尺葉如槐葉七月開紫花似奈冬結實作角子如畢豆根長者三四尺粗細不定皮赤上有橫梁梁下皆細根也有數種以堅實斷理者為佳詩采苓首陽首陽山在河東蒲坂縣今甘草所生處相近而先儒說苗葉與今全别豈種類有不同者乎筆談云甘草枝葉悉如槐高五六尺但葉端微尖而糙澀似有白毛子如小扁豆齒嚙不破六家詩名物疏卷十二
