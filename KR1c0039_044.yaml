body:
  text: 六家詩名物疏卷四十一明馮復京撰小雅谷風之什二楚茨篇上倉釋名云倉藏也藏榖物也月令云季春發倉廩賜貧窮孟冬命有司修囷倉務積聚周禮倉人掌粟入之藏辨九穀之物以待邦用若穀不足則止餘散用有餘則藏之以待凶而頒之庾釋名云庾裕也言盈裕也周語云野有露積韋昭云庾露積穀也疏云庾積粟未入倉露地積聚之九章算術平地委粟是也享祀疏云享祀雖總於祭因在前則為灌及朝踐郊特牲云周人尚臭既灌然後迎牲詔祝於室坐尸於堂注云謂朝事時也禮書云尸入既祼于室然後延之於户西坐於主東南面行朝踐之禮是時君出迎牲蕭載膟膋合黍稷焫于爐然後詔以羮定焉其禮亦謂之朝事又謂之朝獻以象朝時之所養也妥疏云妥侑當饋食之節郊特牲云舉斝角詔妥尸注云妥安坐也尸始入舉奠斝若奠角將祭之祝則詔主人拜安尸使之坐尸即至尊之坐或時自不安時則以拜安之少牢禮云尸即席坐主人拜妥尸即奠賈公彥云天子諸侯大夫士雖同名饋食仍有小别何者天子諸侯食前仍有饋獻一是饋熟隂厭陽厭尸入室乃獻大夫士則饋熟與黍稷為隂厭陽厭前無饋獻以此為異耳禮書云羮定詔於堂然後延主于奧尸坐其北主人拜妥尸而奠爵舉焉俎則載合亨之熟而簠簋之黍稷進焉又云周官掌次祭祀張尸次于廟門之西及其入也主人立于阼階東西南面尸盥而進升自西階主人升自阼階祝從尸主人從祝尸入即席東面而坐祝主人西南而立皆拜妥尸尸答拜遂坐而挼祭侑特牲禮云尸三飯告飽祝侑之如初少牢禮云尸三飯又食食胾又食舉臘肩又食舉牢骼又食告飽祝侑曰皇尸未實侑尸又食舉牢肩尸不飯主人不言拜侑尸又三飯太祝云辨九拜以享右祭祀注云右讀為侑勸尸食而拜又云逆尸令鐘鼓右亦如之鄭氏云食大名小數曰飯士九飯大夫十一飯其餘有十三飯十五飯賈公彥云一口謂之一飯士三飯即告飽而侑大夫七飯而侑諸侯九飯而侑天子十一飯而侑潔牛羊疏云鮮潔爾王者所祀之牛羊於周禮司徒奉牛司馬奉羊劉執中云潔者在滌而芻之也郊特牲云帝牛必在滌三月稷牛惟具周禮充人掌繫祭祀之牲牲祀五帝則繫于牢芻之三月享先王亦如之按潔字古屑奚結二音潔字古通作潔故孔疏云鮮潔所祀之牛羊也朱傳無明說今俚儒以潔為度義出自妄臆剝鄭云有解剝其皮者禮運曰腥其俎孰其殽注云腥謂豚解而腥之孰謂體解而爓之孔氏云豚解腥之是解剝其肉體解爓之是煮孰之者陳祥道云國語曰禘郊之事則有全脀王公立飲有房脀親戚燕飲有殽脀全脀豚解也房脀體解也殽脀骨析也士喪禮特豚四鬄去蹄兩胉脊既夕鼎實羊左胖亦如之然則四鬄者殊左右肩髀而為四又兩胉一脊而為七此所謂豚解也士喪禮略豚解而已至虞然後豚解體解兼有焉若夫正祭則天子諸侯有豚解體解大夫有體解無豚解以其無朝踐獻腥之禮故也周禮內饔凡宗廟之祭祀掌割亨之事司士凡祭祀帥其屬而割牲亨周禮內饔掌王及后世子膳羞之割亨煎和之事凡宗廟之祭祀掌割亨之事外饔掌外祭祀之割亨共其脯修刑膴陳其鼎俎實之牲體魚臘凡賔客之饔飱饗食之事亦如之邦饗耆老孤子士庶子掌割亨之事亨人掌共鼎鑊以給水火之齊職外內饔之爨亨煮辨膳羞之物祭祀共太羮鉶羮賔客亦如之肆傳云肆陳也或陳于牙疏地官牛人云凡祭祀共其牛牲之牙注云牙若今屠家縣肉架則肆謂既殺乃陳之於牙上也箋云有肆其骨體于俎者釋文肆他歷反禮運云然後退而合亨體其犬豕牛羊注云謂分别骨體之貴賤以為衆俎也禮書云周禮王之牲事冢宰太僕贊之五官共奉之內饔外饔割亨之司士帥其屬而割羞諸子正其牲體肱骨三肩臂臑也股骨三肫賂觳也脊骨三正脊脡脊橫脊也脅骨三代脅長脅脰肩也正脊之前則膉也肫之上則髀也然則左右肱之肩臂臑與左右股之肫胳觳而為十有二脊骨三與左右脅骨六而為九二觳正祭不薦於神尸主人之俎兩髀不升於主人主婦之俎膉不升於吉祭之俎則祭之所用者去髀膉而二十有一去二觳而為十九矣祭統曰商人貴髀周人貴肩以周人之禮觀之脅貴中而賤兩端骨貴右而賤左貴前而賤後貴上而賤下將傳云將齊也王肅云分齊其肉所當用箋云有奉持而進之者疏云是司徒小子之類然羣臣助祭各有所掌奉持進之非獨此二職而已大司徒云祀五帝奉牛牲羞其肆享先王亦如之小子職云掌祭祀羞羊肆羊殽肉豆祝周禮太祝掌六祝之辭以事鬼神示祈福祥求永貞掌六祈作六辭辨六號九祭九拜几大禋祀肆享祭示則執明水火而號祝隋釁逆牲逆尸令鐘鼓右亦如之來瞽令皋舞相尸禮既祭令徹小祝掌小祭祀大祭祀逆齍盛送逆尸沃尸盥贊隋贊徹贊奠凡事佐太祝喪祝掌喪祭之祝號甸祝掌表貉之祝號詛祝掌盟詛類造攻說襘禜之祝號儀禮士喪既夕有夏祝商祝士虞特牲饋食少牢饋食皆有祝祭周禮大宗伯以吉禮事邦國之鬼神示尚書大傳云祭之為言察也察者至也至者人事也人事至然後祭祭者薦也薦之為言在也在也者在其道也禮記云禮有五經莫重於祭夫祭者非物自外至者也自中出生於心者也心怵而奉之以禮是故惟賢者能盡祭之義祊爾雅云閍謂之門郭注引詩曰祝祭于祊疏云案祊本廟門之名設祭於廟門因名其祭亦名祊凡祊有二種一是正祭之時既設於廟又求神於廟門之內郊特牲云索祭祝于祊及詩云祝祭于祊注云祊平生門內之旁待賔客之處與祭同日也二是明日繹祭之時設饌於廟門外西室亦謂之祊即郊特牲注云祊之禮宜於廟門外之西室及禮器云為祊乎外是也然則廟門內外皆有祊稱郊特牲曰直祭祝于主索祭祝于祊不知神之所在于彼乎于此乎或諸逺人乎祭于祊尚曰求諸逺者與祊之為言倞也說文作􅤶云門內先祖所倣徨也王氏云凡祀祼鬯則求諸隂焫蕭則求諸陽索祭祀于祊則求諸隂陽之間蓋魂無不之神無不在求之之備如此神保朱傳云神保蓋尸之嘉號禮記曲禮云為人子者祭祝不為尸又云孫可以為王父尸子不可以為父尸曾子問孔子曰祭成喪者必有尸尸必以孫孫幼則使人抱之無孫則取于同姓可也祭殤必厭蓋弗成也禮器云周坐尸詔侑武方其禮亦然其道一也夏立尸而卒祭殷坐尸周旅酬六尸郊特牲云舉斝角詔妥尸古者尸無事則立有事而後坐也尸神象也小記父為士子為天子諸侯則祭以天子諸侯其尸服以士服父為天子諸侯子為士祭以士其尸服以士服少儀婦人為尸坐則不手拜雜記孔子云尸辨冕而出卿大夫士皆下之尸必式必有前驅祭統云尸謖君與卿四人餕尸在廟外則疑于臣在廟中則全于君又云尸飲三衆賔飲一示民有上下也周禮掌次凡祭祀張尸次守祧祭祀各以其服授尸大司樂尸出入則令奏肆夏大祝凡大禋祀肆享祭示則執明火而號祝隋則執釁逆牲逆尸令鐘鼓侑亦如之相尸禮小祝大祭祀逆尸沃尸盥節服氏郊祀裘冕二人執戈送逆尸士師若祭勝國之社則為之尸祀五帝則沃尸士虞禮尸服卒者之上服男男尸女女尸必使異姓不使賤者逸禮記祫禮云毁廟之主升合食而立二尸曾子云王者宗廟以卿為尸不以公為尸辟嫌也禮書云天子諸侯之尸以卿大夫則幼者不與禮曰尸必以孫孫則使人抱之此大夫士之禮與喪禮始喪而奠則無尸以人道事之也既葬而祭則有尸以神道事之也祭祀同几則一尸儀禮曰男男尸女女尸謂虞祭也大夫前祭一日筮尸士前祭三日筮尸大夫于尸再宿而一戒士于尸一宿而無戒推而上之人君蓋亦前三日筮尸而宿戒之儀又加隆矣爨釋名云爨銓也銓度甘辛調和之處也禮記云孟夏其祀竈又云臧文仲焉知禮燔柴於竈竈者老婦之祭也故盛於盆尊於瓶又云庶士庶人立一祀或立户或立竈士虞禮側亨于廟門外之右東面魚臘爨亞之北上饎爨在東北西面特牲饋食主人視饎爨于西堂下亨于門外東方西面北上記云牲爨在廟門外魚臘爨在其南饋爨在西壁尸卒食而祭饎爨雍爨少牢饋食禮雍爨在門東南北上廩爨在雍爨之北淮南子云黃帝作竈死為竈神白虎通云夏祭竈者火之主人所以自養也俎周禮膳夫云王日一舉鼎十有二物皆有俎禮記云取俎進俎不坐又云鼎俎竒而籩豆偶隂陽之義也又云凡羞有俎者則於俎內祭其有折俎者取祭反之不坐燔亦如之又云俎有虞氏以梡夏后氏以嶡殷以椇周以房俎又云三牲之俎八簋之實美物備矣又云凡為俎者以骨為主骨有貴賤殷人貴髀周人貴肩是故貴者取貴骨賤者取賤骨俎者所以明惠之必均也三禮圖云梡長二尺四寸廣一尺二寸髙一尺諸臣加雲氣天子犧飾之夏俎名嶡嶡亦如梡而橫柱四足中央如距也禇遂良云舜造漆器禹雕其俎按俎之制有四虞曰梡斷木為四足而已夏曰嶡中足為橫距之象殷曰椇如枳椇之曲撓周曰房俎足下有跗如堂房其長皆二尺二寸廣一尺二寸髙一尺其用之别甚多一曰薦腥謂豚解而腥之殊兩肩兩髀兩胉與脅為七體此上古之禮也二曰薦爓謂體解而爓之又分豚解為十一體以湯爓之而不全熟此中古之禮也三曰薦熟以其所爓者先煮于鑊既熟則以鼎重煮之升于俎此近代之禮也又割其餘以制之則有燔炙之事俎由鼎而升有九聘禮牛一羊一豕三魚四臘五腸胃六膚七鮮魚八鮮臘九是也去鮮魚鮮臘則為七俎矣公食大夫禮上大夫九俎下大夫七俎是也又去其二則為五少牢陳五鼎羊一豕二膚三魚四臘五腸胃從羊五鼎五俎是也又去其二則為三特牲三鼎牲鼎一魚鼎二臘鼎三亦有三俎是也此皆正俎天子諸侯大夫士之所以别也為俎骨有貴賤鄉飲鄉射禮賔俎脊脅肩肺主人俎脊脅臂肺之類是也又有陪俎非正俎則膷臐膮之三臛臛者羮也即鉶羮也牛臛為膷羊臛為臐豕臛為膮又有肵俎所以載心舌而燔炙皆從獻之物故鄭箋以為從獻之俎九俎皆進於神前其尸既嚌而反其餘於肵俎者謂之尸俎尸俎之外又有主人主婦祝佐賔長兄弟宗人衆賔及衆兄弟內賔宗婦公有司之俎牲之升俎必有物以盛之意即掌蜃之蜃器也主人受尸酢之俎謂之胙俎其俎最尊天子之祭膳夫親徹之王賔客禮食亦有焉燔傳云燔取膟膋禮器云君親制祭夫人薦盎注親制祭謂朝事進血膋時郊特牲云取膟膋燔燎升首報陽也祭義云祭之日君牽牲既入廟門麗于碑鸞刀以刲取膟膋乃退爓祭注云膟膋血與腸間脂也又云建設朝事燔燎羶薌見以蕭光以報氣也此教衆反始也箋云燔燔肉也疏云燔者火燒之名難熟者近火故肉燔也亦為臠貫之以炙于火非炮燒之也士虞主婦亞獻尸賔以燔從獻祝佐食皆如初賔長三獻燔從如初儀特牲饋食主婦亞獻尸兄弟長以燔從尸受振祭嚌之反之羞燔者受加于肵出獻祝燔從如初儀賔三獻燔從如初有司徹云次賔羞羊燔豕燔周禮量人凡祭祀饗賔掌其從獻脯燔之數量炙傳云炙肉也疏云傳以炙為炙肉則是薦俎非從獻也箋云肝肝炙也疏云炙者逺火之稱易熟者逺之故肝炙也士虞主人酳尸賔長以肝從實于俎縮用鹽特牲云主人洗角升酌酳尸賔長以肝從尸取肝㨎于鹽振祭嚌之加于菹豆獻祝以肝從主婦致爵于主人肝從燔亦如之主人致爵于主婦宗婦薦豆俎從獻皆如主人少牢禮主人酳尸賔長羞牢肝縮進末獻祝羞牢肝君婦箋云君婦謂后也凡嫡妻稱君婦事舅姑之稱也釋名云天子之配曰后言在後不敢以副言也諸侯之配曰夫人夫扶也扶助其君也卿之配曰內子言在閨門之內以治家也大夫之配曰命婦婦服也服家事也禮記云古者天子立后六宫三夫人九嬪二十七世婦八十一御妻以聼天下之內治以明章婦道白虎通云天子之配謂之后后者君也後漢書周禮王者立后后正位宫闈同體天王夫人坐論婦禮九嬪掌教四德世婦主喪祭賔客女御叙于王之燕寢頒官分務各有典司女史彤管記功書過居有阿保之訓動有環佩之響進賢才以輔佐君子哀窈窕而不淫其色所以能述宣隂化修成內則閨房肅雍險謁不行者也初學記云按夏殷以前后妃之制其文略矣大率皆稱妃故黃帝有四妃帝嚳四妃周則天子立后秦稱皇帝正嫡曰皇后周禮內宰大祭祀后灌獻則贊瑶爵亦如之凡建國佐后立市中春詔外內命婦治蠶于北郊上春詔皇后帥六宫之人生穜稑之種而獻之于王九嬪凡祭祀贊后薦徹豆籩若有賔客則從后世婦帥女功而擢溉為齍盛及祭之日涖陳女宫之具凡內羞之物女御凡祭祀贊世婦大宗伯凡大祭祀王后不與則攝而薦豆籩徹大賔客則攝而載果內宗掌宗廟之祭祀薦加豆籩及以樂徹則佐傳豆籩賔客之饗食亦如之王后以樂羞齍則贊凡王后之獻亦如之王后不與則贊宗伯禮記云王后蠶於北郊以共純服夫人蠶於北郊以共冕服王后夫人非莫蠶也身致其誠信也及時將祭先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日君致齊於外夫人致齊於內然後會於太廟君純冕立於阼夫人副褘立於東房君執圭瓚祼尸大宗伯執璋瓚亞祼及迎牲君執紖宗婦執盎從夫人薦涗水君執鸞刀羞嚌夫人薦豆此之謂夫婦親之特牲云主婦纚笄宵衣立于房中南面洗爵于房酌亞獻尸少牢云主婦被錫衣侈袂薦自東房韭菹醢醢坐奠于筵前贊者執葵菹螺醢以授主婦遂受陪設于東主婦興入于房自東房執一金敦黍有蓋坐設於羊俎之南婦贊者執敦稷以授主婦主婦興受坐設于魚俎之南又興受贊者敦黍坐設于稷南又興受贊者敦稷坐設于黍南主婦興入于房又云主婦洗爵于房中出酌入户西面拜獻尸尸拜受主婦主人之北西面拜送爵獻酬交錯祭統云尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司皆以齒特牲云三獻主人酌西階上獻賔薦脯醢設折俎賔卒爵主人酌酢卒爵降奠于其位衆賔升受爵坐祭立飲主人洗觶酌于西方之尊西階前北面酬賔賔奠觶于薦南揖復位主人洗爵獻長兄弟于阼階上如賔儀洗獻衆兄弟如衆賔儀洗獻內兄弟于房中如獻衆兄弟之儀嗣舉奠兄弟弟子洗酌于東方之尊舉觶于長兄弟如主人酬賔儀賔坐取觶酬長兄弟長兄弟卒觶衆賔及衆兄弟交錯以辨皆如初儀長兄弟酬賔如賔酬兄弟之儀以辨卒受者實觶于篚賔弟子及兄弟子舉觶于其長長皆奠觶揖其弟子爵皆無算有司徹云主人酌獻賔于西階上衆賔長升拜受爵坐祭立飲辨受爵乃升長賔主人酌酢于長賔西階上北面飲卒爵宰夫洗觶升主人受酌酬長賔于西階南北面遂飲卒爵主人卒洗升酌賔拜受坐奠爵于薦左主人獻兄弟于阼階上辨受爵洗獻內賔于房中獻私人于阼階上二人洗觶升實爵西楹坐奠爵尸侑卒爵尸酬主人主人酬侑于西楹卒爵主人復筵乃升長賔侑酬之如主人之禮至于衆賔遂及兄弟私人兄弟之後生舉觶于其長賔及兄弟交錯其酬皆遂及私人爵無算若不賔尸賔拜受爵洗酌醋于主人卒爵賔以爵降奠于篚主人洗獻衆賔獻兄弟與內賔與私人皆如儐禮賔長獻于尸尸醋獻祝致醋賔兄弟交錯其酬無算爵六家詩名物疏卷四十一
