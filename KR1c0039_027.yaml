body:
  text: 六家詩名物疏卷二十四明馮復京撰國風唐唐譜云唐者帝堯舊都今曰太原晉陽成王封母弟叔虞於唐墟曰唐侯南有晉水至子燮改為晉侯其封域在禹貢冀州太行恆山之西太原太嶽之野至曽孫成侯南徙居曲沃近平陽僖侯孫穆侯又徙於絳地里志河東土地平易有鹽鐵之饒本唐堯所居詩風唐魏之國也其民有先王遺教君子深思小人儉陋左傳唐叔命以唐誥而封於夏虛注大夏今晉陽諸侯譜云晉穆侯徙都於絳孝侯改絳為翼景公遷新田晉語景霍以為城汾河洓澮以為淵戎狄之民實環之孔仲達云武公并晉又都絳案今山西太原府太原縣即秦漢之晉陽縣有唐城叔虞子燮父所徙也晉水出其縣西南十里懸罋山曲沃今為解州聞喜縣絳翼俱在翼城縣東南屬平陽府平陽府又有曲沃縣亦成師所封絳州絳縣景公所徙之新田也蟋蟀篇蟋蟀爾雅蟋蟀蛬李巡曰蜻蛚也郭璞云今趗織也古今注蟋蟀一名吟蛩一名蛩秋初得寒則鳴一云濟南呼為懶婦易通繫卦曰蟋蟀之蟲隨隂迎陽居壁向外趣婦女織績女工之象通卦驗云立秋蜻蛚鳴白露下蜻蛚上堂周書云小暑之日溫風至又五日蟋蟀居壁陸疏云蟋蟀似蝗而小正黑有光澤如漆有角翅一名蛬一名蜻蛚楚人謂之王孫幽州人謂之趨織里語云趨織鳴懶婦驚是也詩義問云蟋蟀食蠅而化成春秋說題詞云趣織為言趣織也織興事遽故趣織鳴女作兼潜潭巴云蟋蟀集天子無逺兵月令季夏蟋蟀居壁疏此物生在于土中至季夏羽翼稍成未能逺飛但居其壁至七月則能逺飛在野搜神記云朽葦為蛬埤雅云隂陽率萬物以出入至於悉􅢊能帥隂陽之悉者也似蝗而小善跳雅翼云蟋蟀以夏生秋始鳴周書蟋蟀居壁淮南則云居奧奧者西南隅也有生野中及生人家者寒則漸近人好吟於土石磚甓之下尤好鬭勝輒矜鳴其聲如急織故幽州謂之促織又其鳴正織之候也古稱騰蛇游霧而殆于即且即且乃蜈蚣耳許叔重謂蟋蟀為即且上蛇蛇不敢動非也梓人以注鳴者精列屬役車巾車云庶人乘役車注役車方箱可載任器以共役疏庶人以力役為事故名車為役車詩疏云收納禾稼亦用此車禮書云役車牛車也書曰肇牽車牛輈人曰大車轅直必縊其牛則大車牛車也牛車大則柏車中車羊車小車也大車以行澤柏車以行山羊車以行宫中車人所謂行澤者欲短轂行山者欲長轂行澤者反輮行山者仄輮此大車柏車之辨也大車兩轅故車人言凡為轅三其輪崇轍廣六尺鬲長六尺一牛在轅內故鬲短而轍狹也大車轂長尺五寸圍尺五寸輻長四尺五寸渠圍二丈七尺輪崇九尺牙圍尺五寸綆一寸轅二丈七尺牝服八尺輪人之牙車人謂之渠輿人之較車人謂之牝服輿人之衡車人謂之鬲輿人之為車起度於輿廣車人之為車起度於柯長輿人之車其箱廣而不方車人之車其箱方而不廣其制之異可知矣山有樞篇樞爾雅云藲荎郭云今之刺榆廣雅云柘榆梗榆也陸疏云其針刺如柘其葉如榆草瀹為茹美滑於白榆榆之類有十種葉皆相似皮及木理異耳陳藏器云江南有刺榆無大榆刺榆秋實榆內則云堇荁枌榆免薧以滑之元命包云三月榆莢落運斗樞云玉衡星散為榆管子云五沃之土其榆條長淮南子云五月其樹榆萬畢術云八月榆檽令人不饑四民月令曰二月榆莢成者收乾以為㫖蓄色變白將落收為醬稽康云榆令人暝鄒子云春取榆栁之火廣雅云山榆毋估也柘榆梗榆也齊民要術云梜榆凡榆三種色别種之勿令雜梜榆莢葉味苦凡榆莢味甘陶隱居云榆皮性至滑利初生莢仁以作糜羮本草衍義云榆皮磑為粉歉嵗農以代食葉青嫩時收貯亦用為羮茹雅翼云陳藏器云江南無大榆蓋大榆北方之木也案陸氏云榆類有十種而不詳其别異之狀爾雅云無姑其實夷注無姑姑榆也生山中葉圓而厚剝取皮合漬之其味辛香所謂蕪夷本草云味辛平生晉山川谷此一種也樞今之刺榆即廣雅所謂梗榆其二種也本草榆皮味甘平一名零榆生潁川山谷其三種也朗榆皮味甘寒生山中如榆皮有滑汁秋生莢如北榆其四種也爾雅榆白枌其五種也廣志云有姑榆有郎榆郎榆無莢又任車用姑榆即無姑朗榆有莢郎榆無莢則郎榆别一種矣齊民要術有梜榆凡榆之别未知梜榆復何如也陸璣又云駁馬梓榆或亦一種與嚴坦叔云此言隰有榆總言榆耳栲爾雅云栲山樗郭璞曰栲似樗色小白生山中因名云亦類漆樹俗語曰櫄樗栲漆相似如一陸疏云山樗與下田樗略無異葉似差狹耳吳人以其葉為茗方俗無名此為栲者似誤也今所云為栲者葉如櫟大皮厚數寸可為車輻或謂之栲櫟許慎正以栲讀為糗今人言栲失其聲耳杻爾雅云杻檍注似棣細葉葉新生可飼牛材中車輞關西呼杻子一名土橿陸疏云葉似杏而尖白色皮正赤為木多曲少直枝葉茂好二月中葉疏華如練而細蘂正白蓋樹今官園種之正名曰萬嵗既取名於億萬其葉又好故種之共汲山下人或謂之牛筋或謂之檍材可為弓弩幹廷內說文云廷朝中也釋名云廷停也人所集之處灑掃曲禮云凡為長者糞之禮必加帚於箕上以袂拘而退其塵不及長者以箕自鄉而扱之少儀云汜掃曰掃掃席前曰拚拚席不以鬛執箕膺擖管子云凡拚之道實水於盤攘臂袂及肘堂上則播灑室中握手執箕膺揲厥中有帚入戶而立其儀不忒執帚下箕倚於戶側凡拚之紀必由奧始俯仰磬折拚毋有徹拚前而退聚於戶內坐板排之以葉適已實帚於箕遂出棄之揚之水篇素說文云素白緻繒也從糸􅑰取其澤也釋名云素朴素也已織則供用不復加功飾也雜記韠以素注云素生帛也范子云白素出三輔匹八百陳錫元云古人動稱竹素殆所以漸變竒觚而啓薄蹄之始者與其輕勻明淨易於點染可想見矣素衣互見曹麻衣詩緝云素絲也以素為衣者謂中衣也鄭深衣目録云深衣連衣裳而純之以采者素純曰長衣有表則謂之中衣大夫以上祭服之中衣用素士祭以朝服中衣以布玉藻云深衣袂可以回肘長中繼掩尺鄭注云其為長衣中衣繼袂掩一尺若今褎矣又云以帛裏布非禮也注中外宜相稱也冕服絲衣也中衣用素皮辨服朝服𤣥端麻衣也中衣用布詩正義云崔靈恩等以天子諸侯朝祭之服先著明衣又加中衣又加裘裘外又有裼衣裼之上乃加朝祭之服其二劉等則以玉藻云君衣狐白裘錦衣以裼之又云以帛裏布非禮也鄭注云冕服中衣用素朝服中衣用布若皮辨服之下即以錦衣為裼便是以帛裏布故知中衣在裼衣之上明矣禮書云深衣與中衣同制異飾連裳方夾直繩旁袵以至裳十二幅要三袪縫齊倍要之類此其所同也深衣之純以采若素長衣之純素而已中衣之飾繡黼丹朱而與長衣又繼掩尺焉所謂掩尺者幅廣二尺二寸以半幅繼袂之末掩餘一尺長衣之掩以布中衣掩或素或布各象其衣然也若深衣則緣而已此其所異也朱襮傳云襮領也諸侯繡黼丹朱中衣箋云繡當為綃中衣以綃黼為領丹朱為純也釋器云黼領謂之襮孫炎曰繡刺黼文以褗領郊特牲云繡黼丹朱中衣大夫之僣禮也詩緝云中衣者朝服祭服之裏衣也朱朱緣也謂染繒為赤色為中衣之緣也襮領也謂繡黼領也繡刺白黑文以褗領也此以素為衣謂冕服爵辨之中衣公之孤及天子大夫四命皆爵辨自祭士助祭於君亦服爵辨以上則中衣亦用素但不得用朱襮也禮記疏云素衣朱襮國君之禮大夫士不用綃黼丹朱但用采純而已沃水經注左邑故城故曲沃洓水自城西注水流急濬故詩人以為激揚之水孔仲達云成侯徙居曲沃則為晉都至昭公分曲沃封桓叔則昭公已前已徙絳矣然則穆侯以後晉常都絳曹氏云自桓侯初封曲沃至武公滅晉凡六十七嵗竹書紀年莊伯十二年翼侯焚曲沃之禾繡疏云於繒之上刺繡以為黼尚書云豫欲觀古人之象藻火粉米黼黻絺繡考工記云青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五采備謂之繡注此言刺繡采所用釋名云繡修也文修修然也繡魯詩作綃以為綺屬也孔仲逹云綃是繒綺别名於此綃上刺為繡文鵠傳云曲沃邑疏云桓叔都在曲沃其旁更有邑椒聊篇椒爾雅云檓大椒郭云今椒樹叢生實大者名為檓又云椒榝醜莍李巡曰榝茱萸也椒茱萸皆有房故曰梂梂實也陸疏云椒樹似茱萸有針刺葉堅而滑澤蜀人作荼吳人作茗皆合煮其葉以為香今成臯諸山間有椒謂之竹葉椒其樹亦如蜀椒少毒熱不中合藥可著飲食中又用蒸雞豚最佳香東海諸島上亦有椒樹枝葉皆相似子長而不圓甚香味似橘皮島上獐鹿食此椒葉其肉自然作椒橘香本草經云秦椒生太山川谷及秦嶺上或琅琊八九月採實蜀椒一名蓎藙生武都川谷及巴郡八月採實蔓椒生雲中川谷及丘冢間採莖根煮釀酒胡椒生西戎形如鼠李子調食用之味甚辛辣范子計然云蜀椒出成都赤色者譱秦椒出天水隴西細者譱春秋運斗樞云玉衡星散為椒援神契云椒薑禦濕昌蒲益聰酉陽雜俎云椒可以來水銀茱萸氣好上椒氣好下埤雅云椒似茱萸而小赤色內含黑子如㸃今謂椒目案椒之種不一秦椒色黃黑似蜀椒而大初秋生花秋末結實即爾雅所謂檓也蜀椒即陸璣云似茱萸有刺葉堅而滑者四月結子無花但生葉間如小豆顆而圓皮紫赤色八月採實隂乾其生蜀都巴郡者皮肉厚腹裏白氣味濃蔓椒陶云俗呼為樛似椒檔小不香耳今亦無能辨之者又有崖椒彼土四季採皮入藥陸璣所謂竹葉椒但可著飲食中似是今之胡椒續漢書云天竺國出胡椒段柯古云其苗蔓生莖極弱長半寸有細條與葉齊條上結子兩兩相對葉晨開暮合合則裹其子于葉中者是也蓋其種實自西域來耳此詩作於晉人晉地近秦歌其土物當指秦椒山海經云景山多秦椒則秦椒之著久矣升考工記云㮚氏為量改煎金錫則不耗不耗然後權之權之然後準之準之然後量之量之以為釜其耳三寸其實一升漢書云嘉量法用銅方尺而圜其外左耳為升右耳為合合合籥之量也升者登合之量也斗者聚升之量也家語云黃帝設五量崔靈恩集注云古者為升上徑一寸下徑六分其深八分掬傳云兩手為掬詩詁云兩手曰臼屈掌曰掬禮書云掬二升二掬為豆四升吕氏云古量二升曰掬掬大於升埤雅云古者掬大而升小或曰廣雅以為兩手謂之掬掬一升也曲禮云受珠玉者以掬綢繆篇三星傳云三星參也箋云三星謂心星也心有尊卑夫婦父子之象又為二月之合宿故嫁娶者以為候案參十星然實三星下三星曰伐其外四星為左右肩股故毛以三星為參心三星天王正位召南小星詩毛以三為心是也故鄭謂三為心毛鄭二家說婚姻之時不同後儒各從其所見良人毛云美室朱云夫稱案古無稱女子為良人者儀禮良席在東孟子其良人出秦風厭厭良人皆指其夫耳鄭注儀禮云婦人稱夫曰良是也此傳當革而不革未知鄭㫖云何芻說文芻刈草也象包束草之形爾雅秆謂之芻祭統王執芻注藳也孔氏云芻者飼馬牛之草蕘者供燃火之草隅說文陬也爾雅西南隅謂之奧西北隅謂之屋漏東北隅謂之宦東南隅謂之㝔戶釋名云戶護也所以謹護閉塞也說文云半門曰戶毛公云庶人蓽戶枤杜篇杜詳見召南甘棠爾雅云杜甘棠羔裘篇褎釋名云袖由也手所由出入也亦言受也以受手也玉藻云袂可以回肘注云二尺二寸之節鴇羽篇鴇郭璞云鴇似雁無後趾毛有豹文一名獨豹疏云鴇鳥連蹄性不樹止樹止則為苦釋文云似雁而大雜俎云鴇遇鷙鳥能激糞禦之糞著毛悉脫禮曰雞肝雁腎鴇奧鹿胃鄭𤣥云奧脾也埤雅曰說文曰肉出尺胾焦貢易林曰文山鴻豹肥腯多脂蓋言此也閩諺曰鴇無舌兔無脾說文曰相次也從匕從十蓋鴇性羣居如雁自然有行列故從詩故曰鴇行栩爾雅云栩杼郭曰柞樹又云櫟其實梂孫炎曰櫟實橡也有梂彚自裹邢云櫟似樝之木也陸璣疏云唐風集于苞栩今柞櫟也徐州人謂櫟為杼或謂之為栩其子為皂或言皂斗其殼為汁可以染皂今京洛及河內多言杼斗謂櫟為杼五方通語也秦風山有苞櫟秦人謂柞櫟為櫟河內人謂木蓼為櫟椒榝之屬也其子房生為梂木蓼子亦房生故說者或曰柞櫟或曰木蓼璣以為此秦詩宜從其方土之言柞櫟是也東海及徐州謂之木蓮其葉始生食之味辛其梂子八月中成摶以為燭明如胡麻燭研以為羮肥如胡麻羮本草云橡實堪染用一名杼斗槲櫟皆有斗以櫟為勝所在山谷中皆有圖經云木髙二三丈三四月開黃花八九月結實柞櫟也杼也栩也皆橡櫟之通名枕中記云橡子非果非穀最益人服食無氣而受氣無味而受味消食止痢令人強健本草衍義云櫟葉如栗葉堅而不堪充材風土記云吳越之間名柞為櫪古今注云杼實曰橡齊民要術云柞砍去還生料理還復宜種于山阜之曲十年中椽二十年中屋薪樵不在此數雅翼云管子五粟之土其柘其櫟修直以長淮南時則訓十二月之木可以為車轂木不出火惟櫟為然亦應隂氣也案鄭漁仲以栩杼為柞木以秦風之苞櫟更是一物櫟即今之橡斗樹也綿詩朱子解柞云枝長葉盛叢生有刺亦與橡斗樹不同盬疏云盬與蠱字異義同左傳云於文皿蟲為蠱穀之飛亦為蠱然則蟲害器敗穀者皆謂之蠱是盬為不攻牢董氏云說文煮海為鹽煮池為盬故安邑之出為盬苦而易敗故傳以不堅訓之翼說文云翅也行傳云行翮也爾雅云羽本謂之翮注鳥羽根也周禮云羽人掌以時徵羽翮之政於山澤之農以掌邦賦之政令稻爾雅云稌稻也說文云稻稌也粳稻屬糯沛國謂稻為糯本草粳米味甘苦主益氣止煩止泄稻米味苦主溫中顔師古刋謬正俗云本草稻米今之糯米養生要集云粳稻屬也稻亦粳之總名也道家方藥有用稻米粳米此則是兩物也稻米粒白如霜味苦主溫食之令人多瘦無肌膚粳米味甘主利五藏長肌膚好顔色周禮云揚州宜稻曲禮云祭宗廟之禮稻曰嘉蔬月令云季秋天子乃以犬嘗稻先薦寢廟春秋說題詞云稻之為言籍也稻冬含水盛其德也故稻太隂精含水沮洳乃能化也江旁多稻固其宜也孝經援神契云汚泉宜稻吕氏春秋曰得時之稻大本而莖葆長秱疏穖穗如馬尾大粒無芒摶米而薄穅舂之易而食之香如此者不益先時者大本而莖葉格對短秱短穗多粃厚糠薄米多芒後時者纎莖而不滋厚糠多粃辟米不待定熱卬天而死泛勝之書云種稻春解凍時耕反其土種稻區不欲大大則水深淺不遍冬至後百一十日可種稻地美者用種畝四斗四民月令曰三月多種粳稻月令章句云十月穫稻九月熟者謂之半夏稻案爾雅云稌稻說文云稻稌也沛國謂稻為糯粳稻屬也本草粳米稻米分二種則稻稌即是今之􅟙米然粳糯總是有芒之穀故粳亦謂之稻字林云􅟙黏稻也粳稻不黏者周官有稻人之職漢置稻田使者則粳糯二色皆稻也若别而言之則稻是糯而粳乃稻屬耳詩書所用則各隨文而解之論語食夫稻則稻是粳月令秫稻必齊則稻是􅟙周禮牛宜稌則稌是粳豐年多黍多稌為酒為醴則稌是糯粳有赤白小大異族稻有蟬鳴虎掌一切殊名婆登月成南海九熟交趾再穫天竺四收種類有不可窮詰者以陶隱居之博物而云江東無稻不知色類云何丈人責子路曰五穀不分五穀豈易分哉糯米今人亦謂之秫廣雅云秫糯也古今注云稻之粘者為秫然爾雅衆秫别是一種禮記秫稻必齊又云菽麥蕡稻黍粱秫惟所欲急就篇云稻黍秫稷既言秫又言稻必非一物鄭司農太宰注亦以秫稻為九穀之二種本草圖經云黍米粘者為秫說文云秫稷之黏者則秫是黍稷之屬非稻也顔師古云秫似黍米而粒小粱本草青粱米味甘微寒益氣補中輕身長年白粱米味甘微寒主除熱益氣黃粱米味甘平主益氣和中止泄陶隱居云青粱出北方黃粱出青冀州白粱處處皆有唐本注云青粱殼穗有毛粒青米亦微青而細於黃白粱穀粒似青稞而少粗夏月食之極清涼但以味短色惡不如黃白粱故人少種之此穀早熟而收少作餳清白勝餘米白粱穗大毛多且長穀粗扁長不似粟圓米亦白而大食之香美為黃粱之亞黃粱出蜀漢商浙間亦種之穗大毛長穀米俱粗於白粱收子少不耐水旱食之香美逾於諸粱人號為竹根黃圖經云粱皆粟類大抵人多種粟而少種粱以其損地力而收穫少諸粱食之比他穀最益脾胃粟米亦相似耳粟米比粱乃細而圓種類亦多功用則無别矣通志云泛勝之書云粱是秫粟今俗謂之粱古祭祀所用粢盛是也可作粢食及釀酒亦如􅟙米或云粱亦有粳者雅翼云古不以粟為穀名但米有孚殼者皆稱粟今人以穀之最細而圓者為粟則粱是其類古天子之飯有白粱黃粱者明取二種耳周禮食醫㑹膳食之宜犬宜粱疏天味酸而溫粱米味甘而微寒氣味相成也禮記云祭宗廟之禮梁曰薌萁又曰大夫無故不食粱無衣篇七衣周禮大行人云諸侯之禮冕服七章讀詩記云周禮注鷩冕七章衣三章一曰華蟲畫以雉即鷩也二曰火三曰宗彛皆畫為繢裳四章一曰藻二曰粉米三曰黼四曰黻皆絺以為繡六衣周禮云王之三公八命其卿六命其國家宫室車旗衣服禮儀亦如之孔仲達云衣服指謂冠辨也飾則六玉冠則六辟積案周禮典命八命之公六命之卿四命之大夫衣服如其命數而司服公衮冕九章侯伯鷩冕七章子男毳冕五章孤希冕三章卿大夫𤣥冕一章其八章六章四章二章之衣未聞其制故此詩豈曰無衣六兮鄭朱俱言六命之服不云六章也其典命所云衣服亦如之者終不可解求其說而不得則有賈公彥大章小章之說然亦不知小章如何而别也夏官射人云三公執璧與子男同則其服亦毳冕矣差而次之則孤卿希冕大夫𤣥冕希冕之服刺粉米於衣黼黻於裳但三章耳然諸侯之孤卿大夫其朝聘天子及助祭得服希冕𤣥冕王臣與陪臣不應同服王荆公云六者子男之服也子男之服以五為節而曰六者天子之卿六命與子男同服故也若然則八命之三公服侯伯之服矣及其出封也皆加一等則三公即得九章卿即得七章於理亦可通而未詳所出當是荆公臆見耳葛生篇蘞陸疏云蘞似栝樓葉盛而細其子正黑如燕奧不可食幽州人謂之烏服其莖葉煮以哺牛除熱域毛傳云域塋域也周禮冢人掌公墓之地辨其兆域而為之圖以爵等為丘封之度與其樹數墓大夫掌凡邦墓之地域為之圖令國民族葬而掌其禁令正其位掌其度數使皆有私地域孔子云古者墓而不墳又云古不修墓枕說文云枕卧所薦首者釋名云枕檢也所以檢項也夏尚書云申命羲叔宅南交平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革書大傳云南方者任方也任方者物之方任何以謂之夏夏者假耆吁荼萬物養之外者也故曰南方夏也夏小正云四月昴則見囿有見杏鳴蜮王萯秀取荼五月參則見浮遊有殷良蜩鳴六月鷹始摯月令云孟夏之月日在畢昏翼中旦婺女中其日丙丁其帝炎帝其神祝融其蟲羽其音徴律中仲吕螻蟈鳴蚯蚓出王瓜生苦菜秀靡草死麥秋至仲夏之月日在東井昏亢中旦危中律中㽔賔小暑至螳蜋生鵙始鳴反舌無聲日長至隂陽爭死生分百官靜事無刑以定晏隂之所成鹿角解蟬始鳴半夏生木堇榮季夏之月日在柳昏火中旦奎中律中林鍾溫風始至蟋蟀居壁鷹乃學習腐草為螢土潤溽暑大雨時行鄉飲酒義云夏之為言假也養之長之假之仁也爾雅云夏為朱明注氣赤而光明素問云夏三月此謂蕃秀天地氣交萬物華實管子云南方曰日其時曰夏其氣曰陽陽生火與氣九暑乃至時雨乃降五穀百果乃登此謂日德魏相奏云南方之神炎帝乘離執衡司夏月令注云孟夏日月㑹于實沈仲夏日月㑹于鶉首季夏日月㑹於鶉火采苓篇首陽朱傳云首山之南也孔氏云首陽之山在河東蒲坂縣南馬融云華山之北河曲之中十三州志云雷首山一名獨頭山夷齊所隱水經注云雷首山臨大河北去蒲坂三十里左傳趙宣子田於首山注首山在河東蒲坂縣東南戴延之西征記云洛東北去首陽山二十里山上有伯夷叔齊祠或云餓死此山今河東蒲坂南又有首陽亦有夷齊未詳餓死所在一統志云首陽山在山西平陽府蒲州東南三十里即禹貢雷首山也伯夷叔齊隱此上有夷齊墓并廟六家詩名物疏卷二十四
