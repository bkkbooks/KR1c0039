body:
  text: 六家詩名物疏卷四十四明馮復京撰小雅甫田之什二桑扈篇屏爾雅云門屏之間謂之宁屏謂之樹疏云屏蔽也樹立也立牆當門以自蔽也諸侯内屏在路門之内天子外屏在路門之外而近應門郊特牲云旅樹大夫之僭禮注云旅道也樹所以蔽行道明堂位云疏屏天子之廟飾注云屏今桴思也刻之為雲氣蠱獸如今闕上為之矣禮緯云天子外屏諸侯内屏大夫以簾士以帷天文書云屏四星在端門内近左執法翰傳云翰幹釋詁云楨幹也舍人曰楨正也築牆所立兩木也幹所以當牆兩邊障土者鴛鴦篇鴛鴦古今注云鴛鴦水鳥鳬類雌雄未嘗相離人得其一則一者相思死故謂之匹鳥荆楚記云節木鳥鴛是也食療本艸云食鴛肉令人美麗夫婦不和與食立相憐愛雅翼云歸蔵曰有鳬鴛鴦蓋鳬屬雄名為鴛雌名為鴦大如鶩杏黄色頭戴白長毛垂至尾尾翅皆黒黄赤五采者有纓者皆鸂􅥩耳畢月令云羅罔畢翳注云罔小而柄長謂之畢大東傳云畢所以掩兔疏云象畢星為之廏説文云廏馬舍也曲禮云君子將營宫室宗廟為先廏庫為次周禮校人云三乘為皁三皁為繫六繫為廏六廏成校圉師掌春除蓐釁廏釋名云廏鳩也聚也牛馬之所聚也左傳疏云凡馬春分百艸始繁則牧于坰野秋分農功始蔵水寒艸枯則皆還廏此周典之制也星經云天廏十星在壁北主天子馬坊廏苑之官也頍弁篇蔦爾雅云寓木宛童郭云寄生樹一名蔦陸璣云葉似當盧子如覆盆子赤黒甜美本艸云桑上寄生其實明目輕身通神一名寄屑一名寓木一名宛童一名蔦生𢎞農川谷桑樹上三月三日採莖葉隂乾陶隱居云桑上者名桑上寄生爾詩云施于松上方家亦用楊楓上者各隨其樹名之生樹枝間寄根在皮節之内葉圎青赤厚澤易折旁自生枝節冬夏生四月花白五月實赤大如小豆蘇恭云此多生槲櫸栁木楊楓等樹上子黄大如小棗實九月始熟陶説非也圖經云寄生云是烏鳥食物子落枝節間感氣而生葉似橘而厚軟莖似槐枝而肥脆三四月開花黄白色六七月結實黄色如小豆女蘿毛公云女蘿菟絲松蘿也陸璣云菟絲蔓連艸上黄赤如金今合藥菟絲子是也非松蘿松蘿自蔓松上生枝正青與菟絲殊異本艸云松蘿一名女蘿生熊耳山川谷松樹上五月採藥性論云松蘿能治寒熱吐客痰按菟絲名女蘿爾雅所云是也松蘿亦名女蘿博雅及本艸所云是也古詩云與君為新婚兔絲附女蘿李善云二者異艸毛公誤合為一此詩女蘿施松自是松蘿耳與兔絲了無渉釋文云在艸曰兔絲在木曰女蘿亦非蓋兔絲亦蔓延于木也霰箋云將大雨雪始必微温雪自上下遇温氣而搏謂之霰久而寒勝則大雪矣爾雅云雨䨘為霄雪疏云水雪雜下也因名霄雪霄即消也月令仲冬行夏令則天時雨汁注雨雪雜下為汁大戴禮曽子云陽之專氣為霰隂之專氣為雹盛陽之氣在雨水則温煖為隂氣薄而脅之不相入則搏為雹也盛隂之氣在雨水則凝滯而為雪陽氣薄而脅之不相入則消散而下因水而為霰榖梁說云雹者隂脅陽之象霰者陽脅隂之符釋名曰霰星也水雪相搏如星而散宋書符瑞志云韓詩曰先集維霰薛君注霰英也花葉謂之英然則霰為花雪埤雅云説文曰霰稷雪也閩俗謂之米雪言其霰粒如米所謂稷雪義蓋如此今名濇雪亦名濕雪車舝篇鷮爾雅云鷮雉郭云即鷮鷄也長尾走且鳴説文云鷮走鳴長尾雉也乘輿以尾為防釳著馬頭上陸璣曰鷮微小于雉走而且鳴色如雄雉尾如雉尾而長其頭上有肉冠冠上藂毛長數寸如雄雉尾角内甚美故林麓山下人語曰四足之美有鹿兩足之美有鷮山海經曰女几之山多白鷮禽經云火為鷮亢為鶴薛綜云雉之健者為鷮尾長六尺青蠅篇青蠅王充云青蠅所汚常在練素段成式云青蠅糞能敗物雖玉亦不免所謂蠅矢點玉陸佃云青蠅首赤如火背若負金傳曰以氷致蠅蠅逐臭者懐蛆縈利喜煖惡寒故遇氷輒側翅逺引劉執中云蛆蟲變成者青蠅也其止于物則穢敗之又從而生蛆蛆復變為蠅穢敗于物無有紀極賔之初筵篇筵詳見邶風席春官司几筵注云筵亦席也鋪陳曰筵藉之曰席説文云筵竹席也周禮曰度堂以筵筵一丈釋名云筵衍也舒而平之衍衍然也陳氏云筵席之制短不過尋長不過常中者不過九尺公食大夫蒲筵常萑席尋匠人明堂度九尺之筵純縁之制上不過黼下不過緇布儀禮鄉射席賔南面東上衆賔之席繼而西席主人於阼階上西面蒲筵緇布純西序之席北上大射小臣設公席於阼階上西鄉司宫設賔席於戸西南面有加席核天官籩人饋食之籩其實棗栗桃乾䕩榛實射互見鄭風射傳云燕射之禮箋云大射按天子諸侯射禮有三曰大射曰賔射曰燕射大射是將祭擇士之射賔射是諸侯來朝天子入與之射或諸侯相朝而與之射燕射是息燕而與之射其侯大射張皮侯而棲鵠賔射張采侯燕射張獸侯其射之處則大射先習於澤後射於射宫天子射宫蓋在廟鄉射記云於郊則閭中則天子大射亦在虞庠諸侯在太學也賔射天子在朝射人云諸侯在朝則皆北面是也諸侯在國内與天子同在朝或國外相會則在竟故鄉射記云於竟則虎中也燕射則在於路寢以燕禮朝服於寢故也其耦則大射賔射王以六耦畿内諸侯以四耦畿外諸侯卿大夫士皆三耦燕射例同三耦而已此詩毛以為燕射鄭以為大射按燕禮大射禮諸侯與其臣行禮皆宰夫為主人納賔及庭公降一等揖之公升席賔升自西階主人從之賔右北面再拜賔答拜主人降洗賔降主人辭降主人取觚洗賔辭洗主人卒洗賔揖升筵前獻賔賔拜受爵于筵前然後賔升筵是初筵折旋揖讓之事也飲酒孔偕云者二禮賔主獻酬及獻公之屬是也鐘鼓既設者燕禮云樂人縣又云若射如鄉射之禮鄉射云樂正適西方命弟子贊工遷樂于下注云當辟射也然則此設鐘鼓亦為將射改縣也王宫縣階間有妨射位與國君大射軒縣及階間但有鼓者不同明天子大射當改縣矣燕射準鄉射自然當改縣也云舉酬逸逸者是二禮媵爵于公之後為賔為卿為大夫舉旅之禮也鄉射大夫士禮則無舉旅之文大侯既抗云者燕射自天子至士皆一侯上下共射之鄉射記所云天子熊侯白質諸侯麋侯赤質者也大射之侯則天子虎熊豹畿外諸侯熊糝豻畿内諸侯熊豹天子自射虎侯九十弓畿外諸侯自射熊侯亦九十弓故大射禮謂熊侯為大侯此大侯在天子則虎在國君則熊也鄉射張侯下綱不及地武不繫左下綱中掩束之既納射器比三耦司正為司馬命張侯弟子脱束遂繫左下綱所謂既抗者也鄭則以大射前射三日量人巾車已張三侯明天子三侯亦射前三日張之故以抗為棲鵠于侯中然大射亦云張三侯不繫左下綱射末巾車量人解左下綱但將射無繫左下綱之節或文不具耳鄭未為的論也自是司射誘射既射兩畨釋獲司射命設豐司宫士奉豐由西階升坐設于西楹西勝者之弟子洗觶升酌散南面坐奠于豐上司射及三耦及衆射者勝者皆袒決遂執張弓不勝者皆襲脱決拾却左手右加弛弓于其上遂執拊勝者先升堂不勝者進北面坐取豐上之觶興少退立卒觶坐奠于豐下三耦卒飲衆皆繼飲射爵如三耦及第三畨用樂射不勝者升飲亦如初儀所謂罰不勝之爵也由是則旅酬及于士而禮終矣此燕射大射之禮大率然也毛既以此為燕射至次章籥舞笙鼓十句所説不明王肅以為燕樂之義得則能進樂其先祖故言烝衎非是實祭不思祭祀感神獲福與燕何渉可謂牽率之甚矣其釋賔載手仇二句云主人請射于賔賔許諾自取其匹以射主人亦入于次又射以耦賔考之禮則請射者司射非主人自請也耦者有司所比非賔自取也不知毛何以云然朱傳稱熊侯白質諸語及三耦皆據燕射又引大射宿縣之文未知朱子之意以此為大射乎抑燕射乎的互見齊風侯傳云的質也孔氏云周禮鄭衆馬融注皆曰十尺曰侯四尺曰鵠二尺曰正四寸為質王肅云質方六寸鄭以大射之侯其中制皮為鵠賔射之侯其中采畫為正正大如鵠中皆居侯中三分之一此傳惟云的質也蓋亦以為所射處與鄭同燕射則謂麋侯白質者子孫奏能鄭氏云士之祭禮上嗣舉奠因而酌尸天子則有子孫獻尸之禮劉瑾云特牲三獻之後長兄弟洗觶獻尸尸飲畢酢之長兄弟受而卒爵少牢下篇三獻之後亦有二人洗觶酌獻之禮各奏爾能謂此類與室人孔氏曰特牲注云佐食賔佐尸食者也謂于賔客之中取人令佐主人為尸設饌食特牲佐食一人少牢佐食二人未知天子諸侯當幾人也特牲三獻之後長兄弟洗觚為加爵又曰衆賔長為加爵注云大夫三獻而禮成多之者為加是賔手挹酒室人復酌為加爵也特牲止有賔長為加爵不及佐食此言賔與室人俱為加爵者天子之禮大故佐食亦為加也特牲記云佐食𤣥端𤣥裳黄裳雜裳可也皆爵韠佐食當事則尸外南面無事則中庭北面凡祝呼佐食許諾佐食于旅齒于兄弟監朱子云監史司正之屬燕禮鄉射恐有解倦失禮者立司正以監之察儀法也鄉飲酒禮鄉射禮曰作相為司正燕禮曰射人為司正大射曰擯者遂為司正史吕東萊云淳于髠説齊威王曰賜酒大王之前執法在旁御史在後此人君燕飲之制猶存于戰國者也立之監即執法也鄉射注所謂立司正以監察儀法者也佐之史即御史也董氏所謂佐之史以書之者也周禮大史掌建邦之六典小史掌邦國之志内史讀四方之事書掌書王命外史掌書外令達書名于四方御史掌邦國都鄙及萬民之治令以贊冢宰掌贊書凡數從政者禮記云史載筆士載言又云動則左史書之言則右史書之大戴禮云太子既冠成人免于保傅則有司過之史韓詩外傳云據法守職而不敢為非者太史令也左傳云君舉必書書而不法後嗣何觀史通云古者言為尚書事為春秋左右二史分尸其職昔軒轅受命倉頡沮誦實居其官曲禮曰史載筆大事書之于䇿小事簡牘而已至于諸侯列國亦各有史官羖爾雅云夏羊牡羭牝羖注云夏羊黑羖䍽也今人便以牂羖為白黒羊名羅氏云羖本夏羊牝者之名吳羊白夏羊黒羖羊之角主明目安心益氣輕身辟鬼魅虎狼療疥蟲蠱毒結氣止寒泄為用最大而詩云俾出童羖脅㠯必無之物猶言而無實不為用也羖在今世但為黒羊之名不取牝義而音又通于牯故本艸羖羊條注稱牯羊牯乃牡之名六家詩名物疏卷四十四
