body:
  text: 六家詩名物疏提要下釋舟車兩召南鵲巢篇車何彼穠矣篇舟邶柏舟篇軓匏有苦葉篇式前之軓軌匏有苦葉篇轂末之軌車轍之軌轡簡兮篇牽泉水篇駕泉水篇重較衛淇奧篇幩碩人篇翟茀碩人篇帷裳氓篇楫竹竿篇刀河廣篇大車王大車篇革路簟茀齊載驅篇輻魏伐檀篇輪伐檀篇役車唐蟋蟀篇輶車秦駟驖篇鸞駟驖篇鑣駟驖篇小戎小戎篇收小戎篇輈小戎篇遊環小戎篇脅驅小戎篇隂小戎篇靷小戎篇鋈續小戎篇文茵小戎篇轂小戎篇觼小戎篇軜小戎篇俴駟小戎篇鏤膺小戎篇路車渭陽篇戎車小雅鹿鳴什采薇篇鞗革南有嘉魚什蓼蕭篇和蓼蕭篇元戎六月篇鈎膺采芑篇軧采芑篇衡采芑篇田車車攻篇輔節南山什正月篇服谷風什大東篇牝服箱大東篇鞅北山篇輦魚藻什黍苖篇棧車何草不黃篇鈎援大雅文王什皇矣篇臨皇矣篇衝皇矣篇三單生民什公劉篇綏蕩什韓奕篇鏤錫韓奕篇鞃韓奕篇幭韓奕篇金厄韓奕篇千乘魯頌閟宫篇釋色頳周南汝墳篇白召南野有死麕篇緑邶緑衣篇黃緑衣篇赭簡兮篇赤北風篇黑北風篇皙鄘君子偕老篇朱衛碩人篇緇鄭緇衣篇青子襟篇綦出其東門篇丹秦終南篇玄豳七月篇釋藝業釣召南何彼穠矣篇賈邶谷風篇卜鄘定之方中篇筮衛氓篇射鄭大叔于田篇御大叔于田篇弋女曰雞鳴篇績陳東門之枌篇農豳七月篇耘小雅甫田什甫田篇耔甫田篇三事大雅蕩什常武篇織瞻卬篇耕周頌臣工什噫嘻篇釋夷玁狁小雅鹿鳴什采薇篇西戎出車篇蠻南有嘉魚什采芑篇有北節南山什巷伯篇髦魚藻什角弓篇混夷大雅文王什綿篇鬼方蕩什蕩篇蠻方抑篇百蠻韓奕篇追貊韓奕篇北國韓奕篇淮夷江漢篇狄瞻卬篇氏羌商頌殷武篇釋獸馬周南卷耳篇兕卷耳篇兔兔罝篇駒漢廣篇麟麟趾篇羔召南羔羊篇羊羔羊篇麕野有死麕篇鹿野有死麕篇尨野有死麕篇豝騶虞篇騶虞騶虞篇豵騶虞篇狐邶旄丘篇虎簡兮篇象鄘君子偕老篇騋定之方中篇牛王君子于役篇黃鄭大叔于田篇鴇大叔于田篇豹鄭羔裘篇肩齊還篇狼還篇盧盧令篇驪載驅篇貆魏伐檀篇特伐檀篇白顛秦車鄰篇驖秦駟驖篇辰牡駟驖篇四馬駟驖篇獫駟驖篇歇驕駟驖篇騏小戎篇馵小戎篇駵小戎篇騧小戎篇駮晨風篇貉豳七月篇貍七月篇皇東山篇駁東山篇駱小雅鹿鳴什四牡篇駰四牡篇羜伐木篇魚采薇篇獸南有嘉魚什車攻篇麀吉日篇麌吉日篇祁吉日篇麎也熊鴻堆什斯干篇羆斯干篇犉無羊篇牲無羊篇毚兔節南山什巧言篇犬巧言篇豺巷伯篇騂牡谷風什信南山篇犧甫田什甫田篇騂黑大田篇羖賔之初筵篇猱魚藻什角弓篇豕漸漸之石篇牂苕之華篇騵大雅文王什大明篇逹生民什生民篇羝生民篇牢公劉篇淺蕩什韓奕篇貓韓奕篇貔韓奕篇白馬周頌臣工什有客篇驈魯頌駉篇騅駉篇駓駉篇騂駉篇驒駉篇雒駉篇騢駉篇驔駉篇魚駉篇駽有駜篇白牡騂剛閟宫篇駿厖商頌長發篇釋鳥雎鳩周南關雎篇黃鳥葛覃篇鵲召南鵲巢篇巢鵲巢篇鳩鵲巢篇鳲鳩也雀行露篇燕邶燕燕篇雉雄雉篇鴈匏有苦葉篇流離旄丘篇翟簡兮篇烏北風篇鴻新臺篇鶉鄘鶉之奔奔篇鳩衛氓篇雞王君子于役篇鳬鄭女曰雞鳴篇鴇唐鴇羽篇晨風秦晨風篇鷺陳宛丘篇梟墓門篇鵜曹候人篇鵙豳七月篇鴟梟鴟梟篇鷦鷯鵂鶹周頌桃蟲即此鸛東山篇隼小雅鹿鳴什四牡篇脊令常棣篇鳥伐木篇隼南有嘉魚什采芑篇鶴鴻堆什鶴鳴篇翬斯干篇桑扈節南山什小宛篇鸒小辨篇鶉谷風什四月篇雕也鳶四月篇鴛鴦甫田什鴛鴦篇鷮車牽篇鶖魚藻什白華篇鷹大雅文王什大明篇鷖生民什鳬鷖篇鳯凰卷阿篇釋鱗介魴周南汝墳篇魚汝墳篇鱣衛碩人篇鮪碩人篇鰥齊敝笱篇鱮敝笱篇龍秦小戎篇鯉陳衡門篇鱒豳九罭篇鱨小雅鹿鳴什魚麗篇鯊魚麗篇鱧魚麗篇鰋魚麗篇嘉魚南有嘉魚什嘉魚篇鱉六月篇虺鴻雁什斯干篇蛇斯干篇龜節南山什小旻篇貝巷伯篇鼉大雅文王什靈臺篇台生民什行葦篇濳周頌臣工什潛篇鰷潛篇釋蟲螽斯周南螽斯篇草蟲召南草蟲篇阜螽草蟲篇鼠行露篇蝤蠐衛淇奧篇螓碩人篇蛾碩人篇蒼蠅齊蒼蠅篇蟲蒼蠅篇碩鼠魏碩鼠篇蟋蟀唐蟋蟀篇盬鴇羽篇蜉蝣曹蜉蝣篇𧖟豳七月篇蜩七月篇莎雞七月篇蠋東山篇伊威東山篇蠨蛸東山篇熠耀東山篇蝪小雅節南山什正月篇螟蛉小宛篇蜾裸小宛篇蜮何人斯篇螟甫田什大田篇螣大田篇蟊大田篇賊大田篇青蠅青蠅篇蠆魚藻什都人士篇蜂周頌閔豫小子什小毖篇釋木灌木周南葛覃篇樛木樛木篇桃桃夭篇華桃夭篇喬木漢廣篇薪漢廣篇楚漢廣篇條枚汝墳篇甘棠召南甘棠篇梅摽有梅篇朴􅈪野有死麕篇唐棣何彼穠矣篇李何彼穠矣篇柏邶柏舟篇棘凱風篇榛簡兮篇栗鄘定之方中篇椅定之方中篇桐定之方中篇梓定之方中篇漆定之方中篇桑定之方中篇椹衛氓篇檜竹竿篇松竹竿篇木瓜木瓜篇木桃木李木瓜篇蒲王揚之水篇蒲栁杞鄭將仲子篇杞柳也檀將仲子篇舜有女同車篇扶蘇山有扶蘇篇蘀䕪兮篇柳齊東方未明篇棘魏園有桃篇詳見邶風棘樞唐山有樞篇榆山有樞篇栲山有樞篇杻山有樞篇椒椒聊篇杜杖杜篇詳見召南甘棠栩鴇羽篇楊秦車鄰篇條終南篇梅終南篇柟也櫟晨風篇互見唐風栩駮晨風篇棣晨風篇互見召南唐棣檖晨風篇枌陳東門之枌篇女桑豳七月篇鬱七月篇薁七月篇棗七月篇樗七月篇桑土鴟梟篇杞小雅鹿鳴什四牡篇枸杞也常棣常棣篇鄂不常棣篇杞南有嘉魚什南山有臺篇狗骨也枸南山有臺篇枳枸也楰南山有臺篇榖鴻堆什鶴鳴篇蒸無羊篇壞節南山什小辨篇穫谷風什大東篇桋四月篇蔦甫田什頍辨篇女蘿頍棄篇附魚藻什角