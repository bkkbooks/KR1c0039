body:
  text: 六家詩名物疏提要上釋天露召南行露篇雷殷其靁篇星小星篇三小星篇心宿五小星篇桺宿參小星篇昴小星篇日邶柏舟篇月柏舟篇風緑衣篇雨燕燕篇終風終風篇㬥終風篇霾終風篇曀終風篇凱凱風篇谷風谷風篇天北門篇北風北風篇雪北風篇雲鄘君子偕老篇帝君子偕老篇定定之方中篇靈雨定之方中篇蝃蝀蝃蝀篇蒼天王黍離篇明星鄭女曰鷄鳴篇霜魏葛屨篇三星唐綢繆篇飄檜匪風篇霆小雅南有嘉魚什采芑篇伯吉日篇房星昊天節南山什節南山篇日食十月之交篇行十月之交篇月食十月之交篇電十月之交篇旻天雨無正篇箕巷伯篇頺谷風什谷風篇漢大東篇織女大東篇牽牛大東篇長庚大東篇畢大東篇斗大東篇上天小明篇同雲信南山篇霡霂信南山篇霰甫田什頍弁篇大風大雅蕩什桑柔篇帝商頌長發篇釋神游女周南漢廣篇神小雅鹿鳴什伐木篇鬼節南山什何人斯篇田祖甫田什甫田篇羣公先正大雅蕩什雲漢篇旱魃雲漢篇釋時序夙召南采蘩篇夜采蘩篇宵小星篇春野有死麕篇日邶終風篇旦匏有苦葉篇冬谷風篇朝鄘蝃蝀篇秋衛氓篇歳氓篇夕王君子于役篇月君子于役篇辰齊東方未明篇莫東方未明篇夏魏葛生篇昬陳東門之揚篇年曹鳴鳩篇晝豳七月篇陽小雅鹿鳴什采薇篇戊南有嘉魚什吉日篇庚吉日篇午吉日篇晨鴻㕍什庭燎篇似斯干篇正斯干篇晝也冥斯干篇夜也正月節南山什正月篇朔十月之交篇辛十月之交篇卯十月之交篇辰小弁篇暑谷風什四月篇寒小明篇除小明篇釋地周行周南卷耳篇逵兔罝篇野召南野有死麕篇土邶日月篇隰簡兮篇牧静女篇鄉鄘桑中篇田定之方中篇郊干旄篇都干旄篇㟁衛氓篇泮氓篇穴王大車篇里鄭将仲子篇巷叔于田篇墠東門之墠篇阪東門之墠篇域唐葛生篇原陳東門之枌篇墓墓門篇畆豳風七月篇微行七月篇場七月篇町畽東山篇垤東山篇牧小雅鹿鳴什出車篇新田南有嘉魚什采芑篇菑采芑篇中鄉采芑篇地鴻㕍什斯干篇鄰節南山什正月篇萊十月之交篇陳何人斯篇甸谷風什信南山篇疆理信南山篇場信南山篇圉大雅蕩什桑柔篇隧桑柔篇畬周頌臣工什臣工篇三十里噫嘻篇畛閔予小子什載芟篇坰魯頌坰篇釋國邑周周南南周南召召南齊何彼穠矣篇邶邶風國擊鼓篇漕撃鼔篇陳擊鼓篇宋擊鼓篇寒泉凱風篇浚凱風篇中路泥中附黎篇谷風衛泉水篇干泉水篇須泉水篇鄘鄘風邦君子偕老篇沬桑中篇桑中桑中篇上宫桑中篇楚定之方中篇堂定之方中篇許載馳篇邢衛碩人篇譚碩人篇頓丘氓篇復關氓篇王王風車攻篇東互見申王揚之水篇甫揚之水篇留丘中有麻篇鄭鄭風清清人篇彭河上消軸清人篇魯齊南山篇魯道南山篇魏魏風唐唐風沃唐揚之水篇鵠揚之水篇秦秦風邑小戎篇渭陽渭陽篇東門陳東門之枌篇東門池東門之池篇防防有鵲巢篇株林株林篇檜檜風曹曹風周京曺下泉篇郇下泉篇豳豳風四國破斧篇奄管蔡商周道小雅鹿鳴什四牡篇方出車篇焦穫南有嘉魚什六月篇鎬方六月篇涇陽六月篇太原六月篇荆采芑篇東車攻篇東都甫草車攻篇敖車攻篇宗周節南山什正月篇褒正月篇向十月之交篇王都雨無正篇暴何人斯篇艽野谷風什小明篇鎬魚藻什魚藻篇謝黍苗篇商大雅文王什文王篇殷文王篇摯大明篇京大明篇地周之小莘大明篇牧野大明篇虞芮緜篇二國皇矣篇夏商密皇矣篇阮徂共皇矣篇旅皇矣篇夏皇矣篇崇皇矣篇豐文王有聲邰生民什生民篇百泉溥原公劉篇隰原公劉篇郿蕩什崧高篇韓韓弈篇屠韓奕篇燕韓奕篇壑韓弈篇程常武篇徐常武篇魯山川魯頌閟宫篇附庸閟宮篇舒閟官篇大東閟宫篇常閟宫篇許閟宫篇九有商頌𤣥鳥篇畿𤣥鳥篇四海𤣥鳥篇有娀長發篇九圍長發篇韋長發篇顧長發篇昆吾長發篇夏長發篇楚殷武篇釋山崔嵬周南卷耳篇岡卷耳篇砠巻耳篇林兔罝篇山召南殷其靁篇石邶柏舟篇旄丘旄丘篇丘旄丘篇言泉水篇虛鄘定之方中篇景山定之方中篇京定之方中篇阿丘載馳篇阿衛考槃篇陸考槃篇峱齊還篇南山南山篇岵魏陟岵篇屺陟岵篇首陽唐采苓篇阪秦車鄰篇終南秦終南篇紀終南篇堂終南篇宛丘陳宛丘篇南山曹候人篇東山豳東山篇阜小雅鹿鳴什天保篇陵天保篇冢節南山什十月之交篇崒十月之交篇畆丘巷伯篇丘阿丘隅魚藻什綿蠻篇岐大雅文王什緜篇旱旱麓篇麓旱麓篇鮮原皇矣篇巘生民什公劉篇夕陽公劉篇朝陽卷阿篇崧蕩什崧髙篇嶽崧髙篇梁山韓弈篇墮周頌閔予小子什般篇泰山魯頌閟宫篇龜閟宫篇蒙閟宫篇鳬閟宫篇繹閟宫篇徂來閟宫篇新甫閟宫篇景商頌𤣥鳥篇釋水河周南關雎篇北方流水之通名洲關雎篇谷葛覃篇漢漢廣篇江漢廣篇方漢廣篇泭也汝汝墳篇墳汝墳篇沼召南采蘩篇沚采蘩篇澗采蘩篇濵采蘋篇行潦采蘋篇汜江有汜篇渚江有汜篇沱江有汜篇泉邶凱風篇氷匏有苦葉篇涇谷風篇渭谷風篇梁谷風篇魚梁泉水泉水篇衛竹竿篇泉源即此淇泉水篇泲泉水篇禰泉水篇肥泉泉水篇河新臺篇大河也水新臺篇奥衛淇奥篇厲有狐篇滸王葛藟篇涘葛藟篇漘葛藟篇藪鄭大叔于田篇溱褰裳篇洧褰裳篇汶齊載驅篇汾魏汾沮洳篇沮洳汾沮洳篇干伐檀篇漣淪伐檀篇湄秦蒹葭篇坻蒹葭篇池陳東門之池篇防防有鵲巢篇澤澤陂篇陂澤陂篇下泉曹下泉篇川小雅鹿鳴什天保篇漆沮南有嘉魚什吉日篇海鴻雁什沔水篇臯鶴鳴篇淵鶴鳴篇汙節南山什十月之交篇汍泉谷風什大東篇淮鼓鐘篇三洲鼓鐘篇梁甫田什甫田篇洛瞻彼洛矣篇檻泉魚藻什采菽篇滮池白華篇波漸漸之石篇洽大雅文王什大明篇陽大明篇淢文王