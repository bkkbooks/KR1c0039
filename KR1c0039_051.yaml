body:
  text: 六家詩名物疏卷四十八明馮復京撰大雅生民之什一生民篇禋祀箋云禋祀上帝於郊禖月令仲春𤣥鳥至至之日以太牢祠於高禖天子親往后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢于髙禖之前蔡邕云高猶尊也禖者所以祈子孫之祀鄭𤣥云高辛氏之世𤣥鳥遺卵娀簡吞之而生契後王以為媒官嘉祥而立其祠變媒言禖神之也孔穎達云契已前祭天南郊以先媒配蓋伏羲也至高辛簡狄之異後王以是為媒官之嘉祥即以高辛之君立為禖神以配天五經要義云𤣥鳥感陽而至集人棟宇有孶乳之祥故重其至日因以用事王居明堂禮云帶以弓韣禮之禖下其子必得天材帝易緯云帝者天號也徳配天地不私公位稱之曰帝書大傳云天立五帝以為相四時施生法度明察春夏慶賞秋冬刑罰帝者任徳設刑以則象之言其能行天道舉錯審諦也白虎通云帝者諦也象可承也敏釋詁云敏拇也孫炎曰拇迹大指處后稷尚書曰棄黎民阻飢汝后稷播時百穀疏云稷是五穀之長立官主此稷事后訓君也單名為稷尊而君之稱為后稷周語云稷為大官王籍后稷監之徧戒百姓紀農協功曰隂陽分布震雷出滯土不備墾辟在司冦乃命其旅曰徇農師一之農正再之后稷三之達説文云羍小羊也薛琮云羊子初生達小名羔穎説文云穎禾末也孔氏云穎是禾穟之挺小爾雅云禾穗謂之穎截穎謂之銍邰毛氏曰姜嫄之國左傳云魏駘芮岐畢吾西土也注云后稷受此五國駘在武功縣治斄城一統志陜西西安府乾州武功縣古邰國后稷所封漦城在武功縣西南二十里古有漦亭乆廢秬釋草云秬黑黍李巡曰黑黍一名秬黍雅翼云古者薦籩有白黑形鹽白為􅘮秬黑即秬也至藏氷則用秬黍以享司寒蓋倣其方之色亦以為酒謂之秬鬯瑞應圖云后稷播植天降秬秠孔叢子魏王問子順曰昔上天神異后稷為之下嘉穀周遂以之興秠釋草云秠一稃二米李巡曰黑黍之中一稃有二米者别名為秠郭璞曰漢和帝時任城生黑黍或三四實實二米得黍三斛八斗是鄭鬯人注云秬如黒黍一秠二米答張逸云秠即皮其桴亦皮也本草圖經云秬黍之中一稃二米者得天地中和之氣乃生米粒皆匀無大小得此然後可定鐘律今上黨或值豐嵗往往得之但稀濶不以充貢雅翼云鄭氏釋鬯人以秠之狀雜于秬郭氏解釋草以秬之色雜于秠郭又引漢任城生黑黍詩歌后稷降播乃民事之常如必待任城所生而後降之則没世不可待矣按今百穀一稃二米者惟麥為然説文解秠亦云一稃二米而解來字云周所受瑞麥來麰一來二縫然則秠正來麰爾但生民臣工所稱不同來麰又為釐麰古者來釐丕三字相通穈詳見鴇羽粱釋草云虋赤苗郭云今之赤粱粟芑詳見鴇羽粱釋草云芑白苗郭云今之白粱粟與虋皆好穀肇祀鄭云肇郊之神位商頌肇域箋云肇當作兆兆域正疆界周官小宗伯兆五帝于四郊注云兆為壇之營域黄帝亦於南郊説文作垗云畔也惟朱傳云惟齋戒具修也周官注云具所當共修掃除糞洒羝爾雅云羊牡羒注謂吳羊白羝易大壯九三羝羊觸藩羸其角上六羝羊觸藩不能退不能遂无攸利艱則吉廣雅云呉羊牡一嵗曰牡䍮三嵗曰羝雅翼云羝是牡羊總名而羒乃呉羊之羝者蓋羝性好抵觸齊民要術畜牧之法大率十羊二羝以為羝少則不孕多則敗羣尤取其無角者恐其抵觸以傷胎也蓋羝為白羝羭為黑羝軷周官大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之及祭酌僕僕左執轡右祭兩軹祭軓乃飲注云行山曰軷犯之者封土為山象以菩芻棘柏為神主既祭之以車轢之而去喻無險難戎僕犯軷如玉路之儀又犬人凡祭祀共犬牲用牷物伏瘞亦如之注云伏謂伏犬以王車轢之聘禮記出祖釋軷祭酒脯乃飲酒於其側月令孟冬其祀行祭先腎注云行在廟門外之西為軷壤厚二寸廣五尺輪四尺祭法王立七祀曰國行諸侯立五祀曰國行大夫立三祀曰行適士立二祀曰行崔靈恩云宫内之軷祭古之行神城外之軷祭山川與道路之神孔氏曰軷本山行之名以祭道路之神為之在國門外卿大夫用酒脯天子以犬諸侯以羊禮畢乗車轢之月令冬祀行注依中霤之禮有主有尸用特牲是天子諸侯常祀與軷異也軷又名祖聘禮及詩云出祖是也又名道曾子問云道而出是也風俗通云按禮傳共工之子曰修好逺遊舟車所至足蹟所達靡不窮覽故祀以為祖神祖者徂也顏師古云祖者送行之祭昔黄帝之子纍祖好逺遊而死于道故後人祭之以行神登釋器云瓦豆謂之豋疏云對文則木曰豆瓦曰登散則皆名豆冬官旊人掌為瓦器而云豆中縣是瓦亦名豆也公食大夫禮云大羮湆不和實于鐙公設之于醬西注大羮湆煑肉汁也大古之羮不和無鹽菜禮書云豋儀禮作鐙其實大羮食禮用之飲禮不用故公食大夫設于醬西鄉飲鄉射燕禮不設也士虞特牲有司徹皆設之少牢不言設者以特牲有司徹見之也行葦篇几釋名云几庋也所以庋物也周禮太宰大朝覲㑹同贊玉几司几筵掌五几凡大朝覲大饗射封國命諸侯王設左右玉几祀先王昨席亦如之諸侯祭祀右彫几昨席筵國賔左彤几甸役右漆几凡喪事右素几吉事變几凶事仍几顧命云牖間南向華玉仍几西序東向文貝仍几東序西向彫玉仍几西夾南向漆仍几禮記曰謀於長者必操几杖而從之又云獻几杖者拂之又云大夫七十而致仕若不得謝則必賜之以几杖又云仲秋養衰老授几杖又云父母舅姑坐御者舉几斂席又云父母枕几不傳左傳云几設而不倚爵盈而不飲禮之至也國語云倚几有訓誦之戒鄭𤣥聘禮注云孤彤几卿大夫漆几馬融云几長三尺阮諶云几長五尺髙廣二尺禮圖云几兩端赤中央黒禮書云席常設于賔未至之前几常授于行禮之際其將授也必拂於敵以下外拂于尊者内拂皆拂之三其授之也必拜送其受也必拜答執之或横見有司徹或中攝見聘禮授之或受其足昬禮所謂授校校几足也或受于手間有司徹尸授几或以几辟昬聘禮以几辟賓卑故也或不以几辟有司徹不云辟者尸尊也儀禮昏聘公食大夫皆有几冠禮醴賔鄉飲鄉射及燕賔無几皆輕重之别也喪或同時在殯則每敦異几及祭則同几生事鬼事之别也士喪禮綴足用燕几曲禮尸乗必以几婚禮婦乗以几不特所慿以安而已斝説文云斝玉爵也一曰斝受六升明堂位云爵夏后氏以琖殷以斝周以爵注云斝畫禾稼禮運云琖斝及尸君非禮也是謂僭君郊特牲云舉斝角詔妥尸周禮量人凡宰祭與鬱人受斝歴而皆飲之先鄭云殷以斝禮書云斝有耳琖斝先王之器也惟魯與二王後得用焉諸侯用之則僭矣故記曰琖斝及尸君非禮也博古圖云琖从戔故三足象戈斝戒喧故二口作喧爵之字通於雀洗爵奠斝詩緝云今考燕禮諸侯燕其臣以膳宰為主人主人獻賔賔卒爵賔洗爵酢主人主人卒爵主人獻公公卒爵公酌酢主人主人卒爵於是主人酌以酬賔賔遂奠而不舉醓醢互見伐柯篇邊豆爾雅云肉謂之醢有骨者謂之臡釋名云醢海也冥也封塗使密㝠乃成也醢多汁者曰醓醓瀋也宋魯人皆謂汁為瀋公食大夫禮云韭菹以東醓醢聘禮饔堂上八豆其南醓醢屈西夾六豆其東醓醢屈醯醢百罋少牢禮韭菹醓醢坐奠于筵前周禮醢人掌四豆之實朝事之豆其實韭菹醓醢深蒲醓醢餘見豆王舉則共醢六十罋以五齊七醢七菹三臡實之賔客之禮共醢五十罋凡事共醢鄭注云醓肉汁也作醢及臡者先膞乾其肉乃後莝之雜以粱麯及鹽漬以美酒塗置瓶中百日則成矣掌客上公饔餼醯醢百二十甕侯伯百甕子男八十罋禮記云恒豆之菹水草之和氣也其醢陸産之物也加豆陸産也其醢水物也注云此謂諸侯也與天子之豆有錯雜禮記外傳云醢有陸産有水物天地隂陽之氣所生四民月令云五月一日可作醢脾説文云土藏也徐曰脾禆也在胃下禆助胃氣主化物月令春祭先脾尚書歐陽説脾土也古尚書説脾木也臄傳云臄函也通俗文云口上曰臄口下曰函咢釋樂云徒擊鼓曰咢孫炎曰聲驚咢也樂書云咢無章曲非樂之正特歌之助而已敦弓荀子云天子雕弓諸侯彤弓大夫黑弓禮也何休公羊注云天子彫弓諸侯彤弓大夫嬰弓士盧弓孔氏云冬官弓人云天子之弓合九而成規又云往體寡來體多謂之王弧此敦弓即彼王弧也鍭爾雅云金鏃翦羽謂之鍭骨鏃不翦羽謂之志郭璞曰金鏃金錍箭也骨鏃金骨骲也方言云矢江淮之間謂之鍭周禮司弓矢鍭矢用諸近射田獵注云鍭之言候也可以司候射敵之近者及禽獸前尤重中深而不可逺也又矢人為矢鍭矢參分一在前二在後注云參訂之而平者前有鐵重禮書云翦羽尚疾不翦羽尚舒尚疾則以金鏃而必其入尚舒則以骨鏃而防其傷序賔朱傳云賢射多中也不侮敬也鄉射大射禮云釋獲者先數右獲二算為純一純以取實于左手十純則縮而委之每委異之有餘純則横于下一算為竒竒則又縮諸純下適左坐兼斂算實于左手一純以委十則異之其餘如右獲遂進取賢獲執以告右勝則曰右賢于左左勝則曰左賢于右以純數告有竒者亦曰竒若左右鈞則左右各執一算以告曰左右鈞還復位投壺曰卒投司射執算二算為純一純以取一算為竒遂以竒算告曰某賢於某若干純竒則曰竒鈞則曰左右鈞魯令弟子辭曰毋幠毋敖毋偝立毋踰言偝立踰言有常爵薛令弟子辭曰母幠毋敖毋偝立毋踰言若是者浮主增韻云主者賓之對也大斗説文曰斗勺也疏云大斗漢禮器制度注勺五升徑六寸長三尺是也此蓋從大器挹之以樽用此勺耳其在樽中不當用如此之長勺也儀禮加勺于尊皆南枋禮器云犧尊樿杓明堂位云灌尊夏后氏龍勺殷疏勺周蒲勺周官梓人云勺一升爵一升觚三升獻以爵而酬以觚一獻而三醻則一豆矣飲一豆酒中人之食也注云觚當為觶豆當為斗禮書云勺非斗也勺挹於尊彛而注諸爵瓚斗挹於大器而注諸尊彛台箋云台之言鮐也大老則背有鮐文釋詁云鮐背壽也舎人注云老人氣衰皮膚消瘠背若鮐魚呉都賦云王鮪鯸鮐劉逵注云鯸鮐狀如科斗大者長尺餘腹下白背上青黑有黄文性有毒雖小獺及大魚不敢餤之蒸煑肥美本艸云鯸鮧魚肝毒殺人縁腹無膽頭無顋故知害人䲅魚肝及子有大毒一名鶘夷魚以物觸之即嗔腹如氣毬亦名嗔魚腹白背有赤道日華子云又名吹肚魚按爾雅翼云䲅即今之河豚也段成式又作鮭又一名鯸鮐所謂黄耉台背或謂為鯸鮐魚又謂之鶘夷魚則與今之鰋魚相亂蓋鰋魚之鮧亦有題夷二音故也若然則本艸之鯸鮐魚䲅魚河㹠皆一物矣而分載三處又云䲅魚肝子有大毒河㹠無毒何也蓋縁北人不食河㹠故不能的指為何物耳廣志又云鮠魚一名河㹠陳藏器羅願亦云然本艸圖經獨以為秦之䲚魚又未知與河㹠為同為異呉中食河㹠以為常味惟忌肝入水沈者未聞毒皆殺人如本艸所言也河㹠皮有刺觸人手老人皮膚粗硬有似此皮故謂之台背非如台之文也但河㹠非西北所産未知詩人何以得入詠或者台别一魚背釋名云背倍也在後稱也明堂鍼灸云人五藏之系咸附於背既醉篇孝子以下闕孝子壼共二條六家詩名物疏卷四十八
