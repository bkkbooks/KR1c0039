body:
  text: 六家詩名物疏卷九明馮復京撰國風邶一邶譜云邶鄘衛者商紂畿內方千里之地其封域在禹貢兾州大行之東北踰衡漳東及兖州桑土之野武王伐紂以其京師封武庚三分其地置三監使管叔蔡叔霍叔尹而教之自紂城而北謂之邶南謂之鄘東謂之衛三監叛成王伐三監更于此建諸侯封康叔于衛使為之長後世稍并二國混而名之疏云三叔各監一國不知所監之國為誰周書作雒云俾康叔宇于殷俾中旄殳宇于東注東謂衛殷邶鄘康叔代霍叔中旄代管叔地里志云周既滅殷分其畿內為三國鄁以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷民謂之三監三監叛周公誅之盡以其地封康叔遷鄁鄘之民于雒邑補傳曰邶鄘衛皆以水得名邶水在太山之阜鄘水出宜蘇山衛水在霛壽即真定郡國志河內郡朝歌北有邶國一統志邶城在河南衛輝府城東北一説在懷慶府河內縣柏舟篇柏爾雅云柏椈疏柏一名椈埤雅云柏性堅緻有脂而香故古人破為暢臼用以搗鬱雜記所謂暢臼以椈者是也尚書云荆州厥貢杶幹栝柏尚書逸篇云大社惟松東社惟柏南社惟梓西社惟栗北社惟槐周禮兾州其利松柏荀子云柏經冬而不凋蒙霜而不變可謂得其真矣四民月令云七月收柏實漢武內傳云藥有松柏之膏服之可長生舟周易云利涉大川乘木舟虛又云刳木為舟剡木為楫舟楫之利以濟不通蓋取諸隨世本云古觀落葉因以為舟淮南子云古人見窽木浮而知為舟小爾雅云小船謂之艇艇之小者曰䒀船頭謂之舳尾謂之艫楫謂之橈釋名云舟言周流也船猶言循也循水而行也其上屋曰廬重屋曰飛廬又在其上曰雀室上下重版曰檻狹而長曰艨衝三百斛曰舠二百斛以下曰艇方言云舟自關而西謂之船自關而東或謂之舟或謂之航首謂之閣閭或謂之艗艏後曰舳吕氏春秋云虞姁作舟物理論云化狐作舟墨子云巧倕作舟山海經云番禺始作舟束晳發蒙記云伯益作舟世本又云共鼓貨狄作舟黃帝二臣也酒説文云酒就也所以就人性之善惡也一曰造也吉凶所起造也又曰醴酒一宿熟也醪汁滓酒也酎三重醇酒也醨薄酒也醹厚酒也釋名云酒酉也釀之米麯酉澤久而味美也世本云儀狄始作酒醪變五味少康作秫酒周禮酒正以式法授酒材五齊一曰泛齊成而有滓二曰醴齊始成體三曰盎齊蔥白色四曰緹齊成而紅五曰沈齊造清三酒一曰事酒酌有事者二曰昔酒久白三曰清酒四飲一曰清醴之泲者二曰醫以酏為醴酏粥也三曰漿四曰酏共王之四飲三酒之饌及后世子之飲與其酒凡祭祀以法共五齊三酒以實八尊共賔客之禮酒共后致飲于賔客之禮醫酏糟凡王之燕飲酒共其計凡饗士庶子耆老孤子皆共其酒酒人掌為五齊三酒漿人掌共王之六飲水漿醴涼寒粥醫酏司尊彝云凡六尊之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌注云凡酒謂三酒也四者灌用鬱齊朝用醴齊饋用盎齊諸臣自酢用凡酒月令云仲冬之月乃命大酋秫稻必齊麴蘖必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之母有差貸注湛漬而滌之也熾蒸炊也曲禮曰祭宗廟酒曰清酌禮運云玄酒在室醴盞在戶粢醍在堂澄酒在下郊特牲云酒醴之美玄酒明水之尚貴五味之本也縮酌用茅明酌也盞酒涗于清汁獻涗于盞酒射義云酒者所以養老也所以養病也玉藻云君子之飲酒也受一爵而色灑如也二爵而言言斯禮已三爵而油油以退春秋緯云凡黍為酒陽據隂乃能動故以麥釀黍為酒注麥隂也先漬麴黍後入故曰陽相感皆據隂也相得而沸是其動也尚書酒誥曰文王告教小子有正有事無彝酒越庶國飲惟祀德將無醉鑒廣雅云鑒謂之鏡周禮司烜氏以鑒取明水于月玄中記云尹壽作鏡武王鏡銘云見爾前必顧爾後韓子曰古之人目短于自見故以鏡觀面智短于自知故以道正已鏡無見疵之罪道無明過之惡文子云鏡不設形故能有形淮南子云明鏡之始型矇然未見形容也及拭之以玄錫磨之以白氊則鬚睂鬢毛可得而察博古圖云黃帝液金以作神物為鑒凡十有五取乾坤五五之數兄釋親云男子先生為兄晜兄也廣雅云兄況也況于父弟釋親云男子後生為弟廣雅云弟悌也言順于兄釋名云弟第也相次第而生也石釋名云山體曰石石硌硌也堅捍硌也山多大石曰礐山多小石曰磝春秋説題辭云周易艮為山為小石石隂中之陽陽中之隂隂精補陽故曰含石石之為言託也託立法也博物志云地以石為之骨物理論云土精為石石氣之核也氣之生石猶人筋絡之生爪牙也席説文云席薦也釋名云薦所以自薦藉也席釋也可卷可釋也韓子曰夏禹為茵蔣席周禮云玉府掌王之袵席司几筵掌五席之名物凡大朝覲大饗射封國命諸侯設莞筵紛純加繅席畫純加次席黼純祀先王酢席亦如之諸侯祭祀席蒲筵繢純加莞席紛純酢席莞筵紛純加繅席畫純筵國賔于牖前亦如之甸役則設熊席凡喪事設葦席鄭注五席莞藻次蒲熊也紛如綬有文而狹者繅席削蒲蒻展之加以五采次席桃枝席有次列成文莞小蒲席公食大夫禮蒲筵常緇布純加萑席尋玄帛純上大夫蒲筵加萑席其純皆如下大夫純鄉飲酒鄉射禮蒲筵緇布純燕禮司宫筵賔于戶西東上無加席小臣設公席于阼階上西鄉設加席大射小臣設公席于阼階上西鄉司宫設賔席于戶西南面有加席聘禮賔請覿宰夫徹几改筵士虞葦席曲禮云羣居五人則長者必異席奉席如橋衡請席何鄉請袵何趾席南鄉北鄉以西方為上東鄉西鄉以南方為上若非飲食之客則布席席間函丈禮器云禮有以多為貴者天子之席五重諸侯三重大夫再重有以少為貴者鬼神之祭單席郊特牲云大饗君三重席而酢焉三獻之介君專席而酢焉莞簟之安而蒲越藁鞂之尚明之也玉藻云登席不由前為躐席左傳云大路越席昭其儉也按鄭氏云鋪陳曰筵籍之曰席則在下者筵加在上者席散文亦得通言也司几筵五席外有葦席喪事所設也有柏席藏中所用也有越席郊社所設也有蒯席出杅所履也尚書顧命篾席黼純即次席黼純也底席即繅席而綴純為異豐席即莞席而畫純為異筍席玄紛純又别是一席鄭玄云新鬼神之事不用生時之席故也公食大夫大射賓有加席燕禮之賔無加席蓋燕私禮臣屈也大夫鄉飲士鄉射則蒲筵緇布純而已三禮圖又云士蒲筵無純士卑故也若天子卧席亦止再重詩下莞上簟是也士喪禮者士禮也云下莞上簟袵如初則天子以下皆同日禮統云日者實也形體光實人君之象易曰日月麗乎天又云離為日又云日中則昃月盈則食天地盈虛與時消息周禮馮相氏冬夏致日春秋致月禮記郊之祭大報天而主日配以月又云王宫祭日也夜明祭月也又云祭日于壇祭月于坎以别幽明以制上下祭日于東祭月于西以别外內以端其位易傳云日者衆陽之宗內明玄黃五色無主以象人君精精似青翼翼似黑玄玄似赤縞縞似白煌煌似黃光照無主不可以一色名也春秋內事云日者陽德之母元命包云日尊故曰滿滿故仁仁故明明故精在外注云滿者常盛無虧也又云陽數起于一成于三故日中有三足烏者陽精也書考霛曜云日光照四萬六千里地説書云日照四十五萬里周髀云日光外照徑八十一萬里白虎通云日行遲月行疾者何君舒臣勞也日月所以懸著何助天行化昭明下地也日月徑千里爾雅云孤竹北戶西王母日下謂之四荒距齊州以南戴日為丹穴東至日所出為太平西至日所入為太蒙廣雅云日名朱明一名曜霛一名東君一名大明亦名陽烏淮南子云日出于陽谷浴于咸池拂于扶桑是謂晨明登于扶桑爰始將行是謂朏明將明也至于曲阿是謂旦明至于曽泉是謂蚤食至于桑野是謂晏食至于衡陽是謂隅中至于昆吾是謂正中至于鳥次西南方山名是謂小還至于悲谷是謂餔時至于女紀是謂大還至于淵虞地名是謂高舂高舂時加戍至于連石是謂下舂至于悲泉爰止其女爰息其馬是謂懸車至于虞淵是謂黃昏至于蒙谷是謂定昏日入于虞淵之汜曙于蒙谷之浦行九州七舍有五億萬七千三百九里又云積陽之熱氣生火火氣之精者為日前漢書云陰陽往來馴積而變日南至其行最急急而漸損以至春分及中而後遲逮日北至其行最舒舒而漸益以至秋分又及中而益急纂要云日光曰景日影曰晷日氣曰晛初出為旭日昕曰晞日溫曰煦日在午曰亭午在未曰眣日晚曰旰日將落曰薄莫日西落光反照于東謂之反景在上曰反景在下曰倒景乙巳占云日者光明外發魄體內全匿精揚輝圓而常滿此人君之體也晝夜有節循度有常春生夏養秋收冬藏人君之政也星月稟其光辰宿宣其氣生霛仰其照葵藿慕其恩此人君之德也月釋名云月闕也言滿則復闕也朏月未成明也魄月始生魄然也承大月月生二日謂之魄承小月月生三日謂之朏朔蘇也月死復蘇生也晦灰也火死為灰月光盡似之也弦其形一旁曲一旁直若張弓弦也望日月遙相望也河圖帝覽嬉云月者金之精也援神契孔子曰日者天之明月者地之理月上屬為天使婦從夫放月紀乾鑿度云月三日成魄八日成光蟾蜍體就穴鼻始明穴決也決鼻兔禮斗威儀云政太平則月圓而多輝政升平則月清而明呂氏春秋云月羣陰之本月望則蚌蛤實羣陰盈月晦則蚌蛤虛羣陰揫夫月形于天而羣陰化于淵淮南子云月積陰之寒氣大者為水水氣之精者為月廣雅云夜光謂之月月御謂之望舒方言云日運為纒月運為逡漢書云月分則同道至則相過晦而見西方為之朓朔而見東方謂之朒亦謂之側匿朓行疾貌朒縮也側匿猶縮懦靈憲云日譬猶火月譬猶水火則外光水則含影故曰光生于日之所照魄生于日之所蔽當日則光盈就日則光盡徐整長厯云月徑千里周圍三千里下于地七千里地説書云月照四十五萬里隋書云月者陰之精也其形圓其質清日光照之則見其明日光所不照則謂之魄故月望之日日月相望人居其間盡覩其明故形圓也二弦之日日照其側人觀其旁故半明半魄也晦朔之日日照其表人在其裏故不見也乙巳占云盈極必缺示其不可久盈也陰道臣道妻道理當恆缺也埤雅云朔而月出西方夕見至望然後出于東方夜見日月之盛皆在東方緑衣篇緑釋名云緑瀏也荆泉之水于上視之瀏然緑色此似之也論語疏皇氏云青是東方正緑是東方間東為木木色青木刻土土色黃並以所刻為間故緑色青黃也陳祥道云甲巳合而為緑按緑字鄭改作褖是王后六服之最下者御于王之服亦以燕居男子之褖衣黑則是亦黑也內命婦之服三夫人闕狄以下九嬪鞠衣世婦展衣女御褖衣黃考工記云天謂之玄地謂之黃釋名云黃晃也猶晃晃象日光色也裏周禮內司服掌王后之六服素紗鄭云素紗者今之白縳也六服皆袌制以白縳為裏使之張顯今世有沙縠者名出于此裳玉藻云衣正色裳間色郊特牲云三王共皮辨素積白虎通云所以名為裳何裳者鄣也自鄣閉也爾雅云裳削幅謂之襆郭云削殺其幅深衣之裳禮書云深衣之裳十有二幅短母見膚長無被土凡裳前三幅後四幅明衣裳不辟喪裳三袧則吉裳不特三袧而已明衣裳及觳則凡裳不特及觳而已明衣有前後裳則凡裳前三後四以象陰陽可知明衣裳縓綼緆緇純士婚禮爵辨纁裳緇絁曲禮素衣素裳素冠徹緣則凡裳有緣可知冕服玄衣纁裳皮辨服素衣素裳諸侯朝服緇衣素裳士爵辨服緇衣纁裳玄端服有玄裳黃裳雜裳深衣長衣裳之色同三翟三衣亦衣裳之色同孔安國書注曰蟻裳玄彤裳纁蓋裳以纁為主纁赤黃色以土無正位必託于火故也若夫玄裳素裳之類各象其事而服之鄭氏周禮注云婦人尚專一德無所兼連衣裳不異其色論語疏云玄端素裳諸侯朝服若上士以玄為裳中士以黃為裳下士以雜色為裳天子諸侯以朱為裳則皆謂之玄端不得名為朝服風釋名云風兖豫司橫口合唇言之風泛也其氣博泛而動物也青徐開唇推氣言之風放也氣放散也爾雅云春為發生夏為長嬴秋為收成冬為安寧四時和為通正謂之景風又云祭風曰磔易云撓萬物者莫疾乎風又云風以動之書云休徵曰聖時風若咎徵曰蒙恆風若周禮以槱燎祀飌師雨師保章氏以十有二風察天地之和命乖别之妖祥考異郵云八風殺生以節翺翺距冬至四十五日條風至條者達上也立春四十五日明庶風至明庶迎惠春分四十五日清明風至精芒挫收立夏之後薺麥之屬秀出已備故挫止其鋒芒收之使成實四十五日景風至景風強也強以成之夏至四十五日涼風至涼風者寒以閉也立秋四十五日閶闔風至閶闔者當寒天收也秋分四十五日不周風至不周者不交也陰陽未合化也立冬四十五日廣莫風至廣莫者精大滿也冬至風之為言萌也其立字蟲動于几中者為風元命包云隂陽怒為風動聲儀云風者禮樂之始萬物之首帝通紀云風者天地之使黃帝風經云調暢祥和天之喜氣也折揚奔厲天之怒氣也風者氣也得怒之氣則暴得喜之氣則和得金之氣則涼得木之氣則溫得火之氣則炎得水之氣則烈又云風不及地和緩而來謂之祥風翼氏風角云風者天之號令所以譴告人君者管子云風漂物者也風之所漂不避貴賤美惡莊子曰大塊噫氣其名為風子華子云風涵大玄之中精故能動化百物而行乎天上風隂也而其發為陽吕氏春秋云風師曰飛廉應劭云飛廉神禽能致風氣者也董子云太平之世風不鳴條開甲破萌而已燕燕篇燕爾雅云燕燕鳦廣雅云玄鳥朱鳥燕也埤雅云燕籥口布翅枝尾齊人呼鳦取其名自呼也一名玄鳥取其色之玄也一名鷾鴯莊周所謂鳥莫智于鷾鴯目之所宜處不給視雖落其實棄之而走其畏人也而襲諸人間此燕安之道也故其字又為燕安之燕雅翼云燕有兩種越燕小而多聲頷下紫巢于門楣上謂之紫燕亦謂之漢燕胡燕比越燕而大臆前白質黑章其聲亦大巢于大屋兩榱其長有容匹素者謂之蛇燕其尾岐分光澤故漢書燕燕尾涎涎曰美好之貌也以春分來而秋分去其來主為孚乳故古者以其至之日祀髙禖契因是而生至其去也多藏深山大空木中無毛羽或蟄藏坻岸中亦云入水為蜃蛤淮南子云燕之為蛤是也其來去皆避社又戊巳日不取土豈社主于土戊巳土位土克水燕之所避與廣州志云燕有三種于嵓崖者為土燕運斗樞云瑶光星散為燕左傳云少皥時鳥師而鳥名玄鳥氏司分者也夏小正云二月來降燕乃睇降者下也睇者眄也眄者視可為室也九月陟玄鳥蟄先言陟後言蟄陟而後蟄也月令云仲春玄鳥至仲秋玄鳥歸博物志云燕戊巳日不􅋦泥塗巢此非才智自然得之玄中記云千嵗之燕戶北向禽經云鴛鴦玄鳥愛其類又云烏向啼背棲燕背飛向宿雨釋名云雨水從雲下也雨羽也如鳥羽動則散也爾雅云暴雨謂之涷小雨謂之霡霂久雨謂之淫淫謂之霖濟謂之霽書云休徵曰肅時雨若咎徵曰狂恆雨若易飛候云太平之時五日一風十日一雨嵗凡三十六雨此休徵時若之應春秋説題詞云一嵗三十六雨天地之氣宣十日小雨應天文也十五日大雨以斗運也濳潭巴云陽致于隂故為雨禮統云雨者輔時生養均遍故謂之雨帝通紀云雨者天地之施也曾子云天地之氣和為雨范子計然云風為天氣雨為地氣風順時而行雨應風而下命曰天氣下地氣上隂陽交通萬物成矣董子云太平之時雨不破塊津莖潤葉而已廣雅云雨師謂之屏翳風俗通云雨師為玄冥身釋名云身伸也可屈伸也君説文云君尊也從尹從口以發號徐曰君者尹也正也長民之通稱晉悼公曰臣以求君以出令也于文口尹為君左傳云賞慶刑威曰君白虎通云君者羣也羣下之歸心也日月篇土説文云土地之吐生萬物者也二象地之下地之中吐物出形也聖證論孔朝云能吐生百穀謂之土白虎通云土所以王四季何木非土不生火非土不榮金非土不成水非土不髙扶微助衰歷成其道故五行更生亦曰土書禹貢冀州土白壤兖州土黑墳青州土白墳徐州土赤埴墳揚州荆州土塗泥豫州土惟壤下土墳壚梁州土青黎雍州土黃壤周禮大司徒以土會之法辨五地之物生一曰山林動物宜毛植物宜皂其民毛而方二曰川澤動物宜鱗植物宜膏其民黑而津三曰丘陵動物宜羽植物宜核其民專而長四曰墳衍動物宜介植物宜莢其民晳而瘠五曰原隰動物宜裸植物宜叢其民豐肉而庳載師掌任土之法土人掌土地之政草人掌土化之法以物地河圖括地象云天有九部八紀地有九州八柱東南神州曰晨土正南卭州曰深土西南戎州曰滔土正西弇州曰开土正中冀州曰白土西南柱州曰肥土北方玄州曰成土東北咸州曰隱土正東揚州曰信土崑崙山為柱氣上通天崑崙者地之中也孝經鄭注云分别五土視其高下若高田宜黍稷下田宜稻麥丘陵阪險宜種棗栗霛憲云至厚莫如地至空莫如土萬機論云土地者百姓之所蹈也殊無兩形之致而談者強謂之異體地云者都大之名土者細屬之號國寧有有地無土有土無地之處乎六家詩名物疏卷九
