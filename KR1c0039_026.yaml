body:
  text: 六家詩名物疏卷二十三明馮復京撰國風魏魏譜云魏者舜禹所都之地在禹貢冀州雷首之北析城之西周以封同姓其封域南枕河曲北涉汾水與秦晉鄰晉獻公滅之以其地賜大夫畢萬後晉有魏氏詩含神霧云魏地處季冬之位土地平夷唐地處孟冬之位得常山泰嶽之風音中羽其地墝埆故其民險而好畜地里志云魏國亦姬姓也在晉之南河曲故詩曰彼汾一曲置諸河之側水經注故魏國城南西並去大河可二十餘里北去首山十餘里處河山之間土地迫隘故魏風著十畝之詩也一統志山西平陽府解州平陸縣北五十里有魏侯城即古魏國漢於此置河北縣屬河東郡葛屨篇霜釋名云霜喪也其氣慘毒物皆喪也易曰履霜堅氷隂始凝也馴致其道至堅氷也月令云季冬之月霜始降則百工休大戴禮云隂陽之氣各靜其所則靜矣陽氣勝則散為雨露隂氣勝則凝為霜雪春秋考異郵云霜者隂精冬令也四時代謝以霜收殺霜之為言亡也物以終也感精符云霜殺伐之表秋季霜始降鷹隼擊王者順天行誅以成肅殺之威若政令苛則夏下霜誅伐不行則冬霜不殺草援神契云霜以挫物五經通義云寒氣凝以為霜從地升也國語云駟見而隕霜隕霜而冬裘具賈逵曰駟房星也淮南子云秋三月青女乃出以降霜雪髙誘曰青女天神主霜雪京房易傳曰誅不原情其霜附木不下地不教而誅其霜反在草上要朱傳云要裳要士喪禮云襚者左執領右執要玉藻云縫齊倍要襋說文云衣領也鄭注禮記云古者方領如今小兒衣領汾沮洳篇汾地里志汾水出太原郡汾陽縣北山西南至汾隂入河山海經曰管涔之山其上無草木而多玉汾水出焉水經云汾水出太原汾陽縣北管涔山一統志汾河源出山西太原府靜樂縣管涔山經太原清源交城文水祁縣至平遙介休南入平陽府靈石縣界經趙城洪洞臨汾南歷襄陵太平絳州稷山河津滎河入於黃河淮南子云汾水濛濁而宜麻沮洳朱傳云水浸處下濕之地山海經沮洳之山郭氏注引詩彼汾沮洳莫陸疏云莫莖大如箸赤節節一葉似柳葉厚而長有毛刺今人繅以取繭緒其味酢而滑始生可以為羹又可生食五方通謂之酸迷冀州人謂之乾絳河汾之間謂之莫埤雅云子如楮實而紅冀州人謂之乾絳蓋以此也今吳越呼為茂子公路公行疏云公路與公行一也以其主君路車謂之公路主兵車之行列謂之公行左傳云初驪姬之亂詛無畜羣公子自是晉無公族及成公即位乃宦卿之適子而為之田以為公族又宦其餘子亦為餘子其庶子為公行趙盾請以括為公族冬趙盾為旄車之族杜元凱云旄車公行之官疏云周禮有諸子掌國子之倅事與公族同巾車掌王五路事與公行同藚爾雅藚牛脣郭注毛詩傳曰水蕮也如續斷寸寸有節拔之可復陸疏云今澤蕮也其葉如車前草大其味亦相似徐州廣陵人食之本草澤㵼一名水㵼及㵼芒芋鵠㵼生汝南池澤陶隱居云葉狹長叢生諸淺水中仙經服食斷穀皆用之亦云身輕能步行水上圖經云春生苖多在淺水中葉似牛舌獨莖而長秋開白花作叢似穀精草按釋草别云蕍蕮郭云今澤蕮邢云即本草澤㵼也陸以牛脣為澤蕮誤矣然本草經澤㵼一名水㵼而毛傳解藚為水舄故陸有此誤牛舌草即車前之異名澤㵼似車前故韓詩又以車前為澤㵼也公族箋云公族主君同姓昭穆左傳晉荀㑹欒黶韓無忌為公族大夫使訓卿之子弟恭儉孝弟國語欒伯請公族大夫公曰荀家惇惠荀禬文敏黶也果敢無忌鎮靜使兹四人者為之夫膏粱之性難正也故使惇惠者教之使文敏者道之使果敢者諗之使鎮靜者修之左傳疏公族之官掌教公之子弟卿之適子亦屬公族園有桃篇謡爾雅云徒吹謂之和徒歌謂之謡孫炎曰謡聲消搖也韓詩章句云有章曲曰歌無章曲曰謡毛傳云樂合曲曰歌徒歌曰謡册府元龜云春秋以來乃有婉孌總角之謡傳於閭巷皆成章協律棘埤雅云魏風園有棘棘酸棗也朱傳云棗之短者按傳棘棗也此指樲棘而言豳風八月剝棗乃是本草之大棗非此傳所云棗也樲棘釋已詳邶風陟岵篇岵爾雅云多草木岵釋名云岵怙也人所怙取以為事用也毛傳云山無草木曰岵屺爾雅云無草木峐與屺同釋名云屺圯也無所出生也毛傳云山有草木曰屺按爾雅毛公說岵屺正相反當是毛公誤耳朱子從毛非也豈有不信周孔子夏之說而信後儒者乎伐檀篇干傳云崖也斯干傳云澗也易云鴻漸于干注云干謂大水之旁故停水處韓詩考槃注云干墝角之處也又云地下而黃曰干按水經云河水東過河北縣南又東永樂澗水注之河北縣即故魏國此詩所以稱河干也漣淪爾雅云河水清且瀾猗大波為瀾小波為淪直波為徑李巡云分别水大小曲直之名郭璞曰瀾言渙瀾也淪言藴輪也徑言徑涏也邢昺云瀾漣雖異而義同毛傳云風行水成文曰漣直直波也淪小風水成文轉如輪也釋名云風吹水波成文曰瀾瀾連也波體之流相及連也水小波曰淪淪倫也小文相次有倫理也小直波曰涇涇徑也言如道徑也韓詩說云順流而風曰淪稼說文云禾之秀實為稼毛傳曰種之曰稼周禮大司徒辨十有二壤之物而知其種以教稼穡樹藝遂人以土宜教氓稼穡遂師巡稼穡遂大夫正嵗簡稼器修稼政縣正各掌其縣之政令徵比趨其稼事酇長嵗時簡器與有司數之里宰以嵗時合耦于鋤以治稼穡趨其耕耨司稼巡野觀稼以年之上下出斂法注云種穀曰稼如嫁女有所生穡說文云穀可收曰穡毛傳去斂之曰穡疏云以稼穡相對則先稼後穡故知種之曰稼斂之曰穡若散則相通大田云曾孫之稼非唯種之也湯誓云舍我穡事非唯斂之也左傳疏云穡愛也言愛惜而收斂之內則云飯黍稷稻粱白黍黃粱稰穛注云穀熟而穫之則曰稰生穫之曰穛禾說文云嘉穀也二月始生八月而熟得時之中故謂之禾禾木也木王而生金王而死廣雅云粢稻其穗謂之禾春秋說題辭云禾者銜滋液注銜滋液以生故以禾穀為名也孝經援神契云德之下地則嘉禾生周書云凡禾麥居東方黍居南方稻居中央粟居西方菽居北方董仲舒云聖人於五穀最重麥與禾泛勝之書云種禾無期因地為時三月榆莢雨時髙地强土可種禾七月疏云苗生既秀謂之禾種殖諸穀名為稼禾稼者苗幹之名黍稷重穋其餘稻秫苽粱之輩皆名為禾麻與菽麥則無禾稱吕氏春秋曰飯之美者𤣥山之禾按禾即粇糯二稻也春秋書大無麥禾說文云二月而生八月而熟皆指稻而言耳若廣言之自可該諸穀廛毛傳云一夫之居曰廛說文云一畝半一家之居周禮載師以廛里任國中之地鄭司農云廛市中空地未有肆城中空地未有宅者𤣥謂廛里者若今云邑里居矣廛民居之區域也里居也以廛里任國中而遂人職授民田夫一廛田百畝是廛里不謂民之邑居在都城者與遂人夫一廛田百畝鄭司農云廛居也揚子雲有田一廛謂百畝之居也𤣥謂廛城邑之居孟子所云五畝之宅樹之以桑麻者也韻㑹注云市物邸舍曰廛一曰民居區域之稱漢書揚雄傳有田一廛晉灼曰一百畝禮書云廛者國中之居廬者田中之居廬舍二畝半廛亦二畝半則五畝之宅合在野在邑言之考之於禮鄉師巡國及野以施惠鄉大夫辨國中之可任舍者鄉士掌國中之獄則六鄉之民莫不廛里於國中矣廛里所以定居而廬舍特其宿息之地而已按遂人云夫一廛田百畝謂夫受一廛者其田百畝先後二鄭之說本自相通毛氏云一夫之居曰廛箋不易之者蓋以此也先鄭及毛但不明著廛為城邑之居耳孔仲達正義似未達箋㫖惟先鄭載師注以城市空地為廛後鄭所不從楊用修獨以為然是亦孤證且引說文市物邸舍曰廛非許叔重之言也用修鹵莽大都如是獵箋云宵田曰獵爾雅云宵田為燎注管子云獠獵畢弋今江東亦呼獵為燎或曰即今夜獵載罏照也說文云獵放獵逐禽也貆爾雅云貈子貆疏貈似狐其子名貆詩義問云貉子曰貊貊形狀與貉異輻詩緝云輻車轑也考工記云輪輻三十以象日月也輻也者以為直指也望其輻欲其揱音宵小貌爾而纎也進而視之欲其肉稱也視其綆輪箄欲其蚤之正也入牙必正察其菑蚤不齵菑音厠輻入轂中者則輪雖敝不匡枉也凡輻量其鑿深以為輻廣故竑其輻廣以為之弱菑也則雖有重任轂不折參分其輻之長而殺其一則雖有深泥亦弗之溓也溓粘也參分其股圍近菑謂之股去一以為骹圍近牙謂之骹揉輻必齊揉以火槁之平沈必均浮以水無輕重直以指牙牙得則無槷而固又云車人為車輻長一柯有半其博三寸厚三之一柏車輻一柯禮書云輪崇六尺有六寸轂徑一寸三分寸牙圍尺一寸則輻長二尺有竒矣藪徑三寸九分寸之五而輻廣如之則輻圍九寸有竒矣三分股圍去一以為骹圍輻之入牙者謂之爪近牙謂之骹入轂謂之菑近菑謂之股菑亦謂之弱則股菑𢎞而骹爪殺矣老子云三十輻共一轂特傳云獸三嵗曰特先鄭周禮注云三嵗為特爾雅云豕生三豵二師一特按毛云獸三嵗曰特先鄭亦云當有所出然考爾雅有豕生一特之文則此特應謂豕耳上下章貆鶉皆專指一物不應此章乃泛言獸竊謂宜從爾雅輪釋名云輪綸也言彌綸也考工記云察車自輪始欲其朴屬而微至不朴屬無以為完久也不微至無以為戚速也輪已崇則人不能登也輪已庳則於馬終古登阤也故兵車之輪六尺有六寸田車之輪六尺有三寸乘車之輪六尺有六寸輪人為輪斬三材必以其時轂也者以為利轉也輻也者以為直指也牙也者以為固抱也凡為輪行澤者欲杼薄其踐地者行山者欲侔上下等規之以視其圜也萭之以視其匡也縣之以視其輻之直也水之以視其平沈之均也量其藪以黍以視其同也權之以視其輕重之侔也又云車人為車行澤者反輮行山者仄輮反輮則易仄輮則完莊子云斫輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心囷匠人注云囷圓倉釋名云囷綣也藏物繾綣束縛之也月令孟冬命有司修囷倉考工記云囷窖倉城逆墻六分說文云囷廩之圜者從禾在口中圜謂之囷方謂之京飱傳云孰食曰飱周禮掌客云上公飱五牢食四十簠十豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳侯伯飱四牢食三十有二簠八豆三十有二鉶二十有八壺三十有二鼎簋十有二腥二十有七皆陳子男飱三牢食二十有四簠六豆二十有四鉶十有八壺二十有四鼎簋十有二牲十有八皆陳凡介行人宰史皆有飱以其爵等為之禮注云飱客始致小禮也小曰飱大曰饔餼聘禮云宰夫朝服設飱飪一牢在西鼎九羞鼎三腥一牢在東鼎七堂上之饌八西夾六門外米禾皆二十車薪芻倍禾上介飪一牢在西鼎七羞鼎三堂上之饌六門外米禾皆十車薪芻倍禾衆介皆少牢箋云飱讀如魚飱之飱說文飱餔也從夕食字林云水澆飯也韻㑹注云人旦則食飯夕則食飱飱為飯别名釋名云飱散也投水於中解散也按鄭志答張逸云禮飱饔太多非可素故易傳然說文云水澆飯左傳僖負羇饋盤飱趙衰以壺飱從餒而不食未始非孰食也不知鄭何見定以孰食為牢禮之飱乎碩鼠篇碩鼠爾雅鼫鼠孫炎云五伎鼠郭璞云形大如鼠頭似兔尾有毛青黃色好在田中食粟豆關西呼為鼩鼠見廣雅說文云鼫五伎鼠也能飛不能上屋能緣不能窮木能遊不能度谷能穴不能掩身能走不能先人荀子云梧鼠五伎而窮詩義疏云碩鼠樊光謂即爾雅碩鼠也許慎云鼫鼠五伎鼠也今之河東有大鼠能人立交前兩腳於頸上跳舞善鳴食人禾苗人逐則走入樹空中亦有五技或謂之雀鼠其形大故序云大鼠也魏國今河北縣是也言其方物宜謂此鼠非鼫鼠也本草又謂螻蛄為石鼠亦五伎古今方土名蟲鳥物異名同故記也文子云聖人師拱鼠制禮録異記云拱鼠形如常鼠行田野中見人即拱手而立人近欲捕之即跳躍而走去秦川有之雅翼云詩稱相鼠即河東大鼠也按陸云碩鼠非鼫鼠而邢昺謂陸璣所說與郭氏爾雅注同今觀兩家之說未見其同也碩鼠能交前兩足於頸故或者以為拱鼠孫奕遂以相鼠有皮為相州所出之碩鼠然相雖去河東不逺而録異記云拱鼠出秦陸璣疏碩鼠亦不名為拱鼠未知然否崔豹古今注說螻蛄一名碩鼠其五技與鼫鼠同然螻蛄不食黍麥食黍麥者自是鼠屬耳朱傳云碩大也則但以為大鼠郊特牲云迎貓為其食田鼠也大戴禮云田鼠者鼸鼠也然則碩鼠得非鼸鼠之大者乎六家詩名物疏卷二十三
