body:
  text: 六家詩名物疏卷二十九明馮復京撰國風豳一豳釋文云豳者戎狄之地名夏道衰后稷之曾孫公劉自邰而出居焉其封域在雍州岐山之北原隰之野于漢屬右扶風郇邑韋昭云豳西近戎北近狄郡縣志古豳城在邠州三水縣西三十里公劉始都之處國名記云邠本谷名一統志陜西西安府邠州古西戎地公劉所居為豳國淳化縣在州城東二百里三水廢縣在縣西乾州永壽縣古邠國地邠州今有古公鄉七月篇上褐傳云褐毛布說文云編枲襪一曰粗衣左傳云旨酒一盛兮余與褐之父睨之注云褐寒賤之人耜說文云耜耒端木也耒手耕曲木也垂作耒耜以振民釋名云耜齒也似齒之斷物也易曰神農氏作斫木為耜揉木為耒耒耜之利萬民以濟蓋取諸益夏小正云正月農緯厥耒緯束也束其耒云爾月令云季冬命農計耦耕事修耒耜具田器孟春天子躬耕帝籍考工記匠人耜廣五寸二耜為耦車人為耒庛長尺有一寸中直者三尺有三寸上句者二尺有二寸自其庛緣其外以至于首以弦其內六尺有六寸與步相中也堅地欲直庛柔地欲勾庛直庛則利推勾庛則利發倨句磬折謂之中地疏云耜謂耒頭金庛耒下前曲接耜者也古法耒下惟一金不岐頭韓詩云三月之時可預取耒耜修繕之至于四月始可舉足而耕也古史考曰神農作耒耜世本曰鯀作耒耜國語曰周制有曰民無縣耜野無奧草吕氏春秋曰六尺之耜所以成畎其下八寸所以成畝羅中行云耜耒下耓也廣五寸耒耜上勾木也耜古以木為之易曰斫木為耜揉木為耒亦以金為之周禮注古者耜一金兩人併發之饁釋詁云饁饋也孫炎云饁野之饋也畝王制云方百里者為田九十億畝山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億畝古者以周尺八尺為步今以周尺六尺四寸為步古者百畝當今東田百四十六畝三十步古者百里當今百二十一里六十步四尺二寸二分司馬法云六尺為步步百為畝畝百為夫禮記疏云步百為畝是長一百步濶一步畝百為夫是一頃也長濶一百步夫三為屋是三頃也濶二百步長一百步屋三為井是九百畝也長濶一里程正叔云古者百畝止當今之四十一畝今之百畝當古之二百五十畝按畝即田之身也古之治田者雖有溝洫井田二法不同然田之形體大抵因地勢水勢而為之其在于東者謂之東田王制所云當今東田是也其在于南者謂之南畝詩屢云南畝鄭注遂人云以南畝圖之是也補傳大田解曰田事喜陽而惡陰東南向陽則茂盛西北傍陰則不實故信南山云南東其畝也朱子信南山傳云畝壟也書傳云終竟壟畝左傳注使壟畝東西行又云晉之伐齊循壟東行易是畝可以謂為壟也漢書陳勝輟耕之壟上師古曰田中之高處是正訓壟字朱子所云畝壟者只是今之田所謂若干畝非必其中之高處也長樂劉氏云遂東畝南遂南畝東正言順地勢及水所趨之事蓋于此方為水道則于彼方為田畝南東交互其勢宜然雖溝洫之法遂縱溝橫井田之法遂橫溝縱而其為畝之制則相倣也朱公遷者元儒之荒陋者也其為疏義有畝以防水之說今之學者遂為所惑不知古有遂溝洫澮川以通水之流大小淺深以次相注自不至于決溢有徑畛涂道路以通車徒之行而即在遂溝洫澮川之上初不聞田之畔更有所謂畝以防水也若然郤克欲使齊盡東其畝賓媚人責以無顧土宜何不云不顧水防乎防水之丘計必不廣使其盡南亦何礙于晉之戎車而必東其畝乎詩云南東其畝諸書稱東田南畝無所謂西畝北畝豈非范氏喜陽惡陰之說乎若用以防水則稱西畝北畝亦可矣所以防水者周禮正謂之防稻人以防止水是也左傳蒍掩町原防注防隄也隄防間地不得方正如井田别為小頃町稻人疏故以為楚之惡地有防瀦之法南東其畝乃溝洫井田之定制又何有于防乎匠人為防是梢溝之防非廣深四尺之溝有防也方氏注禮記引詩南東其畝而以廬之所向為言可見古人並未嘗以畝為防水之具矣若必因壟字而以為丘壠之壟則書云曷敢不終朕畝孔安國云何敢不順天終竟我壟畝亦可得耕耨于水防之上乎孫育駁箋云大夫銜命巡司何為就耕民公嫗壟畝之間飲食又可謂此饁彼南畝為餉在南邊水防之上者乎然范氏云田喜陽惡陰未為通論如黍宜燥稌宜濕正左傳所謂土宜而古人只云南東者乃人道貴陽賤陰之義耳非地道固然也陶潛云農人告豫以春及將有事于西疇則畝亦可云在西但晉人之言不應經義苟如公遷之說又將以西疇為西邊之防水者矣田畯釋言云畯農夫也孫炎曰農夫田官也郭璞曰今之嗇夫是也傳云田畯田大夫疏云此官選俊人主田謂之田畯典農之大夫謂之農夫以王者尤重農事知其爵為大夫也按鄭注周禮載師云六遂餘地自三百里外天子使大夫治之或于田農之時特命之主其事以周禮無田畯正職故直云田畯大夫春官籥章掌擊土鼓以樂田畯鄭司農云田畯古之先教田之官彼說祈年之祭知為祭先教者甫田箋云田畯司嗇今之嗇夫也疏云郊特牲曰蠟之祭也主先嗇而祭司嗇也注云先嗇若神農司嗇若后稷蠟者為田報祭故知祀此二人此言田畯乃是當時主稼之人故以司嗇言之與郊特牲名同實異微行傳云墻下徑也五畝之宅樹之以桑公子疏云諸侯之女稱公子左傳雩講於梁氏女公子觀之公羊傳羣公子之舍則以卑矣何休曰謂女公子也萑詳見衛風菼埤雅云萑即今之荻一名蒹蒹萑之未秀者也蠶爾雅云蟓桑繭雔由樗繭棘繭欒繭蚢蕭繭疏云此皆蠶類作繭者因所食葉而異其名也食桑葉作繭者名蟓即今蠶也周禮云內宰中春詔后帥內外命婦治蠶于北郊以為祭服馬質禁原蠶者注云原再也天文辰為馬蠶書蠶為龍精月直大火則浴其種是蠶與馬同氣物莫能兩大禁再蠶者為傷馬與禮記月令云季春天子乃薦鞠衣于先帝命野虞毋伐桑柘具曲植籧筐后妃齊戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事既登分繭稱絲受功以共郊廟之服孟夏蠶事畢后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服祭義云古者天子諸侯必有公桑蠶室近川而為之大昕之朝季春朔旦君皮辨素積卜三宫之夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾而食之歲既單矣世婦獻繭于夫人夫人副褘而受之及良日夫人繅三盆手遂布于三宫夫人世婦之吉者使繅春秋文耀鉤曰商弦絶蠶含絲考異郵曰蠶陽者火火惡水故食不飲桑者土之液木生火故蠶以三月葉類㑹精合相食荀子云身女好而頭馬首屢化而不壽善壯而拙老有父母而無牝牡冬伏而夏游食桑而吐絲前亂而後治夏生而惡暑喜濕而惡雨濕謂浴其種蛹以為母蛾以為父三俯三起事乃大已俯謂卧而不食夫是之謂蠶理淮南子云黃帝元妃西陵氏始蠶仲長子昌言云蠶寒而餓之則引日多溫而飽之則用日少此寒溫餓飽之為修短驗于物者也嵇叔夜云火蠶十八日寒蠶三十餘日吳録曰南陽郡一歲蠶八績林邑記曰九真郡蠶年八熟繭小輕薄絲弱綿細永嘉郡記曰永嘉有八輩蠶􅮤珍蠶三月績柘蠶四月初績􅮤蠶四月績愛珍五月績愛蠶六月末績寒珍七月末績四出蠶九月初績寒蠶十月績廣志曰有原蠶有冬蠶有野蠶有柞葉可以作綿埤雅太𤣥曰紅蠶緣于枯桑其繭不黃蓋二十七日蠶已老則紅紅蠶以繭自衣亦或謂之室易林曰飢蠶作室是也雅翼云蠶之狀喙呥呥類馬色斑斑似虎初拂謂之蚝以毛掃之蠶尚小不欲見露氣桑葉著懷中令暖然後切之比至再眠常須三箔虛上下二箔以隔土障塵飼必卷窗開幃飼訖還下蓋蠶昆蟲之類見明則食其旋生駒皆與馬同老食而不飲三十六日而化淮南曰二十二日而化亦有四眠者既老將績其口含絲獨成繭者謂之獨繭自二以上謂之同功繭獨繭絲細而有緒養蠶之室欲明而溫古者后妃享先蠶先蠶天駟也漢舊儀曰今蠶神曰苑窳婦人寓氏公主凡二神斨傳云斨方銎也疏云斨即斧也惟銎孔異耳釋名云斨戕也所伐皆戕毁也女桑傳云荑桑也釋木云女桑桋桑注今俗謂桑樹小而條長者為女桑樹鵙箋云伯勞鳴將寒之候也五月則鳴豳地晚寒鳥物之候從其氣焉爾雅云鵙伯勞也樊光曰春秋傳曰少皥氏以鳥名官伯趙氏司至伯趙鵙也以夏至來冬至去郭云似鶷􅗾而大又云鵲鵙醜其飛也翪疏云翪竦也不能翺翔逺飛但竦翅上下大戴禮云五月鵙則鳴鴂者百鷯也鳴者相命也時訓解云芒種之日螳螂生又五日鵙始鳴鵙不始鳴號令壅逼易通卦驗云搏勞性好單棲楚詞云恐題鴂之先鳴使百草為之不芳吕覽注云仲夏陰作於下陽發於上伯勞夏至後應陰而殺蛇磔之於棘而鳴於上惡鳥論云伯勞以五月鳴應陰氣之動陽氣為仁養陰為殺殘賊伯勞蓋賊害之鳥也其聲鵙鵙故以其音名也類從云鵙鳴在上蛇伏不動禽經注云形似鸜鵒但鸜鵒喙黃伯勞喙黑楊用修云性能擊摶鷹集于林則盤旋鳴聒俟鷹飛輒擊之蜀中名駕鵹五更輒鳴不止至曙乃息𤣥周禮云染人掌染絲帛凡染春㬥練夏纁𤣥秋染夏冬獻功注𤣥謂纁𤣥者謂始可染此色𤣥纁天地之色以為祭服考工記云天謂之𤣥三入為纁五入為緅七入為緇注凡𤣥色者在緅緇之間其六入者與毛氏云𤣥黑而有赤也按𤣥黃朱為公子裳者公子諸侯之子不必繼世為君有為大夫士者禮冕服𤣥衣纁裳𤣥端服有𤣥裳黃裳朱者深纁之色君大夫冕服之纁裳也𤣥裳者上士𤣥端服之裳也黃裳者中士𤣥端服之裳也玉藻曰衣正色裳間色然黃正色而為裳𤣥黑赤雜而為衣則玉藻所云大略言之耳孔氏疏云績麻為布民自衣之𤣥黃之色施于祭服朱則為公子裳蓋獨舉冕服之裳為說矣殊不知古者深衣何嘗不用麻而𤣥黃亦以為裳非獨施于祭服也葽傳云葽葽草也箋夏小正四月王萯秀葽其是乎物成自秀葽始說文云詩曰四月秀葽劉向說此味苦苦葽也按葽草毛公不云何物鄭疑為王萯蔡雍月令章句曰萯草名生于陵月令四月王瓜生鄭注云王瓜萆挈也今月令云王萯生夏小正云王萯秀未聞孰是吕覽孟夏王善生注云善或作瓜􅕕也淮南子孟夏王瓜生注云王瓜本草作茇葜然則鄭以王萯即王瓜而又以王瓜為茇葜也吕覽淮南高誘一家之說而一以為􅕕一以為茇葜考之本草王瓜一名土瓜生魯地平澤田野及人家垣墻間三月採陰乾圖經云葉似栝樓圓無叉缺有刺如毛五月結黃花花下結子如彈丸生青熟赤根似葛細而多糝均房間人呼為菟瓜爾雅曰蔩菟瓜郭璞云似土瓜而土瓜自謂之鉤藈姑蓋菟瓜别是一種也豫謂本草明言王瓜一名土瓜則二物小異實一種耳王萯又是一物蔡雍云生于陵本草云生田中葉青刺人有實七月採隂乾且夏小正云王萯秀月令云王瓜生定非一也若栝樓自是果裸之實菝葜自在草部中品之上陶隱居云鄭𤣥以王瓜為菝葜殊為謬矣曹氏則以為藥草之逺志據爾雅有云葽繞蕀蒬郭璞曰今逺志也似麻黃赤花葉鋭而黃其上謂之小草本草云逺志味苦一名棘菀一名葽繞一名細草四月採根葉陰乾圖經云根黃色形如蒿苗名小草似麻黃而青又如華豆葉亦有似大青而小者三月開花白色泗州出者花紅根葉俱大于他處商州者根黑色曹氏以葽繞之名偶涉于葽又味苦合于劉向之說故定為逺志嚴氏亦從之然不榮而實謂之秀逺志有花則不得云秀矣且本草但言四月採根葉不云採實也或曰黍稷有華亦可曰秀若然則秀是吐華葽繞花又以三月開不以四月曹氏所見未必果核若從鄭氏以為王萯則實以七月採以為王瓜則王瓜亦有花五月方開花下結子亦不得以四月秀也朱子闕而不說良亦有以唐山夫人歌云豐草葽注云葽盛貌或者詩泛言草有盛秀者乎蜩爾雅云蜩蜋蜩螳蜩蚻蜻蜻􅝺茅蜩蝒馬蜩霓寒蜩蜓蚞螇螰疏云蜩者目諸蜩也蜋蜩五采具者也螳蜩似蟬而小鳴聲清亮夏小正云螳蜩者蝘蕩篇云如蜩如螳是也蚻即螓也􅝺似蟬而小青色蝒蟬之最大者霓又名寒螀似蟬而小青赤色關東謂蟪蛄為蜓蚞或謂之螇螰也又云翥醜罅疏蟲類能飛翥者謂蟬屬皆剖坼母以為孔罅而生周禮以旁鳴者注蜩霓屬夏小正云五月螳蜩鳴螳蜩鳴者蝘也七月寒蟬鳴蟬也者蝭􅧽也本草蚱蟬生楊柳上五月採蒸乾之陶隱居云蚱即是啞蟬雌蟬也不能鳴者蟬類甚多莊子云蟪蛄不知春秋則是今四月五月小紫青色者而離騷云蟪蛄鳴兮啾啾歲莫兮不自聊此乃寒螀耳九月十月中鳴甚淒急又二月中便鳴者名䗿母似寒螀而小七月八月鳴者名蛁蟟色青今此云生楊柳樹上是詩云鳴蜩嘒嘒者形大而黑傴僂丈人掇此昔人噉之故禮有蜩范蟬有緌亦謂此此蜩五月便鳴俗云五月不鳴嬰兒多災蘇恭云蚱蟬即鳴蟬也易通卦驗云姤上九候蟬始鳴不鳴國多妖言蟬應期鳴古語之象今失節不鳴鳴則失時故多妖言援神契云蟬無力故不食周書曰夏至又五日蜩始鳴不鳴貴臣放逸立秋之日寒蜩鳴不鳴人臣不力爭淮南子云蛇不足而行魚無耳而聽蟬無口而鳴自然者也又云蟬飲而不食三十日而化論衡云蟬生于復育開背而出徐廣車服雜注云侍臣加貂蟬者取其清高飲露而不食陸雲寒蟬賦云頭上有緌則其文也含氣飲露則其清也黍稷不享則其廉也處不巢居則其儉也應候守常則其信也加以冠冕取其容也段柯古云蟬未脫時名復育相傳言蛣蜣所化韋翾嘗冬中掘樹根見復育附于朽處怪之村人言蟬固朽木所化也翾因剖視腹中猶實爛木按蜩之類多蜩與蟬其總號也其名隨方土所稱最多參錯此五月鳴蜩即蜋蜩螳蜩也夏小正傳曰蜋蜩者五采具螳蜩者蝘郭云螳蜩俗呼胡蟬江南謂之螳蛦是也舍人注爾雅曰蜋蜩螳蜩皆蟬也方語不同三輔以西為蜩梁宋以東謂蜩為蝘楚地謂之蟪蛄楚辭云蟪蛄鳴兮啾啾者也方言亦云蟬楚謂之蜩宋衛謂之螳蜩陳鄭謂之蜋蜩秦晉謂之蟬海岱謂之䗁舍人揚雄俱以螳蜩蜋蜩為一物大雅蕩篇云如蜩如螳不得為一也舍人所云蟪蛄者有二種莊子稱不知春秋者夏蟲小紫青色者也楚辭稱其鳴啾啾者爾雅所謂蜓蚞螇螰也方言云蛥蚗齊謂螇螰楚謂蟪蛄或謂蛉蛄秦謂蛥蚗自關而東謂蛁蟧或謂蝭蟧或謂蜓蚞廣雅云蟪蛄蟧蛁是也莊子音義及陶隱居以為蟪蛄即寒螀非也風土記云蟪蛄鳴于朝寒螀鳴于夕郭注爾雅霓寒蜩云寒螀也引月令寒蟬鳴方言云黑而赤者謂之霓􅣒謂之寒蜩寒蜩者瘖蜩也郭以月令云寒蜩鳴知寒蜩不瘖據以難子雲不知寒蟬即今啞蟬啞蟬初瘖得寒露冷風乃鳴方言原其始故謂之瘖蜩耳然陶貞白所云啞蟬自是雌蟬不能鳴者非此寒蜩也陸璣如蜩如螳疏云螳一名蛁蟟青徐人謂之螇螰其失與舍人同蝒馬蜩景純以為蜩中最大者本草圖經以此為詩之鳴蜩不必爾也馬蜩特蜋蜩螳蜩中之猶大者耳蚻蜻蜻即詩之所謂螓揚雄云雌蜻謂之匹者也􅝺茅蜩揚雄謂之麥蚻郭璞云江東呼茅􅝺關西呼麥􅝺蟬之小者也古今注蟬一名王女而諸類總謂之蟬為其變化而禪亦以舍卑穢趨高潔其禪足道也貉字林云貈似狐善睡其子名貆又云􅧯貍類貁謂之􅤘郭璞云貉雌者名今江東呼貉為􅧯􅤘淮南子曰蟻知為垤貛貉為曲穴虎豹有茂草隂以防雨景以蔽日此亦鳥獸之所以智也考工記云貉踰汶則死此地氣然也詩義問云狐之類貉貒貍也埤雅云俗云貛貉同穴而異處貛之出入以貉為導詩曰一之日于貂取彼狐狸為公子裘言往祭表貉因取狐狸之皮為裘故傳云于貉謂取狐狸皮周官祭表貉是也雅翼云貉善睡之獸畜而養之扣之即卧已而復寐亦善捕疏云禮無貉裘惟孔子狐貉以居明貉賤也按貉狐貍三獸名箋云摶貉自為裘狐狸以供尊者其辨甚明朱傳云貉狐貍也何混若此貍爾雅云貍子􅡐字林云貍伏獸似貙本草貍骨肉療諸疰心腹痛走無常處及鼠瘻惡瘡頭骨尤良圖經云貍類甚多似虎斑文者可用猫斑者不佳南方有一種香貍人以作鱠其氣甚香微有麝氣雍州已南又有風貍似兔而短多棲息高木候風吹過他木衍義云貍骨形類猫其文有二一如連錢一如虎文肉味與狐不相逺江南一種牛尾貍其尾如牛人多糟食未聞入藥埤雅云貍豸在里者里人所居也貍穴而薶焉故貍又通于薶字貍之伺物卑身而伏以候敖者似貙而小文彩異于貒貉大射以貍步張三侯鄭氏云貍善搏者也行則止而擬度其發必獲是以侯道取象焉狐善疑貉善擬不可以有為故古者以為燕居之裘齊東郭書衣貍製是也貍狐貒貉性一也其跡皆夙歹而不速雅翼云狐口鋭而尾大貍口方而身文黃黑彬彬蓋次于豹禮曰貍首之斑然又曰貍去正脊狐去首太𤣥經云辨人貍别其文萃也魏志管輅云雖有爪牙微而不彊雖有文章蔚而不明其名曰狸淮南子云貍頭似鼠以類推也異物志云靈狸一體自為夫婦故能媚人子思子曰謂狐為貍者非直不知貍也勿得狐復失貍者也徐廣封禪書注云狸一名不來六家詩名物疏卷二十九
