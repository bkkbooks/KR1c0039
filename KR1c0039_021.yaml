body:
  text: 六家詩名物疏卷十八明馮復京撰國風衛三河廣篇葦詳見召南葭埤雅云葦即今之蘆其管中籥刀説文作􅟊􅟊小船也字異音同釋名云三百斛曰􅟊􅟊貂也貂短也江南所名短而廣安不傾危者也伯兮篇伯傳云州伯疏謂州里之伯若牧下州伯則非衛人所得為內則云州史獻諸州伯州伯命藏諸州府彼州伯對閭史閭府亦謂州里之伯也周禮五黨為州州長各掌其州之教治政令之法殳釋名云殳殊也長丈二尺而無刃有所撞挃于車上使殊離也説文云殳以杖殊人也禮殳以積竹八觚長丈二尺建于兵車旅賁以先驅也周禮司戈盾祭祀授旅賁殳考工記云車六等之數殳長尋有四尺崇于人四尺謂之四等又云廬人為廬器毄兵同強舉圍欲細細則校凡為殳五分其長以其一為之被而圍之參分其圍去一以為晉圍五分其晉圍去一以為首圍注改勾言毄容殳無刃舉手所操校疾也被把中也圍之圜之也凡矜八觚晉讀如搢矜所捷也首殳上樽也司馬法云長兵以衛短兵以守太長則犯太短則不及太輕則閲閲易則亂太犯則不濟故初列即戟間焉次列殳矛間焉又云弓矢圍殳矛守戈戟助禮書云殳所操者二尺四寸圍其所操則非所操者有稜矣鄭氏謂矜八觚是也細而能􅌛則非竹不可許慎謂積竹為之是也詩云伯也執殳為王前驅又曰彼候人兮荷戈與祋祋亦殳也蓋殳雖建于車及王行則州伯執而前賔客往來則候人荷而趨膏讀詩記云膏所以膏首魯遣展喜以膏沐勞齊師則膏非專婦人用也沐讀詩記云沐蓋潘也左氏傳遺之潘沐杜預注云潘米汁可以沐頭內則云面垢燂潘請靧諼草説文云萱令人忘憂草也又作萱及萱本草云萱草一名鹿蔥花名宜男圖經云萱味甘而無毒主安五藏利心志令人好歡樂無憂輕身明目五月採花八月採根用今人多採其嫩苗及花跗作葅云利胸膈甚佳古今注云欲忘人之憂則贈以丹棘一名忘憂草博物志神農經曰中藥養性謂合歡蠲忿萱草忘憂風土記云宜男妊婦佩之必生男述異記云萱草一名紫萱吳中書生呼療愁花雅翼云此草又名鹿蔥晏元獻公謂鹿蔥花中有鹿班文與萱大同小異開花亦不並時徐勉萱賦云信兹華之獨茂挺金質于炎辰既耀色以袪痗亦含香而可珍同芰荷于蘭暑及蟬露乎首旻其葉四垂其跗六出亦曰宜男加名斯吉華而不艷雅而不質案朱傳云諼草合歡誤也古今注云合歡樹似梧桐與萱全别或者朱子因諼草連引合歡作一句讀而不以合歡解諼草乎草説文云草百卉也從二中又云草斗櫟實也一曰象斗子徐鉉曰今俗以此為草木之草别作皂字為黑色之皂案櫟實可以染帛為黑色故曰草通用為草棧字爾雅云卉草疏别二名又云蕍芛葟華榮疏别草木榮華之異名又云荄根擭槖含木謂之華草謂之榮不榮而實謂之秀秀而不實謂之英方言云蘇芥草也江淮南楚之間曰蘇自關而西或曰草或曰芥卉莽草也東越揚州之間曰卉南楚曰莽大戴禮云孟春氷泮百草權輿周書云霜降之日草木黃落淮南子云醴泉生皇辜皇辜生庶草背傳云背北堂疏云背者向北之義故知在北士昏禮云婦洗在北堂有司徹云主婦北堂房室所居之地總謂之堂房半以北為北堂房半以南為南堂廬陵李氏云房屋相連為之房無北壁故得北堂之名朱子云北堂蓋古植花木之處禮書云北堂在房之北有狐篇厲傳云厲深可厲之旁韓詩云至心曰厲爾雅云以衣涉水為厲繇膝以下為揭繇膝以上為涉繇帶以下為厲韻會注云岸高危處曰厲木瓜篇木瓜爾雅云楙木瓜注實如小瓜酢可食陶隱居云山陰蘭亭尤多最療轉筋蜀本注云其樹枝狀如奈花作房生子火乾甚香圖經云木狀如奈花生春末深紅色實大者如瓜小者如拳宣州人種蒔尤謹遍滿山谷始實成則鏇紙花薄其上夜露日暴漸而變紅花文如生本州以充土貢又有一種榠櫨木葉花實酷類木瓜欲辨之看蒂間别有重蒂如乳者是木瓜也雷公云真木瓜皮白微赤黃香酸甘不澀調榮衛助穀氣向裏子頭尖一面方勿誤用和圓子蔓子土伏子考工記弓人取幹之道木瓜次橘廣志云木瓜子可藏枝為杖號一尺百二十節水經注魚復縣多木瓜樹子大如甒瓊疏瓊是玉之美名説文瓊赤玉也琚纂要云琚瑀所以納間在玉之間今白珠也羅中行云琚處佩之中所以貫蠙珠而上繫于珩下維璜衝牙者也朱氏云琚如圭而正方在珩璜之中瑀如大珠在中央之中錢氏云佩玉之雙璜上係于珩又有組以左右交牽之使得因珩之抑揚以自相衝擊于兩組相交之處以物居其間交納而拘捍之故謂之琚或以大珠或雜用瑀石詩言琚言瓊則佩之美者也案朱氏以兩旁之中為琚羅錢二氏以中央之中為琚其説不同木桃木李埤雅云江左故老視其實如小瓜而有鼻食之津潤不木者謂之木瓜圓而小于木瓜食之酸澀而木者謂之木桃木李大如木桃似木瓜而無鼻其品又小木桃亦或謂之木梨梨蓋聲之誤也鼻即瓜之脫華處里俗呼之為咮其著華處乃臍也案魚龍河圖曰瓜有兩蒂兩鼻者殺人則鼻與蒂異矣木瓜性脆木李性堅今人以蜂飴漬之者取木瓜煎之者取木李徐氏云瓜有瓜瓞桃有羊桃李有雀李此皆枝蔓也故言木瓜木桃木李以别之案木桃木李依陸説似即木瓜之類非即桃李也述異記云桃之大者謂之木桃又即桃類瑶説文云瑶玉之美者玖傳云瓊玖玉名丘中有麻傳云玖石次玉者説文云石之次玉黑色者國風王一王互見車攻篇東鄭譜云王者周東都王城畿內方六百里之地封域在禹貢豫州太華外方之間北得河陽漸冀州之南始武王作邑於鎬京謂之宗周是為西都成王在豐欲宅洛邑使召公先相宅既成謂之王城是為東都今河南是也召公既相宅周公往營成周今洛陽是也成王居洛邑遷殷頑民於成周復還處西都平王以亂故徙居東都王城地里志周地今之河南洛陽穀城平隂偃師鞏緱氏是其分也昔周公營洛邑以為在于土中諸侯蕃屏四方故立京師至平王東居洛邑襄王以河內賜晉文公又為諸侯所侵故其分地小括地志平王以下十二王皆都王城至敬王乃遷都成周赧王又居王城吕東萊云成周乃東都揔名河南成周之王城也洛陽成周之下都也平王東遷之後所謂西周者豐鎬也東周者東都也威烈王之後所謂西周者河南也東周者洛陽也朱仲晦云周地今河南府及懷孟等州是案河南縣今廢在河南河南府城唐苑內城西有郟鄏陌即定鼎之地洛陽故城在河南府城東洛水北懷州今為懷慶府孟縣宋之孟州也黍離篇黍説文云禾屬而黏者也以大暑而穜故謂之黍從禾雨省聲孔子曰黍可為酒禾入水也爾雅云衆秫疏衆一名秫謂黏粟也與穀相似北人用之釀酒其莖稈似禾而粗大本草云黍米味甘溫無毒主益氣補中陶隱居云其苗如蘆而異於粟粒亦大粟而多是秫今人又呼秫粟為黍非也北人作黍飯方藥釀黍米酒則皆用秫也唐本注云黍有數種亦不似蘆似粟而非粟圖經云有二種米粘者為秫可以釀酒不粘者為黍可食如稻之有粳糯夏小正云五月初昏大火中大火者心星也心中種黍菽穈時也周書云凡禾黍居南方月令仲夏農乃祭黍是月也天子乃以雛嘗黍疏云仲夏黍新熟今蟬鳴黍是也又云孟秋農乃登穀注黍稷之屬於是始熟曲禮云黍曰薌合內則云羊宜黍豕宜稷春秋説題辭云精移火轉生黍黍者緒也故其立字禾入米為黍酒以防老家語孔子曰黍者五穀之長祭先王以為上盛吕氏春秋云得時之黍芒莖而徼下穗芒以長摶米而薄粳舂之易而食之不噮而香如此者不飴先時者大本而華莖殺而不遂葉藁短穗後時者小莖而麻長短穗而厚粳小米鉗而不香汜勝之書云黍者暑也種必待暑先夏至二十日此時有雨強土可種黍黍欲疏于禾白虎通云清明風至則黍稷滋閶闔風至則種宿麥黍雅翼云黍之秀特舒散故説者以其象火為南方之穀大體似稷故古人并言黍稷有赤黍白黍其類有黏不黏黏者别名秫月令造酒命大酋秫稻必齊蓋以此秫與稻之糯為酒北人謂秫為黃米亦謂之黃糯釀酒比糯稻差劣梁寅云或黏或不黏或高而實黑或低而實黃皆謂之黍稷爾雅云粢稷左傳云粢食不鑿注黍稷曰粢月令云孟春行冬令首種不入注舊説首種謂稷玉藻云子卯稷食而菜羮又云沐稷而靧梁本草云稷米味甘無毒主益氣補不足陶隱居云稷米亦不識書多云黍與稷相似圖經云稷為五穀之長吕氏春秋云飯之美者有陽山之穄高誘云關西謂之糜冀州謂之䵖皆一物也廣雅解云如黍黑色考靈耀云日中星鳥可以種稷雅翼云稷所以為五穀長者以其中央之穀又古號為首種孟春種稷之時稷又名粢故祭祀之號稷曰明粢而言粢盛者本之故諸穀皆有粢名疏云稷苗六月時也稷穗七月時也稷實八月時也案稷有五名曰稷曰粢曰穄曰糜曰䵖舍人注爾雅云稷粟也郭璞云今江東人呼粟為粢此二説非是本草粟米在中部味鹹稷米在下部味甘其治療亦全别苗説文云草生於田者從草從田詩緝曰穀始生曰苗草之類始生亦曰苖公羊注云苗者禾也生曰苗秀曰禾呂氏春秋曰苗其弱也欲孤長也欲相與居其熟也欲相扶是故三以為族乃多粟蒼天傳云蒼天以體言之爾雅云穹蒼蒼天也春為蒼天李巡曰春萬物始生其色蒼蒼故曰蒼天尚書歐陽説云夏曰蒼天莊子云天之蒼蒼其正色耶遠而無所至極耶埤雅云詩于高遠難訴每稱蒼天黍離曰悠悠蒼天此何人哉巷伯云蒼天蒼天視彼驕人矜此勞人黃鳥曰彼蒼者天殱我良人是也爾雅云穹蒼蒼天也穹言形蒼言色也桑柔之詩初言倬彼昊天寧不我矜言昊天則猶望之以其明也次曰靡有旅力以念穹蒼言方是時厲王無道甚矣小人知念土宇而君子反無旅力以念穹蒼也穗説文云禾成秀也君子于役篇雞爾雅云雞大者蜀蜀子鵌未成雞僆絶有力奮雞三尺為鶤易云巽為雞疏巽主號令雞能知時故為雞也周禮庖人秋行犢麛膳膏腥大宗伯以禽作六摯工商執雞注取其守時而動雞人凡祭祀面禳釁共其雞牲禮記云祭宗廟之禮雞曰翰音又云季冬之月雉雊雞乳夏小正云正月雞桴粥桴嫗伏也粥養也運斗樞云玉衡星散為雞春秋説題辭云雞為積陽南方之象火陽精物炎上故陽出雞鳴以類感也雞之為言佳也佳而起為大期莫寶也韓詩外傳田饒云雞有五德頭戴冠者文也足傳距者武也敵在前敢鬬者勇也見食相呼者仁也守夜不失時者信也古今注云雞一名燭夜九家易云風應節而變變不失時雞時至而鳴與風相應二九十八主風精為雞故雞十八日剖而成雛二九順陽厯故雞知時而鳴也五行傳云貌之不恭則有雞禍管輅别傳云雞者兊之畜故太白揚輝則雞鳴廣志云雞有胡髯五指金骹反翅之種大者蜀小者荆九真出長鳴雞相感志云野雞屬隂先鳴而後鼓翼家雞屬陽先鼓翼而後鳴埤雅云鹽鐡論曰雞廉狼吞雞跑而食之每有所擇故曰小廉如雞爾雅云雞大者蜀郭璞曰今蜀雞也雞有蜀魯荆越諸種越雞小蜀雞大魯雞又其大者莊子曰越雞不能伏鵠卵魯雞固能矣雞知時而善伏王褒云魚瞰雞睨李善以為魚目不瞑雞好邪視是也雅翼云雞鳴必三度故禮有初鳴而衣服者又能自守不為風雨所止故詩人以比不改度之君子雞有冠距文武之貌不為威儀貌氣毁故有雞禍塒爾雅云雞鑿垣而棲為塒李巡曰寒鄉鑿墻為雞作棲曰塒説文云西鳥在巢上象形日在西方而鳥棲故因以為東西之西字或從木妻禽經云陸鳥曰棲水鳥曰宿夕説文夕莫也從月半見埤雅云詩曰雞棲于塒日之夕矣言雞棲矣日于是夕夕于是月見故象半月未有蟾桂之狀月滿則夜見半則夕見故也牛説文云牛大牲也象角頭三封尾之形牛為大物天地之數起于牽牛釋畜云犘牛犦牛犤牛犩牛犣牛犝牛犑牛角一俯一仰觭背踊觢黑脣犉黑眥牰黑耳犚黑腹牧黑腳犈其子犢體長牬絶有力欣犌禮記云祭天子以犧牛諸侯以肥牛大夫以索牛又云牛曰一元大武又云諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕又云帝牛不吉以為稷牛帝牛必在滌三月稷牛惟具所以别事天神與人鬼也又曰牛夜鳴則庮又云祭天地之牛角繭栗宗廟之牛角握賔客之牛角尺周禮庖人春行羔豚膳膏香大司徒祀五帝奉牛牲羞其肆享先王亦如之封人祭祀飾其牛牲設其楅衡牛人掌養國之公牛以待國之政令凡祭祀共其享牛求牛求牛所以繹者以授職人而芻之世夲云􅦡作服牛􅦡黃帝臣也又曰少昊時人始駕牛山海經云稷之孫曰叔均是始作牛耕五行傳云思之不容則有牛禍相牛經云牛岐胡壽眼中有白脈貫瞳子最快璧堂腳股間也欲濶依欲如絆馬膺庭欲廣天關背接骨欲成雋骨春也欲垂蘭株欲大捶頭欲高百體欲緊豐嶽膝骨欲大垂星蹄上也欲得有怒肉力柱欲得大而成當車骨懸蹄欲得如八字陽鹽夾尾前兩臁上欲得廣常有似鳴者有黃也身欲得如卷毛少骨多者有力雅翼云牛之名色特牛謂之犅牛父謂之特子謂之犢吳人謂犢曰犢牛羊無子謂之㹗二歲謂之三歲謂之犙四歲謂之牭騬牛謂之犗純色謂之牲駮謂之犖白黑雜毛謂之㹁黃白色謂之犥駁如星謂之黃牛虎文謂之黃牛黑脣謂之犉白脊謂之犡又謂之㸹長脊謂之白牛謂之㹊埤雅云牛土畜也馬火畜也土緩而和火性健決躁速故易坤為牛乾為馬牛病則耳燥安則溫潤而澤故古之視者以耳祭義所謂牛毛尚耳是也詩曰殺時犉牡有救其角救長貌社稷之牛角尺故曰救角牛膏曰香其耳無竅以鼻聽也月爾雅曰月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在己曰則在庚曰窒在辛曰塞在壬曰終在癸曰極又云正月為陬二月為如三月為寎四月為余五月為臯六月為且七月為相八月為壯九月為玄十月為陽十一月為辜十二月為塗書疏云六厯諸緯與周髀皆云日行一度月行十三度十九分度之七為每月二十九日過半吕覽云羲和作占日尚儀作占月桀爾雅云雞棲于弋為榤又云樴謂之杙注橛也六家詩名物疏卷十八
