body:
  text: 六家詩名物疏卷四十五明馮復京撰小雅魚藻之什魚藻篇鎬郡縣志周武王宫即鎬京也在京兆府長安縣西北十八里自漢武帝穿昆明池於此鎬京遺址淪陷焉括地志滈水源出長安縣西北滈池北流入渭盟會圖云豐鎬相去二十五里一統志鎬水在陜西西安府城西北十八里上承鎬池下流合滮池水鎬京城在咸陽縣西南采菽篇黼賈氏曰黼謂黑白為形則斧文詳見九罭衮衣檻泉爾雅云濫泉正出正出涌出也李巡曰水泉從下上出曰涌泉釋名云水正出曰檻泉濫銜也如人口有所銜口開則見芹爾雅云芹楚葵注今水中芹菜本草水芹味甘平主養精保血脉益氣令人肥健嗜食一名水英陶隱居云二三月作英時可作葅及熟爚食之又有渣芹可生噉别本注云芹有兩種青芹取根白色赤芹取莖葉並堪作葅圖經云生水中葉似芎藭花白色而無實根亦白色孟詵云水芹置酒漿中香美高田者名白芹周禮醢人云加豆之實芹菹兔醢吕氏春秋伊尹曰菜之美者雲夢之芹埤雅云芹潔白而有節其氣芬芳而味不如蓴美故列子以為客有獻芹者鄉豪取而嘗之蜇口慘腹邪幅傳云幅逼也所以自逼束也箋云如今行縢逼束其脛自足至膝疏云邪纒于足謂之邪幅釋名云逼今謂之行縢言以裹腳可以跳騰輕便也左傳云帶裳幅舄昭其度也內則子事父母有逼紼釋木云紼纚維之紼繂也縭緌也孫炎曰繂大索也李巡曰􅛢竹為索所以維持舟者郭璞曰緌繫也角弓篇爵周禮太宰以八柄詔王馭羣臣一曰爵以馭其貴二曰祿以馭其富大宗伯以九儀之命正邦國之位一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯司士以德詔爵以功詔祿以能詔事以久奠食禮記云天子三公九卿二十七大夫八十一元士大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人又云司馬辨論官材論進士之賢者以告于王而定其論論定然後官之任官然後爵之位定然後祿之禮含文嘉云殷爵三等周爵五等猱爾雅云猱猿善援貜父善顧注云猱猿便攀援貜父貑貜也似獼猴而大色蒼黑能攫持人好顧盼說文云夒貪獸也一曰母猴似人陸璣云猱獼猴也楚人謂之沐猴老者為玃長臂者為猿猿之白腰者為獑胡獑胡猿駿捷於獼猴其鳴噭噭而悲廣雅云猱狙獼猴也顔師古云獿善拂拭相如賦蛭蜩玃蝚顔注今狨皮為鞍褥者非獼猴也陸佃云狨蓋猿狖之屬輕捷善緣木大小類猿長尾尾作金色俗謂之金線狨生川峽深山中人以藥矢射殺之取其尾為卧褥鞍被坐毯中矢毒即自齧斷其尾以擲之狨一名猱顔氏以為其尾柔長可藉故其制字從柔以此故也嚴粲云猱即王孫也杜詩覓胡孫是也元康地記云猿與獼猴不共山宿臨旦相呼王延壽王孫賦云儲糧食於兩頰稍委輸於胃脾緣百仞之高木攀窈裊之長枝栁子厚云猿王孫居異山德異性不能相容猿之德靜以恆王孫之德躁以囂勃諍號呶雖羣不相善也食相噬齧行無列飲無序乖離而不思有難推其柔弱者以免好踐稼蔬所遇狼籍披攘禾實未熟輒齕咬投注山之小草木必凌挫折撓江乘地記云攝山有山猱赤足鳥獸考云猴詩謂之猱性躁而多智按猱字說文作夒今文作猱或作獿又作蝚猿屬陸璣云獼猴也嚴粲云即王孫也據元康地記云猿與獼猴不共山宿與栁子厚說猿王孫居異山相符王延壽云儲食兩頰爾雅翼釋猴亦有此說則猱信為猴矣而師古及陸羅二氏俱以猱猴為異物故埤雅以猱為狨而别見猴今吳俗指猴為猿亦謂之胡孫既已混甚都不聞猱與王孫之名未知異同附箋云附木桴也疏云木表之粗皮髦箋云髦西夷别名武王伐紂其等有八國從焉牧誓及庸蜀羌髳微盧彭濮人括地志姚府以南古髳國之地有髳州一統志雲南楚雄府定逺縣唐初置西濮州貞觀中改髳州姚安軍民府大姚縣唐屬髳州都人士篇緇撮儀禮緇布冠缺項青組纓屬于缺注缺讀如頍緇布冠無笄者著頍圍髮際結項中隅為四綴以固冠也項中有􅕒亦由固頍為之耳今未冠笄者著卷幘頍象之所生也又云賔筵前正纚右手執項左手執前郊特牲曰大古冠布齊則緇之其緌也孔子曰吾未之前聞也冠而敝之可也玉藻曰始冠緇布冠諸侯下達緇布冠繢緌諸侯之冠也雜記大白緇布冠不緌又曰大夫卜宅與葬日緇布冠不緌陳氏云緇布冠有前有項纓屬于缺無緌後世以尊者不可無飾故加繢緌用於始冠及大夫之卜宅與葬日而已庶人或以為常服用於始冠則𤣥端𤣥裳黃裳雜裳緇帶爵韠用于卜宅與葬日則有司麻衣布衰布帶因喪屨若庶人則深衣焉庶人雖服委貌而儉者服緇布謂之緇撮則無梁矣吉左傳鄭石癸曰吾聞姬姞耦其子孫必蕃姞吉人也后稷之元妃也國名記云郅黃帝之宗見詩風俗通云殷時侯國一作吉濳夫論云郅與姞同而字異唐宰相世系云吉氏出自姞姓黃帝裔伯鯈封於南燕賜姓曰姞厲箋云鞶必垂厲為飾厲字當作裂內則男鞶革女鞶絲注云鞶小囊盛帨巾者男用韋女用繒有飾緣之則是鞶厲與詩云垂帶如厲疏云此是鄭義若如服杜左傳鞶厲注則以鞶為大帶厲是大帶之垂者小爾雅云帶之垂者謂之厲蠆詩義疏云蠆一名杜白河內謂之蚊幽州謂之蠍通俗文云長尾為蠆短尾為蠍左傳云蜂蠆有毒葛洪方云蠍中國多此江南無也陶隱居云蠍有雌雄雄者螫人痛止在一處雌者痛牽諸處段柯古云鼠負巨者多化為蠍蠍子多負于背蠍前謂之螫後謂之蠆常為蝸牛所食以迹規之不能去雅翼云說文蠆字象形蓋象其奮螯曳尾之形蜥蜴能食之采緑篇藍爾雅云葴馬藍郭云今大葉冬藍也疏云今為澱者是夏小正曰五月啓灌藍蓼啓者别也陶而疏之也灌者叢生者也記時也禮記云仲夏令民母艾藍以染注云為傷長氣也此月藍始可别蘇恭云藍實有三種一種圍徑三寸許厚三四分出嶺南名木藍子菘藍堪切為澱本草經所用乃是蓼藍實其苗似蓼而味不辛者菘藍惟堪染青蓼藍不堪為澱惟作碧色圖經云藍實人家蔬圃中作畦種蒔三四月生苗髙三二尺葉似水蓼花紅白色實亦若蓼子而大黑色五六月採實即蓼藍也菘藍即爾雅所謂馬藍又福州有一種馬藍四時俱有江寧有吳藍二三月生如蒿葉青花白荀子云青出於藍而青於藍四民月令榆莢落時可種藍五月可刈藍六月可種冬藍齊民要術云種藍一同葵法藍三葉澆之薅治令淨五月中新雨後即抆裁之襜爾雅云衣蔽前謂之襜郭璞云今蔽膝黍苗篇輦互見車攻徒說文挽車也從車㚘在車前引之也㚘音伴並行也從兩夫漢書注駕人以行曰輦謝詳見王風申水經注云沘水又西南流謝水注之出謝城北國語注郟南謝北虢鄶在焉白華篇白華詳見陳風菅爾雅云白華野菅滮池水經注鄗水又北流西北注與滮池合水出鄗池西而北流入于鄗世傳以為水名九域志京兆府冰池按十道志名滮池亦名聖女泉一統志鄗水下流合滮池水滮水在西安府城西北二十里發源咸陽縣之滮池西北合鎬水煁爾雅云煁烓也郭璞曰今之三隅竈說文曰行竈也孔氏曰烓者無釜之竈止以燃火照物若今火爐鶖埤雅云鳬雁醜翁鶖鶴醜鷩鶖性貪惡俗呼秃鶖長頸赤目其毛辟水毒劉楨賦云緑蠲葱鶖鶖色蓋青也古今注云扶老秃鶖也狀如鶴而大大者高八尺善與人鬭好啖蛇禽經云扶老強力注食之益人氣力走及奔馬魏書崔光云貪惡之鳥野澤所有石傳云王乘車履石夏官𨽻僕云王行則洗乘石先鄭云乘石所登上車之石也禮書云乘石王與后乘車於是登降也設于兩階綿蠻篇丘阿丘隅傳云丘阿曲阿也鄭注大學止于丘隅云鳥擇岑蔚安閒而止處之疏云岑謂巖險蔚謂草木蓊蔚漸漸之石篇豕爾雅云豕子豬䝐豶么幼奏者豱所寢橧四蹢皆白􅘻其迹刻絶有力􅙊彘五尺為􅙊方言云豬燕朝鮮謂之豭關東西謂之彘或謂之豕南楚謂之狶其子謂之豚或謂豯吳揚之間謂之豬子易睽上九曰見豕負塗大畜六五曰豶豕之牙吉姤初六曰羸豕孚蹢躅說卦曰坎為豕禮記曲禮曰凡祭豕曰剛鬛豚曰腯肥又曰士無故不殺犬豕月令曰孟夏天子以彘嘗麥王制曰秋薦黍以豚韓詩說云犬喜雪馬喜風豕喜雨春秋說題辭曰斗星時散為彘四月生應天理淮南子云六九五十四四主時時主豕故豕四月而生山海經云豬大者肉至千斤豪豬狀如豚而白毛毛大如笄而黑端五行傳云聽之不聰則有豕禍埤雅云豕喜雨而躁白蹢又其躁者蹢傳云蹢蹄也說文云住足也波說文云水涌流也苕之華篇苕爾雅云苕陵苕黃華蔈白華苃郭璞曰一名陵時本草云疏云詩苕之華鄭箋云陵苕之華紫赤而繁陸璣亦言其華紫色而此云黃白者蓋就紫色中有黃紫白紫耳及其將落則全變為黃故詩曰藝其黃矣陸璣云一名鼠尾生下濕水中七八月中華紫似今紫草可染皂煮以沐髮即黑葉青如藍而多華廣志曰苕草色青黃紫華十一月稻下種之蔓延盛茂可以美田葉可食本草云紫葳一名陵苕一名茇華生西海川谷及山陽圖經云陵霄花也多生山中人家園圃亦或種蒔初作藤蔓生依大木歲久延引至巔而有華其華黃赤夏中乃盛雅翼云此華亦彌絡石壁盛夏視之如錦繡不可仰望露滴目中有失明者按陵苕即陵霄也故本草云一名茇華與爾雅合陸璣疏則以為鼠尾爾雅云葝鼠尾注云可以染皂本草經云鼠尾草有白華者赤華者一名葝一名陵翹生平澤中四月採葉七月採華陶隱居云田野甚多人採作滋染皂圖經云苗如蒿夏生莖端作四五穗穗若車前與陸說生下濕七月花可染皂者相似則陸誤以陵苕為鼠尾矣又或以紫葳為瞿麥根瞿麥即爾雅所謂大菊蘧麥亦非也陵苕斷即女葳陸璣疏全謬不可從牂爾雅云羊牡羒牝牂郭云謂吳羊博雅云吳羊牝一歲曰牸䍮三歲曰牂何草不黃篇棧車傳云棧車役車也箋云輦者疏云有棧是車狀非士所乘之棧也庶人乘役車蟋蟀言役車其休是矣彼不以人挽知不與此同詩緝云疏說不分曉不如徑以為士之棧車春官巾車云士乘棧車庶人乘役車注云棧車不革挽而漆之役車方箱可載任器以共役考工記云飾車欲侈棧車欲弇六家詩名物疏卷四十五
