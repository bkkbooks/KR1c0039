body:
  text: 詩名物疏詩類提要臣等謹案詩名物疏五十五卷明馮復京撰復京字嗣宗常熟人是書因宋蔡元度詩名物疏而廣之徵引頗為賅博每條之未間附考證如被之僮僮鄭箋以被為髲髢集傳以為編髮復京則據周禮追師謂編則列髮為之次則次第髮長短為之所謂髲髢定集傳之誤混為編又如鄭風緇衣集傳以為緇衣羔裘大夫燕居之服復京則據賈公彥周禮疏以為卿士朝于天子服皮辨服其適治事之館改服緇衣鄭箋所謂所居私朝即謂治事之館其議論皆有根柢惟所稱六家乃謂齊魯毛韓鄭箋朱傳則古無是名而自復京臆創之且毛鄭本屬一家析而為二亦乖于傳經之支派要其大端可取固毋庸以一眚掩也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀六家詩名物疏原序孔子所雅言者詩書執禮而已論語於書禮不數數獨詩至十二舉而不以為煩豈非可與言者之難哉當時學詩者惟子貢子夏為聖人所深取二子之言詩以世儒觀之如收經而引其足也不知書禮意盡於言而詩不盡於言二子於其虛圓微妙不可控搏者而以意逆之明乎非世儒所可幾矣夫詩有實有虛虛者其宗趣也而以穿鑿實之實者其名物也而以孤陋虛之欲通經學古以逰聖人之樊豈可得哉詩自毛鄭上下其凡六家半軼不傳今立於學宫者其解詩皆解他書之法也既非風人之趣若夫草木鳥獸諸名物之類非援據不明非參伍不核顧往往置而不言則比興之義微矣陸璣作疏良有意于此鄭樵氏以支離目之逮自為昆蟲草木略也謂以儒生而識田野之物農圃而兼詩書之理可無餘憾矣然僅僅三百六十以應周天之數語焉而不詳亦奚取焉海虞馮君復京童習是經久而有得取疏略而廣之綴集昔聞參以新義自鳥獸草木而外如象緯堪輿居食被服音樂兵戎名見於經者種種具焉足以補陸鄭之遺而起其廢疾至詩人之意則存而不論俟讀者虛心而自得之此於孔門之言詩不庶幾近之也哉近世竺乾之學其徒有教有宗教可以義詮而宗不可語解竊謂詩之可晤而不可傳也蓋與宗門同風然則君之此編其可釋者釋之學者所知也不可釋者闕之學者所未易知也萬厯乙已九日琅琊焦竑弱侯撰六家詩名物疏原序六家詩名物疏敘例一六義奧趣五際微文先儒駕説揚榷已詳今之所詮名物而已一詩人之作托流景於目前寄心曲於形表孔子曰多識於鳥獸草木之名比類而言幾乎上窮景緯下括輿圖中偹人事豫今具釋列為三十二門門各若干事詩之名物殫於此矣一漢世説詩者齊魯毛韓分鑣並驅洎乎鄭箋續綴毛説孤行朱傳晚成學官犆立古今名家不越乎此其詁中名物詮釋如左雖三氏淪亡而羣書錯引固可得而偹論也其他如歐之本義王之新説蘇吕錢董諸家雖式存遺牒未列學官各創新竒無煩翰墨一篇首小序或云西河手創或云國史編題甚則髙子加其枝指衛宏成其蛇足既非古經故不存今疏一分門著疏有總有别總則粗陳梗概别則曲致發揮何者如禮是總名吉凶諸儀為禮之别樂是總名聲容諸器為樂之别若禮樂備書則數帙未竟若儀器稍缺則一物全疏所以錯意立文詳略各異推之諸類亦猶是也一六經之文齊定宣聖三雅之釋並稟姬公斯紀載之冠冕文章之潭窔此疏之設本為明經以經解經辟猶以水投水雖欲無合其可得乎故詳加搜輯鮮或缺遺子史文集則簡汰浮華導揚指要若夫鳥獸草木産窮荒絶徼之區靈怪鬼神出虞初奚堅之志無禆經學未遑縷數一詩人詠物據謡俗以屬篇先哲解經緣師門而聚訟所以種類紛揉訓故蹖駁豫不揆檮昧輒附管窺庶或助錦帶之揮麈解青襟之疑網若離經畔正逞已蓋人乃是木零捐本狐斃忘丘既篤論之攸譏良豫心之所懼也一典册浩汗援據紛紜刋除既病於不該採掇復虞於叢委故所述之書或芟煩就簡或移後從前或著論櫽括其言或他章錯綜其義蓋編次惟取省文考練尚宜探本一古多竒字兼有借音誠恐披觀駭目諷誦聱牙輒於籍端隨加翻切若字同用異則必兩載以示旨或聲别義均則從一音以便讀一自姬漢以來儒學成林縹緗充棟豫材非贍敏思謝淵沈而欲廣前説之波瀾拯諸家之失隊力小任重不亦惑乎然而勉希十駕自勵三餘雖同華子之病忘竊效寧生之篤學少習是經旁通諸籍少究指歸因緣互證爰抽腹笥以示門人久之時術之徒編綴成集問字之客用傳好事非有心於著述致未純於體例訛謬良多挂漏不免將來涉者倘加補正則甚幸云六家詩名物疏敘例六家詩名物疏引用書目申公魯故齊后氏故韓嬰內傳薛君章句韓詩外傳卜子夏小序毛萇傳鄭玄箋鄭玄譜王肅毛詩注王肅毛詩雜義駁劉楨毛詩義問王基毛詩駁韋昭毛詩答雜問孫育異同評蔡謨毛詩疑字議崔霛恩集注劉芳義疏陸璣草木蟲魚疏毛詩草蟲經孔頴逹正義陸德明釋文徐鉉草木蟲魚圖歐陽修本義二程新解蘇轍集解王安石新經義藍田二呂説董逌廣川詩詁丘氏説李詳解林之竒解鄭樵詩傳劉彛説胡寅説陳鵬飛説朱熹集傳吕祖謙家孰讀詩記徐氏説傅氏説范處義解頥新語范處義補傳曹氏説陳傅良説戴溪續讀詩記錢文子詩詁黃櫄解李如圭説輔廣説濮一之説嚴粲詩輯王應麟詩考王應麟詩地里考項安世説羅中行説朱公遷疏義梁寅疏詩經大全季本釋季本字義馮時可詩臆凡詩六十部易歸藏周易京房傳易鄭玄注易王弼注易荀爽九家注孔頴逹正義元包經傳凡周易七部尚書伏生傳孔安國傳歐陽説鄭玄注顧彪正義孔頴逹正義蔡沈傳尚書逸篇尚書大傳鄭玄注汲冡周書劉向洪範五行傳論凡尚書十一部周禮杜子春注周禮鄭衆注周禮馬融注周禮鄭玄注周禮干寶注周禮崔霛恩注周禮賈公彥正義儀禮鄭玄注儀禮賈公彥正義儀禮楊復圗喪服變除大戴禮記夏小正傳禮記鄭玄注蔡雍月令章句禮記皇侃義疏禮記熊安生義疏禮記鄭小同禮義禮記孔頴逹正義禮記方氏注禮記陳澔集説逸禮王度記中霤禮王居明堂禮禮統禮記外傳鄭玄禘祫志阮諶禮圖崔霛恩三禮義宗通禮義纂聶崇義三禮圖陸佃三禮圖陳祥道禮書凡禮三十三部樂經樂元起釋知匠古今樂録揚雄琴清英琴書琴操段安節樂府雜録陳㿩樂書劉次莊樂府集郭茂倩樂府凡樂十部春秋左傳賈逵注左傳服虔注左傳杜預集解杜預春秋釋例杜預春秋世譜春秋盟會圗鄭玄針膏肓左傳孔頴逹正義左傳傅遜屬事國語韋昭注公羊傳何休學公羊傳疏董仲舒春秋繁露榖梁傳范寧注穀梁傳揚士勛疏京相璠春秋土地名趙匡闡微纂類凡春秋十七部孝經鄭玄注孝經唐太宗御注凡孝經二部論語馬融注包咸注何晏集解邢昺疏逸論語孔子家語王肅注孔叢子凡論語七部孟子趙岐注孫奭疏朱熹集注凡孟子三部爾雅樊光注李巡注孫炎注某氏注犍為文學注郭璞注邢昺疏小爾雅張揖廣雅陸佃埤雅羅願爾雅翼揚雄方言劉熙釋名韋昭辨釋名凡爾雅十四部三蒼杜林倉頡訓詁埤蒼服虔通俗文史遊急就篇束皙發蒙記許愼説文吕忱字林楊承慶字統顧野王玉篇何承天纂文文字指歸孫愐唐韻徐鍇説文繫傳丁度集韻王安石字説毛晃韻劉淵韻黃公紹韻會韻府羣玉章黼韻章黼直音凡小學二十二部劉向五經通義班固等白虎通許愼五經異義鄭玄駁異義鄭志王肅聖證論五經要義陸德明經典釋文顔師古匡謬正俗五經圖陳錫玄經言枝指凡經解十一部河圖龍文河圖括地象河圖帝通紀河圗帝覽嬉河圖稽耀鈎河圖挺佐輔雒書霛凖聽雒書甄耀度易是類謀鄭玄注易乾鑿度易稽覽圖尚書中候書帝命驗書刑德放書考霛耀詩含神霧詩推度災禮斗威儀禮稽命徴禮含文嘉樂汁圖徴樂動聲儀春秋元命包春秋命厯序春秋説題辭宋均注春秋考異郵春秋運斗樞春秋保乾圖春秋感精符春秋孔演圖春秋文耀鈎春秋濳潭巴春秋漢含孶春秋佐助期春秋內事孝經援神契孝經鈎命決論語摘襄聖論語撰考讖論語比考讖論語隂嬉讖凡讖緯四十一部凡經類二百三十八部史記徐廣注史記司馬貞索隱司馬貞補三皇紀史記張守節正義前漢書應劭注前漢書晉灼注前漢書顔師古注司馬彪續漢書范曄後漢書劉昭補後漢志陳夀三國志張勃吳録晉書地道記唐太宗晉書晉中興書沈約宋書蕭子顯南齊書姚思廉陳書魏收後魏書顔師古隋書歐陽修唐書元史凡正史二十二部竹書紀年穆天子傳戰國䇿粵絶書趙曄吳越春秋魚豢典略譙周古史考環濟要略帝王世紀華陽國志袁宏後漢紀史通大事記鄭樵通志通鑑外紀路史凡雜史十六部王隆漢官解詁應劭漢官儀衛宏漢舊儀摯虞決疑要注魏臺雜訪議董巴輿服志封禪記蔡雍獨斷周遷輿服雜事徐廣車服雜注齊職儀大唐六典凡職儀十二部春秋井田記趙岐三輔決録漢武內傳劉向列女傳管輅别傳葛洪西京雜記凡雜記傳六部山海經山海經圖讚地説書地鏡圖崑崙圖桑欽水經酈道元水經注三輔黃圖三輔故事晉宫闕銘陸機洛陽記潘嶽關中記辛氏三秦記周處風土記郭緣生述征記戴延之西征記太康地記元康地記盛𢎞之荆州記周地圖記國都城記十道記闞駰十三州志沈懷逺南越志嵇含南方草木狀萬震南州異物志晉安海物異名記交州記林邑記江乘地記任豫益州記庾仲雍江記郭義恭廣志括地志雲南記古今山川記名山記陸鴻漸顧渚山記樂史寰宇記劉恂嶺表録異郭之美羅浮山記范成大桂海虞衡志王存九域志歐陽忞輿地廣記方輿記泰山記建寧記永嘉郡記鄒山記楊奂東遊記北征記一統志方輿勝覽渤海圗論寧波志凡地志五十五部世本王侯大夫譜宋衷世本古今姓纂萬姓統譜凡譜系四部凡史類一百十五部晏子曾子子思子荀子楊倞注子華子桓寬鹽鐡論揚雄大玄經揚雄法言王符濳夫論王逸正部論袁子正論楊泉物理論顔氏家訓朱子語録朱子語類凡儒家十五部老子道德經文子列子莊子司馬彪注莊子音義莊子吕吉甫注莊子循本參同契抱朴子內篇玉䇿記苻子黃庭經真誥陶玄景登真隱訣養生要集神仙傳關令內傳凡道家十七部管子商子韓非子凡法家三部劉劭人物志凡名家一部墨子凡墨家一部鬼谷子凡縱橫家一部范子計然汜勝之農書崔實四民月令賈思協齊民要術宗凛荆楚歲時記魏王花木志戴凱之竹譜養魚經韓諤四時纂要𧖟書桐譜筍譜芍藥譜王盤農書凡農家十四部鬻子尸子呂氏春秋髙誘注鶡冠子青史子鄹子淮南子髙誘注賈誼新書劉向新序劉向説苑桓子新論仲長子昌言王充論衡應劭風俗通蔣濟萬機論杜恕篤論張華博物志續博物志崔豹古今注瑞應圖中興徴祥説抱朴子外篇劉子新論盧氏雜説沈如筠異物志宋齊丘化書感應類從譜贊寧物類相感志沈括筆談楊億談苑宣和博古圖孫奕示兒編趙辟公雜説墨客揮犀聼聲考詳篇劉存事始説原隂陽自然變化論程大昌考古編格物總論格物要論天玄主物簿古今事物類考雲嶠類要苑洛語録聽雨紀談丹鉛總録逌旃瑣言留青日札焦氏筆乘華戎花木鳥獸考凡雜家五十一部神異經感應經師曠禽經衝波傳洞冥記干寶搜神記陶濳搜神記王子年拾遺記世説新語玄中記任昉述異記吳均續齊諧記異苑朝野僉載酉陽雜爼續酉陽雜爼劉公嘉話録王仁裕玉堂間話孫光憲北夢瑣言焦潞窮神祕苑杜光庭録異記南部新書太平廣記凡小説家二十三部黃帝書黃帝風經周髀經張衡霛憲圖渾天儀注甘石星經列星圖荆州星占韓楊天文要集乙已占天官占玉厯通政經焦林大斗記一行日議徐整長厯淮南萬畢經枕中記典術焦氏易林京房易飛候易通統卦驗玄圖翼奉風角要候遁甲經白澤圖師曠占龜經相鶴經相馬經相牛經相玉書相貝經九章算術凡天文厯數三十二部司馬法六韜大公金匱孫武子握竒經尉繚子凡兵法六部素問霛樞經明堂針灸彭祖養性經本草經吳普本草陶隱居本草注靁公炮炙論嵩陽子説日華子本草葛洪方李英公本草神仙服食經唐本草注孟詵食療本草蜀本圖經陳藏器本草拾遺本草衍義藥性論凡醫方十九部凡子類一百八十三部王逸楚詞注皇覽修文殿御覽梁元帝纂要藝文類聚北堂書抄初學記三教珠英杜佑通典册府元龜太平御覽文獻通考文苑英華文選李善注唐文粹百川學海山堂肆考合璧事類古文苑古詩雜碑集玉海天中記凡總集二十三部宋玉集司馬相如集馮衍集崔駰集蔡雍集曹植集王粲集嵇康集薛綜集左思三都賦注二陸集潘嶽集徐爰射雉賦注孫楚集陶潛集傅咸集成公綏集江淹集柳惲集岑文本集楊炯集韓此下原闕六家詩名物疏書目
