韓楊天文要集乙已占天官占玉厯通政經焦林大斗記一行日議徐整長厯淮南萬畢經枕中記典術焦氏易林京房易飛候易通統卦驗𤣥圖翼奉風角要候遁甲經白澤圖師曠占龜經相鶴經相馬經相牛經相玉書相貝經九章算術凡天文厯數三十二部司馬法六韜大公金匱孫武子握竒經尉繚子凡兵法六部素問霛樞經明堂鍼灸彭祖養性經本艸經吳普本草陶隱居本草注靁公炮炙論嵩陽子說日華子本草葛洪方李英公本草神仙服食經唐本草注孟詵食療本草蜀本圖經陳藏器本草拾遺本草衍義藥性論凡毉方十九部凡子類一百八十三部王逸楚詞注皇覽脩文殿御覽梁元帝纂要藝文類聚北堂書抄初學記三教珠英杜佑通典册府元龜太平御覽文獻通考文苑英華文選李善注唐文粹百川學海山堂肆考合璧事類古文苑古詩雜碑集玉海天中記凢總集二十三部宋玉集司馬相如集馮衍集崔駰集蔡邕集曹植集王粲集嵇康集薛綜集左思三都賦注二陸集潘岳集徐爰射雉賦注孫楚集陶潜集傅咸集成公綏集江淹集桺惲集岑文本集楊烱集韓此下原闕六家詩名物疏書目
