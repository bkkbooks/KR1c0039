body:
  text: 詩名物疏詩類提要臣等謹案詩名物疏五十五卷明馮復京撰復京字嗣宗常熟人是書因宋蔡元度詩名物疏而廣之徵引頗為賅博每條之未間附攷證如被之僮僮鄭箋以被為髲髢集傳以為編髮復京則據周禮追師謂編則列髮為之次則次第髮長短為之所謂髲髢定集傳之誤混為編又如鄭風緇衣集傳以為緇衣羔裘大夫燕居之服復京則據賈公彦周禮疏以為卿士朝于天子服皮弁服其適治事之館改服緇衣鄭箋所謂所居私朝即謂治事之館其議論皆有根柢惟所稱六家乃謂齊魯毛韓鄭箋朱傳則古無是名而自復京臆創之且毛鄭本屬一家析而為二亦乖于傳經之支派要其大端可取固毋庸以一眚掩也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀六家詩名物疏原序孔子所雅言者詩書執禮而已論語於書禮不數數獨詩至十二舉而不以為煩豈非可與言者之難哉當時學詩者惟子貢子夏為聖人所深取二子之言詩以世儒觀之如収經而引其足也不知書禮意盡於言而詩不盡於言二子於其虚圓㣲妙不可控搏者而以意逆之明乎非世儒所可幾矣夫詩有實有虚虚者其宗趣也而以穿鑿實之實者其名物也而以孤陋虚之欲通經學古以逰聖人之樊豈可得哉詩自毛鄭上下其凡六家半軼不傳今立於學宫者其解詩皆解他書之法也既非風人之趣若夫草木鳥獸諸名物之類非援據不明非參伍不覈頋徃徃置而不言則比興之義微矣陸璣作疏良有意于此鄭樵氏以支離目之迨自為昆蟲草木略也謂以儒生而識田野之物農圃而兼詩書之理可無餘憾矣然僅僅三百六十以應周天之數語焉而不詳亦奚取焉海虞馮君復京童習是經久而有得取疏略而廣之綴集昔聞參以新義自鳥獸草木而外如象緯堪輿居食被服音樂兵戎名見於經者種種具焉足以補陸鄭之遺而起其廢疾至詩人之意則存而不論俟讀者虚心而自得之此於孔門之言詩不庶幾近之也哉近世竺乾之學其徒有教有宗教可以義詮而宗不可語解竊謂詩之可晤而不可傳也盖與宗門同風然則君之此編其可釋者釋之學者所知也不可釋者闕之學者所未易知也萬厯乙已九日瑯琊焦竑弱侯撰六家詩名物疏原序六家詩名物疏敘例一六義奥趣五際㣲文先儒駕說揚㩁已詳今之所詮名物而已一詩人之作摭流景於目前寄心曲於形表孔子曰多識於鳥獸草木之名比類而言幾乎上窮景緯下括輿圖中偹人事予今具釋列為三十二門門各若干事詩之名物殫於此矣一漢世說詩者齊魯毛韓分鑣竝驅洎乎鄭箋續綴毛説孤行朱傳晚成學官犆立古今名家不越乎此其詁中名物詮釋如左雖三氏淪亡而羣書錯引固可得而偹論也其他如歐之本義王之新說蘇吕錢董諸家雖式存遺牒未列學官各剙新竒無煩翰墨一篇首小序或云西河手剙或云國史編題甚則髙子加其枝指衛宏成其虵足既非古經故不存今疏一分門著疏有總有别總則觕陳梗槪别則曲致發揮何者如禮是總名吉凶諸儀為禮之别樂是總名聲容諸器為樂之别若禮樂備書則數帙未竟若儀器稍缺則一物全疎所以錯意立文詳畧各異推之諸類亦猶是也一六經之文齊定宣聖三雅之釋竝稟姬公斯紀載之冠冕文章之潭窔此疏之設本為明經以經解經辟猶以水投水雖欲無合其可得乎故詳加蒐輯鮮或缺遺子史文集則簡汰浮華導揚指要若夫鳥獸草木産窮荒絶徼之區靈怪鬼神出虞初奚堅之志無禆經學未遑縷數一詩人詠物據謡俗以屬篇先哲解經縁師門而聚訟所以種類紛揉訓故蹖駁予不揆檮昧輒附管窺庶或助錦帶之揮麈解青衿之疑網若離經畔正逞已葢人乃是木零捐本狐斃忘丘旣篤論之攸譏良予心之所懼也一典冊浩汗援據紛紜刋除既病於不該採掇復虞於叢委故所述之書或芟煩就簡或移後從前或著論櫽括其言或他章錯綜其義盖編次惟取省文考練尚宜探本一古多竒字兼有借音誠恐披觀駭目諷誦聱牙輒於籍端隨加翻切若字同用異則必兩載以示㫖或聲别義均則從一音以便讀一自姬漢以來儒學成林縹緗充棟予材非贍敏思謝淵沈而欲廣前說之波瀾拯諸家之失隊力小任重不亦惑乎然而勉希十駕自勵三餘雖同華子之病忘竊效甯生之篤學少習是經旁通諸籍少究指歸因縁互證爰抽腹笥以示門人久之時術之徒編綴成集問字之客用傳好事非有心於著述致未純於體例譌謬良多挂漏不免將來涉者倘加補正則甚幸云六家詩名物疏叙例六家詩名物疏引用書目申公魯故齊后氏故韓嬰内傳薛君章句韓詩外傳卜子夏小序毛萇傳鄭𤣥箋鄭𤣥譜王肅毛詩注王肅毛詩雜義駁劉楨毛詩義問王基毛詩駁韋昭毛詩答雜問孫毓異同評蔡謨毛詩疑字議崔霛恩集注劉芳義疏陸璣艸木蟲魚疏毛詩草蟲經孔頴逹正義陸徳明釋文徐鉉草木蟲魚圖歐陽修本義二程新解蘇轍集解王安石新經義藍田二呂説董逌廣川詩詁丘氏說李詳解林之竒解鄭樵詩傳劉彛說胡寅說陳鵬飛說朱熹集傳吕祖謙家塾讀詩記徐氏說傅氏說范處義解頥新語范處義補傳曹氏説陳傅良說戴溪續讀詩記錢文子詩詁黄櫄解李如圭說輔廣説濮一之説嚴粲詩輯王應麟詩考王應麟詩地里考項安世說羅中行説朱公遷疏義梁寅疏詩經大全季本釋季本字義馮時可詩臆凡詩六十部易歸藏周易京房傳易鄭𤣥注易王弼注易荀爽九家注孔頴逹正義元包經傳凡周易七部尚書伏生傳孔安國傳歐陽說鄭𤣥注顧彪正義孔頴逹正義蔡沈傳尚書逸篇尚書大傳鄭𤣥注汲冡周書劉向洪範五行傳論凡尚書十一部周禮杜子春注周禮鄭衆注周禮馬融注周禮鄭𤣥注周禮干寳注周禮崔霛恩注周禮