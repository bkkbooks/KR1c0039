body:
  text: 六家詩名物疏卷七明馮復京撰國風召南三殷其靁篇靁釋名云雷者如轉物有所硠雷之聲也易云雷出地奮豫先王以作樂崇德又云天地解而雷雨作雷雨作而百果草木皆甲坼又云震為雷震驚百里驚逺而懼邇也又云動萬物者莫疾乎雷禮云仲春之月日夜分雷乃發聲仲秋之月雷乃收聲穀梁傳云隂陽相薄而為雷激而為霆洪範論曰雷于天地為長子以其首長萬物與其出入也河圖帝通紀云雷者天之鼓五行傳云於易雷以二月出其卦曰豫言萬物隨雷出地皆逸豫也以八月入其卦曰歸妹言雷復歸入地則孕育根核保藏蟄蟲避盛隂之害出地則養長華實發揚隱伏宣盛陽之德入能除害出能興利人君之象也論語讖云雷震百里聲相附宋均注雷動百里故因以制國雷聲謂諸侯之政教所至相附也鄭箋云雷喻號令物理論云積風成雷師曠云春雷初起其音洛洛霹靂者所謂雄雷旱氣也其鳴依依音不大霹靂者謂之䳄雷水氣也京房易傳曰當雷不雷陽德弱也董仲舒曰太平之世雷不驚人號令啓發而已埤雅云古文雷字下從四田二回自子至卯積四陽而復雷乃發聲此所以從四田也隂陽回薄此所以從二回也雷聲尚隱隱然易曰雷雨之動滿盈殷殷滿盈之聲也山爾雅云山三襲陟再成英一成坯大而髙嵩小而髙岑鋭而髙嶠卑而大扈小而衆巋小山岌大山垣屬者嶧獨者蜀上正章宛中隆山脊岡未及上翠微山頂冡崒者厜㕒山如堂者密如防者盛巒山墮重甗隒左右有岸厒大山宮小山霍小山别大山鮮山絶陘多小石磝多大石礜多草木岵無草木峐山上有水埒夏有水冬無水山豄無所通溪石戴土謂之崔嵬土戴石為砠山夾水澗陵夾水澞山有穴為岫廣雅云山産也凡天下名山五千二百七十出銅之山四百六十有七出鐵之山三千六百有九春秋説題辭云山之為言宣也含澤布氣調五神也又云隂含陽故石凝為山元命包云山者氣之苞含所以含精藏雲故觸石而出運斗樞云山者地基禹貢云導岍及岐至于荆山逾于河壺口雷首至于大嶽底柱析城至于王屋太行恆山至于碣石入于海西傾朱圉鳥鼠至于太華熊耳外方桐柏至于陪尾導嶓冡至于荆山內方至于大别岷山之陽至于衡山過九江至于敷淺原周禮職方揚州山鎮會稽荆州衡山豫州華山青州沂山兖州岱山雍州嶽山幽州醫巫閭冀州霍山并州恆山山海經禹曰天下名山經五千三百七十山六萬四千五十六里其餘小山甚衆不足記書大傳孔子曰山生材用無私為焉四方皆伐無私與焉出雲雨以通乎天地之間隂陽和合雨露之澤萬物以成百姓以饗摽有梅篇梅爾雅云梅柟郭云似杏實酢孫炎云荆州曰梅揚州曰柟又曰時英梅郭注雀梅詩義疏云梅杏類也樹及葉皆如杏而黑煮而曝乾為蘇置羹臛虀中又可含以香口賈思協云梅華早而白杏花晚而紅梅實小而酸杏實大而甜梅可以調鼎杏則不任此用世人或不能辨言梅杏為一物陸農師云梅華尤香先桃李而華至北方多變成杏故人有不識梅者地氣使然爾雅翼云古者以梅實薦饋食之籩所謂乾䕩蜀志云蜀名梅為䕩大如鴈子其實既酸故以為和商書所謂爾惟鹽梅禮記則獸用梅而已夏小正云正月梅杏柂桃則華五月煮梅為豆實管子五沃之土其梅其杏其桃其李西京雜記云漢初修上林苑羣臣各獻名果有朱梅紫華梅紫蒂梅同心梅麗支梅燕梅侯梅按郭璞云梅似杏實酢正是江南之梅而邢昺引陸璣疏與江南之梅花葉不同蓋陸自説秦風之梅耳又西京雜記上林苑有侯栗侯梅别是異種四月詩稱侯栗侯梅者殆即其物也范石湖梅譜凡九十餘種不能悉載士説文云士事也數始于一終於十從十從一孔子曰推十合一為士小星篇星釋名曰星散也列位布散也宿宿也星各止宿其所也説文云萬物之精上為列星春秋説題詞云星之為言精也陽之榮也陽精為日日分為星故其字日生為星洪範曰庶民惟星星有好風星有好雨月之從星則以風雨注月經於箕則多風離於畢則多雨周禮以實柴祭日月星辰禮記云宿離不忒無失經紀注二十八宿為經七曜為紀又云天秉陽垂日星爾雅云彗星為欃槍奔星為彴約祭星曰布列子云星積氣之中有光曜者物理論云星者元氣之英水之精也靈憲云星者體生於地精成於天列居錯峙各有逌屬在野象物在朝象官在人象事其以神著有五列焉是謂三十五名一居中央謂之北斗四布於方為二十八宿中外之官常明者百有二十四可名者三百二十為星二千五百微星之數蓋萬一千五百二十庶物蠢蠢咸得繫命劉向云天官列宿在位之象小星無名者庶民之類徐整長厯云大星徑百里中星五十小星三十北斗七星星間相去九千里皆在日月下其二隂星不見者相去八千里史記云角亢氐兖州房心豫州尾箕幽州斗江湖牽牛婺女揚州虛危青州營室東壁并州奎婁胃徐州昴畢冀州觜觹參益州東井輿鬼雍州柳七星張三河翼軫荆州又云星墮地即石也博雅云東方七宿七十五度南方七宿百一十二度西方七宿八十度北方七宿九十八度四分度之一歲星謂之重星或謂之應星營惑謂之罰星或謂之執法鎮星謂之地侯太白謂之長庚或謂之太囂辰星謂之鈎星免星或謂之鈎星大角謂之栜星天宫謂之參旗紫宫參伐謂之大辰太微房謂之明堂嬃女謂之婺女參謂之實沈昴謂之旄頭東井謂之鶉首張謂之鶉尾軫謂之鳥孥營室謂之豕韋北辰謂之天堂天淵謂之紐兹妃星謂之大堂天淵謂之三淵軒轅謂之路寢輿鬼謂之天廟三傳云三心爾雅云大火謂之大辰注大火心也在中最明故時候主焉疏大火大辰之次名也左傳張躍云火中寒暑乃退注心以季夏昏中而暑退季冬旦中而寒退荆州星占云心為天王其宿三星一名天司空晉天文志云心三星天王正位也中星為明堂天子位為大辰主天下之賞罰天下變動心星見祥星明大天下同前星為太子後星為庶子心星直則天王失勢箋云心在東方三月時也五傳云五噣爾雅云咮謂之柳柳鶉火也疏南方七宿共為朱鳥之形柳為朱鳥之口故名咮文耀鈎云咮謂鳥陽七星為頸注云陽猶首也元命包云柳五星樂汁圖徴云柳主材木史記正義云柳占以順明為吉金火守之國兵大起漢書云柳為鳥喙主木草晉天文志云柳八星天之厨宰也主尚食和滋味又主雷雨箋云噣在東方正月時也宵爾雅云宵夜也舍人曰宵陽氣消也在公周禮九嬪掌教九御各帥其屬以時御敘于王所注云凡群妃御見之法月與后妃其象也卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕十五日而遍望後反之又云女御掌御敘於王之燕寢內則云妾年未五十必與五日之御將御者齊潄浣慎衣服櫛縰笄總拂髦襟纓綦屨注云五日一御諸侯制也諸侯取九女姪娣兩兩而御則三日次兩媵四日次夫人專夜五日又云妻不在妾御莫敢當夕疏云謂卿大夫以下書大傳云古者后夫人將侍君前息燭後舉燭至於房中釋朝服襲燕服然後入御史奏雞鳴于階下然後夫人鳴珮玉于房中告去也然後應門擊柝告闢也然後少師奏質明于陛下夫人入庭立君出朝五經要義云后妃羣妾以禮御于君所女史書其日月授之以環以進退之生子月辰則以金環退之當御者以銀環進之著于左手既御著于右手參前漢天文志云參為白虎三星直者是為衡石下有三星鋭曰罰為斬艾事孟康曰在參間上小下大故曰鋭晉志云參十星一曰參伐一曰大辰一曰天市一曰鈇鉞主斬刈又為天獄主殺伐又主權衡所以平理又主邊城為九譯故不欲其動也其中三星橫列三將也東北曰左肩主左將西北曰右肩主右將東南曰左足主後將軍西南曰右足主偏將軍故黃帝占參應七將中央三小星曰伐天之都尉也主戎狄故不欲眀王道缺則芒角張伐星明與參等大臣皆謀兵起孔仲達云參實三星下三星曰伐其外四星左右肩股也伐與參連體亦為大星故周禮熊旗六旒以象伐演孔圖云參以斬伐公羊傳云伐為大辰明伐得統參也夏小正云三月參則伏又云五月參則見見也者牧星也昴爾雅云大梁昴也西陸昴也疏大梁昴之次名也昴西方之宿名也昴又謂之西陸昭四年左傳云古者日在北陸而藏氷西陸朝覿而出之又十三年傳云嵗及太梁蔡復楚凶是昴星之名凡三元命包云昴六星昴之為言留言物成就繫留也晉志云昴七星天之耳也主西方主獄事又為旄頭胡星也昴畢間為天街天子出旄頭罕畢以前驅此其義也黃道之所經也昴星大而數盡動者胡兵大起夏小正云四月昴則見衾説文云衾大被也釋名云被所以被覆人也衾廣也其下廣大如廣受人也裯傳云裯襌被也箋云牀帳也爾雅云幬謂之帳疏鄭箋云裯牀帳也幬裯音義同説文曰幬單帳也在旁曰帷在上曰幕爾雅又云以覆帳謂之幄釋名云小幕曰帟歸藏云昔女媧筮張雲幕而枚占神明周禮幕人掌帷幕幄帟綬之事江有汜篇汜爾雅云決復入為汜疏凡水之岐流復還本水者曰汜釋名云汜已也如出有所為畢已而還入也朱子曰今江陵漢陽安復之間蓋多有之又云楚詞哀郢遵江夏以流亡江大江也夏夏水也或以為自江而别以通於漢還復入江冬竭夏流故謂之夏其入江處今名夏口即詩所謂江有汜也宋安州即今德安府復州今沔陽州俱隸湖廣渚釋名云小洲曰渚渚遮也體髙能遮水使從旁回也博雅云渚處也韓詩章句云一溢一否曰渚毛氏云水岐成渚沱爾雅云江為沱疏大水溢出别為小水之名禹貢荆梁二州沱潛既道孔安國注梁州云沱潛發源此州入荆州禹貢又云岷山導江東别為沱水經氐道縣江水又東别為沱注云開明之所鑿也郭景純謂玉壘作東别之標蔡氏云爾雅水自江出為沱南郡枝江縣有沱水然其流入江而非出于江也華容縣有夏水首出於江尾入於沔亦謂之沱此荆州之沱蜀郡郫縣江沱在東西入大江汶江縣江沱在西南東入江此梁州之沱黃氏曰沱自導江縣分江東至眉州彭山縣入江按一統志枝江縣今屬湖廣荆州府沱江在當陽縣治南至枝江縣界入大江華容縣屬嶽州府郫縣屬四川成都府汶江縣今為成都府灌縣即唐宋之導江縣沱江在新繁縣西北源出岷江眉州彭山縣亦屬四川歌廣雅云聲比於琴瑟曰歌説文云歌詠也謡徒歌也謳齊歌也釋名云人聲曰歌歌柯也所歌之言是其質也以聲吟詠有上下如草木之有柯葉也故兖冀言柯聲如歌也韓詩章句云有章曲曰歌無章曲曰謡又云飢者歌食勞者歌事五經通義云歌之言歡也以厚志意故發聲而歌長言山海經云帝俊八子是始為歌吕氏春秋云帝嚳氏命咸黑作為唐歌堯命質效山林溪谷之音以歌書云歌永言又云九功惟敘九敘惟歌周禮大司樂歌大吕祀天神歌應鍾祭地示歌南吕祀四望歌函鍾祭山川歌小吕享先妣歌夾鍾享先祖大師大祭祀帥瞽登歌大饗亦如之小師掌教弦歌徹歌瞽矇掌弦歌掌九德六詩之歌以役大師樂記曰歌者直已而陳德也上如抗下如隊曲如折止如藁木倨中矩句中鈎纍纍乎端如貫珠故歌之為言也長言之也禮書云天子之祭祀養老饗諸侯諸侯之相見魯之嘗禘皆升歌下管貴人聲也鄉飲燕禮有歌笙與間而後合樂鄉射有合樂而無歌笙與間大射有歌而無間笙有管而無合樂六家詩名物疏卷七
