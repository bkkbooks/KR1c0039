body:
  text: 六家詩名物疏卷三十明馮復京撰國風豳二七月篇下股說文髀也釋名云股固也爲强固也莎雞爾雅云螒天雞樊光曰小蟲黑身赤頭李巡曰一名酸雞郭璞曰一名莎雞一名樗雞陸疏云如蝗而斑色毛翅數重其翅正赤六月中飛而振羽索索作聲幽州人謂之蒲錯本草樗雞生河内樗樹上七月採蘇恭云五色具者爲雄青黑質白斑者是雌圖經云今所謂莎雞亦生樗木上六月後出飛而振羽作聲人或畜之樊中但頭方腹大翅羽外青内紅而身不黑頭不赤此殊不類惟在樗木上人呼紅娘子者頭翅皆赤乃如舊說然不名莎雞疑古今之稱不同耳衍義云樗雞東西京都尤多形類蠶蛾但頭足微黑翅兩重外一重灰色下一重深紅五色皆具腹大廣志云莎雞似蠶蛾而五色亦曰犨雞古今注云莎雞一名促織一名蟋蟀促織謂鳴聲如急織絡緯謂其鳴聲如紡績也一曰促機一曰紡緯埤雅云俗云絡緯雄鳴于上風雌鳴于下風而風化雅翼云莎雞頭小而羽大有青褐兩種一名絡緯今人謂之絡絲娘小兒亦養之夜聽其聲能食瓜莧之屬莎雞與絡緯是一物蟋蟀與促織是一物崔豹不當合而言之蓋二蟲俱似機杼聲可以趣婦功故易紊亂孫炎郭璞陸機廣志所云皆非其類今莎雞之鳴乃止而振羽不待飛也一名馬􅝺按斯螽蟲之以股鳴者莎雞蟲之以翼鳴者蟋蟀蟲之以注鳴者逈然三物也朱子云一物隨時變化而異其名其誤起于程正叔而正叔之誤又起于崔正熊正熊混莎雞蟋蟀爲一正叔又混入斯螽可謂誤中之誤羅氏辨之精矣今時驗亦然宇韓詩云宇屋霤也釋文云屋四垂爲宇釋名云宇羽也如鳥羽翼自覆蔽也繫辭云上棟下宇以待風雨牀釋名云牀裝也所以自裝載也長狹而卑曰榻小者獨坐通俗文云牀三尺五曰榻板獨坐曰秤八尺曰牀說文云牀身之安也杠牀前木也方書云牀杠北燕朝鮮謂之樹闗西秦晉謂之杠南楚謂之趙東齊海岱謂之樺其上板衞之北郊趙魏謂之牒或曰牑廣雅云棲謂之牀周禮玉府掌王之牀第天文集云紫宫門外有天牀六星向士虞禮云祝啓牖嚮注嚮牖一名也韓詩云北向牕也鬱毛詩義問云其樹高五六尺實大如李正赤食之甜疏云晉宫闕銘云華林園中有車下李三百一十四株薁李一株車下李即鬱薁李即薁二者相類而同時熟薁本草云郁李一名爵李一名車下李一名棣生高山川谷及丘陵上五月六月採根陸璣云唐棣薁李也一名雀梅亦曰車下李所在山皆有其華或赤或白五月中成實大如李子可食本草圖經云郁李木高五六尺枝條葉花皆若李惟子小若樓桃赤色而味甘酸核隨子熟六月採根并實取核中仁用按薁一名郁李一名薁李一名蘡薁一名燕薁一名棣一名爵李一名車下李廣雅謂之蘡舌與鬱俱棣屬也故同得車下李之名陸璣以唐棣爲薁李非也而以爲實大如李則得之本草圖經謂郁李子如櫻桃則似說常棣非郁李也郁李雖棣屬然非爾雅所謂唐棣常棣也古之說者惟不知唐棣爲扶栘木而以爲薁又不知薁别是一種而以爲常棣故本草注及詩緝諸說俱誤今由陸璣崔豹鄭樵及本草諸說參詳之始知其别如此魏王花木志云燕薁實如龍眼黑色說文謂之蘡薁詩疏一名車鞅藤豳詩六月食薁者此也廣志曰燕薁似棃早熟據此又非郁李而二說亦相矛盾殆不足取證韓詩薁字又作藿是爾雅所謂藿山韭者非毛詩之薁爾雅翼云山韭形性與韭相類但根白葉如燈心苗葵李氏曰葵可茹公儀所拔是也周禮醢人葵菹蠃醢特牲記云鉶芼夏葵冬荁齊民要術云今世葵有紫莖白莖二種春必畦種水澆而冬種者有雪勿令從風飛起每雪輒一勞之勞雪令地保澤葉又不蟲掐必待露解收必待霜降傷晚則黄爛傷早則黑澀詩曰七月烹葵及菽即此是也本草云葵葉爲百菜主陶隱居云以秋種葵覆養經冬至春作子謂之冬葵至滑利春葵子亦滑葉尤冷利不可多食術家取此葵子微炒散著濕地遍踏之朝種暮生逺不過宿日華子云冬葵久服堅筋骨秋葵即是種早者四民月令云正月可種葵四月可收冬葵子六月六日可收葵中伏可種乾葵埤雅云左傳葵能衞足今葵心隨日光所轉輒低覆其根似智字說曰草也能揆日向焉故又訓揆按爾雅云菺戎葵即今之蜀葵也又云荍蚍􅗶即今之錦葵也又云蔠葵蘩露即本草之落葵也又云莃菟葵似葵而小葉者是也本草又有黄蜀葵龍葵皆非此七月所烹之葵七月所烹者即今秋葵爾菽采菽箋云菽大豆也生民傳云荏菽戎菽也箋云戎菽大豆也物理論云菽者衆豆之總名爾雅云戎菽謂之荏菽孫炎曰大豆也廣雅曰大豆菽也小豆答也豍豆豌豆䝀豆也胡豆䜶􅭾也豆角謂之莢其葉謂之藿春秋說題詞云菽者屬也春生秋熟理通體屬也菽赤黑隂生陽大體應節小變象陽色也援神契云赤土宜菽吕氏云得時之菽長莖而短足其莢二七以爲族多枝數節競葉蕃實大菽則圓小菽則摶以芳稱之重食之息以香如此者不蟲先時者必長以蔓浮葉疏節小莢不實後時者短莖疏節本虛不實汜勝之書云三月榆莢雨時高田可種大豆保歲易爲宜古之所備凶年也大豆生戴甲而出種土不可厚厚則項折不能長達夏至後二十日尚可種小豆不保歲難得宜椹黑時種雅翼云羞籩之實􅟿餌粉餈皆稻米黍米所爲以其黏著故𢷬粉熬大豆以爲表按菽鄭氏常以大豆言之即生民之荏菽也釋草云戎菽謂之荏菽孫炎云大豆諸家或以爲胡豆后稷播種豈應近舍中國之種而逺種胡豆乎明孫說是矣此詩言烹菽廣雅云葉謂之藿公食禮鉶芼牛藿羊苦黍薇當是烹豆葉以爲羮耳棗爾雅云棗壺棗邊要棗櫅白棗樲酸棗楊徹齊棗遵羊棗洗大棗煑填棗蹶洩苦棗晳無實棗還味捻棗又云棗李曰疐之周禮饋食之籩其實棗禮記婦人之贄脯修棗栗又云棗曰新之又云棗栗飴蜜以甘之青史子云棗北方之草冬木也本草云大棗味甘平主心腹邪氣安中養脾助十二經平胃氣通九竅補少氣少津液和百藥久服輕身長年八月採暴乾圖經云棗極美者有水菱棗御棗之類羅氏云棗有十一名郭氏得九焉後世有紫棗𤣥棗西王母棗東海蒸棗洛陽夏白與夫雞心牛頭羊矢獮猴細腰其名不可勝載淮南子十一月棗棗取其赤心埤雅云棘大者棗蓋若酸棗所謂棘也於文重束爲棗並束爲棘一曰棘實曰棗蓋棗性重喬棘則低矣故其制字如此詩曰八月剥棗剥擊也棗實未熟雖擊不落已熟則爛不擊自墮齊民要術所謂全赤即收收法撼而落之爲上是也且棗全赤即收故乾則紅皺復無烏鳥之費半赤而收者肉未充满乾復黄皺將赤味亦不佳故於全赤之時剥而落之世云噉棗令人齒黄齒居晉而黄食此故也春酒疏周禮清酒注云今之中山冬釀接夏而成者然則春酒即彼三酒之中清酒也瓜廣雅云冬瓜也水芝瓜也其子謂之龍􅕭虎掌羊骹兔頭桂支宻筩貍頭白㼐無餘縑瓜屬也夏小正云五月乃瓜乃者急瓜之辭也瓜也者始食也八月剥瓜蓄瓜之時也禮記云爲天子削瓜者副之巾以絺爲國君華之巾以綌爲大夫累之士㚄之庻人齕之又云瓜祭上環食中棄所操又云天子樹瓜華不斂藏之種也本草瓜蔕七月採圖經云即甜瓜蔕也又有白瓜越瓜胡瓜埤雅云瓜字象其實在鬚蔓之間性少延輒腐尤忌聞麝乃至一蔕不收壺傳云壺瓠也埤雅云似匏而圓曰壺壺圜器也故謂之壺亦曰壺盧古今注曰壺盧瓠之無柄者也性善浮要之可以渉水南人謂之要舟又可爲樽春秋傳曰樽以魯壺司尊彞曰秋嘗冬蒸饋獻用兩壺尊詩曰八月斷壺壺性蔓生披蔓斬之故曰斷也今其收法八月冷露降輒先斷其根令其餘蔓飲之巳日乃收尤堅成可用苴喪服注云苴麻之有實者疏云麻九月初熟拾取以供羮菜本草經云麻子味甘平主補中益氣久服肥健不老月令仲秋食麻與犬孟冬天子以犬嘗麻樗陸璣疏云樗樹及皮皆似漆青色其葉臭本草圖經云椿樗二木相類但椿木實而葉香可噉樗木疎而氣臭膳夫亦能熬去其氣北人呼樗爲山椿江東呼爲虎目葉脫去有痕如樗蒱子又如眼目故得此名衍義云世以無花不實木身大其幹端直者爲椿其有花而筴木身小幹多迂矮者爲樗莊子云吾有大樹人謂之樗其大本臃腫而不中繩墨其小枝拳曲而不中規矩農周禮太宰以九職任萬民一曰三農生九穀管子曰一農之量包百畝上農挾五中農挾四下農挾三國語管仲云昔聖王處農就田野及寒擊菒除田以待時耕及耕深耕而疾耰之盡其四支之敏以從事於田野少而習焉其心安焉是故農之子恒爲農其秀民之能爲士者必足賴也場孔仲達云種樹菜果謂之圃蹂踐禾稼謂之場故春夏爲圃秋冬爲場周禮場人注場築地爲墠季秋除圃中爲之重穋說文種先種後熟也稑疾熟也稑或从翏周禮内宰上春詔王后生穜稑之種鄭司農云先種後熟謂之穜後種先熟謂之稑𤣥謂詩云黍稷穜稑是也賈公彦云先鄭直云先種後種不見穀名後鄭意黍稷皆有穜稑又云舍人以歲時縣穜稑之種以共王后之春獻種司稼辨穜稑之種晝說文云日之出入與夜爲界从畫省綯爾雅云綯絞李巡曰繩之絞也百穀物理論云梁者黍稷之總名稻者漑種之總名菽者衆豆之總名三穀各二十種爲六十種蔬果之實助穀各二十種爲百穀故詩曰播厥百穀者衆種之大名也周禮太宰九穀注先鄭云黍稷秫稻麻大小豆大小麥後鄭謂無秫大麥有梁苽膳夫王食用六穀注云稌黍稷粱麥苽疾醫以五穀養其病注云麻黍稷麥豆職方氏揚州荊州其穀宜稻豫州其穀宜五種注云黍稷菽麥稻青州其穀宜稻麥兗州其穀宜四種注云黍稷稻麥雍州其穀宜黍稷幽州其穀宜三種注云黍稷稻冀州其穀宜黍稷并州其穀宜五種月令五時食穀春麥夏菽季夏稷秋麻冬黍孟秋農乃登穀内則牛宜稌羊宜黍豕宜稷犬宜粱雁宜麥魚宜苽漢食貨志五種注麻金黍火稷土麥水豆木大戴禮云食氣者神明而壽食穀者智慧而巧穀梁傳云一穀不升謂之歉二穀不升謂之饑三穀不升謂之饉四穀不升謂之康五穀不升謂之大侵淮南子云汾水濛濁而宜麻濟水通和而宜麥河水中濁而宜菽雒水輕利而宜禾渭水多力而宜黍江水肥仁而宜稻凌陰周禮凌人正歲十有二月令斬冰三其凌春始治鑑夏頒冰掌事秋刷獻羔月令仲春天子乃鮮羔開冰先薦寢廟注鮮當爲獻獻羔祭司寒也左傳申豐云其藏冰也黑牡秬黍以享司寒獻羔而啓之杜預云二月春分獻羔祭韭開冰室服䖍云司寒司隂之神𤣥㝠也韭說文云一種而久者故謂之韭象形在一之上一地也禮曰庻人春薦韭祭宗廟韭曰豐本内則豚春用韭埤雅云齊民要術云韭高三寸便剪剪如葱法一歲之中不過五剪凡剪不用日中韭性内生根喜上跳故種與葵同法而畦欲極深雅翼云首春色黄未出土時最美故云春初早韭冬末晚菘夏小正曰正月囿有韭易稽覽圖云政道得則隂物變爲陽鄭注云若葱變爲韭本草云韭辛温歸心安五藏除胃中熱饗傳云饗者鄉人以狗大夫加以羔羊箋云十月民事俱畢國君閒于政事而饗羣臣月令孟冬大飲烝注十月農功畢天子諸侯與羣臣飲酒於大學以正齒位謂之大飲别之於他其禮亡今天子以燕禮郡國以鄉飲酒禮代之燕謂有牲體為俎也按傳所云饗者謂黨正因蜡飲酒黨正職云國索鬼神而祭祀以禮屬民而飲酒於序以正齒位一命齒于鄉里再命齒于父族三命不齒鄉飲酒經云尊兩壺于房户之間有𤣥酒即此詩云朋酒也記云其牲狗即毛傳所據也鄉飲酒禮賔興賢能與黨正飲酒不同毛據為説者以州黨鄉之屬也其有鄉大夫來觀禮或鄉之所居州黨鄉大夫親為主人則殺羔羊以饗之公堂大學互見大雅辟廱傳云公堂學校也疏云謂黨之序學周禮州長春秋以禮㑹民射于州序黨正以禮屬民飲酒于序學記云古之教者家有塾黨有庠術有序國有學陳氏曰術當為州鄭禮記注云庠鄉學也州黨曰序孟子曰殷曰序序者射也禮書云鄉飲在庠庠有房室鄉射在序序無房室爾雅云東西牆謂之序序之名蓋本于此疏云箋以公堂謂之太學禮書云四代之學虞則上庠下庠夏則東序西序商則右學左學周則東膠虞庠而周又有辟廱成均瞽宗之名則上庠東序右學東膠大學也故國老于之養焉下庠西序左學虞庠小學也故庻老于之養焉記曰天子設四學蓋周制也周之辟廱即成均東膠即東序瞽宗即右學成均居中左東序右瞽宗此大學也虞庠在國之西郊則小學也商之右學周謂之西學亦謂之瞽宗夏之東序周謂之東膠亦謂之大學蓋夏學上東下西商學上右下左周特存其上者耳諸侯之學小學在内大學在外天子之學小學居外大學居内鴟鴞篇鴟鴞爾雅云鴟鴞鸋鴂郭璞曰鴟類方言云桑飛自闗而東謂之工爵或謂之果鸁或謂之女匠謂之鸋鴂自闗而西謂之桑飛或謂之韈爵郭璞曰桑飛即鷦鷯也按爾雅云鸋鴂鴟鴞鴟屬非此小雀明矣陸疏云鴟鴞似黄雀而小其喙尖如錐取茅莠爲窠以麻紩之如刺襪然縣著樹枝或一房或二房幽州人謂之鸋鴂或曰巧婦或曰女匠闗東謂之工雀或謂之過羸闗西謂之桑飛或謂之襪雀或曰巧女小毖傳云桃蟲鷦也鳥之始小終大者箋云鷦之所爲鳥題肩也或曰鴞皆惡聲之鳥陸璣疏云今鶴鷯是也微小於黄雀其雛化而爲雕故俗語鷦鷯生雕爾雅又曰桃蟲鷦其雌鴱郭璞曰鷦􅛯桃雀也俗呼爲巧婦邢昺曰此鷦􅛯小鳥而生雕鶚者也張華鷦鷯賦云翳薈蒙籠是焉游集飛不飄颺翔不翕習巢林不過一枝每食不過數粒朱傳云鴟鴞鵂鶹惡鳥攫鳥子而食者也埤雅云先儒以爲鴟鴞即今巧婦郭注爾雅獨云鴟類則璞與先儒異意以詩與爾雅考之宜如璞義蓋爾雅言鴟鴞鸋鴂繼云狂茅鴟怪鴟梟鴟則鴟鴞宜亦鴟類賈誼所謂鸞鳯伏竄鴟鴞翺翔是也鴟鵂一名隻狐鴞服鬼車之類爾雅云鵅鵋䳢注今江東呼鵂鶹爲鵋欺亦謂之鴝鵅又云怪鴟注即鴟鵂也見廣雅今江東通呼此屬爲怪鳥莊子云鵂鶹夜撮蚤察毫末晝出瞑目不見丘山言殊性也博物志云鵂鶹一名鵄鵂晝目無所見夜則目至明人截爪甲棄露地此鳥夜至人家拾取爪視之則知吉凶輒便鳴其家有殃本草云鉤鵅入城城空入宅宅空怪鳥也又有鵂鶹亦是其類微小而黄夜能拾人手爪知人吉凶纂文曰鵂鶹夜能拾蚤虱蚤爪音相近俗人云拾人棄爪相吉凶妄說也淮南萬畢術曰鵄鵂致鳥取鵄鵂折其大羽絆其兩足以爲媒張羅其旁則鳥聚矣歐陽氏云今鴞多攫鳥子而食按鴟鴞名鸋鴂巧婦亦名鸋鴂故先儒多誤以鴟鴞爲巧婦其實鴟鴞是鴞類耳衞風流離之子此土梟也陳風有鴞萃止此爾雅之梟鴟也並非此鴟鴞朱傳以爲鵂鶹則又誤鵂鶹爾雅謂之鵅鵋䳢又云怪鴟不得爲鴟鴞也若巧婦乃周頌之桃蟲耳據本草則鵋䳢鵂鶹又是二物及鄭氏云鷦鷯生題肩與鴞亦無所出難以管見定其然否韓詩說云鴟鴞鸋鴂鳥名也鴟鴞所以愛養其子者適以病之愛憐養其子者謂堅固其窠巢病之者謂不知託於大樹茂枝反敷之葦䓟風至䓟折有子則死有卵則破是其病也與荀子所說蒙鳩同楊倞荀子注云蒙鳩鷦鷯也是韓嬰亦以鴟鴞爲巧婦也桑土方言云東齊謂根曰土字林作􅪂桑皮也荼傳曰荼萑苕疏謂薍之秀穗也出其東門傳云荼茅秀然則茅薍之秀相類故皆名荼口易說卦云兌爲口禮記云口容止左傳口不道忠信之言爲嚚鬼谷子云口者機闗也所以開閉情意也又曰口可以食不可以言養生經云軍營之有甘泉軍營口也甘泉唾也釋名口空也六家詩名物疏卷三十
