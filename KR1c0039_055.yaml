body:
  text: 六家詩名物疏卷五十二明馮復京撰周頌清廟之什清廟篇顯相箋云諸侯來助祭周禮云甸服者祭侯服者祀賔服者享日祭月祀時享何休公羊注云王者貴得天下之歡心以事其先王因助祭以述其職故分四方諸侯為五部部有四輩輩主一時孝經曰四海之內各以其職來助祭尚書曰羣后肆朝是也我將篇將享序云祀文王於明堂疏云此祀明堂是大享五帝非迎氣告朔也五帝之牲用特牛文武為配於禮得有羊孝經云昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來祭曲禮云大饗不問卜不饒富月令季秋上丁命樂正入學習吹是月也大饗帝樂記曰祀乎明堂而民知孝祭法云虞祖顓頊而宗堯夏祖顓頊而宗禹殷祖契而宗湯周祖文王而宗武王注云祭五帝五神於明堂曰祖宗明堂位云明堂也者明諸侯之尊卑也周公朝諸侯於明堂制禮作樂頒度量而天下大服考工記云夏后氏世室堂修二七廣四修一五室三四步四三尺九階四旁兩夾窗白盛門堂三之二室三之一殷人重屋堂修七尋堂崇三尺四阿重屋周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵周書明堂曰方百一十二尺高四尺階廣六尺三寸室居中方百尺室中方六十尺東應門南庫門西臯門北雉門東方曰青陽南方曰明堂西方曰總章北方曰玄堂中央曰大廟以左為左個右為右個帝命驗云帝者成天立府以尊天重象赤曰文祖黃曰神斗白曰顯記黑曰玄矩蒼曰靈府大戴禮云明堂凡九室一室而有四户八牖三十六户七十二牖以茅蓋屋上圓下方外水名曰辟雍含文嘉云明堂所以通神靈感天地正四時禮記外傳云一堂之上為五室南靣三階五室者象地載五行也五行生於四時故每室四達援神契云周之明堂在國之陽三里之外七里之內在辰巳時邁篇時邁序云時邁巡狩告祭柴望也尚書云嵗二月東巡狩至于岱宗柴望秩于山川肆覲東后協時月正日同律度量衡修五禮五玉三帛二生一死贄如五器卒乃復五月南巡狩至于南嶽如岱禮八月西巡狩至于西嶽如初十有一月朔巡狩至于北嶽如西禮歸格于藝祖用特周禮大司馬云及師大合軍以行禁令以救無辜伐有罪注云師謂巡狩會同職方氏王將巡狩戒于四方曰各修平乃守考乃職事無敢不敬戒及王之所行先道師其屬而巡戒令王殷國亦如之大行人十有二嵗王巡狩殷國土訓誦訓王巡狩則夾王車王制云天子五年一巡守柴而望祀山川覲諸侯問百年者就見之命太師陳詩以觀民風命市納賈以觀民所好惡命典禮考時月定日同律禮樂制度衣服正之山川神祗有不舉者為不敬君削以地宗廟有不順者為不孝君絀以爵變禮易樂者為不從君流革制度衣服者為畔君討有功德於民者加地進律大戴禮云十有二嵗天子巡狩是故諸侯上不敢侵陵下不敢暴小民逸禮云巡狩者何巡循也狩牧也為天循行牧民也禮記外傳云夏殷五載一巡狩五年再閏周制十二年一巡狩嵗星一周巡狩之年四方諸侯先會嶽下以候見左傳云天子非展義不巡守又云先王卜征五年嵗襲其祥祥習乃行孔叢子云天子將巡狩必告於祖禰命告羣祀及社稷畿內名山大川七日而遍視牲及用幣櫜疏云櫜者弓衣一名韜故納弓於衣謂之韜弓左傳楚公子圍娶于公孫假氏垂櫜而入注云垂櫜示無弓樂記云武王克殷倒載干戈包之以虎皮名曰建櫜注云兵甲之衣曰櫜夏箋云樂歌大者稱夏周禮大司樂大祭祀王出入奏王夏尸出入奏肆夏牲出入奏昭夏帥國子而舞大饗不入牲其他皆如祭祀大射王出入令奏王夏鍾師以鐘鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏夏驁夏注云九夏皆詩篇名頌之族類載在樂章樂崩亦從而亡是以頌不能具樂師教樂儀行以肆夏趨以采齊車亦如之杜子春云王出入奏王夏尸出入奏肆夏牲出入奏昭夏四方賔來奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏客醉而出奏陔夏公出入奏驁夏賈公彥云此九夏者惟王夏天子得奏其肆夏則諸侯亦得用故燕禮奏肆夏大夫以下不得故郊特牲云大夫奏肆夏由趙文子始明不合也其昭夏以下諸侯亦用之鄉飲酒鄉射燕禮大射賔醉將出之時皆云奏陔大射公入奏驁夏明天子亦用也禮記云賔入大門而奏肆夏示易以敬國語曰金奏肆夏繁遏渠天子所以享元侯吕叔玉云皆周頌也肆夏時邁也繁遏執競也渠思文肆遂也夏大也言遂于大位謂王位也故時邁曰肆于時夏執競篇管書曰下管鼗鼓周禮小師掌教籥管注云管如笛而小併兩而吹之今大子樂官有焉瞽矇掌播簫管笙師掌吹管大司樂孤竹管圜丘奏之孫竹管方丘奏之隂竹管宗廟奏之燕禮大射下管新宫禮記下管象又云竹聲濫濫以立會會以聚衆君子聽竽笙簫管之聲則思畜聚之臣爾雅云大管謂之簥其中謂之篞小者謂之篎注管長尺圍寸併漆之有底廣雅云管象篪長尺圍寸六孔無底吕氏春秋曰倕作管風俗通云管漆竹長一尺六孔十二月之音象物貫地而牙故謂之管尚書大傳舜之時西王母來獻白玉琯昔章帝時零陵文學奚景於泠道舜祠下得笙白玉琯知古以玉為琯後乃易之以竹耳夫以玉作音故神人和鳯凰儀也白虎通云管艮音也樂法圖曰東律主黃鍾聖人承天樂用管管音調則律厯正樂書云八音七曰竹其卦則震方則東時則春聲尚議律姑洗風明庶其音溫春分之氣也先王以為簫管之屬昔女媧氏命娥陵氏制都良之管以一天下之音又命聖氏為班管合日月星辰至帝嚳命咸墨吹笭展管亦因是矣思文篇來牟説文云來周所受瑞麥來牟一來二縫象芒束之形天所來也來牟麥也雅翼云古稱下田宜稻麥今小麥例須下田大麥則不然詩所謂青青之麥生于陵陂者謂大麥也牟者周所受瑞麥來牟也一作牟又作􅓿即今大麥劉向以為釐牟麥也然則來牟一物唯廣雅以牟為大麥來為小麥本草云小麥味甘主除熱止躁渴養肝氣以作麴作麵溫大麥味鹹主消渴除熱益氣調中為五穀長按韓詩作貽我嘉􅓿可知來􅓿為一物張揖之言不足據也周頌臣工之什一臣工篇保介箋云保介車右也月令孟春天子親載耒耜措之於參保介之御間躬耕帝籍注云保介車右也人君之車必使勇士衣甲居右而參乘備非常也保猶衣也介甲也吕氏春秋注云保介副也載耒耜致于保介之間施用之朱傳云蓋農官之副也按周禮田僕掌馭田路以田以鄙鄭氏曰鄙巡行縣鄙然則耕籍於郊蓋木路矣周禮夏官有戎右齊右道右而無木路之右鄭氏云戎路之右田獵亦為之右焉此保介即戎右也髙誘惟云副也朱子增成其義曰農官之副然未見確然畬爾雅云田三嵗曰畬孫炎曰畬和也田舒緩也疏云畬和柔之意錢説文云錢銚古田器世本云垂作銚宋仲子云銚刈也孔氏云銚刈物之器管子云一農之事必有一耜一銚一鎌一耨一椎一銍然後成為農莊子云春雨日時草木怒生銚耨於是乎始修注云銚七遙反削也能有所穿削也又他堯反爾雅􅝁謂之疀方言燕之東北朝鮮洌水之間謂之􅝁宋魏謂之鏵或謂之鍏江淮南楚謂之臿趙魏謂之噪東齊謂之梩鏄傳云鏄耨朱傳云鉏也爾雅云斪斸謂之定李巡曰鋤别名也郭云鋤屬廣雅云定謂之耨世本云垂作耨周禮攻金之工假氏為鏄器粵之無鏄也非無鏄也夫人而能為鏄也吕氏春秋云耨柄尺此其度也其耨六寸所以間稼也注云耨藝苖也六寸所以入苖間釋名云鋤助也去穢助苖長也齊人謂其柄曰橿頭曰鶴耨以鋤嫗耨禾也鏄亦鋤類鏄迫也銍説文云銍穫禾短鎌釋名云銍穫黍鐵也銍銍斷穗聲也廣雅曰銍謂之刈按錢鏄銍皆田器也釋文銚音七遙反則銚即今之鍬所以起土可用於耕鏄先儒或以為鋤或以為耨蓋一器而異名高氏云所以藝者也銍則刈禾短鎌也噫嘻篇三十里箋云竟三十里者一部一吏主之周禮萬夫有川川上有路計此萬夫之地方三十三里少半里也言三十里者舉成數朱傳云此必鄉遂之官司稼之屬其職以萬夫為界者溝洫用貢法無公田故皆謂之私耕周禮閭師云凡任民任農以耕事貢九榖不耕者祭無盛周書曰神農之時天雨粟神農耕而種之山海經云后稷播百榖始作耕韓詩説云東西耕曰橫南北耕曰由吕氏春秋云冬至後五旬七日菖葉生菖者百草之先生也於是始耕汜勝之書曰秋耕宜早春耕宜遲強土而弱之弱土而強之王氏農書曰耕地之法未耕曰生已耕曰熟初耕曰塌再耕曰轉生者欲深而猛熟者欲淺而亷振鷺篇雍傳云雍澤也韓詩章句云西雍文王之雍也言文王之時辟雍學士皆潔白之人也朱氏云先儒多謂辟雍在西郊故曰西雍客箋云二王後杞宋郊特牲云天子存二代之後猶尊賢也尊賢不過二代樂記云武王伐紂既下車封夏后氏之後於杞投殷之後於宋尚書云成王既黜殷命殺武庚命微子啓作微子之命王若曰殷王元子惟稽古崇德象賢統承先王修其禮物作賔王家庸建爾于上公尹兹東夏書傳云天子存二代之後與己三所以通天三統立三正左傳皇武子云宋先代之後也於周為客天子有事膰焉有喪拜焉史記杞世家云武王求禹之後得東樓公封之於杞以奉夏后氏之祀括地志汴州雍丘縣古杞國一統志開封府杞縣在府城東百里殷周皆以封夏後為杞國豐年篇廪爾雅云廪廯也説文云廩穀所以振入宗廟粢盛倉黃廩而取之也周禮廪人掌九穀之數以待國之匪頒賙賜稍食以嵗之上下數邦用以知足否以詔榖用凡會同師役之事治糧食大祭祀共接盛注云藏米曰廪廪人舍人倉人司祿官之長公羊傳云御廪粢盛之所委孟子疏云倉有室曰廪釋名云廪矜也寶物可惜者投之其中也天文集曰廪星主倉管子曰倉廪實知禮節秭韓詩傳云陳穀曰秭毛傳云數億至億曰秭有瞽篇應傳云應小鞞爾雅云鼓小者謂之應釋名云鼙禆也禆助鼓節也聲在前曰朔朔始也在後曰應應大鼓也周禮小師大祭祀下管擊應鼓徹歌大饗亦如之注云應鼙也禮器曰廟堂之下縣鼓在西應鼓在東大射禮建鼓在阼階西南鼓應鼙在其東南鼓西階之西一建鼓在南東鼓朔鼙在其北注云應鼙應朔鼙也先擊朔鼙應鼙應之朔始也田傳云田大鼓也疏云應既是小田宜為大箋云田當作朄朄小鼓在大鼓旁應鞞之屬周禮大師大祭祀下管令奏鼓朄鄭司農云朄小鼓也先擊小鼓乃擊大鼓小鼓為大鼓先引故曰朄小師小祭祀小樂事鼓朄禮書云儀禮朔鼙乃􅉧鼓也以其引鼓故曰朄以其始鼓故曰朔是以儀禮有朔無朄周禮有朄無朔其實一也鄭氏以應朄朔為三鼓恐不然也縣鼓眀堂位云夏后氏之足鼓殷人楹鼓周人縣鼓樂書云縣鼓周人所造之器始作樂而合乎祖者也以應鼓為和終之樂則縣鼓其倡始之鼓與按鼓人以路鼓鼓鬼享大司樂路鼓鼓鼗於宗廟之中奏之則所云縣鼓者路鼓也鼓人注云路鼓四靣鼓陳暘以為晉鼓非也應朄小鼓不便于縣而賈公彥謂諸侯祭禮應鼓縣在東方大射云樂人宿縣其下云云則似亦縣之又云鼗倚于頌磬西紘鄭那箋云鼗雖不植則商之鼗不植周之鼗亦不縣也其應朄必縣與否亦無以定之後世之制建鼓左右旁挾應􅉧未必合古法也商之楹鼓大射曰建鼓或周之朄鼓殷人曰朔鼙與鞉書云下管鼗鼓儀禮鼗倚于頌磬西紘注云鼗如鼓而小賔至搖之以秦樂周禮小師掌教鼓鼗注云鼗持柄搖之旁耳還自擊瞽矇視瞭掌播鼗大司樂靁鼓靁鼗於圜丘奏之靈鼓靈鼗於方丘奏之路鼓路鼗於宗廟奏之禮記云天子賜伯子男樂則以鼗將之月令仲夏命樂師修鞀鞞爾雅云大鼗謂之麻小鼗謂之料注云麻者音概而長也料者聲清而不亂釋名云鞉導也所以導樂作世紀云帝嚳命倕作鞀白虎通云鞀者震之氣也上應卯星以通王道鬻子云禹縣五聲曰語寡人以獄訟者揮鞀禮書云儀禮諸侯之燕大射大夫士之鄉射鄉飲皆有鼗無柷諸侯之樂非無柷也文不備柷傳云柷木椌也釋樂云所以鼓柷謂之止注云柷如漆桶方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊止者其椎名廣雅云柷舄桶方三尺五寸深尺八寸四角有升尚書夔曰戞擊鳴球又云下管鼗鼓合止柷敔周禮小師掌教柷敔瞽矇掌柷敔禮記王制云天子賜諸侯樂則以柷將之月令仲夏命樂師飭鐘磬柷敔眀堂位云楷擊四代之樂器也注揩擊謂柷敔樂記云聖人作鞉鼓椌楬塤篪此六者德音之器也注椌楬柷敔白虎通云柷敔者終始之聲萬物之所生也隂陽順而復故曰柷柷始也敔終也一説柷在東北方釋名云柷如物始見柷柷然也樂記圖曰柷衆也以舉衆樂乾主立冬隂陽終始聖人象天以制柷法使死者不恨生者不怨國語云革木一聲樂書云木者所以合止樂之器其卦巽其方東南之維其時春夏之交其風清眀其律夾鍾其聲一其音直立夏之氣也先王以為柷敔之屬隂始于二四終于八十隂數四八而以陽一主之所以作樂此柷居宫縣之東象春物之成始也圉爾雅云所以鼓敔謂之籈注云敔如伏虎背上有二十七齟齬刻以木長尺櫟之籈者其名釋名云敔止也所以止樂字説云虎西方之獸故敔為伏虎二十七齟齬者三九之數陽成于三變于九櫟之長尺十之數也陽三九而隂十勝之所以止樂樂書云敔居宫縣之西象秋物之成終簫釋樂云大簫謂之言小者謂之筊注云言編二十三管長尺四寸筊十六管長尺二寸簫一名籟博雅云簫大者無底小者有底釋名云簫肅也其聲肅肅而清周禮小師掌教簫瞽矇掌播簫笙師掌教吹簫書曰簫韶九成禮記仲夏命樂師均管簫易通卦驗云夏至之樂以簫鄭玄注云簫亦管也形似鳯翼鳯火禽也火數七夏時火用事白虎通云簫者中吕之氣風俗通云舜作簫形參差象鳯翼十管長一尺通禮義纂云伏羲作簫十六管月令章句云簫長則濁短則清以蠟密實其底而增減之則和三禮圖云雅簫長尺四寸二十四彄頌簫長尺二寸十六彄無底者謂之洞簫六家詩名物疏卷五十二
