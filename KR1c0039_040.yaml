body:
  text: 六家詩名物疏卷三十七明馮復京撰小雅鴻雁之什二斯干篇似箋云似讀如己午之已疏古者似已字同爾雅云太嵗在已曰大荒落史記云已者言陽氣之已盡也漢書云已藏於已妣爾雅云母為妣廣雅云妣嫓也嫓匹於父周禮大司樂奏夷則歌小吕舞大濩以享先妣注先妣薑嫄也薑嫄履大人迹感神靈而生后稷是周之先母也周立廟自后稷為始祖薑嫄無所妃是以特立廟祀之謂之閟宫祖釋名云祖祚也祚物先也大司樂奏無射歌夾鍾舞大武以享先祖注先祖謂先王先公棘疏云矢鏃之角為棘古有此名韓詩作朸朸隅也革傳云翼也韓詩作翅也翬爾雅云伊洛而南素質五色皆備成章曰翬楹廣雅云楹謂之柱釋名云楹亭也亭亭然孤立旁無所依也齊魯讀曰輕輕勝也孤立獨處能勝任上重也穀梁傳曰丹桓宫楹禮天子丹諸侯黝大夫蒼書大傳曰士大夫有石材庶人有石承注云材柱下質也承當柱下而已不出下為飾正箋云正晝也朱傳云向明之處吕氏曰正謂正寢冥互見召南牖箋云冥夜也朱傳云奧窔之間爾雅云西南隅謂之奧東南隅謂之窔孫炎曰奧室中隱奧之處也郭璞曰窔亦隱暗釋名云奧不見戶明所在祕奧也窔幽也亦取幽𡨕也莞詳見邶風席爾雅云莞苻離其上蒚注今西方人呼蒲為莞蒲蒚謂其頭臺首也今江東謂之苻蘺又云􅤴鼠莞注亦莞屬也纎細似龍須可以為席蜀中出好者釋文曰草叢生水中莖圓江南以為席形似小蒲而實非也廣雅曰蔥蒲莞也箋云莞小蒲之席濮氏曰莞又云燈心草生池澤中即苻蘺也本草燈心草叢生莖圓細而長直人將為席簟箋云竹葦曰簟釋名云簟簟也布之簟簟然平正也説文云簟竹席也方言云簟宋魏謂之笙或謂籧䒼關西謂之簟或謂之䓆其粗者謂之籧篨關東或謂之篕掞禮曰莞簟之安藳秸之尚淮南子云席上之先萑簟樽之上玄樽先王貴之先本而後末按司几筵有次席注以為桃枝竹所次成者其即此簟與莞席在下即筵也竹簟在上即重席也孔氏曰寢卧之席自天子以下宜莞簟同寢周禮宫人掌王之六寢之修注六寢者路寢一小寢五路寢以視事小寢以時燕息焉又司士居虎門之左司王朝注虎門路寢門也王日視朝於路寢門外大僕建路鼓于大寢之門外而掌其政禮記寢不踰廟又云朝辨色始入君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢釋服又云路寢成則考之鄭康成詩禮注云君謂之路寢大夫謂之適寢士或謂之適室世婦以君下寢之上為適寢內子卿之妻也下室其燕處也天子之寢有左右房宗廟及路寢制如明堂每室四户孔仲達云天子路寢制如明堂燕寢如諸侯路寢故有左右房何休云天子諸侯皆有三寢一曰髙寢一曰路寢一曰小寢父居髙寢子居路寢孫從王父母妻從夫寢夫人居小寢爾雅云室有東西廂曰廟無東西廂有室曰寢禮書云以書考之天子路寢之制室居中左戶右牖東西有房又有東序西序東堂西堂東垂西垂賔階阼階房之南有東西夾室鄭康成釋儀禮謂房當夾室北是也孔安國謂西房西夾室東房東夾室誤矣諸侯路寢與大夫士之室皆東西房鄭氏謂大夫士無西房誤矣王六寢后六宫諸侯三寢夫人三宫王大寢一小寢五諸侯大寢一小寢二大寢在前謂之路寢又謂正寢小寢在後謂之燕寢又謂少寢自卿以下二寢正寢居前燕寢居後其妻二寢亦如之熊説文云熊獸似豕山居冬蟄詩義疏云熊能攀援上髙樹見人則顚倒投地而下冬入穴蟄始春而出援神契云赤熊見則姦宄自逺淮南子注云熊食鹽而死抱朴子云熊夀五百嵗能化為狐狸異苑云熊藏山穴穴裏不得見穢及傷殘見則舍穴自死續搜神記云熊無穴或居大樹孔中東土呼熊為子路以物擊樹云子路可起於是便下不呼則不動也陶隱居云熊白是背上膏寒月則有夏月則無圖經云熊形類犬豕而性輕捷酉陽雜俎云熊膽春在首夏在腹秋在左足冬在右足墨客揮犀云熊於山中行數十里悉有跧伏之所必在危嵓枯木中山民謂之熊館埤雅云熊似豕堅中當心有白脂如玉味甚美俗呼熊白好舉木而引氣謂之熊經冬蟄不食飢則自舐其掌故其美在掌鬼谷子曰分威法伏熊説者以為熊之擊搏先伏而後動字説云熊強毅有所堪能而可以其物火之羆亦熊類而又強焉然可网也雅翼云熊人足黑色革厚筋駑獵者刺其革不可得入隨有膏膜之羆爾雅云羆如熊黃白文郭云似熊而長頭髙腳猛憨多力能拔樹木關西呼曰貑羆詩義疏云有黃羆有赤羆大於熊其脂如熊白而粗理不如熊白美禹貢云梁州厥貢熊羆狐狸織皮山海經云嶓冡之山其獸多羆埤雅云羆似熊而大堅中從目能緣能立遇人則擘而攫之淮南子曰熊羆之動以攫搏是也其白生於心之下肓之上秋冬則有春夏則無爾雅翼云獵者云羆熊之雌者力尤猛柳宗元稱鹿畏􅓔􅓔畏虎虎畏羆羆之狀被髮人立絶有力而甚害人周禮穴氏掌攻蟄獸各以其物火之謂熊羆之屬虺爾雅蝮虺博三寸首大如擘舍人曰江淮以南曰蝮江淮以北曰虺孫炎曰有牙最毒郭曰此自一種蛇名為蝮虺邢昺曰今蛇細頸大頭色如文綬文間有毛似豬鬛鼻上有針大者長七八尺一名反鼻如虺類足以明此自一種蛇廣雅云虺蝰也廣志云蝮蛇與土色相亂長三四尺其中人以牙櫟之裁斷皮出血則身盡痛九竅出血而死述異記云虺五百年化為蛟埤雅云虺狀似蛇而小傳曰為虺弗摧為蛇奈何以此故也虺一名蝮舊曰蝮蛇怒時毒在頭尾一曰虺與蝮異虺如土色所在有之蝮蛇鼻反在上有針錦文衆蛇之中此獨胎産生輒坼副母腹亦有與地同色者陶隱居云蝮形短而扁陳藏器云蝮著足斷足著手斷手不爾合身糜潰七八月毒盛時嚙樹以泄其氣樹便死又吐涎沫於草木上著人身腫成瘡圖經云蝮蛇黃黑色黃頷尖口張文仲云蝮蛇頭斑身赤斑亦有青黑色者葛洪云青蝰蛇緑色大者四五尺一種尾三四寸蛇爾雅云螣螣蛇蟒王蛇周易云龍蛇之蟄以存身也左傳云深山大澤實生龍蛇星經云騰蛇二十二星在室北近河主蟲蛇埤雅云魚屬連行蛇屬紆行盤常向壬地以耳聽雅翼云蛇草居常飢得食稍飽輒蛻殼冬含土入蟄及春出蟄則吐之其圎重如錫石謂之蛇黃種類至多惟烏蛇性善不噬物而白花蛇有毒生於蘄州今蛇死目皆閉惟蘄州者目開若生舒蘄兩界間者則一開一閉此理之不可曉者陶隱居云蛇皆有足五月五日取燒地令熱以酒沃之置中足出按蛇類至多爾雅所載惟螣蟒蝮虺三者本草有白花蛇烏蛇金蛇銀蛇蛇婆藍蛇兩頭蛇山海經有肥遺六足四翼有巴蛇吞象三年而出其骨有長蛇毛如彘有鳴蛇四翼音如磬神異經有率然孫武子以譬善用兵者也顧渚山記有緑蛇朝野僉載有報寃蛇嶺表録異楊氏南裔異物志諸書俱有蚺蛇録異記有雞冠蛇爆身蛇黃領蛇寰宇記有鈎蛇窮神祕苑有自斷蛇及諸方志所録不可勝記本毒蟲有無毒者本鱗蟲有無鱗者惟黃喉蛇一種善啖蝮額有大王字為衆蛇之長大人朱傳云太卜之屬占夢之官也周禮太卜掌三夢之法一曰致夢二曰觭夢三曰咸陟其經運十其别九十以龜之八命贊三夢之占占夢掌其嵗時觀天地之會辨隂陽之氣以日月星辰占六夢之吉凶一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢季冬聘王夢獻吉夢于王王拜而受之乃舍萌于四方以贈惡夢男説文丈夫也從田從力易云乾道成男坤道成女射義云天地四方者男子之所有事也本命解云男子者任天道而長萬物者也女子者順男子之教而長其理者也釋名云男任也典任事也璋周禮大宗伯以赤璋禮南方注半圭曰璋典瑞璋繅二采一就以俯聘玉人大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅天子以巡狩宗祝以前馬大璋亦如之諸侯以聘女瑑圭璋八寸以俯聘牙璋中璋七寸射二寸厚寸以起軍旅以治兵守璋邸射素功以祀山川以致稍餼禮記云灌以圭璋用玉氣也又云君執圭瓚祼尸大宗執璋瓚亞祼又聘義云致饔餼還圭璋聘禮云聘于夫人用璋覲禮云方明者木也南方璋左傳蒍啓疆云朝聘有圭享俯有璋爾雅云璋大八寸謂之琡地説文云元氣初分輕清為天重濁為地萬物所陳列也徐曰地者迆也迆而髙也山嶽丘陵墳衍迆而卑也臯隰汚潢故曰地有二形髙下平也爾雅云東至泰逺西至邠國南至濮鉛北至祝栗謂之四極孤竹北戶西王母日下謂之四荒九夷八狄七戎六蠻謂之四海距齊州以南載日為丹穴北載斗極為空同東至日所出為太平西至日所入為太蒙易曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨又云立地之道曰柔與剛又云在地成形考靈耀云地有四遊冬至地上行北而西三萬里夏至地下行南而東三萬里春秋二分是其中矣地常動移而人不知譬如人在大舟中閉牖而坐舟行不覺也元命包云地者易也言養物懷仁交易變化含吐應節故其立字土力於一者為地又云地所以右轉者氣濁精少含隂而起遲故轉右迎天佐其道春秋説題辭云地之為言嫓也承天行其義也山陵之大非地不制含功以牧生也援神契云地順受澤謙虛開張含泉任萌滋物歸中括地象云八極之廣東西二億三萬三千里南北二億三萬一千五百里夏禹所治四海內地東西二萬八千里南北二萬六千里素問云積隂為地故地者濁隂也家語子夏云商聞山書曰地東西為緯南北為經山為積德川為積刑髙者為生下者為死丘陵為牡溪谷為牝國語云陽伏而不能出隂遁而不能蒸於是有地震管子云地者萬物之本原諸生之根苑白虎通云地者元氣所生萬物之祖也地之言施也諦也應施變化審諦不誤敬始重終故謂之地也物理論云地者底也底之言著也隂體下著也其神曰祗祗成也育生萬物備成也西北髙而東南下東西長南北短其盡四海者也炎氣鬱蒸景風蕩物地之張也秋風蕩生涼氣肅然地之閉也裼説文􅠷褓也詩曰載衣之􅠷正義云褓縛兒被也侯苞云示之方也明褓制方瓦傳云瓦紡磚也箋云習所有事古史考云夏世昆吾氏作屋瓦烏曹氏作甎物原云伏羲始以茨覆屋禹作土墼石甃桀臣昆吾作甎瓦舜作牆周公作壁朱子云瓦紡時所用之物舊見人畫列女傳漆室女如今銀子樣者意其為紡甎也無羊篇犉爾雅云黑脣犉注毛詩傳曰黃牛黑脣此宜通謂黑脣牛爾雅又云牛七尺為犉蓑傳云蓑所以備雨説文云草雨衣也公羊傳不蓑城也注若今以草衣城韻會注云秦謂之萆國語身衣襏襫注云蓑薜衣也笠疏云笠原以禦暑兼可禦雨説文云簦無柄也增韻云有柄曰簦無柄曰笠國語云蓑笠時雨既至必求之又云首戴茅蒲注云簦笠也牲周禮庖人掌共六畜注云始養之曰畜將用之曰牲又膳夫膳用六牲注云六牲馬牛羊豕犬雞也閭師民不畜者祭無牲牧人掌牧六牲而阜蕃其物以共祭祀之牲牷凡陽祀用騂牲毛之隂祀用黝牲毛之望祀各以其方之色牲毛之凡時事之牲必用牷物凡外事毁事用尨可也凡祭祀共其犧牲以授充人繫之凡牲不繫者共奉之牛人掌養國之公牛以待國之政令充人掌繫祭祀之牲牷小宗伯毛六牲而頒之于五官使共奉之雞人掌共雞牲辨其物羊人掌羊牲校人掌王馬之政牧師掌牧地皆有厲禁而頒之孟春焚牧中春通淫掌其政令凡田事贊焚萊庾人掌十二間之政教圉師掌教圉人養馬圉人掌養馬芻牧之事以役圉師犬人祭祀共犬牲用牷物伏瘞亦如之禮記云犧牲不粥于市又云仲秋之月乃命宰祝循行犧牲視全具按芻豢瞻肥瘠察物色必比類量小大視長短皆中度五者備當上帝其饗又云帝牛必在滌三月稷牛惟具所以别事天神與人鬼也又云古者天子諸侯必有養獸之官召牛納而視之擇其毛而卜之吉然後養之君皮辨素積朔月月半君巡牲所以致力也左傳云牛卜日曰牲又云五牲不相為用注牛羊豕犬雞又云為六畜五牲三犧以奉五味注六畜馬牛羊雞犬豕五牲麋鹿麏狼兔祭天地宗廟三者謂之犧服虔云三犧雁鶩雞也國語云天子祀以會諸侯太牢卿特牛大夫少牢士特牲蒸箋云粗曰薪細曰蒸肱傳云肱臂也牧人詳見牲周禮牧人下士六人府一人史二人徒二十人注牧人養牲於野田者六家詩名物疏卷三十七
