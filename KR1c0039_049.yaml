body:
  text: 六家詩名物疏卷四十六明馮復京撰大雅文王之什一文王篇商鄭譜曰商者契所封之地孔氏曰湯取契之所封以為代號皇甫謐云在上洛商縣括地志商州城八十里商洛縣本商邑古之商國卨所封補傳云地有商山因是得名一統志陜西西安府商縣在府城東南二百六十里本契始封地商洛山在縣東南九十里殷鄭氏曰湯始居亳之殷地孔氏曰殷是亳地之小别書序云盤庚將治亳殷注商家改號曰殷括地志云宋州穀熟縣西南三十五里南亳故城即南亳湯都也宋州北五十里大䝉城為景亳湯所盟地因景山為名河南偃師為西亳帝嚳及湯所都盤庚亦徙都之黃氏曰三亳南亳北亳亳殷也南亳今應天府穀熟縣北亳拱州考城縣亳殷河南偃師縣周氏曰商人稱殷自盤庚始自此以前稱商自盤庚既都亳于是殷商兼稱或單稱殷按一統志河南開封府歸德州古之商丘相土所居也穀熟縣省入本州之夏邑州城東南四十五里有亳城即南亳也睢州考城縣宋屬拱州景山在其境內商之北亳也河南府偃師縣契父嚳所都湯自商丘遷焉後仲丁遷囂河亶甲居相祖乙居耿又遷于邢書所謂不常厥邑于今五邦者也盤庚復涉河南治亳改國號曰殷即西亳也古今言殷地皇甫謐張守節蔡沈之徒皆以為即偃師王伯厚地里考引括地志云相州安陽縣本盤庚所都即北冡殷墟南去朝歌城百四十里竹書紀年盤庚自奄遷北冡曰殷墟南去鄴四十里則又以今彰德府安陽縣為西亳未詳孰是祼將周禮小宰祭祀贊王祼將之事注云將送也贊王酌鬱鬯之酒以獻尸謂之祼祼之言灌也明不為飲主以祭祀唯人道宗廟有祼天地大神至尊不祼莫稱焉凡鬱鬯受祭之啐之奠之又云凡賔客贊祼內宰后祼獻則贊凡賔客之祼獻皆贊大宗伯大賔客攝后載果小宗伯凡祭祀賔客以時將肆祼肆師祭祀賔客贊祼將鬱人凡祼事和鬱鬯司尊彛祠禴祼用雞彛鳥彛嘗蒸祼用斝彛黃彛追享朝享祼用虎彛蜼彛行人諸公再祼而酢侯伯子男一祼而酢禮器云諸侯相朝灌用鬱鬯郊特牲云周人尚臭灌用鬯臭既灌然後迎牲祭統曰君執圭瓚祼尸大宗執璋瓚亞祼又云獻之屬莫重于祼冔冠禮記云周辨殷冔夏收注云冔名出于幠幠覆也言所以自覆飾也齊所服而祭也其制之異未聞疏云案漢禮器制度辨冕周禮辨冕相參考之冕以木為體廣八寸長尺六寸績麻三十升布為之上以𤣥下以纁前後有旒尊卑各有差等但夏殷禮亡制與周異故云未聞禮記云有虞氏皇而祭夏后氏收而祭殷人冔而祭周人冕而祭陳祥道云皇收而下皆冕也世本云胡曹作冕注云黃帝臣也蓋冕服起于黃帝加飾起自唐虞白虎通云殷冔謂之詡者十二月之時施氣受化詡張而後得牙故謂之詡論語疏云冕俯也以其前高後下有俯仰之形故因名焉大明篇適左傳云王后無嫡則擇立長年鈞以德德鈞以卜公羊傳云立適以長不以賢禮書云父服長子三年祖服適孫朞以其傳重也摯周語摯疇之國由大任注云摯疇二國奚仲仲虺之後大任之家唐書世系表云祖已七世孫曰成徙國於摯國名記云蔡之平輿有摯亭一統志云平輿故城在河南汝寧府城東任國語司空季子云黃帝之子十二姓姫酉祁已滕葴任荀僖姞儇依是也玉海云仲虺居薛臣扈祖已皆其胄裔嬪釋親云嬪婦也書曰嬪于虞京箋云周國之地小别名洽地里志云左馮翊郃陽縣在郃水之陽水經注云郃陽城南有瀵水東流注于河水南猶有文母廟前有碑去城十五里水即郤水也縣取名焉一統志陜西西安府同州郃陽縣在州城東北百二十里以在郃水之陽故名郃水在郃陽縣來自西北經縣北東入黃河縣東四十里有太姒墓陽穀梁傳云水北為陽水南為隂嘉朱傳云嘉婚禮也周禮大宗伯以嘉禮親萬民以昏冠之禮親成男女文定厥祥朱傳云言卜得吉而以納幣之禮定其祥士昏禮云下達納采用雁請問名納吉用雁如納采禮納徴𤣥纁束帛儷皮如納吉禮請期如納徴禮記曰納吉曰吾子有貺命某加諸卜占曰吉使某也敢告納徴曰吾子有嘉命貺室某也某有先人之禮儷皮束帛使某也請納徴周禮媒氏云凡嫁女娶妻入幣純帛無過五兩玉人云穀圭天子以聘女大璋諸侯以聘女雜記云納幣一束束五兩兩五尋昏義云納采問名納吉納徴請期皆主人筵几於廟拜迎於門外入揖讓而升聽命於廟賈公彥云納幣士大夫以𤣥纁束帛天子加穀圭諸侯加大璋庶人用緇無纁孔穎達云納幣昏禮謂之納徴親迎郊特牲曰親迎男先於女剛柔之義也執摯以相見敬章别也壻親御授綏親之也出乎大門而先男帥女女從男夫婦之義由此始也哀公問曰冕而親迎不已重乎孔子曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎昏義云父親醮子而命之迎男先於女也子承命以迎主人筵几於廟而拜迎於門外壻執雁入揖讓升堂再拜奠雁蓋受之於父母也降出御婦車而壻授綏御輪三周先俟于門外婦至壻揖婦以入共牢而食合卺而酳所以合體同尊卑以親之也昏禮記曰父醮子命之辭曰往迎爾相承我宗事勗帥以敬先妣之嗣若則有常禮書趙氏曰王者之尊天下莫敵故嫁女則使諸侯主之適諸侯諸侯莫敢有其室若屈萬乘之尊行親迎之禮則何莫敵之有乎夫子對哀公云云非為天子發也左氏謂諸侯不親迎公羊謂天子亦親迎其說不能全與經合當從趙氏為正造舟釋水云天子造舟諸侯維舟大夫方舟士特舟庶人乘泭郭璞曰造舟比船為橋維舟維連四船方舟並兩船特舟單船泭并木以渡孔氏曰造舟者比船於水加板於上即今之浮橋故杜預云造舟為梁則河橋之謂也維舟以下則水上浮而行之但船有多少為等差耳左傳疏云造為至義言船相至而並比莘世本云莘姒姓禹後唐世系表啓封支子於莘水經注云郃陽城故有莘邑大姒之國國名記云今同之夏陽漢郃陽有太姒冢城祠廟昔散宜生求有莘氏美女獻紂周代有神降之本虢地大名之莘縣有莘亭亦國也齊蔡管城陳留俱有莘一統志莘城在西安府郃陽縣南二十里本莘國牧野牧說文作坶周書牧誓云甲子昧爽王朝至于商郊牧野注云紂近郊三十里地名牧疏云牧是郊上之地戰在平野故言野耳周書克殷曰周車三百五十乘陳于牧野水經注云自朝歌以南暨清水土地平衍據臯跨澤悉坶野之地故詩稱坶野洋洋竹書紀年曰武王率西夷諸侯伐殷敗之于坶野皇甫謐曰在朝歌南七十里一統志河南衛輝府汲縣本殷牧野之地牧野在府城南陵西社朝歌之南武王伐紂陳師于此騵爾雅云駵馬白腹騵注云駵赤色黑鬛檀弓云周人尚赤戎事乘騵傳云騵言上周下殷也埤雅云騵從縓省縓淺赤也鷹爾雅云鷹鶆鳩注云鶆當為鷞左傳作鷞鳩是也月令云仲春鷹化為鳩季夏鷹乃學習孟秋鷹乃祭鳥王制云鳩化為鷹然後設罻羅陳氏曰仲秋也左傳郯子曰少皥氏鳥師而鳥名爽鳩氏司寇也杜預曰爽鳩鷹鷙鳥也故為司寇主盜賊運斗樞云瑤光星散為鷹立秋之日鷹鸇擊廣志云有雉鷹有鷹一嵗為黃鷹二嵗為撫鷹三嵗青鷹胡鷹獲麞禽經云鷹不擊伏鶻不擊妊隋魏彥深賦云資金方之猛氣擅火德之炎精指重十字尾貴合盧立如植木望似愁胡觜同劍利腳等荆枯亦有白如散花赤如點血大文若錦細斑似纈眼類明珠毛猶霜雪身重若金爪剛如鐵生於窟則好眠巢於木則常立雙骹長則起遲六翮短則飛急毛衣屢改厥色無常寅生酉就總號為黃二周作鴘千日成蒼雌則體大雄則形小遇犬驚猜得人馴擾埤雅云鴘次赤也頂有毛角微起今通謂之角鷹鳥獸考云鷹類甚衆維角雕黃者以鷹名然角鷹有二種一種青腳有毛一種兩腳無毛名鷺鷀角鷹綿篇瓞爾雅云瓞瓝其紹瓞舍人曰瓞名瓝小瓜也紹繼謂瓞子漢中小瓜曰瓞孫炎曰瓞小瓜子如瓝其本子小紹先嵗之瓜曰瓞邢昺曰瓜本有二種大曰瓜小曰瓞而瓜蔓近本之瓜必小于先嵗之大瓜以其小如瓝故謂之瓞瓞是瓝之别名陶復疏云陶瓦器竈也覆地室也覆者地上為之穴者鑿地為之朱傳云陶窰竈復重窰穴上室也考工記云摶埴之工陶旊有虞氏尚陶尸子曰昆吾作陶周書曰神農耕而作陶賈公彥云古者窟居隨地而造若平地則不鑿但纍土為之謂之為復言于地上重復為之也若髙地則鑿為坎謂之為穴其形皆如陶竈復穴皆開其上取明穴說文云土室也易曰上古穴居而野處後世聖人易之以宫室禮運云先王未有宫室冬居營窟夏居橧巢岐郡縣志云岐山亦名天柱山在鳯翔岐山縣東北十里地里志右扶風美陽縣岐山在西北中水鄉周太王所邑水經注岐山歷周原下北則中水鄉成周聚水北即岐山河圖括地象云岐山在崑崙東南為地乳上為天糜星一統志岐山在陜西鳯翔府岐山縣東北十里山有兩岐故名亦曰天柱山其峰高峻狀若柱然禹貢導汧及岐太王邑于岐山之下文王時鳯鳴岐山皆此也俗名鳯皇堆堇毛傳云堇菜也詩緝云孔氏謂堇即烏頭則與鴆毒同類非荼菜可食之類矣荼雖苦得霜甜脆故可言如飴烏頭毒物不可食何由知其如飴乎毛氏以堇為菜不言毒物內則云堇荁枌榆注云荁似堇而葉大公食禮鉶芼皆有滑注云滑堇荁之屬說文云堇根如薺葉如細栁蒸食之甘爾雅云齧苦堇郭云今堇葵也葉似栁子如米肉食之滑者本草堇汁味甘唐本注云此菜野生非人所種俗謂之堇菜葉似蕺花紫色朱傳云堇烏頭也爾雅云芨堇草郭云即烏頭也江東呼為堇音靳晉語驪姬置堇于肉賈逵曰堇烏頭也國䇿云人之饑所以不食烏喙者以其雖偷充腹而與死同患也廣雅云附子一嵗為萴子二嵗為烏喙三嵗為附子四嵗為烏頭五嵗為天雄本草云冬月採為附子春採為烏頭烏頭味辛甘溫大熱有大毒一名奚毒一名即子一名烏喙三寸以上為天雄陶隱居云春時莖初生有腦形似烏鳥之頭故謂之烏頭有兩岐共蒂狀如牛角名烏喙喙即烏之口也吳氏本草云烏頭一名莨一名千秋一名毒公一名果負一名耿子禹錫等云正月始生葉厚莖方中空葉四面相當與蒿相似圖經云烏頭烏喙天雄附子側子都是一種冬至前將陸田耕五七遍以猪糞糞之逐月耘耔至次年八月後方成苗髙三四尺莖四稜葉如艾花紫碧色作穗實小黑如桑椹本只種附子熟後有四物長三二寸為天雄附子旁尖牙角為側子絶小者亦名側子元種者為烏頭其餘大小皆為附子按爾雅齧苦堇本草在菜部毛公所云堇菜指此若烏頭則但可謂之草不可謂之菜也陸氏釋文又引廣雅云堇藋也今三輔之言猶然此爾雅所謂拜蔏藋非此堇也飴內則云棗栗飴蜜以甘之釋文云飴餳也方言云餳謂之張皇飴謂之䬵謂之糖說文云飴米糵煎也餳飴和饊者也釋名云飴小弱于餳形怡怡然也契周禮菙氏掌共燋契以待卜事凡卜以明火爇燋遂吹其焌契以授卜師遂役之卜師凡卜事揚火以作龜致其墨士喪禮楚焞置于燋在龜東陳祥道云燋炬也契灼龜之木也契謂之焌亦謂之楚焞楚其材也焞其體也契其用也羅氏云禮圖楚焞以荆為之必以荆者凡木心圓荆心方卦之德方以知以其德方故以方木灼龜也司空尚書僉曰伯禹作司空帝曰俞咨禹女平水土又曰司空掌邦土居四民時地利禮記云司空執度度地量地逺近興事任力元命包云危東六星兩兩而比曰司空主水書大傳云溝瀆壅遏水為民害田廣不墾則責之司空家語曰司空之官以成禮度量不審舉事失禮都鄙不修財物失所曰貧貧則飭司空白虎通云司空主土不言土而言空空尚主之况於實乎漢官解詁云下理坤道上和乾光謂之司空環濟要略云冬官司空掌邦事營城郭都邑立社稷宗廟造塋宅器械監百工臯門應門毛云王之郭門曰臯門王之正門曰應門箋云諸侯之宫外門曰臯門朝門曰應門內有路門天子之宫加以庫雉疏云毛云郭門者宫之外郭之門毛以諸侯之門不名臯應與鄭别爾雅云正門謂之應門朱子曰書天子有應門春秋書魯有雉門禮記云魯有庫門家語云衛有庫門皆無云諸侯有臯應者則臯應為天子之門明矣意者太王之時未有制度特作二門其名如此及周有天下遂尊以為天子之門而諸侯不得立也周禮閽人掌守王宫中門之禁先鄭注云王有五門外曰臯門二曰雉門三曰庫門四曰應門五曰路門一曰畢門𤣥謂雉門三門也又云匠人營國應門二徹三個王宫門阿之制九雉明堂位云庫門天子臯門雉門天子應門禮書云臯門之內外朝也朝士建其法小司冦掌其政列三槐與九棘設嘉石與胏石而朝諸侯聽訟詢大事在焉應門之內治朝也司士正其位宰夫掌其法大僕正王之位而王日視朝在焉路門之內燕朝也大僕正其位掌擯相而族人朝焉諸侯之外門曰庫門魯以周公之故猶不可稱臯門應門特為臯應之制而已考索云臯者逺也明最在外故曰臯應門者則居此以應治也冢土詳見甫田社傳云冢土大社也美太王之社遂為大社祭法云王為羣姓立社曰大社郊特牲云天子大社心受霜露風雨以達天地之氣也禮書云王之大社土五色而冒以黃其位則中門之右社主隂故也其壝北面社嚮隂故也其飾則不屋記所謂大社必受霜露風雨也其表則木傳所謂夏以松商以柏周以栗是也其方廣則五丈其主則石為之問傳曰小聘曰問大宗伯云賔禮時聘曰問大行人云凡諸侯之邦交嵗相問也殷相聘也世相朝也聘禮云小聘曰問不享有獻不及夫人主人不筵几不禮面不升不郊勞其禮如為介三介鄭目録云大問曰聘諸侯相於久無事使卿相問之禮小聘使大夫王制云諸侯之於天子也比年一小聘三年一大聘棫爾雅云棫白桵郭云桵小木叢生有刺實如耳璫紫赤可啖陸璣云王蒼說棫即柞也其材理全白無赤心者為白桵直理易破可為櫝車輻又可為矛㦸矜今人謂之白梂或曰白柘混夷箋云夷狄國也詳見出車西戎虞芮括地志云故虞城在陜州河北縣東北五十里虞山之上古虞國故芮城縣西二十里古芮國閒原在河北縣西六十五里晉太康地記云虞西百四十里有芮城郡縣志云閒原在平陸縣即虞芮爭田讓為閒田之所史記注引地里志云虞在河東太陽縣芮在馮翊臨晉縣正義云注引芮在臨晉者恐疏閒原在河東與虞芮相接臨晉在河西同州非臨晉芮城明矣一統志平陸縣在山西平陽府解州東南九十里芮城縣在州西南九十里閒田在平陸縣西五十里即虞芮相讓之地俗呼讓畔城棫朴篇朴傳云朴枹木爾雅云朴枹者郭云朴屬叢生者為枹槱箋云祭皇天上帝及三辰聚積以燎之疏云月令注皇天為北辰耀魄寶上帝為五帝三辰即宗伯所云日月星辰也周禮大宗伯云以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌師雨師注云禋之言烟槱積也詩曰芃芃棫朴薪之槱之三祀皆積柴實牲體焉或有玉帛燔燎而升烟所以報陽也禮記月令云季冬乃命四監收秩薪柴以共郊廟及百祀之薪燎祭法云燔柴於泰壇祭天也綱紀說文云綱網紘也紀别絲也尚書云若網在綱有條而不紊旱麓篇旱地里志漢中郡南鄭縣旱山沱水所出東北入漢曹氏曰旱山在梁山之境與漢廣相近故取以興焉周地圖記云山上有雲即雨一統志陜西漢中府南鄭縣附郭府城西南六十五里有旱山麓穀梁傳云林屬于山曰麓漢書應劭云麓林之大者釋名云山足曰麓麓陸也言水流順陸燥也周禮林衡掌巡林麓之禁令而平其守以時計林麓而賞罰之若斬木材則受法于山虞而掌其政令楛陸璣曰楛其形似荆而赤莖似蓍上黨人織以為牛筥箱器又屈以為叉禹貢荆州貢楛注云中矢幹出雲夢之澤瓚互見衛風圭斯干璋文王祼將箋云圭瓚之狀以圭為柄黃金為勺青金為外朱中央周禮典瑞云祼圭有瓚以肆先王以祼賔客注於圭頭為器可以挹鬯祼祭謂之瓚漢禮瓚槃大五升口徑八寸下有槃口徑一尺玉人云祼圭尺有二寸有瓚以祀廟注云瓚如槃其柄用圭有流前注凡流皆為龍口三璋之勺形如圭瓚白虎通云圭瓚宗廟之盛禮也玉飾其末君子之性金飾其中君子之道禮書云王之肆先王禮賔客以祼圭后之亞祼與王之巡狩以祼璋圭璋其柄瓚其勺也羅氏云鬱與鬯皆隂而玉為陽物圭璋又東南陽方之玉故假之嫌于無陽也禮圖云圭瓚如槃大五升口徑八寸深二寸璋瓚口徑四寸深二寸按玉人說三璋云黃金勺青金外朱中鄭依此說圭瓚之制則為勺者黃金也玉人云祼圭有瓚不别云祼璋有瓚則三璋即璋瓚也陳氏祥道乃云圭瓚璋瓚勺用玉多石少者三璋之勺則飾以金此何據乎即其引鄭氏瓚四玉一石之說彼注鄭已讀瓚為􅖸取雜色之意非此瓚也且若三璋之勺以金為飾玉人但說青外朱中足矣又何用黃金勺一句以此知其說妄也三璋有繅圭瓚當亦有繅鄭氏下槃龍口之說或是漢法不足以擬周制古者諸侯九命賜以秬鬯圭瓚天子之瓚其柄之圭尺有二寸賜諸侯蓋九寸以下也清酒箋云祭祀之事先為清酒周禮酒正辨三酒之物三曰清酒注云今中山冬釀接夏而成六家詩名物疏卷四十六
