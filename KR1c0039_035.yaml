body:
  text: 六家詩名物疏卷三十二明馮復京撰小雅鹿鳴之什一鹿鳴篇苹傳云苹蓱也夏小正七月湟潦生萍周書曰穀雨一日萍始生萍不生陰氣憤盈淮南子云萍樹根于水木樹根于土又云容華生萍萍生萍藻萍藻生浮草凡浮生不根茇者生于萍藻萬畢術曰老血爲萍聚血之精至黄泉也埤雅曰苹一名蓱無根而浮常與水平故曰苹也江東謂之薸言無定性漂流隨風周官萍氏掌水禁鄭氏云以不沈溺取名蓋使之幾酒謹酒也舊說萍善滋生一夜七子一曰浮于流水則不生于止水則一夕生九子故謂之九子萍也世說楊華入水化爲浮萍雅翼云萍水上小浮萍無根但有小須垂水中然淮南云萍植根于水蓋萍以水爲地所垂者乃是根今或反根于上為日所暴即死是與失土同也小雅食野之苹毛氏以為此鄭氏以為非野所生非鹿所食易之曰藾蕭然古人以水草之交為麋則麋鹿亦食水草箋云苹藾蕭爾雅云苹藾蕭郭云今藾蒿也初生亦可食陸璣云葉青白色莖似筯而輕肥始生香可生食亦可蒸食盧氏雜説云唐文宗問宰臣苹是何草李珏曰是藾蕭上曰朕看毛詩疏苹葉圓而花白叢生野中似非藾蕭按唐文宗所説詩疏與今本異賔説文賔所敬也周禮小宰以官府之六聨合邦治二曰賔客之聨事大宗伯以賔禮親邦國按三禮賔有數等大行人掌大賔之禮及大客之儀以親諸侯大賔要服以内諸侯也大客謂其孤卿以此推之要服以外為小賔時聘之大夫士及為介來者皆小客矣朝覲宗遇㑹同諸侯之爲賔者也時聘殷頫諸臣之爲客者也賔客之聯事小宰合之燕饗之禮宗伯職之九儀之命爵行人辨而等之牢禮餼獻飲食之等數掌客掌之逆于疆聚柝致積將幣前驅至朝詔位之類掌訝掌之野之委積司徒令修之若公侯伯子男之相爲賔公侯伯子男之臣相爲客其儀掌之司儀凡諸侯聘禮主國所以待賔者饗食君親爲主尊賔也燕私樂之禮崇恩殺敬故聘禮曰燕則上介爲賔賔爲苟敬宰夫獻也若諸侯無事卿大夫有勤勞之功與羣臣燕飲以樂之則于客内立一人爲賔餘爲衆賔記云若與四方之賔燕則公迎之大門内揖讓升與卿燕則大夫爲賔與大夫燕亦大夫爲賔燕義云使宰夫爲獻主臣莫敢與君亢禮也不以公卿爲賔而以大夫爲賔爲疑也然則燕四方之賔與國内之臣其禮惟迎不迎爲異若族燕之禮則文王世子云異姓爲賔膳宰爲主人不以同姓爲賔者親親也不親主獻者尊君也士冠禮之賔主人之僚友也鄉飲酒禮諸侯之鄉大夫三年大比獻賢者能者于其君以禮賔之與之飲酒主人就先生而謀賔介注云賢者爲賔其次爲介其次爲衆賔以禮賔之將獻于王與鄉射之賔及衆賔皆鄉人之無爵者也鄉飲酒義云立賔以象天立主以象地設介僎以象日月立三賔以象三光坐賔于西北必南鄉鄭以鄉飲酒義之篇具載四禮則鄉飲酒四事其儀皆同也諸侯大射之禮大夫爲賔宰夫爲主人特牲少牢士虞禮之賔皆助祭執事者也楚茨爲賔爲客賔筵賔載手仇是天子助祭之臣亦稱賔也祭禮又有内賔鄭𤣥云姑姊妹也其羣下自相飲亦尊一人爲上賔左傳季氏飲大夫酒臧紇爲客國語公父文伯飲南宫敬叔酒露睹父爲客是也鹿鳴之詩燕羣臣嘉賔則賔指四方之賔及羣臣也笙詳見王風簧白虎通云象萬物之生故曰笙承筐箋云飲之而有幣酬幣也食之而有幣侑幣也禮書云食有侑食故有侑幣饗有酬爵故有酬幣儀禮公食大夫侑以束帛而庭實以皮大夫相食以束錦此食有侑幣也聘禮公于賔若不親食使大夫致之以侑幣致饗以酬幣亦如之大夫於賔若不親饗則公作大夫致之以酬幣士昏禮舅姑饗送者酬以束錦此饗有酬幣也燕禮無用幣之文鹿鳴之詩燕羣臣嘉賔序曰既飲食之又實幣帛筐篚則所謂飲食者燕與食耳此燕有酬幣也孔頴達以飲食爲饗食非詩意也春秋傳曰酬幣宴貨以示容合好則燕未嘗不用酬幣特文不備禮器曰琥璜爵鄭氏以爲天子酬諸侯諸侯相酬之禮是天子饗諸侯諸侯相饗酬幣用玉酬幣亦謂之侑侑幣不謂之酬故春秋傳享醴皆曰宥以侑者勸酬之通稱也蒿爾雅云蒿菣郭璞曰今人呼青蒿香中炙啖者爲菣陸璣云蒿青蒿也荆豫之間汝南汝隂皆曰菣爾雅又云蘩之醜秋爲蒿郭云春時各有種名至秋老成皆通呼爲蒿本草云草蒿一名青蒿一名方潰生華隂川澤圖經云葉似茵蔯蒿而背不白春生苗葉極細嫩時人亦取雜諸香菜食之至夏髙四五尺秋後開細淡黄花花下便結子如粟米大衍義云根赤葉香晏子曰蒿草之高者也筆談云青蒿一類自有青黄兩種陜西綏銀之間蒿叢時有一兩株逈然青色土人謂之香蒿莖葉與常蒿悉同但比常蒿色青翠一如松檜之色至深秋餘蒿並黄此蒿猶青氣稍芬香恐古人所用以此爲勝按爾雅蘩之醜秋爲蒿則所謂蒿者不專謂青蒿矣爾雅蘩蒿蔚蓍莪購蕭七種毛詩俱有之本草有茵蔯蒿邪蒿同蒿三種詩中不見皆蒿屬燕周禮大宗伯以饗燕之禮親四方之賔客掌客掌四方之賔客飲食之等數與其政治凡諸侯之禮上公三燕侯伯再燕子男一燕燕禮記云燕朝服於寢若與四方之賔燕則公迎之大門内揖讓升賔爲苟敬席于阼階之西北面有脀不嚌肺不啐酒其介爲賔無膳尊無膳爵與卿燕則大夫爲賔與大夫燕亦大夫爲賔燕義云使宰夫爲獻主臣莫敢與君亢禮也不以公卿爲賔而以大夫爲賔爲疑也俎豆牲體薦羞皆有等差所以明貴賤也皇氏云燕禮折俎有酒無飯有二種若燕同姓夜則飲之其於異姓讓之而止賈公彦云饗烹大牢以飲賔獻依命數在廟行之燕者其牲狗一獻四舉旅降脫屨升坐無算爵以醉爲度行之在寢此謂朝賔若聘客則皆一饗其燕與時賜無數又云燕有四等諸侯無事而燕一也卿大夫有王事之勞二也卿大夫有聘而來還與之燕三也四方聘客與之燕四也國語云先王之燕禮體解節折而共飲食之於是乎有折俎加豆酬幣宴貨以示容合好韓詩說云夫飲之禮不脫屨而即序者謂之禮跣而上坐者謂之宴能飲者飲之不能飲者已謂之饇齊顔色均衆寡謂之沈閉門不出者謂之湎故君子可以宴可以饇不可以沈不可以湎芩陸璣云莖如釵股葉如竹蔓生澤中下地鹹處爲草真實牛馬亦喜食之四牡篇周道傳云岐周之道漢書地里志右扶風郁夷縣注詩周道郁夷顔氏曰四牡詩周道倭遲韓詩作郁夷言使臣乗馬於此道一統志郁夷城在陜西鳳翔府隴州駱爾雅云白馬黒鬛駱疏云鬛𩮰也說文云白馬黒鬛尾禮記云夏后氏駱馬黒鬛疏云夏尚黒故用黒鬛埤雅云爾雅曰白馬黒鬛駱廣雅云白馬朱鬛駱今呼黄馬尾鬛一道通黒如界者爲駱蓋馬無分于黄白若今衣脊絡縫故曰駱也明堂位云夏后氏駱馬黒鬛此以别白馬朱鬛之駱也月令曰孟秋駕白駱此以别黄馬黒鬛之駱也俗云駱馬善耐勞苦詩曰嘽嘽駱馬言駱性善勞而今取息不平如此則以甚勞故也鵻詩緝云鵻鵓鳩也即郯子祝鳩氏司徒也一鳥而十四名鵻也隹其也鵓鳩也祝鳩也鳺䲹也䳕鳩也鵾鳩也楚鳩也鳻鳩也荆鳩也乳鳩也鵴鳩也􅝣鳩也䳫鳩也通志云凡鳥之短尾者皆謂之隹惟夫不專名焉爾雅云鵻其夫不注今䳕鳩毛傳云鵻一宿之鳥箋云一宿者一意於所宿之木又云鳥之謹愿者人皆愛之方言云鳩闗東周鄭韓魏謂之􅟇鷱其􅝣鳩謂之鸊鷱闗西秦漢之間謂之鵴鳩其大者謂之鳻鳩其小者謂之􅝣鳩或謂䳫鳩或謂䳕鳩或謂鶻鳩梁宋之間謂之鷦鳸陸璣云今小鳩也一名䳕鳩幽州人或謂之鷱􅟇梁宋之間謂之鵻揚州人亦然左傳云祝鳩氏司徒也注祝鳩孝故主教民禽經云鵻上無尋鷚上無常聽聲考詳篇云雀聲慘毒鳩聲慈念雅翼云似班鳩而臆無繡采又頭有贅物之拙者不能爲巢纔架數枝往往破卵無巢不能居天將雨則逐其雌霽則呼而反之鵻既孝鳥故漢授民七十者玉杖端以鳩鳥爲飾按鳩之類多而名赤煩雜故揚雄誤謂鶻鵃爲鵻又誤以鳲鳩爲戴勝嚴氏說鵻十四名而忘陸璣疏幽州謂之鷱􅟇方言􅝣鳩謂之鸊鷱羅氏謂鵻不能作巢陸農師亦云鵻拙而安疑即歐陽永叔所云拙鳩也然歐陽子說拙鳩又不正名爲鵻杞詩緝云詩有三杞將仲子無折我樹杞柳屬也有臺南山有杞湛露在彼杞棘山木也此詩集于苞杞雅杕杜北山言采其杞四月隰有杞桋枸杞也爾雅云杞枸檵注今枸杞也廣雅云地筋枸杞陸璣云一名苦杞一名地骨春生作羮茹微苦其莖似莓子秋熟正赤莖葉及子服之輕身益氣本草云枸杞味苦寒久服堅筋骨輕身不老一名杞根一名地骨一名枸杞心名地輔羊乳脚暑仙人杖西王母杖生常山平澤及諸丘陵阪岸冬採根春夏採葉秋採莖實抱朴子云家菜一名托盧或名天精卻老地骨日華子云地仙苗即枸杞圖經云春生苗葉如石榴葉而軟薄堪食俗呼爲甜菜莖幹高三五尺作叢六七月生小紅紫花隨結紅實形微長如棗核其根名地骨與枸棘相類其實形長而枝無刺者真枸杞也圓而有刺者枸棘也世傳蓬萊縣南丘村多枸杞高者一二丈其根蟠結甚固鄉人多壽考亦飲食其水土之品使然耳沈存中云陜西極邊生枸杞高文餘大可作柱葉長數寸無刺根皮如厚朴甘美異於諸處實圓如櫻桃全少核暴乾如餅極膏潤有味冦氏衍義云凡杞未有無刺者但此物小則多刺大則少刺如酸棗及棘其實一也後人分别杞棘强生名耳皇華篇駰爾雅云陰白雜毛駰樊光曰駰者目下白也郭璞曰陰淺黒今之泥驄或云目下白或云白陰俱非也邢昺曰毛淺黒而白兼雜毛者名駰埤雅云詩我馬維駒維騏維駱維駰先後與駉之序合則駰不如駱駱不如騏常棣篇常棣李氏云何彼穠矣言唐棣之華爾雅所謂栘也此常棣與采薇維常之華爾雅所謂棣也爾雅云常棣棣郭云今山中有棣樹子如櫻桃可食陸璣疏云許慎曰白棣樹也如李而小如櫻桃正白今官園種之又有赤棣樹葉如刺榆葉而微圓子正赤如郁李而小五月始熟自闗西天水隴西多有之程子曰常棣今所謂玉李花鄂相承甚力埤雅云華蕚上承下覆甚相親爾棣从隶言華蕚相承輝榮相隶也鄂不箋云承華者曰鄂不當作拊拊鄂足也楊用修云鄂花苞也今文作蕚不華蒂也今文作跗華下有蕚蕚下有跗花蕚相承覆故得韡韡而光明脊令爾雅云䳭鴒雝渠郭云雀屬也飛則鳴行則摇陸璣云大如鷃雀長脚長尾尖喙背上青灰色腹下白頸下黒如連錢故杜陽人謂之連錢物類相感志云俗呼雪姑其色蒼白如雪鳴則天當大雪禽經云鶺鴒友悌注鶺鴒共母者飛鳴不相離詩人取以喻兄弟相友之道也埤雅云詩曰脊令在原脊令水鳥在原則失其所矣其鳴自呼或曰首尾相應飛且鳴者故謂之雝渠渠之言勤也詩緝云鶺令雪姑也鄭氏以爲水鳥非今雪姑非水鳥朋公羊傳曰同門曰朋鄭𤣥云同師曰朋飫毛云飫私也不脫屨升堂謂之飫鄭云私者圖非常之事若議大疑於堂則有飲禮疏云飫不在公朝在路門内酒肉在堂釋言云飲私孫炎曰飫非公朝私飫飲酒也國語定王曰王公立飲則有房烝將以講事成章建大德昭大物也故立成禮烝而已飲以顯物宴以食好歲飫不倦時宴不淫衞彪徯曰武王克商作詩以爲飫歌名之曰支以遺後之人使永鑒焉按皇氏注禮記以飲爲饗禮義異于毛若依韋昭國語注則毛說爲長但韋依毛鄭爲文未必外傳之本旨帑傳云子也疏云左傳歸其帑書曰予則帑戮女皆是子也伐木篇鳥爾雅云鳥之雌雄不可别者以翼右掩左雄左掩右雌又云二足而羽謂之禽淮南云羽嘉生飛龍飛龍生鳳皇鳳皇生鸞鳥鸞鳥生庻鳥凡羽者生於庻鳥白虎通云鳥所以飛何鳥者陽也飄輕所以飛也禽者何鳥獸之總名明爲人所禽制也禽經云冠鳥性勇帶鳥性仁纓鳥性樂風翔則風雨舞則雨霜霏則霜露翥則露林鳥朝嘲水鳥夜㖡山鳥巖棲原鳥地處物食長喙穀食短咮搏則利觜鳴則引吭毛協四時色合五方周禮云庖人供六禽辨其名物射鳥氏掌射鳥羅氏掌羅烏鳥掌畜掌養鳥而阜蕃教擾之四時貢鳥物翨氏掌攻猛鳥庭氏掌射國之妖鳥禮記云獻鳥者佛其首畜鳥者則勿佛也尚書考靈耀云鳥爲春候神說文天神引出萬物从示申易曰陰陽不測之謂神注神者變化之極妙萬物以爲言不可以形詰大戴禮云陽之精氣曰神按大宗伯之職掌建邦之天神人鬼地示之禮則天曰神人曰鬼地曰示對文爲異若通而言之則地示人鬼俱可云神蓋總是精靈之稱耳羜爾雅曰未成羊羜郭云俗呼五月羊爲羜說文云羜五月生羔也陸農師云羜从宁宁佇也宁其美成而後足用羅氏云說文稱五月生羔似謂仲夏所生按齊民要術五月六月七月生者兩熱相仍惡中之甚古稱肥羜以速諸父不應用此當是生及五月者爾諸父覲禮曰同姓大國則曰伯父同姓小邦則曰叔父禮記曰五官之長曰伯是職方其擯於天子也曰天子之吏天子同姓謂之伯父九州之長入天子之國曰牧天子同姓謂之叔父注云牧尊于大國之君而謂之叔父避二伯也服䖍左傳注云諸侯稱同姓大夫長曰伯父少曰叔父陳饋箋云陳其黍稷謂爲食禮皇氏注禮記云食禮者有飯有殽雖設酒而不飲其禮以飯爲主故曰食也其禮有二種一是禮食故大行人云諸侯三食之禮有九舉及公食大夫禮之屬是也二是燕食者謂臣下自與賔客旦夕共食是也按鄭注曲禮酒漿處右云此大夫士與賔客燕食之禮周禮大宗伯以飲食之禮親宗族兄弟大行人上公食禮九舉侯伯食禮七舉子男食禮五舉掌客上公三食若弗酌則以幣致之侯伯再食子男一食聘禮公於賔壹食上介壹食若不親食使大夫各以其爵朝服致之以侑幣大夫於賔壹食上介若食若饗禮記云族食世降一等注云親者稠疏者稀又云凡養老殷人以食禮埤雅云饗具四豆四籩之實食禮則自饋食而下無朝事之豆籩也燕禮則自加豆加籩而下無饋食之豆籩也諸舅聘禮大國異姓則曰伯舅小邦異姓則曰叔舅禮記云五官之長曰伯天子異姓謂之伯舅九州之長入天子之國曰牧天子異姓謂之叔舅孔仲達云衞孔悝鼎銘公曰叔舅是諸侯稱大夫舅之文也謂異姓大夫長者亦當爲伯舅兄弟箋云兄弟父母之黨釋親云男子先生爲兄後生爲弟族父之子相謂爲族晜弟兄之子弟之子相謂爲從父晜弟從母之男子爲從母晜弟父之黨爲宗族母與妻之黨爲兄弟婦之黨爲婚兄弟婿之黨爲姻兄弟餱爾雅云餥餱食也說文云餱乾食也釋名云餱候也候人飢者以食之也酤毛傳云一宿酒也聽雨紀談云鄭康成訓沽爲榷沽之沽毛氏注謂一宿酒曰沽蓋三代無沽酒者至漢武帝時方有榷酤似一宿酒爲是六家詩名物疏卷三十二
