body:
  text: 六家詩名物疏卷八明馮復京撰國風召南四野有死麕篇野爾雅云邑外謂之郊郊外謂之牧牧外謂之野疏云以細别言之則郊外之地名牧牧外之地名野若大判而言則野者郊外總名故周禮六遂在逺郊之外遂人職云凡治野田是郊外之地揔稱野麕爾雅云麕牡麌牝麜其子麆其迹解絶有力豜郭璞云詩曰麀鹿麌麌鄭康成注即謂此也但重言耳説文云麕麞也埤雅云齊人謂麕謂麞麞如小鹿而美故從章章美也語曰四足之美有麃麃即麞也或曰麞性善驚故從章蓋麕鹿皆健駭而麕性膽尤怯飲水見影輒奔道書曰麞鹿無魂又曰麞鹿白膽善怖為是故也麕性喜山善聚善散故從囷囷聚也亦散也雅翼云麞極能走然未及鹿有牙者有無牙者大者不過三二十斤老則牙見於外淮人謂之牙麞本草圖經云大麞毛長狗足者名􅕱春秋運斗樞云樞星散為麞崔豹古今注云鹿有角而不能觸麞有牙而不能噬吕氏春秋云使麞疾走馬弗及也而得之者時顧也白説文云西方色也隂用事物色白釋名云白啓也如氷啓時色茅爾雅云藗牡茅也陸疏云白茅包之茅之白者古用包褁禮物以充祭祀縮酒用之周易云拔茅茹以其彚征吉陸佃云茅之為物拔其根而牽茹者君子以類出處之象又云藉用白茅無咎象曰藉用白茅柔在下也孔子曰茅之為物薄而用可重也禹貢云荆州厥貢苞匭菁茅周禮甸師云祭祀供蕭茅吳録地理志曰桂陽郴縣有青茅可染青零陵泉陵有香茅古貢之縮酒合璧事類云茅叢生荒野間野人刈以覆屋江淮間生者一莖三脊曰菁茅春鄉飲酒義云春之為言蠢也産萬物者聖也尚書傳云東方者何也動方也物之動何以謂之春春出也物之出也爾雅云春為青陽注氣清而溫陽尚書云寅賓出日平秩東作日中星鳥以殷仲春夏小正云正月啓蟄雉震詬詬者鳴也震者鼓其翼也時有俊風俊者大風南風也滌凍塗滌者變也變而暖也田鼠出農及雪澤采藝藝是邪蒿可食柳稊稊發孚也梅杏柂桃則華二月祭鮪采芑來降燕乃睇三月參則伏􅕪則鳴􅕪螻蛅頒氷拂桐葩桐葩始生貌拂佛然月令云孟春之月日在營室昏參中旦尾中其日甲乙其帝大皥其神勾芒其蟲鱗其音角律中太蔟東風解凍蟄蟲始振魚上氷獺祭魚鴻鴈來天氣下降地氣上騰天地和同草木萌動仲春之月日在奎昏弧中旦建星中注弧與建星者以弧星近井建星近斗井斗度多星體廣不可的指故舉弧建以定昏旦之中律中夾鍾始雨水桃始華倉庚鳴鷹化為鳩玄鳥至日夜分雷乃發聲始電蟄蟲咸動啓户始出季春之月日在胃昏七星中旦牽牛中律中姑洗桐始華田鼠化為鴽虹始見萍始生是月也鳴鳩拂其羽戴勝降於桑生氣方盛陽氣發泄勾者畢出萌者盡達鄭注月令云孟春日月會於娵訾仲春日月會於降婁季春日月會於大梁尚書緯云東方春龍房位其規仁好生不賊其帝青表聖明行趨德元命包云春者神明推移精華結紐注神明猶隂陽也相推使物精華結成紐結要也素問云春三月此謂發陳天地俱生萬物以榮又曰東方生風風生木其德敷和敷和之紀木德周行陽舒隂布五化宣平朴􅈪爾雅云􅈪朴心疏􅈪朴一名心某氏曰朴􅈪槲􅈪也有心能濕江河間以作柱詩云林有朴􅈪此作􅈪朴文雖别其實一也鹿爾雅云鹿牡麚牝麀其子麛其迹速絶有力麉説文云鹿解角獸羣萃善走者也周禮云朝事之豆菁菹鹿臡禮記云仲夏鹿角解又云居澤以鹿豕為禮謂之不知禮又云鹿脯麋脯麕脯皆有軒字統云鹿性警防分背而食以備人物之害埤雅云鹿性警防分背而食食則相呼羣居則環其角外向以防物之害己故詩以況君臣之義而毛詩草蟲經曰鹿欲食皆鳴相召志不忌也周官曰視朝則皮辨服蓋取諸此鹿愛其類出於天性也雅翼云古稱馬之似鹿者直百金今荆楚之地其鹿絶似馬當解角時望之無辨土人謂之馬鹿是知趙髙指鹿為馬蓋以類爾鹿無枝觡角有枝曰觡夏則解角而易毛冬則角長而毛深古伏羲之世麗皮為禮按説文集韻云麗旅行也鹿之性見食則急而旅行禮麗皮蓋鹿皮云家語曰四九三十六鹿主律律主鹿鹿故六月而生運斗樞云瑤光星散為鹿衝波傳云鹿生三年其角自墮述異記云鹿千年為蒼鹿又五百年為白鹿又五百年化為玄鹿成帝時中山人得玄鹿烹而視其骨皆黑色仙者説玄鹿為脯食之壽二千嵗天玄主物簿云鹿者仙獸常自能樂性從其雲泉至六十年必懷瓊於角下角有班痕紫色如點行或有涎出於口不復能急走矣山谷云胡居士常言鹿性驚烈多别良草食葛葉等九物餘則不嘗凡餌藥者勿食鹿肉以鹿常啖解毒之草也玉大戴禮云玉在山而木潤川生珠而岸不枯珠者隂中之陽也故勝水玉者陽中之隂也故勝木周禮玉府掌王之金玉共王之服玉佩玉珠玉王齊共食玉大宗伯以玉作六瑞典瑞掌玉瑞玉器之藏刮摩之工玉人禮記孔子曰君子比德于玉溫潤而澤仁也縝密而栗知也廉而不劌義也垂之如隊禮也叩之其聲清越以長其終詘然樂也瑕不掩瑜瑜不掩瑕忠也孚尹旁逹信也氣如白虹天也精神見於山川地也圭璋特達德也天下莫不貴者道也爾雅玉謂之璲山海經云瑾瑜之玉為良堅栗精密濁澤而有光五色發作以和柔剛天地鬼神是食是饗君子服之以禦不祥尸子云水方折者有玉圓折者有珠地鏡圖曰玉石之精也其居地氣青而浮白而圓光轉地中常潤説苑云玉有六美望之溫潤君子比德焉近之栗理君子比智焉聲近徐而聞逺君子比義焉折而不撓闕而不荏君子比勇焉廉而不劌君子比仁焉有瑕必見之於外君子比情焉王逸正部論云或問玉符曰赤如雞冠黃如蒸栗白如豬肪黑如純漆帨內則云子事父母婦事舅姑左佩紛帨注云帨拭物之佩巾又云子生女子設帨於門右昏禮母施襟結帨尨爾雅云犬生三猣二師一玂未成毫狗絶有力狣狗四尺為獒説文曰犬狗之有懸蹄者也狗叩也叩氣吠以守也尨犬之多毛者也曲禮云凡祭祀犬曰羮獻內則云犬宜梁周禮大司寇大祭祀奉犬牲犬人掌犬牲庖人夏行腒鱐膳膏臊春秋考異郵曰七九六十三陽氣通故斗運狗三月而生陽主於三故狗各髙三尺宋均注曰狗斗精之所生也風俗通云狗者金畜廣雅云殷虞晉獒楚黃韓盧宋㹱狼狐狂獖並犬屬五行傳云雞畜之有冠翼者屬貌犬畜之以口吠者屬言羊畜之逺視者屬視豕畜之居間衛而聽者屬聽牛畜之任重者屬思埤雅云犬有三種一者田犬二者吠犬三者食犬食犬若今菜牛也何彼穠矣篇唐棣爾雅云唐棣栘郭云似白楊江東呼為夫栘陸疏云唐棣奧李也一名雀梅亦曰車下李所在山皆有其華或赤或白五月中成實大如李子可食埤雅云凡木之華皆先合而後開惟此華先開而後合詩曰唐棣之華偏其反而本草云扶栘木皮味苦燒木皮置酒中令味正經時不敗生江南山谷樹木十數圍無風葉動華反而後合崔豹古今注云栘楊圓葉弱蒂微風大搖一名髙飛一名獨搖一名栘楊一名栘柳亦曰蒲栘雅翼云齊民要術以髙飛獨搖為白楊之别名又本草白楊注云取葉圓大蒂小無風自動者故説者云葉無風自動此是栘楊非白楊也按唐棣常棣是二種爾雅云唐棣栘本草謂之扶栘木一名髙飛一名獨搖爾雅又云棠棣棣小雅所謂常棣之華也又本草郁李仁一名棣一名雀李一名車下李七月之所謂薁也陸璣知唐棣常棣各一種郤不當以名奧李車下李五月成實者為唐棣故孔仲達七月疏俱不明了本草注於郁李仁下既引陸氏釋常棣之文圖經又引釋唐棣之文而常唐二字俱作棠混之甚矣唐棣自是楊類雖得棣名而實非棣也惟鄭漁仲分析甚當朱子論語注云唐棣郁李也亦陸璣誤之與王姬禮緯云周姬姓祖履大人迹而生國語云黃帝以姬水成故黃帝為姬春秋築王姬之館於外杜預曰不稱字以王為尊也公羊傳云天子嫁女於諸侯必使諸侯同姓者主之序云王姬下嫁於諸侯車服不繫其夫下王后一等箋云謂車乘厭翟勒面繢總服則褕狄按王姬依毛傳則武王之女適齊侯之子武王后齊太公之女太公子丁公伋與邑薑為兄弟所稱齊侯者殆是丁公與玄晏先生云武王五男二女元女妻胡公王姬宜為媵今得適齊侯之子者或以尊故命同族為媵也若以為東遷後詩則春秋王姬歸齊與平王相值者有二莊元年之王姬所適者齊襄公也莊十一年之共姬所適者齊桓公也鄭針膏肓云齊侯嫁女以其母王姬始嫁之車逺送之其説又異矣車釋名云古者車聲如居言所以居人也今曰車車舍也行者所處若舍也古史考云黃帝作車少昊時略加牛禹時奚仲駕馬山海經云番禺生奚仲奚仲生吉光是始以木為車晉書云聖人見秋蓬孤轉杓觹旁建乃作輿輅而方圓異制周禮巾車掌公車之政令王之五路玉路金路象路革路木路王后之五路重翟厭翟安車翟車輦車王之喪車五乘木車素車藻車駹車漆車服車五乘孤乘夏篆卿乘夏縵大夫乘黑車士乘棧車庶人乘役車車僕掌戎車之萃廣車之萃闕車之萃蘋車之萃輕車之萃考工記云周人尚輿一器而工聚焉者車為多軫之方以象地也蓋之圜以象天也輪輻三十以象日月也蓋弓二十有八以象星也車人為大車柏車羊車禮書云車之制前軾而後户前軌而後軫旁輢而首以較下軸而銜以轐對人者謂之如輈者謂之輈揉而相迎者謂之牙輈之曲中謂之前疾軛之上平謂之衡衡之材與輿之下木皆曰任以其力任於此也轂之端與輢之下木皆曰軹以其旁止於此也軫可以名輿可以名車達常可以名部軫前橫木可以名輅此又因一材而通名之也其為車也有長轂者有短轂者有杼輪者有侔輪者有反輮者有仄輮者有兩輪者有四輪者有有輻者有無輻者有曲轅者有直轅者有一轅者有兩轅者有直輿者有曲輿者鈎車曲輿有廣箱者有方箱者有重較者有單較者或駕以馬或駕以牛或挽以人或飾以物或飾以漆或朴以素要皆因宜以為之制稱事以為之文也李爾雅云休無實李座接虞李駁赤李桃李醜核棗李曰疐之運斗樞云玉衡星散為李管子云五沃之土其木宜李淮南子三月其樹李埤雅云素問曰李韭皆酸李東方之果木子也故其字從木從子性頗難老老雖枝枯子亦不細其品處桃上爾雅翼云李木之多子者花最繁密爾雅有三種座接虞李即今之麥李與麥同熟者為果肉厚而乾與核相離駁赤李則李之赤而有木者休無實李李實繁有竊食之嫌無實則其下可休矣西京雜記云上林苑有紫李青綺李黃李青房李緑李顔淵李合枝李羌李朱李車下李燕李猴李蠻李齊譜云齊者古少皥世爽鳩氏之墟周武王伐紂封大師吕望於齊地方百里都營丘周公定九畿成王用周公之法制廣大邦國之境而齊受上公之地更方五百里其封域東至於海西至於河南至於穆陵北至於無棣在禹貢青州岱山之隂濰淄之野朱子云今青齊淄濰德棣等州是其地左傳晏子云昔爽鳩氏始居此地季萴因之有逄伯陵因之薄姑氏因之而后太公因之元命包云虛危之精流為青州分為齊國史記云齊所以為齊者以天齊也又云胡公徙都薄姑獻公徙治臨淄又云吾適齊自泰山屬之琅琊北被於海膏壤二千里其民濶達多匿知其天性也戰國策蘇秦云齊南有泰山東有琅琊西有清河北有渤海此所謂四塞之國也按一統志營丘城在今青州府昌樂縣東南五十里薄姑今青州府博興縣有故城在縣東十五里古齊城在臨淄縣城北獻公所徙之城也天齊淵在臨淄縣東十五里平地出泉廣可半畝土人名曰龍池朱傳所云青即今青州府齊州今濟南府淄州今濟南府淄川縣濰州今萊州府濰縣德州在濟南府棣州今青州府樂安縣俱隸山東釣説文鈎魚也列子云釣者以獨繭絲為綸芒針為鈎荆篠為竿剖粒為餌淮南子曰釣者靜之緡釋言云緡綸孫炎曰皆繩名也郭璞曰緡繩也江東謂之綸釋名云綸倫也作之有倫理也小爾雅云大者謂之索小者謂之繩詘而戻之為䋫物原云遂人作繩軒轅因作綿索通俗文曰合繩曰糾單展曰紐織繩曰辮大繩曰絙易曰上古結繩而治書曰木從繩則正按禮記王言如絲其出如綸鄭注今制有秩嗇夫所佩此説文所謂糾青絲綬也與此綸不同騶虞篇葭爾雅云葦醜芀葭華葭蘆其萌虇夏小正云七月秀雚葦未秀則不為雚葦秀然後為雚葦雚未秀為菼葦未秀為蘆埤雅云葦醜芀言其華皆有芀秀今風輒吹揚如雪其聚於地如絮淮南子曰蔐苖類絮而不可以為絮葦即今之蘆一名葭葭葦之未秀者也萑即今之荻一名蒹蒹萑之未秀者也葭一名華蒹一名薕至秋堅成謂之萑葦先儒以為萑如葦而細按禮土鼓簣桴葦籥葦管中籥則萑小而葦大矣其字從韋則韋緩故也荀子曰柔從若蒲葦嚴粲云葭蘆葦又名華一物四名葭葦之初生者淮南子云季夏令滂人入材葦按字説云蘆謂之葭其小曰萑荻謂之蒹其小曰葦與夏小正埤雅之言相反釋爾雅者孫炎郭璞以蘆薍為二草李巡舍人樊光以蘆薍為一草自古有此紛紛矣豝爾雅云豕牝豝小爾雅云彘豬也其子曰豚大者謂之豝説文云豝牝豕也一曰二歲能相把拿也古今注云漁陽以大豬為豝字説云豝所謂婁豬巴猶婁也雅翼云凡六畜之屬皆見於釋畜惟豕見於釋獸以豕者通田豕之名故别異之詩云彼茁者葭一發五豝于嗟乎騶虞然則豝牝豕之小者故又謂之小豝言雖取害稼之物亦必待其成所以為仁也按羅氏云牝豕之小者對大豕而言若對豵則豝為大矣玩二章經旨葭叢髙故有豝藏焉蓬叢低故有豵藏焉説文一歲為豵二歲為豝之説殆必有所昉也朱子以豝為牡豕顯悖爾雅此鹵莽之過廣雅云獸一歲為豵二歲為豝三歲為肩四歲為特則豝豵之名可通於羣獸也騶虞毛傳云義獸也白虎黑文不食生物有至信之德則應之陸疏云尾長於軀不食生物不履生草海內北經云林氏國有珍獸大若虎五采畢具尾長於身名曰騶吾劉芳詩義疏曰吾或作虞乘之日行千里封禪書云囿騶虞之珍羣頌曰般般之獸樂我君囿白質黑章其儀可喜旻旻穆穆君子之態晉郭璞贊曰怪獸五采尾參於身矯足千里倏忽若神是謂騶虞詩歎其仁吳薛綜頌曰婉婉白虎優仁是崇飢不侵暴困不改容斂威揚德愷悌之風中興徴祥説云騶虞仁獸也其尾參倍狀如虎而白色嘯則風興皓身如雪而無雜者是也近代所謂白虎者背班而虎文爾雅所謂彪虎耳瑞應圖云白虎仁而不害王者不暴虐恩及行葦則見河圖括地象云令訾野中有玉虎晨鳴雷聲聖人感期而興埤雅云騶虞西方之獸而名之曰虎則宜以殺為事今反不履生草食自死之肉蓋仁之至也按禮射義云天子以騶虞為節樂官僃也異義韓詩説云騶虞天子掌鳥獸官魯詩傳云古有梁騶者天子之田也賈誼新書曰騶者天子之囿也虞者囿之司獸者也以騶為囿名及以梁騶為田名僅見於魯詩賈子月令教田獵命僕及七騶咸駕左傳晉悼公使程鄭為乘馬御六騶屬焉則騶者馬御也舜典益作朕虞周有山虞澤虞大田獵萊山澤之野則虞者虞人也韓詩説云掌鳥獸官意蓋近之小序云天下純被文王之化庶類繁殖搜田以時仁如騶虞焦弱侯云騶人不失馳驅之法則物不過傷虞人厲山澤之禁故物性能遂因嘆美歸功於二官以此解序未為不可而與射義所謂樂官僃者亦可通矣但山海經及緯候之書俱以為義獸説其形者或以為五采畢具或以為白虎黑文或以為皓身無雜又各不同羅願則據淮南子文王囚羑里散宜生得騶虞雞斯之乘以獻於紂謂文王之馬有名騶虞者以其如林氏騶虞之俊逸而名之文王必嘗駕以從田能與人相應致獲禽之多故申而嘆之此又一説也蓬爾雅云齧雕蓬薦黍蓬説文蓬蒿也草之不理者也埤雅云其葉散生末大於本故遇風輒拔而旋雖轉徙無常其相遇往往而有故其制字從逢曾子曰蓬生麻中不扶自直商子曰飛蓬遇飄風而行千里者乘風之勢説苑云秋蓬惡於根本而美於枝葉秋風一起根且拔矣通志云菰曰蓬今人謂之茭爾雅云雕蓬者米茭也其米謂之雕胡可作飯故曰齧黍蓬者野茭也不能結實惟堪薦藉故曰薦按蓬是蒿類與茭自别鄭漁仲所云蓋本孫炎爾雅注非也豵爾雅云豕生三豵二師一特郭注豕生子常多故别其少者説文云豵生六月豚一曰一歲豵尚叢聚也雅翼云豵從從義猶從也羣以從母有約從之義説文又以小豚為豰生二月為豯生六月為豵或曰一歲為豵二歲能相把拏三歲豕肩相及為􅜏其説豵與爾雅不同然皆小豕之名六家詩名物疏卷八
