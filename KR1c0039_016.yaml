body:
  text: 六家詩名物疏卷十三明馮復京撰國風邶五泉水篇泉水藍田吕氏曰泉水即今衛州共城之百泉也淇水出相州林慮縣東流泉水自西北來注之故曰亦流于淇而竹竿詩言泉源在左淇水在右者蓋主山而言之相衛之山東面故以北為左以南為右水經注泉源水有二源一水出朝歌西北又東與左水合謂之馬溝水又美溝水出朝歌西北大嶺下更出徑駱駝谷於中逶迤九十曲故俗有美溝之目歷十二崿崿流相承泉響不斷寰宇記澶州頓丘縣東北三十五里有泉源祠一統志泉源在頓丘右城東北頓丘城在大名府清豐縣西南按吕云衛州共城即今河南衛輝府輝縣古共伯國衛都朝歌今大名府濬縣境共城在朝歌西南相州林慮縣即彰德府林縣也在朝歌西北泉水與淇合當在于此一統志謂頓丘有泉源又謂衛河源出輝縣則百泉即衛河之源也淇山海經云沮洳之山淇水出焉南流注于河水經云淇水出河內隆慮縣西大號山東過內黃縣南為白溝屈從縣東北與洹水合過廣宗縣東為清河通典云淇水至衛州衛縣界入河謂之淇水口古朝歌也衛居河淇之間一統志淇水源出林慮縣山中綿歷太行而東至大名府濬縣枋頭東流入衛河衛河源自輝縣經大名府濬內黃二縣下流與淇漳滹沱等河合至直沽入海大名府濬縣即古衛州衛縣衛地里志云河內朝歌縣紂所都康叔所封更名衛左傳祝他曰分康叔封畛土略自武父以南及圃田之北竟封于殷墟朱傳云衛本都河北朝歌之東淇水之北百泉之南其後不知何時并得邶鄘之地至懿公為狄所滅戴公東徙渡河野處漕邑文公又徙居楚丘大抵今懷衛澶相滑濮等州開封大名府界皆衛境也元命包云營室流為并州分為衛國之鎮按朝歌故城在大名府濬縣西七十里懷州今懷慶府衛州今衛輝府相州今彰德府並隸河南開封府今仍舊名雜有宋衛陳鄭祀許之地澶州今開州滑州今滑縣並屬隸大名府濮州今屬山東東昌府諸姬箋云諸姬未嫁之女朱傳云謂姪娣莊十九公羊傳云諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何弟也諸侯一聘九女諸侯不再娶成八年左傳云衛人來媵共姬禮也凡諸侯嫁女同姓媵之異姓則否杜預釋例云古者諸侯取適夫人及左右媵各有姪娣皆同姓之國國三人凡九女參骨肉至親所以息隂訟隂訟息所以廣繼嗣穀梁傳云一人有子三人緩帶范注欲共享其祿也爾雅云女子謂晜弟之子為姪女子同出謂先生為姒後生為娣注同出謂俱嫁事一夫白虎通云備姪娣從者謂其不相嫉妬也一人有子三人共之若已生之不娶兩娣者傳異氣也娶三國女何廣異類也恐一國血脈相似俱無子也姪娣年雖少猶從適人者明人君無再娶之義也還待年于父母之國未任答君子也二國來媵誰為尊者大國為尊國等以德德同以色質家法天尊左文家法地尊右按媵有二種諸侯娶九女夫人及二媵俱有姪娣大夫士無二媵即以姪娣為媵大夫備姪娣曲禮大夫不名世臣姪娣喪大記大夫撫姪娣是也士不必備士昏禮雖無娣媵先是也鄭注士昏禮云娣尊姪卑考諸經傳並無以姑為媵之文蓋姑尊非可從嫁朱子釋諸姬云姪娣釋諸姑云即諸姬殆是瞽説爾雅云同出謂先生為姒是姊得為媵矣泲箋云泲禰所嫁國適衛之道所經朱傳云皆自衛來時所經之處蘇氏云書濟入於河溢為滎春秋傳衛敗于滎澤故泲水及衛水經濟水出河東垣縣東王屋山禹貢云導沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北會于汶又北東入于海玉海云濟水在孟州濟源縣西北三里平地而出有二源東源周回七百步深不可測西源周回六百八十五步深一丈源出王屋山風俗通云濟者齊齊其度量也按説文泲沇也東入于海濟水出常山房子贊皇山東入泜二水音同經傳通誤書泲為濟惟此經文不誤耳應劭遂以出贊皇者為泲失之逺矣一統志濟在河南懷慶府濟源縣西北三里源發王屋山下既見而伏復出于此有東西二源合流至溫縣南入黃河其水性下且徑過黃河之南溢而為滎往東若斷若續或伏或見而入于海飲餞説文餞送去也傳云祖而舍軷飲酒於其側曰餞韓詩章句云送行飲酒曰餞禰寰宇記云大禰溝在曹州寃句縣北七十里一統志大禰溝在山東兖州府曹州界內詩飲餞于禰即此今淤塞姑爾雅云父之姊妹為姑釋名云姑故也于已為久故之人姊爾雅云男子謂女子先生為姊疏云姊咨也以其先生言可咨問干毛傳云干言所適國郊也地里志東郡有發干縣曹氏曰即此所謂干玉海云故發干縣今開德府觀城今觀城縣屬山東東昌府路史云郡國志衛縣南有干城詩出宿于干者今開封有邗溝言隋云邢州內丘縣有千言山水經注泜水又東南經千言山一統志千言山在直隸順德府唐山縣西北四里衛詩出宿于干飲餞于言即此按泲禰千言諸地孔氏云衛女所嫁國適衛之道所經見今不知所嫁何國古人釋地名及一統志所載亦俱影響耳曹氏既以干為發干縣一統志復以干言為一山其參錯不同如此豈可據信脂爾雅云氷脂也內則注云脂肥凝者釋者曰膏爾雅疏云對例則異散文則脂膏皆揔名也牽釋文云牽車軸頭金也説文云車鍵釋名云轄害也車之急害也舝轄音義同禮書云輨以冒轂轄以制軸二者皆金為之詩正義云牽無事則脫行乃設之淮南子云車之能轉千里者其要在三寸轄肥泉爾雅云歸異出同肥疏小水支分歸入大海則異其泉源初出則同流者名肥釋名云所出同所歸異曰淝泉本同出時所浸潤少所歸各枝散而多似淝者也水經注馬溝水出朝歌城北又東流與美溝合又東南注淇水為肥泉詩我思肥泉毛云同出異歸為肥泉今是水異出同歸須水經注濮渠東徑須城北衛詩云思須與曹也地里志云東郡須昌縣故須句國一統志須城廢縣在兖州府東平州傅氏曰自須至漕由東而西也駕後漢輿服志云乘輿所御駕六餘皆駕四注古文尚書曰豫臨兆民凜乎若朽索之御六馬逸禮王度記云天子駕六馬諸侯駕四大夫三士二庶人一周禮四馬為乘毛詩天子至大夫同駕四士駕二易京氏春秋公羊説皆云天子駕六許慎以為天子駕六諸侯及卿駕四大夫駕三士駕二庶人駕一史記曰秦始皇以水數制乘六馬鄭玄以為周禮乘馬有四圉各養一馬也諸侯亦四馬顧命時諸侯皆獻乘黃朱乘亦四馬也今帝者駕六此自漢制與古異耳王肅云古者一轅之車駕三馬則五轡其大夫皆一轅車夏后氏駕兩謂之驪殷益以一騑謂之驂周人又益一騑謂之駟本從一驂而來亦謂之驂埤雅云説文曰駢駕二馬也尚書大傳曰命於其君然後得乘駢馬驂駕三馬也駟駕四馬也詩曰載驂載駟驂以言大夫駟以言諸侯白虎通曰天子駕六者示有事于天地四方也列子亦云六轡不亂而二十四蹄所投無差則古有駕六之制矣或曰天子之馬盛則駕六常則駕四吕覽乘雅作駕北門篇門釋名云門捫也在外為人所捫摸也説文云門從二戶象形易云重門擊柝以待暴客月令仲冬乃修闔扇鄭注因蟄蟲啓戶耕事少間而治門戶也用木曰闔用竹葦曰扇左傳云啓塞從時注門戶道橋謂之啓城郭牆塹謂之塞天春秋説題辭云天之言顯也居高理下為人經紀故其字一大以鎮之禮統云天鎮也神也珍也施生為本運轉精神功效列陳其道可珍重也周易云大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命又云天行健又云立天之道曰隂與陽又云天地之道貞觀者也左傳云天有六氣降生五味注曰六氣謂隂陽風雨晦明毛傳云尊而君之則曰皇天元氣廣大則稱昊天仁覆愍下則稱旻天自上降監則稱上天據逺視之蒼蒼然則稱蒼天爾雅云穹蒼蒼天也春為蒼天夏為昊天秋為旻天冬為上天疏歐陽尚書説春曰昊天夏曰蒼天與爾雅異廣雅云東方皥天東南陽天南方赤天西南朱天西方成天西北幽天北方玄天東北變天中央鈞天爾雅疏考靈耀云一度二千九百三十二里千四百六十一分里之三百四十八周天百七萬一千里者是天圜周之里數也以圍三徑一言之直徑三十五萬七千里此為二十八宿周回直徑之數也然二十八宿之外上下東西各有萬五千里是為四逰之極謂之四表據四表之內并星宿內總有三十八萬七千里然則天之中央上下正半之處則一十九萬三千五百里地在于中是地去天之數也河圗括地象云易有太極是生兩儀兩儀未分其氣混沌清濁既分伏者為天偃者為地又云西北為天門東南為地戶天門無上地戶無下注天不足西北是天門地不滿東南是地戶又云天左動起于牽牛地右動起于畢河圖帝覽嬉云黃道一青道二出黃道東赤道二出黃道南白道二出黃道西黑道二出黃道北日春東從青道夏南從赤道秋西從白道冬北從黑道渾天儀注云天如雞子地如雞中黃孤居于天內天大地小天表裏有水天地各乘氣而立載水而行周天三百六十五度四分度之一又中分之則半覆地上半繞地下故二十八宿半見半隱天轉如車轂之運也素問云積陽為天故天者清陽也五經通義云天神之大者曰昊天上帝即耀魄寶也亦曰天皇大帝亦曰太乙其佐曰五帝東方青帝靈威仰南方赤帝赤熛怒西方白帝白招拒北方黑帝叶光紀中央黃帝含樞紐一説蒼帝名靈符赤帝名文祖白帝名顯紀黑帝名玄矩黃帝名神斗河圗曰其精東為蒼龍南為朱鳥中央為麟西為白虎北為玄武晉書云天二端謂之南極北極出地三十六度南極入地三十六度兩極相去一百八十二度半強繞北極徑七十二度常見不隱繞南極七十二度常隱不見北風篇北風爾雅云北風謂之涼風吕氏春秋曰北風謂之寒風易緯云冬至廣莫風至雪釋名云雪綏也水下遇寒氣而凝綏綏然也左傳云凡平地盈尺為大雪月令孟春行冬令雪霜大摯孟冬行秋令雪霜不時曽子云隂氣盛則凝為雪韓詩外傳云凡草木花皆五出雪花獨六出雪花曰霙雪雲曰同雲西京雜記云太平之代雪不封條凌殄毒害而已潛潭巴云大雪甚厚必有女主天雪連月隂作威宋均曰雪為隂臣道埤雅説文云凝雨説物者從彗蓋雪雨之可掃者也亦能淨坌穢若彗所謂以黍雪桃者以淨為義臘雪握之輒聚立春以後不復可摶亦以微溫搏之故也夏小正云農及雪澤言雪澤之無高下也赤考工記云南方謂之赤釋名云赤赫也太陽之色也黑爾雅云黑謂之黝考工記云北方謂之黑釋名云黑晦也如晦冥時色也烏小爾雅云純黑而反哺者謂之烏小而腹下白不反哺者謂之雅烏白項而羣飛者謂之燕烏燕烏白脰烏禽經云慈烏反哺白脰烏不祥巨喙烏善警哀烏吟夜注云烏之白脰者西南人謂之鬼雀鳴則凶咎埤雅云烏一名鴉其名自呼體全黑今人聞鵲噪則喜聞烏噪則唾以烏見異則噪故輒唾其凶也傳曰烏樂空曠鵲樂稠閙世云鴛交頸而感烏傳涎而孕莊子云烏鵲孺蓋謂是與按説文烏孝鳥也其赤白蒼三種或有三足者緯候諸書皆以為嘉瑞非不祥鳥也莫黑匪烏以喻衛君臣皆惡必不援孝鳥為喻矣孔疏既不詳辨考爾雅注疏但知有反哺不反哺白腹白項之辨而已陸農師埤雅則混孝鳥與不祥之烏為一本草禽部有二種烏鴉慈鴉以吳地所産驗之慈鴉即反哺者其頸白鳴聲啞啞人亦不惡之有一種純黑而惡聲者謂之老鴉俗亦聞其鳴則凶則此詩之烏即今老鴉矣靜女篇首釋名云首始也元命包云頭者人所居上圎象天氣之府也嵗必十二故人頭長一尺二寸素問云頭者精明之主彤管傳云古者后夫人必有女史彤管之法史不記過其罪殺之左傳云靜女之三章取彤管焉注云女史記事規誨之所執禮云史載筆士載言古今注牛亨問彤管何也答曰彤者赤漆耳史官載事故以彤管用赤心記事也周禮女史掌王后之禮職掌內治之二以詔后治內政逆內功書內令凡后之事以禮從李氏云古者緘有管樂亦有管不知彤管何物也牧毛傳云牧田官也周禮牧人掌牧六牲而阜蕃其物山虞掌山林之政令大田獵則萊山田之野澤虞掌國澤之政令大田獵則萊澤野迹人掌邦田之地政為之厲禁而守之凡田獵者受令焉獸人凡田獸者掌其政令朱傳云牧外野也爾雅云郊外謂之牧牧外謂之野疏云牧者言可放牧也荑埤雅云列子曰因以為弟靡弟讀如稊稊茅之始生也詩曰手如柔荑稊荑一也箋云荑可以供祭祀讀詩記云大過九二枯楊生稊鄭康成易作荑然則所謂稊者凡草木根芽皆是非獨茅也七月疏云荑是葉之新生者新臺篇新臺水經注云鄄城北岸有新臺寰宇記云在濮州鄄城北十七里按濮州今屬山東東昌府鄄城縣今省入州臺爾雅云闍謂之臺有木者謂之榭又云四方而高曰臺釋名云臺持也言築土堅高能自勝持也月令仲夏可以居高明可以處臺榭五經異義云天子有三臺靈臺以觀天文時臺以觀四時施化囿臺以觀鳥獸魚鱉諸侯卑不得觀天文無靈臺但有時臺囿臺也國語伍舉云先王之為臺榭也榭不過講軍實臺不過望氛祥故榭度於大卒之居臺度於臨觀之高瘠磽之地於是乎為之城守之木於是乎用之河釋名云河下也隨地下處而通流也春秋説題辭云河之為言荷也荷精分布懷隂引度也援神契云河者水之伯上應天漢風俗通云江河淮濟為四瀆瀆通也所以通中國垢濁爾雅云河出崑崙虛色白所渠并千七百一川色黃百里一小曲千里一曲一直又云水自河出為灉尚書云導河積石至于龍門南至于華隂東至于底柱又東至于孟津東過洛汭至于大伾北過洚水至于大陸又北播為九河同為逆河入于海學記云三王之祭川也皆先河而後海王制云天子祭四瀆視諸侯京房易傳云河者經天亘地之水易乾鑿度云天降嘉應河水先清三日清變為白白變為赤赤變為玄玄變為黃各三日山海經云不周之山北望諸毗之山臨彼嶽崇之山東望泑澤河水所潛也其源混混泡泡注泑澤即蒲昌海河之重源也淮南子云河以逶迤故能逺漢書谷永云河中國之經瀆聖王興則出圗書王道廢則竭絶潰溢橫流漂沒陵阜異之大者也桓子新論王平仲云周譜言定王五年河徙故道今所行處非禹所穿初學記云崑崙山白水出其東北陬屈向東南潛行地下至規期山北流分為兩源一出蔥嶺一出于闐復合東注蒲昌海復潛行地下南出積石山西南流又東回入塞過張掖南與洮河合出龍門至華隂潼關與渭水合又東回過砥柱及洛陽至鞏縣與洛水合成臯與濟水合又東北流過武德與泌水合至黎陽信都巨鹿之北遂分為九河又合為一河而入海元史云朵甘衛西鄙直馬湖蠻部正西三千餘里去雲南麗江府西北一千五百里水從地湧出百餘泓方七八十里履高瞰之燦若星列因名星宿海東北流百餘里滙為大澤又東流為赤賔河又合忽蘭等河始名黃河又東北至陜西蘭縣始入中國又東北經沙漠地折而南流入山西境凡九千餘里苑洛語録云河至河間永平二府播為九河古平州之南滄州之北也逆河今永平府東境大海發一洋自東而西古逆河也轉曲之間撫寧縣有碣石古驪城也今河徙而逆河尚存水釋水云灉反入灘沙出汧出不流瀵大出尾下水醮曰厬水決之澤為汧決復入為汜水注川曰溪注溪曰谷注谷曰溝注溝曰澮注澮曰瀆説文云水準也北方之行象衆水並流中有微陽之氣也徐曰衆屈為水至柔能攻堅故一其內也元命包云水之為言演也隂化淖濡流施潛行也故其立字兩人交一以中出者為水一者數之始兩人譬男女言隂陽交物以一起也又云水者天地之包幕五行之始萬物之所由生元氣之津液也易云坎為水潤萬物者莫潤乎水尚書云五行一曰水水曰潤下潤下作鹹黃帝書云天在地外水在天外水浮天而載地者也管子云地者萬物之本原諸生之根苑水者地之血氣如筋脈之流通者也故曰水具材也夫水淖弱以清而好灑人之惡仁也視之黑而白精也量之不可使槩至滿而止正也唯無不流至平而止義也人皆赴高已獨赴下卑也卑也者道之室王者之器也而水以為都居苟子孔子曰夫水遍與諸生而無為也似德其流也卑下倨句必循其理似義浩浩乎不居似有道其赴萬仭之壑不懼似勇主量必平似法盈不求槩似正綿弱微達似察以出以入就潔似譱發源必東似志是以君子見大水必觀焉子華子云棲三陽之正氣于水樞其専精之名曰太一太一正陽也水含太一之中精故能潤澤萬物而行乎地中淮南子云水上天為雨露下地為潤澤無所私而無所公靡濫振蕩與天地鴻洞無所左而無所右蟠委錯紾與萬物終始是謂至德漢書李尋上言曰五行以水為本其星玄武婺女天地所紀終始所生水為準平王道公正修明則百川理落脈通偏黨失綱則涌溢為敗籧篨晉語云籧篨不可使俯注籧篨偃人又云籧篨蒙璆朱傳云籧篨本竹席之名人或編以為囷其狀如人之擁腫而不能俯者故又因以名此疾也淮南子霜文沈居若簟籧篨注籧篨葦席網廣雅云魚網謂之罟説文云網庖羲所結繩以田以魚也周易云伏羲作結繩而為網罟蓋取諸離抱朴子曰太昊師蛛蜘而結網世本云芒作網國語里革云古者大寒降土蟄發水虞于是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也漢書云豺獺未祭罝網不布壄澤鴻毛傳云大曰鴻小曰雁周易漸曰初六鴻漸于干六二鴻漸于磐九三鴻漸于陸六四鴻漸于木九五鴻漸于陵上九鴻漸于陸其羽可用為儀吉尸子云鴻鵠之鷇羽翼未合而有四海之心揚子云鴻飛冥冥弋人何篡焉埤雅云鴻之為物其進也有漸其飛也有序又其羽可用為儀君子之道也禮曰前有車騎則載飛鴻飛鴻有行列故也博物志曰鴻鵠千嵗者皆胎産鴻雁大略相類以仲秋來賔一同也鳴如家鵝二同也進有漸飛有序三同也雁色蒼而鴻色白一異也雁多羣而鴻寡侣二異也毛有粗細形有大小又曰鴻毛為囊可以渡江不漏戚施國語云戚施不可使仰注云僂人又云戚施直鏄朱傳云亦醜疾也按爾雅釋訓云籧篨口柔也戚施面柔也疏云人口柔者必仰面觀人顔色而為辭似籧篨不俯之人因名口柔者為籧篨面柔者必低首下人媚以容色似戚施之人因名面柔者為戚施爾雅之作本為釋詩鄭本以申傳旨蓋衛宣公下淫子婦為鳥獸行詩人度其狐媚之態故以口柔面柔者醜之鄭意未為失歐陽永叔曲加掊擊未詳厥趣又韓詩薛君章句云戚施蟾蜍喻醜惡説文作􅖚􅠴引此詩文即爾雅云鼁􅖚蟾諸郭云似蝦蟆居陸地淮南謂之去蚊者也本草圗經云形大背上多痱磊行極遲緩不能跳躍亦不解鳴多在人家下濕處其腹下有丹書八字抱朴子云蟾蜍夀三千嵗者頭上有角頷下有丹書八字文子云蟾蜍辟兵夀在五月之望蓋其形亦醜惡而可畏者也似蝦蟆非即蝦蟆本草經云蝦蟆一名蟾蜍一名􅖚混矣六家詩名物疏卷十三
