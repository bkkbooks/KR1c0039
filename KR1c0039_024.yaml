body:
  text: 六家詩名物疏卷二十一明馮復京撰國風鄭二遵大路篇祛疏云袂是袪之本袪為袂之末俱是衣袖釋名云袪虛也玉藻云深衣三袪袂可以回肘長中繼掩尺袪尺二寸喪服記云袂屬幅袪尺二寸注云袪袖口也尺二寸足以容中人之併兩手女曰雞鳴篇明星蘇氏云明星啓明也爾雅云明星謂之啓明孫炎曰明星太白也出東方高三舍今曰明星昏出西方高三舍今曰太白郭曰太白星也晨見東方為啓明昏見西方為太白天官占云太白者金之精西方白帝之子上公大將軍之象也徑一百里天官書云太白曰西方秋司兵主殺殺失者罰出太白率一歲一周天出東方百二十日入西行百二十日旦入入以辰戌出以丑未出不經天經天天下革政日方南金居其南日方北金居其北曰贏用兵進吉退凶日方南金居其北日方北金居其南曰縮用兵退吉進凶太白白比狼赤比心黃比參左肩蒼比參右肩黑比奎大星亢為疏廟太白廟也太白大臣也其號上公其他名殷星大正營星觀星宮星明星大衰大澤終星大相天浩序星月緯大司馬位河圗云大白散為天杵天柎伏霛大敗司姦天狗天殘卒起白彗嚴氏云蘇氏以明星為啓明蓋今俗所謂曉星也毛氏謂天將曉則小星不見惟明大之星爛然雖不指為啓明然將曉而明大者惟啓明耳弋箋云弋繳射也夏官司弓矢矰矢茀矢用諸弋射注云結繳于矢謂之矰矰高也茀矢象焉茀之言刜也二者皆可以弋飛鳥刜羅之也埤雅云弱弓微矢乘風振之曰弋鳬爾雅云鸍沈鳬郭云似鴨而小長尾背上有文今江東亦呼為鸍又云鳬堆醜其足蹼其踵企陸璣云大小如鴨青色卑腳短喙水鳥之謹願者也埤雅云沈鳬好沒與雁常以晨飛容與與波上下雅翼云陸龜蒙稱夜聞有聲類暴雨者一夕數四明訊其氓曰鳬鷖也其曹蔽天而來必竭禾穗而去江南不能弋羅常藥而得之鳬所在必賊粱食古人亦養之今江東有小鳬其多無數俗謂之冠鳬善飛方言曰野鳬甚小而好沒水中者南楚之外謂之鸊鵜莊子云鳬脛雖短續之則憂古今注云鳬雁常住海邊沙上食沙石皆消爛帷食海蛤不消有女同車篇舜爾雅云椴木槿櫬木槿注别二名也似李樹華朝生夕隕或呼日及亦曰王蒸廣雅云一名朱槿一名赤槿月令云仲夏木槿榮本草云木槿作飲服之令人得腄花作湯代茶喫治風衍義云如小葵花淡紅色五葉成一花湖南北人家多種植為籬障埤雅云木槿一名舜瞬之義取此雅翼云抱朴子曰木槿楊柳斷植之更生倒之亦生橫之亦生生之易者莫過斯木仲夏應陰而生其花朝開暮落莊生以為朝菌篤論云日給之華似奈奈實而日給虛虛偽之與真實相似也羅浮山記木槿花甚丹四時敷榮傅玄云蕣花麗木也謂之日給或謂之洽容或謂之愛老潘尼以為朝菌傅咸賦云應青春而敷蘖逮朱夏而誕英布夭夭之纖枝發灼灼之殊榮紅葩紫蒂翠葉素莖含暉吐曜爛若列星成公綏云日及華甚鮮茂榮于孟夏訖于孟秋英爾雅云草謂之榮榮而不實謂之英人物志云草之精秀者為英山有扶蘇篇扶蘇傳云扶胥小木荷華説文云荷芙蕖葉茄芙蕖莖芙蓉華未發為菡􅣿已發為芙蓉爾雅云荷芙蕖其莖茄其葉蕸其本蔤其華菡萏其實蓮其中的的中薏李巡曰分别蓮莖華葉實之名芙蕖其總名也别名芙蓉江東呼荷郭璞曰蔤莖下白蒻在泥中者蓮謂房也陸疏云蓮青皮裹白子為的的中有青長三分如鈎為薏語曰苦如薏也的五月中生生啖脆至秋表皮黑的成可食或磨以為飯輕身益氣令人強健援神契曰王者德至于地則華蘋感注云華蘋並頭蓮也韓詩秉蕳注云蕳蓮也古今注云荷華華之最秀異者一名水芝一名水花花有赤白紅紫青黃紅白二色差多大者至百葉王文公云蓮花有色有香得日光乃開雖生于水水不能沒雖在汙泥泥不能汙即華時有實然華事始則實隱華事已則實見埤雅云荷總名也其的中有青為薏皆倒生兩牙一成芰荷一蕅荷也又生一牙為華蕅荷帖水生藕者也芰荷無藕卷荷也與華偶生出水上亭亭如繖者亦或謂之距荷蕅荷一本其支旁行為藕節生一華一葉本草衍義云粉紅千葉白千葉者皆不實其根惟白蓮為佳今禁中又生碧蓮亦一端也龍爾雅云紅蘢古其大者蘬陸璣云一名馬蓼葉大而赤白色生水澤中高丈餘本草經云葒草主消渴去熱明目益氣一名鴻鴶如馬蓼而大生水旁五月採實陶隱居云馬蓼生下濕地莖班葉大有黑點最大者是葒草圖經云葒草即水紅下濕地皆有之詩隰有遊龍是也陸璣云一名馬蓼本經云似馬蓼而大若然馬蓼自是一種管子云五位之土其山之淺有龍與斥蘀兮篇蘀説文云草木凡皮葉落陊地為蘀褰裳篇溱説文引詩潧與洧潧水出鄭國王伯厚云溱水出桂陽臨武入匯當以潧為正水經云潧水出鄭縣西北平地南入洧水一統志溱水出河南開封府密縣一名潧水東北至新鄭縣與洧水合鄭語云主芣騩而食溱洧洧水經云洧水出河南密縣西南馬領山又東過鄭縣南潧水從西北來注之又東過習陽城西折入于潁注云洧水東徑新鄭故城中襄元年晉伐鄭敗其徒兵于洧上又東為洧淵水龍鬭于時門之外洧淵則此潭也洧水又東與黃水合經謂潧水非也一統志洧水源出密縣東至新鄭縣會溱水為雙泊河至西華縣入黃河丰篇堂釋名云堂猶堂堂高顯貌也禮記云堂上不趨堂上接武堂下布武又云禮有以高為貴者天子之堂九尺諸矦七尺大夫五尺士三尺書大傳云天子之堂廣九雉諸矦七雉伯子男五雉士三雉孫育云禮門側之堂謂之孰士喪疏云房户之外由半以南謂之堂士昏疏云其內由半以北亦謂之堂箋云堂當為棖爾雅云柣謂之閾棖謂之楔孫炎曰柣門限也李巡曰楔謂閫上兩旁木禮記云君入門介拂闑大夫中棖與闑之間士介拂棖賓入不中門不履閾公事自闑西私事自闑東東門之墠篇東門詩緝云東門鄭要會之地隱公四年左傳宋公陳矦蔡人衛人伐鄭圍其東門墠傳云墠除地町町者禮記注封土曰壇除地曰墠書曰三壇同墠茹藘爾雅云茹藘茅搜説文云茹藘人血所生本草茜根可以染絳一名地血一名茹藘一名茅搜一名蒨蜀本圖經云染緋草葉似棗葉頭尖下濶莖葉俱澀四五葉對生節間蔓延草木上根紫赤色今所在有八月採根陳藏器云周禮庶氏掌除蠱毒以嘉草攻之嘉草蘘荷與茜主蠱為最陸疏云齊人謂之茜徐州人謂之牛蔓周禮掌染草掌以春秋斂染草之物貨殖傳云千畝梔茜其人與千户侯等阪爾雅云可食者曰原陂者曰阪下者曰溼邢氏云陂陀不平而可食者名阪此三者雖有高下不平皆可種穀給食也子襟篇青爾雅青謂之蔥考工記云畫繪之事雜五色東方謂之青青與白相次也赤與青謂之文黑與青謂之黻釋名云青生也象物生時色也襟傳云青襟青領也爾雅云衣眥謂之襟李巡曰衣眥衣領之襟孫炎曰襟交領也方言曰襟謂之交釋名云襟禁也交于前所以禁禦風寒也禮記云具大父母父母衣純以繢具父母衣純以青如孤子衣純以素禮書云以繢備五采以為樂也以青體少陽以致敬也以素存凶飾以致哀也按青襟之襟本當作襟爾雅又有襟謂之袸衣小帶也士昏禮云施襟結帨釋名云襟亦禁也禁使不得解散皆謂衣小帶也然兩字亦通方言襟謂之交是也闕疏云此謂城上别有高闕非宮闕也釋名云闕在門兩旁中央闕然為道也揚之水篇兄弟朱子云兄弟婚姻之稱禮所謂不得嗣為兄弟是也周禮大司徒以本俗六安萬民其三曰聯兄弟鄭云兄弟謂婚姻嫁娶何休云圖安危可否兄弟之義出其東門篇縞廣雅縞細繒也禹貢云徐州厥貢玄纖縞傳云縞衣白色綦顧命云四人綦辨鄭注云青黑曰綦馬本作騏亦云青黑色王肅云綦赤黑色説文作綥云帛蒼艾色詩縞衣綥巾未嫁女所服一曰不借孔仲達云艾謂青而微白為艾草之色箋亦以綦為青但綦是文章之色非染繪之色故云綦綦文巾説文云佩巾也從坰丨象系也方言云幪巾也大巾謂之􅜳嵩嶽之南陳潁之間謂之帤亦謂之􅞲按禮記左佩紛帨紛帨即巾也此中宜為佩巾或以為婦人褁頭之巾未詳典據然古者男子二十成人士冠庶人巾蓋賤者之服漢元服幘王莽無髮乃施巾古語云王莽秃幘施屋也至東漢魏晉更以巾為雅袁紹崔鈞之徒雖為將帥皆著縑巾及有所謂綸巾葛巾角巾者而女子喪冠亦謂之巾幗諸葛武矦以遺司馬宣王意者婦人裹頭者可通名巾與楊用修以巾幗為女子未笄之冠又未知何據也注疏不云無以明矣闉説文云城曲重門也永嘉陳氏云門之外有副城回曲以障門者謂之闉闍説文云闉闍也爾雅云闍謂之臺孫炎云積土如水渚所以望氣祥也疏云闍是城上之臺謂當門臺也箋云闍讀如彼都人士之都謂國外曲城之中市里也荼箋云荼茅秀物之輕者飛行無常疏云釋草有荼苦菜又有荼委葉邶風誰謂荼苦即苦菜也周頌以薅荼蓼即委葉也鄭於地官掌荼注及既夕注與此箋皆云荼茅秀然則此言如荼乃是茅草秀出之穗非彼二草也爾雅云蔈荂荼猋藨芀疏此辨芀荼之異名也荼茅秀蔈也荂也其别名荼即苕也苕又一名猋又名藨皆萑茅之屬花秀名也周禮掌荼掌以時聚荼以供喪事國語吳王萬人為方陳白常白旗素甲白羽之矰望之如荼韋昭云荼茅秀也溱洧篇蕑傳云蕑蘭也陸璣云蕳即蘭香草也春秋傳曰刈蘭而卒楚辭云紉秋蘭孔子云蘭當為王者香草皆是也其莖葉似藥草澤蘭廣而長節節中赤高四五尺漢諸池苑及許昌宮中皆種之可著粉中藏衣著書中可辟魚本草經云蘭草主殺蠱毒辟不祥久服輕身不老一名水香生大吳池澤澤蘭生汝南諸大澤旁蜀本云蘭草葉似澤蘭尖長有岐花紅白色而香生下濕地圖經云澤蘭與蘭草相類但蘭草生水旁葉光潤根小紫五六月盛而澤蘭生水澤中及下濕地葉尖微有毛不光潤方莖紫節七八月初採微辛此為異耳夏小正云五月畜蘭為沐浴也易通卦驗云冬至廣莫風至蘭始生盛𢎞之荆州記云都梁縣有小山山上水極淺其中悉生蘭草緑葉紫莖芳風藻谷俗謂蘭為都梁即以號縣云陳藏器云蘭草婦人和油澤頭故曰蘭澤劉次莊樂府集云離騷曰紉秋蘭以為佩又云秋蘭兮青青緑葉兮紫莖今沅澧所生花在春則黃在秋則紫然而春黃不若秋紫之芬馥也按孔子云芝蘭生于深林不以無人而不芳曰生深林則與此在水上者異矣毛氏謂蕑即蘭羅氏即以本草經之蘭草當之但陸璣疏與本草圖經所説蘭形狀互異羅氏之言曰蘭草一名都梁香一名水香以解秉蕳可也何關蘭乎蘭葉如莎首春則茁其芽出五六寸杪作一花花甚芳香大抵生深林中林愈深則莖愈紫故稱幽蘭與蕙甚相類其一幹一花而香有餘者蘭一幹五六花而香不足者蕙江南蘭只在春芳荆楚及閩中者秋復再芳故有春蘭秋蘭以時驗推之羅氏説蘭近得其實信乎非此蕑也蘭草澤蘭自陶隱居蘇恭已不能辨陳藏器始能别之而衍義更有異論云蘭草葉如門冬而濶且韌長一二尺四時常青花黃中間葉上有細紫點春芳者為春蘭色深秋芳者為秋蘭色淡秋蘭稍難得今江陵鼎澧州山谷有之山外平田即無生于幽谷蓋可驗矣其葉殊不與澤蘭相似澤蘭才出土便分枝梗葉如菊而尖長若取香臭則稍類耳若然則蘭草亦出山林且不似澤蘭矣然經明云生大吳川澤衍義所指之蘭即羅願云生深林者而非經之蘭也蘭之種類至多其入藥者更有馬蘭山蘭花可玩者有崇蘭鳳尾蘭竹蘭石蘭鄭漁仲云蘭即蕙蕙即薰薰即零陵香且不辨蘭蕙之種矣韓詩傳云三月桃花水下之時執蘭袚除薛君注鄭國之俗三月上己之溱洧兩水之上招魂續魄秉蘭草袚除不祥故詩人願與所悅者俱往也本草經謂蘭草可辟不祥故執以祓除抑或以蘭有國香人所服媚淮南子曰男子樹蘭美而不芳説者以為蘭女類故左傳稱女為季蘭宜女子樹之鄭女故執之以媚其士與袚除之禮説者參差蔡雍以為因暮春天子乘舟褉于名川論語云浴乎沂自上及下古有此禮後漢書以為上已官民皆潔于東流水上陽氣布暢始洗潔之南齊志以為三月清明之節修事水側禱祀以祈豐年豫謂周禮女巫掌歲時袚除釁沴則袚除之來已久第不知何緣定于上巳之辰晉束廣微云周公成洛邑因流水以泛酒逸詩曰羽觴隨流波此三月曲水之始也其説無稽所引詩復不似周人之語摯虞謂起于徐肇三女亡一村盥洗者抑又妄矣勺藥廣雅云攣夷芍藥也韓詩云離草也言將離别贈此草也本草云一名白木一名餘容一名犂食一名解倉一名鋌生中嶽川谷及丘陵圖經云春生紅芽作叢莖上三枝五葉似牡丹而狹長髙一二尺夏開花有紅白紫數種子似牡丹而小秋時採根根亦有赤白二色古今注云芍藥有二種有草芍藥木芍藥木者花大而色深俗呼為牡丹非也又牛亨問曰將離别相贈以芍藥者何答曰芍藥一名可離故將别以贈之亦猶相招召贈文無文無一名當歸也山海經云條谷之草多芍藥洞庭之上多芍藥范子曰芍藥出三輔建寧記曰建寧出芍藥極精好埤雅云芍藥榮于仲春華于孟夏傳曰驚蟄節後二十有五日芍藥榮是也華有至千葉者今羣芳中牡丹品第一芍藥品第二雅翼云芍藥花之盛者其根可和五臟制食毒古有芍藥之醬合蘭桂五味以助諸食因呼五味之和為芍藥花木考云芍藥花譜總别四十二種其色以黃者為貴按勺藥即今芍藥也毛氏云香草陸疏云今藥草勺藥無香非是也未審今何草蓋泥毛公香草之言必欲求香于柯葉置其華而不論耳董氏則以古今注謂芍藥可離唐本草云可離江離而别以勺藥為江離矣六家詩名物疏卷二十一
