body:
  text: 六家詩名物疏卷二十一明馮復京撰國風鄭二遵大路篇祛疏云袂是袪之本袪爲袂之末俱是衣袖釋名云袪虛也玉藻云深衣三袪袂可以囘肘長中繼揜尺袪尺二寸䘮服記云袂屬幅袪尺二寸注云袪袖口也尺二寸足以容中人之併兩手女曰雞鳴篇明星蘇氏云明星啟明也爾雅云明星謂之启明孫炎曰明星太白也出東方高三舍今曰明星昏出西方高三舍今曰太白郭曰太白星也晨見東方爲啟明昏見西方爲太白天官占云太白者金之精西方白帝之子上公大將軍之象也徑一百里天官書云太白曰西方秋司兵主殺殺失者罰出太白率一歲一周天出東方百二十日入西行百二十日旦入入以辰戌出以丑未出不經天經天天下革政日方南金居其南日方北金居其北曰贏用兵進吉退凶日方南金居其北日方北金居其南曰縮用兵退吉進凶太白白比狼赤比心黃比參左肩蒼比參右肩黑比奎大星亢爲疏廟太白廟也太白大臣也其號上公其他名殷星大正營星觀星宮星明星大衰大澤終星大相天浩序星月緯大司馬位河圗云大白散爲天杵天柎伏霛大敗司姦天狗天殘卒起白彗嚴氏云蘇氏以明星爲啟明葢今俗所謂曉星也毛氏謂天將曉則小星不見惟明大之星爛然雖不指爲啟明然將曉而明大者惟啟明耳弋箋云弋繳射也夏官司弓矢矰矢茀矢用諸弋射注云結繳于矢謂之矰矰高也茀矢象焉茀之言刜也二者皆可以弋飛鳥刜羅之也埤雅云弱弓㣲矢乘風振之曰弋鳬爾雅云鸍沈鳬郭云似鴨而小長尾背上有文今江東亦呼爲鸍又云鳬㕍醜其足蹼其踵企陸璣云大小如鴨青色卑脚短喙水鳥之謹愿者也埤雅云沈鳬好没與雁常以晨飛容與與波上下雅翼云陸龜蒙稱夜聞有聲類㬥雨者一夕數四明訊其甿曰鳬鷖也其曹蔽天而來必竭禾穗而去江南不能弋羅常藥而得之鳬所在必賊粱食古人亦養之今江東有小鳬其多無數俗謂之冠鳬善飛方言曰野鳬甚小而好没水中者南楚之外謂之鸊鵜莊子云鳬脛雖短續之則憂古今注云鳬雁常住海邊沙上食沙石皆消爛帷食海蛤不消有女同車篇舜爾雅云椴木槿櫬木槿注别二名也似李樹華朝生夕隕或呼日及亦曰王蒸廣雅云一名朱槿一名赤槿月令云仲夏木槿榮本艸云木槿作飲服之令人得腄花作湯代茶喫治風衍義云如小葵花淡紅色五葉成一花湖南北人家多種植爲籬障埤雅云木槿一名舜瞬之義取此雅翼云抱朴子曰木槿楊桺斷植之更生倒之亦生横之亦生生之易者莫過斯木仲夏應陰而生其花朝開暮落莊生以爲朝菌篤論云日給之華似柰柰實而日給虛虛僞之與眞實相似也羅浮山記木槿花甚丹四時敷榮傅𤣥云蕣花麗木也謂之日給或謂之洽容或謂之愛老潘尼以爲朝菌傅咸賦云應青春而敷蘖逮朱夏而誕英布夭夭之纖枝發灼灼之殊榮紅葩紫蔕翠葉素莖含暉吐曜爛若列星成公綏云日及華甚鮮茂榮于孟夏訖于孟秋英爾雅云艸謂之榮榮而不實謂之英人物志云艸之精秀者爲英山有扶蘇篇扶蘇傳云扶胥小木荷華說文云荷芙蕖葉茄芙蕖莖芙蓉華未發爲菡􅣿已發爲芙蓉爾雅云荷芙蕖其莖茄其葉蕸其本蔤其華菡萏其實蓮其中的的中薏李廵曰分别蓮莖華葉實之名芙蕖其總名也别名芙蓉江東呼荷郭璞曰蔤莖下白蒻在泥中者蓮謂房也陸疏云蓮青皮裹白子爲的的中有青長三分如鈎爲薏語曰苦如薏也的五月中生生啖脆至秋表皮黑的成可食或磨以爲飯輕身益氣令人強健援神契曰王者德至于地則華苹感注云華苹並頭蓮也韓詩秉蕳注云蕳蓮也古今注云荷華華之最秀異者一名水芝一名水花花有赤白紅紫青黃紅白二色差多大者至百葉王文公云蓮花有色有香得日光乃開雖生于水水不能没雖在汙泥泥不能汙即華時有實然華事始則實隱華事已則實見埤雅云荷總名也其的中有青爲薏皆倒生兩牙一成芰荷一蕅荷也又生一牙爲華蕅荷帖水生藕者也芰荷無藕卷荷也與華偶生出水上亭亭如繖者亦或謂之距荷蕅荷一本其支㫄行爲藕節生一華一葉本草衍義云粉紅千葉白千葉者皆不實其根惟白蓮爲佳今禁中又生碧蓮亦一端也龍爾雅云紅蘢古其大者蘬陸璣云一名馬蓼葉大而赤白色生水澤中高丈餘本艸經云葒艸主消渴去熱明目益氣一名鴻鴶如馬蓼而大生水㫄五月採實陶隱居云馬蓼生下濕地莖班葉大有黑㸃最大者是葒艸圖經云葒艸即水紅下濕地皆有之詩隰有游龍是也陸璣云一名馬蓼本經云似馬蓼而大若然馬蓼自是一種管子云五位之土其山之淺有龍與斥蘀兮篇蘀説文云艸木凢皮葉落陊地爲蘀褰裳篇溱說文引詩潧與洧潧水出鄭國王伯厚云溱水出桂陽臨武入匯當以潧爲正水經云潧水出鄭縣西北平地南入洧水一統志溱水出河南開封府密縣一名潧水東北至新鄭縣與洧水合鄭語云主芣騩而食溱洧洧水經云洧水出河南密縣西南馬領山又東過鄭縣南潧水從西北來注之又東過習陽城西折入于潁注云洧水東逕新鄭故城中襄元年晉伐鄭敗其徒兵于洧上又東爲洧淵水龍鬭于時門之外洧淵則此潭也洧水又東與黃水合經謂潧水非也一統志洧水源出密縣東至新鄭縣㑹溱水爲雙泊河至西華縣入黃河丰篇堂釋名云堂猶堂堂高顯貌也禮記云堂上不趨堂上接武堂下布武又云禮有以高爲貴者天子之堂九尺諸矦七尺大夫五尺士三尺書大傳云天子之堂廣九雉諸矦七雉伯子男五雉士三雉孫毓云禮門側之堂謂之塾士䘮疏云房户之外由半以南謂之堂士昏疏云其内由半以北亦謂之堂箋云堂當為棖爾雅云柣謂之閾棖謂之楔孫炎曰柣門限也李巡曰楔謂閫上兩旁木禮記云君入門介拂闑大夫中棖與闑之間士介拂棖賓入不中門不履閾公事自闑西私事自闑東東門之墠篇東門詩緝云東門鄭要㑹之地隱公四年左傳宋公陳矦蔡人衛人伐鄭圍其東門墠傳云墠除地町町者禮記注封土曰壇除地曰墠書曰三壇同墠茹藘爾雅云茹藘茅蒐說文云茹藘人血所生本艸茜根可以染絳一名地血一名茹藘一名茅蒐一名蒨蜀本圖經云染緋艸葉似棗葉頭尖下濶莖葉俱澁四五葉對生節間蔓延艸木上根紫赤色今所在有八月採根陳藏器云周禮庻氏掌除蠱毒以嘉艸攻之嘉艸蘘荷與茜主蠱爲最陸疏云齊人謂之茜徐州人謂之牛蔓周禮掌染艸掌以春秋歛染艸之物貨殖傳云千畆梔茜其人與千户侯等阪爾雅云可食者曰原陂者曰阪下者曰溼邢氏云陂陀不平而可食者名阪此三者雖有高下不平皆可種糓給食也子衿篇青爾雅青謂之葱考工記云畫繪之事雜五色東方謂之青青與白相次也赤與青謂之文黑與青謂之黻釋名云青生也象物生時色也衿傳云青衿青領也爾雅云衣眥謂之襟李廵曰衣眥衣領之襟孫炎曰襟交領也方言曰衿謂之交釋名云襟禁也交于前所以禁禦風寒也禮記云具大父母父母衣純以繢具父母衣純以青如孤子衣純以素禮書云以繢備五采以爲樂也以青體少陽以致敬也以素存凶飾以致哀也按青衿之衿本當作襟爾雅又有衿謂之袸衣小帶也士昏禮云施衿結帨釋名云衿亦禁也禁使不得解散皆謂衣小帶也然兩字亦通方言衿謂之交是也闕疏云此謂城上别有高闕非宮闕也釋名云闕在門兩㫄中央闕然爲道也揚之水篇兄弟朱子云兄弟婚姻之稱禮所謂不得嗣爲兄弟是也周禮大司徒以本俗六安萬民其三曰聯兄弟鄭云兄弟謂婚姻嫁娶何休云圖安危可否兄弟之義出其東門篇縞廣雅縞細繒也禹貢云徐州厥貢𤣥纖縞傳云縞衣白色綦顧命云四人綦弁鄭注云青黑曰綦馬本作騏亦云青黑色王肅云綦赤黑色說文作綥云帛蒼艾色詩縞衣綥巾未嫁女所服一曰不借孔仲達云艾謂青而㣲白爲艾艸之色箋亦以綦爲青但綦是文章之色非染繪之色故云綦綦文巾說文云佩巾也从冂丨象系也方言云幪巾也大巾謂之􅜳嵩岳之南陳潁之間謂之帤亦謂之􅞲按禮記左佩紛帨紛帨即巾也此中宜爲佩巾或以爲婦人褁頭之巾未詳典據然古者男子二十成人士冠庻人巾葢賤者之服漢元服幘王莽無髪乃施巾古語云王莽秃幘施屋也至東漢魏晉更以巾爲雅袁紹崔鈞之徒雖爲將帥皆著縑巾及有所謂綸巾葛巾角巾者而女子䘮冠亦謂之巾幗諸葛武矦以遺司馬宣王意者婦人裹頭者可通名巾與楊用脩以巾幗爲女子未笄之冠又未知何據也注疏不云無以明矣闉說文云城曲重門也永嘉陳氏云門之外有副城囘曲以障門者謂之闉闍說文云闉闍也爾雅云闍謂之臺孫炎云積土如水渚所以望氣祥也疏云闍是城上之臺謂當門臺也箋云闍讀如彼都人士之都謂國外曲城之中市里也荼箋云荼茅秀物之輕者飛行無常疏云釋艸有荼苦菜又有荼委葉邶風誰謂荼苦即苦菜也周頌以薅荼蓼即委葉也鄭於地官掌荼注及既夕注與此箋皆云荼茅秀然則此言如荼乃是茅艸秀出之穗非彼二艸也爾雅云蔈荂荼猋藨芀疏此辯芀荼之異名也荼茅秀蔈也荂也其别名荼即苕也苕又一名猋又名藨皆萑茅之屬花秀名也周禮掌荼掌以時聚荼以供䘮事國語吳王萬人爲方陳白常白旂素甲白羽之矰望之如荼韋昭云荼茅秀也溱洧篇蕑傳云蕑蘭也陸璣云蕳即蘭香艸也春秋傳曰刈蘭而卒楚辭云紉秋蘭孔子云蘭當爲王者香艸皆是也其莖葉似藥艸澤蘭廣而長節節中赤高四五尺漢諸池苑及許昌宮中皆種之可著粉中藏衣著書中可辟魚本艸經云蘭艸主殺蠱毒辟不祥久服輕身不老一名水香生大吳池澤澤蘭生汝南諸大澤㫄蜀本云蘭艸葉似澤蘭尖長有岐花紅白色而香生下濕地圖經云澤蘭與蘭艸相類但蘭艸生水㫄葉光潤根小紫五六月盛而澤蘭生水澤中及下濕地葉尖㣲有毛不光潤方莖紫節七八月初採㣲辛此爲異耳夏小正云五月畜蘭爲沐浴也易通卦驗云冬至廣莫風至蘭始生盛𢎞之荆州記云都梁縣有小山山上水極淺其中悉生蘭艸綠葉紫莖芳風藻谷俗謂蘭爲都梁即以號縣云陳藏器云蘭艸婦人和油澤頭故曰蘭澤劉次莊樂府集云離騷曰紉秋蘭以爲佩又云秋蘭兮青青綠葉兮紫莖今沅澧所生花在春則黄在秋則紫然而春黄不若秋紫之芬馥也按孔子云芝蘭生于深林不以無人而不芳曰生深林則與此在水上者異矣毛氏謂蕑即蘭羅氏即以本艸經之蘭艸當之但陸璣疏與本艸圖經所說蘭形狀互異羅氏之言曰蘭艸一名都梁香一名水香以解秉蕳可也何關蘭乎蘭葉如莎首春則茁其芽出五六寸杪作一花花甚芳香大抵生深林中林愈深則莖愈紫故稱幽蘭與蕙甚相類其一幹一花而香有餘者蘭一幹五六花而香不足者蕙江南蘭只在春芳荆楚及閩中者秋復再芳故有春蘭秋蘭以時驗推之羅氏說蘭近得其實信乎非此蕑也蘭艸澤蘭自陶隱居蘇恭已不能辨陳藏器始能别之而衍義更有異論云蘭艸葉如門冬而濶且韌長一二尺四時常青花黄中間葉上有細紫㸃春芳者爲春蘭色深秋芳者爲秋蘭色淡秋蘭稍難得今江陵鼎澧州山谷有之山外平田即無生于幽谷蓋可驗矣其葉殊不與澤蘭相似澤蘭纔出土便分枝梗葉如菊而尖長若取香臭則稍類耳若然則蘭艸亦出山林且不似澤蘭矣然經明云生大吳川澤衍義所指之蘭即羅願云生深林者而非經之蘭也蘭之種類至多其入藥者更有馬蘭山蘭花可玩者有崇蘭鳳尾蘭竹蘭石蘭鄭漁仲云蘭即蕙蕙即薫薰即零陵香且不辨蘭蕙之種矣韓詩傳云三月桃花水下之時執蘭袚除薛君注鄭國之俗三月上己之溱洧兩水之上招䰟續魄秉蘭艸袚除不祥故詩人願與所悅者俱徃也本艸經謂蘭艸可辟不祥故執以祓除抑或以蘭有國香人所服媚淮南子曰男子樹蘭美而不芳說者以爲蘭女類故左傳稱女爲季蘭宜女子樹之鄭女故執之以媚其士與袚除之禮說者參差蔡邕以爲因暮春天子乗舟褉于名川論語云浴乎沂自上及下古有此禮後漢書以爲上已官民皆絜于東流水上陽氣布暢始洗潔之南齊志以爲三月清明之節脩事水側禱祀以祈豐年予謂周禮女巫掌歲時袚除釁沴則袚除之來已久第不知何緣定于上巳之辰晉束廣㣲云周公成洛邑因流水以汎酒逸詩曰羽觴隨流波此三月曲水之始也其說無稽所引詩復不似周人之語摯虞謂起于徐肇三女亾一邨盥洗者抑又妄矣勺藥廣雅云攣夷芍藥也韓詩云離艸也言將離别贈此艸也本艸云一名白木一名餘容一名犂食一名解倉一名鋌生中岳川谷及丘陵圖經云春生紅芽作叢莖上三枝五葉似牡丹而狹長髙一二尺夏開花有紅白紫數種子似牡丹而小秋時採根根亦有赤白二色古今注云芍藥有二種有艸芍藥木芍藥木者花大而色深俗呼爲牡丹非也又牛亨問曰將離别相贈以芍藥者何答曰芍藥一名可離故將别以贈之亦猶相招召贈文無文無一名當歸也山海經云條谷之艸多芍藥洞庭之上多芍藥范子曰芍藥出三輔建寧記曰建寧出芍藥極精好埤雅云芍藥榮于仲春華于孟夏傳曰驚蟄節後二十有五日芍藥榮是也華有至千葉者今羣芳中牡丹品第一芍藥品第二雅翼云芍藥花之盛者其根可和五臟制食毒古有芍藥之醬合蘭桂五味以助諸食因呼五味之和爲芍藥花木攷云芍藥花譜總别四十二種其色以黄者爲貴按勺藥即今芍藥也毛氏云香艸陸疏云今藥艸勺藥無香非是也未審今何艸蓋泥毛公香艸之言必欲求香于柯葉置其華而不論耳董氏則以古今注謂芍藥可離唐本艸云可離江離而别以勺藥爲江離矣六家詩名物疏卷二十一
