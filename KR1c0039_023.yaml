body:
  text: 六家詩名物疏卷二十明馮復京撰國風鄭一鄭譜云初宣王封母弟友于宗周畿內咸林之地是為桓公今京兆鄭縣是其都也為幽王大司徒幽王為犬戎所滅桓公死之子武公與晉文侯定平王于東都王城取虢檜鄢蔽補丹依疇歷華之地右洛左濟前莘後河食溱洧焉今河南新鄭是也地理志云鄭國今河南之新鄭本高辛氏火正祝融之墟及成皋滎陽潁川之崇高陽城皆鄭分也土險而狹山居谷汲男女亟聚㑹故其俗淫武公後二十三世為韓所滅按宗周咸林今陜西西安府華州有鄭城即桓公采地其後武公徙河南曰新鄭故莊公曰先公新邑于此新鄭縣今屬河南開封府鈞州及開封之鄭州滎陽汜水縣即漢成皋河南府之登封即漢陽城崇高二縣皆鄭地也緇衣篇緇衣釋名云緇滓也泥之黑者曰滓此色然也考工記云三入為纁五入為緅七入為緇注染纁者三入而成又再染以黑則為緅又復再染以黑乃成緇矣論語疏云案玉藻諸侯朝服以日視朝于內朝士冠禮云主人𤣥冠朝服緇帶素韠注云𤣥冠委貌朝服者十五升布衣而素裳不言色者衣與冠同色是朝衣色𤣥𤣥即緇色之小别故知緇衣羔裘是諸侯君臣日視朝之服也館箋云卿士所之之館在天子宮如今之諸廬考工記內有九室九嬪居之外有九室九卿朝焉注內路寢之裏也外路門之表也九室如今朝堂諸曹治事處孔氏云禮有公館私館館者宮室之名粲傳云粲餐也諸侯入為天子卿士食采祿周禮疏云載師家邑任稍地則大夫之采也小都任縣地則六卿之采也大都任疆地則三公之采也古者祿皆月别給之若今月奉爾雅云粲餐璞曰今河北人呼食為粲朱傳或曰粲粟之精鑿者說文云稻重一䄷為粟二十斗為米十斗曰毇為米六斗大半斗為粲將仲子篇里說文云里居也周禮小宰以官府之八成經邦治三曰聽閭里以版圖又遂人云五家為鄰五鄰為里里宰掌比其邑之衆寡與其六畜兵器治其政令以歲時合耦于鋤以治稼穡徵斂其財賦風俗通云五家為軌五軌為里里者止也五十家共居止也書大傳云古者處師八家而為鄰三鄰而為朋三朋而為里五里而為邑十邑而為都十都而為師州有十二師焉家不盈三口者不朋由命士以上不朋王度記云百户為里里一尹撰考讖云古者七十二家為里杞爾雅云旄澤柳陸璣云杞柳屬也生水㫄樹如柳葉粗而白色理微赤其材堅韌故今人以為車轂今共北淇水㫄魯國太山汶水邊純杞也本草圖經云今人取其細條火逼令柔韌屈作箱篋河朔猶多告子云以人性為仁義猶以杞柳為杯棬是也通志云杞柳亦曰澤柳可為杯棬者園說文云所以樹果也周禮太宰九職二曰以園圃育草木注樹果蓏曰圃園其樊也又云載師以場圃任園地園㕓二十而一天文要集曰瓠瓜為天子果園又天園主果實菜茹畜儲孔氏云有蕃曰園有墻曰囿園囿大同蕃墻異耳檀陸璣云檀木皮正青滑澤與檕迷相似又似梓榆檕迷一名挈橀故齊人諺曰上山斫檀挈橀先殫論衡云楓桐之樹生而速長故其皮肌不能堅剛樹檀以五月生葉後彼春榮之木其材疆徑車以為軸雅翼云淮南子十月檀檀隂木也叔于田篇田爾雅云春獵為搜夏獵為苗秋獵為獮冬獵為狩宵田為獠火田為狩左傳云春搜夏苗秋獮冬狩皆于農隙而講事也公羊傳云春曰苗秋曰搜冬曰狩穀梁傳云四時之田皆為宗廟之事也春曰田夏曰苗秋曰搜冬曰狩又昭八年搜于紅傳云艾蘭以為防置旃以為轅門以葛覆質以為𣙗㫄流握御轚者不得入車軌塵馬候蹄掩禽旅御者不失其馳然後射者能中過防不逐不從奔之道也面傷不獻不成禽不獻禽雖多天子取三十焉其餘與士衆以習射于射宮周禮太宰田役以御其衆大司徒大田役以旗致萬民治其徒庶之政令鄉師凡四時之田前期出田法于州里簡其鼓鐸旗物兵器修其卒伍及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政令刑禁巡其前後之屯而戮其犯命者斷其爭禽之訟遂人師田作野民帥而至掌其政治禁令大宗伯大田之禮簡衆也大司馬中春教振旅遂以搜田中夏教苃舍遂以苗田中秋教治兵遂以獮田中冬教大閲遂以狩田禮記云國君春田不圍澤大夫不掩羣士不取麛卵又云天子諸侯無事則歲三田一為乾豆二為賓客三為充君之庖無事而不田曰不敬田不以禮曰㬥天物天子不合圍諸矦不掩羣天子殺則下大綏諸矦殺則下小綏大夫殺則止佐車佐車止則百姓田獵昆蟲未蟄不以火田不麛不卵不殺胎不夭夭不覆巢易云作結繩而為網罟以佃以漁蓋取諸離白虎通云四時之田總名為田何為田除害也春秋繁露云春苗秋搜冬狩夏獮巷說文云里中道從􅣑從共皆在邑中所共也篆文從􅣑省作巷狩夏小正云十有二月王狩冬獵為狩陳筋革陳筋革者省兵甲也爾雅冬獵為狩疏狩圍守也冬物畢成獲則取之無所擇也何休公羊注云狩猶獸也冬時禽獸長大遭獸可取爾雅又云火田為狩李巡孫炎曰放火燒草守其下風按火田為狩正以冬時昆蟲既蟄可以火田耳景純云放火燒草獵亦為狩非也大叔于田篇藪說文云大澤也周禮注云澤水所鍾也水希曰藪韓詩云禽獸居之曰藪風俗通云藪之為言厚也草木魚鱉所以厚養人君與百姓周禮職方氏揚州其澤藪曰具區荆州曰雲夢豫州曰圃田青州曰望諸兖州曰大野雍州曰弦蒲幽州曰貕養冀州曰陽紆並州曰昭餘祁爾雅十藪云魯有大野晉有大陸秦有楊陓宋有孟諸楚有雲夢吳越之間有具區齊有海隅燕有昭餘祁鄭有圃田周有焦護國語太子晉云古者長民不崇藪藪物之歸也左傳云山藪藏疾疏云此言在藪蓋在圃田也火釋名云火化也消化物也元命包云火之言委隨也故其立字人散子為火考異郵云火者陽之精也易曰離為火又曰熯萬物者莫熯乎火又曰火就燥尚書云五行二曰火火曰炎上炎上作苦左傳云古之火正或食于心或食于咮以出內火是故咮為鶉火心為大火周禮司爟掌行火之政令四時變國火以救時疾季春出火民咸從之季秋內火民亦如之時則施火令司烜氏掌以夫燧取明火于日尸子云燧人上觀星辰下察五木以為火河圖挺佐輔云伏羲禪于伯牛鑽木作火鄹子曰春取榆柳之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火按火烈具舉箋以為列人持火疏云此為宵田持火照之蓋以王制云昆蟲未蟄不以火田故爾雅曰冬獵為狩火田為狩此于田未必是冬則是宵田用火以照也然大司馬仲春教振旅遂以搜田火弊獻禽以祭社鄭氏云春田主用火因焚萊除陳草皆殺而火止則春田亦用火曹氏詩說云刈草為防驅禽納諸防中然後焚而射四時之田皆然也黃魯頌駉傳云黃騂曰黃陸農師云黃亦馬之上色列子曰牝而黃牡而驪馬至果天下之馬也明堂位曰周人黃馬蕃鬛言吉事乘此詩四黃既駕是也至于戎事則乘騵射周禮鄉大夫云以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞保氏養國子以道乃教之六藝三曰五射鄭司農云五射白矢參連剡注襄尺井儀也又車僕大射共三乏司射凡射共獲旌射人以射法治射儀諸子秋合諸射以考其藝而進退之大僕王射贊王弓矢繕人掌詔王射禮記孔子曰士使之射不能則辭以疾懸弧之義也又云古者諸侯之射也必先行燕禮鄉大夫士之射也必先行鄉飲酒之禮其節天子以騶虞為節諸矦以貍首為節卿大夫以采蘋為節士以采蘩為節古者諸矦歲貢士于天子天子試之于射宮其容體比於禮其節比于樂而中多者得與于祭射之為言繹也或曰舍也繹者各繹己之志也故心平體正持弓矢審固則射中矣又云天子將祭必先習射于澤已射于澤而後射于射宮吳越春秋陳音云古者人民死則裹以白茅投于中野孝子不忍見父母為禽獸所食作彈以守之於是神農黃帝弦木為弧剡木為矢黃帝之後楚有弧父所射無脫以其道傳羿羿傳逢蒙逢蒙傳于楚琴氏列女傳工人妻云妾聞射之道左手如拒右手如附支右手發左手禮書云弧矢之作始于黃帝侯以明之見于虞書至周弓之别有六矢之割别有八侯之别有三則大射賓射燕射之侯也士無大射而有賓射燕射庶人無賓射燕射特有主皮之射而已射義曰古者諸矦貢士子天子天子試之于射宮則貢士與射其來尚矣御周禮保氏教六藝四曰五馭鄭司農云五馭鳴和鑾逐水曲過君表舞交衢逐禽左王制凡執技論力羸股肱決射御月令孟冬命將帥習射御內則成童學射御列子造父之師曰泰豆氏告造父曰推於御也齊輯乎轡銜之際急緩乎脣吻之和正度乎胸臆之中執節乎掌握之間內得於中心外合於馬志是故能進退履繩而旋曲中規取道致遠而氣力有餘呂覽云寒哀作御鴇爾雅云驪白雜毛鴇疏毛色黑白而復有雜毛相錯者今謂之烏驄埤雅云駂蓋取諸鴇今鴇其色驪白掤詩義問云掤所以覆矢也謂箭筒蓋左傳云公徒執氷而踞服䖍云氷櫝丸蓋杜預云或說櫝丸是箭筒其蓋可以取飲華谷嚴氏云用矢則舉掤以開筒既用則納矢筒中釋下掤以覆筒鬯疏云鬯者盛弓之器朱傳云弓囊也與韔同說文韔弓衣也禮書云鬯韜韣櫜鞬皆弓衣也亦曰弓室覲禮言包干戈以虎皮詩言虎韔而韔韣皆從韋則古之弓衣以韋為之詩言交韔二弓則一韔之內皆二弓以備缺折弓釋名云弓穹也張之穹隆然也山海經云少昊生般始為弓矢帝俊賜羿彤弓素繪以扶下國荀子云倕作弓墨子云羿作弓古今姓纂云黃帝第五子青陽生揮為弓正觀弧星始制弓矢爾雅云弓有緣者謂之弓無緣者謂之弭以金者謂之銑以蜃者謂之珧以玉者謂之圭易云弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽書云和之弓在東房周禮司弓矢掌六弓之法中春獻弓弩及其頒之王弓弧弓以授射甲革椹質者夾弓庾弓以授射犴矦鳥獸者唐弓大弓以授學射者使者勞者天子之弓合九而成規諸矦合七而成規大夫合五而成規士合三而成規句者謂之弊弓繕人掌王之用弓弩稁人弓六物為三等弩四物亦如之又云弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫弓人為弓取六材必以其時幹以為遠也角以為疾也筋以為深也膠以為和也絲以為固也漆以為受霜露也凡為弓冬析幹而春液角夏治筋秋合三材寒奠體氷析灂春被弦則一年之事嬌幹欲孰于火而無贏嬌角欲孰于火而無燂引筋欲盡而無傷其力煮膠欲孰而水火相得然則居旱亦不動居濕亦不動材美工巧為之時謂之參均角不勝幹幹不勝筋謂之參均量其力有三均均者三謂之九和弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之往體多來體寡謂之夾庾之屬利射侯與弋往體寡來體多謂之王弓之屬利射革與質往體來體若一謂之唐弓之屬利射深覆之而角至謂之句弓覆之而幹至謂之侯弓覆之而筋至謂之深弓周禮注云夾庾之弓合五而成規王弧合九而成規唐大合七而成規疏云天子之弓王弧諸侯之弓唐大大夫之弓夾庾士之弓則六弓之外弓曲近射用弱弓射大矦者用王弧射參矦者用唐大此據諸矦言之若據天子則用王弧射虎矦用唐大射熊矦用夾庾射豹侯也禮書云弓以木為身以角為面筋所以為深絲所以為固張則筋外而角內弛則角外而筋內弣把中也簫弓端也隈其曲也茭其接也弣或作拊又曰質㫄曰撻中曰蔽簫或曰弰又曰弭曰彆曰峻方言云弓謂之鞬或謂之清人篇清郡國志河南中牟縣有清口水木經注清池水出清陽亭西南平地東北流徑清陽亭南東流即故清人城也詩清人在彭彭為高克邑杜預春秋釋地云中牟縣西有清陽亭是也清水又屈而北流至清口澤中牟今屬開封府彭河上消軸傳云彭衛之河上鄭之郊也消軸河上地孔氏云彭消軸皆河上之地蓋久不得歸師有遷移三地亦不相遠介說文云鎧甲也釬臂鎧也錏鍛頸鎧也世本云杼作甲宋衷曰少康之子周禮司甲下大夫二人中士八人考工記云燕之無函也非無函也夫人而能為函也又云函人為甲犀甲七屬兕甲六屬合甲五屬凡為甲必先為容然後制革權其上旅與其下旅而重若一以其長為之圍凡甲鍛不摯則不堅已敝則撓凡察革之道視其鑽空而惌則革堅視其㫄而易則材更視其朕而直則制善櫜之而約則周也舉之而豐則明也衣之無齘則變也少儀云國家靡敝甲不組縢家語云家不藏甲管子云葛盧之山發而出水金從之蚩尤受而制之以為劍鎧荀子云楚人鮫革犀兕以為甲堅如金石漢書云甲不堅密與袒裼同此將不省兵之禍也初學記云甲下飾謂之裳見左傳甲藏謂之纍見國語甲衣謂之櫜見禮記禮書云甲亦曰介曰函曰鎧則甲猶植物之有甲也介猶互物之有介也函所以周其身鎧所以致其愷經言甲而不及鎧則古者之甲以革為之後世乃用金耳詩曰駟介彭彭又曰俴駟孔羣左傳曰不介馬而馳之鄭氏曰俴淺金也秦人以俴金介馬古或用革與否不可考也矛釋名云矛冒也刃下冒矜也夷矛夷常也其矜長丈六尺不曰常而曰夷者言其可夷滅敵亦車上所持也方言云矛吳揚江淮南楚五湖之間謂之鍦或謂之鏦或謂之鋌其柄謂之矜凡矛骹細如㕍頸者謂之鶴膝世本云杼作矛考工記云廬人為廬器酋矛常有四尺夷矛三尋刺兵矛屬同强舉圍欲重重欲傳人傳人則密是故侵之凡為酋矛三分其長二在前一在後而圍之五分其圍去一以為晉圍參分其晉圍去一以為刺圍禮書云說文曰矛象形然則自考工言之則為刺兵自說文言之則為勾兵蓋矛之為器上鋭而㫄勾上鋭所以象物生之芒㫄勾所以象物生之勾酋言其就夷言其易短者其體就長者其體易此矛之辨也鄭氏曰矛㦸柄竹攢柲則矛之柄亦以竹矣然詩厹矛鋈鐓說文云鋌小矛也風俗通曰矛長八尺謂之矟則矛之制固不一矣英閟宮疏云蓋絲纒而朱染之以為矛之英飾王氏云英之以毛羽朱傳云以朱羽為矛飾喬傳云重喬纍荷也箋云喬矛矜近上及室題所以縣毛羽疏矜謂矛柄室矛之銎孔題表識也箋申傳意言矛柄近于上頭及矛銎室之下有旌以題識之其題識者所以縣毛羽二矛于其上頭皆縣毛羽以題識之似如重纍相負荷然故謂纍荷朱傳云矛之上句曰喬所以縣英按孔疏英云絲纒喬云懸羽則與朱傳言喬所以懸英者異矣釋文纍荷之荷舊音何云刻矛頭為荷葉則與鄭箋不合孔云箋申傳意蓋取沈氏兩矛飾相負荷之說也然孔閟宮疏解朱英絲纒本無的據故云蓋以疑之鄭云矛有毛羽亦指時驗朱云矛之上勾曰喬蓋緣爾雅木上勾曰喬以類推知之並非確證韻㑹注喬宇居祅切者云又矛矜也然則鄭以矛矜為喬下二句或并解喬之飾耶果爾則當讀居祅切不當讀渠驕切韓詩又作鷮字不知何解或曰鷮雉名雉飛高止一丈長止三丈一起即下故矛㫄謂之喬下向而曲狀如雉飛見日久英弊所存者喬耳諸說紛然豫謂不若直從毛氏毛云重喬纍荷也蓋爾雅喬之詁為高矛建于車五兵之最高者也酋矛短夷矛長重纍而見故曰重猶云重英耳豈有他義乎中軍朱傳云謂將在鼓下居車之中周禮云王六軍大國三軍次國二軍小國一軍軍將皆命卿左傳云中權後徑羔裘篇豹易云君子豹變其文蔚也爾雅云貘白豹注似熊小頭庳腳黑白駮能舐食銅鐵及竹骨骨節強直中實少髓皮辟濕或曰豹白色者别名白貘音陌陸疏云毛赤而文黑謂之赤豹毛白而文黑謂之白豹本草圖經云豹皮人寢可以驅濕癘今黔蜀中時有貘象鼻犀目牛尾虎足土人鼎釜多為所食其齒以刀斧錐鍛鐵皆碎落火亦不能燒人得之詐為佛牙佛骨以誑俚俗衍義云豹毛赤黃其文黑如錢而中空比比相次此獸猛捷過虎故能安五藏補絶傷輕身又有土豹毛更無文色亦不赤其形小此各有種非能變為虎也埤雅云豹一名程列子曰程生馬古詩曰餓狼食不足飢豹食有餘言狼貪豹亷有所程度而食其字從勺當為此也淮南子曰蝟使虎申蛇令豹止物各有所制也雅翼云豹似虎而圈文有赤有𤣥有白山海經泰山多赤豹幽都之山有𤣥虎𤣥豹王㑹篇云屠州有黑豹白豹别名貘今出建寧郡毛黑白臆似熊而小能食蛇以舌舐鐡可頓進數十斤溺能消鐵為水廣志云狐死首丘豹死首山是性之異也列女傳陶答子妻云南山有𤣥豹霧雨七日不下食者何也欲以澤其衣毛而成其文章故藏以逺害洞𡨕記青豹出浪坂之山狀如虎色如翠豹飾疏云唐風云羔裘豹袪羔裘豹袖然則緣以豹皮謂之為袪袖也禮君用純物臣下之故袖飾異皮禮書云豹取其武而有文六家詩名物疏卷二十
