body:
  text: 六家詩名物疏卷五十五明馮復京撰商頌那篇置箋云置讀曰植植鞉鼓者為楹貫而樹之樂書曰明堂位曰殷楹鼓周官大僕建路鼓于大寢之門外儀禮大射建鼓在阼階西南鼓則其所建楹也是楹鼓為一楹而四稜焉貫鼓於其端猶四植之桓圭也莊子曰負建鼓建鼓可負則以楹貫而置之矣頌曰置我鼗鼓是也磬箋云磬玉磬也朱傳云堂上升歌之樂非石磬書益稷曰戞擊鳴球顧命曰天球在東序郊特牲云諸侯宫縣擊玉磬僣禮也明堂位云玉磬四代之樂器聘義云玉叩之其聲清越以長其終詘然樂也吕氏春秋云堯命夔鳴球以象上帝玉磬之音樂書云玉磬堂上首樂之器其聲清徹有隆而無殺衆聲所求而依之者也客禮記云天子存二代之後史記云舜子商鈞有疆土以奉先祀服其服禮樂如之以客見天子天子弗臣示弗敢専也又云湯封夏之後至周封於杞括地志云宋州虞城縣舜後所封夏亭故城在汝州郀城縣東北五十四里蓋夏后所封一統志河南開封府歸德州虞城縣古虞國禹封商鈞之地南陽府汝州隋唐之汝州也玄鳥篇九有傳云九有九州也爾雅曰兩河間曰冀州河南曰豫州河西曰雍州漢南曰荆州江南曰揚州濟河間曰兖州濟東曰徐州燕曰幽州齊曰營州郭璞曰此蓋殷制易氏曰爾雅九州之名與舜典禹貢異先儒以為殷制由今考之有舜之幽營徐而無舜之青梁并是青入於徐梁入於雍并入於冀也既分禹貢冀州之境而復舜之幽州又并青於徐而復舜之營州殷之九州粲然可考至周人又分冀為并併營於幽復禹之青州而省徐以入於青舜典肇十有二州注云禹治水後舜分冀為幽并分青為營始置十二州禹貢冀州濟河惟兖州海岱惟青州海岱及淮惟徐州淮海惟揚州荆及衡陽惟荆州荆河惟豫州黑水惟梁州黑水西河惟雍州左傳云昔夏之方有德也貢金九牧周禮職方氏東南曰揚州正南曰荆州河南曰豫州正東曰青州河東曰兖州正西曰雍州東北曰幽州河內曰冀州正北曰并州王制注云殷湯更制中國方三千里之界分為九州而建千七百七十三國楊用修云春秋命厯敘人皇氏依山川土地之勢度為九州謂之九囿囿古文省作有畿傳云畿疆也王制注縣內夏時天子所居州界名也殷周曰畿孔氏曰殷周稱畿唐虞稱服周禮大司馬九畿方千里曰國畿職方氏九服方千里曰王畿易氏曰禹之五服王畿在內職方氏王畿不在九服之內漢志云殷周因井田而制軍賦十終為同同方百里同十為封封十為畿畿方千里禮書春秋傳曰天子一圻周語曰規方千里以為甸服王制曰千里之內曰甸則天子寰內五百里中為王城百里為郊二百里為邦甸三百里為邦削四百里為邦縣五百里為邦都四海爾雅九戎八狄七戎六蠻謂之四海孫炎曰海之言晦晦昧於禮儀也虞書曰州十有二師外薄四海咸建五長景朱傳云景山名商所都也春秋傳曰商湯有景亳之命括地志宋州北五十里大蒙城為景亳湯所盟地因景山為名寰宇記景山在應天府楚丘縣北三十八里玉海云髙四丈今屬拱州詩緝云自湯至盤庚五遷亳囂在河南相耿在河北盤庚後傳三世至武丁又傳四世至庚丁之子武乙始去亳徙河北此詩所言河正指亳也按宋之南京應天府今之開封歸德州也州城東南有亳城即景亳也拱州今為睢州長發篇有娀吕氏春秋云有娀氏有二佚女為九成之臺淮南子云有娀在不周之北長女簡翟少女建疵史記云桀敗於有娀之墟正義云當在蒲州國名記云帝嚳次妃國桀敗有娀之墟蓋陜虢間帝箋云黑帝春秋緯云太微宫有五帝座黑帝曰汁光紀九圍疏云分天下為九處規圍然故謂九圍球箋云小玉尺二寸圭也大玉謂珽也釋地云西北之美者有崑崙虛之璆琳琅玕焉注云璆琳美玉周禮大宗伯云王執鎮圭注云鎮安也所以安四方蓋以四鎮之山為瑑飾典瑞云王晉大圭執鎮圭繅藉五采五就以朝日又云珍當作鎮圭以徴守以恤凶荒玉人云鎮圭尺有二寸天子守之天子圭中必注云以組約其中央為執之以防失隊已上釋小球考工記云大圭長三尺杼上終葵首天子服之注云王所搢大圭也或謂之珽終葵椎也為椎於其杼上明無所屈杼閷也玉藻云天子瑨珽方正於天下也諸侯荼前詘後直讓於天子也大夫前詘後詘無所不讓也又云笏天子以球玉諸侯以象大夫以魚須文竹士竹本象可也笏度二尺有六寸其中博三寸其殺六分而去一禮器云大圭不琢左傳云衮冕黻珽昭其度也相玉書云珽玉六寸明自照禮書云天子朝日執鎮圭搢大圭則所執者摯也所搢者笏也諸侯之朝大夫之聘蓋亦如此諸侯執命圭者必搢荼大夫執聘圭者必搢笏及合瑞而授圭則執其所搢而已此所謂見於天子無脫笏也已上釋大球朱傳云或曰小國大國所贄之玉舜典輯五瑞巡狩修五玉如五器卒乃復注云器謂圭璧禮終則還之典瑞云公執桓圭侯執信圭伯執躬圭繅皆三采三就子執穀璧男執蒲璧繅皆二采再就以朝覲宗遇會同于王諸侯之相見亦如之覲禮云朝以瑞玉有繅曲禮云凡摯天子鬯諸侯圭互見淇奧篇圭璧旒箋云旌旗之垂者巾車云玉路建大常十有二斿大行人云上公建常九斿侯伯建常七斿子男建常五斿考工記云龍旗九斿以象大火也鳥旟七斿以象鶉火也熊旗六斿以象伐也龜蛇四斿以象營室也樂記云龍旗九旒天子之旌所以贈諸侯明堂位云魯君孟春乘大路旗十有二旒日月之章祀帝于郊爾雅云纁帛縿素升龍于縿練旒九飾以組維以縷注云縿衆旒所著練絳練也用綦組飾旒之邊用朱縷維連持之不欲令曵地案禮記注引詩作為下國畷郵郵謂民之郵舍言湯為下國諸侯在畷民之處使不離散所引齊魯韓三家之説也共朱傳或曰小國大國所共之貢禹貢序云禹别九州隨山濬川任土作貢兖州貢漆絲厥篚織文青州貢鹽絺海物惟錯岱畎絲枲鉛松怪石厥篚檿絲徐州貢土五色羽畎夏翟嶧陽孤桐泗濵浮磬厥篚玄纎縞揚州貢金三品瑶琨篠簜齒革羽毛惟木厥篚織貝厥包橘柚錫貢荆州貢羽毛齒革惟金三品杶幹栝柏礪砥砮丹惟箘簵楛包匭菁茅厥篚玄纁璣組九江納錫大龜豫州貢漆枲絺紵厥篚纎縞錫貢磬錯梁州貢璆鐵銀鏤砮磬熊羆狐狸織皮雍州貢球琳琅玕周禮大宰以九貢致邦國之用一祀貢二嬪貢三器貢四幣貢五材貢六貨貢七服貢八斿貢九物貢太府凡邦國之貢以待弔用內府掌受九貢之貨賄良兵良器以待邦之大用大司徒諸公之地食者半侯伯之地食者三之一子男之地食者四之一土均以均地貢大司馬施貢分職以任邦國大行人侯服貢祀物甸服貢嬪物男服貢器物采服貢服物衛服貢材物要服貢貨物蕃國各以所貴寶為摯小行人令諸侯春入貢秋獻功禮器云大饗其王事與三牲魚臘四海九州之美味也籩豆之薦四時之和氣也內金示和也束帛加璧尊德也龜為前列先知也金次之見情也丹漆絲纊竹箭與衆共財也其餘無常貨各以其國之所有則致逺物也郊特牲云旅幣無方所以别土地之宜節逺近之期也虎豹之皮示服猛也蘇氏曰共珙通合珙之玉韻會注珙璧也通作拱老子拱璧駿龎董氏云齊詩作駿駹謂馬也苞傳云本也疏易稱苞桑謂桑本故以苞為本蘖説文云伐木餘也盤庚云若顛木之有由蘖釋詁曰枿餘也李巡曰稿木之餘韋鄭語祝融其後八姓彭姓豕韋通典滑州韋城縣古豕韋國國名記云彭姓商伯元哲之封豕韋也一統志直𨽻大名府滑縣古豕韋氏之國廢韋城縣在縣東南五十里顧郡縣志顧城在濮州范縣東二十八里夏之顧國故莘城在汴州陳留縣東北三十五里古莘國地湯伐桀桀與韋顧之君拒湯於莘之虛遂戰於鳴條之野一統志顧城在山東東昌府濮州范縣東南五十三里昆吾國語祝融後己姓昆吾為夏伯注云昆吾祝融之孫陸終第二子名樊為己姓封於昆吾昆吾衛是也後夏衰為伯遷於舊許傳曰楚之皇祖伯父昆吾舊許是宅括地志濮陽縣古昆吾國故城縣西三十里昆吾臺在縣西百步周圍五十步髙二丈即昆吾虛也左傳昭十八年二月乙卯周毛得殺毛伯過萇𢎞曰是昆吾稔之日也寰宇記解州安邑縣有昆吾亭蓋湯伐桀之時昆吾以兵助桀同時而滅故有亭非國于此一統志東昌府濮州古顓頊之虛曰帝丘夏為昆吾氏所居夏吳起曰夏桀之居左河濟右泰華伊闕在南羊腸在北寰宇記禹自安邑都晉陽桀徙安邑書序孔氏注桀都安邑湯升道從陑陑在河曲之南戰于鳴條之野地在安邑西一統志山西平陽府解州安邑縣禹營安邑即此地鳴條岡在縣北二十里境接夏縣阿衡箋云阿倚衡平也伊尹湯所依倚而取平故以為官名書君奭曰在昔成湯有若伊尹格于皇天在大甲時則有若保衡格于上帝注云伊尹湯以為阿衡大甲改保衡阿衡保衡皆公官殷武篇楚春秋正義荆楚一木二名故以為國號亦得二名莊公之世荆皆書荆僖之元年乃書楚人伐鄭蓋始改為楚疏云周始封熊繹為楚子武丁之世不知楚君為何人左傳楚國方城以為城漢水以為池一統志方城山在河南南陽府裕州東北氐羌地里志云隴西郡有氐道羌道郡縣志夏桀之亂犬夷入居岐邠之間成湯伐而攘之武王伐商羌髳會于牧野括地志云隴右岷洮叢等州西羌也孔氏曰氐羌之種漢世仍存在秦隴之西黃氏云羌本薑姓三苖之後居三危今疊宕松諸州皆羌地説文云西方羌從羊山海經伯夷父生西嶽西嶽生先龍先龍是始生氐羌氐羌乞姓案黃氏曰今疊宕松諸州皆羌地所云疊疊溪也宕順慶也松松潘也皆隸四川孔氏以為居秦隴之西括地志亦云隴右岷洮叢等州西羌也故一統志以陜西臨洮府寧夏岷州靖虜衛文縣所四川龍州松潘疊溪皆為羌地但隴西者本犬戎之地其外為西戎春秋以前非羌地也意者戰國時氐羌日盛漸併西戎之地與享周書伊尹為四方令曰臣請正東符婁仇州伊慮漚深九夷十蠻越漚鬋文身請令以魚支之鞞缺一字鰂之醬鮫瞂利劍為獻正南甌鄧桂國損子産里百濮九菌請令以珠璣玳瑁象齒文犀翠羽菌鶴短狗為獻正西崑崙狗國鬼親枳己闒耳貫胸雕題離丘漆齒請令以丹青白旄紕罽江歷龍角神龜為獻正北空同大夏莎車姑他旦略貌胡戎翟胸奴樓煩月氏􅏽犁其龍東胡請令以槖駝白玉野馬騊駼駃騠良弓為獻湯曰善王箋云世見曰王大行人云九州之外謂之蕃國世一見各以其所貴寶為摯注云九州之外夷服鎮服蕃服也無朝貢之歲父死子立及嗣王即位乃一來耳各以貴寶為贄若犬戎獻白狼白鹿是也明堂位云四塞世告至周語云荒服者王終王注云朝嗣王及即位而來見虔箋云椹謂之虔爾雅椹謂之榩孫炎曰椹斫材質也史記曰臣胸不足當椹質注云椹者莝砧也韻會注云椹斫木櫍也一曰木趺六家詩名物疏卷五十五
