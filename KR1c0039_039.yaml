body:
  text: 六家詩名物疏卷三十六明馮復京撰小雅鴻雁之什一鴻雁篇鰥釋名云鰥昆也昆明也愁悒不寐目恒鰥鰥然故其字從魚魚目恒不閉者也白虎通云鰥之言鰥鰥無所親也孝經注云男子六十無妻曰鰥禮記云少而無父者謂之孤老而無子者謂之獨老而無妻者謂之鰥老而無夫者謂之寡此四者天民之窮而無告者也皆有常餼寡小爾雅云凡無妻無夫通謂之寡寡夫曰煢寡婦曰嫠釋名云寡踝也踝踝單獨之言也孝經注云婦人五十無夫曰寡禮記疏云男子無妻亦謂之寡左傳云崔杼生成及疆而寡堵説文云垣也五版為堵傳云一丈為版五版為堵箋云春秋傳曰五版為堵五堵為雉雉長三丈則版六尺疏云毛言五版為堵謂累五版也版廣二尺故周禮説一堵之牆長丈髙一丈是版廣二尺也傳以一丈為版鄭欲易之故引公羊傳文以證版之長短韓詩説云八尺為版五版為堵五堵為雉又云堵四十尺雉二百尺以板長八尺接五版而為堵接五堵而為雉宅説文云所託也釋名云宅擇也言擇吉處而營之也尉繚子云天子宅千畆諸侯宅百畆大夫以下里舎九畆周禮云國宅無征注云城中之宅無稅庭燎篇庭燎周禮閽人大祭祀䘮紀之事設門燎賔客亦如之司烜氏凡邦之大事共墳燭庭燎注云墳大也樹於門外曰大燭於門内曰庭燎皆所以照衆為明疏云庭燎以葦為中心以布纒之飴蜜灌之若今爉燭或以百般一處束之或百處設之若人所執者用荆燋為之執燭抱燋曲禮云燭不見跋是也禮記云庭燎之百由齊桓公始也注庭燎之差公蓋五十侯伯子男三十疏云此數出大戴記也百者皇氏云作百炬列于庭或云百炬共一束也國語單子云敵國賔至甸人積薪火師監燎禮書云在手曰燭在地曰燎晨説文云早昧爽也從臼從辰辰時也亦聲夕為臼辰為晨皆仝意釋名云晨伸也旦而日光復似見也沔水篇朝曲禮曰天子當依而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝注云諸侯春見曰朝受贄於朝受享於廟生氣文也秋覲曰覲一受之於廟殺氣質也朝者位于内朝而序進覲者位于廟門外而序入王南面立于依宁而受焉夏宗依春冬遇依秋王制云諸侯之於天子比年一小聘三年一大聘五年一朝又云天子無事與諸侯相見日朝考禮正刑一徳以尊于天子周禮太宰大朝覲㑹同贊玉幣玉獻玉几玉爵宰夫凡朝覲㑹同以牢禮之法掌其牢禮幕人朝覲㑹同共帷幕幄帟綬掌次朝覲㑹同張大次小次大宗伯春見曰朝注云朝朝也欲其來之早又云朝覲㑹同則為上相司几筵大朝覲王位設黼扆筵席玉几典瑞云侯伯執圭子男執璧以朝覲宗遇㑹同于王小臣朝覲沃王盥齊僕朝覲宗遇饗食皆乘金路各以其等為車送逆之節大司冦朝覲㑹同前王大行人春朝諸侯以圖天下之事凡諸侯之邦交嵗相朝也孟子曰諸侯朝於天子曰述職述職者述所職也一不朝則貶其爵再不朝則削其地三不朝則六師移之宗大宗伯云夏見曰宗注云宗尊也欲其尊王大行人云夏宗以陳天下之謨海釋名云海晦也主承穢濁其色黑如晦也説文云海天池也以吐納百川者公羊傳云河海潤千里春秋攷異郵云黄星騁海水躍宋均云黄星土精土安靜躍則失常山海經云大荒中有山曰天臺海水入焉莊子云天下之水莫大於海萬川歸之不知何時止而不盈尾閭洩之不知何時已而不虛春秋不變水旱不知晏子云海深十里博物志云天地四方皆海水相通地在其中蓋無幾也七戎六蠻九夷八狄形類不同總謂四海言皆近于海也初學記云東海之别有渤澥故東海共稱渤海又通謂之滄海山海經有岐海幼海少海凡四海通謂禆海裨海外復有大瀛海環之海神曰海若海中山曰島海中洲曰嶼渤海圖論云海者百谷之王也山東三面瀕海登萊二府島嶼環抱其在青濟則樂安日照濵州利津霑化海豐諸境皆抵海為界稱渤海云留青日札云東海南海易窮漢使東道極于黑齒國南道極于烏弋山離國此亦當是西南也烏弋山離去長安萬二千二百里行可百餘日乃至條支國臨西海又乘水西行可百餘日近日所入云于闐水西流注西海其東水東流注鹽澤河源出焉康居去長安萬二千三百里其西北可二千里有奄蔡國臨大澤無涯蓋北海云鶴鳴篇鶴春秋説題詞云鶴知夜半注鶴水鳥也夜半水位感其生氣則喜而鳴通卦驗云立夏清風至而鶴鳴周易曰鳴鶴在隂其子和之詩義疏云鶴大如鵝長脚青黑髙三尺餘喙長四寸餘多純白或有蒼色者今人謂之赤頰常夜半鳴其鳴髙亮聞八九里雌一作老者聲差下鷄鳴時亦鳴風土記云鳴鶴戒露白鶴也此鳥性警至八月白露降即髙鳴相警相鶴經云鶴陽鳥而逰於隂因金氣依火精以自養食於水故喙長軒於前故後趾短棲陸故足髙而尾凋翔雲故毛豐而肉疎大喉以吐故修頸以納新故夀體無青黄二色者木土之氣内養故不表於外行必依洲嶼止不集林木蓋羽族之宗長仙人之騏驥也鶴之上相瘦頭朱頂露眼黑睛髙鼻短喙䯓頰䯔耳長頸促身燕膺鳯翼雀毛龜背鼈腹軒前垂後髙脛麄節洪髀纎指此相之備者也鳴則聞于天飛一舉千里鶴二年落子毛易黑點三年産伏復七年羽翮具復七年飛薄雲漢復七年舞應節復七年十二時鳴中律復百六十年不食生物大毛落茸毛生雪白或純黑泥水不汚復百六十年雌雄相見目精不轉而孕千六百年飲而不食鸞鳯為羣禽經云鶴老則聲下而不能髙近而不能尞又云鶴愛隂而惡陽聲交而孕又云鶴以怨望以潔唳古今注云千載變蒼又千嵗變黑所謂𤣥鶴玉策記云千嵗之鶴隨時而鳴能登木色純白腦盡成骨其未千嵗者終不集于林也本草云鶴有𤣥有黄有白有蒼雲嶠類要云鶴胎生者形體堅小惟食稻粱雖甚馴久須飛去鸛合而卵生其體大食魚鰕噉虵鼠不能去耳埤雅云鶴雌雄相隨履跡而孕内典曰鶴影生雅翼云鶴性好隂故謂其羽為隂羽周書曰隂羽鳬旌也古書多言鵠即鶴音之轉鵠不日浴而白白即鶴也鵠鳴哠哠哠哠鶴也以龜龍鴻鵠為夀夀亦鶴也臯傳云臯澤也箋云澤中水溢出所為坎韓詩説云九臯九折之澤楚辭注云澤曲曰臯淵説文云淵囘水也管子云水出地而不流者命之曰淵李蕭逺云水通之斯為川塞之斯為淵荀子曰積水成淵蛟龍生焉列子云鯢旋之潘為淵止水之潘為淵流水之潘為淵濫水之潘為淵沃水之潘為淵氿水之潘為淵雍水之潘為淵汧水之潘為淵肥水之潘為淵是為九淵焉錯説文作厝云厲石也傳云可以琢玉嚴氏云揚子不礱不錯焉攸用錯謂治玉也尚書豫州錫貢磬錯注云治玉石曰錯穀廣雅云穀楮也陸疏云幽州人謂之榖桑荆揚交廣謂之榖中州人謂之楮殷中宗時桑穀共生是也今江南人績其皮以為布又𢷬以為紙謂之穀皮紙潔白光澤其裏甚好葉初生可以為茹管子云五位之土其柞其穀酉陽襍俎云構穀田久廢必生構葉有瓣曰楮無曰構本草圖經云楮有二種一種有斑花文謂之斑穀今人用為冠一種皮無花但葉似葡萄作瓣而有子者為佳其實初夏生如彈丸青緑色至六七月漸深紅色乃成熟八月九月採抱朴子云柠實赤者餌之一年老者還少物類相感志云其膠可團丹砂埤雅云楮宜澗谷雅翼云穀惡木易生實赤如楊梅而無核祈父篇祈父傳云圻父司馬也職掌封圻之兵甲書云圻父薄違蔡氏云圻父逼逐違命者也又云司馬掌邦政統六師平邦國周禮云大司馬掌建邦國之九法以佐王平邦國以九伐之法正邦國以九畿之籍施邦國之政職中春敎振旅中夏教苃舎中秋敎治兵中冬敎大閲若大師則掌其戒令及戰巡陳眡事而賞罰若師有功則左執律右執鉞以先愷樂獻于社小宰云夏官其屬六十記王制云司馬辨論官材論進士之賢者以告于王家語云司馬之官以成聖賢能而失官爵功勞而失賞禄士卒疲怨兵弱不用曰不平不平則飭司馬爪説文曰覆手曰爪釋名云爪紹也筋極為爪紹續指端爪士箋云司右主勇力之士為王閑守之衛周禮司右掌羣右之政令凡軍旅㑹同合其車之卒伍而比其乘屬其右凡國之勇力之士能用五兵者屬焉虎賁氏下大夫二人虎士八百人掌先後王而趨以卒伍軍旅㑹同亦如之舎則守王閑王在國則守王宫國有大故則守王門孔疏云司右與虎賁氏俱率其屬以衛王禮書云古之守衛王宫者不特士庶子而已有虎賁之虎士司隸之五隸司戈盾軍旅㑹同授旅賁及虎士戈盾則王之在國在野可謂嚴矣必使四夷之隸者以著王之所守在四夷也或使師氏之屬師之者以著王之使武以文也饔説文熟食也周禮内饔外饔鄭云饔割烹煎和之稱儀禮雍人摡鼎匕俎于雍爨注云雍人掌割烹之事者白駒篇藿説文靃尗之少也公食禮云鉶芼牛靃注云靃豆葉也黄鳥篇粟説文云粟嘉穀實也粟之為言續也周禮云倉人掌粟入之藏春秋説題辭云粟助陽扶性一變而以陽生為苗二變而秀為禾三變而粲然謂之粟四變入臼米出甲五變而烝飯可食陽以一立為法故粟積一大分穗長一尺西者金所立米者陽精故西字合米而為粟吕氏春秋曰飯之美者不周之粟羅氏云古不以粟為穀之名但米之有孚殻者皆稱粟今人以穀之最細而圓者為粟則粱是其類仁山金氏云吕氏書説有殻曰粟無殻曰米按粟即所謂穀也古人米與穀兼積米切用而易腐穀氣全而可久緩急兼儲後世軍儲獨以米故久即不可食本草粟米味鹹主養腎氣去脾胃中熱益氣陳者味苦主胃熱消渴利小便唐本注云粟類多種而並細於諸粱北土常食與粱有别明箋云明當為盟信也禮記曰約信曰誓涖牲曰盟周禮司盟掌盟載之法凡邦國有疑㑹同則掌其盟約之載及其禮儀北面詔明神既盟則貳之盟萬民之犯命者詛其不信者亦如之注云盟者書其辭於策殺牲取血坎其牲加書於上而埋之謂之載書有疑不協也明神日月山川覲禮加方明於壇上所以依之也詔之者讀載書以告貳之者寫副當以授六官盟詛者欲相與共惡之也又玉府若合諸侯則共珠槃玉敦戎右盟則以玉敦辟盟遂役之贊牛耳桃茢封人大盟飾牛牲詛祝作盟詛之載辭司冦凡邦之大盟約涖其盟書而登之于天府太史内史司㑹及六官皆受其貳而藏之左傳子貢曰盟有玉帛以奉之諸兄爾雅云男子先生為兄後生為弟族父之子相謂為族晜弟族晜弟之子相謂為親同姓兄之子弟之子相謂為從父昆弟諸父爾雅云父為考父之考為王父父之世父叔父為從祖祖父父之晜弟先生為世父後生為叔父父之從父晜弟為從祖父父之從祖晜弟為族父按諸之訓衆也則諸父諸兄當合三族而言箋傳義非也我行其野篇遂箋云牛蘈也仲春時生可采爾雅云藬牛蘈郭云今江東呼草為牛蘈者髙尺餘許方莖葉長而銳有穗穗間有華華紫縹色可淋以為飲疏縹青白色淋以水沃也陸璣云今人謂之羊蹄似蘆菔而葉長赤䰞為茹滑美本草羊蹄一名東方宿一名連蟲陸一名鬼目一名蓄陶隠居云今人呼秃菜即蓄音之訛詩云言采其蓄圖經云生下濕地春生苗髙三四尺葉狹長頗似萵苣而色深莖節間紫赤花青白成穗子三稜若茺蔚夏中即枯根似牛蒡而堅實衍義云葉如菜中菠薐但無岐而色差青白葉厚花與子亦相似按箋云蓫牛蘈爾雅云藬牛蘈則蓫即是藬孔疏云釋草無文非也孫炎注爾雅云車前草一名牛蘈考車前草本草有五名並不云牛蘈孫説誤矣葍箋云葍亦仲春時生可采爾雅云葍䔰郭云大葉白華根如指正白可啖又云葍藑茅疏葍與藑茅一草也華白者即名葍華赤者别名藑茅廣雅云烏麮葍也陸璣曰河内謂之蓘幽州謂之葍燕一名藚其根正白宜著熱灰中温噉之饑嵗可烝茹以禦饑或云花葉有兩種一種葉細而花赤一種葉大而花白復香風土記云葍蔓生被樹而升紫黄色大如牛角二三同蔕長七八尺甜味如蜜按陸璣所言花赤者即是藑茅也風土記所云恐别是一物蓫葍毛公並謂之惡菜然蓫堪入藥用葍花白而香根可茹未必惡菜也六家詩名物疏卷三十六
