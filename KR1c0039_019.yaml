body:
  text: 六家詩名物疏卷十六明馮復京撰國風衛一淇澳篇奧爾雅云隩隈崖內為隩外為隈孫炎曰隈水曲中也李巡曰崖內近水為隩郭璞云今江東呼為浦澳淮南子曰漁者不爭隈博物記云有奧水流入淇水有緑竹草水經注美溝水東北注淇水博物志謂之奧水流入于淇漢武帝塞決河用淇園之竹冦恂為河內伐竹淇川治矢今通望淇川無復此物唯王芻萹草不異毛興緑傳云緑王芻爾雅云菉王芻疏某氏云鹿蓐也郭云蓐也今呼鴟腳莎詩緑竹猗猗是也說文菉王芻詩曰菉竹猗猗大學引詩云菉竹猗猗本草唐注云藎草葉似竹而細薄莖亦圓小生平澤溪澗之側荆襄人煮以染黃色極鮮好洗瘡有效爾雅所謂王芻雅翼云本草名藎草俗亦呼淡竹葉所謂終朝采緑者上林賦稱香草云掩以緑蕙被以江蘺張揖亦以緑為王芻則菉香草也而離騷云薋菉葹以盈室以三者皆惡草竹爾雅云竹萹蓄孫炎某氏引詩云菉竹猗猗郭云似小藜赤莖節好生道㫄可食可殺蟲韓詩緑􅗨猗猗􅗨篇筑也毛傳云竹萹竹也陶隱居云處處有布地生華節間白葉細緑人亦呼為萹竹本草注云生下溼地圗經云春中布地生道㫄苗似瞿麥葉細緑如竹赤莖如叉股節間花出甚細微青黃色根如蒿根朱傳云淇上多竹漢世猶然所謂淇園之竹竹譜云淇園衛地殷紂竹箭園也見班彪志淮南子云烏號之弓貫淇衛之箭毛詩云緑竹猗猗是也又云植物之中有物曰竹不剛不柔非草非木或茂沙水或挺嵓陸又云竹之别類六十有一又云竹六十年一易根輒結實而枯死其實落地復生六年遂成町易云震為蒼筤竹尚書云揚州篠簜既敷荆州厥貢箘簵孔安國曰篠竹箭簜大竹箘簵美竹周官云孤竹之管孫竹之管陰竹之管爾雅云簜竹莽數節桃枝四寸有節粼堅中簢筡中仲無笐篠箭又云東南之美者有㑹稽之竹箭焉說文竹冬生草也齊民要術云竹性愛向西南引故園東北角種之數嵗之後自當滿園其居東北角者老竹種不生亦不能滋茂故須取西南引少根也花木考云竹之滋澤春發于枝葉夏藏于幹冬歸于根陸疏云緑竹一草名其莖葉似竹青緑色髙數尺今淇澳旁生此草其草澀礪可以洗攪笏及盤枕利于刀錯俗呼為木賊彼土人謂此為緑竹按緑一作菉王芻也竹一作􅗨萹蓄也毛韓說皆同而竹譜朱傳皆以為即漢書淇園之竹酈道元云淇川無竹惟王芻萹草不異毛興劉執中云淇水之㫄至今多美竹豈淇園之竹在後魏無復遺種而至宋更滋茂乎然據雨漢書淇奧有竹據水經注有王芻萹草毛韓朱三家各自可通陸疏又以緑竹為一草名古今並無從其說者今木賊草醫方通用木工以治器但無華葉寸寸有節與陸說有葉者稍殊未知即一物否也爾雅釋簜莽等在草中然實非草類王元美所云竹于草木如魚于鳥獸是也其類至多山海經帝俊竹共谷竹鉤端竹尋竹禮斗威儀􅀢竹吳越春秋晉竹述異記班竹孤竹孝竹吕覽嶰谷竹南都賦籦籠䈽篾篠簳箛箠吳都賦篔簹林箊桂箭射筒柚梧篻簩竹譜單名者􅟳篁棘單苦甘弓筋笻䈏􅚠􅀢蓋狗蘆篃之屬雙名者蘇麻般腸百葉雞脛篲篠之屬廣志有雲母㰚􅓁漢利之屬酉陽雜爼有䈄􅢭之屬筍譜至有八十五種竹筍及諸方志有疏節人面綿貓叢澀碧玉電班之屬難以具載然多出交廣荒外非詩人所盡見也竹田曰篁竹胎曰筍竹膚曰笢竹皮曰筠竹裏曰笨竹枚曰箇竹約曰節剖竹未去節曰䉃竹死曰䈙竹有雌雄雄者多筍五月十三日謂之竹醉日栽竹多茂盛其性惡寒好溫故曰九河鮮育五嶺實繁然處處有之不似萹蓄但盛于淇川也琇瑩說文云琇石之次玉者又云瑩玉色一曰石之次玉者逸論語曰如玉之瑩辨皮辨傳云皮辨周禮司服云凡兵事韋辨服視朝則皮辨服凡甸冠辨服凡凶事服辨服凡弔事辨絰服辨師云王之皮辨㑹五采玉璂象邸玉笄注鄭司農云㑹以五采束髮也𤣥謂㑹縫中也璂讀如綦綦結也皮辨之縫中每貫結五采玉十二以為飾謂之綦邸下柢也以象為之又云諸侯及孤卿大夫之韋辨皮辨辨絰各以其等為之注韋辨皮辨侯伯璂飾七子男璂飾五玉亦三采孤璂飾四三命之卿璂飾三再命之大夫璂飾二玉亦二采白虎通云皮辨者何所以法上古至質冠名也辨之為言樊也所以樊持其髮也釋名云辨如兩手相合抃時也以爵韋為之謂之爵辨以鹿皮為之謂之皮辨以韎韋為之謂之韋辨儀禮注云辨名出于􅦼􅦼大也言所以自光大也後漢輿服志委貌冠皮辨冠同制長七寸髙四寸制如覆柸前髙廣後卑鋭所謂夏之毋追殷之章甫者也委貌以皂絹為之皮辨以鹿皮為之魏臺訪議曰五采玉一玉有五色者也邸以象骨周緣辨下根柢如魏武帝所作辨柢凡有笄無纓曹褒云天子辨以白玉飾舊禮圗云皮辨以鹿皮淺毛黃白者為之髙尺二寸禮書云記曰三王共皮辨素積語曰素衣麑裘則素衣其衣也素積其裳也士冠禮皮辨素積緇帶禮記雜帶君朱緑大夫𤣥華士緇辟則士與君大夫皮辨之帶異矣士冠禮皮辨笄爵辨笄緇組紘纁邊辨師王朱紘禮記諸侯青紘則士與天子諸侯皮辨之紘亦異矣蓋皮辨天子以視朝以宴以聽祭報以舞大夏諸侯以聽朔以巡牲以卜夫人世婦以迎王之郊勞以待聘賔卿大夫以王命勞侯氏以聘于鄰國以卜宅士以冠學士以釋菜凡大夫士之朔月皆皮辨服則皮辨之所施者衆矣蓋人為者多變自然者不易皮辨亦因其自然而已此所以三王共皮辨素積而周天子至士共用之也然喪服小記諸侯弔必皮辨錫衰郊特牲大蠟皮辨素服葛帶榛杖以送終則辨雖與吉禮同而服與吉服不同簀釋器云簀謂之第注牀板方言云牀齊魯之間謂之簀陳楚之間或謂之第禮記云華而晥大夫之簀說文云簀牀棧也錫爾雅云錫謂之鈏疏云錫今白鑞也周禮職方云揚州其利金錫栗氏為量改煎金錫則不耗山海經云龍山之下多赤錫濯山多白錫圭說文云圭瑞玉也上員下方以封諸侯楚爵有執圭白虎通云圭以為信而見何也圭者鋭上象物始生見于上也信莫著于見故以之萬物之始莫不自潔圭之為言圭也上鋭陽也下方陰也周禮大宗伯云王執鎮圭公執桓圭侯執信圭伯執躬圭又云以青圭禮東方注鎮圭以四鎮之山為瑑飾長尺有二寸雙植謂之桓桓宫室之象以為瑑飾長九寸信當為身身圭躬圭以人形為瑑飾文有粗縟耳長七寸典瑞云瑑圭以眺聘四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望祼圭有瓚以肆先王裸賔客珍圭以徴守以恤凶荒榖圭以和難以聘女琬圭以治德以結好琰圭以易行以除慝玉人云大圭長三尺杼上終葵首天子服之土圭尺有二寸以致日以土地禮器云諸侯以圭為瑞家不藏圭言有稱也聘義云以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也又云圭璋特逹德也聘禮記云所以朝天子圭與繅皆九寸剡上寸半厚半寸博三寸繅二采六等朱白蒼問諸侯朱緑繅八寸皆𤣥纁繫長尺絢組凡四器者惟其所寶以聘可也四器圭璋璧琮凡執玉無藉者襲瑞應圗云四海㑹同則𤣥圭出璧爾雅云璧大六寸謂之宣肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環孫炎曰肉身也好孔也說文璧瑞玉圜也璜半璧也瑗大孔璧也周禮大宗伯云子執榖璧男執蒲璧注榖所以養人蒲所以安人二者以為飾皆徑五寸又云以蒼璧禮天典瑞云瑑璧以眺聘圭璧以祀日月星辰璧羡以起度禮器云大饗束帛加璧尊德也白虎通云方中圎外曰璧璧之為言積也內方象地外圎象天重較釋名云較有箱上為辜較也重較其較重卿所乘也考工記云輿人為車以其隧之半為較崇參分式圍去一以為較圍注較兩輢上出式者兵車自較而下凡五尺五寸兵車之較圍四寸九分寸之八疏云較謂車輿兩相今人謂之平鬲兩輢謂車相兩旁豎之者二者既别而云兩輢上出式者以較之兩頭皆置于輢上二木相附故據出式而言之吕和叔云古者車箱長四尺四寸三分前一後二橫一木下去車床三尺三寸謂之式又于式上二尺二寸橫一木謂之較去車床凡五尺五寸古人立乘若平常則憑較若應為敬則落手憑下式而頭得俯按毛傳云重較卿士之車蓋據序武公入相于周謂之卿士其實武公是侯爵故疏云侯伯之車也賈公彥云天子與其臣乘重較之車諸侯之車不重較二說不同者周禮本無重較單較之文各以其意為說耳或者以較出式上與式為兩層而謂之重乎考􅦼篇􅦼朱子引陳氏云考扣也􅦼器名蓋扣之以節歌如鼓盆拊缶之為樂也說文云承􅦼也內則云進盥少者奉􅦼長者奉水注􅦼盛盥水者大學疏云沐浴之盤按􅦼字從木周禮疏云以木為之是也陳氏云扣以節歌則是盥􅦼非浴盤矣盤有以銅為者史記毛遂奉銅􅦼是也有飾以珠者玉府合諸侯共珠􅦼是也合諸侯之禮蓋以􅦼盛血阿爾雅云大陵曰阿廣雅云四起曰京四京曰阿毛傳云曲陵曰阿陸爾雅云髙平曰陸釋名云陸漉也水流漉而去也碩人篇錦箋云國君夫人翟衣而嫁今衣錦者在塗之所服釋名云錦金也作用功重其價如金故制字帛與金也王制云錦文珠玉成器不鬻于市玉藻云君衣狐白裘錦衣以裼之潛夫論云濯錦以魚褧衣玉藻云襌為綗注有衣裳而無裏中庸云衣錦尚綗惡其文之著也方言云襌衣江淮南楚之間謂之褋關之東西謂之襌衣丰箋云褧蓋以襌縠為之中衣裳用錦而上加襌縠為其文之太著也庶人之妻嫁服也士妻紂衣纁袡按說文褧檾也詩曰衣錦褧衣檾枲屬髙四五尺或七八尺葉似苧而薄實如大麻子今人績以為布及造繩索者也與襌衣之解不同東宫左傳注太子不敢居上位常處東宫疏常處東宫者四時東為春萬物生長在東西為秋萬物成就在西以此君在西宫太子常處東宫也或可據西北為乾乾為君父故君在西東方震震為長男故太子在東也卞壼奏云太子所居宫稱東宫不言太子宫者二宫以東西為稱明是天子之離宫使太子居之白虎通云春秋傳曰王世子㑹于首止晉有太子申生鄭有太子華齊有太子光則周制太子世子亦不定也漢制天子嫡嗣稱皇太子諸侯嫡嗣稱世子後代咸因之孔演圗云聖人在後曰望羊苞懷至德據少陽冠禮記云天子之元子猶士也天下無生而貴者也左傳里克云太子奉冡祀社稷之粢盛以朝夕視君膳者也故曰冡子君行則守有守則從從曰撫軍守曰監國又云昔先王之命曰王后無嫡則擇立長年鈞以德德鈞以卜王不立愛公卿無私常衮表云國之上嗣古曰元良觀象于天應前星之環極取法于地視少海之朝宗妹爾雅云男子謂女子後生為妹說文云妹女弟也邢左傳富辰云凡蔣邢茅胙祭周公之胤也通典邢州治龍岡縣祖乙遷于邢即此括地志云邢國故城在邢州外城內西南角十三州志云殷時邢侯國周公子封邢侯都此路史云周公之祚七靖淵封邢侯爵滅于衛一統志直隸順德府禹貢冀州之域周時為邢國地邢臺縣附郭邢侯夫人墓在府城齊武平初有掘古冡得銅鼎腹有科斗字云邢侯夫人姜氏墓姨爾雅云妻之姊妹同出為姨郭云同出謂俱已嫁談春秋談子注談國在濟南平陵縣西南一統志談城在山東濟南府城東七十里古談子國漢置談城縣私爾雅云女子謂姊妹之夫為私孫炎曰私無正親之言釋名云姊妹互相謂夫曰私言于其夫兄弟之中此人與已姊妹有恩私也膚釋名云膚布也布在表也領正義云領一名頸故禮記云其頸五寸又名項士冠禮云緇布冠頍項是也蝤蠐爾雅云蝎蛣􅔒注木中蠧蟲又云蟦蠐螬注在糞土中又云蝤蠐蝎注在木中今雖通名為蝎所在異又云蝎桑蠧注即蛣􅔒方言云蠀螬謂之蟦自關而東謂之蝤蠀或謂之䖭蠾或謂之蝖􅕪梁益之間謂之蛒或謂之蝎或謂之蛭蛒秦晉之間謂之蠧或謂之天螻四方異語而通者也唐本草注云此蟲在腐柳樹中內外潔白土糞中者皮黃內黑黯陶隱居云大者如足大指以背行乃駛于腳雜猪蹄作羹與乳母不能别陳藏器云蠐螬居糞土中身短足長背有毛筋但從水入秋化為蟬蝎在朽木中食木心穿如錐刀一名蠧身長足短口黑無毛節慢至春羽化為天牛兩角狀如水牛色黑背有白點上下緣木飛騰不遙二蟲出處既殊形質又别蘇恭乃混其狀總名蠐螬乃千慮一失矣苻子云石生金木生蝎化書云燥濕相育不母而生埤雅云蝤蠐一名蛣􅔒佶屈曲貌以形舉也詩曰領如蝤蠐蓋蝤蠐之體有豐潔且白者故詩以况莊姜之領七辨曰蝤蠐之領阿那宜顧是也此即木中蠧蟲亦曰桑蠧故古者譛從中起謂之蝎譛按蟦蠐蝤蠐二物也蟦蠐一名螬亦名蠐螬一名􅀢齊一名齊莊子云烏足根所化淮南云黍成王充云化復育轉為蟬博物志云以背行駛便于用足者也蝤蠐一名蝎一名蠧一名桑蠧一名蛣􅔒生于桑栁柏及構木中諸腐木根下亦多有之本是二種陶隱居蘇恭俱混為一誤也蝎自是蝤蠐之異名非蠆尾之蝎也天螻爾雅云􅕪即螻蛄也揚子雲言蠐螬或謂天螻然則亦異物同名非爾雅之􅕪矣瓠犀爾雅云瓠犀瓣疏瓣瓠中瓣也一名瓠棲人之齒美者似之衛風云齒如瓠棲是也今詩文作犀埤雅云瓠狀要類于首尾類于要微鋭緣蔓而生風俗通云八月秋穰可以殺瓠取其色澤而堅今俗畜瓠之家不燒穰物類相感志云牛踏蔓上則苦以瓠盛酒冬即暖夏即冷雅翼云瓠匏之甘者古者王政瓜瓠果蓏殖于疆埸正月可種瓠六月可畜瓠作菑詩云斷壺瓠中白膚所謂張蒼肥白如瓠者可以飼豕致肥其瓣可以作燭致明其葉又可為菜詩所謂幡幡瓠葉也與匏以大小長短甘苦為間然古今亦通言惠子稱魏王貽我大瓠之種螓傳云螓首額廣而方爾雅蚻蜻蜻注如蟬而小方言云有文者謂之螓夏小正云鳴蚻虎懸埤雅云一種似蟬而小緑色北人謂之螓即詩所謂螓首蛾睂也方言云蟬其小者謂之麥蚻有文者謂之蜻蜻其䳄蜻謂之匹蛾爾雅云䖸羅注蠶蛾疏此即蠶蛹所變者也埤雅云繭生蛾蛾生卵博物志曰食桑者有緒而蛾蛾類者先孕而後交蓋蛹者蠶之所化蛾者蛹之所化荀子曰蛹以為母蛾以為父是也蛹一名螝蛾一名羅孫炎爾雅正義以為螝即是雄蛹即是雌羅即是雄蛾即是雌蛾似黃蝶而小其睂句曲如畫故詩以譬莊姜曰螓首蛾睂今一種善拂燈火夜飛謂之飛蛾一名慕光亦其類也睂釋名云睂媚也有嫵媚也元命包云天有攝提人有兩睂為人表候陽立于二故睂長二寸注云攝提兩星頰曲人睂似之黃庭經云睂號華蓋覆明珠明珠目也目釋名云目默也默而內識也元命包云目肝之使曲禮云凡視上于面則敖下于帶則憂傾則姦玉藻云目容端靈樞經岐伯曰五藏六府之精氣皆上注于目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼目者榮衛魂魄之所常營也神氣之所生也是故目者心使也國語單穆公云目之察度不過步武尺寸之間其察色也不過墨丈尋常之間富辰云目不别五色之章為昧論衡云人心慧而目多采人物志云徵神見貌則情發于目故仁目之精確然以端勇膽之精燁然以彊真誥云眼者身之鏡視多則鏡昏朱士冠禮注云凡染絳一入謂之縓再入謂之頳三入謂之纁朱則四入與朱子語類云蒨纁絳朱此紅之染數一入為蒨再入為纁三入為絳四入為朱幩說文云馬纒鑣扇汗也傳云人君以朱纒鑣扇汗且以為飾翟茀疏云婦人乘車不露見車之前後設障以自隱蔽謂之茀因以翟羽為之飾爾雅云輿革前謂之鞎後謂之茀竹前謂之禦後謂之蔽李巡云茀車後户名周禮云王后之五路重翟錫面朱總厭翟勒面繢總安車雕面鷖總皆有容蓋翟車貝面組總有握輦車組挽有翣羽蓋注詩曰翟蔽以朝謂諸侯夫人始采乘翟蔽之車以朝見于君盛之也此翟蔽蓋厭翟也然則王后始來乘重翟乎重翟重翟雉之羽也厭翟次其羽使相迫也勒面謂以如玉龍勒之韋為當面飾也鷖總者青黑色以繒為之總著兩耳與兩鑣朱總繢總其施之如鷖總車衡輨亦皆有焉重翟后從王祭祀厭翟從王賔饗諸侯安車無蔽后朝見于王所乘翟車后乘以出桑輦車后居宫中從容所乘禮書云三車取飾于翟者以其守死而不犯分披文以相質故也朝爾雅疏云鄭𤣥曰天子諸侯皆有三朝外朝一內朝二其天子外朝一者在皋門之內庫門之外大詢衆庶之朝也朝士掌之內朝二者正朝在路門外司士掌之燕朝在路門內大僕掌之諸侯之外朝一者在皋門內應門外內朝二者亦在路寢門之外內以正朝在應門內故謂應門為朝門也禮書云周官大僕掌燕朝之服位宰夫掌治朝之法司士掌朝儀之位朝士掌外朝之法文王世子公族朝于內朝庶子掌之其在外朝司士掌之玉藻朝服以日視朝于內朝邏適路寢聽政然則文王世子與玉藻所謂朝者諸侯之朝也蓋天子庫門之外外朝也朝士掌之路門之外治朝也宰夫司士掌之路寢燕朝也大僕掌之諸侯亦有路寢有外朝則文王世子所謂內朝者玉藻所謂內寢也玉藻所謂內朝者文王世子所謂外朝也玉藻于路寢之外言內朝則又有外朝明矣罛釋器云魚罟謂之罛注最大罟也今江東云鱣傳云鱣鯉也郭璞云鱣大魚似鱏而短鼻口在頷下體有邪行甲無鱗肉黃大者長二三丈今江東呼為黃魚陸璣云鱣鮪出江海三月中從河下頭來上鱣身形似龍鋭頭口在頷下背上腹下皆有甲縱廣四五尺今于盟津東石磧上釣取之大者千餘斤可蒸為􅌜又可為鮓魚子可為醬埤雅云鱣長鼻軟骨俗謂之玉板古今注云鯉之大者為鮪鱧之大者為鱣非是也案詩曰有鱣有鮪鰷鱨鰋鯉言鮪矣而又言鰋鯉則鮪與鯉異名矣雅翼云鱣大者為黃鱣鱣鮪之類雖食于水而不正食水淮南子曰鵜鶘飲水數斗而不足鱣鮪入口若露而死故鱣鮪不善游冬乃岫居入河而眩浮亦其驗也水經注云鱣鮪鯉也出鞏穴三月則上度龍門得度為龍矣否則點額而還顔氏家訓云鱣魚純灰色無文按釋魚云鯉鱣鰋鮎鱧鯇載六魚之名也非謂鯉一名鱣鰋一名鮎鱧一名鯇也舍人孫炎之徒皆誤讀爾雅毛傳及說文因釋鱣為鯉失之逺矣此二魚吳中所恆有形味逈然不同鮪說文云鮪鮥也爾雅云鮥鮛鮪郭云鮪鱣屬大者名王鮪小者名鮛鮪今宜都郡自京門以上江中通出鱏鱣之魚有一魚狀似鱣而小建平人呼鮥子即此魚也陸璣云鮪魚形似鱣而青黑頭小而尖似鐵兜鍪口亦在頷下其甲可以摩薑大者不過七八尺益州人謂之鱣鮪肉色白味不如鱣今東萊遼東人謂之尉魚或謂之仲明仲明者樂浪尉也溺死海中化為此魚又云河南鞏縣東北崖二山腹有穴舊說云此穴與江湖通鮪從此穴而來北入河西上龍門入漆沮故張衡賦云王鮪岫居山穴為岫謂此穴也埤雅云鮪長鼻體無鱗甲岫居至春始出而浮陽北入河西上龍門入漆沮見日而目眩故詩人言漆沮及河通道此魚禮曰龍以為畜故魚鮪不淰而序詩者亦曰季冬薦魚春獻鮪則鮪别于魚其來尚矣故鮪仲春從河西上得過龍門便化為龍否則點額而還水經曰鮪出鞏穴直穴有渚謂之鮪渚周禮春獻王鮪非時及他處則無雅翼云周洛曰鮪蜀曰䱎䲛天官漁人云春獻王鮪月令季春天子始乘舟薦鮪于寢廟夏小正云二月祭鮪鮪之至有時美物也鮪者魚之先至者也菼爾雅云蒹薕菼薍其萌虇又云菼騅也注菼草色如騅在青白之問廣雅云藡萑也說文云蒹雚之未秀者菼雚之初生一曰薍一曰隼薍菼也夏小正云雚未秀為菼葦未秀為蘆陸璣云薍或謂之荻至秋堅成則謂之萑初生三月中其心挺出下本大如箸上鋭而細揚州人謂之馬尾爾雅疏云葮一名蘆菼一名薍李巡曰分别葦類之異名郭云蘆葦也菼似葦而小實中江東呼為烏蓲如李巡云蘆薍共一草如郭云則蘆薍别草案詩大車傳云菼隼也蘆之初生則毛意以葮菼為一草衛風碩人云葮菼揭揭陸璣疏云云則蘆薍别草也埤雅云荻之初生為菼蒹其未秀者也字說云蘆謂之葮其小曰萑荻謂之蒹其小曰葦其始生曰菼又謂之薍荻彊而葮弱荻髙而葮下故謂之荻菼中赤始生末黑黑已而赤故謂之菼其根㫄行牽揉盤互其行無辨矣而又強焉故又謂之薍薍之始生常以無辨惟其強也乃能為亂按萑葦雖一類實二物也葦一名蘆其未秀者曰葮葮一名華一物四名萑一名荻其初生曰菼菼一名薍一名隼其未秀曰蒹蒹一名簾一物七名二者本相類但葦大萑小而于其中又有初生未秀既成之别耳故古今說者互有得失如字說所云尤為抵牾庶士毛云齊大夫送女者朱云謂媵臣按左傳云凡公女嫁于敵國則下卿送之于時齊衛為敵國則毛云送女者下卿也朱云媵臣媵者將送之名古者嫁女于諸侯必有媵臣伊尹為有革氏媵臣百里奚為秦穆公夫人媵于秦是也送女既卿不得言士卿止一人不得言庶朱義優矣六家詩名物疏卷十六
