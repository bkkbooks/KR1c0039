body:
  text: 六家詩名物疏卷二十五明馮復京撰國風秦一秦譜云秦者隴西谷名於禹貢近雍州鳥鼠之山周孝王封伯翳末孫非子為附庸邑之於秦谷至曽孫秦仲宣王命作大夫秦仲孫襄公平王初討西戎以救周平王東遷王城乃以岐豐之地賜之始列為諸侯遂横有周西宗周畿内八百里之地其封域東至迤山在荆岐終南惇物之野至𤣥孫德公又徙於雍云括地志秦州清水縣本名秦十三州志云秦亭秦谷元命包云東井鬼星散為雍州分為秦國詩含神霧云秦地處仲秋之位男懦弱女髙膫白色秀身音中商其言舌舉而仰聲清以揚按秦今陜西鞏昌府秦州境内有秦亭德公所徙之雍今鳯翔府鳯翔縣地車鄰篇白顚爾雅云的顙白顚舎人云的白也顙額也額有白毛今之戴星馬周易云震為的顙疏白額為的顙取動而見埤雅云覲禮奉束帛匹馬卓上九馬隨之說者以為卓即的顙故以為上列而九馬隨其後莊子曰齊之以月題蓋月題額上當顱如月者所以象顚之白然則馬之貴的顙可知矣馬政論云顙有白毛謂之的盧又曰凖上有旋毛及白毛者謂之的吻凶俗云的顱非也寺人周禮寺人王之正内五人掌王之内人及女宫之政令疏云諸侯寺人傳達君命范蔚宗云易曰天垂象聖人則之宦者四星在皇位之側故周禮置官亦備其數閽者守中門之禁寺人掌女宫之戒月令仲冬閹尹審門閭謹房室宦人之在王朝者其來舊矣將以其體非全氣情志專良通關中人易以役養乎楊用修云史年表書穆公學於宁人宁人寺人也此云寺人之令言君不接羣臣但使寺人傳令秦用閹宦非一日矣阪爾雅云陂者曰阪李巡曰謂髙峯山陂曹氏曰說文阪山脅也地理志隴西有隴坻在其西注隴阪也即今隴山三秦記其阪九囘欲上者七日乃越髙處東望秦川然則阪固秦所有也楊互見王風蒲爾雅云楊蒲柳埤雅云今有黄白青赤四種白楊葉圓青楊葉長赤楊霜降則葉赤材理亦赤黄楊木性堅緻難長俗云嵗長一寸閏年倒長一寸楊之孚甲早於衆木淮南子正月其木楊按楊柳本二種然相似而稱之易混爾雅云楊蒲栁即本草之水楊也崔正熊云葉似青楊青楊木出峽中為牀卧之無蚤又别一種非蒲栁也白楊株大葉圓如梨皮白多種墟墓間故古詩曰白楊多悲風蕭蕭愁殺人黄楊葉細難長俗云嵗長三寸遇閏則退一寸人家庭中多植以為玩赤楊霜降則葉及材理俱赤者又有栘楊所謂唐棣之華翩其反而者也蒲栁一種又有皮青皮紅之别亦名楊栁采薇詩云楊栁依依是也凡此皆楊之屬也本草栁華其葉狹長青緑枝條長軟者又有杞栁爾雅所謂旄澤栁也有赤檉木爾雅所謂河栁也凡此皆栁之屬也然蒲栁亦曰蒲楊栘楊亦曰栘栁河栁亦曰小楊大抵二名常混陳藏器云江東通名楊栁北人都不言楊楊樹葉短栁樹枝長朱傳云栁楊之下垂者楊栁之揚起者説文云栁小楊也欲知楊與栁之别者請以此三説參之駟驖篇驖傳云驖驪說文云驖馬赤黑色也月令孟冬駕驖驪注色如鐵埤雅云說文云馬深黑色驪馬赤黑色驖先儒云取其馬色如鐵非特有取於色蓋亦取其堅壯如驖故曰驖也月令孟冬乘鐵驪即此是也按驖依傳即驪依說文則二者有别辰牡周禮云獸人掌罟田獸辨其名物冬獻狼夏獻麋春秋獻獸物注狼膏聚麋膏散聚則温散則涼以救時之苦也獸物凡獸皆可獻也及狐狸拔疏云拔為矢末以鏃為首故拔為末釋名云矢末為括括㑹也言與弦㑹也括旁曰叉形似叉也太甲曰若虞機張徃省括於度則釋考工記矢人為矢夾其隂陽以設其比夾其比以設其羽鄭司農云比謂括也禮書云弓矢之括居藳兩旁弩矢之括居藳上下四馬箋云四種之馬周禮校人辨六馬之屬種馬戎馬齊馬道馬田馬駑馬天子十有二閑馬六種邦國六閑馬四種注諸侯有齊馬道馬田馬其駑馬則分為三輶車周禮田僕掌佐車之政設驅逆之車注驅驅禽使前趨獲逆御還之使不出圍賈公彦云按王制云大夫殺則止佐車佐車止則百姓田獵彼佐車則此驅逆之車也校人田獵帥驅逆之車按爾雅輶輕也夏官車僕掌輕車之萃鄭氏云輕車馳敵致師之車然田車以木戎車以革二輕車不同鸞箋云置鸞於鑣異於乘車疏云乘車金玉象也夏官太馭及玉藻經解之注皆云鸞在衡和在軾謂乘車之鸞也此云鸞鑣則鸞在於鑣異於乘車也周禮大馭凡御路儀以鸞和為節玉藻云君子在車則聞鸞和之聲行則鳴佩玉是以非辟之心無自入也明堂位云鸞車有虞氏之路也注鸞有鸞和也少儀云鸞和之美肅肅雝雝韓詩内傳云鸞在衡和在軾前升車則馬動馬動則鸞鳴鸞鳴則和應禽經注云周之文物大備法車之上綴以大鈴如鸞之聲陸農師云說文曰鸞赤神靈之精也赤色五采鷄形鳴中五音頌聲作則至一曰青鳯為鸞鸞雌曰和雄曰鸞乘車和在衡鸞在軾而輶車置鸞于鑣驅逆之車尚輕疾故也當上古時鸞輿愼動此鳥輒集車上雄鳴于前雌應于後後世不能致作和鸞以象之因謂之鸞仗按鸞瑞鳥也淮南子云羽嘉生飛龍飛龍生鳯凰鳯凰生鸞鳥其始生似鳯乆則五采變易故字從變省其音如鈴巒巒然故曰鸞也山海經云女牀之山有鳥其狀如翟而五采文名曰鸞鳥見則天下安寧詩含神霧云德化充塞照潤八㝠則鸞臻春秋運斗樞云天樞得鸞鳥集孔演圖云天子官守以賢舉則鸞在野元命包云火離為鸞援神契云德至鳥獸則鸞鳥舞崑崙圖云鸞鳥似鳯而白纓聞樂則蹈舞而至其雌曰和禽經云鸞一名雞趣首翼赤曰丹鳯青曰羽翔白曰化翼𤣥曰隂翥黄曰土符瑞應圖云鸞鳥鳳凰之佐鳴中五音肅肅雝雝喜則鳴舞人君行步有容進退有度祭祀有禮親疎有序則至一云心識鍾律鍾律調則至至則鳴舞以和之說其形者雖不同大都似鳯五采此鳥善鳴師曠故言鸞鳴噰噰鳯鳴喈喈山海經言鸞鳥自歌鳯鳥自舞也禮云鸞車有虞氏之路意者有虞之世鸞鳥適至故作為鸞和以象其聲而後世因之鄭注禮記云鸞和皆鈴也則鸞特鈴而已乃蔡伯喈崔正熊俱謂乘輿之鸞以金為鸞鳥懸鈴其中施于衡上此自漢制非古也乘車鸞在衡和在軾或者如禽經注云綴以大鈴不必有八鸞即漢制亦止為一鸞鳥銜鈴耳左傳疏謂詩詞每言八鸞當謂馬有二鸞鸞若在衡衡唯兩馬安得置八此說未為無見即如仲山甫徂齊為卿士之車烈祖諸侯助祭所乘金路而俱有八鸞者其義何居故蓼蕭傳云在軾曰和在鑣曰鸞鄭注商頌亦依而用之則不能自守其說矣杜元凱注左傳亦曰鸞在鑣和在衡也鑣詳見邶風轡說文云鑣馬衘也羅氏云鑣亦名扇汗又曰排沫爾雅謂之钀獫爾雅云長喙獫說文獫長喙犬一曰黑犬黄顄歇驕爾雅云短喙猲獢小戎篇小戎疏云戎車小大應同而謂之小戎者六月云元戎十乘以先啓行元大也先啓行之車謂之大戎從後行者謂之小戎故箋云羣臣之兵車言羣臣在元戎之後也禮書云周禮車僕掌戎車之萃廣車之萃革車之萃輕車之萃戎路即革路也君之所乘周鋒車曰元戎秦兵車曰小戎則自廣車以下皆戎車也特不謂之戎路爾車僕凡師共革車㑹同亦如之戎僕掌馭戎車凡巡狩及兵車之㑹亦如之㑹同巡狩王雖不乘戎車猶共以從不失備也董氏云六月言元戎十乘此天子之車也故夏鈎車殷寅車周元戎然則諸侯之戎車謂之小戎宜也収疏云軫車之前後兩端横木所以収斂所載故名収焉兵車言淺軫者對大車平地任載之車為淺也兵車當輿之内從前軫至後軫惟深四尺四寸大車前軫至後軫其深八尺兵車之軫比之為淺考工記云軫方以象地也輿人為車輪崇車廣衡長參如一參分車廣去一以為隧六分其廣以一為之軫圍注隧車輿深也兵車之隧四尺四寸軫輿後横者也兵車之軫圍尺一寸方言曰軫謂之枕禮書云軫一曰収一曰車枕輿後横木也軫圍尺一寸其厚與轐共七寸其長六尺輿人謂輿為車輪人以軫名輿則輿可謂之車亦可謂之軫故鄭氏謂軫輿後横木又謂軫輿也輈人以軫方對蓋圓則方軫方輿也秦詩以淺収為淺軫則淺軫淺輿也孔穎達謂車前後横木皆曰軫自後軫至前軫淺于乘車故曰俴然考之于禮車前有軓有隂而已不聞其有軫也說文亦曰軫輿後横木按軫輿後横木也所謂俴収者淺輿也兵車之隧僅四尺四寸大車牝服八尺則箱方而深矣故曰俴収孔氏之意本不爽但不當謂車前有軫耳梁爾雅楣謂之梁注門戸上横梁又云杗廇謂之梁注屋大梁也輈釋名云輈句也轅上句也轅援也車之大援也詩緝云輈者轅也衡者服馬之軛也轅直一木從後軫至前軫稍曲而上以便服馬之進退至衡則駕於衡之上而嚮下鈎之衡居於輈下而輈形穹隆上曲如屋之梁謂之梁輈懼輈之不堅一輈之上五分其穹每處以皮革束之考工記輈人為輈國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸輈欲頎典欲弧而無折經而無絶進則與馬謀退則與人謀終日馳騁左不楗行數千里馬不契需終嵗御衣衽不敝此惟輈之和也勸登馬力馬力既竭輈猶能一取焉良輈環灂自伏兔不至軓七寸軓中有灂謂之國輈又云車人為車凡為轅三其輪崇參分其長二在前一在後以鑿其鈎徹廣六寸鬲長六寸此謂大車也禮書云三等之馬各下其輈七寸則七寸為衡頸之間也輈之身軓前十尺隧四尺四寸則丈四尺四寸也前為頸後為踵頸以持衡踵以承軫近踵以當兔當兔之圍尺四寸有竒頸圍九寸有竒踵圍七寸有竒大其兔以稱任正小其頸以便馬不大不小以當軫然後固也大車兩轅轅二丈七尺栢車轅一丈八尺後漢輿服志云聖人觀于天視斗周旋魁方杓曲以攜龍角為帝車於是乃曲其輈游環孔氐曰以環貫靷游在服馬背上驂馬之外轡貫之游移無定處驂馬欲出此環牽之所以御出也脅驅孔氏曰以一條皮上繫於衡後繫於軫當服馬之脅愛慎乘駕之具也驂馬欲入則此皮約之所以止入也釋名云脅驅在服馬外脅也隂傳云隂揜􅓶也箋云揜􅓶在軾前垂輈上釋名云隂䕃也横側車前以隂笒也詩緝云以板横側置車之前及左右三面以隂映車􅓶故謂之隂靷釋名云靷所以引車也疏云靷者以皮為之繫於隂板之上令驂馬引之車衡之長六尺六寸止容二服驂馬頸不當衡别為二靷以引車左傳郵無恤云兩靷將絶吾能止之是横􅓶之前别有驂馬二靷也朱傳云以皮二條前繫驂馬之頸後繫隂板之上鋈續釋名云鋈沃也冶白金以沃灌靷環也續續靷端也疏云金銀銅鐵緫名為金此兵車之飾未必皆白銀也靷言鋈續則是作環相接故箋云白金飾續靷之環文茵釋名云文車中所坐者也用虎皮有文采因與下輿相連著也疏云茵者車上之褥轂說文云轂輻所輳也釋名云轂埆也體堅埆也朱傳云轂者車輪之中外持輻内受軸者也考工記云轂也者以為利轉也望其轂欲其眼也眼出大貌進而視之欲其幬之廉也凡斬轂之道必矩其隂陽陽也者縝理而堅隂也者疏理而柔是故以火養其隂而齊諸其陽則轂雖敝不藃椁其漆内而中詘之以為之轂長以其長為之圍以其圍之阞三分之一捎除也其藪五分其轂之長去一以為賢去三以為軹容轂必直陳篆必正施膠必厚施筋必數幬必負幹既摩革色青白謂之轂之善參分其轂長二在外一在内以置其輻車人為車轂長半柯其圍一柯有半行澤者欲短轂行山者欲長轂短轂則利長轂則安柏車轂長一柯其圍二柯禮書云轂長三丈二寸圍徑一尺三分寸之二三分轂長以置輻其穿大者謂之賢小者謂之軹其當輻菑者謂之藪藪亦謂之壺中賢向内軹向外皆金為之轂之飾施膠筋漆而采以約之謂之篆詩所謂約軧是也革以幔之謂之幬所謂幬必負幹是也孔氏云兵車轂長三尺二寸大車轂長尺半兵車之轂比之為長故謂之長轂騏䮐傳云蒼騏曰騏疏騏者黑色之名蒼騏曰騏謂青而㣲黑今之騘馬也說文曰馬青驪文如博棊馵爾雅云膝上皆白惟馵又云後右足白驤左白馵埤雅云易曰震為馵足蓋取其躁以躁故二絆其足作足言縱之而動也馵足言制之而動也詩曰駕我騏馵王肅謂駕兩馬者古者士駕二馬政論云後足偏白者凶若馵之類是也此士之所以駕與板屋傳云西戎板屋地里志云天水隴西山多林木民以板為屋故秦詩曰在其板屋史記云犬戎攻殺周幽王遂取周之焦穫居涇渭之間秦襄公救周伐戎至岐始列為諸侯秦穆公得由余西戎八國服於秦故自隴以西有綿諸緄戎翟䝠之戎岐梁山涇漆之北有義渠大荔烏氏胊衍之戎駵箋云赤身黑鬛曰駵雅翼云古者駵非所貴故淮南子曰旁光不升俎駵駁不入牲字林云駵赤馬黑髦尾也騧爾雅云黑喙騧注今之淺黄色者為騧馬說文云騧黄馬黑喙龍大戴禮曰鱗蟲三百六十而龍為之長禮運曰龍以為畜故魚鼈不淰元命包云龍之言萌也隂中之陽故言龍舉而雲興廣雅云有鱗曰蛟龍有翼曰應龍有角曰􅬔龍無角曰龍龍能髙能下能小能巨能幽能明能短能長淵深是潜敷和其光說文云龍春分而登天秋分而潜淵管子云龍被五色而游故神欲小則化如蠶蠋欲大則極于天下欲上則淩于雲氣欲沈則入于深泉變化無日上下無時謂之神淮南子云蛟龍剖卵于陵其雄鳴上風雌鳴下風而化者形精之至也人不見龍之飛舉而能髙者風雨奉之也又云羽嘉生飛龍毛犢生應龍介鱗生蛟龍介潭生先龍論衡云短書言龍無尺木不能升天謂龍從木中升天也抱朴子曰有自然之龍有虵蠋化成之龍隂陽自然變化論云驪龍之眸見百里纎芥又云龍能變水人能變火龍不見石魚不見水雅翼云王符稱世俗畫龍馬首虵尾將雨則吟其聲如戛銅盤涎能發衆香其嘘氣成雲反因雲蔽身故不可見龍火與人火相反得濕而熖遇水而燔以火逐之則燔息而熖滅埤雅云龍八十一鱗具九九之數九陽也南部新書云龍性麄猛畏蠟愛竹及空青而嗜燒燕食燕肉人不可渡海說原云龍有三停九似之說謂自首至膞膞至腰腰至尾皆相停也角似鹿頭似駝眼似鬼項似虵腹似蜃鱗似魚爪似鷹掌似虎耳似牛觼疏云以白金飾皮為觼以納物也說文云環之有舌者徐鍇云觼以其環形似觼軜說文云驂馬内轡繫軾前者疏云驂馬欲入則偪於脅驅内轡不須牽挽故知軜者納驂内轡繫於軾前其繫之處以白金為觼也邑說文云國也從口先王之制尊卑有大小從卪釋名邑人聚㑹之稱俴駟箋云俴淺也謂以薄金為介之札韓詩云駟馬不著甲曰俴駟厹矛傳云厹三隅矛也釋名云仇矛頭有三义言可以討仇敵之矛也書曰二人執惠一人執鋭孔安國云惠三隅矛銳矛屬錞曲禮云進戈者前其鐏後其刃進矛㦸者前其鐓後其銳注銳底曰鐏取其鐏地平底曰鐓取其鐓地伐疏云櫓是大盾伐為中干干伐皆盾之别名鏤膺疏云膺胷也膺上有鏤是以金飾馬帶若今之婁胷用金為飾取其堅牢先鄭周禮注云纓當胷喪禮下篇曰馬纓三就禮家説曰纓當胷以削革為之三就三重三匝也閉儀禮注云䪐弓檠也弛則縛之于弓裏備損傷也以竹為之詩云竹閉緄縢考工記云凡為弓寒奠體則張不流注至冬膠堅内之檠中定徃來體流猶移也又云恒角而達譬如終紲注紲謂弓䪐禮書云䪐以竹為之狀如弓然約于弓裏命之曰閉所以備損傷也䪐以閉之故亦謂之閉緄以繋之故亦謂之紲如此則納之韣中足以定徃來之體祛翩反之病矣緄詳見緡傳云緄繩也六家詩名物疏卷二十五
