body:
  text: 六家詩名物疏卷二十二明馮復京撰國風齊雞鳴篇蒼蠅爾雅云蠅醜扇疏青蠅之類好搖翅自扇方言云蠅東齊謂之羊埤雅云蠅好交其前足有絞繩之象故繩字從蠅省亦好交後足搖翅自扇段氏云蒼蠅聲雄壯青蠅聲清聒其聲皆在翼蓋蒼蠅善亂聲故詩曰匪雞則鳴蒼蠅之聲也蒼蠅尤大肌色正蒼今俗謂之麻蠅蠅逐臭者喜暖惡寒值水溺死置灰中須臾即活淮南子以為爛灰生蠅正謂此也雅翼云蒼蠅蠅之潔者小於青蠅其色蒼好集几案食飲上韓子云以骨去蟻蟻愈多以魚驅蠅蠅愈至張敞書云蒼蠅之飛不過十步託於騏驥之髮則至千里按青蠅即能變白黑者蒼蠅其小者也陸農師謂大于青蠅非是又有一種大麻蠅酉陽襟爼以為茅根所化蟲疏云鳥亦稱蟲此蟲飛薨薨未必惟小蟲也爾雅云有足謂之蟲無足謂之豸疏此對文耳散言則無足亦曰蟲周禮云外骨龜屬內骨蟞屬郤行蚓蚓屬仄行蟹屬連行魚屬紆行蛇屬以脰鳴者蛙黽屬以注鳴者精列屬以旁鳴者蜩霓屬以翼鳴者發皇屬以股鳴者蚣蝑屬以胸鳴者榮螈屬謂之小蟲之屬大戴記云毛蟲之精者曰麟羽蟲之精者曰鳯介蟲之精者曰龜鱗蟲之精者曰龍倮蟲之精者曰聖人禮記曰孟春之月蟄蟲始振仲春之月蟄蟲咸動仲秋之月蟄蟲壞户季秋之月蟄蟲咸俯在內皆墐其户春秋考異郵曰二九十八主風精為蟲八日而化風列波激故其命字以蟲蟲之為言屈申也還篇峱地里志臨淄名營丘故齊詩曰子之營兮遭我乎嶩之間師古曰齊國風營詩之辭也毛詩作還齊詩作營嶩山名也字或作峱或作言往適營丘而相逢于嶩山也按水經注臨淄城中有丘淄水出其前經其左故有營丘之名釋丘云水出其左營丘今營丘城在山東青州府昌樂縣東南五十里峱山在臨淄縣南一十五里又崔靈恩集注以還茂昌三者皆地名今不知何所肩傳云獸三歲曰肩詩緝云亦作豜鄭司農周禮注云一歲為豵二歲為豝三歲為特四歲為肩五歲為愼毛七月傳云豕一歲曰豵三歲曰豜疏云箋云豕生三月豵既易傳不以豵為一歲之名則豜亦非三歲之稱釋獸釋鹿與麕皆云絶有力麉箋意蓋以麉為鹿麕有力者也狼爾雅云狼牡貛牝狼其子獥絶有力迅陸疏云其鳴能小能大善為小兒啼聲以誘人去數十步其猛健者雖善用兵者不能免也其膏可煎和皮可為裘故禮記狼臅膏又曰君之右虎裘厥左狼裘是也毛詩草蟲經云老狼項下有袋求食滿腹向前行乃觸之退後又自踏踐上疐其尾進退有患故詩以況跋前疐後酉陽雜爼云狼大如狗蒼色作聲諸竅皆沸䏶中筋大如鴨卵有犯盜者薰之當令手攣縮或言狼筋如織絡狼煙直上烽火用之瑞應圖曰白狼王者仁德明哲則見一云王者進退動準法度則見埤雅云里語狼卜食將遠逐食必先倒立以卜所向狼駢脅腸直其糞煙直為是故也雅翼云狼聚物不整故稱狼籍猛而敏給能自顧其後淮南子云鴟視而狼顧鳥雄鷙于雌獸牝猛于牡是以羆為熊之牝而羆猛于熊狼為貛之牝而狼名獨著虎猛者稱乳虎蓋其類也左傳云狼子野心朱傳云狼似犬鋭頭白頰髙前廣後著篇著傳云門屏之間曰著爾雅云門屏之間謂之寧疏云路門之外屏樹之內人君視朝寧立之處因名為寧李巡云正門內兩孰間曰寧曲禮云天子當寧而立是也孔疏云著與寧音義同禮書云門屏之間謂之寧大夫以簾士以帷則無屏矣詩曰俟我於著而大夫士與焉者蓋簾帷之為蔽限亦謂之屏按漢書地里志俟我於著乎而注著地名濟南郡著縣水經注漯水東北徑著縣故城南則又非門寧之寧明矣寧與著字義各别他處未有相通者瓊華瓊瑩瓊英傳云瓊華美石士之服也瓊瑩石似玉卿大夫之服也瓊英美石似玉者人君之服也疏云瓊瑩俱玉石名也英華是玉光色按朱子云古者五等之爵朝會祭祀皆以充耳不知此詩是説何人傳分三章為士為卿大夫為人居鄭以為三章共述人臣親迎之禮俱無所據東方之日篇闥説文闥門也韓詩説云門屏之間曰闥東方未明篇柳説文柳小楊也朱傳云楊之下垂者本草云柳華一名柳絮唐本注云柳與水楊全不相似水楊葉圓闊而赤枝條短硬柳葉狹長青緑枝條長軟陶云柳即水楊非也青史子云柳南方之草夏木也管子云五沃之土宜柳夏小正云正月柳稊稊發孚也埤雅云柳柔脆易生之木與楊同類雖縱橫顚倒植之皆生通志云柳曰天棘南人呼為楊柳古今合璧云樹髙二三丈許裊娜枝條葉細而長者曰柳樹低枝立葉小者曰楊楊花入水經宿化為浮萍柳花漫空如雪樊爾雅云樊藩孫炎曰圃之藩也郭璞曰謂藩蘺也圃説文云種菜曰圃周禮太宰九職二曰園圃育草木注樹果蓏曰圃場人掌國之場圃而樹之果蓏珍異之物以時斂而藏之凡祭祀賓客共其果蓏享亦如之閭師任圃以樹事貢草木辰傳云時也説文云震也三月陽氣動雷電振民農時也物皆生從乙匕象芒達廠聲也房星天時也從二二古文上字徐鍇曰七音化乙草木萌初出曲卷也徐鉉等曰三月陽氣盛草木生上徹於土故從上廠非聲疑亦象物之出按不能辰夜之辰今朱傳誤作晨朱子釋詩時齊魯韓三詩俱亡雖有附見他籍者皆不依用則所從惟毛傳耳而字畫多訛或傳寫之謬也他如終然允臧之然作焉羊牛下括作牛羊求爾新特之爾作我胡然厲矣之然作為家伯維宰之維作冢小旻抑二如彼泉流作流泉朔月辛卯之月作日爰其適歸之爰作奚天降滔德之滔作慆降豫卿士之豫作于俱是顚倒錯誤今人不讀注疏訛以傳訛俱不能辨莫説文云日旦冥也從日在茻中南山篇南山傳云齊南山魯譜云魯者少昊摰之墟也在周公歸政成王封其元子伯禽于魯封域在禹貢徐州大野蒙羽之野朱傳云今襲慶東平府沂密海等州即其地地里志兖州曲阜縣外城即伯禽所築古魯城郡縣志曲阜在縣治魯城中委曲長七八里世本云周公居少昊之墟煬公徙魯元命包云天弓星主弓弩流為徐州别為魯國按襲慶府今為山東兖州府東平府今為州與沂州並屬兖州府密州今萊州府髙密縣海州今登州府寧海州魯城在曲阜縣西二里神農氏自陳徙居魯帝王世紀曰黃帝生于夀丘在魯東門之北至春秋時魯國都其城魯道水經注汶水南徑巨平縣故城東西南流城東有魯道詩所謂魯道有蕩今汶上夾水有文薑臺汶水西南流詩云汶水滔滔按漢巨平縣在今兖州府寧陽縣境屨周禮屨人掌王及后之服屨為赤舄黑舄赤繶黃繶青句素屨葛屨辨外內命夫命婦之命屨功屨散屨凡四時之祭祀以宜服之鄭康成曰復下曰舄襌下曰屨有絇有繶有純者飾也凡屨舄各象裳之色凡舄飾如繢之次屨之飾如繡次絇謂之拘著舄屨之頭以為行戒繶縫中紃純緣也散屨謂去飾士冠禮夏用葛玄端黑屨青絇繶純純博寸素積白屨以魁柎之緇絇繶純純博寸爵辨纁屨黑絇繶純純博寸冬皮屨可也不屨繐屨士喪禮夏葛屨冬白屨皆緇絇繶純組綦結于踵士相見禮若君賜之爵升席祭卒爵退坐取屨隱辟而後屨鄉飲酒禮司正請坐于賔賔主人介衆賔皆降説屨揖讓升坐鄉飲大射倣此燕禮賔及卿大夫皆説屨升就席喪服斬衰菅屨繩屨疏衰疏屨不杖麻屨士虞禮曰尸坐不説屨曲禮曰毋踐屨侍坐于長者屨不上堂解屨不敢當階就屨跪而屨之屏于側鄉長者而屨跪而遷屨俯而納屨大夫士去國鞮屨內則云屨著綦玉藻云坐左納右坐右納左喪服小記曰練繩屨少儀曰排闔説屨于户內者一人而已矣有尊長在則否凡祭于室中堂上無跣燕則有之國家靡敝君子不履絲屨莊子云履方屨者知地形世本云於則作屝履注於則黃帝臣草曰屝麻曰履方言云屝屨粗履也徐兖之郊謂之屝自關而西謂之屨中有木者謂之復舄襌者謂之鞮絲作之者謂之履麻作之者謂之不借曹氏云屨人注有纁屨黃屨白屨黑屨散屨所謂五兩者纁黃白黑散也釋名云屨拘也所以拘足也詩疏云夏日之有葛屨特為便于時耳非行禮之服若行禮之服雖夏猶當用皮鄭于周禮注及志言朝祭履舄各從其裳之色明其不用葛也冠説文云冠絭也所以絭髮辨冕之總名也檀弓云古者冠縮縫今也衡縫故喪冠之反吉非古也郊特牲云野夫黃冠黃冠草服也始冠之緇布之冠也太古冠布齊其緇之委貌周道也章甫殷道也毋追夏后氏之道也玉藻玄冠朱組纓天子之冠也緇布冠繢緌諸矦之冠也玄冠丹組纓諸矦之齋冠也玄冠綦組纓士之齋冠也縞冠玄武子姓之冠也縞冠素紕既祥之冠也垂緌五寸惰遊之士也玄冠縞武不齒之服也居冠屬武董巴輿服志云上古穴居野處衣毛而冒皮後代聖人易之見鳥獸有冠角􅏋胡之制遂作冠冕纓緌以為首飾莊子云戴圜冠者知天時春秋繁露云冠之在首玄武之象也玄武貌之最嚴威者象在後反居首武至而不用矣禮書云古之冠其飾不過纓武緣其名不過毋追章甫委貌而已大抵吉冠左辟喪冠右辟吉冠內畢喪冠外畢吉冠圜喪冠厭吉冠玄喪冠素吉冠不條屬喪冠條屬吉冠緌喪冠不緌吉冠緣喪冠不緣居冠屬武非居冠不屬武此其略也緌説文云系冠纓也內則云子事父母冠緌纓玉藻云居冠屬武自天子下達有事然後緌大帛不緌玄冠紫緌自魯桓公始也又云大白冠緇布之冠皆不㽔委武玄縞而后㽔禮書云冠系有纓其垂有緌喪冠不緌則凡吉冠皆緌矣羅氏云二組屬于笄順頭而下結之謂之纓纓之垂者謂之緌斧釋名云斧甫也甫始也凡將制器始用斧伐木已乃制之也考工記五分其金而錫居一謂之斧斤之齊春秋元命包云斧鑕主亂行斬狂詐斧之為言補也古今事物類考云神農作斤斧破斧傳云隋銎曰斧尉繚子云坐之兵劔斧立之兵戟弩甫田篇莠孔疏云仲虺之誥曰若苗之有莠若粟之有粃粃似粟莠似苗也國語云馬餼不過狼莠韋昭注云似稷而無實韋昭問答云甫田維莠今何草答曰今之狗尾也月令云孟春行秋令藜莠蒿萊並興戰國䇿云幽莠之秀也似禾雅翼云莠者害稼之草今之狗尾草也似稷而不結實無處不生莠既惡物故言之不美者謂之莠言辨韋辨爵辨士冠禮爵辨服纁裳純衣緇帶韎韐皮辨服素積緇帶素韠注爵辨服此與君祭之服爵辨者冕之次其色赤而微黑如爵頭然或謂之緅其布三十升純衣絲衣也餘衣皆用布惟冕與爵辨服用絲耳皮辨服此與居視朔之服也以白鹿皮為冠以素為裳辟蹙其要中衣用布亦十五升其色象焉後漢輿服志云爵辨一名冕廣八寸長尺二寸如爵形前小後大繒其上似爵頭色有收持笄所謂夏收殷冔者也禮書云周禮有韋辨無爵辨書與冠禮禮記有爵辨無韋辨士之服止于爵辨而荀卿曰士韋辨孔安國曰雀韋辨也劉熙釋名亦曰以爵韋為之謂之韋辨則爵辨即韋辨耳觀辨師司服韋辨先於皮辨書爵辨先於綦辨孔安國曰綦辨皮辨也士冠禮次加皮辨三加爵辨而以爵辨為尊聘禮主卿贊禮服皮辨及歸饔餼服韋辨而以韋為敬則皮辨之上非韋辨則爵辨耳此所以疑其為一物也士冠禮爵辨服昏禮主人爵辨纁裳緇袘檀弓天子哭諸侯爵辨䊷衣書二人爵辨執惠雜記復諸侯爵辨服子羔之襲爵辨一釁廟祝宗人宰夫雍人皆爵辨純衣則爵辨雖士之祭服而天子諸侯大夫皆服之鄭氏謂冕之次制如冕但無繅耳其布三十升然古文辨象形則其制上鋭若合手然非如冕也韋其質也爵其色也筓紘玉飾各以其等為之如皮辨制按陳氏疑爵辨為韋辨其説或是也韋辨有二兵事之韋辨服以韎韋為辨又以為衣裳聘禮卿歸饔餼之韋辨服韎布為衣而素裳然則與士爵辨纁裳純衣異矣豈卿大夫士之爵辨服殊其衣裳不若皮辨服之共素衣素積與抑爵韋固非一物也盧令篇盧傳云盧田犬戰國䇿云韓國盧天下之駿犬也環疏云環在犬之頷下重環謂大環貫一小環也鋂説文云大瑣也一環貫二者梁寅云重環者環之中又貫一環所謂子母環也重鋂者環之中又貫二環也敝笱篇鰥毛云鰥大魚孔叢子云衛人釣于河得鰥魚焉其大盈車子思問曰如何得之對曰吾下釣垂一魴之餌鰥過而不視又以豚之半鰥則吞矣鄭云鰥魚子爾雅云鯤魚子疏引此詩其魚魴鰥云鯤鰥字異古字通用魯語里革云魚禁鯤鮞鳥翼鷇卵蕃庶物也按毛以鰥為大魚次章釋魴鱮亦云大魚則鰥特魴鱮之類耳非必大至于盈車也盈車即鰥之尤大者如今鱮亦有小有大鄭氏蓋以盈車之魚必非笱之所制故以魚子易之殊不知魚子尚未成魚何云制以笱邪莊子王子年云鯤大不知幾千里長千尺此又荒唐不可稽矣鱮箋云鱮似魴而弱鱗陸疏云鱮似魴厚而頭大魚之不美者故里語曰網魚得鱮不如啖茹其頭尤大而肥者徐州人謂之鰱或謂之鱅幽州人謂之梟或謂之胡鱅埤雅云鱮色白北土皆呼白鱮西征賦云華魴躍鱗素鱮揚鬐性亦旅行故其制字從與失水則死弱魚也今吳越呼鱅鰱魚六韜曰緡隆餌重則嘉魚食之緡調餌芳則庸魚食之鱅庸魚也故其字從庸雅翼云魚雖一類所食不同今鯇惟食草鱒食螺蚌鱮乃食鯇矢宜其味之不美嚴氏曰今鱅鰱相似而小别鰱頭小鱅頭大載驅篇簟茀傳云簟方文席也爾雅云輿革前謂之鞎後謂之茀李巡曰輿革前謂輿前以革為車飾曰鞎茀車後户名也郭璞曰鞎以韋靶車軾也茀以韋靶後户也又云竹前謂之禦後謂之蔽李巡曰竹前謂編竹當車前以擁蔽名之曰禦禦止也孫炎曰禦以竹簟為車飾也郭璞曰蔽以簟衣後户也鞹説文云鞹革也又曰獸皮治去其毛曰革傳云諸矦之路車有朱革之質而羽飾驪駉傳云純黑曰驪月令孟冬云駕鐵驪檀弓云夏后氏尚黑戎事乘驪説文云驪馬深黑色汶水淮南子云汶出弗其流合于濟注弗其山在北海朱虛縣東禹貢云浮于汶達于泲水經云汶水出泰山萊蕪縣原山西南過壽張又西南入于濟許叔重云出琅邪朱虛東泰山東入濰朱傳云在齊南魯北二國之境曹氏云汶水有二出萊蕪縣原山入濟者徐州之汶也出朱虛泰山北又東北入濰者青州之汶也按一統志萊蕪縣今屬山東濟南府有汶河云其源有三一發泰山之旁仙臺嶺一發萊蕪縣原山之陽一發萊蕪縣寨子村至泰安州靜封鎮合焉名曰塹汶西南流與徂徠山之陽小汶河合又西南流注洸河入濟此徐汶也朱虛故城在今青州府臨朐縣境有汶水云源出沂山東麓流經本縣東南六十里入安丘縣界安丘亦屬青州此靑汶也猗嗟篇揚傳云揚廣揚疏云揚是顙之别名顙貴闊故言廣揚名爾雅云目上為名孫炎曰目上平博郭璞曰眉眼之間楊用修云名玉篇引此句作䫤眉目之間也字從冥言流盼使人冥迷侯尚書云侯以明之周禮司裘云王大射則共虎侯熊侯豹侯設其鵠諸矦則共熊矦豹矦卿大夫則共麋矦皆設其鵠射人以射法治射儀王以六耦射三矦樂以騶虞九節五正諸矦以四耦射二矦樂以貍首七節三正孤卿大夫以三耦射一矦樂以采蘋五節二正士以三耦射犴矦樂以采繁五節二正若王大射則以貍步張三矦祭矦則為位梓人為矦廣與崇方參分其廣而鵠居一焉上兩個與其身三下兩個半之上綱與下綱出舌尋縜寸焉張皮矦而棲鵠則春以功張五采之矦則逺國屬張獸矦則王以息燕鄉射記云凡矦天子熊矦白質諸矦麋矦赤質大夫布矦畫以虎豹士布矦畫以鹿豕凡畫者丹質又云鄉矦上個五尋中十尺矦道五十弓弓二寸以為矦中倍中以為躬倍躬以為左右舌下舌半上舌大射云司馬命量人量矦道以貍步大矦九十參七十干五十遂命量人巾車張三矦大矦之崇見鵠于參參見鵠于干干不及地武鄭注周禮云所射正謂之矦者天子中之則能服諸矦諸矦以下中之則得為諸矦孔氏云燕射自天子至士皆一矦鄉射賔射當張采矦二正天子諸矦大射張三矦禮書云周官司裘所共之矦大射之侯也梓人所謂張皮矦而棲鵠也射人治射儀之矦正賔射之侯也梓人所謂張五采之矦也鄉射記熊矦白質以下燕射之侯也梓人所謂張獸矦以息燕也大射之矦用虎熊豹麋之皮飾其側而中又制皮以為鵠賔射之侯亦虎熊豹麇之皮飾其側而中畫五色以為正燕射之侯則畫熊麋虎豹鹿豕之形以象鵠此三射之别也然司裘諸矦熊矦豹矦則畿內諸矦大射之禮也畿外諸矦大矦參矦干矦大射禮量人張三矦是也正鄭射人注云考工梓人職曰張五采之矦則逺國屬遠國謂諸矦來朝者也五采之矦即五正之矦也正之言正也射者內志正則能中焉畫五采之矦中朱次白次蒼次黃玄居外三正損玄黃二正去白蒼而畫以朱緑其外之廣皆居矦中參分之一中二尺今儒家云四尺曰正二尺曰鵠鵠乃用皮其大如正此説失之矣大射注云正者正也亦鳥名齊魯之間名題肩為正正鳥之捷黠者射之難中以中為雋故射取名焉詩正義云正者侯中所射之處大射則張皮侯而設鵠賔射則張布侯而畫正正大如鵠三分侯廣而正居一焉侯身長一丈八尺者正方六尺侯身一丈四尺者正方四尺六寸大半寸侯身一丈者正方三尺三寸少半寸正以采畫為之畫五正之侯者中央之采方二尺以外凖其采之多少正之廣狹均布之以至于外畔也禮書云大射有鵠猶賔射之有正也賔射有皮猶大射之飾其側也大射側中皆皮故曰皮矦賔射側皮而中五采故曰五采之矦甥爾雅云男子謂姊妹之子為出謂我舅者吾謂之甥也疏甥猶生也取相親之意矢周禮司弓矢掌八矢之法枉矢潔矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恆矢庳矢用諸散射注枉殺矰恆弓所用也潔鍭茀庳弩所用也冶氏為殺矢刃長寸圍寸鋌十之重三垸矢人為矢矢參分茀矢注茀當為殺參分一在前二在後兵矢田矢五分注謂枉矢潔矢二在前三在後殺矢注殺當為茀七分三在前二在後參分其長而殺其一五分其長而羽其一以其笴厚為之羽深水之以辨其隂陽夾其隂陽以設其比夾其比以設其羽參分其羽以設其刃則雖有疾風亦弗之能憚矣世本云夷牟作矢荀子云浮遊作矢六韜云陷堅陳敗強敵大黃參連弩飛鳬電影矢自副注飛鳬赤莖白羽以鐵為首電影青莖赤羽以銅為首方言云自關而東謂之矢江淮之間謂之關西曰箭注箭者竹名因以為號釋名云矢指也其有所指向迅疾也其本曰足又謂之鏑齊人謂之鏃關西謂之釭其末曰括括旁曰義唐六典云骨鏃曰骲鐵鏃曰鏑鳴箭曰骹霹葉曰鈚皆古之制也竹箭以竹為笴諸箭亦通用木箭以木為笴惟利射獵韓詩傳云諸矦有德七錫弓矢六家詩名物疏卷二十二
