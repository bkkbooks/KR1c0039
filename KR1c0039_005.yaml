body:
  text: 六家詩名物疏卷二明馮復京撰國風周南二卷耳篇卷耳爾雅云卷耳苓耳郭璞云廣雅枲耳亦云胡枲江東呼常枲或曰苓耳形如鼠耳叢生似盤陸疏云葉青白色似胡荽白葉細莖蔓生可煮為茹滑而少味四月中生子如婦人耳中璫今或謂之耳璫幽州人謂之爵耳羅願云幽冀謂之袒菜其實如鼠耳而蒼色上多刺好著人衣一名葹離騷以喻小人所謂薋菉葹以盈室是也一名羊負來博物志云洛中有人入蜀胡枲著羊毛蜀人種之據此物既稱胡枲必是胡物但國風爾雅所載則其來已久本草經曰枲耳實味苦甘溫葉味苦辛久服益氣耳目聰明強志輕身陶隱居曰此是常思菜傖人昔食之以葉覆麥作黃衣者方用亦甚稀按古釋卷耳者皆以為即蒼耳惟鄭夾漈云詩云采采卷耳以其可茹也即今卷菜如連錢者是若蒼耳但堪入藥不可食豫謂陶隱居既云傖人所食何謂但堪入藥乎其以卷菜為卷耳又未知何據也筐方言曰􅞠淇衛之間謂之牛筐儀禮公食大夫簋實實于筐聘禮夫人使大夫餼賔上介米八筐衆介米六筐禮記云具曲植籧筐又曰熬君八筐大夫六筐士四筐説文方曰筐圜曰􅞠韓詩曰頃筐欹箱也三禮圖云大筐以竹受五斛大夫以盛米致饋于聘賔小筐以竹受五升以盛米禮書云有頃筐有懿筐有小筐有大筐頃筐其淺者也懿筐其深者也大筐實五斛小筐實績熬簋實而已筐者正也其深淺大小雖殊而制皆方周行吕氏曰周行大道也東萊云毛氏以為周之列位自左氏以來其傳舊矣然以經解經則不若吕氏之説也爾雅云路旅途也路場猷行道也周禮遂人凡治野遂上有徑溝上有畛洫上有塗澮上有道川上有路注云徑容牛馬畛容大車塗容乘車一軌道容二軌路容三軌又云遺人掌道路之委積量人書天下之塗數司險掌九州之圖以周知其山林川澤之阻而達其道路設國之五溝五塗候人各掌其方之道治合方氏掌達天下之道路野廬氏掌達國之道路至于四畿比國郊及野之道路匠人云王城經塗九軌環塗七軌野塗五軌環塗以為諸矦經塗野塗以為都經塗禮記曰道路男子由右婦人由左車從中央又云季春開通道路母有鄣塞左傳云司空以時平易道路羅長源云據遂人職自徑至路凡五塗莫枝于逵莫大于路塗一曰旅亦謂之行所謂旅樹微行者崔嵬爾雅云石戴土謂之崔嵬傳云土山之戴石者谷風傳云山巔也按傳與爾雅之説正相反下文釋砠其失亦同馬説文云馬怒也武也馬一嵗曰馵二歲曰駒三歲曰駣八歲曰􅦩髙六尺曰驕七尺曰騋八尺曰龍易曰牝馬地類行地無疆又云乾為良馬周禮校人掌王馬之政辨六馬之屬種馬戎馬齊馬道馬田馬駑馬天子十有二間六種邦國六間四種家四間二種凡大祭祀會同毛馬而頒之凡軍事物馬而頒之其屬有趣馬巫馬牧師廋人圉師圉人之官爾雅云絶有力駥膝上皆白惟馵四骹皆白驓四蹢皆白首前足皆白騱後足皆白翑前右足白啓左白踦後右足白驤左白馵駵馬白腹騵驪馬白跨驈白州驠尾本白騴尾白駺馰顙白顚白達素縣面顙皆白惟駹駵白駁黃白騜駵馬黃脊騝驪馬黃脊騽青驪駽青驪驎驒青驪繁鬛騥驪白雜毛駂黃白雜毛駓隂白雜毛駰蒼白雜毛騅彤白雜毛騢白馬黑鬛駱白馬黑脣駩黑喙騧一目白瞷二目白魚又云宗廟齊毫戎事齊力田獵齊足左傳云凡馬日中而出日中而入又云兾之北土馬之所生春秋説題辭云地精為馬十二月而生應隂紀陽以合功故人駕馬任重致逺利天下月度疾故馬善走春秋考異郵云隂合于八八合陽九八九七十二二為地地主月月精為馬月數十二故馬十二月而生人乘馬以理天下王者駕馬故其字以王為馬頭相馬經云馬頭欲得方目欲得朋脊欲強腹欲張四下欲長眼欲髙鼻孔欲大口中欲得赤膝骨圓而長耳欲得相近而前竪小而厚凡相馬之法先除三羸五駑乃相其餘又云馬生下墮地無毛行千里舉一腳行五百里蘭筋竪者千里馬膝如圑麴千里三軍莫逐但知所發不知所宿也一筋從玄中出謂之蘭筋玄中者目上陷如井字埤雅曰舊説相馬望之大就之小筋馬也望之小就之大肉馬也前視見目旁視見肉後視見足駿馬也毛束皮皮束筋筋束肉肉束骨五者兼備天下之馬也莊子徐無鬼曰吾相馬直者中繩曲者中鉤方者中矩圓者中規是國馬也而未若天下馬也天下馬有成材若恤若失若喪其一若是者超軼絶塵不知其所又云馬陸居則食草飲水喜則交頸相靡怒則分背相踶馬援上銅馬式表云行天莫如龍行地莫如馬馬者兵甲之本國之大用安寧則以别尊卑之序有變則以濟逺近之難金爾雅云黃金謂之璗其美者謂之鏐白金謂之銀其美者謂之鐐鉼金謂之鈑錫謂之鈏純澤謂之銑説文云金五色金也黃為之長久薶不生衣百鍊不輕從革不違西方之行生于土從土左右注象金在土中形銅赤金也銀白金也鉛青金也鐡黑金也錫銀鉛之間也釋名云金禁也氣剛毅能禁制物也易説卦曰乾為金尚書云揚州厥貢惟金三品注金銀銅也鄭玄云銅三色也又云荆州厥貢惟金三品又云五行四曰金金曰從革從革作辛周禮玉府職王之金玉玩好職金掌凡金錫之戒令考工記云攻金之工築氏執下齊冶氏執上齊鳬氏為聲栗氏為量段氏鑄器桃氏為刃金有六齊淮南子云黃埃五百歲生黃澒黃澒五百嵗生黃金黃金千歲生黃龍注中央數五故五百歲一化澒黃金水銀也孝經援神契曰石潤苞玉丹精生金參同契云黃土金之父流珠水之母地鏡圖云黃金之氣赤黃千萬斤以上光大若鏡盤金氣發本上赤下青銀氣夜正白撥之隨手散復合山有蔥下有銀光隱隱正白山有磁石下有銅若金管子云山上有丹砂者下有黃金上有磁石者下有銅金上有緑石者下有鉛錫上有赭下有鐡左傳云夏方有德貢金九牧罍爾雅云彛卣罍器也小罍謂之坎注罍形似壺大者受一斛疏云罍者尊之大者也説文曰樽酒器也罍龜目酒樽也木刻為雲象其施不窮周禮司尊彛獻象著壺大山六尊皆有罍諸臣之所酢也禮記云山罍夏后氏之尊也又云廟堂之上罍尊在阼犧尊在西禮圖云六彛為上受三斗六尊為中受五斗六罍為下受一斛韓詩説云金罍大夫器也天子以玉飾諸矦大夫皆以黃金飾士以梓毛詩説云人君以黃金飾尊大一碩金飾龜目蓋刻為雲雷之象詩正義云韓詩説天子以玉經無明文謂之罍者取象雲雷博施如人君下及諸臣又司尊彛注罍亦刻而畫之為山雲之形言刻畫則用木矣故禮圖依制度云刻木為之韓詩説士以梓士無飾言其木體則以上同用梓而加飾耳毛説言大一碩禮圖亦云大一斛則大小之制尊卑同也按王仲任云畫工圖雷纍纍如連鼓又圖一人若力士謂之雷公左手引連鼓右手推推如擊之狀豫閲五經圖其圖罍正如此嘗謂此異狀莫覿古人不應鄙俚乃爾後見博古圖始知所謂雷者蓋鏤為回文以其似雷字而名也雷古雷字論衡又引禮曰刻尊為雷形一出一入一屈一伸為相較軫云出入屈伸正似今之回文與博古圖合豎儒目不見古器誤人多矣又按罍之别有五山罍金罍大罍小罍水罍也周禮鬯人祭祀社壝用大罍則盛鬯者也儀禮燕大射罍水在洗東則盛水者也然則罍之為用豈一途哉岡爾雅云山脊岡孫炎注長山之脊也釋名云岡亢也在上之言也兕爾雅云兕似牛犀似豕郭璞云一角青色重千斤説文云兕如野牛青毛其皮堅厚可制鎧交州記云兕出九德有角角長三尺餘形如馬鞭柄陳藏器云犀之雌者是兕而形不同山海經云禱過山多兕圖贊云兕惟壯獸似牛青黑力無不傾自焚以革皮充武備角助文德周禮函人為甲兕甲六屬夀二百年羅氏云兕即犀之牸者枯犀之角能辟邪惡寧心神散風熱故良于藥餌牸犀之角文理分明俗所謂班犀故美于服飾爾雅云兕似牛犀似豕郭氏稱犀似水牛而豕首然則犀亦似牛與兕同但首如豕耳兕青而犀黑兕一角而犀二角以此為異郭氏又云犀亦有一角者但古多言兕今多言犀北人多言兕南人多言犀耳射以得兕為雋故周詩美宣王殪此大兕也觥韓詩説云觥受五升所以罰不敬觥廓也所以著明之貌君子有過廓然著明非所以餉不得名觴三禮圖云觥受七升以兕角為之詩疏云觥是觚觶角散之外别有此器以兕角為之先師説云刻木為之形似兕角蓋無兕者用木知必以罰者地官閭胥掌比觥撻罰之事注云觥撻失禮之罰也觥用酒其爵以兕角為之春官小胥職亦云觥其不敬者故桑扈絲衣皆云兕觥其觩明為罰而不犯矣左傳疏異義韓詩説觥五升毛傳説觥大七升許愼云一飲七升為過多當謂五升是也陸農師云老子曰兕無所投其角兕善抵觸故先王之制罰爵以兕角為之酒陽物也而善發人之剛其過則在抵觸故先玉制此以為酒戒按古人釋兕觥皆以為罰爵詩中此篇及七月桑扈絲衣凡四見毛鄭之義各自有説無不謂用以示罰諸經訓詁亦同自朱傳不載始以為泛常酒器矣是不考古之過也又按觥之為用饗燕鄉飲賔尸皆有之七月言朋酒斯饗稱彼兕觥左傳衛矦饗苦成叔寧惠子歌兕觥其觩知饗有觥也鄭人燕趙孟穆叔子皮舉兕爵知燕有觥也閭胥掌比觥是鄉飲有觥也絲衣言兕觥是賔尸有觥也蓋燕禮鄉飲酒大夫之饗皆有旅酬無算爵恐有吳敖失禮者故設以罰之砠爾雅云土戴石為砠傳云石山戴土曰砠釋名云石戴土曰砠砠臚然也僕曲禮云君車將駕則僕執䇿立于馬前已駕僕展軨效駕奮衣由右上取二綏跪乘執䇿分轡驅之五步而立君出就車則僕並轡授綏凡僕人之禮必授人綏若僕者降等則受不然則否若僕者降等則撫僕之手不然則自下拘之疏云僕即御車者也古者僕用好人為之故孔子曰吾執御矣又云子適衛冉有僕及周禮諸僕皆用大夫士也少儀云僕於君子君子升下則授綏始乘則式君子下行然後還立周禮大僕王出入自左馭而前驅大馭掌御玉路以祀戎僕掌御戎車齊僕掌馭金路以賔道僕掌馭象路以朝夕燕出入田僕掌御田路以田以鄙馭夫掌馭二車從車使車禮書曰有以同等為之僕者有以降等為之僕者有以弟子為師僕者有以貴為賤僕者禮曰若僕降等則受不然則否此同等降等者為僕也君命召雖賤人大夫士必自御之此貴者為賤人僕也論語或稱冉有僕或稱樊遲御此弟子為師僕也樛木篇樛木鄭氏曰南土謂荆揚之域孔氏云禹貢揚州厥木惟喬荆揚連接故以南為荆揚與南有喬木同釋木云下句曰朻説文云朻髙木也朻即樛字按爾雅説文二釋亦相反藟爾雅云諸慮山櫐注今江東呼櫐為藤似葛而粗大陸疏云一名巨瓜似燕薁亦延蔓生葉艾白色其子赤可食酢而不美本草千嵗纍一名虆蕪陶隱居云樹如葡萄葉如鬼桃陳藏器云似葛蔓葉小白子赤條中有白汁圖經云虆生泰山川谷作藤生蔓延木上葉如葡萄而小四月摘其莖汁白而甘五月開花七月結實八月採子青黑微赤冬惟凋葉此即詩云葛虆者也蘇恭謂是櫻薁藤深為謬妄左傳云葛虆猶能庇其本根螽斯篇螽斯爾雅云蜤螽蜙蝑陸疏云幽州人謂之舂箕即舂黍蝗類也長而青長角長股肱鳴者也或謂似蝗而小斑黑其股似玳瑁又五月中以兩股相切作聲聞數十步公羊傳云螽何以書記災也蜮何以書記異也方言舂黍謂之􅱁蝑注云江東呼為虴蜢蔡雍月令章句云其類乳于土中深埋其卵江東謂之蚱蜢善害田稚鄭樵曰蜙蝑一名蜙䗥即一種大青蚱蜢股長而鳴甚響爾雅又云螽醜奮強醜捋疏云螽蝗之類好奮迅作聲而飛螽斯之類好以腳自摩捋鄭箋云凡物有隂陽情欲者無不妬忌惟蜙蝑否耳各得受氣而生子故能詵詵然衆多孔氏云此言螽斯七月言斯螽文雖顚倒其實一也按蚱蜢稻田中往往有之察其形頗似陸璣所言但釋蟲又有土螽蠰溪説者以為此蟲細小善跳江南所謂蚱蜢也則斯螽别是一物矣嚴氏以此螽為蝗以七月之斯螽為蚱蜢不主孔疏之説疑不能明也小序但言螽斯不妬忌其生子之數亘古未聞朱子云一生九十九子蘇氏云一生八十一子陸佃云一母百子三家之説未詳典據而各自矛盾安得及其生子之際一一數過以訂三説之是非哉又按玉堂間話云螽斯蝗屬或曰魚卵所化每嵗生育或三或四每一生其卵盈百自卵及翼凡一月而飛羽翼未成跳躍而行蓋亦以為蝗而不定其生子之數也羽説文羽鳥長毛也周禮羽人掌以時徴羽翮之政于山農凡受羽十羽為審百羽為摶十摶為縛鍾氏染羽左傳毛羽不登于器則公不射爾雅羽本謂之翮一羽謂之針十羽謂之縳百羽謂之緷子廣雅云子孜也以孝事父常孜孜也釋名云子孶也相生蕃孶也孫説文云孫從子從系系續也爾雅云子之子為孫孫之子為曽孫曾孫之子為玄孫玄孫之子為來孫來孫之子為晜孫晜孫之子為仍孫仍孫之子為雲孫廣雅云孫順也順于祖六家詩名物疏卷二
