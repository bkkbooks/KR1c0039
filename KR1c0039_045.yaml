body:
  text: 六家詩名物疏卷四十二明馮復京撰小雅谷風之什三楚茨篇下祝告箋云祝致神意造主人使受嘏嘏之禮祝遍取黍稷牢肉魚擩于醢以授尸孝孫前就尸受之天子使宰夫受之以筐祝則釋嘏辭以勑之禮運曰修其祝嘏又云祝以孝告嘏以慈告又云天子祭宗廟諸侯祭社稷祝嘏莫敢易其常是謂大嘏曾子問曰攝主不假當作嘏郊特牲曰嘏長也大也特牲饋食尸九飯主人酳尸尸酢主人佐食搏黍稷授祝祝授尸尸授以菹豆執以親嘏主人主人左執角再拜稽首受復位詩懷之實于左袂挂于季指卒角拜尸答拜主人出寫嗇于房祝以籩受少牢饋食尸十二飯主人酳尸尸酢主人上佐食以綏祭二佐食各取黍于一敦上佐食兼受摶之以授尸尸執以命祝卒命祝祝受以東北面于户西以嘏于主人曰皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受祿于天宜稼于田眉壽萬年勿替引之主人坐奠爵興再拜稽首興受黍坐振祭嚌之詩懷之實于左袂挂于季指執爵以興坐卒爵執爵以興出宰夫以籩受嗇黍主人嘗之納諸內孝孫徂位箋云祭禮畢孝孫往位堂下西面位祝于是致孝孫之意告尸以利成疏云孝孫在堂下西面則祝當以西階下告特牲云主人出立于户外西南祝東向告利成尸謖注云利猶養也供養之禮成少牢云主人出立于阼階上西面祝出立于西階上東面祝告曰利成祝入尸謖賈公彥云特牲戶外告利成少牢階上告利成以尊者稍逺于尸若天子諸侯禮畢于堂下告利成送尸大司樂云尸出入奏肆夏樂師教樂儀行以肆夏鐘師凡樂事以鐘鼓奏九夏肆夏杜子春云吕叔玉云肆夏周頌時邁也肆遂也夏大也言遂于大位謂王位也𤣥謂九夏皆詩篇名按尸出入奏肆夏天子之禮也古注以楚茨之詩為思古明王故箋用周禮之文朱子以為述公卿有田祿者力農奉祭則與天子之禮不同而此傳云奏肆夏未知所出考之儀禮大射公升即席奏肆夏燕禮賔及庭奏肆夏則諸侯得奏肆夏天子畿內公卿比外諸侯或亦奏肆夏未可知但天子公卿及諸侯祭禮亡無所據證朱子此篇之傳如主人往阼階下西面聽告利成皆準少牢饋食禮少牢饋食者諸侯卿大夫之祭禮也其儀告利成後祝入尸謖主人降立于阼階東西面祝先尸從遂出于廟門無鼓鐘送尸之事故特牲云大夫之奏肆夏也由趙文子始也是諸侯之卿大夫不得奏肆夏也諸宰周禮膳夫上士二人中士四人下士八人凡王祭祀賔客食則徹王之胙俎注云膳夫親徹胙俎胙俎最尊也餘則其屬徹之徹周禮膳夫祭祀賔客食徹王之胙俎九嬪祭祀徹豆籩內宗及以樂徹則佐傳豆籩外宗佐王后視豆籩以樂徹亦如之樂師及徹帥學士而歌徹小師大祭祀徹歌特牲云宗婦徹祝豆籩入于房徹主人薦俎佐食徹尸薦俎賔出佐食徹胙俎堂上俎畢出有司徹云司士歸尸侑之俎主人退有司徹若不賔尸衆賔出婦人乃徹徹室中之饌燕私禮記云若公與族燕則異姓為賔膳宰為主人公與父兄齒族食世降一等又云旁治昆弟合族以食序以昭穆别之以禮義人道竭矣又云因其酒肉聚其宗族以教民睦特牲禮俎出于廟門徹庶羞設于西序下注云庶羞主為尸非神饌也此徹庶羞置西序下者為將燕飲自尸祝至兄弟之庶羞宗子以與族人燕飲于堂內賔宗婦之庶羞主婦以燕飲于房尚書傳云宗室有事族人皆侍終日大宗已侍于賓奠然後燕私燕私者何也已而與族人燕也飲而不醉是不親醉而不出是不敬禮書云族燕禮服皮辨服即于路寢宰夫為主異姓為賔王與族人燕于堂后帥內宗之屬燕于房其物殽蒸所以合好也其食世降一等所以辨親疏也昭穆以序之所以明世次也夜飲以成之所以别異姓也若夫几席之位升降之儀脫屨而坐立監相禮羞庶羞以盡愛爵樂無算以盡歡大率與諸侯燕禮不異樂尚書云豫欲聞六律五聲八音在治忽以出內五言又曰聲依永樂和聲八音克諧無相奪倫神人以和禮記云比音而樂之及干戚羽旄謂之樂周禮大司樂以樂舞教國子以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賔客以悅逺人以作動物太師合隂陽之聲陽聲黃鐘太蔟姑洗㽔賔夷則無射隂聲大吕應鐘南吕函鐘小吕夾鐘皆文之以五聲宫商角徴羽皆播之以八音金石土革絲木匏竹教六詩曰風曰賦曰比曰興曰雅曰頌樂緯云黃帝之樂曰咸池顓頊曰六莖帝嚳曰五英堯曰大章舜曰簫韶禹曰大夏殷曰大濩周曰勺又曰大武是以清和上升天下樂其風俗鳯凰來儀百獸率舞神龍升降靈龜晏寧稽首周官大祝辨九拜一曰稽首注云拜頭至地也信南山篇甸箋云南山之野禹治而丘甸之六十四井為甸甸方八里居一成之中成方十里出兵車一乘以為賦法周禮小司徒經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅斂之事注此謂造都鄙也采地制井田異于鄉遂四丘為甸甸之言乘也讀如衷甸之甸甸方八里旁加一里則方十里為一成積百井九百夫其中六十四井五百七十六夫出田稅三十六井三百二十四夫治洫又云稍人掌令邱乘之政令司馬法曰四井為邑四邑為丘馬一匹牛三頭是曰匹馬丘牛四丘為甸六十四井出長轂一乘馬四匹牛十二頭甲士三人步卒七十二人戈楯具謂之乘馬又曰六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乘士十人徒二十人成十為終終千井三千家革車十乘士百人徒二百人十終為同同方百里萬井三萬家革車百乘士千人徒二千人賈公彥云一成惟三百家革車一乘士十人徒二十人此謂天子畿內采地法鄭注論語道千乘之國亦引司馬法彼是畿外邦國法革車一乘甲士三人步卒七十二人甲士少步卒多此比畿外甲士多步卒少外內有異故也曾孫疏云曾者重也自曾孫以至無窮皆得稱曾孫疆理傳云疆畫經界理分地理疏經界者地畔之名分地理者分别地所宜之理若孝經注云髙田宜黍稷下田宜稻麥是也朱傳云疆者為之大界也理者定其溝塗也周禮遂人凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以逹于畿匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮專逹于川賈公彥云遂人為溝洫法遂縱溝橫洫縱澮橫九澮而川周其外以彼遂在夫間故以南畝遂則縱矣匠人井田法云田首倍之為遂以南畝圖之遂即橫也同雲埤雅云古文雲字作云象雲回轉之形其上從二二者天中之隂也天中之隂應之於上故地中之陽升而為雲詩曰上天同雲冬曰上天燠則雲暘而異寒則雲隂而同故也霡霂爾雅云小雨謂之霡霂釋名云霡霂小雨也言裁霡靂霑漬如人沐頭帷及其上枝而根不濡也埸孔氏云以田之疆畔至此而易主名之為埸廬孔氏云古者宅在都邑田於外野農時出而就田須有廬舍班固曰井方一里是為九夫八家共之各受私田百畝公田十畝是為八百八十畝餘二十畝以為廬舍又曰還廬樹桑菜茹有畦瓜瓠果蓏殖于疆埸在野曰廬在邑曰里說文云廬寄也春夏居秋冬去春秋井田記人受田百畝公田十畝廬舍在內貴人也公田次之重公也私田在外賤私也邱氏曰公田百畝內除二十畝為八家治田之廬董氏云井九百畝其中為公田八家每廬舍二畝半按公田百畝餘二十畝為廬舍其說出于漢書食貨志鄭注匠人云野九夫而稅一則鄭意無家各二畝半為廬之事菹詳見豳風豆說文云酢菜也周禮醢人掌四豆之實王舉共醢以七菹實之記云恆豆之菹水草之和氣疏周禮埸人祭祀共果蓏是祭必有瓜菹醢人豆實無瓜菹者文不具采蘩傳云公侯夫人執蘩菜以助祭王后則荇菜清酒箋云清謂𤣥酒也酒鬱鬯五齊三酒也朱傳云清酒清潔之酒鬱鬯之屬也孔疏云以周禮言之祼獻所用則鬱鬯與醴齊三酒之清酒卑于五齊諸臣之所酢不用之以獻神儀禮特牲云壺禁在東序尊于戶東𤣥酒在西又尊兩壺于階東西方亦如之少牢云尊兩甒于房戶之門甒有𤣥酒禮記禮也者反本修古不忘其初者也醴酒之用𤣥酒之尚又云𤣥酒在室疏云𤣥酒謂水也以其色黑謂之𤣥太古無酒此水當酒所用貴重古物陳設之在于室內而近北周禮鬱人掌祼器凡祭祀賔客之祼事和鬱鬯以實彛而陳之凡祼事沃盥鬯人掌供秬鬯而飾之凡王之齊事共其秬鬯大宗伯凡祭大神享大鬼祭大示涖玉鬯肆師祭之日及果築煮鄭司農云築煮築香草煮以為鬯鄭𤣥云鬱鬱金香草宜以和鬯鬯釀秬為酒芬香條暢于上下也秬如黑黍一稃二米禮記云諸侯未賜圭瓚資鬯於天子又云周人尚臭鬱合鬯臭隂達于淵泉灌以圭璋用玉氣也又云暢臼以椈杵以梧又云天子親耕粢盛秬鬯以事上帝又云加以鬱鬯以報魄也王度記云天子以鬯諸侯以薰大夫以蘭芝士以蕭庶人以艾毛氏云九命錫圭瓚秬鬯說文云鬱十葉為貫百草貫築以煮之為鬱一曰鬱鬯百草之華逺方鬱人所貢芳草合釀之以降神鬱今鬱林郡也鬯以秬釀鬱草芬芳攸服以降神也從凵凵器也中象米匕所以扱之易曰不喪匕鬯魏略云鬱金生大秦國陳藏器云其花十二葉為百草之英二月三月有花狀如紅藍四月五月採花即香也本草圖經云四月初生苗似薑黃花白質紅末秋出莖心無實根黃赤周禮酒正凡祭祀以法共五齊三酒以實八尊詳見邶風酒大祭三二中祭再二小祭一二皆有酌數惟齊酒不二皆有器量酒人掌為五齊三酒祭祀則共奉之以役世婦禮書云濁莫如五齊清莫如三酒祭祀有五齊以神事之也有三酒以人養之也鄭氏以祫備五齊禘備四齊祭備二齊朝用醴齊饋用盎齊諸臣自酢用凡酒然記曰夫人薦盎則醴以上君所酌盎以下夫人所酌而無君饋薦盎之禮矣酒正曰凡祭祀以五齊三酒實八尊則中祭小祭皆備五齊矣騂牡傳云周尚赤也周禮牧人凡陽事用騂牲毛之注云騂牲色赤毛之取純毛也陽祀祭天於南郊及宗廟禮記云周人尚赤牲用騂又云周人騂剛又云於郊故謂之郊牲用騂尚赤也鸞刀正義云鸞即鈴也謂刀環有鈴其聲中節禮記云割刀之用而鸞刀之貴貴其義也聲和而後斷也又云祭之日君牽牲入廟門麗于碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退爓祭祭腥而退敬之至也何休云鸞刀宗廟割切之刀環有和鋒有鸞按禮記卿大夫袒而毛牛尚耳則人君祭禮執鸞刀者固謂卿大夫也考之儀禮特牲則曰主人立於門户視側殺少牢則曰主人即位于廟門之外司馬刲羊司士擊豕宗人告備乃退則士大夫猶視殺而不親刲矣王介甫劉執中乃謂王執鸞刀以親殺此何據耶朱子云主人親執蓋沿王氏之誤國語云天子郊禘之事必自射其牲諸侯宗廟之事必自射其牛亦不云執刀以殺也啓毛取膋郊特牲云毛血告幽全之物貴純之道也注云幽謂血也禮器云納牲詔於庭血毛詔於室羮定詔於堂楚語觀射父云毛以示物血以告殺接誠拔取以獻具為齊敬也注云物色也告殺明不因故也又郊特牲云取膟膋燔燎升首報陽也又曰蕭合黍稷臭陽達於牆屋故既奠然後爇蕭合羶薌注云蕭香蒿染以脂合黍稷燒之互見前章燔賈公彥云按說文及字林膟血祭膋是牛腸間脂也是膟為血膋為腸間脂也六家詩名物疏卷四十二
