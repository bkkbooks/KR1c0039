body:
  text: 六家詩名物疏卷四十九明馮復京撰大雅生民之什二鳬鷖篇鷖倉頡解詁曰鷖鷗也一名水鴞禽經云鷗信鳥也信不知用注云鷗如倉庚而小隨潮而翔迎浪蔽日食小魚潮至則翔水嚮以為信反為鷙鳥所擊是知信而不知所以自害也晉中興説云鷗湖澤鳥南越志云鷗在漲海中隨潮上下常以三月風至乃還洲嶼生卵似鷄卵色青頗知風雨若羣飛至岸必風風土記云鷖以名自呼大如雞生卵于荷葉之上埤雅云鷖鳬屬鳬好没鷗好浮雅翼云鷗色青黒亦有白者公尸箋云首章尸在宗廟次章祭四方百物之尸蜡祭事見甫田篇農夫慶三章祭天地之尸四章祭社稷山川之尸社稷見甫田篇社山川見簡兮篇方五章七祀之尸疏云宗廟祭後燕尸大夫謂之賔尸即用祭日天子諸侯謂之繹以祭之明日燕祭天地之尸即以祭日其餘諸神亦以其日也首章箋云祭祀既畢明日又設禮而與尸燕爾雅云繹又祭也周曰繹商曰肜夏曰復胙公羊傳云繹者何祭之明日也榖梁云繹者祭之旦日之享賔也禮器云設祭于堂為祊乎外故曰於彼乎於此乎郊特牲孔子曰繹之於庫門内祊之於東方失之矣注云祊之禮宜於廟門外之西室繹又於其堂神位於西也祭義曰君牽牲夫人奠盎君獻尸夫人薦豆注謂繹日也又曰祭之日明發不寐饗而致之又從而思之祭統曰詔祝于室而出於祊此交神明之道也禮書曰繹于明日則異牲詩曰自羊徂牛是也賔尸于祭日則用正祭之牲而已有司徹燅尸俎是也蓋正祭重而主於禮神繹輕而主於禮尸重故省牲視具在宗伯輕故使士而爵弁絲衣者也主於禮神故在室主於禮尸故在堂則自堂徂基掃堂設筵者皆堂上之事三章箋云渚猶平地之有丘喻祭天地之尸疏云此惟喻二至之祭其文不及郊周禮大宰祀大神示掌百官之誓戒與其具修掌次王旅上帝則張氊案設皇邸司裘掌為大裘以共王祀天之服大宗伯以禋祀祀昊天上帝以蒼璧禮天以黄琮禮地牲幣各放其器之色注云此禮天以冬至謂天皇大帝在北極者也禮地以夏至謂神在崑崙者也又云凡祀大神祭大示帥執事而卜日宿眡滌濯省牲鑊奉玉齍詔大號司服王祀昊天上帝則服大裘而冕大司樂凡樂圜鍾為宫黄鍾為角大簇為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣函鍾為宫大簇為角姑洗為徵南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡以神仕者以冬日至致天神人鬼以夏日至致地示物鬽曲禮曰天子祭天地歲徧禮器云祭天特牲又云為髙必因丘陵為下必因川澤是故因天事天因地事地按二丘二郊鄭氏分而為四冬日至圜丘所祭之天謂之昊天上帝即北辰耀魄寳也又謂之天皇大帝又謂之太一帝君夏日至方丘所祭之地謂崑崙地祗也王者各稟五帝之精氣而王天下於夏正建寅之月祭于南郊謂之感生帝月令云孟春元日祈穀于上帝即此祭也北郊所祭乃神州地祗或曰合祀于夏正之月或云建申之月祭之冬至祭昊天周人配以嚳南郊祭感帝周人配以稷祭法所謂禘嚳而郊稷也王肅之徒則以郊丘為一按記云周之始郊日以至則郊以冬至有合王説爾雅云祭天曰燔柴祭地曰瘞薶與泰壇泰折之禮同若祭以掃地薦以血牲以犢車以大路樽以犧以疏市杓以樿器以陶匏藉以蒲越藳秸搢大圭執鎮圭及卜郊聴報尚書稱用牲于郊社皆詳于郊而畧于丘則郊丘為一王論確矣為鄭學者則云周禮祀昊天上帝大裘而冕郊特牲云郊祭之日戴冕璪十有二旒是服不同也周禮玉路以祀天郊特牲云乗素車是車不同也祭法云燔柴於泰壇用騂犢周禮蒼璧禮天牲從玉色是牲不同也爾雅云非人為之丘泰壇泰折人力所為又與方圓之丘别故知郊丘有異按家語云臨燔柴脱衮冕著大裘象天則初服衮冕後著大裘知所説服同矣素車殷禮也玉路周禮也乃二代車制有異非郊丘為二是車之不同不足論矣郊特牲云牲用騂牧人云陽祀用騂牲是也宗伯云皆有牲幣各放器之色則其説踳駁或記者因周尚赤牲用騂故槩云騂犢而二至之祭實用蒼黄之牲與其詳不可得而考要之以郊丘為一者其理為勝若爾雅丘字之訓又不足辨釋丘云絶高為之京非人為之丘毛傳云京高丘也則散文亦通矣詩禮有郊稷之文不聞有圓丘配嚳之説禘蓋宗廟五年之大祭祀其祖之所出而不以配天也此外有迎氣四郊及季夏祭黄帝含樞紐所謂祭五帝也又四月龍見而雩總祭五帝於南郊季秋又大饗五帝于明堂皆祭太微五精之帝也祭地自崑崙神州大􅅘而下至五土之示成羣之置社皆地示之屬矣卒章箋曰燕七祀之尸曲禮云天子諸侯大夫祭五祀歲徧月令春祀户祭先脾夏祀竈祭先肺季夏祀中霤祭先心秋祀門祭先肝冬祀行祭先腎孟冬臘先祖五祀禮器曰禮行五祀正法則也家主中霤國主社郊特牲云三獻文祭法云王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰户曰竈王自為立七祀諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲諸侯自為立五祀大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶士庶人立一祀或立户或立竈白虎通云祭五祀天子諸侯以牛卿大夫以羊因四時牲也一説戶以羊竈以雉中霤以豚門以犬井以豕或曰中霤用牛餘不得用禮書云考之于禮五祀之牲牛牲凡祭五祀于廟有主有尸觀月令臘先祖五祀同時則五祀祭于廟可知也曾子問既殯祭五祀尸入三飯則五祀有尸可知也既殯而祭不酳不酢則凡祭五祀固有侑酳與酢矣老婦之祭先儒以為竈配則五祀固有配矣先儒又謂卿以上宗廟有主五祀亦有主矣大夫以下宗廟無主五祀亦如之然大夫之廟未嘗無主五祀有主與否不可考也按禮記月令及中霤禮吕覽皆曰冬祭行行在廟門外之西檀弓云毁宗躐行是也淮南子白虎通則云冬祀井其説以井者水之生藏在地中冬亦水王萬物伏藏故祀井于冬也二説不同恐當以禮記為正縁月令祭法竝有祭行之言及中霤禮所記祭行禮甚詳不應皆誤蔡邕亦以為冬祭行沙説文云沙水中散石也易需卦九二需于沙注云沙接水者釋水云潬沙出注云今河中呼水中沙堆為潬脯釋名云脯搏也乾燥相摶著也脩縮也乾燥而縮也周禮膳夫凡王之稍事設薦脯醢腊人掌乾肉凡田獸之脯腊膴胖之事凡祭祀共豆脯薦脯膴胖凡腊物賔客喪紀共其脯腊注云薄析曰脯捶之而施薑桂曰腶脩腊小物全乾曲禮云以脯脩置者左朐右末祭宗廟脯曰尹祭婦人之摯脯脩内則牛脩鹿脯田豕脯麋脯麕脯大夫燕食有膾無脯有脯無膾郊特牲云大饗尚腶脩而已矣少儀云其以束脩賜人若獻人則執脩以將命禮書云膳夫凡王之稍食則脯醢冠禮醮則脯醢喪禮小歛特豚脯醢以脯醢之于魚腊俎為輕故也大饗尚腶脩以禮賔冠禮取脯以見母婚禮賔取脯授從者燕禮賔執脯賜鍾人又婚禮婦摯腶脯以見姑學者束脩以見師以脯之于禮為重故也用之于前則冠禮始醮再醮之類是也羞之於後則籩人加籩之實栗脯是也脯體之直謂之脡士虞脯四脡鄉飲禮薦脯五脡是也脡亦謂之膱鄉射禮薦腊用籩五膱祭半膱膱長尺二寸是也潨説文云潨小水入大水也箋云水外之高者也亹傳云亹山絶水也詩緝云亹謂山當水路令水勢㫁絶也西漢地里志金城郡有浩亹縣注云浩水名也亹者水流峽山間兩岸深若門也假樂篇百辟箋云畿内諸侯王制云天子三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸天子之縣内諸侯禄也外諸侯嗣也周禮太宰以八則治都鄙注云公卿大夫之采邑王子弟所食邑在畿内者載師云以家邑之田任稍地以小都之田任縣地以大都之田任畺地賈公彦云家邑大夫之采也小都六卿之采也大都三公之采也親王子母弟與公同處而百里次疏者與六卿同處而五十里次疏者與大夫同處二十五里典命云王之三公八命其卿六命其大夫四命其出封加一等按孟子云天子之卿受地視侯大夫受地視伯元士受地視子男與王制所言不同鄭以王制為殷因夏禮然則王制是夏商之法孟子自説周制矣鄭氏謂周公制太平拓大九州之境故公封方五百里侯封方四百里伯封方三百里子封方二百里男封方百里而内諸侯采地最多者儉于百里何也以百里五十里二十五里為差與王制孟子俱不合鄭果何據乎孟子又以百里七十里五十里三等之封為周制若使周制果如大司徒所云孟子何以不聞乎且周公雖致太平計其拓地豈能殊絶殷夏之世而封外諸侯之地遽加多若此外諸侯既加内諸侯又不應獨儉凡此皆周禮之可疑者也鄭氏注大司徒既以王制縣内之數為夏之采地周則未聞注小司徒又云采地百里之國凡四都五十里之國凡四縣二十五里凡四甸是前後自相戾也其注王制云畿内封國之數各有致仕者副之載師注又以宅田任近郊之地為致仕之家所受田其稍縣畺三等不云有致仕者之田在内蓋亦以為周變前代之法其詳不可得而攷矣王制孟子皆云有天子元士之地豈即載師所謂以士田任近郊者乎公劉篇積箋云乃有積委周禮大司徒大賔客令野修道委積小司徒小賔客令野修道委積遺人掌邦之委積以待施惠鄉里之委積以恤民之囏阨門闗之委積以養老孤郊里之委積以待賔客野鄙之委積以待羇旅縣都之委積以待凶荒凡賔客㑹同師役掌其道路之委積凡國野之道路室有委候館有積注云委積者廩人倉人計九穀之數足國用以其餘共之少曰委多曰積遂人凡賔客令野修道而委積遂師賔客庀其委積廩人以嵗之上下數邦用凡邦有㑹同師役之事則治其糧與其食倉人凡國之大事共道路之委積掌訝賔客至戒官修委積糧説文云穀食也周禮廩人凡㑹同師役之事治其糧槖囊傳云小曰槖大曰囊孫弈示兒編説文曰無底曰囊有底曰槖董氏曰無底曰槖有底曰囊唐韻云槖無底囊二説不同並存之徐鍇曰無底曰槖今纒腰下者詩緝云東方朔傳云奉一囊粟是糧米盛于囊也戚詳見齊風斧傳云戚斧也釋名云戚慼也斧以斬斷見者皆慼懼也揚傳云揚鉞也疏云鉞大而斧小大公六韜云大柯斧重八斤一名天鉞劉存事始案輿服志曰黄帝制以銅為鳯首銜刃古今注云金斧黄鉞也鐵斧𤣥鉞也三代通用之武王以黄鉞斬紂太公以𤣥鉞斬妲己將軍出征授黄鉞者亦以銅為之韓詩外傳云諸侯有徳八錫鈇鉞巘傳云巘小山别于大山也釋名云小山别大山曰甗甗甑也甑一孔者甗形孤出處似之也爾雅云重甗隒注云謂山形如累兩甗甗甑山形似之因以名云百泉溥原曹氏曰漢朝那縣屬安定郡隋改為百泉縣屬平涼郡魏于其地置原州唐因之百泉溥原即其處一統志陜西平涼府鎮原縣漢為安定郡後魏置原州廬周禮遺人凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積注廬若今野候徒有庌也宿可止宿若今亭有室矣候館樓可以觀望者也一市之間有一廬三宿依箋云公劉既登堂負扆而立爾雅云牖戶之間謂之扆注云窻東戶西也禮云斧扆者以其所在處名之疏云本戶牖之間名扆覲禮天子設屏風之狀于户牖間因名此屏風為扆是以其在扆處即名曰扆也覲禮云天子負斧依于户牖之間左右几注云依如今綈素屏風也有繡斧文所以示威明堂位云天子負斧依南鄉而立牢禮書曰養馬謂之閑養牛羊豕謂之牢閑以防之牢以固之各象其性而制之也郊特牲云帝牛必在滌三月稷牛惟具鄭氏曰滌者牢中搜除處周禮肆師大祭祀展犧牲繫于牢頒于職人充人掌繫祭祀之牲祀五帝則繫于牢芻之三月享先王亦如之何休公羊注云滌宫名養帝牲三牢之處也滌取其蕩滌潔清三牢者各主一月取三月一時足以充其大牲匏陸佃禮圖云舊圖匏爵用匏片為爵據此乃杓也若爵宜截其鼻以盛酒不應破匏為之鄭氏説取甘匏去抵以齊為正禮記云郊器用陶匏以象天地之性也又云三王作牢用陶匏流泉郡縣志云邠州三水縣以縣界有羅川谷三泉並流故以為號豳城在縣西髙泉山亦曰甘泉在永壽縣北二十五里五龍原在新平縣南三里原側有五泉水因名三單互見無衣篇師箋云公劉遷豳丁夫適滿三軍之數單者無羨卒也春秋傳曰成國不過半天子之軍諸侯之大者三軍可也周禮小司徒上地家七人可任者家三人中地家六人可任者二家五人下地家五人可任者家二人凡起徒役母過家一人以其餘為羨惟田與追胥竭作賈氏曰此謂六鄉之内上劑致甿一人為正卒其餘為羨卒若六遂之内以下劑致甿一人為正卒一人為羨卒其餘皆為餘夫饒逺故也遂人以下劑致甿注云以下劑為率謂可任者家二人隰原孔氏曰禹貢雍州原隰底績公劉居豳度其隰原以治田是豳居原隰之野郡縣志云邠州新平縣有五龍原永壽縣有永壽原宜禄縣有淺水原徹孟子曰夏后氏五十而貢殷人七十而助周人百畝而徹徹者徹也助者藉也詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也王制曰古者公田藉而不税左傳云穀不過藉以豐財也穀梁傳云古者什一藉而不税公羊傳曰古者什一而藉鄭匠人注云周制畿内用夏之貢法税夫無公田邦國用殷之助法制公田不税夫貢者自治其所受田貢其税穀助者借民之力以治公田又使收斂焉諸侯謂之徹者通其率以什一為正孟子云野九夫而税一國中什一是邦國亦異外内之法耳朱子孟子章句云周時一夫受田百畝鄉遂用貢法十夫有溝都鄙用助法八家仝井耕則通力而作收則計畝而分故謂之徹語録云此亦不可詳知但因洛陽議論中通徹而耕之説推之耳或但耕則通力収則各得其畝亦未可知也按徹兼貢助二法助法當如朱子所言公田有廬舎在内是也如鄭通率之説則助之所取重貢之所取輕非孟子皆什一之㫖也夕陽爾雅曰山西曰夕陽孫炎曰夕乃見日鍛傳云鍛石也箋云所以為鍛質説文作碫云厲石也朱傳云鍛鐵也禹貢梁州厥貢璆鐵銀鏤月令季春命工師審五庫之量金鐵母或不良廣雅云鐵朴謂之礪一統志終南山出鐵皇澗過澗傳氏曰二澗當在邠州界芮傳云芮水厓也箋云芮之言内也朱傳云芮水名出呉山西北東入涇周禮職方作汭夏官職方云雍州其川涇汭注云汭在豳地一統志汭水在陜西鳯翔府隴州城西北源出弦蒲藪東入涇水周職方雍州其川涇汭詩曰汭鞫之即皆謂是也呉嶽在隴州南八十里鞫爾雅曰隩隈也厓内為隩外為鞫李巡曰厓内近水為隩其外為鞫孫炎曰内曲裏也外曲表也泂酌篇餴傳云餴餾也釋言云饙餾稔也孫炎曰蒸之曰饙均之曰餾郭璞曰今呼􅧮飯為饙饙熟為餾説文云饙一蒸米也餾飯氣流也卷阿篇昄朱傳或曰昄當為版版章猶版圖也周禮小司徒聴閭里以版圖司㑹云掌凡在版圖者之貳以逆羣吏之治注版户籍也圖土地形象田地廣狹司書掌邦中之版土地之圖職方氏掌天下之圖小司寇登民數自生齒以上登于天府司民掌登萬民之數自生齒以上皆書于版鳯凰釋鳥云鶠鳯其雌皇説文天老云鳯象鴻前麟後蛇頸魚尾鸛顙鴛思龍文龜背燕頷鷄喙五色備舉出東方有道之國翺翔四海之外過崑崙飲砥柱濯羽弱水莫宿風穴飛則羣鳥從以萬數五方神鳥東方曰發明南方曰焦明西方曰鷫鷞北方曰幽昌中央曰鳯皇左傳云鳯鳥氏司厯杜預云鳯知時故以名厯官大戴禮羽蟲三百六十鳯皇為之長禮運云鳯以為畜故鳥不獝詩義疏云鳯皇一名鸑鷟非梧桐不棲非竹實不食非醴泉不飲在天為朱雀韓詩外傳天老曰鳯首帶徳頸揭義背負仁心入信翼挾義足履正尾繫武小音金大音鼔食有質飲有儀游心擇所飢不妄下其鳴也雄曰節節雌曰足足昏鳴曰固常晨鳴曰發明晝鳴曰保章舉鳴曰上翔集鳴曰歸昌元命包云火離為鳯運斗樞云天樞得則鳯凰翔斗威儀曰君乗土而王其政太平鳯皇集於林苑樂叶圖徵云五音克諧各得其倫則鳯皇至冠類鷄頭燕喙虵頸龍形麟翼魚尾五彩不啄生蟲又曰五鳯為瑞者一其四似鳯並為妖一曰鷫鷞至則役之感二曰發明至則喪之感三曰焦明至則水之感四曰幽昌至則旱之感動聲儀云鎮星不逆行則鳯皇至論語摘襄聖曰鳯有六像九包六像者頭像天目像日背像月翼像風足像地尾像緯九包者口包命心合度耳聴達舌詘伸彩色光冠矩州宋均云州當作朱距鋭鉤音激揚腹文户行鳴曰歸嬉止鳴曰提扶夜鳴曰善哉晨鳴曰賀世飛鳴曰郎都知我者唯黄持竹實來故子欲居九夷從鳯嬉山海經云丹穴之山有鳥如鷄五采而文名曰鳯皇首文曰徳翼文曰義背文曰禮膺文曰仁腹文曰信飲食自然自歌自舞見則天下安寧帝王世紀云國安其主好文則鳯皇翔莊子云鳯帶聖嬰仁左智右賢荀子曰詩曰鳯皇秋秋其翼若干其聲若簫有鳯有皇樂帝之心吕氏春秋云黄帝聴鳯皇之鳴以别十二律淮南子云二皇鳯至於庭三代鳯至於門周室鳯至於澤徳彌澆所至彌逺徳彌精所至彌近京房易傳云鳯皇髙丈二三輔決録蔡衡云凡鳯有五多赤色者乃鳯多黄色者鵷鶵多青色者鸞多紫色者鸑鷟多白色者鵠禽經云鳯青謂之鶡赤謂之鶉黄謂之鸞白謂之鷫紫謂之鷟瑞應圖云鳯皇仁鳥王者不刳胎剖卵則至梧詳見定之方中篇桐釋木云櫬梧注今梧桐青史子云梧東方之草春木也王逸子云梧桐春榮陽木也埤雅云梧一名櫬即梧桐也今人以其皮青號曰青桐華淨妍雅極可愛故多近齋閣種之梧櫜鄂皆五焉其子似乳綴其櫜鄂生多或五六少或一二飛鳥喜巢其中莊子所謂桐乳致巢也雅翼云梧木易生鳥銜墜者輒隨生殖其畦種者是嵗可髙一丈朝陽釋山云山東曰朝陽孫炎曰朝先見日也板篇藥説文治病萆周禮疾毉以五藥養其病注云草木蟲石穀也痬毉凡藥以酸養骨以辛養筋以鹹養脈以苦養氣以甘養肉以滑養竅本草經云上藥養命以應天中藥養性以應人下藥冶病以應地藥有隂陽配合子母兄弟根莖華實草石骨肉三皇紀云神農始嘗百草始有毉藥六家詩名物疏卷四十九
