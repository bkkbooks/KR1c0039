body:
  text: 六家詩名物疏卷十明馮復京撰國風邶二終風篇終風韓詩說云西風也毛傳云終日風為終風暴爾雅云日出而風為暴孫炎曰隂雲不興而大風暴起乙巳占云風卒起乍有乍無者曰暴風按說文引此詩暴作瀑疾雨也霾爾雅云風而雨土為霾孫炎曰大風揚塵土從上下也釋名曰霾晦也言如物塵晦之色曀爾雅云隂而風為曀孫炎曰雲氣曀日釋名曰曀翳也言掩翳日光使不明也日尚書云期三百有六旬有六日按周天三百六十五度四分度之一日日行一度故因謂之日也大撓作甲子是有剛柔之異釋名云嚏聲乍嚏而出也禮記月令曰季秋行夏令則人多鼽嚏内則云在父母舅姑之所不敢噦噫嚏咳素問云冬善病鼽衂注以氣在頭也擊鼓篇鼓周禮鼓人以鼖鼓鼓軍事以金錞和鼓以金鐲節鼓以金鐃止鼓以金鐸通鼓凡軍旅則鼓鼜軍動則鼓其衆田役亦如之鏄師凡軍之夜三鼜皆鼓之守鼜亦如之大司馬仲春教振旅王執路鼓諸侯執鼖鼓軍將執晉鼓師帥執提旅帥執鼙中冬教大閲鼓人三鼓車徒皆作左傳曰師之耳目在吾旗鼓又云一鼓作氣再而衰三而竭又云金鼓以聲氣司馬法云千人之師執鼙萬人之師執大鼓按武事之鼓有六路鼖晉提鼙鼜也路四面鼓也鼓長八尺面四尺中圍加三之一謂之鼖鄭𤣥曰即軍夜三鼜之鼓也陳暘依沈休文云鼜鼓長丈二尺非鼖也長六尺六寸左右端廣六寸中尺厚三寸穹者三之一上三正謂之晉鼓有曲木提持立馬髦上者謂之提鼓之尤小者謂之鼙即儀禮所謂朔周禮所謂朄也路鼓本用之鼓鬼享晉鼓本用之鼓金奏鼖鼓亦懸於辟雝鼙鼓亦通於射祭而軍事皆得用之此所謂擊鼓其鏜者非教振旅又非警鼜乃州吁治兵之鼓應是鼖爾兵周禮司兵掌五兵五盾各辨其物與其等以待軍事凡授兵從司馬之法以頒之用兵亦如之鄭司農云五兵者戈殳㦸酋矛夷矛鄭康成云車之五兵鄭司農所云者是也步卒之五兵則無夷矛而有弓矢考工記云攻國之兵欲短守國之兵欲長句兵欲無彈刺兵欲無蜎是故句兵椑刺兵摶司馬法云弓矢圍殳矛守戈㦸助凡五兵長以衛短短以救長管子云蚩尤受盧山之金而作五兵按考工記廬人云戈殳㦸酋矛夷矛乃云六建既備車不反覆六建者五兵與人故以為車之五兵如先鄭説也後鄭知徒之五兵無夷矛有弓矢者以司馬法知之且夷矛三尋步卒不便於用也然夷矛雖不施於步而弓矢未嘗不設於車小戎閟宫所載是也國說文云國邦也禮記云王者之制禄爵凡五等公侯田方百里伯七十里子男五十里不能五十里不合於天子附於諸侯曰附庸天子之縣内凡九十三國名山大澤不以朌九州千七百七十三國天子之元士諸侯之附庸不與周禮大司徒諸公地方五百里其食者半諸侯地方四百里食者三之一諸伯地方三百里食者三之一諸子地方二百里食者四之一諸男地百里食者四之一左傳云天子之地一圻列國一同自是以衰易曰比先王以建萬國親諸侯漕戴延之西征記云白馬城故衛之曹邑通典滑州白馬縣衛國曹邑戴公廬於曹即此孔氏曰漕地在鄘而邶曰土國城漕國人所築之城也思須與漕衛女所經之邑也按唐之滑州今直𨽻大名府滑縣白馬縣今廢在滑縣治南一統志云即衛之曹邑也孫傳云公孫文仲也白虎通云諸侯之子稱公子公子之子稱公孫朱傳云孫氏姓纂云衛武公子惠孫曾耳為衛上卿因氏焉濳夫論云孫氏者或王孫之班也或諸孫之班也衛之公族孫氏陳譜云陳者虙羲氏之墟武王以封虞閼父之子媯滿是曰陳胡公都宛丘之側其封域在禹貢豫州之東其地廣平無名山大澤西望外方東不及盟豬左傳子産云昔虞閼父為周陶正以服事我先王先王頼其利器用也與其神明之後也庸以元女太姬配胡公而封諸陳以備三恪地里志云太姬婦人尊貴好祭祀用史巫故其俗巫鬼一統志陳州在河南開封府城東南三百五十里周封舜後於此為陳國宋鄭譜云武王克商以陶唐氏火正閼伯之墟封微子啓為宋公代武庚為商後其封域在禹貢徐州泗濵西及豫州盟豬之野地里志梁國睢陽縣故宋國㣲子所封朱傳云宋都商丘按古之商丘漢之梁國睢陽皆今之河南開封府歸德州也泗濵在今直隸徐州秦之泗水郡也孟諸亦在今歸德州境手釋名云手須也事業之所須也禮記手容恭凱風篇凱風釋天云南風謂之凱風李巡曰南風長養萬物喜樂故曰凱風易緯云夏至景風至呂氏春秋云南方曰巨風大戴禮云正月時有俊風俊者大也大風南風也何大於南風也曰合氷必於南風解氷必於南風生必於南風收必於南風故大之也世紀云舜作五弦之琴以歌南風歌曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮山海經云發爽之山又東四百里至于旄山之尾其南有谷曰育遺多怪鳥凱風自是出棘爾雅云茦刺郭璞曰草刺鍼也方言云凡草木刺人北燕朝鮮之間謂之茦自關而西謂之刺江湘之間謂之棘本草云白棘一名棘針一名棘刺棘刺花一名䓆蓂唐本注云棘有赤白二種刺有兩種有鈎有直補益宜用直者療腫宜用鈎者白棘莖白如粉子葉與赤棘同棘中時復有之亦為難得也圗經云棘小棗也叢髙三四尺花葉都似棗而有赤白二種爾雅云槐棘醜喬注枝皆喬竦孟子養其樲棘趙注樲棘小棘所謂酸棗也爾雅疏云棗實小而味酢者名樲嵩陽子云余家于滑臺今酸棗縣即滑之屬邑也其地名酸棗焉其樹髙數丈徑圍一二尺木理極細堅而且重樹皮亦細文似蛇鱗其棗圎小而味酸核㣲圓其仁稍長色赤如丹此毉之所重居人不易得今市之賣者皆棘子為之圖經云酸棗野生多在坡坂及城壘間似棗木而皮細其木心赤色莖葉俱青花似棗花八月結實紫紅色似棗而圓小味酸埤雅云棘性堅强費風之長養者其心之生更難于幹四時纂要云四月棗葉生凱風之時也魏風園有棘棘酸棗也於果為下舊云鵲巢中必有棘盖棘性煖雅翼云棘可以為矢昔者楚之先祖桃弧棘矢以共禦王事棘植于花外則花不被霜凱風既云自南乃當景風白虎通云景風至棘造實盖吹彼棘心者將以趣其造實萬物之難生者棘而造實又欲其應候南風雖能生物亦已勞矣春秋元命包云樹棘聴訟其下者棘赤心有刺言治人者原心不失其赤實也管子五沃之土其棘其棠按朱傳云棘小木叢生多刺難長似指荆棘本草之白棘叢生三四尺者也老子曰師之所處荆棘生焉皇覽云孔子塋中不生荆棘及刺人草此詩曰棘薪若云但可為薪云爾然古者朝位植棘取其赤心有刺也又以為七盖取其枝翹竦有奉上之義又可為矢出氷以除災皆疑是樲棘盖朝位植以配槐豈宜小木其用亦多豈徒為薪樲棘實可食魏詩園有棘其實之食是也說樲棘者雖不同想其木髙大非荆棘比也埤雅云棘大者棗小者棘或云棘實曰棗故爾雅釋樲在棗條中然本草大棗酸棗白棘治療各異青史子云棘西方之草秋木也棗北方之草冬木也斷乎棗棘有辨江南無棘陶隱居之流遂多誤說合諸書論之棗有十一種而樲實是棘以本草列酸棗于木部故也晳無實棗或亦棘類與嚴氏詩輯則以此章棘心魏風園有棘之棘為酸棗楚茨言抽其棘青蠅止于棘之棘為荆棘盖樲亦多刺難長者故嚴云爾與朱說似别寒泉說文云泉水源也爾雅云泉一見一否為瀐濫泉正出沃泉懸出汍泉穴出歸異出同肥通典寒泉在濮州濮陽縣東南浚城水經注濮水枝津東逕浚城南而北去濮陽三十五里城側有寒泉岡即詩爰有寒泉在浚之下世謂之髙平渠非也浚通典云濮陽縣東南浚城輿地廣記云開封縣有浚溝詩所謂浚郊浚都也祥符縣北有浚水故謂浚儀有寒泉坂李氏曰一云浚水出浚儀東經邶城入濟玉海云按毛傳浚衛邑干旄云在浚之都下邑曰都當以在濮陽者為正按濮陽縣今為直隸大名府開州祥符縣今屬河南開封府即漢之浚儀古開封縣亦併入焉雄雉篇雉韓詩章句云雉耿介之鳥朱傳云雉野鷄雄者有冠長尾身有文采善闘爾雅云鷂雉鷮雉鳪雉鷩雉秩秩海雉鸐山雉雗雉鵫雉雉絶有力奮伊洛而南素質五采皆備成章曰翬江淮而南青質五采皆備成章曰鷂南方曰􅔧東方曰鶅北方曰鵗西方曰鷷雉之暮子為鷚易曰離為雉注取其有文章書曰日月星辰山龍華蟲注華蟲鷩雉也楊烱冕服議云雉身被五采象聖人體兼文明左傳郯子云少皥為鳥師而鳥名五雉為五工正利器用正度量夷民者也大戴禮云正月雉震雊震也者鳴也呴也者鼓其翼也正月必雷雷不必聞惟雉為必聞之春官大宗伯云士執雉士相見禮云贄冬用雉注取其耿介交有時别有倫也月令云孟冬雉入水為蜃季冬之月雉雊雞乳曲禮云祭宗廟雉曰疏趾運斗樞云璣星散為雉蔡邕月令章句云雷在地中雉性精剛故獨知之應而鳴也化書云雉不再合信也山海經云小華之山其鳥多赤鷩可以禦火孟山鳥多白雉禽經云鵻上無尋鷚上無常雉上有文鷃上有赤莊子云澤雉十步一啄百步一飲不蘄畜於樊中徐爰射雉賦注云雉一界之内要以一雄為主餘者雖衆莫敢鳴雊儁異之雉不但欲擅一場又挾兩雌埤雅云雉死耿介妒壟䕶彊雖飛不越分域南方之物陶氏謂丙午日不可食明主于火也雉飛若矢一徃而墮雉鷄類也不能逺飛崇不過丈修不過三丈故雉高一丈長三丈也雅翼云雉應義氣其鳴以頸相勾按古多云雉有十四種今以爾雅所釋計之鷂雉即江淮而南青質五采者王后揄狄刻繒為其形而采畫之以為文章鷮雉即詩所云有集維鷮者鳪雉雉之黄色鳴自呼者鷩雉釋名云鷩雉之憋惡者其耿介甚于他雉似山鷄而小背上黄腹下赤項綠色鮮明禮鷩冕七章之服畫之盖取耿介與王后三翟異也秩秩海雉如雉而黑在海中山上鸐山雉尾長者俗呼山鷄禽經云首有采毛鄭注周禮云翟雉名然惟此雉稱鸐則簡兮言左手秉翟者此雉之羽也雗雉鵫雉郭云今白鷯也亦名白雉白雉古以為瑞周時越裳獻之抱朴子云白雉有種南越尤多則此雗即越裳所獻者也翬即斯干所謂如翬斯飛者􅔧鶅鵗鷷四方雉名除奮鷚可通諸雉但可得十二種耳杜預注左傳以翟為南方之雉與爾雅異予謂左傳五雉未聞其名畧而不說可也匏有苦葉篇匏說文云匏瓠也从包从夸聲包取其可包藏物也古今注云匏瓠也壺蘆瓠之無柄者瓠有柄者懸瓠可以為笙曲沃者尤善秋乃可用之則漆其裏瓢亦瓠也瓠其緫瓢其别也埤雅云長而瘦上曰瓠短頸大腹曰匏傳云匏謂之瓠誤矣盖匏苦瓠甘復有長短之殊定非一物也子曰吾豈匏𤓰也哉焉能繫而不食繫而不食以苦故也國語叔向曰苦匏不材于人共濟而已陸疏云匏瓠也葉小時可為羮又可淹煑極美故詩曰幡幡瓠葉采之烹之今河南及揚州人恒食之八月中堅強不可食故云苦葉詩緝云匏經霜其葉枯落然後乾之腰以渡水按廣雅說文古今注陸璣疏通云匏瓠也惟陸農師云長而瘦上曰瓠短頸大腹曰匏其兩形之别出于農師創見考諸書惟瓠甘匏苦為可明耳然本草有苦瓠唐本注謂之苦瓠􅕕復非瓠中之苦者瓠中之苦者疑是匏也陸疏似以甘瓠為匏非也盖瓠為揔名甘者可食嘉魚稱甘瓠纍之是也苦者佩以渡水此詩匏有苦葉是也入藥者名苦瓠􅕕夏末始實秋中方熟取以為器經霜乃堪無柄者名壺蘆七月稱八月斷壺是也有柄者懸瓠潘岳云河汾之寳是也小者名瓢食之勝瓠陶貞白所言是也細腰者名蒲盧淮南子云百人抗浮是也匏亦可通名壺鶡冠子云中流失船一壺千金軌少儀云祭左右軌范乃飲注云周禮大御祭兩軹祭軓乃飲軓與軹于車同謂轊頭也軓與范聲同謂式前也疏式前之軓車旁着凡或作範字即詩濟盈不濡軓亦車旁凡與此同也若轂末之軌則車旁着九此經左右軌是也其車轍亦謂之軌亦車旁着九則考工記經途九軌與此字同而事異也周禮太馭祭兩軹祭軓注軹謂兩轊軓車前式也輈人云軓前十尺而䇿半之注軓是軓法也謂輿三面之材輢式之所尌持車正也禮書云車制輿在下輢在兩相式在前軫在後較則輢上出式也軹則横植于輢者也轛則横植于式者也已上釋式前之軓考工記輪人為輪五分其轂之長去一以為賢去三以為軹鄭司農云賢大穿也軹小穿𤣥云凡大小穿皆謂金也禮書云軹轂末也亦謂之轊又謂之軌輿人三分較圍去一以為軹圍三分軹圍去一以為轛圍則軹又輢之横植者與轂末之軹不同此釋轂末之軓匠人云國中經涂九軌注軌謂轍廣乘車六尺六寸旁加七寸凡八尺是謂轍廣禮書云車迹為轍轍廣為軌左傳曰下而視其轍此車迹也考工記曰經途九軌此轍廣也此釋車迹之軌按軓字从車从凡音范在式前毛公釋此軓云由輈以上為軓是也軌字从車从九音龜美反轍廣也朱子注云車轍是也轂末亦謂之軌同龜美反一名軹一名轊是轍之小穿羅中行云車輪廣狹髙下皆定于軌軌同則轍迹亦同後人因謂車轍亦曰軌曲禮塵不出軌以髙下言中庸車同軌以廣狹言盖車輪崇六尺六寸軌居輪中若濡軌則水涉三尺三寸此謂轂末之軌也予謂軌軓二字書者易混式前轂末二處皆水可濡孔仲達不知軹亦名軌乃謂少儀字誤朱子但取軌牡叶韻而不知軌之為軹遂以車轍釋之轍迹特車行之見于地者豈可濡乎若詩取叶韻當從羅氏為長鴈夏小正云正月鴈北鄉鄉者何也鄉其居也鴈以北方為居何以謂之為居生息長焉爾九月遰鴻鴈遰徃也周禮六摯大夫執鴈又云菭菹鴈醢又曰鴈宜麥儀禮士相見曰下大夫相見以鴈飾之以布注鴈取其知時飛翔有行列也士昏禮云下達納采用鴈執鴈請問名納吉用鴈請期用鴈注用鴈為贄者取其順隂陽徃來周書曰白露之日鴻鴈來鴻鴈不來逺人背畔小寒之日鴈北鄉鴈不北鄉民不懷至爾雅云鳬鴈醜其足蹼其踵企郭璞曰脚指間有幙蹼屬相著飛則脚跟企直春秋說題辭云鴈之言鴈鴈起聖以招期知晚蚤故鴈南北以陽動也禽經云鳱以水言自北而南􅦐以山言自南而北春秋繁露云凡贄大夫用鴈有類長者在民上必有先後鴈有行列故以為贄吕氏春秋云仲秋之月候鴈來季秋之月候鴈來許慎注云候時之鴈從北漠中來南過周雒之彭蠡八月來者其父母也其子羽翼穉弱未能及之故九月來過周雒方言云自關而西謂鴈􅕯鵝南楚之外謂之鵞或謂之鶬􅕯古今注云鴈自河北渡江瘦瘠能髙飛不畏繒繳江南沃饒每至還河北體肥不能髙飛嘗啣蘆長數寸以防繒繳淮南子云鴈從風而飛以愛氣力物類相感志云大曰鴻小曰鴈陽鳥也夜宿洲中鴻在内鴈在外遂更驚避備狐與人之捕已山海經云鴈門山鴈出其間在髙栁北本草衍義云鴈得中和之氣熱則即北寒則即南以就和氣所以為禮幣者一取其信二取其和埤雅云鴈行斜步側身故莊子謂士成綺鴈行避影而問老子一名朱鳥法言曰能來能徃者朱鳥之謂與雅翼云今北方有鴈似鴻而小秋深乃來來則霜降河北謂之霜信旦淮南子云日至於曲阿是謂旦明周禮雞人掌夜呼旦以嘂百官妻儀禮云夫妻牉合也禮記云天子之妻曰后諸侯曰夫人大夫曰孺人士曰婦人庶人曰妻又内則云聘則為妻奔則為妾白虎通云妻者齊也與夫齊體自天子下至庶人其義一也釋名云夫妻匹敵之義也士庶人曰妻春秋漢含孳云妻象大隂臣法金位水火交感隂陽以設夫婦象也荀子云天子無妻告無匹也氷說文云氷水堅也風俗通云積氷曰凌氷壯曰凍氷流曰澌氷解曰泮易坤卦初六履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅氷也易通卦驗云大雪魚負氷鄭𤣥注曰負上近水也周禮云淩人掌氷十二月令斬氷春始治鑑凡内外饔之膳羞鑑焉凡酒漿之酒醴亦如之祭祀共氷鑑賔客共氷大䘮共夷槃夏頒氷掌事月令云孟冬水始氷地始凍仲冬氷益壯地始坼季冬氷方盛水澤腹堅命取氷孟春東風解凍魚上氷仲春天子乃獻羔開氷先薦寢廟左傳申豐云古者日在北陸而藏氷西陸朝覿而出之其藏氷也深山窮谷固隂沍寒於是乎取之其出之也朝之禄位賔食䘮祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災獻羔而啓之火出而畢賦自命夫命婦至于老疾無不受氷山人取之縣人傳之輿人納之隸人藏之夫氷以風壯而以風出藏之也周用之也徧則冬無愆陽夏無伏隂春無凄風秋無苦雨雷出不震無災霜雹癘疾不降民不夭札韓詩說云氷者窮谷隂氣所聚不洩則結而伏隂友說文云友愛也同志為友釋名云友有也相保有也鄭康成云同師曰朋同志曰友禮記云上交不謟下交不瀆孝經云士有爭友則身不離于令名韓詩外傳云知可以砥行可為輔弼者人友也白虎通云朋友之道有四近則正之逺則稱之樂則思之患則死之六家詩名物疏卷十
