body:
  text: 六家詩名物疏卷十七明馮復京撰國風衛二氓篇氓孟子疏云周官制地之法六鄉以教為主故其地為郊民則謂之民以其近主而有知也六遂以耕為主故其地為野而民則謂之氓以其逺主而無知也周禮遂人注變民言甿異外内也甿猶懵懵無知貌楊用修云氓之為字从民从亡流亡之民也周禮凡治野以下劑致甿以田里安甿以樂昬擾甿以土宜教甿又云新氓之治注新徙来者也若是本國之民已受田矣何必以田里安之已安土矣何必以土宜教之乎以詩與孟子證之尤可驗詩曰氓之蚩蚩抱布貿絲来即我謀送子渉淇至于頓丘此盖氓之離其本土而滛于外州者也孟子陳相自楚之滕願受一㕓而為氓此蓋去其本土而占籍于他國者也又曰天下之民皆悦而願為之氓若是本國何得云天下之民若是本民又何得稱氓乎布傳云布幣也釋名云布布也布列衆縷為經以緯横成之也又太古衣皮女工之始始于是施布其法使民盡用之也説文云布枲織也漢書云太公以布為貨廣二尺二寸為幅長四丈為疋王制云布帛精麤不中數幅尺廣狹不中量不鬻于市郊特牲云疏布之尚反女功之始也玉藻云以帛裏布非禮也周禮載師宅不毛者有里布鄭司農云里布者布參印書廣二寸長二尺以為幣貿易物詩云抱布貿絲抱此布也元命包云須女四星主布帛按孔疏云此布幣謂絲麻布帛之布予謂毛以布為幣本不誤但布不可以兼帛耳頓丘爾雅云丘一成為敦丘注成猶重也周禮曰為壇三成今江東呼地髙者為敦疏言丘上更有一丘相重累者名敦丘詩送子渉淇至于頓丘是也釋名云一頓而成丘無上下小大之殺也地里志云東郡頓丘師古曰以丘名縣也水經注淇水轉逕頓丘北又屈逕頓丘西蘇代約燕王云决宿胥之口魏無虛頓丘竹書紀年云晉定公三十一年城頓丘一綂志直𨽻大名府清豐縣古頓丘衛邑漢為頓丘縣地屬東郡晉置頓丘郡後廢古城在縣西南二十五里媒周禮媒氏掌萬民之判令男三十而娶女二十而嫁中春之月令㑹男女凡嫁子娶妻入幣純帛無過五兩禮記曰男女非有行媒不相知名國策云周地賤媒為其兩譽也之男家曰女美之女家曰男美然而周之俗不自為取妻且夫處女無媒老且不嫁舎媒而自衒敝而不售順而無敗售而不敝者惟媒而已矣説文云媒謀也謀合二姓秋爾雅云秋為白藏注氣白而收藏書云分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋書大傳云西方者何也鮮方也鮮訊也訊者始入之貌始入者何以謂之秋秋者愁也物方愁而入故曰西方者秋也鄉飲酒義云秋之為言揫也揫之以時察守義者也月令云孟秋之月日在翼昏建星中旦畢中其日庚辛其帝少皥其臣蓐收其蟲毛其音商律中夷則涼風至白露降寒蟬鳴鷹乃祭鳥用始行戮天地始肅不可以贏仲秋之月日在角昏牽牛中旦觜觹中律中南吕盲風至鴻雁来𤣥鳥歸羣鳥養羞日夜分雷始收聲蟄蟲坏戸殺氣浸盛陽氣日衰水始涸季秋之月日在房昏虚中旦栁中律中無射鴻雁来賔爵入大水為蛤鞠有黄華豺乃祭獸戮禽是月也霜始降則百工休乃命有司曰寒氣總至民力不堪其皆入室艸木黄落蟄蟲咸俯在内皆墐其戸夏小正云七月秀雚葦湟潦生萍漢案戸八月丹鳥羞白鳥蚊蚋辰則伏房星鴽為鼠九月内火心星素問云秋三月此謂容平天氣以急地氣以明注云萬物夏長華實以成容狀至秋平而定也尸子云秋為禮西方為秋秋肅也萬物莫不禮肅敬之至也漢書魏相奏云西方之神少昊乗兊執矩司秋月令注云孟秋日月會于鶉尾仲秋日月會于夀星季秋日月㑹于大火垝垣莊子云鵲上城之垝司馬彪曰垝最髙危限之處釋名云垣援也人所依阻以為援衛者也禮書云垣宫室之外牆釋文曰卑曰垣復闗寰宇記云澶州臨河縣復闗城在南黄河北阜也復闗隄在南三百步自黎陽下入清豐縣界一統志復闗隄在直𨽻大名府開州城西南古黄河岸北衛詩以望復闗即此筮繫辭云大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後掛天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸物而長之天下之能事畢矣洪範云乃命卜筮曰貞曰悔占用二衍忒禮記云龜為卜筴為筮疑而筮之則弗非也又云孟冬命太史釁龜筴又云天子無筮諸侯有守筮周禮云太卜掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四筮人辨九筮之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫詞八曰巫參九曰巫環以辨吉凶凡國之大事先筮而後卜上春相筮凡國事共筮鄭魴禹穴碑云伏羲得神蓍而定皇策世本云巫咸作筮古史考云庖犠氏作始有筮其後殷時巫咸善筮鳩傳云鳩鶻鳩也爾雅鶌鳩鶻鵃舎人曰今之班鳩某氏曰春秋云鶻鳩氏司事春来冬去孫炎曰一名鳴鳩月令云鳴鳩拂其羽郭璞曰似山鵲而小短尾青黒色多聲今江東亦呼為鶻鵃本草云鶻嘲南北揔有似鵲尾短黄色在深林間飛翔不逺廣雅云鶻鵃鷁鳩也埤雅云鶌鳩一名鳴鳩一名鷽鳩莊子所謂蜩與鷽鳩笑之者也多聲故名鳴鳩鳴鳩小物决起而飛搶榆枋時則不至控于地而已矣陸璣云鶻鳩一名班鳩盖班鳩似鵓鳩而大鵓鳩灰色無繡項陰則屏逐其匹晴則呼之語曰天將雨鳩逐婦者是也班鳩項有繡文班然故曰班鳩與此鶻鳩全異璣之言非今此鳥喜朝鳴故曰鶻嘲也周書時訓云榖雨又五日鳴鳩拂其羽鳴鳩不拂其羽國不治兵許叔重云鳴鳩奮迅其羽直刺上飛數千丈入雲中案本草言鶻嘲飛翔不逺而許叔重謂直入雲中豈所見各異耶莊子所云與本草合則許說非也葚古今注云桑實為椹爾雅云桑㸤有葚梔郭璞曰㸤半也舎人云桑樹一半有葚半無葚為梔陳藏器云椹利五藏通血氣久服不饑本草圗經云椹有白黒二種暴乾皆主變白髪傳云鳩食桑葚過則醉而傷其性王盤農書云荆桑多椹魯桑少椹嵗爾雅云載嵗也夏曰嵗商曰祀周曰年唐虞曰載郭璞曰嵗取嵗星一次廣雅云嵗遂也乾鑿度孔子云八卦用事各四十五日而備嵗事後漢志云日周于天一寒一暑四時備成萬物畢改攝提遷次青龍移辰謂之嵗鄭𤣥云中數曰嵗朔數曰年埤雅云於文歩戍為嵗嵗騎兩稔故步戍至戍謂之嵗也吕覽云后益作占嵗帷裳周禮王后之重翟厭翟安車皆有容盖註鄭司農云容謂幨車山東謂之裳帷或曰幢容詩正義云以幃障車之旁如裳以為容飾故或謂之帷裳或謂之童容其上有盖四旁垂而下謂之幨故雜記曰其輤有裧注云裧謂鼈甲邊縁是也然則童容與襜别司農云謂襜車者以有童容上必有襜故謂之云襜車也此惟婦人之車飾為然故士昬禮云婦車亦如之有襜是也婦說文云婦服也從女持帚洒掃也公羊傳云稱婦有姑之辭周禮九嬪掌婦學之法以教九御婦徳婦言婦容婦功家語云無專制之義有三從之道㓜從父兄既嫁從夫夫死從子言無再醮之端教令不出於閨門事在共酒食而已無閫外之非儀也不越境而奔䘮事無擅為行無獨成叅知而後動可驗而後言晝不逰庭夜行以火所以效匹婦之徳也左傳云女待人婦義事也岸爾雅云望厓洒而髙岸疏望視也厓水邊也洒水深也言視水邊之厓其下水深其厓髙峻者名岸又云重崖岸泮傳云泮坡也朱傳云泮涯也髙下之判也總角内則云男女未冠笄者總角衿纓注云總角收髪結之莆田傳云總角聚兩髦也竹竿篇佩釋名云佩倍也言非一物有倍貳也有珠有玉有容刀有帨巾有觽佩之屬也禮記云古之君子必佩玉右徵角左宫羽趨以采齊行以肆夏周還中規折還中矩進則揖之退則揚之然後玉鏘鳴也故君子在車則聞鸞和之聲行則鳴佩玉是以非辟之心無自入也君在不佩玉注云謂世子左結佩右設佩居則設佩朝則結佩齊則綪結佩而爵鞞凡帶必有佩玉惟䘮否佩玉有衝牙君子無故玉不去身君子于玉比徳焉天子佩白玉而𤣥組綬公侯佩山𤣥玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玟而緼組綬孔子佩象環五寸而綦組綬又云子事父母左右佩用左佩紛帨刀礪小觽金燧右佩玦捍管遰大觽木燧婦事舅姑左佩紛帨刀礪小觽金燧右佩箴管線纊施縏袠大觽木燧男女未冠笄者皆被容臭又云主佩倚則臣佩垂主被垂則臣佩委左傳云佩衷之旗也大戴禮云下車以佩玉為度上有雙衡下有雙璜衝牙玭珠以納其間琚瑀以雜之三禮圗云凡玉佩上有雙衡衡長五寸博一寸下有雙璜璜徑三寸衝牙蠙珠以納其間上下為衡半璧為璜璜中横以衝牙以蒼珠為瑀孔頴達云佩玉上繫于衡下垂三道穿以蠙珠前後下端垂以璜中央下端垂以衝牙白虎通云所以必有佩者表意見所能故修道無窮即佩環能本道徳即佩琨能决嫌疑即佩玦是以見其所佩即知其能若農夫佩其耒耜工匠佩其斧婦人佩其鍼縷也蔡謨毛詩疑字議云佩者服用之稱珮者玉器之名稱其服用則字從人名其器則字從玉禮書云衡以平其心璜以中其徳琚欲其有所安牙欲其有所制佩奚適而非道耶古有徳佩有事佩徳佩則左右皆玉事佩則左紛帨右玦捍之類左佩皆五右佩皆六以左陽而竒右陰而偶故也左佩者小右佩者大以左手不如右強故也詩曰佩玉之儺佩玉瓊琚衛之南子環佩璆然阿谷之女佩璜而澣皆婦人佩也其等衰不可考或亦視其夫而為之度與檜爾雅云檜柏葉松身禹貢云荆州貢杶幹栝柏注柏葉松身曰栝字說云檜栢葉松身則葉與身皆曲樅松葉柏身則葉與身皆直樅以直而從之檜以曲而㑹之雅翼云檜一名栝性耐寒其材大可為舟及棺槨左傳稱棺有翰檜而淇水檜楫松舟也今人亦謂之圎柏以别于側柏又有一種别名檜柏不甚長其枝葉乍檜乍柏庭宇植之以為玩楫易云剡木為楫書云若濟巨川用女作舟楫説文云楫舟櫂也方言楫謂之橈或謂之櫂所以隠櫂謂之􅀢所以懸櫂謂之緝釋名云楫㨗也撥水舟行㨗疾也淮南子云七尺之楫動大船者因水為資松書云青州厥貢鈆松怪石禮記云其在人也如松柏之有心也貫四時不改柯易葉左傳太叔云部婁無松柏禮斗威儀云君乗木而王其政平則松為常生莊子云天寒既至霜雪既降吾是以知松柏之茂史記云松柏為百木長也而守宫闕𤣥中記云松脂淪入地中千嵗為茯苓本草云松脂一名松膏一名松肪松花一名松黄太平廣記云五鬛松皮不鱗俗謂孔雀三鬛松也松命根下遇石即偃花木考云松有二種惟五葉者結子芄蘭篇芄蘭爾雅云雚芄蘭郭云蔓生斮之有白汁可啖陸璣云一名蘿藦幽州人謂之雀瓢蔓生葉青緑色而厚摘之白汁出食之甜脆䰞為茹滑美其子長數寸似瓠子箋云芄蘭柔弱恒蔓延於地有所依縁沈栝云芄蘭之支支莢也芄蘭生莢支出于葉間垂之如觽狀其葉如佩韘之狀支支石經作枝説文云木别生條也童子說文僮未冠也从人童聲又云男有罪曰奴奴曰童女曰妾从辛重省内則云成童舞象學射御注云成童十五以上按說文僮童二字有辨今經傳通作童觽禮記云子事父母婦事舅姑左佩小觽右佩大觽注觽貌如錐以象骨為之說文云觽佩角銳耑可以解結毛云成人之佩也劉向云治煩决亂者佩觽容箋云容刀也孔仲達云容飾之刀考工記曰桃氏為刅注刅刀劍之屬少儀云刀卻刅授潁削授拊釋名云刀到也其末曰鋒若鋒刺之利也其本曰環形似環也佩刀在佩旁之刀也或曰容刀有刀形而無刅備儀容而已禮書云直而本環者刀曲而本不環者削洞冥記云黄帝采首山之銅始鑄為刀春秋繁露云刀在右白虎之象也遂箋云遂瑞也爾雅云璲瑞也郭璞云玉瑞也孔氏云大東云鞙鞙佩璲璲本所佩之物又云禮以玉為瑞信其官謂之典瑞正謂所佩之玉帶釋名云帶蔕也著于衣如物之繫蔕也大戴禮云黄帝黼黻衣大帶晉語云内子為大帶禮記云子事父母韠紳搢笏婦事舅姑笄緫衣紳又云天子素帶朱裏終辟注辟讀如禆以繒采飾其側也而素帶終辟注謂諸侯不朱裏合素為之下天子也大夫素帶辟垂禆其紐及末士練帶率下辟率繂也士以下皆禪不合而繂積禆其末而已居士錦帶弟子縞帶幷紐約用組三寸約帶紐組之廣長齊于帶紳長制士三尺有司二尺有五寸有司府史之屬子游曰參分帶下紳居一焉紳韠結三齊革帶博二寸凡佩繫于革帶大夫大帶四寸雜帶雜猶飾也即上之禆君朱緑上以朱下以緑終之大夫𤣥華華黄色大夫禆垂内以𤣥外以華士緇辟二寸再繚四寸士禆垂之下外内皆以緇大夫以上以素皆廣四寸士以下廣二寸再繚之凡帶有率無箴功凡帶有司之帶無箴功則不禆之案古者帶有二左傳帶裳幅舄之帶革帶也又云鞶厲游纓鞶大帶也革帶用以繫佩韍然後加以大帶笏搢于二帶之間天子至士大帶皆合帛為之或以素或以練其禆飾亦别盖朱正陽之色緑少陽之雜天子諸侯體陽而兼乎下故禆以朱緑𤣥與緇者陰之體華者文之成大夫體陰而有文故飾以𤣥華士則體陰飾以緇而已於大夫言帶四寸於士言紳三尺則推而上可知故此篇箋云垂紳帶三尺韘决沓傳云韘玦也能射御則佩韘說文云射决也所以拘弦以象骨韋系著右巨指周禮繕人掌王之用抉拾注抉挾矢時所以持弦飾也著右手巨指士䘮禮曰抉用正王棘若檡棘則天子用象骨與禮記曰子事父母右佩玦捍鄉射禮袒决注决猶闓也以鈎弦闓體賈公彦云抉諸侯及大夫生用象死用棘天子死生皆用象取其滑箋云韘之言沓所以彄沓手指大射朱極三注極猶放也所以韜指利放弦也以朱韋為之三者食指將指無名指無極放弦契于此指多則痛小指短不用士䘮禮纊極二注生者以朱韋為之而三死用纊又二明不用也禮書云考之射禮右巨指著决所以鈎弦食指中指無名指著沓所以放弦左臂著拾所以遂弦韘謂之極以其中于指也謂之沓以其沓于指也毛氏許慎以韘為决誤矣案玦决抉三字實一物也沓極二名亦一物也韘之為玦許叔重亦以為然韘之為沓則鄭氏一家之說而已孔仲逹云鄭以禮無以韘為玦者故易之為沓然則以韘為沓又出何禮文耶六家詩名物疏卷十七
