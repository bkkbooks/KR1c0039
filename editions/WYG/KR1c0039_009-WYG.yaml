body:
  text: 六家詩名物疏卷六明馮復京撰國風召南二采蘋篇蘋爾雅云苹萍其大者蘋郭曰水中浮萍江東謂之薸陸疏云水上浮萍麄大者謂之蘋小者曰蓱季春始生可糝蒸為茹又可苦酒淹以就酒本草唐本注水萍有三種大者名蘋水中又有荇菜亦相似而葉圓小者水上浮萍吳氏本草云水萍一名水廉生池澤水上葉圓小一莖一葉根入水五月華白陳藏器云蘋葉圓濶寸許葉下有一㸃如水沫一名芣菜詩緝云蘋可茹萍不可茹郭氏以小萍為大蘋誤雅翼云蘋葉正方中拆如十字根生水底葉敷水上不若小浮萍之無根而漂浮也故韓詩云沈者曰蘋浮者曰薸薸音瓢即小萍也蘋亦不沈但比萍則有根不浮游耳五月有華白色故謂之白蘋吕氏春秋曰菜之美者崑崙之蘋萍焉楚王渡江得萍實天問曰靡萍九衢本草稱水萍皆得萍名而實蘋也盖實非無根者所能生枝葉九道尤大于蘋矣陶隱居云水萍非今浮萍子詳著之使覽者無惑按周處風土記萍蘋芹菜之别名此説非是芹别一物矣蘋又有水陸之異柳惲所謂汀洲采白蘋者水生而似萍者也宋玉所謂起于青蘋之末者陸生而似莎者也濵孔氏曰釋水云滸水涯孫炎曰涯水邊説文云浦水濵廣雅云浦涯然則滸濵涯浦皆水畔之地同物而異名也藻傳云藻聚藻也箋云古者婦人先嫁三月祖廟未毁教于公宫祖廟既毁教于宗室教以婦德婦言婦容婦功教成之祭牲用魚芼用蘋藻所以成婦順也蘋之為言賓也藻之為言澡也婦人之行尚柔順以自潔清故取名以為戒爾雅云莙牛藻疏莙一名牛藻藻之葉大者也詩召南云于以采藻左傳蘋蘩蕰藻之菜以此草好聚生故言蕰藻蕰訓聚也陸氏疏云藻生水底有二種其一種葉如雞蘇莖大如箸長四五尺其一種莖大如釵股葉如蓬蒿謂之聚藻聚生故也又云扶風人謂之藻聚為發聲此二藻皆可食煑熟挼去腥氣米麵糝蒸為茹嘉美揚州饑荒可當榖食埤雅云韓詩曰沈者曰蘋浮者曰藻盖藻萍類也似槐葉而連生生道㫄淺水中與萍雜至秋則紫今俗謂之馬薸亦呼紫薸故曰于以采藻于彼行潦盖非蒲藻之藻萍藻之藻浮蒲藻之藻沈草木疏以為葉似蓬蒿莖如釵股而大謂之聚藻類矣雅翼云藻横陳于水如自澡濯若流水之中隨波衍漾莖葉條暢尤為可喜故采藻于行潦也有自然之文古者象服有藻火之屬又畫于棁以為飾亦以厭火行潦説文云潦雨水楊慎云行音杭潦音澇謂水澇之年大道上積水淮南子云潦水旬月不雨則涸筥方言云箄簍籅䈱􅞠也江􅃆之間謂之籅趙代之間謂之䈱淇衛之間謂之牛筐􅞠其通語也􅞠小者南楚謂之簍自關而西秦晉之間謂之箄􅞊南楚謂之筲趙魏之間謂之去􅞊禮書曰説文曰筥筲也宋魏之間謂箸筩為筲則其制圓而長矣米筥盖亦類此周禮舎人共其筥米掌客上公米百二十筥侯伯百筥子男八十筥聘禮君使卿歸饔餼賔上介米百筥筥半斛夫人使大夫歸饔餼賔上介米八筐士介六筐筐五斛夫百筥以多為榮而所寔少八筐六筐以少為質而所實多則筐大而筥小矣于文筐正而筥圍之則筐方而筥圓矣錡釋文錡三足釜也説文云江淮之間謂釜為錡方言云鍑江淮陳楚之間謂之錡或謂之鏤釜毛傳云無足曰釜方言曰釜自關而西或謂之釜或謂之鍑易説卦云坤為釜三禮圖云釡制度云三斛或云二斛古史考云黄帝始造釜甑火食之道就矣禮書云詩以錡釜湘菜以釜􅑄烹魚周禮儀禮以鑊烹牲則鑊又大于釜箋云烹蘋藻者于魚湇之中是鉶羹之芼宗傳云大宗之廟周禮太宰云宗以族得民大傳云庻子不祭明其宗也别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也敬宗尊祖之義也有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者公子是也公子有宗道公子之公為其士大夫之庻者宗其士大夫之適者公子之宗道也白虎通宗尊也為先祖主族人之所尊也宗其為始祖後者為大宗此百世之所宗也宗其為髙祖後者五世而遷者也髙祖遷于上宗則易于下宗其為曾祖後者為曾祖宗宗其為祖後者為祖宗宗其為父後者為父宗以上至髙祖宗皆為小宗以其轉遷别于大宗也别子者自為其子孫為祖繼别也各自為宗小宗有四大宗有一凡有五宗人之所親僃矣儀禮注疏諸侯之適子適孫繼世為君第二子以下不得禰先君故稱别子也此别子子孫為卿大夫立此别子為其後世之始祖又非君之親或是異姓始來此國者亦謂之别子也禮書云公子不得禰先君故為别子而繼别者族人宗之為大宗逺雖至于絶屬猶為之服齊衰三月母妻亦然庻子不得祭祖故諸兄弟宗之為小宗以其服服之大宗逺祖之正體則一而已小宗髙祖之正體其别有四諸侯之公子上不得宗君下未為後世之宗必有以綂之君無適昆弟使庻昆弟一人為宗統公子禮如小宗故曰有小宗而無大宗君有適昆弟使之為宗以統公子不復立庻昆弟為宗故曰有大宗而無小宗公子一而已無公子可宗亦無公子宗之故曰有無宗亦莫之宗當其為宗則宗子統族人于外主婦統族婦于内死雖殤也必䘮以成人齒雖七十也主婦不可闕居雖異邦也正祭不可舉妻死雖母在也禫不可屈尊與出嫁者不敢降其服賢者不敢干其任貴者不敢擅其祭衆車徒不敢以入其門凡以尊正統而一人之情也惟其疾與不肖然後易之牖説文曰牖穿璧以木為交窓所以見日也在墻曰牖在屋曰窓朱子云牖下室西南隅所謂奥也又云古人廟堂南向室在其北東户西牖皆南向室西南隅為奥尊者居之所謂牖下者也凡廟皆南向而主皆西向邢昺云古者為室户不當中而近東則室南隅最為深隱故謂之奥而祭祀及尊者常處焉曲禮云人子居不主奥是也按傳云大夫士祭于宗廟奠于牖下箋云牖下户牖間之前祭不于室中者凡昏事於女禮設几筵於户外此其義也毛言奠于牖下則祭仍在室鄭則直謂祭于户外其義雖􅌞皆不以牖下為奥也至朱傳始斷以為奥矣甘棠篇甘棠爾雅云杜甘棠疏郭云今之杜棃下云杜赤棠白者棠舎人曰杜赤色名赤棠白者亦名棠然則其白者名棠其赤者為杜為甘棠為赤棠杕杜傳云杜赤棠是也陸疏云赤棠與白棠同耳但子有赤白美惡子白色為白棠甘棠也少酢滑美赤棠子澀而酢俗語云澀如杜是也赤棠木理韌亦可作弓幹雅翼云每棃有十餘子唯一子生棃餘者生杜通志云甘棠謂之棠棃其花謂之海棠花其實謂之海紅子孫楚杕杜賦序云棃有用為貴杜無用為賤字説云詩言蔽芾甘棠以杜之美言有杕之杜以棠之惡九域志召伯其棠樹在陜州府署西南隅括地志召伯廟在洛州夀安縣西北五里召伯聽訟甘棠之下周人思之不伐其樹後人懷其德因立廟有棠在九曲城東阜上今河南府宜陽縣按爾雅云杜甘棠又云杜赤棠白者棠盖杜其總名種有赤白之異其實白棠為甘棠而赤棠為杜也陸璣羅願之説可玩邢疏誤矣伯周禮云八命作牧九命作伯曲禮云五官之長曰伯是職方注職主也是伯分主東西者王制云二百一十國以為州州有伯注云凡長皆因賢侯為之殷之州長曰伯虞夏及周皆曰牧又曰八伯各以其屬屬於天子之老二人分天下以為左右曰二伯公羊傳云天子三公者何天子之相也天子之相則何以三自陜而東者周公主之自陜而西者召公主之一相處乎内按伯有五同名異職召伯之伯九命伯也有方伯則八命之牧也殷謂之州伯有牧下二伯則左傳云五侯九伯旄丘序云責衛伯者是也有伯爵則周禮七命之伯也有州里之伯内則所云州史獻諸州伯者也行露篇露釋名云露慮也覆慮物也詩含神霧云陽氣終白露為霜大戴禮云露隂陽之氣也隂氣勝則凝為霜雪陽氣勝則散為雨露月令孟秋白露降春秋元命包云霜以殺木露以潤草春秋緯云武露布文露沈列星圖曰天乳在氐北主降甘露五經通義曰和氣津液凝為露露從地出瑞應圖云甘露者美露也神靈之精仁瑞之澤其凝如脂其甘如飴一名膏露一名天酒董仲舒云露結珠而成甘結潤而成膏月令章句云露隂液曹植云氣之清者莫如露雀春秋運斗樞云摇光星散為雀易通卦驗云立夏雀子飛説文云雀依人小鳥崔豹云雀一名嘉賓言棲宿人家如賓客淮南子云季秋之月候鴈來賓雀入大水為蛤許慎注賓雀者老雀也棲宿人家堂宇之問有似賔客故謂之賓雀禽經云雀交不一雉交不再格物要論云雀觜頷皆黑通身毛羽褐色尾長二寸許指𤓰黄白埤雅云雀賦曰頭如顆䔉目如擘椒雀物之滛者䑕物之貪竊者故詩言雀角䑕牙以譬强暴西方之書曰雀浴沙受卵禽經曰雀以猜瞿今雀俛而啄仰而四顧所謂瞿也雅翼云雀小佳其小者黄口貪食易捕老者黠難取號為賔雀性極多欲至曛黑輙盲不能為巢穿屋居之力能勝燕或啣艾于燕巢中燕飛去則居之字通于爵飲器以為名象雀之形取其鳴節節足足也箋云雀之穿屋不角乃以咮按此雀卽依人小鳥凢緯書稱赤雀黄雀者瑞鳥也又有青雀禮記云前有水則載青旌是水鳥也永元中安息所獻者條枝大雀也並與此不同屋釋名云屋奥也其中温奥也大屋曰廡廡幠也幠覆也并冀人謂之庌庌正也屋之正大者也考工記葺屋三分瓦屋四分獄疏云鄭異義駁云獄者埆也囚證于角核之處周禮之圓土然則獄者核實道理之名臯陶造獄謂此也既囚證未定獄事未决繫之于圓土因謂圓土亦為獄此章言獄下章言訟司寇職云兩造禁民訟兩劑禁民獄對文則訟獄異故彼注云訟謂以財貨相告者獄謂相告以罪名是其對例散則通也此詩亦無財罪之異重章變文耳大司寇云以圜土聚敎罷民凡害人者寘之圜土而施職事焉以明刑耻之以兩造禁民訟入束矢于朝然後聽之以兩劑禁民獄入鈞金三日乃致于朝然後聽之司圜掌収教罷民凡害人者弗使冠飾而加明刑焉任之以事而収教之能改者上罪三年而舎中罪二年而舍下罪一年而舎凡圜土之刑人也不虧體其罰人也不虧財釋名云獄确也實确人情偽也又謂之牢言所在堅牢也又謂之圓土言築土之表墻其形圓也又謂之囹圄囹領也圄禦也言領録囚徒禁禦也急就章曰臯陶造獄廣雅云夏曰夏臺殷曰羑里周曰囹圄博物志云夏曰念室殷曰動止周曰稽留三代之異名也韓詩傳云鄉亭之繫曰犴朝廷曰獄元命包云為獄圓土象斗還合天文志云貫索貴人之牢勾圜十五星屬杓曰賤人之牢星實則囚多虚則開出䑕春秋運斗樞曰玉衡星散為䑕左傳云䑕晝伏夜動不穴于寢廟畏人故也吕氏春秋曰周鼎著䑕令馬履之謂其不陽也埤雅云䑕有齒而無牙性疑出入多不果故持兩端謂之首䑕又䑕類最壽俗謂之老䑕是也按䑕種類最多今畧疏之爾雅鼢䑕地中行者廣雅謂之鼹䑕方言謂之犂䑕者也鼸䑕以頰裏藏食大戴禮所謂田䑕也鼷䑕有螫毒博物志云䑕之最小者春秋所書食郊牛角者也鼶䑕似鼬之䑕也鼬䑕一名鼪今之䑕狼也鼩䑕似䑕而小東方朔云鼱鼩之襲狗者也鼫䑕五伎䑕即魏風之碩䑕鼨䑕豹文䑕終軍所識者也鼰䑕如䑕而大鼯䑕飛且乳者所謂飛生也説文似雞䑕也䑕似蝯蜼者也鼲可作裘今之鼦䑕也􅔺竹䑕也䶂胡地風䑕也又有栗䑕其毫可製筆沙䑕今之黄䑕也牙説文牙牡齒也象上下相錯之形釋名云牙植牙也隨形言之墉釋宮云墻謂之墉李廵曰謂垣墻也釋名云墉容也所以蔽隱形容也書大傳云天子賁墉諸侯疏杼注云賁大也言大牆正道直也疏衰也杼亦牆也衰殺其上不得正直新序云諸侯垣牆有黝堊無丹青之色淮南子云舜作室築牆茨屋辟地樹穀令民皆知去巖穴各有家室左傳叔孫豹云人之有牆以蔽惡也周禮牆厚三尺崇三之注云髙卑為率足以相稱禮書云詩曰崇墉言言易曰乘其髙墉則墉墻之髙者也儀禮于房室言墉于堂下言壁則壁墻之卑者也書有東序西序爾雅曰東西牆謂之序則序堂上之東西牆也詩曰之子于垣百堵皆作書曰既勤垣墉春秋傳曰子産使盡壞其舘之垣納車馬焉則垣宮室之外墻也考工記曰牆厚三尺崇三之則牆者垣墉之總名與羔羊篇羔説文曰羔羊子也羜五月生羔也􅧌六月生羔也羍七月生羔也䍮羊未卒歳也宗伯以禽作六摰卿執羔注羔取其羣而不失其類士相見禮上大夫相見以羔注云羔取其從帥羣而不黨春秋繁露云凢贄卿用羔羔有角而不用如好仁者執之不鳴殺之不嘷類死義者飲其母必跪類知禮者故羊之為言猶祥故以為贄禮記云羔裘緇衣以裼之論語緇衣羔裘鄭注云諸侯視朝之服禮記疏凡在朝君臣同服按羔裘古之禮服周禮王祀昊天上帝則服大裘而冕祀五帝亦如之鄭注黑羔裘也其五冕之服亦同用黑羔裘鄭注論語云羔裘諸侯視朝之服在朝君臣同服則卿大夫之朝服亦緇衣羔裘也凢裘人君用全其臣則褎飾為異鄭風云羔裘豹餙是也鄭注鄭風緇衣云居私朝之服者以卿士朝於天子服皮弁服其適治事之舘改服緇衣此私朝在天子宮内非謂緇衣羔裘為大夫燕居之服也朱子以私臆説詩云大夫燕居之服其釋檜風羔裘逍遥又云諸侯朝服彼此自相矛盾矣羔裘必用黑者衣裘同色裼既用緇則羔必是黑或云羔取其有禮黑取其合道以道行禮以禮成道先王之所尚也自宋人不考古喜變先儒之説故羅願以為羔裘用白素絲亦因羔裘之色此皆戲論今人束注疏於髙閣但習朱傳幾不知燕服朝服之别與羔裘為何色矣禮天子卒食𤣥端而居諸侯適小寢釋服鄭云釋服服𤣥端此𤣥端緇衣朱裳則羔裘乃天子諸侯之燕服也其卿大夫燕居之裘則用狐貉論語云狐貉之厚以居鄭注在家接賓客殆即所云䙝裘也陳祥道云古者行禮之裘必以羔與麛燕居之裘必以狐與貉雖戾禮家人君狐白視朝之㫖然亦以羔裘為禮服足破朱説矣羊説文曰羊祥也象頭角足尾之形孔子曰牛羊之字以形舉也羊在六畜主給膳也羊大則美故從大羸瘦也羊以瘦為病故羸從羊爾雅云羊角不齊觤角三觠羷羳羊黄腹絶有力奮禮記曰祭廟羊曰柔毛又云大夫無故不殺羊又云羊泠毛而毳羶周禮云羊人掌羊牲凡祭飾羔又云凡膳食羊宜黍又云冬行鱻羽膳膏羶春秋説題辭云羊祥也合三而生以養士也故羊髙三尺五行傳云視之不明則有羊禍尸子云大羊為羬六尺埤雅云羊性善羣故於文羊為羣犬為獨也羊每成羣要以一雄為主舉羣聽之易曰兊為羊兊隂在上故羊性前逆牛性前順詩曰羊牛下來先羊而後牛者晚出早歸常先于牛故也合璧事類云羊褐白黑三色亦有青者南人所罕見皮革周禮掌皮掌秋歛皮冬歛革遂以式法頒皮革于百工共其毳毛為氊以待邦事又云荆州其利齒革考工記攻皮之工函鮑韗韋裘函人為甲鮑人之事望而眡之欲其荼白也進而握之欲其柔而滑也卷而摶之欲其無迤也眡其著欲其淺也察其線欲其藏也韗人為臯陶釋名云皮被也被覆體也説文云獸皮治去其毛曰革革更也正義云對文則皮革異散文則通司裘曰大䘮飾皮車謂革輅去毛得稱皮明是有毛則稱革故攻皮之工有函鮑韗韋裘是皮革通言也爾雅云革中絶謂之辨革中辨謂之韏注辨中斷皮也韏復分平也又云東北之美者有斥山之文皮焉注虎豹之屬皮有文采者絲周禮云嬪婦化治絲枲又云典絲掌絲入而辨其物以其賈掲之掌其藏與其出以待興功之時頒絲于外内皆以物受之染人掌染絲又云㡛氏湅絲以涗水漚其絲七日去地尺暴之晝暴諸日夜宿諸井七日七夜是謂水湅注涚水以灰所泲水也宿諸井懸井中禮記云蠶事既登分繭稱絲受功春秋考異郵曰四月蠶餌絲紽緎緫爾雅云緎羔裘之縫也孫炎曰緎之為界緎郭璞曰縫飾羔裘之名禮書云大裘尚質羔裘有文毛氏曰古者素絲以英裘紽緫數也爾雅曰緎縫也孫炎曰界也盖羔裘以素絲為組施縫中以為英飾其界有緎有殺有縫其别為紽其聚為緫而又飾之以豹此所以與大裘異也孔氏云素絲為飾惟組紃耳若為線則所以縫裘非飾也雜記注云紃施諸縫若今之絛是有組紃施于縫巾之驗按裘毛必深厚其縫界之飾得外見者維組紃若絛耳錢氏云兩皮不易合故織白絲為紃施之縫中聯屬兩皮因以為飾據此言則仍是線非也鄒長倩曰五絲為䌰倍䌰為升倍升為緎倍緎為紀倍紀為緵倍緵為繸此乃自少之多自微至著也緵即緫字也以類求之則緎寡于緵紽宜又寡于緎盖絲之數耳毛傳云紽緫數也薛君章句亦云紽數名也其或以此與六家詩名物疏卷六
