body:
  text: 六家詩名物疏卷三十四明馮復京撰小雅南有嘉魚之什一南有嘉魚篇嘉魚水經注云裦水又東南得丙水口水上承丙穴穴出嘉魚常以三月出十月入穴口廣五六尺去平地七八尺泉縣注魚自穴下透入水穴口向丙故曰丙穴下注裦水故左思稱嘉魚出于丙穴任豫益州記云嘉魚似鱒蜀中謂之拙魚蜀郡山處處有之從石孔出大者五六尺雲南記云雅州丙穴出嘉魚似鯉鱗細嶺表録異云嘉魚形如鰽出梧州戎城縣江水口甚肥美最宜爲䱓每炙以芭蕉葉隔火蓋慮脂滴火滅耳本草嘉魚味甘溫食之令人肥健悅澤此乳穴中小魚常食乳水所以益人方輿勝覽云首有黒點謂照映星象相感而成長身細鱗肉白如玉其味自鹹虞衡志云嘉魚出梧火山下丙穴如小鰣魚多脂煎不假油蜀中丙穴亦出肥美相似埤雅云鯉質鱒鱗肌肉甚美食乳泉出于丙穴先儒言丙穴在漢中沔南縣北有乳穴二常以三月取之按嘉魚所産地不一大都蜀與南越之境也然皆云出自丙穴豈因嘉魚所出而通得此名耶若水經注所云丙穴則在今陜西漢中府沔縣境罩爾雅云篧謂之罩李巡曰篧編細竹以爲罩捕魚也孫炎曰今楚篧也孔仲達曰罩以竹爲之無竹則以荆故謂之楚篧陸佃云魚欲逸則罩之使入汕爾雅云罺謂之汕郭璞曰今之撩罟朱傳云以薄汕魚也陸氏云魚欲伏則汕之使出南山有臺篇臺爾雅云臺夫須陸璣云舊說夫須莎草也可爲簑笠故曰臺笠緇撮或云臺草有皮堅細滑緻可爲簦笠南山多有纂文曰臺一名山莎本草香附子即莎草根生田野二月八月採圖經云香附子交州者大如棗近道者如杏仁苗莖葉都似三稜根若附子周帀多毛今近道生者苗葉如薤而瘦根如筯頭大埤雅云莎草疏而無溫故从沙萊陸璣云萊草名其葉可食今兗州人烝以爲茹謂之萊烝杞陸璣云杞一名狗骨山材也其樹如樗理白而滑可以爲函及檢板其子爲木蝱可合藥曹氏云梓杞也枸陸璣云枸枳枸也木高大似白楊所在山中皆有枝柯不直子著枝端大如指長數寸噉之甘美如飴八九月熟江南特美今官園種之謂之木蜜本從南方來能敗酒若以爲屋柱則一屋之酒皆薄本草云枳椇味甘平一名木蜜其木皮溫唐本注云其樹徑尺葉如桑柘其子作房似珊瑚核在其端人皆食之古今注云枳椇子一名樹蜜一名木餳實形拳曲核在實外亦名白石白實木石木實廣志云葉似蒲柳子十一月熟樹乾者益美埤雅云多枝而曲飛鳥喜巢其上賦曰枳句來巢是也雅翼云古者人君燕食所加庻羞凡三十一物其果則有蔆椇棗栗榛柿瓜桃李梅杏楂棃又婦人之贄椇榛棗栗荆楚之俗亦鹽藏荷裹以爲冬儲今不以爲重賤者食之而已楰爾雅云楰鼠梓郭璞曰楸屬也今江東有虎梓陸璣云其樹葉木理如楸山楸之異者今人謂之苦楸曹氏云宫室之良材蓼蕭篇鞗革傳云鞗轡也革轡首也爾雅云轡首謂之革孔仲達云馬轡所靶之外有餘而垂者謂之革鞗皮爲之故云鞗革和詳見秦風鸞魯詩訓曰和設軾者也鸞設衡者也韓詩說曰在軾曰和在軛曰鸞毛傳云在軾曰和在鑣曰鸞干寳周禮注云和鸞皆以金爲鈴鸞者在衡和者在軾馬動則鸞鳴鸞鳴則和應舒則不鳴疾則失音故詩云和鸞雍雍言得其和也孔仲達云和亦鈴也以其與鸞相應和故載見曰和鈴央央是也埤雅云青鳳爲鸞鸞雌曰和後世作和鸞以象之湛露篇夜飲箋云夜飲之禮在宗室同姓諸侯則成之庻姓讓之則止燕禮無算爵無算樂宵則庻子執燭于阼階上司官執燭于西階上甸人執大燭于庭閽人爲大燭于門外賔醉奏陔遂出宗詳見斯干傳云夜飲必于宗室朱傳云蓋路寢之屬詩緝燕禮云膳宰具官饌于寢東注云寢路寢也當從朱氏彤弓篇彤弓傳云朱弓也以講德習射左傳寗武子云諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴禮記云諸侯賜弓矢然後專征伐孔疏云弓皆漆之以禦霜露彤弓周禮當唐弓大弓往體來體若一合七成規彤矢當周禮恒矢也色以赤者周之所尚饗周禮大行人云上公饗禮九獻侯伯七獻子男五獻大國之孤視小國之君掌客云上公三饗侯伯再饗子男一饗聘禮云公於賔再饗賔介皆明日拜於朝上介一饗大夫於賔一饗上介若食若饗禮記云凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之仲尼燕居云禮有九焉大饗有四焉兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象武夏籥序興陳其薦俎序其禮樂備其百官行中規還中矩和鸞中采齊客出以雍徹以振羽左傳云饗有體薦燕有折俎公當饗卿當燕王室之禮也又云享以訓共儉燕以示慈惠皇氏禮記注云饗有四種一是諸侯來朝天子饗之其牲則體薦體薦則房烝國語云王公立飫則有房烝其所云飫即謂饗也其禮亦有飯食故舂人云凡饗食共其食米則饗禮兼燕與食也二是王親戚及諸侯之臣來聘王饗之禮亦有飲食及酒其酌數亦當依命其牲折俎亦曰殽烝三是戎狄之君使來王委饗之四是饗宿衞及耆老孤子則以醉爲度儀禮疏云受賔聘享則於太廟饗食則于禰廟燕又在寢彌相親也周禮疏云饗禮九獻者謂後日王速賔賔來就廟中行饗饗者烹大牢以飲賔設几而不倚爵盈而不飲九獻者王酌獻賔賔酢主人主人酬賔酬後更八獻是爲九獻右傳云右勸也疏云謂設享禮勸其功箋云右之者主人獻之賔受爵奠于薦右既祭俎乃席末坐卒爵之謂也詩緝云右與宥侑通皆助也莊十八年左傳云王饗禮命之宥注以幣物助歡也僖二十五年二十八年皆云饗醴命宥是饗禮必有賜以爲宥而彤弓則宥之大者也醻傳云醻報也疏云爲享以報功箋云主人獻賔賔酢主人主人又飲而酌賔謂之酬孔氏云酬有二等既酢而酬賔者賔奠之不舉謂之奠酬至三爵之後乃舉向者所奠之爵以行之於後交錯相酬名曰旅酬謂衆相酬也按嚴坦叔云鄭以酬爲獻醻但酬酢是燕禮饗訓共儉爵盈不飲未必有酬酢此考之不詳也周禮掌客饗有九獻七獻五獻之節郊特牲云大饗君三重席而酢三獻之介君專席而酢但其禮之儉不若燕之四舉旅耳安得謂無酬酢耶菁莪篇莪爾雅云莪蘿陸璣云莪蒿也生澤田漸洳之處葉似邪蒿而細科生三月中莖可生食又可烝香美味頗似蔞蒿廣志云莪蒿廪蒿本草唐注云葉似白蒿花如瞿麥紅赤可愛子似王不留行黒色作角七月八月採蜀本圖經云葉似蛇床青蒿等子角似蔓青實黒秋熟所在皆有之陳藏器云䕲蒿生高岡宿根先于百草衍義云角蒿莖葉如青蒿開淡紅紫花花大約徑三四分花罷結子長二寸許微彎按莪蒿一名角蒿一名䕲蒿陸璣以爲生澤田陳藏器以爲生高岡其說之不同若此以詩文証之陵阿則高地也沚則水中也然則澤田高岡俱有莪矣百朋箋云古者貨貝五貝爲朋疏云漢書食貨志有五種之貝貝中以相與爲朋非總五貝爲一朋也食貨志云王莽居攝更作龜貝錢布之品大貝四寸八分以上二枚爲一朋直二百一十六壯貝三寸六分以上二枚爲一朋直五十幺貝二寸四分以上二枚爲一朋直三十小貝寸二分以上二枚爲一朋直十不盈寸二分漏度不得爲朋率枚直錢三是爲貝貨五品六月篇常傳云日月爲常周禮司常日月爲常巾車王乗玉路建太常十有二斿以祀大司馬教治兵王載太常司勛凡有功者銘書于王之太常覲禮天子乗龍載大旂象日月升龍降龍郊特牲云旂十有二旒龍章而設日月象天也鄭氏云春夏之田用大麾秋冬建太常王之自將建太常不自將建太白禮書云常有三辰升龍降龍設崇牙備弧矢弧以張縿也鄭氏謂崇牙者爲重牙以飾旒之側飾之以旄垂之以鈴考工記曰弧旌枉矢以象弧明堂位曰乗大輅載弧韣左傳曰錫鸞和鈴爾雅曰有鈴曰旂則太常之制可知已太常不特祀天至于拜日拜月祀方明禮四瀆禮山川秋治兵冬大閱皆載焉然常之三辰則北斗而已與衣服畫星辰不仝觀曲禮曰招摇在上穆天子傳曰天子葬盛姬建日月七星蓋旗以指物所畫不過北斗耳焦穫爾雅十藪周有焦穫孫炎曰岐周也郭璞曰今扶風池陽縣瓠中是也寰宇記焦穫藪在京兆府涇陽縣北十數里亦名瓠口溝洫志云韓水工鄭國說秦令鑿涇水自中山西抵瓠口爲渠朱傳云焦未詳所在穫郭璞以爲瓠中今在耀州三原縣一統志焦穫澤在陜西西安府涇陽縣西北亦名瓠口蓋古之焦穫藪也池陽廢縣在三原縣東北二十里漢時遺址畧存鎬方鄭氏云鎬也方也皆北方地名王基云劉向曰千里之鎬猶以爲逺鎬去京師千里朱傳云劉向以爲千里之鎬則非鎬京之鎬矣未詳所在方疑即是朔方也涇陽箋云涇水之北疏云水北曰陽涇去京師爲近通典云今涇原州地並涇水之陽一統志涇陽在西安府城北七十里故城在平凉府界以居涇水之北故名織文箋云織徽織也將帥以下衣皆著焉疏云言徽織者以其在軍爲徽號之織織與幟字同以絳爲縿畫爲鳥隼又絳爲旒書名於末其制如所建旌旗而畫之著之于衣自王以下旌旒雖有等差其徽織同長三尺縿長一尺旂長二尺周禮司常掌九旗之物名各有屬以待國事日月爲常交龍爲旂通帛爲旜雜帛爲物熊虎爲旗鳥隼爲旟龜蛇爲旐全羽爲旞析羽爲旌及大閱官府各象其事州里各象其名家各象其號注云物名者所畫異物則異名也屬謂徽織也大傳謂之徽號事名號三者旌旗之細也士喪禮爲銘各以其物亡則以緇長半幅頳末長終幅廣三寸書名於末大閱禮象而爲之兵凶事若有死事者亦當以相别也大司馬教茇舍辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百家各象其事吕東萊云日月爲常之類皆幟之文也鳥章特其一爾詩之所指乃其建之旗鄭氏所箋乃所服之號初非一物白孔氏曰白謂絳帛尚書曰舜修三帛周禮染人掌染帛肆師大祀用玉帛典命諸侯之適子未誓以皮帛繼子男閭師民不蠶者不帛職方氏并州其利布帛㡛氏練帛坊記云禮之先幣帛也欲民之先事而後禄易曰賁于丘園束帛戔戔說文帛繒也白斾毛傳云白斾繼旐者也疏云此旟而言旐者散則通名九旗之帛皆用絳言白斾者謂絳帛猶通帛爲旃亦是絳也爾雅云緇廣充幅長尋曰旐繼旐曰斾注云帛續旐末爲燕尾者曹氏曰白斾以帛續旐末爲燕尾戰則斾之按繼旐曰斾出于爾雅郭注所云續旐末爲燕尾義見詩者即此白斾央央也然則旐是旂身斾是旂尾考之詩圖則一車中有二旗其一旗畫朱鳥即織文鳥章其一則斾别自爲一竿有旌有兩飄帶其所謂緇廣充幅長尋與燕尾之形並無有焉詩圖出于後儒固不足信不可據以疑爾雅然此詩下文云元戎十乗以先啓行則斾蓋建于元戎之上者元戎軍之前行几師前朱雀而後𤣥武恐不得建旐也鄭氏以織爲著之于衣故孔氏解毛傳繼旐曰斾以爲旟旐散則通名此說經傳無文毛意當是據爾雅不得與鄭同也左傳說斾多矣杜氏注各不同莊二十八年子元鬬御强鬬梧耿之不比爲斾注云子元自與二子特建以居前廣充幅長尋曰旐繼旐曰斾僖二十八年狐毛設二斾而退之注云斾大旗也建二斾而退若使大將稍卻又亡大斾之左旃注云大斾旗名繫旐曰斾通帛曰旃宣十二年令尹南轅反斾注云迴車南向斾軍前大旂昭十三年合諸侯于平丘八月辛未治兵建而不斾壬申復斾之注云建立旌旗不曳其斾斾游也軍將戰則斾故曳斾以恐之哀二年陽虎以兵車之斾與罕駟兵車先陳注云斾先驅車也傅士凱反復其說以事推之知子元之斾陽虎之斾軍前大旂也狐毛所設與亡大斾之斾建而不斾之斾大將所建大旗也所云建者旂之竿耳如傅氏之說則此白斾央央者即軍前大旂故建於元戎之上孔氏亦云軍行之次斾最在先是也若是繼旐之斾乃後軍所建矣旐之末不妨有斾顧非此斾耳至杜以斾爲斿尤是臆說斿如垂水之勢數之多寡不同非燕尾之形也若杜此注不從爾雅則旌旗既建但結其斿旗是大物既已建矣反以斿之舒結爲戰不戰之候晉之軍容何太不彰明乎元戎司馬法云夏后氏曰鈎車殷曰寅車周曰元戎毛氏云元大也鈎車先正也寅車先疾也元戎先良也韓詩說云元戎大戎謂兵車也車有大戎十乗謂車縵輪馬被甲衡扼之上盡有劒㦸名曰陷軍之車所以冒突衝啓敵家之行伍也王介甫云軍前曰啓後曰殿元戎十乗以先軍行之前者所謂選鋒也兵法軍無選鋒曰北太原書禹貢既修太原顔師古曰即今晉陽黄氏云晉太原大鹵大夏夏虛晉陽凡六名朱傳云太原亦曰大鹵今在大原陽曲縣穀梁傳云中國曰太原夷狄曰大鹵後漢西羌傳穆王遷戎于大原夷王命虢公率六師伐大原之戎至于俞泉宣王遣兵伐大原戎不克大全注太原即今太原府陽曲縣𨽻山西鼈周禮鼈人掌取互物有甲物以時簎魚鼈龜蜃凡貍含刀之屬物春獻鼈蜃秋獻龜魚禮記云水潦降不獻魚鼈又云水煩則魚鼈不大又云居山以魚鼈爲禮君子謂之不知禮又云鼈去醜淮南子云鼈無耳而目不可以瞥精於明也博物志云九竅者胎化八竅者卵生龜鼈黿此諸類皆卵生而影伏古今注云鼈一名河伯從事埤雅云鼈以眼聽穹脊連脅甲蟲也水居陸生養魚經曰魚滿三百六十則龍爲之長引飛出水内鼈則魚不復去故鼈一名神守天地之性細腰純雄大腰純雌大腰龜鼈之屬以虵爲雄段成式云甲蟲影伏羽蟲體伏今鼈伏于淵而卵剖于陵此思化也内典曰鶴影生鼈思生是則思生與影伏異矣雅翼云易離爲鼈爲蟹爲龜以其骨在外肉在内也至考工記則以外骨爲龜屬内骨爲鼈屬以鼈外有肉縁比龜爲内骨耳黿鼈之大者濶或至一二文膾釋名云膾㑹也細切肉令散分其赤白異切之已乃㑹合和之也禮記云進食之禮膾炙處外又云牛膾羊炙魚膾芥醬大夫燕食有膾無脯有脯無膾膾春用葱秋用芥肉腥細者爲膾大者爲軒又云牛與羊魚之腥聶而切之爲膾麋鹿爲菹野豕爲軒皆聶而不切麕爲辟雞兔爲宛脾皆聶而切之切葱若薤實之醯以柔之陳氏云聶而切之者謂先聶爲大臠而後報切之爲膾也六家詩名物疏卷三十四
