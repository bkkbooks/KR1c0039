body:
  text: 六家詩名物疏巻一明馮復京撰國風周南一周釋名云周地在岐山之南其山四周也鄭譜云周召者禹貢雍州岐山之陽地名今屬右扶風美陽縣地形險阻而原田肥美博物志云周自后稷至于文武皆都闗中號為宗周史記正義大王居周原因號曰周郡國志美陽有周城一統志陜西鳯翔府岐山縣在府城東五十里古岐周地周原在岐山縣東北四十里詩曰周原膴膴即此鄭譜云文王受命作邑於豐乃分岐邦周召之地為周公旦召公奭之采地孔氏云文王既遷于豐岐邦地空故分賜二公括地志周公故城在岐山縣北九里南序云闗雎麟趾之化王者之風故繋之周公南言化自北而南也鵲巢騶虞之徳諸侯之風也故繫之召公韓詩説云二南地在南郡南陽之間書西伯戡黎注云文王為雍州之伯南兼梁荆史記云太史公留滯周南張晏注洛陽而謂周南者自陜以東皆周南之地朱傳云南方之國即今興元府京西湖北等路諸州按南郡今湖廣襄陽荆州二府地南陽府今屬河南布政司宋興元府今陜西漢中府京西湖北等路今湖廣地即江漢汝墳之域也又一說以南為樂音不主自北而南之說程氏曰鼓鐘之詩曰以雅以南季札觀樂有舞南籥者二南之籥也文王世子有胥鼓南則南之為樂信矣又路史曰初禹娶塗山之女作歌曰候人兮猗實始為南音周世有賢内助故詩人以后妃夫人之徳為二南之首蓋取效於塗山關雎篇雎鳩爾雅云雎鳩王瞗郭注雕類今江東呼之為鶚好在江渚山邊食魚禽經云王瞗瞗鳩魚鷹也亦曰白鷖亦名白鷢毛氏曰鳥摯而有别箋云摰之言至也謂王雎之鳥雌雄情意至然而有别韓詩說云詩人言雎鳩貞潔慎匹以聲相求隱蔽乎無人之處陸璣疏云瞗鳩大小如鴟深目目上骨露幽州人謂之鷲而揚雄許愼皆曰白鷢似鷹尾上白風土記云說詩義者或說瞗鳩為白鷢白鷢鸇屬於義無取蓋蒼鷃大如白鷢而色蒼其鳴戞和順又游于水而息于洲常隻不雙徐鉉草木蟲魚圗云瞗鳩常在河洲之上為儔偶更不移處陸農師云鶚性好峙所謂鶚立義取諸此俗云瞗鳩交則雙翔别則立而異處是謂摰而有别傳云鷙鳥不䨇是也朱傳云水鳥狀類鳬鷖今江淮間有之生有定偶而不相亂偶常並游而不相狎朱子語錄云常見淮人說淮上有之狀如鳩差小而長常是雌雄兩兩相隨不相失然亦不曾相近湏隔丈來地所謂摯而有别也嚴粲云左傳郯子五鳩備見詩經瞗鳩氏司馬此詩是也祝鳩氏司徒鵓鳩也四牡嘉魚之鵻是也鳴鳩氏司空布穀也曹風之鳲鳩是也爽鳩氏司冦大明之鷹是也鶻鳩氏司事鸒鳩也非班鳩小宛之鳴鳩與氓食桑葚之鳩是也杜預左傳注云瞗鳩摯而有别故為司馬主法則列女傳曲沃曰妾聞男女之别國之大節故以瞗鳩起興夫瞗鳩之鳥猶未嘗見乗居而匹處也隂陽自然變化論云瞗鳩不再匹淮南子云闗雎興于鳥君子美之為其雌雄之不乖居也按釋雎鳩者郭云雕類許云似鷹陸云如鴟俱以為鷙鳥盖鳥之鷙者不淫亦足以方淑女之徳矣惟朱子以類鳬鷖者釋之昔歐陽子固嘗疑猛鷙之物不可以比后妃之淑善仲晦詢之淮人而為是說未為無據但恐江淮所有當年未入詩人之目耳又按通志曰王瞗鳬類多在水邊尾有一㸃白故揚雄云白鷹舊說雕類誤矣然白鷢復似鷹而非鳬也爾雅云瞗鳩王雎揚白鷢各自一種風土記疑為蒼鷃近代馮元敏云王雎狀似鴛鴦與瞗鳩二物亦未定其然否也錢氏詩詁以為杜鵑尤妄河北方流水之通名朱傳云河北方流水之通名荘子音義北人名水皆曰河李吉甫云河北得水便名為河塞北得水便名為海按河即四瀆之河也太姒生于洽陽正在河西臨河之境故詩起興於河洲之鳥盖本其所生而言也况雍州東據大河以周人詠周水頗極親切而必以流水通名釋之何邪洲爾雅曰水中可居曰洲李廵注四方皆有水中央獨可居韓詩章句曰河之洲蔽隱無人之處說文云堯遭洪水民居水中髙土故曰九州詩曰在河之州作洲非方言洲三輔謂之淤釋名云洲聚也人及鳥物所聚息之處女爾雅疏廣雅云女如也白虎通曰言如人也徐鍇曰女子從父之教從夫之命故曰如禮記曰女子十年不出姆教婉娩聼從執麻枲治絲繭織絍組紃學女事以共衣服觀於祭祀納酒漿籩豆菹醢禮相助奠荇菜爾雅云莕接余其葉苻毛傳云后妃供荇菜以事宗廟陸疏云接余白莖葉紫赤色正員徑寸餘浮在水上根在水底與水深淺等大如釵股上青下白䰞其白莖以苦酒浸之肥美可按酒本草云鳬葵味甘冷即莕菜别本注云生水中菜似蓴莖澁根極長江南人多食云是猪蓴誤也按猪蓴絲蓴與鳬葵各一種羅願云荇菜今陂澤多有葉卷漸開雖圎而稍羡不若蓴之極圎也皆隨水髙低平浮水上花則出水黄色六出今宛陵陂湖中彌覆頃畆日出照之如金俗名金蓮子狀既似蓴又猪好食或因是亦得猪蓴之名顧但非蓴菜耳嚴粲云參差訓不齊今池州人稱荇為莕公鬚盖細荇亂生有若鬚然詩人之辭不苟矣顔氏家訓云河北人不識荇博士皆以參差者是莧菜可笑之甚琴琴書曰昔者至人伏羲王天下削桐為琴說文云琴禁也神農所作爾雅云大琴謂之離郭璞曰或曰琴大者二十七弦未詳長短樂書云琴長八尺一寸正度也弦大者為宮而居中央君也商張右旁其餘大小相次不失其次序則君臣之位正矣廣雅云伏羲氏琴長七尺二寸神農氏琴長三尺六寸六分上有五弦曰宮商角徴羽文王增二弦曰少宮少商琴操云伏羲作琴長三尺六寸六分象三百六十日也廣六寸象六合也又上曰池言其平下曰濵言其服前廣後狹象尊卑上圓下方法天地風俗通云雅琴者樂之統也君子所常御不離於身非若鐘鼓陳於宗廟列於簴懸也以為大小得中而聲音和大聲不諠譁而流漫小聲不湮滅而不聞適足以和人意氣感發善心也故琴之為言禁雅之為言正也言君子守正以自禁也今琴長四尺五寸法四時五行七弦者法七星也山海經曰帝俊生晏龍是為琴瑟揚雄琴清英曰昔者神農造琴以定神齊淫僻去邪欲反其天真者也舜彈五弦之琴而天下治堯加二弦以合君臣之恩也書曰琴瑟以詠周官曰雲和之琴瑟于圜丘奏之空桑之琴瑟于方丘奏之龍門之琴瑟于宗廟奏之小師掌教弦歌瞽矇掌鼓琴瑟明堂位云大琴大瑟中琴小瑟四代之樂器也樂記曰絲聲哀哀以立㢘㢘以立志君子聼琴瑟之聲則思志義之臣國語云瓦絲尚宮史記騶忌子曰大弦濁以春温者君也小弦㢘折以清者相也攫之深醳之愉者政令也鈞諧以鳴大小相益回邪而不相害者四時也陳𤾉樂書云絲飾物以成聲其卦則離其方則南其時則夏其音尚宮其律㽔賔其風景其音哀夏至之氣也按明堂位有大琴中琴之文然則長八尺一寸者大琴之度也長三尺六寸六分者中琴之度也制之長短雖不同不過五弦七弦而已郭氏云大琴二十七弦未知何據陳暘又云聲不過五小琴五弦中琴倍之十弦大琴四倍之二十弦深闢七弦之琴以為存之有害古制其稱十弦二十弦于古罕用而七弦則古今相傳未可廢也古又有雅琴雅瑟頌琴頌瑟之名豈以其聲之合雅頌邪瑟爾雅云大瑟謂之灑徒鼓瑟謂之步三禮圗云雅瑟長八尺一寸廣一尺八寸二十三弦其常用者十九弦其餘四弦謂之蕃蕃贏也頌瑟長七尺二寸廣尺八寸二十五弦盡用也世本云庖羲氏作瑟瑟潔也使人精潔於心淳一於行也五十弦黄帝書云泰帝使素女鼓瑟而悲帝禁不止故破五十弦為二十五弦吕氏春秋云古朱襄氏之治天下也多風陽氣畜積萬物散解故士逹作為五弦之瑟以來隂氣以定羣生又云瞽瞍拌五弦之瑟作十五弦之瑟命之曰大章舜立仰延乃拌瞽瞍之所為瑟益之八弦為二十三弦白虎通云瑟者嗇也閑也所以懲忩窒欲正人之徳也有君父之節臣子之法鄉飲酒禮二人皆左何瑟後首挎越燕禮小臣左何瑟面鼓執越樂記曰清廟之瑟朱弦而疏越書大傳曰大琴練弦逹越大瑟朱弦達越熊氏云瑟兩頭有孔其在底下者名越若用之祭祀則練其弦疏其越蔡邕云瑟前其柱則清却其柱則濁樂書云五十弦大瑟也二十五弦中瑟即頌瑟也五弦十五弦小瑟也鐘爾雅云大鐘謂之鏞其中謂之剽小者謂之棧釋名云鐘空也内空受氣多故聲大説文云鐘秋分之音物鐘成也白虎通云鐘之為言動也隂氣用事萬物動成世本云埀作鐘山海經曰炎帝之孫伯陵生鼓延是始為鐘吕氏春秋云黄帝命伶倫與營援鑄十二鐘以和五音禮記云鐘聲鏗鏗以立號號以立横横以立武君子聴鐘聲則思武臣又云埀之和鐘周禮云磬師掌擊編鐘鐘師掌金奏鏄師掌金奏之鼓桃氏為刅六分其金而錫居一謂之鐘鼎之齊鳬氏為鐘兩欒謂之銑鐘口两角銑間謂之于脣上袪于上謂之鼓鼓上謂之鉦鉦上謂之舞舞上謂之甬甬上謂之衡甬衡鐘柄鐘鐶謂之旋旋蟲謂之幹鐘帶謂之篆篆間謂之枚枚謂之景于上之攠謂之隧鐘已厚則石已薄則播聲散侈則柞聲大外弇則鬰長甬則震是故大鐘十分其鼔間以其一為之厚小鐘十分其鉦間以其一為之厚鐘大而短則聲疾而短聞鐘小而長則聲舒而逺聞左傳伶州鳩云鐘音之器也小者不窕大者不槬則和于物國語單穆公云先王之制鐘也大不出鈞重不過石律度量衡于是乎生小大器用于是乎出五經要義云周禮鐘磬皆編懸之二八十六而在一簴謂之堵鐘聲各一堵謂之肆三禮圖云特懸者謂之鏄韓詩外傳云古者天子左右五鐘將出則撞黄鐘之鐘而鐘皆應之樂汁圖徴云君子鑠金為鐘四時九乳是以撞鐘以知君鐘調則君道得宋均注云九乳法九州也岑文本鐘銘云夫金之為徳冠五材以稱珤鐘之為器諧八音而表節成物兼于軍國致用適于洪纎故習戎者用之以警衆司厯者俟之以考辰樂書云金生於土而别於土其卦則兊其方則西其時則秋其風閶闔其聲尚羽其音則鏗立秋之氣也按鐘有編鐘鄭氏云十六枚同在一簴段安節云每架十二按周禮此磬師教眡瞭擊之者也有不編者鐘師自擊之十二辰零鐘若書傳云左右五鐘也在東曰笙鐘在西曰頌鐘荀卿云懸一鐘而尚拊此堂上之鐘盖亦不編又有縵樂燕樂之鐘此鐘鼓樂之其燕樂與鼓風俗通云鼓不知誰所作鼓者郭也春分之音萬物郭皮甲而出故謂之鼓白虎通云鼓震音煩氣其本乃在萬物之始吕氏春秋曰倕作鼙鼓鞀五經要義曰鼓所以檢樂為羣音之長周禮云鼓人掌教六鼓四金之音聲以節聲樂以和軍旅以正田役教為鼓而辨其聲用以雷鼓鼓神祀以靈鼓鼓社祭以路鼓鼓鬼享以鼖鼓鼓軍事以鼛鼓鼓役事以晉鼓鼓金奏以金錞和鼓以金鐲節鼓以金鐃止鼓以金鐸通鼓大司樂王大食三宥令奏鍾鼓樂師凢國之小事饗食諸矦令奏鐘鼓眡瞭賔射奏鍾鼓小師掌教鼓又云韗人為臯陶為鼓木名凢冐鼔必以啓蟄之日良鼓瑕如積環鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞禮記曰㑹守拊鼓又云鼓鼙之聲讙讙以立動動以進衆君子聼鼓鼙之聲則思將帥之臣易通卦驗云冬至鼓用馬革圎徑八尺一寸夏至鼓用牛皮圓徑五尺七寸唐樂志云鼔者冬至之音荀卿云鼓象地樂書云革去故以為器而羣音首焉其卦則坎其方則北其時則冬其風廣莫其律黄鍾其聲一其音讙冬至之氣也葛覃篇葛毛傳云葛所以為絺綌女功之事煩辱者羅氏云葛生山澤間其蔓延盛者牽其首以至根可二十歩禹貢卉服注云草服葛越葛花藤皆可醒酒又雞齊一名鹿藿一名黄斤其生延蔓生食甜脆亦可蒸食有粉今之食葛非為絺綌者也周官云掌葛掌以時徴絺綌之材于山農凢葛征徴草貢之材于澤農周書云葛小人得其葉以為􅃵君子得其材以為絺綌以為君子朝廷夏服谷爾雅云水注川曰谿注谿曰谷說文云泉通川曰谷老子云谷得一以盈谷無以盈將恐竭黄鳥爾雅云皇黄鳥郭注俗呼黄離留亦名搏黍又云倉庚商庚又云鵹黄楚雀又云倉庚黧黄也注其色黧黒而黄因以名云陸䟽云黄鳥黄鸝留也或謂之黄栗留幽州人謂之黄鸎一名倉庚一名商庚一名黧黄一名楚雀齊人謂之搏黍當葚􅌻時來在桑間應節趨時之鳥也或謂之黄袌禮記曰仲春之月倉庚鳴陸氏曰倉庚鳴于仲春其羽之鮮明在夏鳴則􅁞生故詩曰有鳴倉庚爰求柔桑羅氏曰此鳥之性好雙飛故鸝字從麗又曰鸝必匹飛鵙必單棲而東山之末章以比之子于歸者也又詩鳥鳴嚶嚶按禽經稱鸎鳴嚶嚶殆詩所謂鳥也今荆州每冬月于田中得土堅圓如卵者破之則鸎在其中無復毛羽盖以土自裹伏候春始破土而出出谷遷喬之事恐似此矣禽經云燕以狂䀪鸎以喜囀格物總論云鸎黑尾嘴尖紅脚青遍身甘草黄色羽及尾有黒毛相間三四月鳴聲音圎滑灌木爾雅云木族生為灌孫炎注族叢也說文云木冒也冒地而生東方之行易云巽為木坎其于木也為堅多心艮其于木也為堅多節離其于木也為科上槁科空也尚書云兖州厥木維條揚州厥木維喬又云木曰曲直曲直作酸春秋元命包云木者陽精生于隂故水者木之母也木之為言觸氣動躍也其字八推十為木八者隂合十者陽數禮斗威儀云君乘木而王者其政升平則草木豐盛淮南子云喬如生榦木幹木生庶木絺綌小爾雅云葛之精者曰絺粗者曰綌月令孟夏天子始絺曲禮云為天子削𤓰巾以絺諸矦巾以綌郊特牲云葛帶榛杖喪殺也玉藻云浴用二巾上絺下綌又云振絺綌不入公門王子淵云服絺綌之凉者不苦盛夏之鬰燠有其具者易其備也禮書云燕禮公尊幂用綌若錫大射幂用錫若絺士虞幂用絺士昬鄉飲酒特牲幂皆用綌蓋君尊幂冬夏異臣卑幂冬夏同師氏毛傳云師女師也古者女師教以婦徳婦言婦容婦功祖廟未毁教于公宫三月祖廟旣毁敎于宗室昏禮云姆纚笄綃衣在其右注曰姆婦人五十無子出而不復嫁能以婦道教人者若今時乳母矣公羊傳伯姫曰婦人夜出不見傅母不下堂何休曰選老大夫為傅老大夫妻為姆孔氏云禮重男女之别大夫不宜教女子大夫之妻當從夫氏不當隨女而適人事無所出其言非也内則云異為孺子室于宫中擇于諸母與可者必求其寛裕慈惠温良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居于室白虎通云禮昏經曰教于公宫三月婦人學一時足以成矣與君無親者各教于宗廟婦之室國君取大夫之妾士之妻老無子者而明于婦道又禄之使教宗室五屬之女大夫士皆有宗族自于宗子之室學事人也私傳云私燕服也疏云六服之外唯有纚笄綃衣士昏禮注云纚縚髪笄今時簪也纚亦廣充幅長六尺宵讀為綃綺屬也𤣥衣以綃為領因以為名按左傳𠂻其衵服注近身衣也此私殆是衵與衣白虎通曰衣者隱也裳者鄣也所以隱形自鄣蔽也釋器云衣裗謂之䘽黼領謂之襮緣謂之純謂之褮衣眥謂之襟衱謂之裾衿謂之袸衣蔽前謂之襜世本曰胡曹作衣易曰黄帝堯舜垂衣裳而天下治蓋取諸乾坤釋名云凢服上曰衣衣依也人所依以庇寒暑也箋云衣謂褘衣以下至褖衣周禮内司服掌王后之六服褘衣揄狄闕狄鞠衣展衣褖衣素紗鄭注云褘衣從王祭先王揄狄祭先公闕狄祭羣小祀鞠衣以告桑展衣以禮見王見賔客褖衣以御于王歸寧春秋左傳曰杞伯姬來歸寧也釋例云歸寧者女子旣嫁有時而歸問父母之寧否父母没則使卿歸問兄弟父白虎通曰父矩也以度教子也釋名云父甫也始生已也母廣雅云母牧也育養子也釋名云母冒也含生已也六家詩名物疏卷一
