body:
  text: 六家詩名物疏卷四十七明馮復京撰大雅文王之什二思齊篇在宫辟廱别載箋云宫謂辟廱宫也羣臣助文王養老周禮外饔邦饗耆老掌割亨之事酒正饗耆老共其酒無酌數凡有秩酒者以書契授之大司徒以保息六養萬民二曰養老遺人門闗之委積以養老孤司門以其財養死政之老稾人饗耆老共其食羅氏中春羅春鳥獻鳩以養國老王制云凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之五十養於鄉六十養於國七十養於學達於諸侯有虞氏養國老於上庠養庶老於下庠殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊有虞氏深衣而養老夏后氏燕衣而養老殷人縞衣而養老周人𤣥衣而養老凡三王養老皆引年月令仲秋養衰老授几杖行糜粥飲食文王世子云凡大合樂必遂養老注云大合樂謂春入學釋菜合舞秋頒學合聲又云天子視學適東序釋奠於先老遂設三老五更之席位適饌省醴養老之珍具遂發詠焉退修之以孝養也反登歌清廟下管象舞大武有司告樂闋王乃命公侯伯子男及羣吏曰反養老幼于東序内則云凡養老五帝憲養氣體而不乞言有善則記之為惇史三王亦憲既養老而後乞言亦微其體皆有惇史樂記云食三老五更於太學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也禮書云天子之於老所養也三國老也庶老也死政者之老也歲養之也三仲春也季春也仲秋也羅氏獻鳩以養之者國老也司徒以保息養之者庶老也司門以其財養之者死政者之老也若夫外饔酒正槁人所謂耆老者總三者而言之也皇矣篇二國傳云殷夏也帝王世紀曰禹受封為夏伯在豫州外方之南今河南陽翟是也即天子位都平陽或在安邑或在晉陽一統志河南開封府鈞州本夏禹所封地秦為陽翟縣安邑縣在山西平陽府菑釋木云立死菑李巡曰以當死害生曰菑孔氏云立死之木妨他木生長故曰菑也翳釋木云斃者翳郭云翳樹隂翳覆地者也孔氏云生木自倒枝葉覆地為廕翳故曰翳也栵爾雅云栵栭郭云樹似槲樕而庳小子如細栗可食今江東亦呼為栭栗陸璣云樹如榆木理堅韌而赤可為車轅内則云芝栭䔖椇鄭氏云人君燕食所加庶羞也檉爾雅云檉河栁郭云今河旁赤莖小楊陸璣云生水旁皮正赤如絳一名雨師枝葉如松本草云赤檉木皮赤色葉細其中木脂一名檉乳衍義云人謂之三春栁以其一年三秀也花肉紅色成細穗河西者戎人取滑枝為鞭南都賦注檉似柏而香雅翼云天將雨檉先起氣以應之故一名雨師亦能負霜雪大寒不彫有異餘栁通志云大概松杉之類而意態似栁故謂之檉栁其材可卷為盤合又有一種名赤楊又名水楊與此相似而植之水邊其葉經秋盡紅人多植于門巷椐爾雅云椐樻郭云腫節可以為杖陸璣云節中腫似扶老即今靈壽是也今人以為馬鞭及杖𢎞農郡北山甚有之本草云靈壽木作杖令人延年益壽圓長皮紫漢書孔光傳賜靈壽杖師古曰木似竹有枝節長不過八九尺圍三四寸自然有合杖制不須削治也山海經云廣都之野靈壽實華王粲頌云寄幹堅正不待矯輮檿爾雅云檿桑山桑注云似桑材中作弓及車轅禹貢青州厥篚檿絲注云檿桑蠶絲中琴瑟弦考工記云弓人取材檿桑次檍管子五粟之土其檿其桑師古云山桑之有點文者花木考云繭生山桑不浴不飼居民取之製為紬乆而不敝柘月令云季春無伐桑柘投壺云矢以柘若棘考工記云弓人取材柘為上周書云季夏取桑柘之火淮南子云八月其樹柘四民月令云柘染色黄赤人君所尊蠶書云柘葉飼蠶其絲作琴瑟絃清鳴響亮埤雅云柘宜山石古今注柘實曰佳佳言佳鳥性所食本草衍義云柘木理有紋亦可旋為器按鄭箋云岐周之地險隘多樹木乃競刋除而自居處其刋除之次陸農師論之詳矣作屏修平啟辟攘剔八字皆刋除之義也蓋歸周者日衆地無所容故伐木以立田宅無暇論其材之美不美以去留之也自程子有修治叢列及剔去繁冗之説而朱子因之故後人遂謂去惡木以存美材不知檉可入藥為器椐中為杖亦何嘗不可用而併啓辟之乎宻傳云宻須氏地里志安定郡隂密縣詩宻人國國名記子爵世本云商有宻須文王伐之魯有密須之鼓杜預謂姞姓國在安定隂密今涇之靈臺也史索云是河南密九域志以為鄆之致密城皆非一統志陜西平涼府涇州靈臺縣在州城南九十里古密須之國書傳云文王受命三年伐密須皇甫謐云文王問太公吾欲用兵孰可太公曰密須氏疑於我我可先伐之管叔曰不可其君天下之明君伐之不義太公曰臣聞先王之伐也伐逆不伐順伐險不伐易文王曰善遂侵阮徂共而伐密須宻須之人自縳其君而歸文王左傳云密須之鼓與其大路文所以大蒐也阮徂共箋云阮也徂也共也三國犯周文王伐之孔氏云毛以徂為往阮共為周地宻須所侵也魯詩說云阮徂共皆國名張氏云阮國名共阮國之地名皆在今涇州今有共池即共也氏族略云阮諸侯國在岐渭之間旅傳云旅地名疏云毛意以旅為周地孟子疏云大雅曰以遏徂旅孟子曰徂莒者案春秋書莒子盟于密則莒密之近地詩言密之衆孟子言密之地其㫖同也左傳注云莒今城陽莒縣城陽淳于縣東北有密鄉按古莒國今山東青州府莒州漢之城陽國也去密須殊逺孟子疏非也鮮原傳云小山别大山曰鮮爾雅孫炎注云别不相連也疏云周書稱文王在程作程寤程典皇甫謐云文王徙宅於程蓋謂此也前漢地里志安陵顏注曰闞駰以為本周程邑通鑑外紀云西伯自岐徙鮮原在岐之陽不出百里朱傳云其地於漢為扶風安陵今在京兆府咸陽縣國名記云在今咸陽亦在岐南與畢陌接所謂畢程孟子言文王卒于畢郢夏箋云諸夏說文云夏中國之人也徐鍇曰象有威儀文飾備具行紓遲也師古漢書注曰夏大也言大於四夷鉤援孔氏曰鉤援一物所以鉤引上城者墨子稱公輸班作雲梯以攻宋蓋此之謂臨朱傳云臨臨車在上臨下者也禮書云楚子使解楊登樓車以告宋人蓋臨車之類衝朱傳云衝衝車從旁衝􅊳者也禮書云墨子有備衝之篇荀子曰渠衝入穴而求利揚子曰衝不薺皆言衝車之大也孫武曰攻城之法修其櫓轒輼輼四輪車蓋衝車之類也崇朱傳云崇今京兆府鄠縣一統志陜西西安府鄠縣夏時扈國殷為崇國史記云崇侯虎譖西伯於紂紂囚西伯於羑里後赦西伯受命明年伐犬戎明年伐密須明年敗耆國明年伐邘明年伐崇侯虎而作豐邑説苑文王曰余聞崇侯虎蔑侮父兄不敬長老分財不均百姓力盡余將來征之乃伐崇令毋殺人壊室填井伐樹木動六畜崇人聞之因請降類爾雅云是禷是禡師祭也疏云王制云天子將出征類乎上帝則類祭祭天也尚書歐陽説以事類祭之在南郊春官肆師注云類禮依郊祀是用尚書説為義也書曰類于上帝周禮小宗伯兆五帝于四郊四望四類亦如之凡天地之大烖類社稷宗廟則為位肆師類造上帝則為位大祝六祈一曰類大師類上帝詛祝掌類造之祝號禮記天子將出類乎上帝天子將出征類乎上帝注云帝謂五徳之帝禮書云類皆有所祈其禮劣于正祭與旅禡爾雅云禡師祭也禮記云天子出征禡于所征之地周禮小宗伯甸役之禱祠肄儀為位肆師四時大田獵祭表貉則為位注云於所立表之處為師祭造軍法者禱氣勢之增倍也其神蓋蚩尤或曰黄帝又云甸祝掌表貉之祝號大司馬教振旅有司表貉教大閲設驅逆之車有司表貉于陳前公羊説云師出曰祠兵祠者祠五兵矛㦸劒楯弓鼓及祠蚩尤之造兵者應劭云至所征之地表而祭之謂之禡禡者馬也馬者兵之首故祭其先神也考索云漢書稱髙祖祠黄帝蚩尤於沛庭管仲稱蚩尤作劒㦸史記稱黄帝與蚩尤戰于阪泉豈軍法之興始此故後世因祭之與靈臺篇靈臺箋云天子有靈臺者所以觀祲象察氣之妖祥也疏云靈臺在國之西郊與辟廱同處易乾鑿度云文王二十九年伐崇作靈臺易是類謀云作靈臺受赤爵丹書含神霧云作邑于豐起靈臺禮含文嘉云天子靈臺所以觀天人之際察隂陽之㑹也揆星度之驗徵六氣之端應神明之變化覩因氣之所驗為萬物獲福於無方之原招太極之清泉以與稼穡之根天子得靈臺之則五車三柱明制可行水泉川流無滯寒暴暑之災禾盡豐穰禮統云所以制靈臺何以尊天重民備災御患也夏為清臺何明明相承太平相續故為清臺殷為神臺周為靈臺何質者具天而王天者稱神文者具地而王地者稱靈也援神契云靈臺考符居髙顯聖王所以宣徳察微五經通義云靈臺在于野中國之南附近辟廱積土增崇其髙九仞極陽之數上平無屋望氣顯著春秋左傳云公旣視朔而登觀臺以望而書雲物為備故也說苑云積恩為愛積愛為仁積仁為靈是故文王始接民以仁而天下莫不仁焉三輔黄圖云文王靈囿在長安縣西四十二里靈沼在長安西三十里靈臺在長安西北四十里高二十丈周四百二十步三輔故事靈臺在豐水東一統志靈臺在西安府鄠縣東靈囿在鄠縣東三十里囿中有沼曰靈沼按明堂辟廱靈臺太廟四者先儒多合為一歴代紛爭皆不能決惟袁準之論為得文多不載文王靈臺當在鄠縣平涼府靈臺縣又有靈臺相傳文王伐密後所作考諸緯書皆云文王伐崇作靈臺不云伐密而作之也三輔黄圖説臺囿沼異處或以鄭駁異義云同言靈者於臺下為囿沼疑黄圖所言為謬不知文王之囿方七十里據黄圖所説臺囿沼與長安相去里數不過十里即于囿中設為臺沼亦何患于不容乎黄圖得其實矣囿傳云囿所以域養禽獸也天子百里諸侯四十里風俗通云囿者畜魚鱉之處也囿猶有也説文云囿苑有垣也一曰禽獸曰囿白虎通云苑囿所以在東方何苑囿養萬物者也東方所以生也周禮囿人掌囿游之獸禁牧百獸祭祀喪紀賔客共其生獸死獸之物吕覽云昔聖王之為苑囿園池也足以觀望勞形而已周語云藪有圃草囿有林池所以禦災也淮南子云湯始作囿以奉宗廟犞鮮之具穀梁傳疏云徐邈何休皆曰天子囿方十里伯方七里子男方五里未審據何為説隋天文志云天苑十六星在昴畢南天子之苑囿管子云武王有靈臺之囿而賢者進虡業釋器云木謂之虡大版謂之業有瞽疏云虡者立於兩端栒則横入於虡栒上加大版側著於栒其上刻為崇牙似鋸齒捷業然或曰既刻又畫之掛繩於上以為懸又置羽於筍虡之上角釋名云懸鐘鼓者横曰簨簨峻也在上高峻也縱曰虡虡舉也在旁舉簨也禮記曰夏后氏之龍簨虡殷之崇牙周之璧翣注云殷於龍上刻畫之為重牙以掛縣紘也周又畫繒為翣戴以璧垂五采羽於其下樹於簨之角上周禮典庸器祭祀帥其屬而設筍虡大司樂凡國之大憂令弛縣小胥正樂縣之位王宫縣諸侯軒縣卿大夫判縣士特縣眂瞭掌太師之縣考工記梓人為筍虡臝屬有力而不能走則於任重宜大聲而宏則於鍾宜若是者以為鍾虡羽屬無力而輕則於任輕宜其聲清揚而逺聞於磬宜若是者以為磬虡小首而長摶身而鴻者謂之鱗屬以為筍賁爾雅云大鼓謂之鼖周禮韗人鼓長八尺鼓四尺中圍加三之一謂之鼖鼓鼓人鼖鼓鼓軍事司馬中春振旅諸侯執鼖鼓鎛師凡軍之夜三鼜皆鼓之注云鼓之以鼖鼓書云鼖鼓在西序疏賁大也故謂大鼓為賁鏞爾雅云大鍾謂之鏞孫炎曰鏞深長之聲李巡曰大鍾音聲大鏞大也郭璞曰亦名鑮書云笙鏞以閒鄭注云鏞即大射頌一也周禮鍾師掌金奏鎛師掌金奏之鼓考工記云大鍾十分其鼓間以其一為之厚射禮云西階之西頌磬其南鐘注云西方鐘磬謂之頌古文頌為鏞書傳云天子將出撞黄鐘之鐘右五鐘皆應入則撞㽔賔之鐘左五鐘皆應吕氏曰黄帝命伶倫鑄十二鐘陳氏曰十二辰之鐘大鐘也大鐘特縣詩書爾雅所謂鏞也非十二辰之鐘則編焉周禮所謂編鐘也按郭以鎛為鏞依鄭注書及儀禮則鏞即頌鐘非鎛也大射注鎛如鐘而大陳氏祥道以鎛為小鐘鏞為特鐘博古圖説又云鎛減於特鐘而大於編鐘三説亦不同辟廱箋云水旋丘如璧曰辟廱以節觀者疏云辟廱即天子太學也王制言太學在郊乃是殷制周制太學在國太學雖在國而辟廱仍在郊陳祥道云上庠東序右學東膠太學也周又有辟廱成均瞽宗之名周之辟廱即成均也東郊即東序也瞽宗即右學也王制云天子曰辟廱注云辟明也廱和也所以明和天下又云天子將出征受成於學反釋奠於學以訊馘告又云有虞氏養國老於上庠夏后氏養國老於東序商人養國老於右學周人養國老於東膠文王世子曰春夏學干戈秋冬學羽籥皆於東序春誦夏弦太師詔之瞽宗秋學禮冬讀書禮在瞽宗書在上庠凡祭與養老乞言合語之禮皆小樂正詔之於東序天子視學大昕鼓徵有司卒事適東序祭義云祀三老五更於大學所以教諸侯之弟周禮大司樂掌成均之法以治建國之學政而合國之子弟凡有道者有徳者使教焉死則以為樂祖祭於瞽宗又云春合諸學秋合諸射韓詩説云辟廱者天子之學圓如璧壅之以水言辟取辟有徳不言辟水言辟廱者取其廱和也所以教天下春射秋饗尊事三老五更在南方七里之内立明堂於中五經之文所藏處蓋以茅葦取其潔清也禮統曰辟廱圓如璧雍以水内如覆外如堰盤三輔決録云辟廱水四周於外象四海白虎通云璧圓法天雍水象教化流行辟積也積道徳也雍壅也壅殘賊也又外圓内方明徳當圓行當方也黄圖云文王辟廱在長安西北四十里史記豐鎬有天子辟池索隱云即周天子辟廱之地鼉月令云季夏之月命漁師伐蛟取鼉注云鼉皮可以冒鼓周書王㑹云㑹稽以鼉陸璣云鼉形似水蜥蜴四足長丈餘生卵大如鵝卵甲如鎧甲皮堅可冒鼓本草圖經云肉至美口内涎有毒長一丈者能吐氣成霧致雨力至猛能致陷江岸性嗜睡但目閉形如龍大長者自嚙其尾極難死聲甚可畏人于穴掘之百人掘須百人牽一人掘須一人牽不然終不可出晉安海物記云鼉宵鳴如桴鼔續博物志云一名土龍鱗甲黑色能横飛不能上騰其聲如鼓趙辟公雜説云鼉聞鼓聲則鳴埤雅云鼉具十二肖肉蛇肉最後在尾其枕瑩淨魚枕弗如欲雨則鳴夜鳴應更初更一鳴而止二即再鳴力酋健善頺坎岸吕氏春秋云顓頊令飛龍作效八風之音命之曰承雲乃令鱓先為樂倡鱓乃偃浸以其尾鼓其腹其音英矇瞍傳云有眸子而無見曰矇無眸子曰瞍疏云瞽亦有眸子矇之小别韓詩説云無珠子曰矇珠子具而無見曰瞍周禮瞽矇上瞽四十人中瞽百人下瞽百有六十人掌播鼗柷敔塤簫管弦歌諷誦詩世奠繫鼓琴瑟掌九徳六詩之歌以役太師禮運云卜筮瞽侑皆在左右玉藻云御瞽幾聲之上下周語瞍賦矇誦注賦賦公卿列士所獻詩也誦謂箴諫之語晉語云矇􅕓修聲文王有聲篇豐皇甫謐云豐在京兆府鄠縣東豐水之西文王自程徙此孔氏云從鮮原徙酆酆在岐山東南三百餘里朱傳云即崇國之地一統志豐宫在西安府鄠縣東五里周文王作邑於豐時所居淢傳云成溝也韓詩作洫云洫深池周禮云匠人為溝洫方十里為成成間廣八尺深八尺謂之洫按説文洫成間洫也淢疾流也毛傳以為成溝則改淢作洫毛鄭之意本謂文王築城維如一成之洫洫内地方十里文王作十里之豐與之相匹成城字異朱子讀注疏不精改成溝作城溝不知城郭溝池所以為固若僅僅廣深八尺豈所謂設險守國乎經稱崇墉言言城既高大池必極深廣豈止八尺而已既曰城溝又虛引匠人之文進退失據矣豐水禹貢云漆沮既從澧水攸同又云導渭自鳥鼠同穴東㑹於澧入於河郡縣志云豐水出京兆府鄠縣東南終南山自發源北流經縣東二十八里北流入渭黄圖云出鄠南山豐谷水經注云渭水東與豐水㑹同隂山無他高山異巒惟原阜石墩文子曰老子云豐水之深十仞而不受塵垢金銕在中形見於外一統志出終南山合太平高觀谷水東至咸陽縣入渭皇白虎通云皇君也美也大也天之總美大稱號之為皇者煌煌人莫違也不擾匹夫匹婦虛無寥廓天地通靈也六家詩名物疏卷四十七
