body:
  text: 六家詩名物疏卷三十三明馮復京撰小雅鹿鳴之什二天保篇阜爾雅云高平曰陸大陸曰阜釋名云土山曰阜阜厚也言高厚也風俗通云阜者茂也言平地隆踊不屬于山陵也陵爾雅云大阜曰陵韓詩說云四平曰陵釋名云陵隆也體高隆也易云地險山川丘陵也王公設險以守其國春秋說題辭曰陵之爲言稜也輔山成其廣層稜扶推益厥長也爾雅云東陵阠南陵息慎西陵威夷中陵朱滕北陵西隃雁門是也陵莫大於加陵梁莫大於溴梁墳莫大於河墳謂之八陵川釋水云湀闢流川過辨回川釋名云川穿也穿地而流也周禮曰川師掌川澤之名川衡掌廵川澤之禁令而平其守祭祀賔客共川奠職方氏揚州其川三江荆州其川江漢豫州其川滎雒青州其川淮泗兗州其川河泲雍州其川涇汭幽州其川河泲冀州其川漳并州其川虖池嘔夷又云兩山之間必有川焉大川之上必有涂焉禹貢曰濬畎澮距川蔡邕云衆流注海曰川國語云川氣之導也吉王介甫云吉言諏日擇士之善周禮太宰祀五帝前期十日帥執事而卜日祀大神示享先王亦如之射義云天子將祭必先習射於澤澤者所以擇士也已射於澤而後射於射宫射中者得與於祭不中者不得與於祭劉氏云諏日者君臣諏謀祭日於旬有一日之先至次日乃卜所諏之日吉否如少牢饋食大夫先與有司諏丁巳之日至明日乃筮其日之吉凶也擇士者大射於射宫以選與祭之士蠲王氏曰蠲言齋戒滌濯之潔禮記云散齋七日以定之致齋三日以齊之定之之謂齊齊者精明之至也然後可以交於神明也又云七日戒三日齋疏曰七日戒者謂散齋也三日齋者謂致齋也周禮冢宰祀五帝祀大神示享先王及執事眡滌濯注執事初爲祭事前祭日之夕滌濯謂溉祭器及甑甗之屬疏儀禮特牲亦云前祭日之夕視壺濯及豆籩士卑得與人君同少牢大夫禮當祭日摡祭器者下人君也案少牢饔人摡鼎匕俎廩人摡甑甗司空摡豆籩及勺爵此注不言匕俎豆籩勺爵者之屬中含之又云宰夫祭祀從太牢而眡滌濯宗伯凡祀大神享大鬼祭大示帥執事而卜日宿眡滌濯小宗伯大祭祀眡滌濯肆師祭祀視滌濯饎說文饎酒食也或从巸或从米周禮􅐪人掌凡祭祀共盛儀禮主婦視饎爨于西堂下注云炊黍稷曰饎禴祠烝嘗爾雅云春祭曰祠夏祭曰礿秋祭曰嘗冬祭曰烝郭璞曰祠之言食也礿新菜可汋嘗嘗新穀烝進品物周禮云以祠春享先王以礿夏享先王以嘗秋享先王以烝冬享先王司尊彞祠禴祼用雞彞鳥彞朝踐用兩獻尊再獻用兩象尊嘗烝祼用斝彞黄彞朝獻用兩著尊饋獻用兩壺尊王制云天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝天子犆礿祫禘祫嘗祫烝諸侯礿則不禘禘則不嘗嘗則不烝烝則不礿諸侯礿犆禘一犆一祫嘗祫烝祫注云周改夏祭曰礿以禘爲殷祭虞夏之制諸侯歲朝廢一時祭郊特牲云饗禘有樂而食嘗無樂陰陽之義也注云禘當爲禴字之誤記又云禘者陽之盛也嘗者陰之盛也古者於禘祭爵賜服順陽義也於嘗出田邑發秋政順陰義也孔氏云自殷而上禴禘嘗烝至周公去夏禘之名以春禴當之更名春曰祠飲釋名云飲奄也以口奄而引咽之也禮記云飲養陽氣也周禮膳夫王飲用六清食醫掌和王之六飲酒正辨四飲清醫漿酏漿人掌共王之六飲水漿醴凉醫酏凡飲共之内則飲重醴稻醴清糟黍醴清糟粱醴清糟或以酏爲醴黍酏漿水醷濫百姓傳云百姓百官族姓也虞書平章百姓注云百姓百官張說云古者民無姓有姓者皆有土有爵者也黄帝之子二十五人得姓者十四而已其後居諸侯之國土者其民以諸侯之姓爲姓居大夫之采地者以大夫之姓爲姓莫可分辨故云皆出自帝王采薇篇玁狁史記曰匈奴其先祖夏后氏之苗裔也曰淳維唐虞以上有山戎玁狁葷粥居於北蠻逐水草移徙毋城郭常處耕田之業其俗寛則隨畜因獵射禽獸爲生業急則人習攻戰以侵伐其天性也晉灼云堯時曰葷粥周曰玁狁秦曰匈奴陽爾雅云十月爲陽鄭氏云時坤用事嫌於無陽故以名此月爲陽戎車詳見秦小戎周禮巾車掌王之五路革路以即戎車僕掌戎路之萃廣車之萃闕車之萃苹車之萃輕車之萃注云此五者皆兵車所設五戎也戎路王在軍所乗廣車横陣之車闕車所用補闕之車也苹車所用對敵自隱蔽之車也輕車所用馳敵致師之車也弭爾雅云弓有縁者謂之弓無縁者謂之弭孫炎曰縁謂繳束而漆之弭謂不以繳束骨飾兩頭者也左傳云左執鞭弭鄭氏云弭以助御者解轡紒宜骨也孔氏云弭者弓梢之名魚陸璣疏云魚服魚獸之皮也魚獸似豬東海有之其皮背上斑文腹下純青今以爲弓鞬歩叉者也其皮雖乾燥以爲弓鞬矢服經年海水潮及天將雨其毛皆起水潮還及天晴其毛復如故雖在數千里外可以知海水之潮自相感也孔氏曰左傳歸夫人魚軒服䖍云魚獸名則魚皮又可飾車按羅氏以魚服爲鮫魚之皮所爲今鮫魚出南越狀似鼈而無足背文麄錯皮間有珠文可以飾刀有大小二種總謂之沙魚或云其子驚則入母腹雖亦可以飾物而先儒說魚服則自以爲魚獸之皮非鮫也服釋名云矢其受之器以皮曰箙謂柔服用之也周禮司弓矢中春獻弓弩中秋獻矢箙及其頒之矢箙皆從其弓田弋充籠箙矢注云矢箙成於堅以獸皮爲之一箙百矢籠竹箙也繕人掌王之用矢箙稾人矢八物皆三等箙亦如之出車篇牧孔氏云牧地在郊載師職曰牧田任逺郊之地是也天子易緯云天子者繼天治物改正一統各得其宜父天母地以養生人至尊之號也春秋孔演圖云天子皆五帝精寳各有題序次運相據起必有神靈符紀諸神扶助使開階立遂保乾圖云天子之尊也神靈與天地通血氣含五帝精天愛之子之也孝經鈎命决云接上稱天子明以爵事天說文云古之神聖人母感天而生子禮記云天子者與天地參德配天地兼利萬物與日月並明明照四海而不遺微小其在朝廷則道神聖禮義之序燕處則聽雅頌之音行歩則有環佩之聲升車則有鸞和之音居處有理進退有度百官得其宜萬事得其序僕夫疏云周禮戎僕掌御戎車御夫掌御從車從車戎路之副在牧戎車將帥所乗御之則戎僕也下章僕夫况瘁箋云憂其馬之不正則正御亦在焉旐周禮司常云龜虵爲旐又云及國之大閱贊司馬頒旗物縣鄙建旐疏云縣鄙是遂之官互約言之鄉之閭比遂之鄰同建旐龜虵象其扞難避害也夏官大司馬云治兵辨旗物之用郊野載旐注云郊謂鄉遂之州長縣正以下野謂公邑大夫載旐者以其將羡卒也考工記云龜虵四斿以象營室也爾雅云緇廣充幅長尋曰旐禮記云行前朱雀而後𤣥武左青龍而右白虎招摇在上急繕其怒釋名云龜虵爲旐旐兆也龜知氣兆之吉凶建之於後察度事宜之形兆也方尚書曰宅朔方曰幽都朱傳云今靈夏等州之地曹氏云即六月所謂侵鎬及方郡縣志夏州朔方縣什賁故城在縣治北即漢朔方縣故城也漢武帝收河南地置朔方五原郡使蘇建築朔方什賁之號蓋蕃語也一統志陜西寧夏衞漢朔方郡靈州城在衞城南夏州城在衞城東爾雅朔北方也舍人注云朔盡也北方萬物盡故言朔也旂司常云交龍爲旂又云及大閱贊司馬頒旗物諸侯建旂注云諸侯畫交龍一象其升朝一象其下復巾車云金路建大旂以賔同姓以封大司馬治兵諸侯載旂考工記云龍旂九斿以象大火也覲禮云諸侯載龍旂弧韣又云天子載大旂升龍降龍樂記云龍旂九旒天子之旌也爾雅云素陞龍於縿練旒九有鈴曰旂史記云龍旂九旒所以養信也司馬法云旂夏后氏𤣥首人之執也殷白天之義也周黄地之道也禮書云天子諸侯之旂龍章一也升龍素降龍青蓋青陽也素陰也陽在上而降陰在下而升交泰之道也先儒以爲王之大常曵地諸侯之旂齊軫卿大夫齊較士齊肩簡爾雅云簡謂之畢注今簡札也說文云簡牒也蔡邕獨斷曰策者簡也其制長二尺短者半之其次一長一短兩編下附孔仲達云簡之所容一行字耳牘乃方版版廣於簡可以並容數行凡爲書字有多有少一行可盡者書之於簡數行乃盡者書之於方方所不容者乃書於策釋名云簡間也編之篇篇有間也西戎朱傳云昆夷也風俗通云斬伐殺生不得其中戎者兇也禮記云西方曰戎被髮衣皮有不粒食者矣爾雅七戎職方五戎明堂位六戎山海經云黄帝生苗龍苗龍生融吾融吾生弄明弄明生白犬白犬有牝牡是爲犬戎書大傳云文王四年伐犬夷注犬夷昆夷也帝王世紀云文王受命四年周正月丙子朔昆夷氏侵周一日三至周之東門文王閉門修德而不與戰皇矣串夷載路鄭氏云即混夷西戎國名漢匈奴傳周西伯昌伐畎夷注畎夷即畎戎也又曰昆夷或作混又作緄亦曰犬戎史記曰自隴以西有緄戎後漢西羗傳云武乙暴虐犬戎寇邊周古公踰梁山而避于岐下及子季歴遂伐西落鬼戎太丁之時季歴復伐燕京之戎戎人大敗周師後二年周人克余無之戎於是太丁命季歴爲牧師自是之後更伐始呼翳徒之戎皆克之及文王爲西伯西有昆夷之患北有玁狁之難遂攘戎狄而戍之莫不賔服乃率西戎征殷之叛國以事紂至厲王無道戎乃入犬丘殺秦仲之族宣王四年使秦仲伐戎爲戎所殺王乃召秦仲子莊公與兵七千人伐戎破之後申侯與戎寇周殺幽王酈山下秦襄公攻戎救周及平王之末自隴山以東及乎伊洛往往有戎於是渭首有狄䝠邽冀之戎涇北有義渠之戎洛川有大荔之戎渭北有驪戎伊洛間有楊拒泉臯之戎頴首以西有蠻氏之戎按西戎在今鞏昌秦州之地史記稱隴以西有緄戎蓋隴西者秦州之東也卉說文草之總名魚麗篇罶爾雅云凡曲者爲罶郭注云毛傳曰罶曲梁也凡以薄爲魚笱者名爲罶又云嫠婦之笱謂之罶孫炎曰罶曲梁其功易故謂之寡婦之笱孔氏曰其功易故號寡婦笱非寡婦所作也周勃傳織薄曲師古云葦薄爲曲也鱨陸璣疏云鱨一名黄頰魚似燕頭魚身形厚而長大頰骨正黄魚之大而有力解飛者徐州人謂之揚黄頰通語也釋文云江東呼黄鱨魚尾微黄大者長七八寸許埤雅云性浮而善飛躍故一曰揚鯊爾雅云鯊鮀注今吹沙小魚體員而有點文陸璣云魚狹而小常張口吹沙故曰吹沙異物志曰吹沙長三寸許背上有刺螫人海物異名記云鯊似鯽而狹小廣志云吹沙魚大如指沙中行埤雅云鯊性善沈亦於沙中乳子鱨魴鯉性浮鯊鱧鰋性沈雅翼云鯊非特吹沙亦止食細沙味甚美大者不過二斤然不若小者之佳今人呼爲重脣脣厚特甚有若鼃黽故名今江東小谿中每春甚多土人珍之夏則隨水下是後罕矣春來復來大抵正月先至魚之最先至者次則鯉至次則鱖至桃花水至而鱖肥則三月矣寧波府志云皮上有沙故名其類甚多鳥獸考云鯊有二種魚麗之鯊蓋閩廣江漢之常産海鯊虎頭鯊體黒文鼈足巨者餘二百斤常以春晦陟於海山之麓旬日化爲虎惟四足難化經月乃成矣鱧毛傳云鱧鮦也爾雅云鱧鯇舍人曰鱧一名鯇郭璞曰鱧鮦也鯇今鯶魚似鱒而大陸璣云鱧鯇也似鯉頰狹而厚本草蠡魚味甘寒一名鮦魚生九江池澤陶隠居云今皆作鱧字舊言是公蠣虵所變然亦有相生者至難死猶有虵性日華子云諸魚中惟此膽甘可食衍義云今人謂之黒鯉魚道家謂頭有星爲厭爾雅又云鰹大鮦小者鮵疏此即上文鱧也埤雅云今𤣥鱧是也有舌鱗細有花文一名文魚與虵通氣其首戴星夜則向北蓋北方之魚也鱨鯊之美不若魴鱧魴鱧之美不若鰋鯉故詩序如此雅翼云鱧魚圓長而斑點郭氏解釋魚稱爲鮦然今鮦又别一種按鱧一名鮦此神農本草經也爾雅云鱧鯇别二魚名如云鯉鱣耳舍人陸璣之說非也日華子稱鱧魚膽味甘陳藏器稱鯇魚膽至苦又云鯇似鯉生江湖間正合陸璣之說則陸璣所云是鯇非鱧斷乎爲二物矣羅氏謂鮦别一種又戾本草之說今吳中人知有鱧不知羅氏所謂鮦復是何物鱧今人指爲厭味亦不佳鯇即今鯶魚俗不甚珍之鰋傳云鰋鮎也爾雅鰋鮎孫炎曰鰋一名鮎郭璞曰鰋今偃額白魚鮎别名鯷江東通呼鮎爲鮧本草云鮧魚味甘主百病陶隠居云此是鯷也即是鮎圖經云大首方口背青黒無鱗多涎又有鱯魚相似而大鮠魚亦相似色黄而美衍義云鮧魚形少類獺有四足腹重墜如囊身微紫色無鱗與鮎鮠相類埤雅云今鰋額白魚也一名鮎鰋魚偃鯉魚俯鱧魚圓魴魚方雅翼云鮧魚兩目上陳頭大尾小善登竹有水堰處輒自下騰上或曰口腹俱大者名鱯背青口小者名鮎梁寅云鮎腹平著地故得鰋名按孫炎以鰋鮎爲一魚郭璞以爲二魚未知孰是埤雅兩從之轉誤後學矣如陶貞白之說鮎即是鮧與郭說合衍義云鮧魚四足似獺又與鮎大别今吳中正呼爲鮎不聞謂爲鯷也六家詩名物疏卷三十三
