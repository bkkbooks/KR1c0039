body:
  text: 六家詩名物疏卷三十九明馮復京撰小雅節南山之什二雨無正篇旻天爾雅秋為旻天李巡曰秋萬物成熟皆有文章故曰旻天旻文也郭璞曰旻猶愍也愍萬物彫落毛傳云仁覆閔下則稱旻天正大夫箋云正長也長官之大夫王荆公云周官八職一曰正六官之長是也周禮宰夫掌百官府之徵令辨其八職一曰正掌官法以治要賈公彦曰正長也六卿下各有屬六十故六卿稱正也云掌官法者掌當官之法也以治要者要謂大計要也三事大夫疏云鄭言三公以經三事大夫為三公也尚書云立太師太傅太保兹惟三公周禮曰面三槐三公位焉晋書云三台六星兩兩而居起文昌列抵太微一曰天柱三公之位也主開徳宣符鹽鐵論云天設三光以照記天子立公卿以明治故曰公卿者四海之表儀神化之丹青也後漢書云三公上則台階下象山岳環濟要略云三公者太師太傅太保也師王所尊也傅助王事保保王身也凡此皆内與王論道中參六官之事三公者象鼎三足共承其上也大戴論曰天子無恩於父母不惠於庻人無禮於大臣不中於制獄無經於百官不哀於䘮不敬於祭不信於諸侯不誡於戎事不誠於賞罰不厚於徳不强於行不從太師之言凡是之屬太傅之任也天子處位不端受業不敬言語不序聲音不中律進退陞降不以禮俯仰周旋不中節凡此之屬太保之任也太師見前白虎通云公之為言公正無私也朱傳云三事三公也大夫六卿及中下大夫也周官太宰大司徒大宗伯大司馬大司冦卿冬官闕小宰司㑹小司徒州長師氏遂人遂大夫小宗伯大司樂内史小司馬戎右大馭戎僕校人職方氏小司冦大行人中大夫宰夫太府内宰鄉師黨正保氏司市司門遂師縣正廩人肆師冢人墓大夫樂師太師太卜太祝太史内史巾車軍司馬射人司士諸子虎賁氏太僕司甲司弓矢齊右齊僕士師小行人下大夫周禮疏云諸侯三卿司徒司馬司空大夫五人謂司徒下二大夫一大夫為司徒大夫一大夫為太宰大夫司空下二大夫一大夫主司空事一大夫為司空大夫司馬事省闕一大夫故五人親王子弟食邑與三公同在五百里畺地各百里其次疏者在四百里縣地各五十里與六卿同二者得立兩卿五大夫六卿雖尊位在天子下故屈而立兩卿不足于諸侯其次更疏者在五百里稍地各食二十五里與大夫同不得立兩卿五大夫亦職相兼也邦君諸侯尚書云列爵維五分土維三周禮曰八命作牧九命作伯又云上公九命為伯侯伯七命子男五命又云邦畿方千里其外方五百里謂之侯服嵗一見其貢祀物又其外方五百里謂之甸服二嵗一見其貢嬪物又其外方五百里謂之男服三嵗一見其貢器物又其外方五百里謂之采服四嵗一見其貢服物又其外方五百里謂之衛服五嵗一見其貢材物又其外方五百里謂之要服六嵗一見其貢貨物九州之外謂之蕃國世一見各以其所貴寳為摯禮記曰諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓉然後為鬯白虎通云伏羲氏之王天下也爵有五等以法五行也或三等者法三光也質家據天故法三光文家據地故法五行含文嘉曰殷爵三等周爵五等各有宜也初學記云易稱先王建萬國親諸侯史記云黄帝置左右大監以監萬國堯典云協和萬邦左傳云禹㑹諸侯于塗山執玉帛者萬國萬國之數蓋親賢兼封夏列九州制五服立爵三等分地有三公侯方百里伯方七十里子男五十里不足五十里曰附庸殷則爵列三等周又列為五等則公方五百里侯伯子男各百里為差不滿百里為附庸凡王之子弟並參封之􅉏御朱傳云近侍也楚語居寢有􅉏御之箴注􅉏近也舌釋名云舌洩也舒洩所當言也舌卷也可以卷制物使不落也元命包云舌之為言達也陽立于三故舌在口中者長三寸象斗玉衡隂合有四故舌淪入嗌内者長四寸養性經云舌者和之候也王都釋名云國城曰都者國君所居人所都㑹也血釋名云血濊也出于肉流濊濊也文子云人受天地變化而生一月而膏二月血脉又云血氣者人之華也素問云諸血者皆屬于心肝受血而能視足受血而能步掌受血而能握指受血而能攝小旻篇龜爾雅云龜三足賁俯者靈仰者謝前弇諸果後弇諸獵左倪不類右倪不若一曰神龜二曰靈龜三曰攝龜四曰寳龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜易云或益之十朋之龜離為龜易緯云靈蓍四十九莖下有千嵗龜守之禹貢云九江納錫大龜雒書云靈龜王者不偏黨尊耆老則出逸周書云伊尹請正西以神龜為獻周禮鼈人秋獻龜魚龜人掌六龜之屬天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰臘屬北龜曰若屬各以其方之色與其體辨之凡取龜用秋時攻龜用春時各以其物入于龜室上春釁龜大戴禮云甲蟲三百六十而龜為之長月令云季秋登龜取黿季冬命大史釁龜筴禮運云龜以為畜故人情不失逸禮云天子龜尺二寸諸侯八寸大夫六寸民士四寸龜者隂蟲之老也龜三千嵗上㳺於卷耳上老者先知故君子舉事必攷之禮斗威儀云君乘土而王則龜被文而見運斗樞云瑶光星散為龜管子云伏闇能存而能亡者蓍龜與龍是也龜生于水發之于火於是為萬物先為禍福正史記云龜千嵗乃游蓮葉之上江旁人家常畜龜飲食之以為能導引致氣有益于助衰養老褚先生云一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰日月龜七曰九州龜八曰王龜凡八名龜各有文在腹下此龜不必滿尺二寸民人得長七八寸可寳矣論衡孔子云龍食於清游于清龜食於清游于濁魚食於濁㳺于清説苑云靈龜文五色似玉似金背隂向陽上隆象天下平法地槃衍象山四趾轉運應四時文著象二十八宿虵頭龍翅左精象日右精象月千嵗之化下氣上通能知存亡吉凶之變寜則信信如也動則著矣龜經云龜一千二百嵗可卜天地之終始又云夫龜甲黄足赤眼白尾青腹黑者蓋稟受乎五行之粹也埤雅云龜舊也外骨内肉腸屬于首廣肩無雄與虵為匹故龜與虵合謂之𤣥武化書曰龜龜相顧神交也言龜亦有以神交者易曰舎爾靈龜蓋龜有靈德伏匿而噎善潜而不志於養小宛篇螟蛉爾雅云螟蛉桑蟲郭注俗謂之桑蟃亦曰戎女陸璣云螟蛉者桑上小青蟲也似歩屈其色青而細小或在草萊上蜾蠃爾雅云蜾蠃蒲盧郭注即細腰蟲也俗呼為蠮螉說文云細腰土蠭也天地之性小腰純雄無子陸璣云蜾蠃土蜂也似蜂而小腰取桑蟲負之于木空中七日而化為其子列子云純雄其名穉蜂方言曰蠭趙燕之間謂之蠓螉其小者謂之蠮螉或謂之蚴蛻法言云螟蛉之子殪而逢果蠃祝之曰類我類我乆則肖之矣博物志云蜂無雌取桑蟲或阜螽子抱而成已子本草蠮螉一名土蜂陶隠居云此類甚多雖名土蜂不就土中為窟謂摙土作房爾今一種黑色腰甚細衘泥于人室及器物邊作房如併竹管者是也其生子如粟米大置中乃捕取草上青蜘蛛十餘枚滿中仍塞口以擬其子大為糧其一種入蘆竹管中者亦取草上青蟲一名蜾蠃詩人云螟蛉有子蜾蠃負之言取青蟲教祝變為已子斯為謬矣唐本注云土蜂土中為窠大如烏蜂不傷人非蠮螉蠮螉不入土中為窠段成式云書齋中多蠮螉好作窠于書卷或在筆管中祝聲可聴有時開卷視之悉是小蜘蛛大如蠅虎以泥隔之乃知不獨負桑蟲也宋齊丘云蠮螉之蟲負螟蛉之子傳其情交其精混其氣和其神隨物大小皆得其眞蠢動無定精萬物無定形范處義云説者攷之不精乃謂蜾蠃負桑蟲為子近世詩人取蜾蠃之巢毁而視之乃自有細卵如粟寄螟蛉之身以養之其螟蛉不生不死蠢然在穴中乆則螟蛉盡枯其卵日益長大乃為蜾蠃之形穴竅而出按蜾蠃煦嫗螟蛉以成其子揚雄鄭𤣥皆有是説列子云純雄其名穉蜂莊子云細腰者化是也惟陶隠居以為不然有擬子大為糧之論而鄭樵駁之以為後人壊蜾蠃房見有卵如粟在死蟲上者是變與未變耳將故房看之其蟲殻皆如蛻形則非為物所食明矣范處義之說更益可疑彼所謂詩人者業已剖視其房見有不生不死之螟蛉後日何待穴竅而出且巢破子應毁何得日益長大蓋欲創新説因貞白之論而影響測度非實事也楊用修引之于丹鉛錄不思甚矣桑扈爾雅云鳸鴳又云桑鳸竊脂郭云俗謂之青雀嘴曲食肉好盜脂膏因名云又云春鳸鳻鶞夏鳸竊𤣥秋鳸竊藍冬鳸竊黄桑鳸竊脂棘鳸竊丹行鳸唶唶宵鳸嘖嘖注諸鳸皆因其名色音聲以為名疏云釋獸云虎竊毛謂之虦貓魋如小熊竊毛而黄竊即古淺字竊脂為淺白也而諸儒必為盜竊脂膏者以此經下别云桑扈與竊黄等並列則為淺白者也春秋九扈是也此自别一種青雀好竊脂肉目騐而然詩交交桑扈是也左傳云九扈為九農正賈逵注云桑扈竊脂為蠶驅雀者也山海經云崌有鳥焉如鶚赤身白首其名竊脂注云今呼青雀為竊脂疑非此也淮南子云馬不食脂桑扈不食粟非廉也通志云桑扈今名蠟觜性慧可教多在桑木故名埤雅云桑扈一名而二種詩所謂率場啄粟者以性之竊脂膏者言故以啄粟為失其性所謂有鶯其羽者以色之淺白者言故其序曰君臣上下動無禮文焉爾雅主詩言之小雅桑扈所取有兩故亦兩解補傳曰或指其色或指其性實一物耳岸傳云岸訟也韓詩作犴云鄉亭之繫曰犴朝廷曰獄小弁篇鸒爾雅云鸒斯鵯鶋郭云雅烏也小而多羣腹下白江東亦呼為鵯鳥小爾雅云小而腹下白不反哺者謂之雅烏說文云雅楚烏也一名鸒一名鵯居秦謂之雅法言云頻頻之黨甚於鸒斯亦賊夫糧食而已東都賦云鵯鶋秋棲通志云雀類差小多羣飛食穀俗呼必鳥鵯音匹聲相近按孔氏以斯為語辭而譏劉孝標類菀立鸒斯之目然爾雅法言俱名鸒斯何以定斯之一字必為語辭乎鄭夾漈通志亦曰鸒斯毛說文眉髪之屬及獸毛也釋名云毛貎也冒也在表所以别形貎且以自覆冒也辰箋云謂六物之吉凶左傳晉侯謂伯瑖曰何謂六物對曰嵗時日月星辰是謂也服䖍云嵗嵗星之神也左行于地十二嵗而一周時四時也日十日也月十二月也星二十八宿也辰十二辰也足釋名足續也言續踁也又云足底也禮記云足容重壊木壊說文作瘣云病也一曰腫旁出也爾雅云瘣木符婁某氏曰詩云譬彼瘣木疾用無枝符婁尫傴内疾瘣磊故疾用無枝郭璞曰謂木病尫傴癭腫無枝條墐傳云墐路冢也說文作殣云道中死人人所覆也左傳云道墐相望巧言篇寢爾雅云室無東西廂曰寢周禮隸僕掌五寢之埽除糞灑之事祭祀修寢大䘮復於小寢大寢注云五寢五廟之寢也周天子七廟惟祧無寢詩云寢廟繹繹相連貎也前曰廟後曰寢小寢髙祖以下廟之寢也始祖曰大寢朱傳云凡廟之制前廟以奉神後寢以藏衣冠祭于廟而燕于寢毚兔倉頡解詁云毚大兔也犬詳見召南厖說文云犬狗之有懸蹄者也孔子曰視犬之字如畫狗也何承天纂文曰守犬為獖隴西以犬為猷階說文陛也䘮大記虞人設階注梯也釋名云階梯也如梯之等差也㣲尰爾雅云骭瘍為㣲腫足為尰郭注骭脚脛也瘍瘡也孫炎曰皆水濕之疾也何人斯篇暴附蘇鄭氏曰暴蘇皆畿内國名春秋文公八年公子遂㑹雒戎盟于暴杜注云鄭地路史云暴新公采鄭邑也一曰隧成十一年傳云昔周克商使諸侯撫封蘇忿生以温為司冦寰宇記温縣故國已姓蘇忿生所封世本云暴辛公作壎蘇成公作篪一統志河南懐慶府温縣周為蘇忿生之封邑陳爾雅云堂塗謂之陳孫炎曰堂下至門之徑攷工記堂涂十有二分壎爾雅云大塤謂之嘂注塤燒土為之大如鵝子銳上平底形如稱錘六孔小者如雞子風俗通云塤燒土為也圍五寸半長一寸半有四孔其二通凡六孔白虎通云壎坎音也在十一月陽氣于黄泉之下薰蒸而萌釋名云塤喧也聲濁喧喧然也周禮小師掌教塤瞽矇掌播塤笙師掌教吹塤樂記曰鞉鼓椌楬壎篪此六者德音之音也世本云暴辛公作塤吕氏春秋云倕作塤篪唐樂志云壎熏也立秋之音萬物將曛黄也樂書云塤立秋之音平底六孔水之數也中虛上銳火之形也以水火合而成器亦以水火和而成聲故大者聲合黄鍾大吕小者聲合太蔟夾鍾古有雅塤如雁子頌塤如雞子又云土埏埴以成器而沖氣出焉其風則坤其方則西南之維其時則秋夏之交其風則涼其聲尚宫其音則濁立秋之氣也篪爾雅云大篪謂之沂孫炎曰沂悲也郭璞曰篪以竹為之長尺四寸圍三寸一孔上出寸三分名翹横吹之小者尺二寸廣雅云八孔邢昺曰鄭司農注周禮云篪七孔蓋不數其上出者故七也廣雅云篪長尺四寸有八孔前有一孔上有三孔後有四孔頭有一孔風俗通云篪管樂十孔長尺一寸釋名云篪啼也聲從孔出如嬰兒啼聲也周禮云笙師掌教吹篪月令云仲夏之月命樂師調篪篪世本云蘇成公造篪吹孔有觜如酸棗竹譜云有竹象蘆因以為名東甌諸郡縁海所生凡今之篪匪兹不鳴詛周禮司盟掌盟載之法盟萬民之犯命者詛其不信者有獄訟者則使之盟詛各以其地域之衆庶共其牲而致焉詛祝掌盟詛之祝號作盟詛之載辭以叙國之信用以質邦國之劑信毛氏云詛君以豕臣以犬民以雞韓詩云盟牲所用天子諸侯以牛豕大夫以犬庶人以雞鄭氏曰大事曰盟小事曰詛賈公彦曰盟者盟將來詛者詛徃過左傳注云詛以禍福之言相要陳祥道曰盟有繼之以詛詛有不繫于盟大事必盟而或詛詛以詛往過而或為將來盟詛皆坎牲加書以告神明其異者盟有執耳㰱血既盟有祈而詛無是也鬼說文云人所歸為鬼韓詩外傳云人死肉歸于土血歸于水骨歸于石魂氣升于天其隂氣薄然獨存無所依也故純隂底滯之氣著人為害蜮陸璣云一名射影如龜三足江淮水皆有之人在岸上影見水中投人影則殺之故曰射影南人將入水先以瓦石投水中令水濁然後入或曰含沙射人皮肌其瘡如疥周禮壺涿氏掌除水蟲注狐蜮之屬漢五行志云劉向以為蜮生南越越地多婦人男女同川淫女為主亂氣所生故聖人名之曰蜮蜮猶惑也在水旁能射人甚者至死南方謂之短狐劉歆以為蜮盛暑所生非自越來也京房易傳云忠臣進善君不試厥咎國生蜮韓詩外傳云短狐水神也抱朴子云蜮一名射工一名射影水蟲也狀似鳴蜩有翼能飛口中有横物聞人聲以氣為矢激水射人中身即發瘡病似大傷寒不治殺人冬天蟄谷間大雪時索之此蟲所在雪不積留氣起如灼蒸當掘之入地一尺則得也𤣥中記云水狐者視其形蟲也其氣乃鬼也長三四寸色黑廣寸許背上有甲厚三分許其頭有角去二三步則氣射人中十人六七人死鴛鴦鸑鷲蟾蛛悉食之地里志云江南山溪水中有射工甲蟲之類也長一二寸口中有弩以氣射人影隨所著處發瘡南越志云水弩四月一日上弩射人影至八月卸弩埤雅云一名溪毒俗呼水弩鵝能食之禽經所謂鵝飛則蜮沈雅翼云說者言水弩狀如蜣蜋尾長四寸即弩也按蜮劉向以為生于南越百越之地至秦方入中國詩人豫以入咏當是中國亦有之耳然本一物也或言如龜鱉三足或言如鳴蜩或言如蜣蜋或言甲蟲或言有翼能飛或言長三四寸或言長一二寸或言含沙射人或言激氣射人其説紛錯如此漢書東方朔傳人主之大蜮師古云魅也説者以為短狐非也錢白石又云說文所謂似鱉三足者能也非蜮也韻㑹因以鬼魅之蜮音惑短狐之蜮音域亦未知然􅆕說文云靣顔前也釋名云靣漫也七發云太子陽氣見于眉宇之間浸淫而上㡬滿大宅注大宅靣也眞誥云靣者神之庭巷伯篇貝說文云貝海介蟲也古者貨貝而寳龜至周而有泉到秦廢貝行泉爾雅云貝陸居在水者蜬大者魧小者鰿𤣥貝貽貝餘貾黄白文餘泉白黄文蚆博而頩蜠大而險􅜽小而橢書云揚州厥篚織貝又顧命云大貝鼖鼓在西房詩義疏云貝龜鱉屬餘蚳黄為質以白為文餘泉白為質黄為文又有紫貝白質如玉紫點為文皆行列相當大者至尺六七寸今九眞交趾以為杯盤寳物運斗樞云摇光得江吐大貝山海經云陽山濁洛之水注于蕃之澤中多文貝隂山漁水中多文貝邽山濛水多黄貝蒼梧之野爰有文貝相貝經云盈尺如赤電黑雲謂之紫貝素質紅黑謂之珠貝青地緑文謂之綬貝黑文黄畫謂之霞貝紫愈疾珠明目綬消氣障霞伏蛆蟲貝大者如輪浮貝使人寡濯貝使人善驚雖貝使病瘧皭貝使胎消惠貝使善忘醟貝使童愚女淫碧貝使人盜委貝使志强南州異物志云交趾北南海中有大文貝質白而文紫天姿自然不假雕琢磨瑩而光色煥爛交州記云大貝出日南如酒杯小貝貝齒也善治毒俱有紫色埤雅云貝中肉如科斗而有首尾以其背用故謂之貝箕疏云箕四星二為踵二為舌踵狹而舌廣詩緯云箕為天口主出氣春秋緯云月離于箕風揚沙史記天官書云箕為敖客曰口舌索隠曰宋均云敖調弄也箕以􅉫揚調弄為象箕又受物有去去來來客之象也晉書云箕四星亦後宫妃后之府亦曰天津一曰天鷄凡日月宿在箕東壁翼軫者風起又主口舌主客蠻夷胡貊故蠻夷將動先表箕焉荆州星占云箕舌一星動則大風至不出三日又云箕第二星名風后豺爾雅云豺狗足郭云脚似狗貪殘之獸禮記季秋之月豺乃祭獸戮禽又云豺祭獸然後田獵左傳云戎狄豺狼不可厭也說文云豺狼屬狗聲埤雅云豺似狗而長尾白頰髙前廣後其色黄季秋取獸四靣陳以祀其先世謂之祭獸豺柴也豺體細瘦故謂之豺雅翼云豺牙如錐足前矮後髙肉酸不宜食有北傳云北方寒涼而不毛莊子云窮髪之北楊園傳云楊園園名按楊生下濕欲之高地者先歴卑處故云猗于畆丘也乃是園中有楊非必有園名楊園也畆丘爾雅云如畆畆丘李巡曰謂丘有壟界如田畆曰畆丘也孫炎曰方百步也六家詩名物疏卷三十九
