body:
  text: 六家詩名物疏卷五明馮復京撰國風召南一召括地志邵亭故城在岐州岐山縣西南十里故召公邑水經注雍水東逕邵亭南世謂之樹亭川亭故召公之采邑又京相璠曰亭在周城南五十里孔氏云召是周内之别名朱傳云舊説扶風雍縣南有邵亭今雍縣析為岐山天興二縣未知邵亭的在何縣按晉書地道記河東郡垣縣有召亭通典河南府王屋縣古召公之邑此武王分陜之後所徙非詩所云召也鵲巢篇鵲爾雅云鵲鵙醜其飛也􅭙注竦翅上下又云烏鵲醜其掌縮注飛縮脚腹下月令云季冬之月鵲始巢周書云小寒之日鴈北鄉又五日鵲始巢鵲不始巢國不寧易通卦驗云鵲者陽鳥先時而動先事而應見于未風之象失節不巢癸氣不通故言春不東風也箋云鵲作巢冬至架之至春乃成詩推度災云鵲以復至之月始作室家鳴鳩因成事天性如此也禽經云鵲以音感而孕又云鵲鳴唶唶曾子曰鵲上髙城之塘而巢于髙枝之巔城壞淩風而起淮南子云鵲識歲之多風去喬木而巢扶枝又云蟄蟲鵲巢皆向天一者至和在焉又云太隂所建鵲巢向而為户又曰乾鵠知來而不知往乾鵠鵲也博物志云鵲巢開口背太歳陸賈云乾鵲噪而行人至陶貞白云一名飛駁鳥陸佃云鵲知人喜作巢取在木杪枝不取墮地者皆傳枝受卵故一名乾鵲荘子云烏鵲孺鵲以傳枝少欲故曰孺也羅願云鵲巢水大則髙水小則卑傳枝而生子春二月有乳鵲矣已而舎去他鳥居之故召南稱鳩居鵲巢今烏之類亦逐鵲而居其巢鵲尾尤長故漢髙祖劉氏冠民間謂之鵲尾冠能制蝟其所在蝟必反腹而受啄矣按爾雅鷽山鵲注似鵲而有文采長尾觜脚赤説文云知來事鳥也據此則群書所言知來者乃是鷽非鵲也巢説文云鳥在木上曰巢在穴曰窠鳩鳲鳩傳云鳩鳲鳩秸鞠也釋鳥云鳲鳩鴶鵴疏左傳云鳲鳩氏司空詩云維鳩居之皆謂此也郭云今之布穀江東呼為穫穀方言云戴勝謝氏云布穀類也陸璣疏云今梁宋之間謂布穀為鴶鵴一名擊穀一名桑鳩按戴勝自生穴中不巢生而方言云戴勝非也禽經云鳩拙而安注鳲鳩也禮記云仲春之月鷹化為鳩列子云鷂之為鸇鸇之為布穀布穀乆而復為鷂埤雅云鳲鳩一名摶黍今之布穀江東呼為郭公牝牡飛鳴以翼相拂不自為巢居鵲之成巢冇均一之德蓋其哺子朝自上而下暮自下而上者均也其子在梅在棘在榛已常在桑者一也周官羅氏仲春獻鳩以養國老者鳩性不噎食之復助氣故也雅翼云此鳥鳴時播種其穀故曰布穀似鷂長尾好鳴之鳥故月令謂之鳴鳩歐陽永叔云今所謂布穀戴勝者與鳩絶異惟今人直謂之鳩者拙鳥也不能作巢多在屋瓦間或於樹上架構樹枝初不成窠便以生子徃徃墜雛鵲作巢甚堅既生雛散飛則棄而去容有鳩來處彼空巢詩緝云一名桑鳩仲春鷹所化為鳩也或謂之題肩齊人謂之擊正按揚雄方言尸鳩或謂之戴勝邢氏已辨其非又云或謂之鶭鸅此即釋鳥所云鶭鸅虞非尸鳩也則其他鶝䲹服鶝􅫁諸異名皆不足據羅願以為即月令之鳴鳩據馮􅄛逐婦書云口如布穀則此鳥亦多聲者但鳴鳩自是鶻鵃而非鳲鳩也羅氏之言失于詳究矣依歐陽氏則拙鳩别是一種不在左傳五鳩之内此盖以時驗知之或得其實然古之釋詩者皆謂鳲鳩有均壹之德故以比夫人若但拙而已安足稱乎兩風俗通云車一兩謂兩兩相與體也箱装及輪兩兩而耦故稱兩爾采蘩篇蘩爾雅云蘩皤蒿陸疏云凢艾白色為皤蒿今白蒿春始生及秋香美可生食又可蒸一名游胡北海人謂之滂渤故夏小正傳曰蘩游胡游胡滂渤也本草注云生中山川澤二月采又云此蒿麄於青蒿從初生至枯白於衆蒿又云葉似艾葉上有白毛麄澁俗呼為蓬蒿孟詵云此蒿春初先諸草生其葉生挼醋淹之為菹甚益人陸佃云蒿青而髙蘩白而繁詩曰采蘩祁祁今覆􅁞種尚用蒿羅願云莪即古之蘩生澤田漸洳之處詩云采蘩于沼沚澗中明是水草説者乃云蘩皤蒿皤蒿陸草不妨亦謂之蘩顧非夫人所採爾按本草注生中山川澤則皤蒿不妨為水物也但所在有之多生陸地耳羅氏背爾雅而自為説非也爾雅又云蘩菟蒵郭景純所未詳仙經曰白蒿白兔食之仙豈謂是與沼廣雅云沼池也圓曰池曲曰沼孔安國云停水曰池古今事物類考云黄帝破蚩尤而為池沼蓋始於此沚爾雅云小洲曰陼小渚曰沚小沚曰坻人所為為潏釋名云沚止也小可以止息其上也韓詩説大渚曰沚澗釋名云澗間也言在兩山之間也爾雅云山夾水澗陵夾水澞宫傳云宫廟也爾雅云適有東西廂曰廟無東西廂有室曰寢釋名曰廟貌也先祖形貌所在也説文云亡者神無所依據孝子以主繼心廟者所以藏主列昭穆摯虞決疑要注曰凡廟之主藏于户外西牖之下有石函故名宗祏周禮小宗伯掌建國之神位右社稷左宗廟辨廟祧之昭穆守祧掌守先王先公之廟祧其遺衣服藏馬其廟則有司修除之其祧則守祧􅉳堊之匠人營國左祖右社廟門容大扃七个闈門容小扃三个王制云天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三廟一昭一穆與太祖之廟而三士一廟庶人祭于寢明堂位云山節藻棁復廟重簷刮楹達鄉反坫出尊崇坫康圭疏屏天子之廟飾也祭法云王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之去墠曰鬼諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之去墠為鬼大夫立三廟二壇適士二廟一壇官師一廟小記曰王者禘其祖之所自出以其祖配之而立四廟庶子王亦如之荀子云有天下者事七世有一國者事五世有五乗之地者事三世有三乗之地者事二世持手而食者不得立宗廟所以表積厚積厚者流澤廣積薄者流澤狹也按康成解七廟云此周制七者太祖及文王武王之祧與親廟四太祖后稷殷則六廟契及湯與二昭二穆夏則五廟無太祖禹與二昭二穆而已其意以文武湯禹皆為祧也祭法云逺廟為祧合五考二祧以足七數若以文武為祧則天子所祭仍是四親與諸侯何别哉故王肅難鄭云文武受命之王不遷之廟權禮所施殷之三宗宗其德而存其廟亦不以為數穀梁傳孫卿子家語皆言天子立七廟不稱世室今使天子諸侯立廟並親廟四而止非降殺以兩之義又祭法云王下祭殤五則下及無服之孫而上不及無親之祖不亦詭哉予考之虞書云禋于六宗晉秀才張髦曰六宗三昭三穆并太祖則為七矣是虞有七廟也伊尹稱七世之廟可以觀德是殷有七廟也禮緯稽命徴云唐虞五廟夏四廟殷五廟䜟緯之書出於新莽東漢之代未足多據孔子家語曰天子七廟諸侯五大夫三士二自虞至周所不變也其先祖之有功德者則創不遷之廟以世祀之非祭法所謂祧也殷之三宗周之文武漢之孝文武宣皆然明堂位云魯公之廟文世室也武公之廟武世室也若依鄭説則魯祖周公又宗二公後君所祭止及考與王考所謂月祭之皇考享嘗之顯考皆在壇墠之列矣反不若大夫之得祭皇考尊卑失序不可謂禮故七廟之説斷從王肅為長被箋云禮記主婦髲髢説文云髲益髪也釋名云髲被也髮少者得以被助其髮也少牢禮云主婦被錫注云被錫讀為髲鬄古者或剔賤者刑者之髪以被婦人之紒為飾因名髲鬄焉此周禮所謂次也士昏禮云女次純衣纁袡注云次首飾純衣絲衣周禮云追師掌王后之首服為副編次注云副以覆首若今歩服之以從王祭祀編列髮為之若假紒服之以桑次次第髮長短為之所謂髲髢服之以見王外内命婦衣鞠衣襢衣者服編衣褖衣者服次非王祭祀賔客佐后之禮自於其家則亦降焉凢諸侯夫人于其國衣服與王后同嚴粲云王后六服褖衣為進朝于王之服首則服次夫人于國與王后服同祭祀不應服次曹氏謂此在商時與周禮異按鄭注編云列髮為之若今假紒注次云次第髮長短為之所謂髲髢假紒之制今不可考而髲髢則今婦人所恒用也朱傳云編髮為之誤以次為編矣夫人服被者在祭前視濯溉饎㸑之時及祭畢之後鄭箋甚明若正祭自然服副不服被禮云夫人副褘立于東房是也侯伯子男之夫人服二翟亦應服副矣嚴坦叔引曹氏之言亦非夙説文作云早敬也从持事雖夕不休早敬者也徐鉉云今俗作夙譌夜説文舎也天下休舎也草蟲篇草蟲釋蟲云草螽負蠜郭璞曰常羊也陸疏云大小長短如蝗竒音青色好在茅草中左傳有蜚杜注云蜚負蠜疏負蠜歲時常有非災蟲蜚一名負盤此注相渉誤為蠜耳陳藏器云飛廉一名負盤蜀人食之辛辣杜預左傳注云蜚負蠜如蝗蟲又夜行一名負盤名字及蟲相似終非一物也陸佃云一云蚯蚓即負蠜亦以離應草蟲鳴于上風負螽鳴于下風而風化羅願云蚓雖微物其啟閉有時故月令孟夏螻蟈鳴後五日蚯蚓出冬至之日蚯蚓結皆以紀候夏夜好鳴于草底江東謂之歌女或曰鳴砌詩喓喓草蟲趯趯阜螽説草蟲固多端案張衡云土蟺鳴則阜螽跳是則蚓為草蟲也詩緝云負螽也蠜也即螽斯也按釋草蟲者不一然以為似蝗者近之詩緝以草蟲阜螽螽斯為一以螽斯斯螽為二螽斯斯螽吾不知其為同為異而阜螽草蟲之與螽斯則斷乎為三考爾雅自辨矣阜螽釋蟲云阜螽蠜李廵曰蝗子也陸疏云今人謂蝗子為螽子兖州人謂之螣許慎云蝗螽也蔡邕云螽蝗也明一物箋云草蟲鳴阜螽躍而從之異種同類猶男女嘉時以禮相求呼陸佃云阜螽今謂之􅪁䗥示跳示飛飛不能逺青色草蟲鳴阜螽躍而從之故阜螽曰蠜草蟲謂之負蠜博物志云蜾臝亦取阜螽子呪而成己子陳藏器云阜螽蚯蚓二物異類同穴為雌雄阜螽如蝗蟲東人呼為舴艋有毒按爾雅釋阜螽但云蠜而已不知蠜是今之何物陳藏器云如蝗蟲盖亦蚱蜢之類也李廵陸璣直謂為蝗殊不思蝗是災蟲劉向所謂介蟲之孽豈嵗時所恒有而詩人詠之予謂凡經傳直謂之螽者蝗也凢似蝗而不為災嵗時恒有者通得螽名故有阜螽草螽蜤螽蟿螽土螽之别諸説紛紛各執所見不辨可也蕨爾雅云蕨􅣀注廣雅云紫藄非也初生無葉可食陸疏云蕨山菜也周秦曰蕨齊魯曰虌初生似䔉莖紫黒色可食如葵陸佃云状如大雀拳足又如其足之蹷故謂之蕨俗云初生亦類鼈脚故曰􅣀也羅願云蕨生如小兒拳紫色而肥野人今歳焚山則來歳蕨菜繁生其舊生蕨之處蕨葉老硬敷披人誌之謂之蕨基今道路負荷轉移者皆不肯食云令人脚弱薇猶禮家用之蕨不復用可知賤也通志云蕨一名􅣀莽牙也四皓食之而夀夷齊食之而夭此物不可生食又有一種大蕨亦可食謂之藄蕨爾雅云藄月爾陳藏器云今永康道江居民多以醋淹而食之薇陸疏云山菜也莖葉皆似小豆蔓生其味亦如小豆藿可作羮亦可生食今官園種之以供宗廟祭祀埤雅云爾雅曰薇垂水好生水邊故曰垂水似藿菜之微者也故禮芼豕以薇記曰鉶芼牛藿羊苦豕薇是也雅翼云文王之時歌采薇以遣戍役一章作止二章柔止三章剛止故先儒以為所遣有先中後輩首章則二月中旬遣之次章三月上旬遣之三章則三月中旬遣之通志云白薇曰白幕曰薇草曰春草曰骨美又云薇生水㫄葉如萍爾雅云薇垂水三秦記夷齊食之三年顔色不變武王戒之不食而死然詩云采薇者金櫻茅也朱傳云薇似蕨而差大有芒而味苦山間人食之謂之迷蕨胡明仲云荆楚之間有草叢生修條四時發頴春夏之交花亦繁麗條之腴者大如巨擘剥而食之甘美野人呼為迷陽疑莊子所謂迷陽迷陽無傷吾行即此蕨也按本草薇有二種生平原川谷似柳葉者白薇也生水旁葉似萍者薇也詩云陟山採薇又云山有蕨薇則是山菜非爾雅所云垂水者也埤雅混而一之誤矣然陸璣稱莖葉如小豆蔓生璣親見官園所種所言必審復非似柳之白薇鄭漁仲謂是金櫻芽不知何據朱子胡氏皆以為迷陽而一云味苦一云甘美又自不同惟項安世以為今之野豌豆蜀人謂之巢菜有合陸璣之疏六家詩名物疏卷五
