body:
  text: 六家詩名物疏卷五十明馮復京撰大雅蕩之什一蕩篇羹爾雅云肉謂之羮廣雅云羮謂之湆釋名云羹汪也汁汪郎也天官亨人祭祀共大羹鉶羹賔客亦如之疏云大羹肉湆盛於登謂大古之羹不調以鹽菜及五味鉶羹是陪鼎膷臐膮調以五味盛於鉶器謂之鉶羹若盛之於豆即謂之庶羞即公食大夫十六豆也公食大夫記云鉶芼牛藿羊苦豕薇皆有滑士虞記云鉶芼用苦若薇有滑夏用葵冬用荁曲禮云進食之禮羹居人之右母嚃羹母絮羹羹之有菜者用挾無菜者不用挾禮運云退而合亨實其鉶羹禮器云納牲詔於庭血毛詔於室羹定詔於堂郊特牲云大羹不和貴其質也内則云膳膷臐膮食雉羹麥食脯羹鷄羹折稌犬羹兔羹和糝不蓼凡羹齊視夏時士不貳羹胾鶉羹鷄羹釀之蓼羹食自諸侯以下至于庶人無等玉藻云子卯稷食菜羹毛詩義問云鉶羹有菜鹽䜴其中菜為其形象可食因以鉶為名朱子云鄉飲酒禮鄉射禮燕禮大射儀公食大夫禮少牢饋食禮皆曰羹定蓋以羹熟為節然後行禮鬼方易髙宗伐鬼方大戴禮帝繫曰陸終娶于鬼方氏世本注云鬼方於漢則先零戎後漢西𦍑傳云武丁伐西戎鬼方三年乃克唐髙祖紀云夏曰熏鬻商曰鬼方周曰玁狁漢曰匈奴魏曰突厥朱子殷武傳曰髙宗伐鬼方蓋謂是與按鬼方不詳其地蓋是逺夷之國也古有三説俱非確證本説文曰木下曰本从木一在其下徐曰一記其處也抑篇蠻方鄭注云九州之外不服者疏云謂治夷鎮蕃三服禹貢五百里荒服三百里蠻二百里流大司馬云蠻畿外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿大行人云九州之外謂之蕃國世一見各以其所貴寳為摯周語云蠻夷要服戎狄荒服屋漏爾雅云西北隅謂之屋漏孫炎曰當室之所白日光所漏入舍人曰古者徹屋西北隅以炊浴没者訖而復之故謂之屋漏箋云屋小帳也漏隱也禮祭于奥既畢改設饌于西北隅而䨾隱之處此祭之末也疏云天官幕人職掌帷幕幄帟注云幕以布幄帟以繒為之幄在帷幕内則為小帷室内亦有之屋漏者正謂西北隅也言祭末時事者特牲禮尸謖之後云佐食徹尸薦爼敦設于西北隅凡在南厞用筵納一尊佐食闔牖户降是其事也禮記鄭注云祭成人始設奠于奥是謂隂厭尸謖後改饌于西北隅是謂陽厭若宗子為殤惟有隂厭若庶子適殤宗子適殤惟有陽厭士有隂厭陽厭天子諸侯亦同唯上大夫無陽厭為當日賔尸故也按鄭之義以陽厭為祭末之事助祭者至此易倦故以不愧戎之考之特牲禮隂厭尊有𤣥酒陽厭納一尊而已隂厭備鼎爼陽厭爼釋三个而已則非徒在祭末而其禮亦略矣朱子云獨居於室不主祭言故逌旃𤨏言云不愧屋漏猶曰不愧闇室然孔子云當室之白尊于東房是謂陽厭則屋漏非暗室矣此箋云厞隱之處蓋用儀禮厞用筵之文彼文又云佐食闔牖户降則室内無人故彼注云改饌為幽闇有司徹司宫闔牖户注云或者神欲幽闇是也非以屋漏為闇室也若詩取暗室之義則宜云不愧于奥不得云不愧于屋漏若欲從朱説者但謂室中雖虚尚當不愧于西北之隅理亦自通何必指明為暗反孔子之說乎柔木箋云柔忍之木被之弦以為弓考工記弓人為弓取幹之道七柘為上檍次之檿桑次之橘次之木𤓰次之荆次之為下凡相幹欲赤黒而陽聲赤黒則鄉心陽聲則逺根桑柔篇圉釋詁云圉垂舍人曰圉拒邊垂也孫炎曰國之四垂相漢書云丞相掌丞天子助理萬機蔡邕獨斷云相助也助理天下肺說文云肺金藏也釋名云肺勃也其氣鬱勃也素問云西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎肺主鼻又云肺者相傳之官治節出焉又云肺者氣之本魄之處也其華在毛其充在皮為陽中之大隂通於秋氣文子云肺為氣白虎通云肺所以義何肺者金之精義者斷决西方亦殺成萬物故肺象金色白繫於鼻腸說文云腸大小腸也釋名云腸暢也暢胃氣去滓穢也廣雅云腸詳也素問云六經為川腸胃為海又云脾胃大腸小腸者倉廪之本營之居也名曰器能化糟粕轉味而入出至隂之類通於土氣白虎通云大腸小腸心之府也主禮禮有分理腸亦大小相承受也大風箋云西風謂之大風釋天云西風謂之泰風孫炎曰西風成物物豐泰也易緯云立秋閶闔風至吕氏春秋曰西方曰飂風隧孔氏曰隧者道之别名雲漢篇郊周禮太宰祀五帝掌百官之誓戒與其具修前期十日帥執事卜日遂戒及執事視滌濯及納亨賛王牲事祀之日賛玉幣爵之事幂人祭祀以疏布巾幂八尊掌次祀五帝張大次小次設重帟重案大司徒祀五帝奉牛牲羞其肆充人掌繋祭祀之牲牷祀五帝則繫于牢芻之三月大宗伯以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方皆有牲幣各放其器之色祀大神祭大􅅘治其大禮國有大故則旅上帝小宗伯兆五帝于四郊大烖及執事禱祠于上下神􅅘典瑞四圭有邸以祀天旅上帝兩主有邸以事地旅四望司服祀昊天上帝則服大裘而冕祀五帝亦如之大司樂奏黄鍾歌大吕舞雲門以祀天神奏大蔟歌應鍾舞咸池以祭地示大祝掌六祈一曰類大司冦禋祀五帝涖誓百官祭之日奉明水火小司冦禋祀五帝實鑊水納亨亦如之職金旅上帝共其金版士師祀五帝則沃尸及王盥洎鑊水禮記月令孟春元日祈榖于上帝仲夏大雩帝禮運云祭帝于郊所以定天位祀社于國所以列地利禮器有以下為貴者至敬不壇埽地而祭有以素為貴者大圭不琢大羹不和大路素而越席犧尊疏布樿杓又云禮之近人情者非其至者也郊血又云莞簟之安而藳秸之設又云饗帝于郊而風雨節寒暑時郊特牲云郊特牲而社稷太牢郊之祭迎長日之至也大報天而主日也兆于南郊就陽位也埽地而祭于其質也器用陶匏以象天地之性也牲用騂尚赤也用犢貴誠也郊之用辛也周之始郊日以至卜郊受命于祖廟作龜于禰宫卜之日王立于澤親聽誓命獻命庫門之内戒百官也太廟之命戒百姓也祭之日王皮弁以聽祭報被衮以象天戴冕璪十有二旒乘素車旂有十二旒龍章而設日月帝牛必在滌三月稷牛惟具所以别事天神與人鬼也祭法云燔柴於泰壇祭天也瘞埋于泰折祭地也用騂犢祭義云郊之祭也喪者不敢哭凶服者不敢入國門敬之至也大報天而主日配以月夏后氏祭其闇殷人祭其陽周人祭日以朝及闇明堂位云魯君孟春乘大路載弧韣旂有十二旒日月之章祀帝于郊配以后稷天子之禮也公羊傳云郊則曷為必祭稷王者必以其祖配自内出者無主不行自外至者無主不止奠瘞孔氏曰奠謂置之於地瘞謂埋之於地禮與物皆謂為禮事神之物酒食牲玉之類也爾雅云祭天曰燔柴祭地曰瘞薶疏云祭天之禮積柴以實牲體玉帛而燔之使烟氣之臭上達於天祭神州地􅅘於北郊瘞繒埋牲因名祭地曰瘞理宗傳云宗尊也凶荒索鬼神而祭之周禮大司徒荒政十一曰索鬼神黨正春秋祭禜大祝掌六祈類造禬禜攻説小祝掌侯禳禱祠之祝號以逆時雨寧風旱祭法云埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神注相近當為禳祈宗皆當為禜疏此經所載謂四時乖序寒暑僣逆水旱失時須有祈禱非闗正禮之事左傳子産云山川之神則水旱癘疫之災於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之羣公先正月令仲夏命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益于民者以祈榖實注百辟卿士古者上公若句龍后稷之類疏百辟則古之上公國語鯀為宗伯祭法有祀之文社稷五祀雖為王朝卿士兼帶上公之官故左傳云封為上公祀為貴神周禮舞師掌教皇舞帥而舞旱暵之事稻人旱暵共其雩歛司巫若國大旱則帥巫而舞雩女巫旱暵則舞雩左傳云龍見而雩旱魃説文魃旱鬼也神異經云南方有人長二三尺袒身目在頂上走行如風名曰魃所見之國大旱赤地千里一名旱母遇者得之投溷中即死旱災消也山海經係昆之山有人衣青衣名曰黄帝女魃黄帝攻蚩尤冀州之野蚩尤請風伯雨師縱大風雨黄帝乃下天女曰魃雨止遂殺蚩尤魃不得復上所居不雨叔均言之帝後置之赤水之北所欲逐之者令曰神北行文字指歸云女妭秃無髪祈年疏云孟春祈榖孟冬祈來年是也月令孟春天子乃以元日祈榖于上帝注云謂以上辛郊祭太微之帝疏云郊特牲云郊不言祈榖此經言祈榖不言郊鄭以為二祭是一故此注謂以上辛郊祭也郊各祭所感之帝殷人祭汁㶢紀周人祭靈威仰左傳孟獻子云郊祀后稷以祈農事也是故啟蟄而郊郊而後耕注云啟蟄夏正建寅之月耕謂春分又云孟冬天子祈來年于天宗注云天宗謂日月星辰也蔡邕云日為陽宗月為隂宗北辰為星宗大宗伯以實柴祀日月星辰注云星謂五緯辰謂日月所㑹十二次疏云五緯即五星東方嵗星南方熒惑西方太白北方辰星中央鎮星辰雖據日月㑹時而言即二十八星也祭義云郊大報天而主日配以月疏云天帝獨為壇其日月及天神等各為一壇爾雅云祭星曰布按此祈來年於天宗既非遇災禱禳則與祭法所云王宫夜明幽禜祭日月星者異矣又非朝日夕月則與祭義所云祭日于壇祭月于坎者異矣其禮當如郊祭主日配月者日月及五緯星二十八經星合為一壇而以實柴祀之牲蓋用牛以大宗伯注推之可見庶正疏云正長也周官三百六十每官各有其長崧高篇崧釋山云山大而髙崧注今中嶽嵩髙山蓋依此名釋名云崧竦也亦髙稱也嶽釋山云泰山為東嶽華山為西嶽霍山為南嶽恒山為北嶽嵩丘為中嶽禮記云廵狩至于岱宗柴而望祀山川南嶽西嶽北嶽如初禮天子祭天下名山五嶽視三公大宗伯以血祭祭五嶽國有大故旅四望注云四望五嶽四鎮四瀆典瑞兩圭有邸以旅四望司服祀四望山川則毳冕大司樂奏姑洗歌南吕舞大㲈以祀四望凡五嶽崩令去樂職方氏荆州衡山豫州華山兖州岱山并州恒山白虎通云嶽之為言桷桷功徳東岱宗者言物更相代於東方南霍者護也太陽用事護養萬物西華者穫也萬物成熟可得穫也北恒者常也萬物伏藏有常也中央嵩山言其峻大之也風俗通云東方泰山尊曰岱宗岱始也宗長也萬物之始隂陽交代故為五嶽長南方衡山一名霍霍者萬物盛長垂枝布葉霍然而大西方華者萬物變華於西方也北方恒者常也中央嵩者髙也説苑云五嶽能大布雲雨焉能大歛雲雨焉雲觸石而出膚寸而合不崇朝而雨天下徳施博大故視三公也山海經云泰山上多玉下多金有獸曰狪狪太華之山削成而四方髙五千仭廣十里鳥獸莫居有蛇名肥􅖆小華之山木多荆杞獸多㸲牛隂多磬石陽多㻬琈之玉鳥多赤鷩艸有華荔衡山上多青䨼多桑其鳥多鸜鵒北嶽之山多枳棘剛木有獸名諸懐少室之山有木名帝休上多玉下多銕泰室之山有栯木䔄艸多美石按泰山在今山東濟南府泰安州北五里華山在陜西西安府華州華隂縣南十里衡山在湖廣衡州府衡山縣西三十里恒山在直𨽻眞定府定州曲陽縣西北一百四十里嵩山在河南河南府登封縣北十里禹貢之外方也東謂太室西謂少室相去十七里嵩其揔名也衡山一名霍故孔安國注尚書鄭𤣥注大宗伯服䖍注左傳及孝經鈎命决龍魚河圖皆以衡山為南嶽而書傳白虎通風俗通爾雅廣雅説苑諸書並以霍山為南嶽衡霍一也即今衡州之衡山也直𨽻廬州府六安州有霍山即天柱山漢武南廵以衡嶽逺阻乃移嶽神於此而祀焉其後因得衡山之名郭璞以六安之霍為南嶽非也鄭注大司樂五嶽數雍州之呉嶽而不數嵩盖以職方九州有呉嶽無嵩髙取爾雅五山五嶽差而配之以充五嶽四鎮故云爾其實五嶽不數河西嶽也呉嶽山在今陜西鳯翔府隴州南八十里伯周書云士率衆時作謂之伯要畧云伯把也持政事也風俗通云伯者長也白也言其咸建五長功實明白也王制云伯七十里周禮云諸侯之地封疆三百里其食者參之一又云伯執躬圭其他皆如諸侯之禮私人有司徹云主人降獻私人注云大夫言私人明不純臣玉藻云大夫私事使私人擯介圭釋器云珪大尺二寸謂之玠大宗伯以玉作六瑞以等邦國玉人之事鎮圭尺有二寸天子守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之按介之為言大也毛以為諸侯之瑞圭是也鄭獨以為尺二寸之圭不知尺二寸乃王之鎮圭豈得以賜諸侯乎尚書太保承介圭孔安國云大圭尺二寸天子守之可證介圭即鎮圭也郿朱傳云郿在鎬京之西岐周之東一統志郿縣在陜西鳯翔府府城東南百四十里郿城在郿縣北十五里渭水之北六家詩名物疏卷五十
