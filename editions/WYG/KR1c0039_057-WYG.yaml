body:
  text: 六家詩名物疏卷五十四明馮復京撰魯頌駉篇坰傳云坰逺野也林外曰坰箋云必牧於坰野者避民居與良田釋地云邑外謂之郊郊外謂之牧牧外謂之野野外謂之林林外謂之坰孫炎曰邑國都也設百里之國五者之界界各十里郡縣志坰澤俗名連泉澤在州曲阜縣九里魯僖公牧馬之地驈釋畜云驪馬白跨驈孫炎曰驪黑色也白跨股脚白郭璞曰跨髀間也騅釋畜云蒼白雜毛騅郭璞曰即今騅馬疏云蒼淺青也毛有淺青及白兼雜毛者名騅説文云騅馬蒼黒雜毛駓釋畜云黄白雜毛駓郭璞曰今之桃華馬疏云毛色黄白而復有雜毛者名駓孔氏云騅駓二者皆云雜毛是體有二種之色相間雜上云黄白曰皇黄騂曰黄止是一毛色之中自有淺深與此二色者異説文云駓黄馬白毛騂毛傳云赤黄曰騂疏騂為純赤色上云黄騂曰黄謂黄而微赤此云赤黄曰騂謂赤而微黄驒説文云青驪白鱗文如鼉魚釋畜云青驪驎驒孫炎曰色有淺深似魚鱗也郭璞曰色有深淺班剝隱粼今之連錢驄韓詩傳云驒白馬黒髦雒毛傳云黒身白鬛曰雒騢釋畜云彤白雜毛騢郭璞曰彤赤也即今赭白馬邢昺曰毛赤白兼雜毛者名騢說文曰馬赤白雜毛色似鰕魚也驔傳云豪骭白驔疏云説文骭骹也郭璞曰骭脚脛釋畜云四骹皆白驓無豪骭白之名傳言豪骭白者盖謂豪毛在骭而白長名為驔驓則四骹雜白而毛短故與驔異説文云驔驪馬黄脊按毛傳本作豪骭白朱傳因此傳四種馬文連餘三俱有曰字故云豪骭曰驔若然則豪是長毛骭是脚脛朱傳云豪在骭而白白字從何生出或朱傳本不誤因白曰二字相似後人書寫繆耳説文云驔驪馬黄脊按爾雅驪馬黄脊名為騽不名驔也説文騽字云馬豪骭反似用此傳文以驔為騽以騽為驔縱毛傳不足依豈爾雅亦可改乎許君於是失之逺矣魚釋畜云一目白瞷二目白魚郭云似魚目也雅翼曰相馬之説曰馬目欲得黄又欲光而有紫艶若小而多白則驚畏驚畏馬之大病故其序尤在後有駜篇駽釋畜云青驪駽孫炎曰色青黒之間郭云今之䥫驄泮水篇泮水傳云泮宫之水箋云泮之言半半水者盖東西門以南通水北無也天子諸侯宫異制因形然疏云魯有四代之學其行禮之飲酒養老兵事之受成告克當於周世之學在泮宫也朱子曰説文曰泮宫諸侯鄉射之宫西南為水東北為牆康成以為東西門其説不同王制云天子命之教然後為學小學在公宫南之左大學在郊天子曰辟廱諸侯曰類宫注云此大學小學殷制頖之言班所以班政教禮器云魯人將有事於上帝必先有事於頖宫注云頖郊之學詩所謂頖宫疏云魯以小學為頖宫明堂位云米廪有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也白虎通云諸侯曰泮宫半于天子宫也明尊卑有差所化少也半者象璜也獨南面禮儀之方有水其餘壅之以垣水經注靈光殿之東南即泮宫也在髙門直北道西宫中有臺髙八十尺臺南水東西百步南北六十步臺西水南北四百步東西六十步臺池咸結石為之詩所謂思樂泮水也一統志泮水一名雩水源出曲阜縣治西南西流至兖州府城東入泗水詩思樂泮水即此魯泮宫池在曲阜宣聖廟東南茆説文云􅛄鳬葵也詩曰言采其􅛄力久切周禮醢人朝事之豆茆苴麋臡注云茆鳬葵釋文云茆音卯北人音栁干寳云今之􅝶蹗艸堪為菹江東有之鄭小同云江東人名之蓴菜生陂澤中陸璣云茆與荇菜相似葉大如手赤圓有肥者著手中滑不得停莖大如匕柄葉可生食又可煮滑羙江南人謂之蓴菜或謂之水葵諸陂澤水中皆有何承天云此菜出東海堪為菹醬蜀本圖經云蓴生水中葉似鳬葵浮水上採莖堪噉花黄白子紫色三月至八月莖細如釵股黄赤色短長隨水深淺名為絲蓴九十月漸粗硬十一月萌在泥中名塊蓴體苦澀惟取汁味唐本草注云塊蓴為羹猶勝雜菜按本草鳬葵是荇菜蓴别一物合陸璣鄭小同之説觀之茆是蓴耳干寳何承天之説非也或以為猪蓴猪蓴即本草圖經所謂塊蓴又一名龜蓴茆與荇本相似故古人即謂之鳬葵飲酒箋云徵先生君子與之行飲酒之禮儀禮鄉飲酒鄉射皆云息司正羞唯所有徵唯所欲以告于先生君子可也鄉樂唯欲鄉射注云先生鄉大夫致仕者君子有大徳行不仕者獻馘獻囚箋云馘所格者之左耳囚所虜獲者馘説文作聝云軍戰斷耳也王制云天子將出征受成於學出征執有罪反釋奠於學以訊馘告注云受成定兵謀也釋菜奠幣禮先師也訊馘所生獲斷耳者疏云訊是生者馘是死而截耳者琛釋言云琛寳也舍人曰羙寳曰琛閟宫篇稙稺傳云先種曰稙後種曰稺韓詩説云稙長稼也稺㓜稺也説文云稙早種也稺㓜禾正義云重穋稙稺生熟早晚之共稱耳非榖名當謂先種先熟後種後熟但傳畧不言其熟叔父釋親云父之晜弟後生為叔父釋名云叔少也魯山川禹貢云海岱及淮惟徐州淮沂其又蒙羽其藝大野既豬東原底平公羊傳云三望者何泰山河海爾雅十藪魯有大野一統志兖州府春秋時為魯國有嶧山鳬山陪尾山龜山蒙山濟河泗水洙水泮水沂水鉅野澤羽山在登州府附庸王制云不能五十里者不合於天子附於諸侯曰附庸天子之元士視附庸注云不合謂不朝㑹也小城曰附庸以國事附於大國未能以其名通此商所因夏爵三等之制明堂位云封周公於曲阜地方七百里注云上公之封方五百里加魯以四等之附庸方百里者二十四并五五二十五積四十九開方之得七百里大司徒注云凡諸侯為牧正師長及有徳者乃有附庸為有禄者當取焉公無附庸侯附庸九同伯附庸七同子附庸五同男附庸三同進則取焉退則歸焉玉海云顓臾邾國無駭入極取鄟取郗魯附庸國也楅衡傳云楅衡設牛角以楅之也周禮封人祭祀飾其牛牲設其楅衡置其絼司農云楅衡所以楅持牛也絼著牛鼻繩所以牽牛者皆謂夕牲時杜子春云楅衡所以持牛令不得抵觸人𤣥謂楅設于角衡設於鼻如椵狀也按毛解楅衡同杜氏先鄭之説箋亦申成其義自戾周官注盖以無文故為兩解白牡騂剛公羊傳云魯祭周公何以為牲周公用白牡魯公用騂犅羣公不毛何休云白牡殷牲也周公死有王禮嫌不敢與文武同不以夏黒牡者嫌改周當以夏避嫌也魯公諸侯不嫌也故從周制明堂位云季夏六月以禘禮祀周公於太廟牲用白牡又云夏后氏牲尚黒殷白牡周騂剛説文云犅特牛也犧尊司尊彛云春祠夏禴朝踐用兩獻尊其再獻用兩象尊皆有罍鄭司農云獻讀為犧犧尊飾以翡翠象尊以象鳯凰或曰以象骨飾尊禮器云犧尊疏布鼏樿杓此以素為貴也又云君西酌犧象夫人東酌罍尊明堂位云以禘禮祀周公尊用犧象山罍又云泰有虞氏之尊也著殷尊也犧象周尊也左傳云犧象不出門鄭志云犧讀如沙刻畫鳯凰之象於尊其形婆娑然或有作獻字者齊人之聲誤耳阮堪禮圖云犧尊飾以牛象尊飾以象於尊腹之上畫為牛象之形王肅云太和中魯郡於地中得齊大夫子尾送女器有犧尊以犧牛為尊然則象尊為象形按宋蔡絛云上皇崇尚古器有得一器至百萬不啻者於是天下塚墓破伐殆盡政和間尚方所貯至六千餘數百器遂盡見三代典儀文章而讀先儒解説殆有可哂者如今博古圗所載即徽宗時物也其犧象二尊正如王肅所言全作牛象形開背受酒則康成阮諶之説盡臆度耳他器若爵之前如噣後如尾足脩而銳兩柱為耳異于刻雀負琖之形敦足垂花二舟與彛相似異于承槃之制皆有的據而反于先儒者也但謂古器皆冶銅為之絶無刻木髤漆者竊謂銅器可久不若木之易朽故宋人獨多得銅器耳難執此以廢彼也毛炰封人云歌舞牲及毛炰之豚注云爓去其毛而炮之以備八珍内則云炮取豚若將當作牂刲之刳之實􅀥於其腹中編萑以苴之塗之以謹當作墐塗炮之塗皆乾擘之濯手以摩之去其皽為稻粉糔溲以為酏以付豚煎諸膏膏必滅之鉅鑊湯以小鼎薌脯於其中使其湯毋滅鼎三日三夜毋絶火而后調之以醯醢説文豚小豕也胾曲禮凡進食之禮左殽右胾注胾切肉也殽在俎胾在豆又云三飯主人延客食胾然後辯殽説文胾大臠也大房傳云半體之俎箋云玉飾俎也其制足間有横下有柎似乎堂後有房然明堂位云周以房俎周語王公立飫則有房烝注云房大俎也詩云籩豆大房謂半解其體升之房也千乘明堂位云封周公於曲阜地方七百里革車千乘坊記云制國不過千乘論語道千乘之國馬融云司馬法六尺為步步百為畝畝百為夫夫三為屋屋三為井井十為通通十為成成出革車一乘然則千乘之賦其地千成居地方三百一十六里有畸唯公侯之封乃能容之雖大國之賦亦不是過焉包咸云千乘者百里之國也古者井田方里為井十井為乘百里之國適千乘也孔氏云千乘有七萬五千人與下公徒三萬數不合者天子六軍出六鄉則諸侯三軍出三鄉下云徒三萬自是鄉之所出非此千乘之衆也此軍千乘自謂計地出兵非彼三軍之事也胄説文云胄兠鍪首鎧也易曰離為甲胄書曰善糓乃甲胄禮記曰獻甲者執胄甲胄則有不可犯之色周遷輿服雜事曰刺校者校人之執刺兵者也首戴虎皮傳云蒙臯比以犯陳蔡因是有虎皮胄焉蜀隊戴貝胄被犀角此古制也詩云貝胄朱綅謂以貝齒飾胄朱縷綴之也胄揷以翟尾垂以紅絮朱綅之象綅説文云綅綫也舒疏云楚之與國左傳文十一年羣舒叛楚宣八年楚滅舒蓼成十七年滅舒庸襄十五年滅舒鳩地里志廬江郡舒縣故舒國龍舒縣羣舒之邑世本云舒鮑偃姓國地里考云春秋有舒今廬州舒城縣舒鳩今無為軍巢縣舒蓼在安豐縣舒庸東夷國謂之羣舒皆偃姓一統志直𨽻廬州府春秋時屬舒舒城縣廬江縣無為州巢縣皆屬焉安豐廢縣在鳯陽府夀州境泰山互見崧髙篇嶽公羊傳云觸石而起膚寸而合不崇朝而雨天下者唯泰山乎禮記云因名山升中于天而鳯凰降龜龍假疏云此惟泰山為之餘嶽則否孝經緯云封乎泰山考績燔燎禪乎梁甫刻石紀號泰山記云盤道屈曲而上凡五十餘盤經小天門大天門如從穴中視天䆫矣自下至古封禪處凡四十里山頂西巖為仙人石閭東巖為介丘黄河去泰山二百餘里於祠所瞻黄河如帶若在山阯封禪記云東山名曰日觀日觀者雞一鳴時見日始欲出長三丈所秦觀者望見長安呉觀者望見㑹稽周觀者望見齊西北有石室壇以南有玉盤中有玉龜山南脅神泉飲之極清羙利人尸子云泰山之中有神房阿閣帝王録龜水經注云龜山在博縣一十五里山北即龜隂之田春秋定公十年齊人來歸龜隂之田是也一統志龜山在兖州府泗水縣東北五十里春秋龜隂之田在其北今屬泰安州蒙書曰蒙羽其藝地里志云泰山蒙隂縣蒙山在西南有祠顓臾國在蒙山下一統志蒙山在兖州府沂州費縣西北七十里居魯之東一名東山孟子所謂孔子登東山而小魯是也大東孔氏曰僖公時東方小國見於盟㑹惟邾莒滕杞而已爾雅云東至於泰逺東至日所出為太平一統志兖州府鄒縣周時邾國青州府莒州古莒子國滕縣在兖州府鳧郡縣志鳧山在兖州鄒縣東南三十八里一統志云鳧山在鄒縣西南五十里連魚臺縣界世傳伏羲畫卦於此土人呼其處為八卦山楊奐東游記云過泗水地頗高敞南望鳧嶧諸峰出没於烟蕪雲樹之表繹禹貢嶧陽孤桐地里志嶧山在魯國騶縣北鄒山記曰鄒山古之嶧山也山下是鄒縣本邾國魯穆公改鄒山從邑變故謂鄒山嶧陽猶多桐樹水經注云鄒山所謂嶧山邾文公所遷京相璠曰繹邑依嶧山為名山東西二十里南北十三里高秀獨出積石相臨殆無土壤石間多孔穴洞逹相通一統志嶧山在山東兖州府鄒縣東南二十五里史記秦始皇上鄒嶧山刻石頌徳常箋云常或作嘗在薛之旁魯莊公築臺于薛是與六國時齊有孟嘗君食邑于薛曹氏曰漢地里志魯有薛縣而齊孟嘗君食邑于薛則嘗先當屬魯史記正義曰薛故城在徐州滕縣南四十四里一統志薛城在兖州府滕縣南四十里孟嘗君墓在縣南五十里許箋云許許田魯朝宿之邑左傳隱八年鄭伯請以泰山之祊易許田注云成王營王城有遷都之志故賜周公許田以為魯朝宿之邑鄭有助祭泰山湯沐之邑在祊欲以祊易許田各從本國所近許田近許之田桓公元年鄭伯以璧假許田公羊傳云許田魯朝宿之邑也諸侯時朝乎天子天子之郊諸侯皆有朝宿之邑焉曷為繋之許近許也括地志許田在許州許昌縣南四十里有魯城周公廟在其中庶士周禮上士一千一百三十三人中士四千五百三十六人下士一萬九千二百九人王制云諸侯之上大夫卿下大夫上士中士下士凡五等説苑伊尹云列士所以參大夫也周書曰胄子成人能治上官謂之士白虎通云士者事也任事之稱故傳曰古今辨然否謂之士天子之士獨稱元士何士賤不得體君之尊故加元以别諸侯之士徂來郡縣志徂來山亦曰尤來山水經注鄒山記曰徂來山在兖州梁父奉高博城三縣界今猶有羙松亦曰龍竦之山赤眉樊崇保此山自號尤來三老一統志徂徠山在濟南府泰安州東南四十里上有紫源池玲瓏山獨秀峰天平東西三寨下有白鶴灣新甫後魏志魯郡汶陽縣有新甫山通典漢汶陽故城在兖州泗水縣東南九域志襲慶府有新甫田尋尺禮記云古者以周尺八尺為步今以周尺六尺四寸為步注云按禮制周猶以十寸為尺盖六國時多變亂法度或言周尺八寸步更為六十四寸家語曰布指知寸布手知尺小爾雅云四尺謂之仭倍仭謂之尋尋舒兩肱也倍尋謂之常前漢律厯志云一黍之廣為一分十分為寸十寸為尺十尺為丈十丈為引尺者蒦也桷説文云椽榱也桷也橑榱也秦謂之榱周謂之椽魯謂之桷通俗文曰屋加椽曰橑釋名云桷确也其形細而疏确也或謂之椽椽傳也相傳次而布列也或謂之榱在檼房下列衰衰然垂也莊二十四年刻桓宫桷穀梁云禮天子之桷斵之礱之加宻石焉諸侯之桷斵之礱之大夫斵之士斵本刻桷非正也六家詩名物疏卷五十四
