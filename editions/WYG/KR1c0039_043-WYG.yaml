body:
  text: 六家詩名物疏卷四十明馮復京撰小雅谷風之什一谷風篇頺爾雅云焚輪謂之頺李巡曰焚輪暴風從上來降謂之頺頺下也孫炎曰迴風從上下曰頺蓼莪篇蔚爾雅云蔚牡菣某氏曰江河間曰菣邢氏曰蔚即蒿之雄無子者陸璣云牡蒿也三月始生七月華華似胡麻華而紫赤八月為角角似小豆鋭而長一名馬薪蒿本艸馬先蒿陶隱居云一名爛石艸唐本注云葉如茺蔚紅白色實八月九月熟俗謂之虎麻茺蔚苗短小子夏中熟而初生二種極相似陸佃云蔚大於蒿羅氏曰蔚無子者今青蒿葉端皆作子如米大蔚獨無耳按爾雅蘩之醜秋為蒿蔚即蒿之大者莪莖可生食蒸食香美至秋則變為蒿蔚矣故以喻父母生子以為美材而卒不得終養也朱子此解勝于舊注但莪美菜蒿賤艸之訓似以為二物未精明耳蔚古人皆以為無子故曰牡菣而本艸注云八九月有實圖經云入藥當用有子者為正未知何以矛盾缾說文缾罋也或从瓦作瓶易云汔至亦未繘井羸其缾凶左傳云挈缾之知守不假器淮南子云古者抱瓶而汲朱傳云瓶小罍大皆酒器詩緝云井卦言羸其瓶揚雄酒箴以鴟夷嘲瓶栁子厚瓶賦以瓶嘲鴟夷蓋鴟夷盛酒器瓶汲水器也大東篇七傳云匕所以載鼎實疏云雜記云匕用桑長三尺謂喪祭也待賔客之匕禮宜用棘易曰不喪匕鬯特牲禮棘心匕刻又云右人於鼎北匕肉左人於鼎西升諸俎少牢饋食禮雍人摡鼎匕于饔爨廪人摡甑甗匕與敦于廩爨有司徹司馬以二手執挑匕枋以挹湆注于疏匕若是者三又云雍人雍府加匕于鼎東枋雍人覆二疏匕于俎上雜記云枇以桑長三尺或曰五尺三禮圖云匕以載牲體長二尺四寸葉博三寸漆丹柄頭疏匕形如飯操以棘心為之説文云柶匕也所以取飯陳氏云匕之别有四有黍稷之匕有牲體之匕有疏匕有喪匕三匕以棘喪匕以桑廩人之所摡黍稷之匕也雍人之所摡牲體之匕也牲體之匕挑匕也其制則黍稷之匕小于挑匕挑匕小于疏特牲少牢有司徹公食昏禮舉鼎執匕俎皆異其人士喪禮執匕執俎皆舉鼎者為之吉禮尚文喪禮尚畧故也特牲右人于鼎北匕肉左人于鼎西載諸俎士虞禮則右人載者以吉禮尚右喪禮尚左故也砥禹貢荆州厥貢礪砥砮丹蔡氏云礪砥皆磨石砥以細密為名礪以麄糲為稱杼說文云杼持緯者也曹氏云梭也淮南子云伯余之初作衣也緂麻作縷手經指柱後世為之機杼以便其用柚朱傳云受經者董氏云卷織者也氿泉爾雅云氿泉穴出穴出仄出也李巡曰水泉從旁出曰氿釋名云氿軌也流狹而長如車軌也穫爾雅云穫落某氏曰可作柸圈皮韌繞物不解郭璞曰穫音獲可為杯器素也陸璣云今椰榆也其葉如榆其皮堅韌剝之長數尺可為絙索又可為甑帶其材可為杯器熊羆裘傳云言富也禮書云周禮穴氏掌攻蟄獸各以其物火之以時獻其皮革鄭氏曰蟄獸熊羆之屬冬藏者爾雅云羆如熊黄白文詩曰舟人之子熊羆是裘則熊羆亦裘之美者也箋云周世臣子孫退在賤官使搏熊羆在㝠氏穴氏之職周官㝠氏下士二人穴氏下士一人㝠氏掌設弧張為阱擭以攻猛獸以靈鼓敺之穴氏掌攻蟄獸各以其物火之僚釋詁云僚官也周官云唐虞稽古建官惟百内有百揆四嶽外有州牧侯伯夏商官倍小宰云天官屬六十地官屬六十春官屬六十夏官屬六十秋官屬六十冬官屬六十禮記云有虞氏官五十夏后氏官百殷二百周三百左傳云同官為僚楊用修云寮小牎古謂同官為寮亦指齋署同牕為義漿釋名云漿將也飲之寒温多少與體相將順也周禮酒正辨四飲之物三曰漿注漿今之酨漿疏此漿亦是酒類漿人掌共王之六飲水漿醴凉醫酏入于酒府禮記進食之禮酒漿處右又云飲漿水醷濫注云漿酢酨管子云左酒右漿素問云今時之人以酒為漿以妄為常璲詳見衛風遂箋云以瑞玉為佩漢爾雅云析木謂之津箕斗之間漢津也注云箕龍尾斗南斗天漢之津梁大戴禮云七月漢案户括地象云河精上為天漢天官書云漢者金之散氣其本曰水漢星多則多水少則旱晉書云天漢起東方經尾箕之間謂之漢津乃分為二道其南經傅説魚天籥天弁河鼓其北經龜貫箕下次絡南斗魁左旗至天津下而合南道乃西南行又分夾瓠𤓰絡人星杵造父騰虵王良傳路閣道北端太陵天船卷舌而南行絡五車經北河之南入東井水位而東南行絡南河闕丘天狗天紀天稷在七星南而没唐志云雲漢自坤抵艮爲地紀北斗自乾㩗巽為天綱物理論云星者元氣之英也漢水之精也氣發而升精華上浮宛轉隨流名之曰天河一曰雲漢衆星出焉抱朴子云天河從北極分為兩頭隨天而轉入地下過博物志云舊説天河與海通織女漢書云婺女其北織女織女天女孫也晉書云織女三星在天紀東端天女也主果蓏絲帛珍寳王者至孝神祗咸喜則織女星俱明天下和平大星怒角布帛貴焦林大斗記云天河之西有星煌煌與參俱出謂之牽牛天河之東有星微微在氐之下謂之織女續齊諧記成武丁云七月七日織女當渡河暫詣牽牛世人至今云織女嫁牽牛也牽牛爾雅云星紀斗牽牛也注牽牛斗者日月五星之所終始故謂之星紀又云何鼓謂之牽牛注今荆楚人呼牽牛星為擔鼓擔者荷也疏如此文則牽牛何鼓一星也漢書以為二星郭注順經為説漢書云牽牛為犧牲其北河鼓河鼓大星上將左左將右右將晉書云牽牛六星天之關梁主犧牲事其北二星一曰即路一曰聚火又曰上一星主道路次二星主關梁次三星主南越摇動變色則占之星明大王道昌關梁通服傳云服牝服也周禮云大車牝服二柯有參分柯之二羊車二柯有參分柯之一栢車二柯注大車牝服長八尺謂較也羊車較長七尺栢車較六尺箱禮書云輿人之車箱廣六尺六寸隧四尺四寸廣而不方車人之車箱方而不廣疏云兩較内容物之處為箱長庚傳云日旦出謂明星為啓明日既入謂明星為長庚庚續也疏云啓明是太白長庚不知何星或一星出在東西而異名或二者别星未能審也廣雅云太白謂之長庚或謂之太囂注晨見東方為啓明昏見東方為長庚前漢天文志云長庚廣如一匹布著天此星見起兵鄭樵曰啓明金星長庚水星金在日西故日將出則東見水在日東故日將没則西見實二星也按天文志所云長庚乃變異之象非每昏常見者也畢爾雅云濁謂之畢史記天官書云畢曰罕車為邊兵主弋獵後漢蘇竟傳云畢為天網主網羅無道之君故武王伐紂上祭于畢求助天也漢書云西方為雨雨少隂之位也月失中道移而西入畢則多雨書曰星有好風星有好雨晉書曰畢八星主邊兵主弋獵其大星曰天高一曰邊將主四夷之尉也星明大則逺夷來貢天下安失色則邊兵亂月入畢多雨斗朱傳云箕斗二星以夏秋之間見於南方云北斗者以其在箕之北也或曰北斗常見不隱者也晉書云北方南斗六星天廟也丞相太宰之位主褒賢進士稟授爵禄又主兵一曰天機南二星魁天梁也中央二星天相也北二星天府庭也亦為壽命之期將有天子之事占于斗斗星盛明王道平和爵禄行易是類謀曰斗機絶綱玉衡撥攝提亡五星合狼狐張鄭𤣥云斗者天中之精天失其平故斗機絶綱玉衡撥也攝提者斗前之星為斗施政教布之八野今斗失其政故攝提亦為之亡不見也文耀鈎云斗者天之喉舌玉衡屬杓魁為璇璣斗威儀曰審候五色宋均注曰北斗七星有五色宫商角徴羽各應其星關令内傳曰北斗一星面百里相去九萬里置二十四氣四宿行四時五方立五星主五嶽也石氏云第一曰正星主陽徳天子之象也二曰法星主隂刑女主之位也三曰令星主中禍四曰伐星主天理伐無道五曰殺星主中央助四旁殺有罪六曰危星主天倉五穀七曰部星亦曰應星主兵晉書云北斗七星在大微北七政之樞機隂陽之元本也故運乎天中而臨制四方以建四時而均五行也魁四星為璇璣杓三星為玉衡又曰斗為人君之象號令之主也又為帝車取乎運動之義也又魁第一星曰天樞二曰璇三曰璣四曰權五曰玉衡六曰開陽七曰搖光一至四為魁五至七為杓樞為天璇為地璣為人權為時玉衡為音開陽為律搖光為星四月篇暑釋名云暑煑也如煑物也書曰哲時燠若豫恒燠若禮曰季夏之月土潤溽暑稽覽圖曰夏至之後三十日極温五經通義曰冬至陽動于下推隂而上之故大寒于上夏至隂動于下推陽而上之故大熱于上故易云日月運行一寒一暑日在牽牛則寒在東井則暑牽牛外宿逺人故寒東井内宿近人故温也荀爽傳云夏則火旺其火在天温煖之氣養生百木鶉説文云鷻雕也从鳥敦聲詩曰匪鷻匪􅧭雕鷻也鷲鳥黒色多子師曠曰南方有鳥名曰羌鷲黄頭赤目五色皆備疏云雕之大者名鶚廣雅云鷲雕也倉頡解詁云鶚金喙鳥也見則天下兵能擊殺麞鹿漢書云鷙鳥累百不如一鶚埤雅云雕能食艸似鷹而大黒色俗呼皂雕其飛上薄雲漢性刻制今大雕翺翔水上扇魚令出沸波攫而食之一名沸河六翮乘風輕勁堪為箭羽雅翼云雕者鶚之類土黄色健飛擊沙漠中空中盤旋無細不覩亦能食麞鹿之屬可謂鷙有力矣就即大雕山海經云景山多鷲黒色多力禽經云雕以周之鷲以就之又云沸河在岸則魚涌相感志云其毛能食諸鳥羽如羣錯艸中有雕毛必衆鳥毛羽自落地鳶倉頡解詁云鳶鴟也説文云鳶鷙鳥也爾雅云鳶烏醜其飛也翔禽經云鳶不擊有貪注不善搏擊貪于攫肉又云風翔則風注風禽鳶類越人謂之風伯飛翔則天大風抱朴子云鳶飛在下無力及至乎上聳身直翅而已陶隱居云鳶飛騰江湖間捕魚食之埤雅云釋鳥鳶飛也翔髙飛曰翔布翼不動曰翔鳶鴟也摩風回翔曲禮曰前有塵埃則載鳴鳶鳶鳴則將風故也桋爾雅云桋赤栜白者栜某氏曰白者為栜其色雖異為名同江河間栜可作鞍郭璞曰赤栜樹葉細而岐鋭皮理錯戾好叢生山中中為車輞陸璣云栜葉如柞皮薄而白其木理赤者為舜栜一名夷白者為栜木皆堅韌今人以為車轂北山篇鞅疏云鞅讀如馬鞅之鞅説文鞅頸皮也釋名云鞅嬰也喉下稱嬰言纓絡之也左傳注云在腹曰鞅掌釋名云掌言可以排掌也小明篇上天爾雅云冬為上天李巡曰冬隂氣在上萬物伏藏故曰上天毛傳云自天降鑒則稱上天艽野毛氏曰逺荒之地蘇氏曰艽地名寒釋名曰寒捍也捍格也書云謀時寒若急恒寒若禮記云季秋之月霜始降乃命有司曰寒氣總至民力不堪其皆入室又云天地嚴凝之氣始於西南而盛於西北此天地之義氣也稽覽圖云冬至之後三十日極寒國語云火見而清風戒寒罟廣雅云罻罾魚網謂之罟除箋云四月為除爾雅云四月為余李巡曰四月萬物皆生枝葉故曰余余舒也孫炎曰物之枝葉敷舒鼓鐘篇淮禹貢云導淮自桐栢東㑹于泗沂東入于海山海經淮水出餘山水經云淮水出南陽皮氏縣胎簮山東北過桐栢山春秋説題辭云淮出桐栢淮者均也均其務釋名云淮圍也圍繞揚州自北界東至海一統志淮水在河南河南府唐縣東南一百八十里即禹貢導淮自桐栢者天下有四瀆此其一也今桐栢支岡有水泉濳流三十里東出大復山經汝寧信陽縣東流㑹泗沂自泗州龜山北流入淮安府界縈洄府城東入于海鼛周禮鼓人以鼛鼓鼓役事韗人為臯鼓長尋有四尺鼓四尺倨勾磬折樂書云鼛鼓以臯為義欲役之緩謂之臯鼓臯鼓中高而兩端下三洲疏云水中可居曰洲淮上地也笙磬毛云笙磬東方之樂朱云琴瑟在堂笙磬在下釋名云磬罄也聲堅罄罄然堅緻也爾雅云大磬謂之毊注云磬形似犂錧以玉為之又云徒擊磬謂之寋尚書夔云於予擊石拊石百獸率舞庶尹允諧又云徐州泗濵浮磬周禮小師正樂縣之位凡縣鐘磬半為堵全為肆眡瞭掌擊頌磬笙磬磬師掌教擊磬擊編鐘教縵樂燕樂之鐘磬磬氏為磬倨勾一矩有半其博為一股為二鼓為三參分其股博去一以為鼓博參分其鼓博以其一為之厚已上則摩其旁已下則摩其耑儀禮大射樂人宿縣于阼階東笙磬西面西階之西頌磬東面注云笙猶生也東為陽中萬物以生是以東方鐘磬謂之笙皆編而懸之言成功曰頌西為隂中萬物之所成是以西方鐘磬謂之頌禮記云石聲磬磬以立辨辨以致死君子聽磬聲則思死封疆之臣又云叔之離磬世本云無句作磬堯臣也樂録云磬叔所造通禮義纂云黄帝使伶倫造磬白虎通云磬者夷則之氣也象萬物之盛也有貴賤焉親疎焉長㓜焉三者行然後王道得萬物成天下樂用磬也樂經云黄鐘磬前長二律二尺七寸後長二律一尺八寸此謂特懸大磬配鎛鐘者也孔子在衛所擊謂編磬鬻子注云磬聲消躁而近于悲故憂而擊磬樂書云石堅實而不動其卦則乾其時則秋冬之交其方則西北之維其風不周其聲尚角其音則辨立冬之氣也先王以為磬之屬焉小華之山其隂多磬鳥危之山其陽多磬髙山涇水出焉其中多磬要之一適隂陽之和者泗濵所貢浮磬而已其用編之則雜而小離之則特而大音樂記云凡音之起由人心生也人心之動物使之然也感于物而動故形于聲聲相應故生變變成方謂之音比音而樂之及干戚羽旄謂之樂周禮太師播之以八音金石土革絲木匏竹又云教六詩以六律為之音雅箋云雅萬舞也詳見邶風朱傳云雅二雅也子夏曰言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉周禮太師教六詩曰風曰賦曰比曰興曰雅曰頌以六徳為之本以六律為之音鄉飲酒禮燕禮云工歌鹿鳴四牡皇皇者華笙入樂南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀乃合樂燕禮又云若以樂納賔升歌鹿鳴下管新宫大射云歌鹿鳴管新宫左傳穆叔云文王兩君相見之樂也鹿鳴君所以嘉寡君也四牡君所以勞使臣也皇皇者華君教使臣五善季札請觀于周樂為之歌小雅曰美哉思而不貳怨而不言其周徳之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熈熈乎曲而有直體其文王之德乎南傳云南夷之樂曰南薛君章句云四夷之樂惟南可以和于雅者以其人聲及籥不僣差也文王世子云胥鼓南注云南南夷之樂也胥掌以六樂之㑹正舞位明堂位曰昧東夷之樂也任南蠻之樂也納夷蠻之樂於大廟言廣魯於天下也周禮韎師掌教韎樂祭祀則帥其屬而舞之大饗亦如之旄人掌教舞散樂舞夷樂鞮鞻氏掌四夷之樂與其聲歌祭祀則龡而歌之燕亦如之孝經鈎命決云東夷之樂曰昧持矛助時生南夷之樂曰任持弓助時養西夷之樂曰侏離持鉞助時殺北夷之樂曰禁持盾助時藏皆於四門之外右辟樂元起曰南夷之樂曰兠西夷之樂曰禁北夷之樂曰昧東夷之樂曰離東夷持矛舞南夷持羽舞西夷持㦸舞北夷持干舞白虎通曰南之為言任也任養萬物一說東方持矛南方歌西方戚北方擊金正義云言南得總四夷者以周之徳先致南方朱傳云南二南也吕氏春秋云塗山氏女令其妾待禹於塗山之陽女乃作歌曰候人兮猗實始作為南音周公及召公取風焉以為周南召南用禮樂師凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節磬師教燕樂之鐘磬注燕樂房中之樂所謂隂聲也鐘師凡祭祀饗食奏燕樂笙師燕樂共其鐘笙之樂鄉飲酒禮笙入間歌乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋注云王后國君夫人房中之樂歌也又云乃息司正鄉樂惟欲注云鄉樂周南召南六篇之中唯所欲作不從次也鄉射禮笙入立于縣中西面乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋又云歌騶虞若采蘋皆五終燕禮間歌魚麗以下至笙由儀遂歌鄉樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋若以樂納賔笙入三成遂合鄉樂若與四方之賔燕有房中之樂注云絃歌周南召南之詩而不用鐘磬之節也謂之房中者后夫人所諷誦以事君子左傳吳公子札請觀于周樂為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣六家詩名物疏卷四十
