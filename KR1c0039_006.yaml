body:
  text: 六家詩名物疏卷三明馮復京撰國風周南三桃夭篇桃爾雅云楔荆桃旄冬桃榹桃山桃桃李醜核又云桃曰膽之注荆桃今櫻桃冬桃子冬熟山桃實如桃而小不解核疏桃李之類子中有核人膽之者桃多毛拭治去毛令色青滑如膽也夏小正云正月杝桃華六月煮桃桃也者杝桃也杝桃也者山桃也煮以為豆實也禮記月令云仲春之月桃始華內則云桃李梅杏春秋運斗樞曰玉衡星散為桃管子云五沃之土其果宜桃韓外傳春植桃李夏得蔭其下秋得食其實韓子仲尼曰果蓏有六而桃為下祭先王不得入廟周官饋食之籩其實棗栗桃乾䕩榛實典術云桃者五木之精壓伏邪氣服其華令人好色蓋仙木也淮南子曰四月其樹桃埤雅云桃有華之盛者其性早華又華于仲春故周南以興女之年時俱當諺曰桃三李四言桃三歲華果然皮束莖幹頗急四年以上宜以刀􅟮其皮不然皮急而死故周南復取小桃以興江淹山桃頌曰惟園有肴惟山有叢丹花擎露紫榮繞風伊春之秀乃華之宗按夏小正煮桃為豆實周官饋食之籩有桃則所謂祭先王不得入廟者殆非孔子之言也華説文􅏞榮也從草亦作華韻書云今俗華户花切花呼瓜切然記桃始華鞠有黃華並無眀音爾雅云華荂也華荂榮也木謂之華草謂之榮不榮而實謂之秀榮而不實謂之英歸公羊傳曰婦人謂嫁曰歸周禮曰大宗伯以冠婚之禮親成男女媒氏掌萬民之判令男三十而娶女二十而嫁中春之月令會男女于是時也奔者不禁遂人以樂昏擾氓禮記曲禮云三十曰壯有室女子許嫁纓男女非有行媒不相知名非受幣不交不親故日月以告君齋戒以告鬼神為酒食以召鄉黨僚友以厚其别也郊特牲曰信婦德也一與之齊終身不改又云婚禮不用樂幽隂之義也婚禮不賀人之序也大傳云同姓雖百世而婚姻不通周道然也哀公問孔子曰天地不合萬物不生大婚萬世之嗣也禮書云婚有六禮納采問名納吉納徵請期親迎納采者擇其族類問名者詢其誰氏問名然後卜之故納吉納吉則其禮成矣故納徵納采問名納吉請期以禽贄納徵以圭璋皮帛禮記本命曰大古男五十而有室女三十而嫁家語魯哀公問孔子曰男子十六精通女子十四而化是則可以生民矣聞禮三十而有室女二十而有夫豈不晚哉孔子曰夫禮言其極亦不是過男子二十而冠有為人父之端女子十五許嫁有適人之道于此以往則自婚矣按朱傳宗鄭義以桃夭為婚姻之候今俗人多用其説不知毛鄭二義合之則兩得離之則兩偏也為毛説者以秋冬為期孔子家語云霜降而婦功成嫁娶者行焉氷泮而農桑起婚始殺于此又曰冬合男女秋班時位孫卿韓嬰皆曰霜降逆女氷泮殺止董仲舒曰聖人以男女隂陽其道同類天道向秋冬而隂氣結向春夏而隂氣去故霜降而逆女氷泮而止殺與隂俱近而陽逺也為鄭説者以二月為期夏小正曰二月綏多女士綏安也冠子取婦之時也月令仲春祠郊禖蓋玄鳥生乳之月以為嫁娶之候天子重之而祀焉白虎通曰嫁娶以春何也春天地始通隂陽交接之時也凡此諸書皆二家證據未易評定得失然鄭本據媒氏之文愚請即以周禮正之媒氏云仲春令會男女奔者不禁會男女之無夫家者蓋時至仲春則農業已起婚期過晚故不禁奔者或無夫家則汲汲然伺而會之若正為婚姻之時而復不禁奔則男女必多野合者矣豈禮也哉據荀卿云霜降逆女氷泮殺止其意謂九月至二月皆可婚也此近得其實矣或曰然則朱傳以此桃夭及女心傷悲殆及公子同歸倉庚于飛熠耀其羽為婚候又何耶豫按孔朝曰女心傷悲謂𧖟事始起感事而出熠耀其羽喻嫁娶盛飾此篇桃夭以喻女之少壯各自有説且仲春亦可婚何害為感時咏事哉室家左傳云女有家男有室無相瀆也謂之有禮沈氏云卿大夫稱家家者外內之大名户內曰室但男子一家之主職主內外故曰家婦人主閫內之事故為室也釋名云室實也言人物實滿于其中也説文云家居也爾雅扆內謂之家注今人稱家義出于此呂覽髙元作室罝篇兔爾雅云兔子㛯其迹迒絶有力欣廣志云兔大者曰毚禮記云祭宗廟兔曰明視內則云兔羮和糝不蓼雉兔皆有芼周禮加豆之實芹菹兔醢典略云兔者明月之精春秋運斗樞曰玉衡星散為兔論衡云兔舐雄毫而孕及其生子從口中出博物志云兔望月而孕口中吐子舊有此説抱朴子曰兔壽千歲滿五百歲則色白埤雅云吐而生子故謂之兔兔吐也楚辭曰顧兔在腹言顧兔居月之腹而天下之兔望焉于是感氣一曰兔目不瞬視雄毫而孕今孔雀亦合而先儒以孔雀聞雷而孕則兔雖舐毫其感孕則以月理或然也月缺也故兔口缺咀嚼者九竅而胎生獨兔雌雄八竅羅氏云冬月惟齕木皮至春草長麥繁而肉反不美凡野獸有氂惟兔足底皆毛號建毛性狡良兔曰東郭㕙與韓盧同走馮諼以此導田文今兔之所處其穴常為三竅古今注云兔口有缺尻有九孔天玄主物簿云孕環之兔懷于左腋毛有文彩間色至百五十年當轉環于腦能隱形人不復見矣罝爾雅云兔罟謂之罝李巡曰兔自作徑路張罝捕之也郭璞曰罝猶遮也疏張網遮兔因名曰罝按墨子文王舉閎夭大顛于罝網之中授之政而西土服則此詩所謂武夫者其或指二人矣公釋名云公貢也才德兼于人人咸貢薦于王而用之也韋曜辨曰公直也謂其正直無私也字從八從某八音背某古私字背私則為公諡法云立制及衆曰公王制云公侯田方百里周官曰諸公之地方五百里其食者半又曰上公九命其國家宮室車旗衣服禮儀皆以九為節又曰上公之禮執桓圭九寸繅藉九寸冕服九章樊纓九就二車九乘介九人禮九牢其朝會賓主之間九十步侯周書曰能樹名生物與天道俱謂之侯侯能成羣謂之君又諡法曰執應八方曰侯援神契云侯候也所以守籓也白虎通云侯者候也候順逆也周官禮曰諸侯之地封疆方四百里其食者三之一又曰侯伯七命其國家宮室車旗衣服禮儀皆以七為節又曰諸侯之禮執信圭七寸繅藉七寸冕服七章二車七乘介七人禮七牢朝會賓主之間七十步干爾雅云干扞也孫炎曰干盾自蔽扞方言云盾自關而東或謂之瞂或謂之干關西謂之盾釋名云盾遁也跽其後避以隱遁也狹而長者曰步盾步兵所持與刀相配者也狹而短者曰孑盾車上所持者也以犀皮作之曰犀盾以木作之曰木盾説文云楯瞂也所以扞身蔽目櫓大盾也龍魚河圖曰盾名自障周禮云旅賁氏掌執戈盾夾王車而趨司兵掌五兵五盾各辨其物與其等以待軍事司戈盾掌戈楯之物而頒之樂師舞有干舞文王世子云春夏學干戈于東序春秋元命包云帝梏帶干是謂清明發節移度蓋象招搖宋均曰干楯招搖為天戈戈盾相副戴之者象見天中以為表也朝錯云曲道相伏險厄相薄此劍楯之地也弓弩三不當一禮書云盾以革為之其背曰瓦其瓦設錫朱質而繪以龍龍之外又繪以雜羽其繫之也以繡韋其屬繡韋也以紛書曰敿乃干則敿者繫以紛也國語曰輕罪贖以鞼盾則鞼者繡韋也城説文云城所以盛民也墉城垣也堞城上女墻釋名云城盛也盛受國都也郭廓也廓落在城外也城上垣謂之睥睨睥睨非常也亦曰陴言裨助城之髙也亦曰女墻言卑小比之于城若女子之于丈夫也公羊傳云家不藏甲邑無百雉之城雉者何五板而堵五堵而雉百雉而城左傳曰士彌牟城成周計丈尺揣髙卑度厚薄仞溝洫物土方議逺邇量事期計徒庸慮材用書餱糧以令役月令云孟秋補城郭仲冬築城郭禮運云城郭溝池以為固周禮掌固掌修城郭溝池量人掌營國城郭典命上公國家以九為節侯伯以七為節子男以五為節注云國家謂城方公之城蓋方九里侯伯七里子男方五里疏云天子城方十二里又云匠人營國方九里旁三門國中九經九緯王宫門阿之制五雉宮隅之制七雉城隅之制九雉門阿之制以為都城之制宮隅之制以為諸矦之城制國語云火見而清風戒寒而修城郭五經異義云天子城千雉髙七雉公矦百雉髙五雉子男五十雉髙三雉天子之城髙九仞公矦七仞伯五仞子男三仞白虎通云天子曰崇城言崇髙也諸矦曰干城言不敢自專禦于天子也春秋説文云天子周城諸矦軒城軒城者缺南面以受過也吳越春秋云堯聽四嶽之言用鯀修水鯀曰帝遭天災厥黎不康乃築城以衛君造郭以守民淮南子云鯀為三仞之城博物志云處士東里槐責禹亂天下事禹進作三城強者攻弱者守敵者戰城郭蓋禹始也逵爾雅云一達謂之道路二達謂之岐旁三達謂之劇旁四達謂之衢五達謂之康六達謂之莊七達謂之劇驂八達謂之崇期九達謂之逵郭注逵四道交出復有旁通者疏案左傳隱十一年云及大逵桓十四年焚渠門入及大逵莊二十八年及逵市宣十二年入自皇門至于逵路杜預皆以為道並九軌案周禮經塗九軌不名為逵杜意蓋以鄭之城內不應有九出之道故以為並九軌于此不合也説文云馗九達道也似龜背故謂之馗馗即逵字林爾雅云野外謂之林釋名云林森也森森然也説文曰平土有叢木曰林禮記曰林藪川澤有能取蔬食野虞教導之周官禮曰山林其動物宜毛物其植物宜皂物其民毛而方林衡掌巡林麓之禁令而平其守以時計林麓而賞罰之若斬木材則受法于山虞而掌其政令山師辨山林之名鄭氏禮注云竹木曰林腹説文云腹厚也釋名云腹復也富也腸胃之屬以自褁盛復于外復之其中多品似富者也自臍以下曰水腹水汋所聚也廣雅云腹屬也書正義云腹為五臟之總易説卦云坤為腹素問云背為陽腹為隂心釋名云心纖也所識纖微無物不貫于心也廣雅云心任也元命包云心者火之精成于五故人心長五寸白虎通云心火之精也南方尊陽在上卑隂在下禮有尊卑故心象火色赤而鋭也人有道尊天本在上故心下鋭也耳為之候何耳能遍內外别語音火照有似于禮上下分明又云目為心視口為心談耳為心聽鼻為心嗅管子云潔其宮闕其門宮者謂心也心者智之舍也故曰宮潔之者去好過也莊子庚桑楚云萬惡不可納于霛臺司馬彪云心為神明之臺荀子云心居中虛以治五官夫是之謂天君又云心者形之君神明之主也出令而無所受令自禁自使自奪自取自行自止故口可劫而使墨云形可劫而使曲中心不可劫而使易意孔叢子子曰心之精神是謂聖推數究理不以疑周其所察聖人難諸素問云心者生之本神之變也其華在面其充在血脈為陽中之太陽通于夏氣芣苡篇芣苡爾雅云芣苡馬舄馬舄車前疏藥草也别三名郭云今車前草大葉長穗好生道邉江東呼為蝦蟆衣本草云車前子強隂益精令人有子一名當道一名生遺一名勝舄生真定平澤丘陵阪道中陶隱居云子性冷利仙經亦服餌之令人身輕不老韓詩乃言芣苡是木似李食其實宜子孫是為謬矣圖經云春初生苗葉布地如匙面纍年者長及尺餘如鼠尾花甚細青色微赤結實如葶藶赤黑色今人五月採苗七月八月採實陸疏云馬舄喜在牛迹中生故云車前當道幽州人謂之牛舌草可煮作茹大滑其子治婦人産難王肅引周書王會云芣苡如李出于西戎王基駁云王會所記雜物竒獸皆四夷逺國各齎土地異物以為貢贄非周南婦人所得采是芣苡為馬舄之草非西戎之木也神仙服食經曰車前實雷之精也服之行化八月採地衣地衣者車前實也韓詩説云芣苡木名實似李直曰車前瞿曰芣苡又云芣苡澤寫也臭惡之菜詩人傷其君子有惡疾人道不通以事興芣苡雖臭惡乎我猶採取而不已者以興君子雖有惡疾我猶守而不離去也按車前子今方劑中恆用不聞其臭惡澤寫又别一物未知韓詩何以云然六家詩名物疏卷三
