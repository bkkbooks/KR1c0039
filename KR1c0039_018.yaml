body:
  text: 六家詩名物疏卷十五眀馮復京撰國風鄘二定之方中篇定爾雅云營室謂之定娵觜之口營室東壁也注定正也作宫室皆以營室之中為正箋云定星昏中而正於是可以營制宫室故謂之營室疏云定星昏正四方而中之時謂夏之十月廣雅云營室謂之豕韋元命包云營室十星挺陶精類始立紀綱包物為室晉書云營室二星天子之宫也一曰玄宫一曰清廟又為軍糧之府及土功事星明國昌小不明祠祀鬼神不享離宫六星天子之别宫主隱藏休息之所安成劉氏云亥月昏時定星當南方之午位為營作之候此蓋成周以後之制考唐虞時定星以戌月昏中嵗久而差至周時定星始以亥月昏中下逮今日此星又以子月昏中矣楚左傳僖二年諸侯城楚丘而封衛鄭志答張逸云楚丘在濟河間疑在今東郡界通典云滑州衛南縣衛文公遷楚丘即此城一統志廢衛南縣在大名府滑縣東六十里衛文公自曹遷此隋初置楚丘縣後改衛南金省入白馬縣本朝白馬縣省入滑縣地理志齊桓公更封衛於河南曹楚丘而河內殷虛更屬於晉按輿地廣記漕楚丘二邑相近今拱州楚丘非衛之所遷縣有景山景岡乃後人傅會名之參括地志則拱州之景山乃商之景亳在開封府歸德州境非衛南之景山也今山東兖州府曹州曹縣東南五十里復有楚丘城有景山一統志云衛文公徙居楚丘測日景於此東昌府正秦漢東郡地濟水出陶丘北陶丘在今曹州定陶縣鄭氏疑在濟河間東郡之界或即此城也既古今所傳聊並載以俟考宫爾雅云宫謂之室室謂之宫釋名云宫穹也屋見於垣上穹崇然也世本云堯使禹作宫白虎通云黃帝作宫室以避寒濕禮記云君子將營宫室宗廟為先廄庫為次居室為後周禮云室中度以凡宫中度以尋內有九室九嬪居之外有九室九卿朝焉九分其國以為九分九卿治之王宫門阿之制五雉宫隅之制七雉墨子云上古之人未知為宫室就陵而居處下潤傷民故聖人作為宫室之法髙足以避潤濕中足以禦風寒上足以待霜雪墻髙足以别男女故以便生不以為樂也董子云禮天子之宫右清廟左涼室前明堂後路寢四室者足以避寒暑而不髙大也夫髙室近陽廣室多陰故室適形而止書大傳云百里之國九里之城三里之宫七十里之國三里之城一里之宫五十里之國一里之城以城為宫風俗通云宫室一也秦漢以來尊者以為常號下乃避之也鄭典命注云公宫方九百步侯伯宫方七百步子男宫方五百步按宫者回繞之義記曰君為廬宫之周官禮曰王宫縣是也古者貴賤所居皆得稱宫故禮記由命士以上父子皆異宫又云儒有一畝之宫環堵之室喪服傳繼父為其妻前夫之子築宫廟吕氏春秋云武王克殷靖箕子之宫是卿大夫以下皆得稱宫矣秦漢以來乃定為至尊所居之稱揆日考工記云匠人建國水地以縣置槷以縣視以景為規識日出之景與日入之景晝參諸日中之景夜考之極星以正朝夕陳祥道云水地以縣則旁植四木而縣繩焉以水望其髙下所以求地之平置槷以縣視以景則中植一槷而縣繩焉視其出入之景將以求四方之正視出入之景可以正東西而已又為規以度兩交之間以求其南北則四方於是乎正然猶以為未也又晝參諸日中之景夜考諸極星以正朝夕四方與朝夕皆正然後可以建國栗大戴禮云八月栗零零也者降也零而後取之故不言剝也周禮天官云饋食之籩其實栗禮記內則云栗曰撰之疏云栗蟲好食數數布陳撰省視之左傳女贄不過榛栗棗修以告虔也唐本草注云栗作粉勝於菱芡蜀本云樹高二三丈葉似櫟花青黃色似胡桃花圗經云兖州宣州者最勝實有房彚若拳中子三五小者若桃李中子惟一二將熟則暴開子出有茅栗佳栗其實更小而木與栗不殊但春生夏花秋實冬枯為異耳栗房當心一子謂之栗楔治血尤效陸璣云栗五方皆有周秦吳揚特饒吳越被城表裏皆栗惟濮陽及范陽栗甜美味長他方者悉不及也倭韓國諸島上栗大如雞子亦短味不美西京雜記上林苑有侯栗瑰栗魁栗榛栗嶧陽栗嶧陽都尉曹龍所獻大如拳埤雅云栗味鹹北方之果也有莍蝟自褁秋熟罅發其實驚躍如爆東觀書所謂栗駭也雅翼云栗味鹹性溫而宜於腎其質縝密故稱玉縝密以栗椅爾雅云椅梓注云即楸陸璣云梓實桐皮曰椅雅翼云郭氏解椅梓云即楸又解楸檟云大而皵楸小而皵檟説文亦曰椅梓也梓楸也楸梓也檟楸也然則椅梓楸檟一物而四名然定之方中既言椅又言梓故詩義疏曰楸之疏理色白而生子者為梓梓實桐皮曰椅日華子云椅樹皮有數般惟楸梓佳桐爾雅云榮桐木詩義疏云梓實桐皮曰椅今人云梧桐也有青桐白桐赤桐白桐宜琴瑟今雲南牂牁人績以為布嚴坦叔云陸璣言有青桐白桐赤桐此中琴瑟者白桐也椅桐梓漆之桐為白桐梧桐生矣之桐為青桐本草衍義云桐有四種白桐可斫琴者葉三杈開白華不結子荏桐早春先開淡紅花子作桐油梧桐四月開淡黃小花一如棗花枝頭出絲墮地成油五六月結桐子今人取炒為果此是月令清明之日桐始華者岡桐無花不中作琴體重埤雅云桐即白桐華而不實爾雅云榮桐木是也今亦謂之華桐桐有三輩青白之外復有岡桐即油桐也生於髙岡蓋梧性便濕不生於岡故此桐有岡之號陶氏云桐有四種青桐葉皮青似梧而無子梧桐色白葉似青桐而有子白桐與岡桐無異惟有華子爾岡桐無子是作琴瑟者皆不足據按青桐即今梧桐白桐又與岡桐全異白桐無子材中琴瑟岡桐子大有油與陶氏之説正反雅翼云榮桐木獨桐名榮者桐以三月華在衆木之先其榮可紀故也桐與梧既異而桐之中又有數種有其子可以取油者即詩所謂其桐其椅其實離離者也有華而不實堪作琴瑟者若生石間其聲則鳴書嶧陽孤桐是也雲南牂牁人亦績以為布其葉飼豕肥大三倍至秋後亦用以飼魚賈思協云桐葉花而不實者曰白桐實而皮青者曰梧桐炒其實噉之味似菱芡白桐無子冬結似子者乃是明年之花房易緯云梧桐濡毳而又空中難成易傷須盛氣而後華周書云清明之日桐始華桐不華嵗有大寒禮斗威儀云君乘火而王其政和平梧桐為常生遁甲經云梧桐不生則九州異主注云梧桐以知日月正閏生十二葉一邊有六葉從下數一葉為一月有閏則十三葉視葉小者則知閏何月也不生則九州異君天下不同也管子云五沃之土其木宜桐論衡云楓桐速長故其皮肌不能堅桐譜云桐體濕則愈重乾則愈輕生時以斧斫之甚易乾乃軟而拒斧花木考云凡木本實而末虛惟桐反之試取小枝削皆實堅其本皆中虛故世所以貴孫枝者貴其實也實故絲中有木聲也按陶氏説桐之誤陸農師已駁之矣陶又云白桐一名椅桐據湛露云其桐其椅此章箋云樹六木於宫則椅桐二物也本草圖經以岡梧為作琴瑟者而埤雅謂白桐岡桐大異本草衍義以月令始華之桐為青桐而陸羅二氏皆以榮桐木之桐為白桐蓋桐種大同小異諸家各執所見紛紛致辨亦不能詰矣梓詩義疏云楸之疏理色白而生子者為梓齊民要術云白色有角者為梓或名角楸又名子楸黃色無子者為柳楸世人見其木黃呼為荆黃楸蕭炳云樹似桐而葉小花紫雅翼云梓為百木長故古者名制器之工為梓人管子五沃之土宜白梓楚地尤多此木故尸子曰荆有長松文梓室屋之間有此木則餘材皆不復震其葉可以飼豕肥碩三倍莢細如箸其長僅尺冬後葉落而莢猶在樹總總然十道記云越人多種豫章樹梓即豫章也禮斗威儀云君乘火而王其政和平楸梓為長生古今注云棘實曰棗梓實曰豫章淮南子云六月其樹梓漆説文云漆木汁可以髹物象形泰如水滴而下古今注云漆樹以剛斧斫其皮開以竹管承之汁滴管中即成漆也本草圗經云木髙二三丈皮白葉似椿花似槐子若牛李木心黃書云兖州厥貢漆絲豫州厥貢漆枲莊子云桂可食故伐之漆可用故割之蜀本注云上等清漆色黑如醫若鐵石者好黃嫩若蜂窠者不佳虛釋文云虛本作墟説文云大丘也崑崙謂之墟正義云地有故墟髙可登之以望猶晉侯登有莘之墟也管子云狄人伐衛衛君出致於虛注虛地名詩所謂升彼虛矣堂傳云楚丘有堂邑傅氏云堂當是今博州堂邑博濮二州連境堂邑縣今屬山東東昌府景山水經注河水分濟北徑景山東又北徑楚丘城西補傳曰景山以大而得名商之故都也衛在商畿內升故虛以望知地勢之勝寰宇記景山在澶州衛南縣東南三里澶州今直𨽻大名府聞州衛南縣今廢在滑縣東京爾雅云絶高為之京注人力所作廣雅云四起曰京風俗通云按爾雅丘之絶高大者為京謂非人力所能成乃天地性自然也春秋左氏傳莫之與京今京兆京師義取於此按爾雅云絶髙為之京又云非人為之丘則京是人力所作丘是地自然生但對例則異散稱亦通故此傳云京髙丘也若應氏所説全悖爾雅不可依用桑爾雅云桑栁醜條注阿那垂條禮記云季秋之月命野虞無伐桑柘又云古者天子諸侯必有公桑蠶室近川而為之管子云五粟之土其檿其桑孟子云五畝之宅樹墻下以桑青史子云桑中央之木典術曰桑木者箕星之精神木蟲食葉為文章人食之老翁為小童汜勝之書云種桑五月取椹著水中濯洗取子陰乾之治肥田十畝荒久不耕者先好耕治之黍椹子各三升三合和種之黍桑俱生鋤之桑令疏條適黍熟穫之放火燒之桑至春生一畝食三簿蠶王盤農書云魯桑之類宜飼大蠶荆桑宜飼小蠶洪範云七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔凡七衍忒三人占則從二人之言周禮太卜掌三兆之法一玉兆二瓦兆三原兆其經兆之體皆百有二十其頌皆千有二百凡國大貞卜立君卜大封則視髙作龜大祭祀則祀髙命龜凡小事涖卜國大遷大師則貞龜凡旅陳龜凡喪事命龜卜師掌開龜之四兆一方兆二功兆三義兆四弓兆占人凡卜筮君占體大夫占色史占墨卜人占坼筮人凡國之大事先筮而後卜載師嘗之日涖卜來嵗之芟獮之日涖卜來嵗之戒社之日涖卜來嵗之稼禮記曲禮云卜筮不相襲卜筮者先聖王之所以使民信時日敬鬼神畏法令決嫌疑定猶豫也祭義云易抱龜南面天子卷冕北面雖有明智之心必進斷其志焉示不敢專以尊天也元命包云古司怪主卜周禮圗云大夫以上事卜且筮士則但筮尊卑之差靈雨瑞應圗云靈雨瑞雨也降而應物謂之靈雨倌人傳云主駕者按周禮天子主駕者有巾車典路車僕等職諸侯禮亡未聞倌人為何官也田説文云田陳也樹榖曰田象四口十阡陌之制也釋名曰土已耕者曰田田填也五榖填滿其中也禹貢冀州田惟中中兖州田惟中下青州田惟上下徐州田惟上中揚州田惟下下荆州田惟下中豫州田惟中上梁州田惟下上雍州田惟上上周禮大司徒凡造都鄙不易之地家百畝一易之地家二百畝再易之地家三百畝遂人辨野之土上地夫田百畝萊五十畝餘夫亦如之中地夫田百畝萊百畝餘夫亦如之下地夫田百畝萊二百畝餘夫亦如之載師以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任疆地王制云四海之內斷長補短方三千里為田八十萬億一萬億畝孟子云卿以下必有圭田圭田五十畝餘夫二十五畝前漢志云民受田上田夫百畝中田夫二百畝下田夫三百畝嵗耕種者為不易上田休一嵗者為一易中田休二嵗者為再易下田三嵗更耕之自爰其處農民户人已受田其家衆男為餘夫亦以口受田如比士工商家受田五口乃當農夫一人此謂平土可以為法者也若夫山林藪澤原陵淳鹵之地各以肥磽多少為差騋周禮云馬八尺以上為龍七尺以上為騋六尺以上為馬爾雅云騋牝驪牡埤雅云凡馬宗廟用龍戎事用駥田事用騋騋田馬也考工記曰國馬之輈深四尺有七寸田馬之輈深四尺鄭云國馬髙八尺衡髙八尺有七寸除馬之髙則餘七寸為衡頸之間也田馬髙七尺衡髙七尺有七寸除馬之髙則餘七寸為衡頸之間也雅翼云騋減於龍而愈於馬亦馬之良者故釋獸稱騋牝驪牡也蝃蝀篇蝃蝀釋名云虹攻也純陽攻陰氣也爾雅云螮蝀謂之雩螮蝀虹也霓為挈二弇日為蔽雲注霓雌虹也見離騷挈二其别名也見尸子蔽雲即暈氣五彩覆日也韓詩序云蝃蝀在東者邪色乘陽人君淫佚之徴周禮云視祲掌十輝之法九曰隮注隮虹也周書云清明後十日虹始見小雪日虹藏不見虹不收藏婦不專一河圗稽耀鈎云鎮星散為虹霓虹霓主內淫又霓者氣也起在日側其色青赤白黃孔演圗云霓者斗之亂精也斗失度則投霓見態主惑于毁譽感精符云九女并御則九虹并見考異郵云虹霓出惑衆棄和運斗樞云樞星散為虹霓京房易傳云霓旁氣也其占云妻乘夫則見陰勝陽之表也月令章句云虹陰陽交接之氣著于形色者也陰陽不和婚姻失序即生此氣有青赤色常依陰雲而晝見于日衝無雲不見太陰亦不見見輒與日相互率以日西見于東方故詩云螮蝀在東蝀之文從東以此故也霓則常依蒙濁見日旁白而直者曰白虹凡見日旁者四時常有惟雄虹起是月至孟冬乃藏白虎通曰天弓虹也又謂之帝弓莊子云陽灸陰成虹文子云天二氣即成虹地二氣即泄藏人二氣即生病淮南子云虹霓者天之忌也埤雅云舊説虹常雙見鮮盛者雄其暗者雌一曰赤白色謂之虹青白色謂之霓故虹紅也地氣還矣天氣不復于是成虹先儒以為雲薄漏日日照雨滴則虹生今以水噀日自側視之暈為虹霓然則不暈于日不成也朝陽射之則在西夕陽射之則在東按鄭解崇朝其雨云朝有升氣于西方終其朝則雨氣應自然朱傳云方雨虹見則雨終朝而止二説正相反據玉厯通政經旦見于西則為雨暮見于東則雨止旦見于西而純赤者則大雨暮見于東而色黃者則雨止然則在東者截雨者也隮西者行雨者也孟子云若大旱之望雲霓蓋以此虹雖天文垂象然俗傳其能入澗飲水甚則飲薛願之酒淫陳濟之妻子不語怪故不贅焉朝説文云旦也傳云從旦至食時為終朝姻白虎通云婦人因夫而成故曰姻釋親云壻之父為姻壻之黨為姻兄弟相鼠篇齒釋名云齒始也少長之别始于此以齒食多者長食少者幼也説文云齔毁齒也男八月生齒八嵗而齔女七月生齒七嵗而齔物理論云夫齒者年也身之寶也藏之斧鑿所以調諧五味以安性氣者也元命包云脣者齒之垣所以扶神設端若有列星外有限故曰脣亡齒寒體釋名云體第也骨肉毛血表裏大小相次第也禮鄭序云禮者體也履也統之於心曰體踐而行之曰禮體之謂聖履之謂賢六韜太公對文王云禮者理之粉澤周官大宗伯以吉禮事邦國之鬼神示以凶禮哀邦國之憂以賔禮親邦國以軍禮同邦國以嘉禮親萬民禮記云禮儀三百威儀三千干旄篇干爾雅云素錦綢杠疏杠竿也禮緯云旌旗之杠天子九仞諸侯七仞大夫五仞士三仞旄説文云旄幢也爾雅云載旄首曰旌郭云載旄於竿頭如今之幢亦有旒李巡云旄牛尾著竿首孫炎云析五采羽注旄上也其下亦有旒縿箋云周禮孤卿建旃大夫建物首皆注旄周禮疏云旞旌旄羽並有至于太常以下首皆有旄羽山海經云潘侯山有獸狀如牛而四節生毛名曰旄牛注今旄牛背膝及胡尾皆有長毛廣志云犣牛旄牛也髀膝尾間皆有毛禮書云爾雅旄謂之藣荀卿曰西海則有文旄地里志秦西近卭筰有旄西方之産也其尾可以飾旗亦可以飾舞按諸家説經九旗皆有旄旄之上必有羽下有旒縿蓋據秦漢以羽毛為葆幢而云也郊爾雅云邑外謂之郊説文云距國百里曰郊杜子春周禮注云五十里為近郊百里為逺郊司馬法云王國百里為郊二百里為州三百里為野四百里為縣五百里為都聘禮云賔及郊注云郊逺郊周制天子畿內千里逺郊百里以此差之逺郊上公五十里侯四十里伯三十里子二十里男十里也近郊各半之書傳云百里之國二十里之郊七十里之國九里之郊三十里之國三里之郊旟周禮司常云鳥隼為旟大閲頒旗物州里建旟縣鄙建旐注州里縣鄙鄉遂之官互約言之鳥隼象其勇捷也疏熊虎龜蛇皆二物相對則鳥隼亦别物若然鄭以勇解隼以捷解鳥大司馬云治兵辨旗物百官載旟注百官卿大夫載旟者以其屬衛王也正義云如鄭注周禮之意則六鄉內州長黨正六遂內酇長里宰鄰長等五人同建旟考工記云鳥旟七斿以象鶉火也爾雅云錯革鳥曰旟孫炎云錯置也革急也畫急疾之鳥於縿也釋名云旟譽也軍吏所建急疾趨事則有稱譽也禮書云司常之大閲州里建旟者州里之常司馬之治兵百官載旟者一時之事軍國之容固不同耳干旄曰孑孑干旟蓋州里之臣也太常而下五旗皆畫則旟畫鳥隼信矣郭璞釋爾雅謂旟剝鳥皮毛置之竿頭即禮記載鴻及鳴鳶其説非也都傳云下邑曰都趙岐孟子注云邑有先君之廟曰都周禮都鄙鄭注云都之所居曰鄙都鄙公卿大夫之采邑王子弟所食邑旌曲禮云武車綏旌德車結旌周禮司常全羽為旞析羽為旌注全羽析羽皆五采繫之于旞旌之上所謂注旄于干首疏或解以為旞旌之下亦有旄斿而用絳帛又云斿車載旌注斿車木路也王以田以鄙析羽五色象文德也疏云旌干周禮遊車所載卿得建旌者鄉射記注云旌揔名也爾雅云注旄首曰旌則干旄干旌一也既設旒縿有旃旟之稱未設旒縿空有析羽謂之旌卿建旌者設旒縿而載之遊車則空載析羽無旒縿也釋名云旌精也言有精光也禮書云旞旌皆注旄而旄與羽又注于旗則羽可以飾旗又可以為旗也書曰羽畎夏翟考工記鍾氏染羽蓋古人於羽固用自然者不足則染以充之夏采言建綏明堂位言夏后氏之綏于官言夏采于旗言建綏則所綏者旌旞而已載馳篇唁榖梁傳云弔失國曰唁服度左傳注弔生曰唁大夫互見小雅三事大夫白虎通云大夫大扶進人者也故傳曰進賢達能謂之大夫也大夫有上下何明卑者多也爵皆一字大夫獨兩字何春秋傳曰大夫無遂事以為大夫職在之適四方受君之法施之于民故獨兩字言之易通卦驗云君有五期輔有三名公卿大夫政教君臣起自人皇之世伏羲因之説苑伊尹對湯曰大夫者所以參九卿也儀禮説云上大夫卿也國家有三卿五大夫阿丘爾雅云偏髙阿丘李巡曰謂丘邊髙釋名云偏髙曰阿丘阿荷也如人擔荷一邊髙也虻爾雅云莔貝母郭云根如小貝員而白華葉似韭陸璣云虻今葉草貝母也其葉似栝樓而細小子在根下正白四方連纍相著有分解也本草圗經云根有瓣子黃白色如聚貝子故名貝母二月生莖細青色葉亦青似蕎麥葉隨苗出七月開花碧緑色形如鼓子花八月採根曬乾又云四月蒜熟時採之良此有數種陸璣毛詩疏云云今近道出者正類此郭注爾雅云云此種罕復見之日華子云消痰潤心肺本草别説云能散心胸鬱結之氣殊有功許春秋譜曰許薑姓與齊同祖堯四嶽伯夷之後也周公封其苗裔文叔于許今潁川許昌是也靈公徙葉悼公遷夷一名城父又居析一名白羽許男斯處容城自文叔至莊公十一世始見春秋地里志潁川許縣故許國二十四世為楚所滅括地志故城在許州許昌縣南三十里一統志河南開封府許州在府城西南二百二十里周為許國六家詩名物疏卷十五
