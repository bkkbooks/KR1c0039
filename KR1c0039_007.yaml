body:
  text: 六家詩名物疏卷四明馮復京撰國風周南四漢廣篇喬木傳云喬上竦也爾雅云句如羽喬上句曰喬如木楸曰喬槐棘醜喬小枝上繚為喬趙岐孟子喬木注云髙大樹木按爾雅釋喬雖殊然總之翹竦之義惟朱傳增無枝二字為謬耳箋云木髙其枝葉故人不得就而止息則有枝審矣無枝者爾雅所謂檄非喬也漢山海經云嶓冢之山漢水出焉東南流注於沔禹貢云嶓冢導漾東流為漢又東為滄浪之水過三澨至于大别南入于江東滙澤為彭蠡東為北江入于海水經云漾水出隴西氐道縣嶓冢山東至武都沮縣為漢水至漢州江津縣東南入于江沔水出武都沮縣東狼谷中又東徑沮水戍而東南流注漢南至江夏沙羡縣北南入于江常璩云漢水有二源東源出武都氐道縣漾山為漾水禹貢導漾東流為漢是也西源出隴西嶓冡山㑹泉徑葭萌入漢始源曰沔酈道元云東西兩川俱出嶓冡而同為漢水一統志云漢江源出陜西鞏昌府隴西縣嶓冡山由漢中流經湖廣襄陽府鄖縣均州光化至府城北由東南經宜城抵安陸州至漢陽府大别山入於江沔水源出襄水南入大江與漢水合按三國志以前書傳多稱漢不言沔三國志以後多稱沔不言漢先儒皆疑漢沔為一然今二水源流不同惟書疏引應劭云沔水下尾與漢合乃入江為得其實通典云嶓冡山有二秦州上邽縣嶓冡山西漢水所出經嘉陵曰嘉陵江經閬中曰閬江漢中金牛縣嶓冡山禹導漾水至此為漢水亦曰沔水周禮云荆州其川江漢左傳云江漢沮漳楚之望也蔡雍漢津賦云納陽谷之所吐兼漢沔之殊名總畎澮之隂液演西土之隂精過曼山以左回游襄陽而南縈上控隴坻下接江湖按諸書俱以為漢有二源今考之出鞏昌府秦州之嶓冡至四川重慶府江津縣而入江者西漢水也水經所紀導漾為漢者也出漢中府沔縣之嶓冡至漢陽府入江者東漢水也水經所紀沔水與漢合也漾至沮縣即為漢水沔水自出沮縣蓋别為一水也沮縣今漢中之略陽惟漾至沮為漢而沔又出于沮縣此古之言二水者多混為一與游女疏云內則云女子居內深宮固門此漢上有游女者內則言閽寺守之則貴家之女也庶人之女則執筐行饁不得在室故有出游之事韓詩章句云游女謂漢神也言漢神時見不可求而得之韓詩傳云鄭交甫過漢臯遇二女妖服佩兩珠交甫與之言曰願請子之佩二女解佩與交甫而懷之去十步採之即已亡矣回顧二女亦即亡矣水經注方山下水曲之隈云漢女昔游處也張衡南都賦游女弄珠於漢臯之曲漢臯即方山之異名在襄陽縣江風俗通云江者貢也為其出珍物可貢獻也釋名云江者公也小水流入其中出物不私所公共也尚書云岷山導江東别為沱又東至於澧過九江至於東陵東迤北㑹於滙東為中江入于海水經云岷山在蜀郡氐道縣大江所出注岷山即瀆山也水曰瀆水又謂之汶阜山在徼外江水所導也春秋元命包云牛女為江湖江湖者所以開神潤化故其氣遄急河圖括地象云岷山之精上為井絡帝以㑹昌神以建福又云井絡耀纒江漢秉靈泉流深逺盛為四瀆之首初學記云按水經及荆州記江出岷山其源若甕口可以濫觴在益州建寧滿江縣濳行地底數里至楚都遂廣十里名為南江初在犍為與青衣水汶水合至洛縣與洛水合東北至巴郡與涪水漢水白水合東至長沙與澧水沅水湘水合至江夏與沔水合至潯陽分為九道一曰烏江二蚌江三烏土江四嘉靡江五畎江六浮江七禀江八提江九茵江東㑹于彭澤經蕪湖名為中江東北至南徐州名為北江而入海晏子云江深五里海深十里廣雅云江神謂之竒相江記云帝女也卒為江神李氏云大别之東彭蠡之東乃江漢合流之處郭景純江賦咨五才之並用實水德之靈長惟岷山之導江初發源于濫觴總括漢泗兼包淮湘并吞沅澧汲引沮漳源二分于崌崍流九𣲖乎潯陽彭洪濤于赤岸淪餘波于柴桑注五湖以漫漭灌三江而漰沛滈汗六州之域經營炎景之外呼吸萬里吐納靈潮自然往復或夕或朝按江水源出四川成都府茂州岷山又謂之汶山西南流經灌縣又東北流經重慶夔州府界入湖廣荆州府歸州出峽東流過常德府又北至武昌府合漢水於漢陽府之大别山東北至揚州入海武昌在江之東漢陽在江之西而漢水在漢陽之北江漢合流蓋在武昌漢陽之間方爾雅云方泭孫炎注木罝水中為泭筏論語曰乘桴浮于海注云編竹木為筏小曰桴是也爾雅又云庶人乘泭方言云泭謂之竺二稗竺二稗謂之筏筏秦晉通語也釋文云木曰竺二稗竹曰筏小筏曰泭薪爾雅櫬采薪采薪即薪注指解今樵薪也無羊箋云粗曰薪史記樵蘇後㸑注樵取薪蘇取草月令云季冬命四監收秩薪柴注大者可析謂之薪小者合束為之柴周禮甸師帥其徒以薪蒸役外內饔之事委人掌斂野之賦斂薪芻以式法共祭祀之薪蒸木材賔客共其芻薪喪紀共其薪蒸木材軍旅共其委積薪芻楚廣雅云楚荆也廣志云赤莖大實者名曰牡荆孔氏曰學記注以楚為荆羅氏云楚者楚地所出其一名荆故楚國入春秋稱荆而荆州亦以此木得名也今之牡荆作樹生者實細黃色而莖甚徑生子細如麻子比蔓荆實而細故稱小荆牡亦對蔓為名非無實之謂也本草圖經云牡荆即作箠杖者枝莖堅徑作科不為蔓生故曰牡葉如萆麻更踈瘦花紅作穗實細而黃如麻子大蔓荆莖髙四尺對節生枝初春因舊枝而生葉類小楝夏盛茂有花淺紅色蘂黃白花下有青萼秋結實斑黑如梧子大而輕虗陶隱居登真隱訣注云尋荆有三種直云荆木即是今可作箠杖者葉香亦有花子子不入藥方術則用牡荆春秋運斗樞云玉衡星散為荆學記云夏楚二物收其威也士喪禮云楚焞在燋東考工記云弓人取材荆次木瓜按朱傳楚荆屬蓋未即以為荆也考諸書皆謂楚即荆荆有三種此楚乃作箠之荆非牡荆蔓荆也南方草木狀寧浦有三種荆金荆可作枕紫荆堪作牀白荆堪作履此别是廣南之物非詩人所詠也蔞釋草云購蔏蔞郭云蔏蔞蔞蒿也生下田初生可啖江束用羮魚陸疏云其葉似艾白色長數寸高丈餘好生水邉及澤中正月根牙生旁莖正白生食之香而脆美其葉又可蒸為茹管子云葉下于􅡿􅡿下于莧莧下于蒲蒲下于葦葦下于雚雚下于蔞蔞下于荓荓下于蕭蕭下于薜薜下于萑萑下于茅凡彼草物有二十衰駒毛傳云五尺以上為駒周禮校人春執駒將事于四海山川則飾黃駒廋人掌教駣攻駒鄭司農注曰馬三歲曰駣二歲曰駒埤雅云傳曰大夫乘駒蓋駒血氣未定有蹄齧之虞故大夫乘之說文從句字音拘以駒血氣未定宜拘執之焉爾淮南子云方馬為草駒之時人不得制及至圉人擾之良御教之雖歷險超塹弗敢辭馬聾蟲也而可以通氣志汝墳篇汝水經云汝水出河南梁縣勉鄉西天息山注地理志云出髙陵山即猛山也亦言出南陽魯陽縣之大猛山又言出𢎞農盧氏縣還歸山博物志曰汝出燕泉山並異名也今汝水出魯陽大孟山黃柏谷西即盧氏界也魯陽縣今南陽府汝州魯山縣朱傳云徑蔡頴州入淮蔡今河南汝寧府上蔡縣頴州今鳯陽府頴州一統志汝水源出河南府嵩縣分水嶺經流南陽府郟縣㑹扈澗長橋等水戴液圑造等溪東流入于淮汝墳城在南陽府葉縣境內墳釋丘云墳大防李巡曰墳謂崖岸狀如墳墓名大防也周禮墳衍其動物宜介物其植物宜莢物其民晳而瘠注云水崖曰墳下平曰衍方言曰墳地大也青幽之間凡土而髙且大者謂之墳按釋水云汝為濆郭璞注引詩遵彼汝濆大水溢出别為小水之名又曰汝有濆李巡曰汝旁有肥美之地毛公不同釋水義者或以濆墳字異然常武傳云濆涯則毛以濆亦為大防也條枚傳云枝曰條幹曰枚說文云條小枝也枚木别生條也魴爾雅云魴魾注今江東呼魴魚為鯿一名魾陸疏曰魴今伊洛濟頴魴魚也廣而薄肥恬而少力細鱗魚之美者漁陽泉州及遼東梁水魴肥厚尤美故其鄉語曰居就糧梁水魴埤雅云其廣方其厚褊故一曰魴魴方也一曰鯿鯿褊也雅翼云魴縮頭穹脊博腹青白而味美漢中者尤美說苑陽晝云夫投綸錯餌迎而吸之者陽橋也其為魚也薄而不美若有若亡若食若不食者魴也其為魚也博而厚味韓詩章句云魴魚勞則尾赤藍田吕氏云鯉尾赤魴尾白赤則勞甚矣魚爾雅云魚有力者鰴魚枕謂之丁魚腸謂之乙魚尾謂之丙說文云水蟲也魚尾與燕尾相似周禮漁人凡祭祀賔客喪紀共其魚之鮮薧醢人饋食之豆豚拍魚醢加豆筍菹魚醢禮器云三牲魚臘四海九州之美味曲禮云祭宗廟之禮稿魚曰商祭鮮魚曰脡祭月令季冬命漁師始漁天子親往乃嘗魚先薦寢廟內則云魚曰作之家語云魚之大者名為鱄鱨其小者名鱦國語云魚禁鯤鮞蕃庶物也又云庶人祀以魚淮南子云月者隂之宗是以月虧則魚腦減月盈則魚腦盈頳爾雅云一染謂之縓再染謂之頳三染謂之纁注縓今之紅也頳染赤纁絳也尾說文微也從到毛在尸後釋名尾微也承脊之末稍微殺也王元命包云王者往也神之所輸向人之所歸樂白虎通云德合天地者稱帝仁義合者稱王别優劣也禮記諡法云德象天地稱帝仁義所生稱王帝者天號王者五行之稱也尚書刑德放云帝者天號王者人稱天有五帝以立名人有三王以正度孝經鉤命決云接上稱天子明以爵事天接下稱帝王明以號令臣下董子云古之人造文字者三畫而連其中謂之王三畫者天地與人也連中者通其道也取天地與人之才而參之非王者其孰能當獨斷云王者至尊四號之别名王畿內之所稱王有天下故稱曰王老子曰道大天大地大王亦大域中有四大而王居其一焉燬釋言云燬火李巡曰燬一名火方言云㷄火也楚轉語也猶齊言􅛚火也注􅛚音毁釋名云火亦言燬物入中即毁壞也麟之趾篇麟爾雅云麟麕身牛尾一角京房易傳云麟麕身牛尾狼額馬蹄有五采腹下黃髙丈二廣雅云麟者含仁懷義行步中規折旋中矩游必擇土翔必後處不履生蟲不折生草不群居不旅行不犯陷穽不罹罘􅘩文章彬彬大戴禮云毛蟲三百六十而麟為之長禮記云麟鳯龜龍謂之四靈麟以為畜則獸不狘又云地不愛其寶鳯凰麒麟皆在郊棷何法盛徵祥記云麒仁獸也牝曰麟牡鳴曰遊聖牝鳴曰歸和夏鳴曰扶幼秋鳴曰養綏毛傳云麟信而應禮以足至者也箋云麟角之末有肉示有武而不用孔氏曰傳麟信而應禮箋云公子與禮相應有似于麟申述傳文亦以麟為信獸駁異義以為西方毛蟲更為别說蔡雍月令云天宮五獸中有大角軒轅麒麟之信麟生于火游于土故修其母致其子五行之精也視明禮修則麒麟臻春秋運斗樞曰機星得則麒麟生萬人夀春秋保乾圖云歲星散為麟感精符云麟一角明海內共一主也王者不刳胎不剖卵則出于郊又云明王動則有義靜則有容乃見孔演圖云蒼之滅也麟不榮也麟乃木精也宋均注麟木精生水故曰隂水氣好土土黃木青故麟色青黃不榮謂見絏也禮斗威儀云君乘金而王其政平麒麟在郊鶡冠子云麒麟者𤣥枵之獸隂之精也瑞應圖云麟王者嘉祥食嘉禾之實飲珠玉之英埤雅云狼額赤目五蹄似麕圓頂一角故西狩獲麟曰有麕而角也或曰麟肉角鳯肉咮皆示有武而不用傳云麒似麟而無角按爾雅曰驨如馬一角不角者騏然則麒從騏省不角故也按羅氏謂麟只如䴥麋之屬後世言麟者皆妄果爾則何以為四靈司馬相如賦曰射麋腳麟此麟并州界有之大小如鹿非瑞獸也羅氏所指之麟殆此物與趾說文止下基也象草木出有址故以止為足釋名云趾止也言行一進一止也定爾雅云定題郭注額也姓說文云姓人所生也毛傳云公姓公同姓易是類謀曰黃帝吹律而定姓禹貢云錫土姓左傳衆仲云天子建德因生以賜姓胙之土而命之氏諸矦以字為諡因以為族官有世功則有官族邑亦如之國語云司商協名姓白虎通曰人所以有姓者何紀世别類使生相愛死相哀同姓不得相娶皆為重人倫也所以有氏者何所以貴功德下伎力或氏其官或氏其事王者之子稱王子王者之孫稱王孫諸侯之子稱公子公子之子稱公孫公孫之子各以其王父字為氏禮記云同姓從宗合族屬繫之以姓而弗别綴之以食而弗殊注云始祖為正姓髙祖為庶姓周禮小史奠繫世辨昭穆氏族序云三代之前姓氏分而為二男子稱姓婦人稱姓氏所以别貴賤貴者有氏賤者有名無氏古詛辭多曰墮命亡氏則與奪爵失國同可知為賤也故姓可呼為氏氏不可呼為姓姓所以别婚姻故有同姓異姓庶姓之别氏同姓不同者婚姻可通姓同氏不同者婚姻不可通三代之後姓氏則合為一矣陳祥道云姓所以繫百世之正統氏所以别子孫之旁出氏又可謂之族羽父為無駭請族公命以為展氏則氏族一也王氏曰公姓公孫也孫傳姓者也玉藻子姓之冠疏姓生也孫是子之所生故云子姓喪大記云子姓立于西方角說文云角獸角也象形角與刀魚相似周禮角人掌以時徵齒角凡骨物于山澤之農以當邦賦之政令爾雅角謂之觷又云北方之美者有幽都之筋角焉按漢書釋五音之角曰角觸也物觸地而出戴芒角也獸角其義亦同族白虎通曰族者湊也聚也恩愛相流湊也生相親愛死相哀痛有㑹聚之道故謂之族傳云公族公同祖疏此有公子公族公姓對例為然朱傳云公同髙祖祖廟未毁有服之親按古之釋族者有三說古尚書說云九族髙祖𤣥孫之親鄭𤣥周禮小司徒掌三族之别以辨親踈及禮記閨門之內有禮故三族和注云三族父子孫士昏禮請期曰惟是三族之不虞使某也請吉日注云三族謂父昆弟已昆弟子昆弟喪服小記曰親親以三為五以五為九上殺下殺旁殺而親畢矣鄭注已上親父下親子三也以父親祖以子親孫五也以祖親髙祖以孫親𤣥孫九也此純以父族而言者也戴禮尚書歐陽說云九族父族四五屬之內一父女昆弟適人者與其子二己女昆弟適人者與其子三己之子適人者與其子四母族三母之父姓一母之母姓二母女昆弟適人三妻族二妻之父姓一妻之母姓二此兼內外親而言者也杜預左傳親其九族注云九族謂外祖父外祖母從母子及妻父妻母姑之子姊妹之子女子之子此純以外親而言者也豫謂當從孔安國鄭康成為正蓋小記云親親以三為五以五為九此九族之定訓也經或言三族者舉其本或言九族者極其末爾雅於內宗皆曰族於母妻曰黨而已禮小功之末可以嫁娶妻之黨固無妨于嫁娶不容慮其不虞士昏禮欲及未有不虞而迎婦知異姓不在族中明矣且季梁對君無容近舍本宗而逺取外屬元凱之釋尤為巨謬宋昭公欲去羣公子樂豫曰公族公室之枝葉也不可縱尋斧焉豈亦異姓乎孔氏乃疑髙曾曾𤣥不能一身僃有故以外親充數殊不思國君宗室繁衍髙曾雖亡與髙曾一代者或髙曾之子孫非髙曾族乎曾𤣥雖無與曾𤣥為一代者非曾𤣥族乎何足以難孔鄭之義也此章釋公族又有二說毛云同祖朱云同髙祖據左傳曰同姓于宗廟謂諸姬也同宗于祖廟謂凡蔣邢茅胙祭也同族于禰廟謂五服之內也記云五廟之孫祖廟未毁雖為庶人冠取妻必告死必赴練祥則告是朱義有所昉不似毛公徒對例而云也六家詩名物疏卷四
