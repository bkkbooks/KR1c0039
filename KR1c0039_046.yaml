body:
  text: 六家詩名物疏卷四十三明馮復京撰小雅甫田之什一甫田篇耘說文云耘除田間穢也左傳云譬如農夫是穮是蓘雖有饑饉必有豐年注云穮耘也壅苗為蓘汲冢周書曰農之服田務耕而不耨維草其宅之吕氏春秋云凡禾之患不俱生而俱死是以先生者美米後生者為粃是故其耨也長其兄而去其弟莊子云藝而滅裂之其實亦滅裂而報豫耔說文云壅禾本也食貨志云后稷始畎田以二耜為耦廣尺深尺曰畎長終畝一畝三畎一夫三百畎而播種于畎中苗生葉以上稍耨隴草因隤其土以附苗根比盛暑隴盡而根深能風與旱齊周禮甸師掌帥其屬而耕耨王籍以時入之以供粢盛注云粢稷也為穀長是以名在器曰盛又云九嬪凡祭祀贊玉齍廩人大祭祀則共接盛舍人祭祀共簠簋實之陳之舂人祭祀共齍盛之米􅐪人掌凡祭祀共盛大宗伯凡祀享祭奉玉齍小宗伯辨六齍之名物與其用使六宫之人共奉之注云黍稷稻粱麥苽又云祭之日逆齍省鑊肆師祭之日表粢盛告潔大祝辨齍號禮記云黍曰薌合粱曰薌萁稷曰明粢稻曰嘉蔬又云季秋乃命冢宰農事備收舉五穀之要藏帝籍之收于神倉又云惟社丘乘共粢盛又云天子為籍千畝諸侯百畝以為醴酪粢盛又云八簋之實左傳云粢食不鑿昭其儉也又云奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也榖梁傳云三宫米而藏諸御廩公羊曰周公盛魯公燾羣公廩國語曰廩于籍之東南鍾而藏之又云天子郊禘之事王后必自舂其粢諸侯宗廟之事夫人必自舂其盛犧孔氏曰羊言犧謂純色四方之神亦太牢言羊以會句禮書云牷之純在色犧之完在體然牷者亦必完犧者亦必純社鄭駁異義云社者五土之神能生萬物者以古之有大功者配之祭法曰共工氏之霸九州也其子曰后土能平九州故祀以為社又曰后土則社周禮大司徒設其社稷之壝而樹之田主封人掌設王之社壝凡封國設其社稷之壝令社稷之職鼓人以靈鼓鼓社祭舞師掌教帗舞帥而舞社稷之祭祀牧人隂祀用黝牲毛之大宗伯以血祭祭社稷王大封則先告后土小宗伯掌建國之神位右社稷左宗廟凡天地之大烖類社稷宗廟則為位若大師則帥有司而立軍社奉主車肆師社之日涖卜來歲之稼鬯人凡祭祀社壝用大罍司服祭社稷五祀則希冕大司樂乃奏太簇歌應鐘舞咸池以祭地示大祝大師宜于社大會同宜于社大司馬仲春教振旅以祭社若師有功獻于社王制云諸侯祭社稷月令仲春擇元日命民社孟冬大割牲於公社禮運云命降于社之謂殽地又云祀社於國所以列地利禮器云三獻爓郊特牲曰郊特牲而社稷大牢又曰社祭土而主隂氣也君南嚮于北牖下答隂之義也日用甲用日之始也天子大社必受霜露風雨以達天地之氣也社所以神地之道地載萬物故教民美報焉家主中霤國主社示本也唯為社事單出里唯為社田國人畢作唯社丘乘共粢盛所以報本反始也祭法王為羣姓立社曰大社王自為立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成羣立社曰置社厲山氏之有天下也其子曰農能殖百穀夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社按毛傳云社后土也鄭依孝經緯以社為五土之總神所謂五土者山林川澤丘陵墳衍原隰也非左傳履后土之后土也左傳蔡墨云共工氏有子曰句龍為后土后土為社則后土是官名句龍配食于社亦稱為社也祭社必及稷以同功均利故也稷配以柱商時又易以棄禮有大社鄭云在庫門內雉門外之右即冢土也王社先儒或謂建于大社之西國社侯社宜亦如之賈公彥從崔氏之說謂王社侯社在籍田內然歷代籍田但祭先農不聞祭社也白虎通云天子之社壇方五丈諸侯半之其主則石也其列則社東稷西也其牲則天子大牢諸侯少牢也其祭有三時仲春命民社孟冬大割牲於公社及孝經緯仲秋禳禾拜社稷是也大社國社有稷而王社侯社不置稷者或為民祈報或但祭國之土示也此外又有勝國之社市中之社若大夫之社其大者則二千五百家為之周禮所云州社也其小則二十五家亦為之左傳所云書社千社也又鼓人注云社祭祭地祗則大地與神州之祗俱䝉社名故中庸云郊社之禮所以事上帝也此篇首章云或耘或耔已是夏耘之事此章云以社以方鄭氏以為秋報農夫之慶以為大蠟勞農下文祭田祖鄭又以為始耕之事故嚴氏定為明年春之事而以下章為成王省耕朱子又以下章為省耘豫以為一篇之詩首尾聯貫強分二年甚為無謂月令云仲夏大雩帝乃命百縣雩祀百辟卿士有益于民者以祈穀實凡祀五精之帝必配以五人帝神農已配赤熛怒若勾芒蓐收勾龍后稷之等舉該於百辟卿士內矣正應經文祈甘雨介黍稷之事于義為允不必有秋報春祈紛紛之說禮正月祈穀于上帝不聞祈雨也方曲禮云天子祭四方歲遍注云祭四方謂祭五官之神於四郊也勾芒在東祝融后土在南蓐收在西𤣥冥在北周禮大宗伯以血祭祭五祀注云五祀者五官之神在四郊四時迎五行之氣于四郊而祭五德之帝亦食此神焉大司馬仲秋云遂以獮田羅弊獻禽以祀祊注云祊當為方獮田主祭四方報成萬物詩云以社以方左傳蔡墨云少昊氏有四叔曰重曰該曰修曰熙實能金木及水使重為勾芒該為蓐收修及熙為𤣥冥世不失職遂濟窮桑此其三祀也顓頊氏有子曰犂為祝融共工氏有子曰句龍為后土此其二祀也鄭志答趙商云犂為祝融句龍為后土左氏下言后土為社謂暫作后土無有代者故先師之說犂兼之因火土俱位南方農夫慶箋云謂大蠟之時勞農以休息之也周禮黨正國索鬼神而祭祀則以禮屬民而飲酒于序鼓人凡祭祀百物之神鼓兵舞帗舞者太宗伯以疈辜祭四方百物司服祭羣小祀則𤣥冕大司樂凡六樂者一變而致羽物及川澤之示再變而致裸物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神籥章國祭蠟則吹豳頌擊土鼓以息老物羅氏蠟則作羅襦梓人張獸侯以息燕月令孟冬祈來年于天宗臘先祖五祀勞農而休息之郊特牲云天子大蠟八伊耆氏始為蠟蠟也者索也歲十二月合聚萬物而索饗之也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也迎猫為其食田鼠也迎虎為其食田豕也祭坊與水庸事也皮辨素服而祭素服以送終也葛帶榛杖喪殺也黃衣黃冠而祭息田夫也八蠟以記四方四方年不順成八蠟不通以謹民財也順成之方其蠟乃通以移民也既蠟而收民息已故既蠟君子不興功明堂位云大蠟天子之祭也雜記子貢觀蠟曰一國之人皆若狂孔子曰百日之蠟一日之澤傳曰夏曰嘉平殷曰清祀周曰大蠟秦初曰臘禮書云蠟祭川澤山林以至土示天神莫不與焉而所重者八先嗇也司嗇也百種也農也郵表畷也禽獸也坊也水庸也既蠟則臘先祖五祀于廟蠟以息老物臘以息民鼓周禮籥章掌土鼓杜子春云土鼓以瓦為匡以革為兩面可擊也又云凡國祈年于田祖吹豳雅擊土鼓以樂田畯注云祈年祈豐年也田祖始耕田者謂神農也田畯古之先教田者禮運云夫禮之初蕢桴而土鼓注云築土為鼓也明堂位云土鼓蕢桴葦籥伊耆氏之樂也樂書云離音絲南方之樂也坎音革北方之樂也甫田之御田祖琴瑟擊鼓者以自冬徂春農事則終而復始百穀則死而復生各有度數存焉土鼓之制窪土以為之故禮運之言土鼓在未合土之前與壺涿氏泡土之鼓異矣田祖傳云先嗇也箋云設樂以迎祭先嗇謂郊後始耕也疏云先嗇神農田祖一也始教造田謂之田祖先為稼穡謂之先嗇神其農業謂之神農祭田祖時后稷句龍及典田之大夫亦在祭中周禮大司徒樹田主注云田主田神后土田正之所依也疏云田神謂郊特牲云先嗇與神農一也籥章云國祈年于田祖前漢書顔注云田祖稷神也茨疏云墨子稱茅茨不剪謂以茅覆屋故箋以茨為屋蓋說文云茨以茅葦蓋屋也梁疏云孟子十二月輿梁成梁謂水上橫橋爾雅云隄謂之梁石杠謂之崎梁莫大于溴梁說文云橋水梁也榷水上橫木所以渡者也東楚謂橋為圮國語云辰角見而雨畢天根見而水涸雨畢而除道水涸而成梁故夏令曰九月除道十月成梁事始云橋上級謂之雁齒雜志云橋柱下橫水入沙者謂之蹲鴟大田篇種周禮大司徒辨十二壤之物而知其種以教稼穡樹藝遂人以土宜教氓稼穡疏云髙田種黍稷下田種稻麥稻人澤草所生種之芒種司稼辨穜稑之種月令孟春玊命布農事善相丘陵阪險原隰土地所宜五穀所殖以教導民季冬令告民出五種孝經援神契云五土出利以給天下黃白宜種禾黑墳宜種麥蒼赤宜種菽汙泉宜種稻螟箋云螟螣之屬盛陽氣贏則生之爾雅云食苗心螟李巡曰言其姦冥冥難知也疏曰舊說螟螣蛑賊一種蟲也如言冦賊姦宄內外言之耳故犍為文學曰此四種蟲皆蝗也許愼云蟲食穀葉者吏冥冥犯法即生螟陸璣曰螟似虸蚄而頭不赤月令仲春行夏令蟲螟為害漢五行志云視不明溫奧生蟲故有螺蟲之孽謂螟螣之類當死不死未當生而生或多於故而為災也劉歆以為屬思不容京房易傳云蔽惡生孽蟲食心吕氏春秋云蝗螟農夫得而殺之為其害稼也蔽天狀如嚴雪是歲天下失瓜瓠又云亂國有螟集其地其音凶凶春秋漢含孳云螟應苛克淮南子云枉法令則多蟲螟雅翼云今食苗心者乃無足小青蟲既食其葉又以絲纒褁衆葉使穗不得展江東謂之蟥蟲孔臧蓼蟲賦曰爰有蠕蟲厥蟲如螟是螟為無足蟲也螣爾雅云食葉蟘李巡曰言假貸無厭故曰蟘也許愼曰蟲食苗葉者吏乞貸則生蟘陸璣曰螣蝗也月令孟夏行春令則蝗蟲為災仲夏行春令百螣時起孟秋行冬令介蟲敗穀仲冬行春令蝗蟲為敗季冬行秋令介物為妖五行志云劉歆聽傳曰有介蟲孽也螽蜚蝝食穀為災京房易傳云德無常兹謂煩蟲食葉蔡伯喈曰蝗螣也當為災則生水處澤中數百或數十里一朝蔽地而食禾粟苗盡復移雖自有種其為災云是魚子在水中化為之洪範五行傳曰刑罰暴虐貪叨無厭興師動衆蟲為害矣介蟲有甲能飛揚之類陽氣所生於春秋為螽今謂之螟皆其類也旱氣動象至矣春秋佐助期曰螽之為蟲赤頭甲身而翼飛行隂中陽也螽之為言衆暴衆也漢含孳曰天雨螽則刑法醜蟊爾雅云食根蟊李巡曰言其稅取萬民財貨故云蟊也說文曰蟊食苗根者也吏抵冒取民財則生蟊京房易傳曰臣安祿兹謂貪厥災蟲食根毛詩義疏曰蟊長而細或說云蟊螻蛄也食苗根而為人患按今之螻蛄亦為苗患爾雅云􅀢天螻本草云螻蛄一名蟪蛄一名天螻一名􅕪疏云一名碩鼠夏小正云三月􅕪則鳴淮南子孟夏螻蟈鳴者是也翅小而短飛去不遠穴土而居處處有之然此蟊自是蝗類非螻蛄也賊爾雅云食節賊李巡曰言貪狼故曰賊也陸璣曰賊似桃李中蠧蟲赤頭身長而細京房易傳曰與東作爭兹謂不時蟲食節騂黑疏云五官之神其牲各從其方色詩記云來南方則用騂牲來北方則用黑色周禮大宗伯云以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方皆有牲幣各放其器之色注云以為禮五天帝人帝而句芒等食焉瞻彼洛矣篇洛東萊云職方氏雍州其浸渭洛故毛傳以洛為宗周之浸水洛水雖出於京兆上洛西山然其流尚微此詩所謂洛蓋指東都也禹貢云導洛自熊耳東北會于澗瀍又東會于伊又東北入于河山海經云洛出上洛西山又曰歡舉之山洛水出焉東與丹水合初學記云周官豫州其川滎雒與伊瀍二水為三川秦于河南置三川郡按水經云洛水出京兆上洛縣冢嶺山郡經上洛𢎞農河南縣盧氏蠡城陽市宜陽洛陽合伊瀍榖澗之水至鞏縣而入河又周禮雍州其川洛汭此洛一名漆沮出馮翊此關輔之水非河南洛也又水經注云洛水出漳水東經洛縣及新都與湔水合此又在蜀土春秋說題辭云洛出熊耳山洛之為言繹也言水繹繹光耀也河圖云洛水地里隂精之官帝王明聖龜書出文天以與命地以授瑞接河合際居中護羣王道和洽吐圖佐神逆名亂教摘亡弔存故聖人觀河洛也又春秋說題辭河以通乾出天苞洛以流坤吐地符淮南子云洛水輕利宜禾述征記云洛水底有礬石故上無水一統志洛水源出陜西洛南縣冢嶺山東流經河南河南府盧氏永寧宜陽洛陽偃師鞏縣入于河韎韐詳見檜風韠孔氏云韎韐是衣服之名用茅搜草染之爾雅一染謂之縓韎韐是縓也大夫以上祭服謂之韍士無韍名謂之韎韐士冠禮爵辨服纁裳純衣緇帶韎韐注云韎韐縕韍也士縕韍而幽衡合韋為之士染以茅搜因以名焉今齊人名蒨為韎韐韍之制似韠朱傳云韎茅搜所染色也韍韠也所謂韋辨六師劉公瑾云天子六軍出自六鄉蓋萬二千五百家為鄉凡起徒役母過家一人故萬二千五百家為一軍六軍總七萬五千人也鞞傳云容刀鞞也說文云刀室也左傳云藻率鞞鞛昭其數也內則子事父母右佩遰注云遰刀鞞也按鞞琫珌三字之義爾雅無文故此傳云鞞容刀鞞也琫上飾珌下飾公劉傳云下曰鞞上曰琫孔氏曰鞞者刀鞘之名琫者鞘之上飾下不言其飾指鞞之體故曰下曰鞞上則有飾可名故曰上曰琫是毛說本矛盾孔亦不得已而為之辭也釋名因之曰下末之飾曰琕琕卑也在下之言琕當是鞞字與毛公劉之傳同杜氏左傳注則以鞞為上飾鞛為下飾又倒置無據劉規其過是也仲達不得為之佞臣琫珌毛傳云琫上飾珌下飾天子玉琫而珧珌諸侯璗琫而璆珌大夫璙琫而璆珌士珕琫珕珌說文云珧蜃甲所以飾物也爾雅云黃金謂之璗其美者謂之鏐白金謂之銀其美者謂之鐐郭璞曰鐐即紫磨金也釋文云璆音蚪玉也鐐又作璆玉也六家詩名物疏卷四十三
