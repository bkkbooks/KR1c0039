body:
  text: 六家詩名物疏卷五十三明馮復京撰周頌臣工之什二潛篇潛釋器云槮謂之涔李巡曰今以木投水中養魚曰涔孫炎曰積柴養魚曰槮郭璞曰今之作槮者聚積柴木于水中魚得寒入其裏藏隱因以薄圍捕取之小爾雅云魚之所息謂之橬橬槮也韓詩曰涔魚池潛槮涔橬音義同字林作罧鰷爾雅云鮂黑鰦郭云即白鯈江東呼為鰌者埤雅云鰷魚形狹而長若條然故曰鰷也今江淮之間謂之魚性浮似鱨而白雅翼云鰷形纎長而白故曰白鰷又謂白鯈釋魚鮂黑鰦是也此魚好遊水上故莊子稱鯈魚出遊從容以為魚樂明遂其性也雍篇祀序云雍禘太祖也箋云禘大祭也大于四時而小于祫太祖謂文王玄鳥序云祀髙宗也箋云祀當為祫髙宗崩始合祭于契廟歌是詩焉古者君喪三年既畢禘于其廟而後祫祭于太祖明年春禘于羣廟自此之後五年而再殷祭一禘一祫春秋謂之大事長發序云大禘也箋云大禘郊祭天也按爾雅云禘大祭也鄭氏之學以為禘禮有四大司樂圓丘方丘宗廟鄭云此三者皆大祭祭法虞夏禘黃帝殷周禘嚳注云此祭昊天于圜丘也此禘之一也喪服云天子及其始祖之所出注云始祖之所由出謂祭天大傳云禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖大夫士有大事以省于其君干祫及其髙祖此謂祭感生帝于南郊禘之二也大宗伯云以肆獻祼享先王以饋食享先王注云祫禘也祫言肆獻禘言饋食互相備明堂位云季夏六月以禘禮祀周公于太廟此禘之三也王制天子諸侯宗廟之祭夏曰禘注云此夏殷祭名周則改之以禘為殷祭此禘之四也謂之禘者禘諦也言使昭穆之次審諦也祭天謂之禘者亦言使典禮諦也此雍禘太祖蓋五年宗廟之殷祭也其長發大禘則殷以夏正于南郊祀感生帝汁光紀也其祫祭者王制曰天子犆礿祫禘祫嘗祫蒸諸侯礿犆禘一犆一祫嘗祫蒸祫曾子問云當七廟五廟無虛主者祫祭于祖為無主耳又曰祫祭于祖則祝迎四廟之主鄭云魯禮三年喪畢祫于大祖明年春禘于羣廟自爾之後五年而再殷祭一祫一禘公羊傳云大祫者何合祭也毁廟之主陳于大祖未毁廟之主皆升合食于大祖五年而再殷祭是也其玄鳥祀髙宗即三年喪畢祫于大祖之廟以新崩之主序昭穆也禮記注稱喪畢祫于大祖明年春禘于羣廟而玄鳥箋顧有其廟而後祫祭大祖之文者謂練時遷主遞廟新死者當禘祭于其廟以安之故鬯人云廟用修注云謂始禘時是也鄭特將練禘總就喪畢言之耳其禘祫之異者祫則未毁廟之主及毁廟之主皆合祭于大祖廟中禘則大王王季以上遷主祭于后稷之廟穆之遷主祭于文王之廟昭之遷主祭于武王之廟而不及親廟其坐位所向各别祫用五齊三酒禘惟四齊三酒無泛齊祫備六代之樂禘惟四代又無降神之樂祫十二獻禘九獻禮器云大饗其王事與注云盛饌與貢謂祫祭先王此鄭氏之説謂祫大禘小者然也若王肅張融孔朝之徒則以禘為大祫為小賈逵劉歆杜預之徒則以傳無祫文禘為三年一大祭在大祖之廟蓋取其序昭穆謂之禘取其合集羣祖謂之祫二禮為一鄭依禮緯云三年一祫五年一禘謂之百王通義而禘祫志云王制記祫于秋夏冬周公制禮祭不欲數是又以虞夏殷三時俱殷祭其説自相違背王肅不信六天之説既無郊丘之分且謂禘惟祭宗廟大傳所謂祭其所自出者謂始祖之父耳陸淳趙匡朱子之徒皆依而用之禘以夏四月大祫之禮崔霛恩云用秋張純云用冬十月解禮記者又或謂祫禘祫嘗祫蒸為時祭之祫大祫為三年之祫議禮之家名為聚訟亦不得而折其衷也宗廟之禘依鄭氏云祭毁廟不及親廟陸淳云禘于始祖廟祭所出之帝便以祖配不兼羣廟為其疏逺不敢褻狎陳祥道以此説為不足信朱子長發傳云大禘不及羣廟之主此宜為祫祭之詩蓋同陸説先儒多以不王不禘之文而譏魯僣祭不知大夫士有大事省于其君得祫髙祖大夫士得祫何疑周公之後不得禘哉春秋傳有禘無祫按禘祫志所稱二禮之異俱無證據豈禘祫儀制相似而混為一與國語云郊禘之牛繭栗又云郊禘之事射牛郊禘之事有全脀又曰天子親舂郊禘之盛而不及祫爾雅云禘大祭繹又祭而不云祫故馬端臨云魯之禘即祫或亦有見與司尊彛四時之間祀追享朝享説者亦以為禘祫鄭玄以追享為禱請遷主朝享為月朔朝廟烈文助祭即是朝享之祭非此禘祫也載見篇鈴釋天云有鈴曰旗李巡曰以鈴著旒端郭璞曰縣鈴于竿頭畫交龍于旒左傳云錫鸞和鈴昭其聲也注云鈴在旗有客篇白馬傳云殷尚白檀弓云殷人尚白戎事乘翰注云以建丑之月為正物牙色白翰白色馬也易曰白馬翰如明堂位云夏后氏駱馬黑鬛殷人白馬黑首周人黃馬蕃鬛周頌閔豫小子之什訪落篇家箋云厥家謂羣臣臯陶謨云日宣三德夙夜浚明有家注云卿大夫稱家疏云大夫受采邑賜氏族立宗廟世不絶祀故稱家小毖篇蜂爾雅云土蜂木蜂疏云此辨蜂在土木之異也説文云蜂飛蟲螫人者其形大在地中作房而啖其子者名土蜂又名馬蜂今荆巴間呼為蟺其形差小在樹上作房者名木蜂亦食其子又云蜂醜螸疏云蜂類好垂其腴以伏息説文云螸垂腴也腴即腹下也援神契云蜂蠆垂芒內則云爵鷃蜩范注云范蜂也方言云蜂燕趙間謂之蠓蠮其大而蜜謂之壺蜂化書曰蜂有君禮本草圖經云蜜蜂在蜜脾中如蛹白色大黃蜂即人家屋上作房及大木間􅫴􅕕蜂子也嶺南人作饌食之黃色比蜜蜂更大土蜂即穴土居者最大螫人或至死埤雅云蜂有兩衙應潮其主之所在衆蜂為之旋繞如衛有君臣之義其毒在尾垂頴如鋒故謂之蜂方言曰大而蜜謂之壺蜂即今黑蜂黃蜂亦其一種無蜜纎長其窠仰綴于屋銜漆以固其蒂隂陽在尾喜合末端有岐者牝鋭者牡也雅翼云細腰蜂作房在小樹及簷下房綴著處必以漆其在大木上者蜂與房皆大謂之露蜂房蜜蜂似蜂而小山海經云穀城之山足蜜蜂之廬今土木之蜂亦皆有蜜人家畜者質小而微黃腰腹相稱如蠅蟬蓼爾雅云薔虞蓼疏云即蓼之生水澤者頌云以薅荼蓼毛傳云蓼水草是也禮記云膾秋用蓼濡豚包苦濡雞醢醬濡魚卵醬濡鱉醢醬實蓼鶉羹雞羹鴽釀之蓼蜀本圖經云蓼有紫赤青馬水香木等七種紫赤二蓼葉小狹而厚青香二蓼葉相似而俱薄馬水二蓼葉大上有黑點木蓼一名天蓼蔓生葉似柘葉諸蓼花皆紅白子皆赤黑木蓼花黃白子皮青滑埤雅云蓼生水澤者莖赤味辛一名薔離騷曰蓼蟲不能從乎葵藿則葵藿甘而蓼苦故也朱傳云今南方人謂蓼為辣荼或用以毒溪取魚載芟篇畛遂人云十夫有溝溝上有畛孔氏云畛是地畔道路之名良耜篇荼釋草云蒤委葉疏王肅説詩云荼陸穢草然則蒤者原田蕪穢之草非苦菜也按荼蓼二草也蓋有田有原有隰故並舉水陸穢草朱傳云一物有水陸之異恐未然也櫛説文曰櫛梳箆總名曲禮云男女不同巾櫛玉藻云櫛用樿櫛髮晞用象櫛百室箋云百室一族也出共洫間而耕入共族中而居又有祭酺合醵之歡疏云鄉族於遂則鄼大司徒云五家為比五比為閭四閭為族族師云各掌其族之戒令政事月吉則屬民而讀邦法書其孝弟睦姻有學者春秋祭酺亦如之注云酺者為人物災害之神族長無飲酒之禮因祭酺與其民以長幼相獻酬遂人云五家為鄰五鄰為里四里為鄼又云百夫有洫鄼長各掌其鄼之政令歲時簡器與有司數之趨其耕耨稽其女功絲衣篇絲衣朱傳云絲衣祭服辨爵辨也士祭于王之服箋云繹禮輕使士士冠禮爵辨服纁裳純衣緇帶韎韐注云純衣絲衣也雜記云大夫冕而祭於公辨而祭於己士辨而祭於公冠而祭於已按周禮正祭視滌濯逆齊省鑊告時告備皆使小宗伯此繹祭輕故使士耳朱傳泛言祭而飲酒非也朱傳及箋所云禮之次俱凖特牲為文基箋云門孰之基疏云繹禮在門不在廟知基是門孰之基謂廟門外西夾之堂基釋宫云門側之堂謂之孰孫炎曰夾門堂也儀禮圖云孰有內外士冠注云西孰門外西堂是也按此箋凖特牲為禮之次但依其告濯具告充告潔之次耳彼特牲是正祭主人先即位于堂下宗人升自西階視壺濯及豆籩反降東北面告濯具主人出復外位宗人視牲告充舉鼎冪告潔所謂堂者乃廟堂非門外西夾之堂也故宗人升階而後告濯具也此所謂堂乃在廟門外之旁與正祭異又特牲視濯視牲等事在祭前一日此視濯等事即在繹祭之日蓋天子繹以祭之明日正祭日禮畢後不容復修諸禮壺濯牲鼎之屬當于本日之早陳之而即以本日視之也鼐鼎鼒爾雅云鼎絶大謂之鼐圜弇上謂之鼒附耳外謂之鉞款足者謂之鬲注云鼒鼎斂上而小口鉞鼎耳在表鬲鼎曲腳説文云三尺兩耳和五味之寶器也昔禹收九牧之金鑄鼎荆山之下魯詩説云鼐小鼎周易鼎卦彖曰鼎象也以木巽火亨飪也九四曰鼎折足覆公餗六五曰鼎黃耳金鉉上九曰鼎玉鉉禮書云士虞有上中下鼎有司徹司馬舉羊鼎司士舉豕鼎魚鼎天子諸侯有牛鼎大夫羊士豕魚而已膳夫王日一舉鼎十二掌客諸侯之禮鼎皆十二聘禮賔之飱饔皆飪一牢鼎九而飱腥一牢鼎七饔腥二牢鼎二七上介飱饔皆飪一牢鼎七而饔腥一牢鼎七衆介飱少牢飪鼎五大夫少牢五鼎士特牲喪禮三鼎既夕五鼎掌客聘禮諸侯與卿之鼎過王之數士既夕鼎過于特牲何也聘禮陳鼎也王之日舉食鼎也特牲庸禮也既夕斯須禮也然所謂陪鼎羞鼎皆鉶鼎所以實羹者也王日食九鼎而陪鼎三公食大夫七鼎而鉶鼎四掌客上公鉶四十二侯伯二十八子男十八聘禮之賔上介飱饔之羞鼎皆三少牢佐食設羊鉶豕鉶特牲主婦設兩鉶公食大夫之鉶多于王日食者以公食者衆也聘介之鉶同于賔者以三鼎殺故也周禮亨人掌共鼎鑊以給水火之齊然則牲體皆亨于鑊然後肉脀之鼎而羹納于鉶公食大夫禮甸人陳鼎設扄冪若束若編考工記曰廟門容大扄七個闈門容小扄三個鄭氏謂牛鼎扄長三尺膷鼎扄長二尺扄謂之鉉易稱玉鉉金鉉以橫木貫耳而舉之金玉其飾也冪茅為之長者束本短者編中陳鼎必于門外舉之去冪然後入既入抽扄然後加七三禮圖云天子之鼎飾以黃金諸侯飾以金容一斛大夫羊鼎飾以銅容五斗士豕鼎飾以鐵容三斗牛羊豕鼎各狀其首于足上般篇嶞爾雅云巒山嶞注云謂山形長狹者荆州謂之巒孔氏曰山之小者嶞嶞然言狹長之意翕河箋云河自大陸北敷為九祭者合為一禹貢兖州云九河既道又云河北過洚水至于大陸又北播為九河同為逆河入于海爾雅云徒駭太史馬頰覆釜胡蘇簡潔鈎盤鬲津九河春秋保乾圖云移河為界在齊吕填閼八流以自廣命厯序云人皇九頭提羽蓋乘雲車出陽谷分九河酈道元云九河碣石苞淪于海蔡傳云九河六曰簡潔其一則河之經流也先儒不知河之經流遂分簡潔為二苑洛語祿云九河故道今永平府撫寧縣碣石山與諸家所載碣石之狀合則九河在滄平間海之灣永平謂之南海此或逆河今河徙而洋存山東通志馬頰在商河覆釜在海豐鈎盤在德平鬲津在樂陵徒駭在齊河皆濟南府所屬今真定府三百里方是濟南北境真定去濟南東西六百餘里古河自洚水直趨而北至大陸皆真定地又北播為九河固永平河間地也不應河至大陸折而東反回流而南以至濟南之境滄州古志徒駭在滄州廢清池縣太史簡潔在本州南皮縣馬頰在景州東光縣胡蘇鬲津在滄州慶雲縣鈎盤在獻縣此九河相去不逺又與黃河故道相近此古志得之土人可徵也河雖為冀兖之界然兖地下九河之分皆在兖故于兖言之一統志直𨽻河間府九河故道舊志云云此蓋後世新河傳以舊名今亦湮塞同苑洛語録濟南府云鬲津枯河自齊河縣經禹城平原德州德平樂陵東北至海豐入海鈎盤枯河自德州經德平東北至陽信縣又有覆釜枯河自慶雲經海豐縣南入海又濟陽縣東北至商河縣境有馬頰枯河東昌府有馬頰河故道按九河漢許商止得其三後儒推之以為徒駭是九河之最北者鬲津是最南者太史馬頰覆釜文在胡蘇之上則在成平之南東光之北簡潔鈎盤文在胡蘇之下則在東光之南鬲縣之北唐人積集纍世之語遂得其六輿地記又得其一蔡沈書傳著之詳矣而太史竟不知所在又謂簡潔為一然則止八河耳一統志所言亦影響之間惟韓氏論著甚詳故略載之六家詩名物疏卷五十三
