body:
  text: 六家詩名物疏卷二十八明馮復京撰國風檜檜朱傳云檜國名高辛氏火正祝融之虛在禹貢豫州外方之北滎波之南居溱洧之間其君妘姓祝融之後周衰為鄭桓公所滅而遷國焉鄭語云妘姓鄶注陸終第四子求言為妘姓封于鄶世本曰陸終生六子四曰鄶人郡縣志鄶城在鄭州新鄭縣東北三十二里杜預云檜城在滎陽密縣東北一統志河南開封府鈞州新鄭縣周封檜國密縣本古密國亦檜國地羔裘篇狐裘箋云大蠟而息民則有黃衣狐裘今以祭朝服玉藻云狐裘黃衣以裼之注云黃衣大蠟時臘先祖之服郊特牲云黃衣黃冠而祭息田夫也注云祭謂既蠟臘先祖五祀也於是勞農以休息之詩正義云人君以歲事成熟搜索羣神而報祭之謂之大蠟又臘祭先祖五祀因令民得大飲農事休息謂之息民於大蠟之後作息民之祭時有黃衣狐裘大蠟則皮辨素服二者不同以其事相次故連言之蘇子由云錦衣狐裘其所以朝天子之服堂疏云朝路門外之朝堂路寢之堂也玉藻云君日出視朝退適路寢聽政使人視大夫大夫退然後適小寢釋服素冠篇素冠傳云素冠練冠也李氏曰毛以素冠為練冠謂練布使熟其色益白是以謂之素三年之喪十有三月而練雜記云喪冠條屬以别吉凶三年之練冠亦條屬右縫小功以下左緦冠繅纓大白冠緇布之冠皆不㽔委武玄縞而後㽔禮書云喪禮成服布冠小祥練布冠布冠春秋傳所謂大白之冠也條屬不委武不㽔箋云喪禮既祥祭而縞冠素紕玉藻云縞冠素紕既祥之冠也注紕緣邊也已祥祭而服之疏云紕緣邊者謂緣冠兩邊及冠卷之下畔其冠與卷身皆用縞但以素緣耳縞是生絹而近吉間傳云又期而大祥素縞麻衣疏云二十五月大祥此日首服素冠以縞紕之身著朝服而為大祥之祭祭訖之後哀情未除反服微凶之服首服縞冠以素紕之身著十五升布深衣未有采緣禮書云縞冠素紕其制厭無緌按孔氏引間傳注云黑經白緯曰縞朱子從之今考間傳注黑經白緯曰纎豈今禮記本誤乎抑孔氏誤也素衣毛云素冠故素衣疏云謂既練之後服此白布喪服箋云除成喪者其祭也朝服縞冠朝服緇衣素裳此言素衣者謂素裳也雜記云祥主人之祭也於夕為期朝服祥因其故服注云喪服小記曰除成喪者其祭朝服縞冠是也祭猶縞冠未純吉也既祭乃服大祥素縞麻衣按朱子從鄭説以素冠為既祥冠則其所謂素者乃是白絹非白布也而注素衣又從毛説云素冠則素衣使朱子之意謂素衣為布則與縞冠素紕之冠不相蒙使謂為絹則既祥之後無服絹之理鹵莽甚矣此素衣服之於祥祭之日若既祥之後則服十五升布之深衣以寄其餘哀不服素衣矣又過二月而禫祭則玄冠朝服禫祭訖首著纎冠身著素端黃裳以至吉祭素韠疏云祥祭朝服素韠按素韠亦祥祭之日所服若既祥之後則素縞麻衣不服韠矣韠釋名云韠蔽也所以蔽膝前也采菽箋云芾太古蔽膝之象也冕服謂之芾其他服謂之韠以韋為之乾鑿度云天子之朝朱芾諸侯之朝赤芾注云古者田魚而食因衣其皮先知蔽前後知蔽後後王易之以布帛而獨存其蔽前者重古道而不忘本也白虎通曰紼者蔽也行以蔽前因以别尊卑彰有德也以韋為之者反古不忘本也上廣一尺下廣二尺天一地二也長三尺法天地人也禮記云韠君朱大夫素士爵韋圜殺直天子直公侯前後方大夫前方後銼角士前後正韠下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸又云一命緼韍再命赤韍三命赤韍又云齊則綪結佩而赤韠又云有虞氏服韍夏后氏山殷火周龍章又云韠會去上五寸紕以爵韋六寸不至下五寸純以素紃以五采士冠禮爵辨服韎韐皮辨服素韠玄端爵韠特牲饋食其服皆朝服玄端緇韠唯尸祝佐食玄端爵韠左傳云袞冕黻珽昭其度也斯干傳云天子純朱諸侯黃朱東漢志云佩所以章德服之衷也韍所以執事禮之共也春秋繁露云韍之在前朱鳥之象也按韠即黻也黻字或作芾或作紼或作紱士之緼韍又稱韎韐鄭氏云冕服謂之芾其他謂之韠然禮惟言韠之制而已更不指芾知芾即韠耳一命之士服爵辨亦得稱緼韍豈以冕服他服為間乎鄭氏又云韍舜始作之以尊祭服賈公彥云祭服謂之韍其他服謂之韠然方叔南征車攻諸侯之會同采菽諸侯之交接云朱茀赤芾則非獨祭服名韍矣韍之飾依鄭氏明堂位注天子備山火龍章諸侯火而下卿大夫山士韎韐而已以禮推之周多以近世之禮待貴者逺世之禮待卑者鄭説或是也其玄端服之韠加飾亦同惟士無飾故謂之韎韐左傳疏謂韠以色别韍加文飾者非也先儒惟不知韍韠之本同直所從言之異耳以致紛紛如此隰有萇楚篇萇楚爾雅云萇楚銚芅郭璞曰今羊桃也或曰鬼桃葉似桃華白子如小麥亦似桃陸疏云葉長而狹華紫赤色其枝莖弱過一尺引蔓於草上今人以為汲灌重而善沒不如楊柳也近下根刀切其皮著熱灰中脫之可韜筆管本草羊桃一名羊腸一名御弋生山林川谷及生田野陶隱居云子細小苦不堪噉花甚赤蜀本圖經云葉花似桃子細如棗核多生溪澗今人呼為細子根似牡丹埤雅云有兩羊桃一種花實皆連理按羊桃必蔓于草上而鄭氏云始生正直長大不妄尋蔓草木者誤也匪風篇飄爾雅云回風為飄李巡曰回風旋風也一名飄風老子曰飄風不終朝乙巳占云扶搖羊角者曰飄風鬵説文大釜也一曰鼎大上小下若甑曰鬵甑釜屬釋器云甑謂之鬵鬵鉹也孫炎曰關東謂甑為鬵涼州謂甑為鉹考工記陶人為甗實二釜厚半寸脣寸盆實二寸厚半寸脣寸甑實二釜厚半寸脣寸七穿方言云甑自關而東或謂之甗或謂之鬵或謂之酢􅿰按鬵本釜屬故可以烹魚甑亦曰鬵鼎上大下小若甑亦曰鬵蓋異物而同名耳孔仲達泥鬵為甑以為俱食器而連言之者誤也國風曹曹朱傳云曹地在禹貢兗州陶丘之北雷夏菏澤之野周武王以封其弟振鐸孔疏云曹都雖在濟隂其地則踰濟北魯在其東南衛在其西北郡縣志古曹國在曹州濟隂縣東北四十里自曹叔至伯陽凡十八葉按古之濟隂縣今山東兗州府曹州曹縣曹所都也菏澤在曹州境內雷澤城在東昌府濮州即故城陽鄭箋所謂堯遊成陽死而葬焉者也然則今之曹州曹縣定陶及濮州皆其地蜉蝣篇蜉蝣爾雅云蜉蜉渠略舍人曰南陽以東曰蜉蝣梁宋之間曰渠略郭璞曰似蛣蜣身狹而長有角黃黑色聚生糞土中朝生暮死豬好噉之陸璣云似甲蟲有角大如指長三四寸甲下有翅能飛夏月隂雨時地中出今人燒炙噉之美如蟬也陸佃云叢生鬱棲中朝生夕殞有浮遊之義夏小正曰五月浮遊有殷殷衆也浮遊殷之時也淮南子云蜉蝣不食不飲三日而死王褒云蜉蝣出以隂廣志云蜉蝣在水中翕然生覆水上尋死隨流而去麻衣箋云麻衣深衣諸侯之朝朝服朝夕則深衣疏云諸侯夕服當用十五升布深衣而純以采玉藻云諸侯夕深衣祭牢肉深衣三袪縫齊倍要衽當旁袂可以回肘長中繼掩尺夾二寸袪尺二寸緣廣寸半深衣云古者深衣短毋見膚長毋被土續衽鈎邊要縫半下袼之高下可以運肘袂之長短反詘之及肘帶下毋厭髀上毋厭脅當無骨者制十有二幅以應十有二月袂圜以應規曲夾如矩以應方負繩及踝以應直下齊如權衡以應平故先王貴之可以為文可以為武可以擯相可以治軍旅完且弗費善衣之次也具父母大父母衣純以繢具父母衣純以青如孤子衣純以素純袂緣純邊廣各寸半禮書云虞夏商周養老皆以燕服又周大夫士之於私朝朝玄端夕深衣庶人吉服深衣而已則深衣在虞為燕服在周以為夕與喪服大夫士庶人皆服焉所以異於餘服者餘服上衣下裳深衣則衣裳連矣餘服幅前三後四深衣則十二幅矣餘服三分帶下紳居二焉由帶以下四尺五寸深衣之帶則當無骨者矣按鄭云深衣者用十五升布煆濯灰治純之以采然則喪服麻衣雖似深衣之制不必煆濯灰治以其雜凶故也惟其煆濯灰治故得色白如雪此詩云麻衣知是深衣候人篇候人周禮候人上士一人下士一人史六人徒百有二十人候人各掌其方之道治與其禁令以設候人若有方治則帥而致于朝及歸送之于竟國語單襄公云周之秩官有之曰敵國賔至關尹以告行理以節逆之候人為導孔疏云身荷戈祋謂作候人之徒屬非候人之官長也祋詳見衛風殳説文云祋殳也赤芾詳見檜風韠傳云大夫以上赤芾乘軒鵜爾雅云鵜汙澤郭璞曰今之鵜鶘也好羣飛沈水食魚故名汙澤俗呼之為淘河陸疏云鵜水鳥形如鶚而極大喙長尺餘直而廣口中正赤頷下胡大如數升囊若小澤中有魚便羣共抒水滿其胡而棄之令水竭盡魚在陸地乃共食之故曰淘河本草云鳥大如蒼鵝頥下有皮袋容二升物展縮由袋中盛水以養魚身是水沫惟胸前有兩塊肉如拳山海經云憲期之山多鵜鶘如鴛鴦而人足其名自呼莊子云魚不畏網而畏鵜鶘網者公平無私鵜鶘有心故魚畏之淮南子云鵜鶘飲水數斗而不足鱣鮪入口若露而死禽經云淘河在岸則魚沒沸河在岸則魚出又云鵜志在水前漢志鵜鶘集昌邑王殿下劉向以為水鳥色青青祥也咮釋文咮鳥口也南山傳云曹南山也郡縣志曹南山在曹州濟隂縣東二十里詩南山朝隮是也十道志云曹南山汜水出焉漢書云高祖即位于汜水之陽今壇存一統志曹南山在兗州府曹州南一百里詩南山朝隮春秋盟于曹南皆此鳲鳩篇騏辨尚書顧命云四人騏辨執戈注云青黑曰騏孔安國本作綦注云綦文鹿子皮辨王肅云綦赤黑色孔疏云馬之青黑色者謂之騏此字從馬則謂辨色如騏馬之文禮書云綦者陰陽之雜故禮以綦組纓為士之齊冠綦組綬為世子佩詩以綦巾為女巾皆其未成德者之服也則士辨以綦宜矣辨師言卿大夫之冕辨各以其等為之則士辨無玉飾康成讀玉璂為綦以綦為結是臆説也箋云騏當作􅋒以玉為之詳見衛風辨年爾雅云載歲也夏曰歲商曰祀周曰年唐虞曰載注歲取歲星一次祀取四時一終年取禾一熟載取物終更始下泉篇下泉釋水云沃泉縣出縣出下出也李巡云水泉從上溜下出孔氏云此言下泉謂泉下流是爾雅之沃泉也稂爾雅云稂童粱郭璞曰莠類也傳云稂非溉草得水而病説文曰禾粟之采生而不成者謂之蕫蓈蓈或從禾作稂陸璣云禾秀為穗而不成則薿然謂之蕫粱今人謂之宿田翁或謂之守田羅氏曰稂惡草也古以飼馬魯仲孫它馬餼不過稂莠謂此也詩稱不稂不莠孔氏正義云稂莠苗既似禾實亦類粟鋤禾除非類莠既别是一物稂亦當是一物許叔重陸璣以為禾之不成者則是亦禾而已何至與莠並稱乎按本草有狼尾草子作黍食之令人不飢似茅作穗生澤地廣志曰可作黍引爾雅孟狼尾今人呼為狼茅子然則此物似是稂爾稂既有實如黍故能亂苗又莠今謂之狗尾草稂名狼尾則亦相類按稂鄭破字作涼以為蕭蓍之屬今未見有草名涼者周京公羊傳云京師者何天子之居也京者何大也師者何衆也天子之居必以大衆言之白虎通云京師者千里之邑號也法日月之徑千里或曰夏曰夏邑殷曰商邑周曰京師公劉京師之野朱子曰京師高丘而衆居之也董氏曰所謂京師者始於此其後因以所都曰京師曰嬪于京依其在京則岐周之京也王配于京則鎬京也春秋所書京師則洛邑也蓍陸璣云似藾蕭青色科生本草云蓍實主益氣充肌膚明目聰慧先知久服不飢不老圖經云生少室山谷今蔡州上蔡縣白龜祠旁其生如蒿作叢高五六尺一本一二十莖至多者三五十莖生便條直異於衆蒿秋後有花出于枝端紅紫色形如菊易云蓍之德圓而神昔者聖人之作易也幽贊於神明而生蓍周官筮人上春相筮逸禮云天子之蓍九尺諸侯七尺大夫五尺士三尺蓍千歲三百莖者先知也洪範五行傳曰蓍之為言耆也百年一本生百莖此草木之壽知吉凶者也聖人以問鬼神焉史記云蓍所生獸無虎狼草無毒螫褚先生云聞蓍生百莖者其下必有神龜守之其上常有青雲覆之傳曰天下和平王道得而蓍莖長丈叢生滿百莖今世取蓍不能中古法度取滿六十莖已上長六尺者即可用矣論衡云蓍生七十歲生一莖七百歲生十莖神靈之物遲也説原云草植三百六十蓍為之長傅玄賦云春邁德于青陽混百卉而萌生逮朱夏而修茂暨商秋而堅貞雖離霜而未雕與潛龜乎通靈郇左傳郇文之昭也毛氏云郇伯郇侯鄭氏云文王之子為州伯水經注云涑水又西徑郇城春秋釋地曰解縣西北有郇城服虔云郇國在解縣東郇瑕氏之墟也余按竹書紀年秦穆公送重耳圍令狐桑泉臼衰至廬柳退次舍于郇桑泉臼衰並在解東南明不至解今解故城東北二十四里有故城在猗氏故城西北鄉俗名郇城考服説與俗符賢于杜單文孤證一統志山西平陽府猗氏縣古郇國文王子所封後為晉令狐地伯疏云牧下二伯鄭答張逸云一州一牧二伯佐之旄丘箋云周之制使伯佐牧六家詩名物疏卷二十八
