body:
  text: 六家詩名物疏卷二十六明馮復京撰國風秦二蒹葭篇蒹詳見衛風菼釋草云蒹薕郭璞曰蒹似萑而細髙數尺江東呼為薕藡陸璣云蒹水草也堅實牛食之令牛肥彊青徐人謂之薕兖州遼東通語也說文云蒹萑之未秀者埤雅云薕髙數尺今人以為簾箔因此為名湄爾雅云水草交為湄釋名云湄眉也臨水如眉臨目也坻爾雅云小渚曰沚小沚曰坻釋名云小沚曰坻泜遲也能竭水使流遲也甫田箋云水中之髙地終南篇終南郡縣志終南山在京兆府萬年縣南五十里一名太一一名中南關中記云終南山亦名中南言在天中居都之南也禹貢云終南敦物至于鳥鼠左傳云中南九州之險也三秦記云太一在驪山西去長安二百里山之秀者也中有石室靈芝一名地胏可避洪水方輿記云東方朔謂終南天之大阻其中多金銀鐵玉石樟檀異類之物此百工取給萬物所仰足也栁子厚云終南西至于褒斜又西至于隴首以臨于戎東至于商顔又東至于大華以距于關實能作固以屏王室其物産之厚器用之出則璆琳琅玕夏書載焉紀堂條梅秦風咏焉詩緝云周都豐鎬面對終南故天保祝君斯干考室節南山刺師尹皆指此山也一統志終南山在陜西西安府府城南五十里一名南山東西連亘藍田咸寧長安盩厔鄠縣及鳯翔府扶風縣西抵大散關産玉石金銀銅鐵及合離草月青樹太一山在終南山南二十里連亘秀特上插雲霄按張衡西京賦云終南太一隆崛崔崒潘嶽西征賦云九嵕􅏭嶭太一巃嵸面終南而背雲陽跨平原而連嶓冢則終山太一信非一山矣然古人多以為一山故李善曰終南南山之總名太一一山之别名條爾雅云槄山檟孫炎曰詩云有條有梅條槄也郭璞曰今之山楸陸璣云槄今山楸也亦如下田楸耳皮葉白色亦白材理好宜為車板能濕又可為棺木宜陽共北山多有之梅爾雅云梅柟陸璣云梅樹皮葉似豫章豫章葉大如牛耳一頭尖赤心華赤黃子青不可食柟葉大可三四葉一叢木理細緻於豫樟子赤者材堅子白者材脆江南及新城上庸蜀皆多樟柟終南山與上庸新城通故亦有柟也按陸璣所釋梅自是柟木似豫章者豫章大樹所謂生七年而可知可以為棺舟者也陳文帝嘗出柟材造戰艦即此柟也若今之所謂梅乃古和羮之梅籩實之乾䕩郭璞云似杏實酢者此也若爾雅之梅柟乃陸云似豫章者景純不當以似杏實酢解之草木同名異種者甚多如山檟名條柚亦名條豈可以上文之條為柚耶朱傳于摽有梅既具釋此章不復云似合二梅為一矣錦衣狐裘玉藻云君衣狐白裘錦衣以裼之鄭氏云君衣狐白毛之裘則以素錦為衣覆之使可裼也袒而有衣曰裼必覆之者裘䙝也詩云衣錦綗衣然則錦衣復有上衣明矣天子狐白之上服皮辨服與凡裼衣象裘色也疏云天子視朝服皮辨服有狐白錦衣諸侯與天子之朝亦然凡在朝君臣同服諸侯朝天子受皮辨之裼歸來嚮國則亦錦衣狐裘以告廟則秦詩云君子至止錦衣狐裘是也又云士不衣狐白又云錦衣狐裘諸侯之服也注云非諸侯則不用錦衣為裼孔氏云諸侯在國視朔及受鄰國之聘其皮辨服皆服麑裘不服狐白諸侯在天子之朝廷服此服耳受天子之賜歸則服之以告廟於後不復服之按古人之裘最重狐白天下無粹白之狐而有粹白之裘則狐白之難得可知矣昔紂以狐白免西伯田子方以狐白禮子思田文以狐白脫秦難其貴之如此故天子以為朝服諸侯以為賜服凡在朝君臣同服而惟卿大夫得衣之又别其裼衣天子諸侯以錦卿大夫以素蓋禮服之重者也陳氏祥道以為燕服其說亦是而戾於先儒今且依先儒之說丹說文云丹巴越之赤石也禹貢荆州貢丹本草圖經云丹砂今出辰州謂之辰砂牀砂生石上塊大者如雞子小者如石榴子狀若芙蓉頭箭鏃連牀者紫黯若鐵色而光明瑩徹韓詩作沰沰赭也音撻各反紀疏云紀謂山基也程子云紀稜角崔靈恩集注作屺曰終南之旁有屺山堂傳云堂畢道平如堂也爾雅云畢堂牆郭璞云今終南山道名畢其邊若堂室之牆一統志畢原在西安府咸陽縣北周文武成康葬于此原終南山之道名也朱傳云堂山之寬平處王伯厚云爾雅說文皆以山如堂者曰密謂形如堂室也此言終南形勢之壯黻衣考工記云黑與青謂之黻孔安國尚書傳云黻為兩已相背疏云鄭周禮注差次章色黻皆在裳言黻衣者衣大名與繡裳異其文耳禮書云黻色青黑天下之理歸于所斷成于所辨故服章以黻終焉黃鳥篇子車服䖍左傳注云子車秦大夫氏也括地志秦穆公冡在岐州雍縣東南二里三良冡在雍縣一里故城內夫禮記云夫也者以知帥人者也注云夫之言丈夫也晨風篇晨風爾雅云晨風鸇郭云鷂屬陸疏云鸇似鷂青黃色燕頷勾喙嚮風搖翅乃因風飛急疾擊鳩鴿燕雀食之禽經云􅱞曰鸇注晨風也狀類雞青色埤雅云鸇去來有時列子云鷂之為鸇鸇之為布穀布穀久復為鷂也櫟詳見唐風栩通志云櫟曰橡其實作梂曰皂斗曰橡斗爾雅釋木云櫟其實梂詩秦風云山有苞櫟並此也其釋木云栩杼與唐風云集于苞栩並是柞木而陸璣誤謂是此耳駮傳云駮如馬倨牙食虎豹爾雅疏云駮亦野馬名山海經云中曲之山有獸焉其狀如馬而白身黑尾一角虎牙爪音如鼓音其名曰駮是食虎豹可以禦兵雅翼云周書王㑹正北方義渠以茲白即此物也陸璣疏云駮馬梓榆也其樹皮青白駮犖遙視似駮馬故謂之駮馬下章云山有苞棣隰有樹檖皆山隰之木相配不宜云獸古今注云六駮山中有木葉似豫章皮多癬駮按中曲山之駮最是猛獸此詩又以六字足句王肅云據所見而言恐詩人見六駮必駭而走矣何暇韻之為詩乎爾雅云駵白駁若直以為馬之名駁者亦自可通要之陸璣之說為長但陸云樹名駮馬六字仍無可解必是隰中有六樹耳崔正熊正以六駮為名儻亦有據乎棣詳見召南唐棣傳云棣唐棣也檖釋木云檖羅陸璣云檖一名赤蘿一名山梨今人謂之楊檖實如梨但小耳一名鹿梨一名鼠梨今人亦種之極有肥美者亦如梨之美埤雅云其文細密如羅故曰羅又有白者赤羅文棘白羅文緩雖皆文木赤羅為上梁寅云子小酢可食無衣篇袍釋名云袍丈夫著下至跗者也袍苞也苞內衣也玉藻云纊為繭緼為袍注云衣有著之異名也纊謂今之新綿也緼謂今纊及舊絮也疏好者為綿惡者為絮師周易師卦彖云師衆也周禮小司徒㑹萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦凡起徒役毋過家一人司馬序官云凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長大司馬凡令賦以地與民制之上地食者參之一其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人鄭志云春秋之兵雖纍萬之衆皆稱師詩之六師謂六軍之師鄭周易注云多以軍為名次以師為名少以旅為名師者舉衆之言周書云五五二十五曰元卒一卒居前曰開一卒居後曰敦左右一卒曰閭四卒成衛曰伯三伯一長曰佐三佐一長曰右三右一長曰正三正一長曰卿三卿一長曰辟注此謂諸侯三軍數起於伍戈說文平頭㦸也釋名云戈勾孑㦸也戈過也所刺搗則決過所鈎引則制之弗得過也周禮司戈盾掌戈盾之物而頒之考工記四分其金而錫居一謂之戈㦸之齊戈柲柄也六尺有六寸冶氏為戈廣二寸內倍之胡內接柲者胡三之戈之孑也援四之援直刃已倨則不入己句則不決長內則折前短內則不疾是故倨句外博廣其本重三鋝一斤四兩廬人為廬器勾兵欲無彈戈㦸屬彈掉也是故勾兵椑側方去楞􅌛兵同強舉圍欲細細則校疾也曲禮疏云戈鈎孑㦸也如㦸而橫安刃但頭不向上為鈎也直刃長八寸橫刃長四寸接柄處長四寸並廣二寸禮書云五兵之便於用者戈而已其柲短而易持其胡援廣而易入可以摏可以斬可以擊可以鈎然戈勾兵也或謂之雞鳴或謂之擁頸皆指其胡名之也澤說文作襗襗袴也箋云襗䙝衣近汚垢釋名云汗衣近身受汗垢之衣也詩謂之澤受汗澤也或曰鄙袒或曰羞袒作之用六尺裁足覆胸背言羞鄙於袒而用此耳㦸釋名云㦸格也旁有枝格也說文云㦸有枝兵也長丈六尺方言云㦸楚謂之孑凡㦸而無刃秦晉之間謂之或謂之鏔吳揚之間謂之戈東齊秦晉之間謂其大者曰鏝胡其曲者謂之鈎鏝胡三刃枝南楚宛郢謂之匽㦸其柄自關而西謂之柲或謂之殳廣雅匽謂之雄㦸考工記云車㦸常崇於殳四尺冶氏為㦸廣寸有半寸內三之胡四之援五之倨勾中矩與刺重三鋝又云桃氏為刃四分其金而錫居一謂之戈㦸之齊禮書云㦸或作棘有三鋒刺則鋒之直前者也胡則正方中短而下垂者也援則磬折而上達者也楚武王荆尸援師孑先儒謂之㦸書一人執戣一人執瞿先儒以為㦸屬則㦸之異名多矣漢書眺錯上言曰兩陳相近平地淺草可前可後此長㦸之地也劍楯三不當一渭陽篇舅爾雅云母之昆弟為舅孫炎曰舅之言舊尊長之稱氏詳見周南姓朱子云姓是大總腦處氏是後來次第分别處如魯本姬姓其後有孟氏季氏同為姬姓而氏不同也渭陽箋云秦是時都雍至渭陽者蓋東行送舅氏於咸陽之地孔氏云雍在渭南水北曰陽晉在秦東行必渡渭地里志右扶風渭城縣故咸陽也其地在渭水之北水經渭水徑長安城北注即咸陽也按雍今陜西鳯翔府鳯翔縣地咸陽漢為渭城縣今為咸陽縣屬西安府渭水南去縣三里路車白虎通云天子大路路大也道也王也君至尊制度大所以行道德之政也諸侯路車大夫軒車士飾車釋名云輅亦車也謂之輅者言行於道路也尚書大輅在賔階面綴輅在阼階面先輅在左孰之前次輅在右孰之前孔安國曰大輅玉綴輅金先輅象次輅木周禮巾車王之五路一曰玉輅錫樊纓十有再就建太常十有二斿以祀金路鈎樊纓九就建大旗以賔同姓以封象路朱樊纓七就建大赤以朝異姓以封革路龍勒條讀為絛纓五就建大白以即戎以封四衛木路前讀為翦樊鵠纓建大麾以田以封蕃國鄭𤣥曰玉金象路以玉金象飾諸末革路鞔之以革而漆之無他飾木路不鞔以革漆之而已又典路掌王及后之五路辨其名物與其用說禮器云大路繁纓一就次路繁纓七就鄭氏曰大路殷祭天之車郊特牲云大路繁纓一就先路三就次路五就宋書禮志云秦閲三代之車獨取殷制古曰桑根車秦曰金根車也漢氏因秦之舊亦為乘輿所謂乘殷之輅者也禮書云玉路謂之大路獨周為然若夫商之大輅則木路而已諸侯之大路則金路也猶之熊侯謂之大侯春秋傳稱王賜晉文公以大路之服祝鮀言先王分魯衛晉以大路王賜鄭子僑以大路王賜叔孫豹以大路杜氏以賜魯衛晉之大路皆金路賜穆叔子僑之大路當是革木二路此不可考瑰說文云玫瑰似玉疏云瑰是美石之名權輿篇夏屋釋名云屋奧也其中溫奧也崔駰七依說宫室之美云夏屋渠渠揚子雲云震風淩雨然後知夏屋之帡幪也按夏屋毛無明訓鄭則以為大具以食我王肅述毛以為屋室之屋而朱子從之楊用修云大俎也其說出於元人隂幼達而楊又以禮周人房俎魯頌大房推而知之未為的據所謂大具以食者亦是平日之常食非公食大夫之禮食也公食大夫之禮似饗而盛于燕設黍稷六簋下章云每食四簋其非禮食可知矣簋包氏論語注云瑚璉黍稷之器夏曰瑚殷曰璉周曰簠簋周禮舍人凡祭祀供簠簋實之陳之賔客亦如之注曰方曰簠圓曰簋盛黍稷稻粱器掌客注云簠稻粱器也簋黍稷器也考工記云旊人為簋實一觳崇尺厚半寸脣寸豆實三而成觳凡陶旊之事髺不正墾蝢傷薛讀為柏破也暴墳起不入市釋文云內方外圓曰簋以盛黍稷外方內圓曰簠用貯稻粱皆容一斗二升三禮圖云簠受一升下足髙一寸中方外圓漆丹中蓋龜形諸侯飾以象天子玉飾盛黍稷簋受一升足髙一寸中圓外方銼其四角漆赤中蓋亦龜形其飾如簠盛稻粱易傳云建星之形似簋按簋之為器中方外圓髙一尺厚半寸受斗二升以瓦為之或用木其上有蓋蓋謂之㑹儀禮啓簋㑹是也下有足陳之有籍覆之有巾飾之以玉朱漆其中其蓋則象龜形記云管仲鏤簋而朱紘君子以為濫則大夫士之簋刻龜于蓋而已不得如人君全鏤之也考之于禮用簠則簋從用簋則簠或不與是簠尊而簋卑簠以盛稻粱簋以盛黍稷而毛公釋四簋云黍稷稻粱鄭𤣥解玉藻云朔月四簋則日食稻粱各一簋而已然則簋亦得盛稻粱矣以諸侯朔月少牢四簋推之則天子朔月太牢當六簋黍稷稻粱麥苽各一簋或者盛則陳八簋更加以稻粱此章四簋伐木八簋皆以天子諸侯朔月之盛食禮賢者及諸舅也易曰二簋應有時王弼云至約之道不可常也則二簋其至約者與然詩云每食四簋特每日之常食耳若禮食則其數更多公食下大夫黍稷六簋上大夫八簋其稻粱上下大夫俱兩簋聘禮饔餼上大夫堂上八簋東西夾各六簋是其數多也其諸侯則掌客云上公侯伯子男簋皆十有二其祭禮則祭統云八簋之實注云天子之祭八簋差而下之諸侯蓋六簋矣大夫士之祭則有敦無簋三禮圖說簠簋龜蓋漆中是也但似以簠為簋以簋為簠當由字誤賈公彥曰祭宗廟用木簋祭天地外神用瓦簋然少牢饋食有瓦豆安知祭廟無瓦簋乎六家詩名物疏卷二十六
