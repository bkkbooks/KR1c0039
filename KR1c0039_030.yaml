body:
  text: 六家詩名物疏卷二十七明馮復京撰國風陳宛丘篇宛丘傳云四方高中央下曰宛丘爾雅云宛中宛丘郭璞曰宛謂中央隆高又云丘上有丘曰宛丘陳有宛丘孔仲達云宛丘言其中央宛宛然是為四方高中央下也水經注宛丘在陳城南道東輿地廣記爾雅丘上有丘曰宛丘今其地形則然按毛釋宛丘以為中央下李巡孫炎爾雅釋同郭氏獨謂中央隆高者以爾雅上文云水潦所止泥丘水潦所止非中央下而何下文又云丘上有丘曰宛丘即是申說中央高之義孔氏豈能力辨丘上有丘亦為中央下乎輿地廣記云其地形符同爾雅蓋有所徵矣爾雅又云天下有名丘五其三在河南二在河北說者以為淮南之州黎陳之宛齊之營在河南晉之潛衛之敦在河北然則宛為名丘故幽公日游蕩于其上也鷺爾雅云鷺舂鋤郭璞曰白鷺也頭翅背上皆有長翰毛今江東人取以為睫攡名之曰白鷺縗陸璣云鷺水鳥也好露而潔白故謂之白鳥齊魯之間謂之舂鋤遼東樂浪吳揚人皆云白鷺大小如鷂青腳高尺七八寸尾如鷹尾喙長三寸頭上有長毛十數枚毿毿然與衆毛異好欲取魚時則弭之今吳人亦養焉好羣飛行楚威王時有朱鷺合沓飛翔而來舞則復有赤者然則鳥名白鷺赤者少耳禽經云鷺好露又云寀寮雍雍鴻儀鷺序陰陽自然變化論云鷺目成而受胎物類相感志云鷺人養之于池塘馴若家禽每至白露日即飛騰而去埤雅云鷺步于淺水好自低昂故曰舂鋤色雪白善蹙捕魚其翔集必舞而後下故詩以況二王之後曰我客戾止亦有斯容也缶爾雅云盎謂之缶疏云缶是瓦器可以節樂若今擊甌又可以盛水盛酒即今之瓦盆也易注云辨星似缶方言云缶謂之瓿㼴其小者謂之瓶按易云不鼓缶而歌則大耋之嗟知缶是樂器又云樽酒簋二用缶禮器五獻之尊門外缶知缶是酒器左傳宋災具綆缶知缶又是汲器然缶以節樂其來已久春秋外傳曰瓦絲尚宫呂不韋曰堯使質以麋􅛘冥缶而鼓之史記藺相如請秦王鼓缶莊子妻死鼓盆而歌楊惲言酒後耳熱仰天鼓缶淮南子曰窮鄉之社扣瓮拊瓶相和而歌自以為樂亦鼓缶之類也東門之枌篇東門傳云國之交㑹戴氏云陳詩多言東門必陳人遊息之地枌爾雅云榆白枌孫炎曰榆白者名枌郭璞曰枌榆先生葉郤著莢皮色白埤雅云枌先敷後葉著莢其葉初生蓋似兔目榆性扇地所扇各與木等故其隂下五穀不植而古人就以息焉陳詩東門之枌婆娑其下是也內則云枌以滑之子仲傳云陳大夫氏按此詩作於陳幽公時幽公在宣公前路史注云子仲氏陳宣公子即詩子仲之子者非也原傳云原大夫氏疏春秋季友如陳葬原仲是陳有大夫姓原氏也朱傳云㑹于南方之原爾雅曰大野曰平廣平曰原又云可食者曰原公羊傳曰上平曰原春秋說題辭云原端也平而有度也釋名云廣平曰原原元也元氣廣大也周禮原師辨原隰之名按毛公云高平曰原非也爾雅廣平曰原高平曰陸績說文績緝也漢書云冬民既入婦人同巷相從夜績必相從者所以省費燎火同巧拙而合習俗也閭師民不績者不衰市易云古者日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑周禮內宰凡建國佐后立市祭以隂禮司市掌市之治教政刑量度禁令以次序分地而經市次吏所治思次介次也若今市亭思次市師所涖介次胥師賈師所涖也以陳肆辨物而平市以政令禁物靡而均市以商賈阜貨而行布以量度成賈而徵儥以質劑結信而止訟以賈民禁僞而除詐以刑罰禁暴而去盜以泉府同貨而斂賖大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使微其屬有廛人胥師賈師司􅕝司稽胥肆長之官考工記云匠人營國面朝後市市朝一夫風俗通云市恃也言交易而退恃以不匱也古史考云神農作市高陽氏衰市官不修祝融修市白虎通云因井為市故曰市井古今注云闤市垣也闠市門也肆陳也店置也禮書云古之治市也君夫人世子命夫命婦不得過屬遊飲食者不得行鬭囂暴亂出入相凌犯者不得作圭璧金璋犧牲祭器戎器與不中度量不中殺伐之類不得粥然遺人五十里有市市有候館量人營軍之壘舍量其市朝州涂則道路之與軍師亦有市矣天文旗星中四星曰天市中星衆者實其中虛則耗此市之象也按市朝之市在國中者乃是商賈貿易之地雖幽公淫荒必無司􅕝屬游之禁然揆之理勢不宜聚㑹歌舞于其間也上文云南方之原其地必閒曠而可樂意者如遺人道路之市與古者八家同井家有私田百畝公田十畝餘二十畝為井竈廬舍即就廬舍以交易市井之名殆出於此而後世因謂國都之市亦為市井則此詩所謂市者或在野外田間未可知也東漢書注婦人于市中歌舞以祀神蓋以太姬好巫覡其民化之故有是說抑齊魯韓三家之義與鬷傳云鬷數王肅述毛云鬷數績麻之縷也西京雜記云倍緎為紀倍紀為緵荍爾雅云荍蚍衃郭云今荆葵也似葵紫色謝氏云小草多花少葉葉又翹起古今注云荊葵一名戎葵一名芘芣華似木槿而光色奪目有紅有紫有青有白有黃莖葉不殊但花色有異耳一曰蜀葵陸璣云芘芣一名荆葵似蕪菁華葉紫緑色可食微苦羅氏曰荆葵比戎葵葉小花似五銖錢大色粉紅有紫文縷之一名錦葵大抵似蘆蔔花故陸氏云似蕪菁花釋草菺戎葵郭氏曰今蜀葵又曰荍芘芣郭氏曰今荆葵其所來各不同本草云蜀葵中小花者名錦葵一名戎葵功用更強則以此雜之蜀葵中而反得戎葵之名矣崔豹古今注其說戎葵蜀葵之狀可也混荆葵芘芣之名于內者非也然今人亦通呼此為蜀錦葵則從其類比附之耳濮氏曰芘芣紫荊春時開花葉未生花紫色自根及幹而上連接甚密有類蟣窠故爾雅名蚍􅗶俗曰火蟣按古之說荍者以為錦葵今邑中多有而濮一之云紫荆别是一說非也衡門篇衡門疏云衡古文橫假借字也衡門橫木為門門之深者有阿孰堂宇此惟橫木為之言其淺也鯉養魚經云所以養鯉者鯉不相食易長又貴陶隱居云鯉魚最為魚之主形既可愛又能神變乃至飛越江湖本草圖經云鯉脊中鱗一道每鱗上皆有小黑點從頭數至尾無大小皆三十六鱗雅翼云鯉孟春之月應陽而動上負冰埤雅云鯉魚赤今人以盤水養之雖困鱗不反白蓋健魚也子史記云舜封契於商賜姓子氏禮緯曰祖以𤣥鳥生子也中候握河紀云堯曰嗟朕無德欽奉丕圖賜示二三子斯封稷契臯陶賜姓號注云賜姓號者契為子稷為姬臯陶未聞又契握湯說契云賜姓子氏以題朕躬東門之池篇東門池傳云池城池也孔安國曰停水曰池說文云隍城池也有水曰池無水曰隍家語云池水之大魚鱉生焉萑葦長焉誰知其非泉也郡縣志東門池在陳州城東門內道南水經注云陳城故陳國也東門內有池池水東西七十步南北八十許步水至清潔而不耗竭不生魚草水中有故臺處詩所謂東門之池也紵陸璣云紵亦麻也科生數十莖宿根在地中至春自生不再種也荆揚之間一歲三收今官園種之歲再刈刈便生剝之以鐵若竹挾之表厚皮自脫但得其裏韌如筋者謂之徽紵今南越紵布皆用此麻周禮典枲掌布緦縷紵之麻草之物菅爾雅云白華野菅郭璞曰菅茅屬白華箋云人刈白華于野已漚名之為菅陸疏云菅似茅而滑澤無毛根下五寸中有白粉者柔韌宜為索漚乃尤善矣范氏曰菅以為屨濮氏曰左傳云雖有絲麻無棄菅蒯蒯與菅皆謂苕也黃華者俗名黃芒即蒯也白華者俗名白芒即菅也周書曰成王時㑹人獻以菅山海經云天帝之山其下多菅異物志云香菅似茅而葉長大于茅不生汙下之地凡所蒸享必得此菅包裹助調五味東門之楊篇昏說文云昏日冥也從日氐省氐下也釋名昏損也陽精損滅也禮記疏云日入後二刻半為昏墓門篇墓互見唐風域春官墓大夫注云墓冢塋之地孝子所思慕之處棘詳見邶風詩緝云荆棘梟疏云梟惡聲之鳥一名鵩與梟一名鴟瞻卬云為梟為鴟是也俗說以為梟即土梟非也陸璣疏云梟大如班鳩緑色惡聲之鳥也入人家凶賈誼所賦鵩鳥是也其肉甚美可為羮臛又可為炙漢供御物各隨其時唯梟冬夏常施之以其美故也爾雅云梟鴟埤雅云梟鳴其民有禍證俗云禍鳥也肉可為炙故莊子曰見彈而求梟炙荊州記曰巫縣有鳥如雌雞其名為梟廣志曰梟楚鳩所生如驢巨虛種類不滋乳也漢書賈誼傳云服似梟嶺表録異云北方梟人家以為怪南中晝夜飛鳴與烏鵲無異桂林人羅取生鬻之家家養使捕鼠以為勝貍酉陽雜俎云相傳鶻生三子一為鴟不飲泉及井水惟遇雨濡翮方得水飲按爾雅梟鴟即此惡聲之梟也梟梟音相近故孔仲達云梟一名梟古書多稱梟鳴指此非土梟也土梟爾雅自謂之鶹鷅郭注梟鴟云土梟誤矣本草云梟目吞之令人夜中見物博物志云鵂鶹一名鵄鵂夜目至明今云吞梟目而夜中見物似說鴟鵂非梟矣鴟鵂即爾雅之怪鴟又云鵅鵋䳢者也本草又云賈誼云鵩似梟其實一物考之異物志有鳥如小雞體有文色土俗因形名之曰服不能逺飛行不出域周禮注云夭鳥惡鳴之鳥若梟鵩賈公彥曰梟之與鵩二鳥俱夜為惡鳴者是二鳥不可合為一也防有鵲巢篇防毛傳云防邑也郡國志陳郡陳縣注博物記曰卭地在縣北防亭在焉朱傳云防人所築以捍水者說文云隄也周禮稻人以瀦畜水以防止水匠人為溝洫凡溝必因水勢防必因地勢善溝者水潄之善防者水淫之凡為防廣與崇方其閷二分去一大防外閷凡溝防必一日先深之以為式里讀作已為式然後可以傅衆力禮記云以舊防為無所用而壞之者必有水敗郊特牲祭防注云坊以畜水亦以鄣水左傳蒍掩町原防苕陸璣云苕苕饒也幽州人謂之翹饒夏生莖如勞豆而細葉似蒺藜而青其莖葉緑色可生食如小豆藿也詩緝云此旨苕苕饒也非小雅苕之華所謂陵苕也中唐爾雅云廟中路謂之唐堂塗謂之陳毛傳云中中庭也唐堂塗也詩緝云毛以中為中庭唐為堂塗不必分也中唐猶言唐中耳甓爾雅云瓴甋謂之甓注㼾甎也今江東呼為瓴甓鷊爾雅云虉綬郭璞曰小草有雜色似綬也陸璣云鷊五色作綬文故曰綬草劉公瑾云鷊本鳥名亦名綬鳥咽下有囊如小綬具五色鷊草之名豈因其似鷊鳥而取義乎株林篇株林傳云株林夏氏邑也寰宇記陳州南頓縣西南三十里有夏亭城城北五里有株林郡縣志宋州柘城縣本陳之株邑一統志開封府睢州柘城縣在州城東南九十里古朱襄氏邑春秋時為陳株野地夏楚語云昔陳公子夏為御叔娶于鄭穆公女生子南子南之母亂陳而亡之疏云徵舒祖字子夏故以夏為氏澤陂篇澤釋名云下有水曰澤言潤澤也風俗通云傳曰水草交厝名之曰澤言其潤澤萬物以阜民用周禮云川澤其動物宜鱗物其植物宜膏物其民黑而津澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之于王府頒其餘於萬民凡祭祀賓客共澤物之奠月令孟冬命有司收水澤之賦周語云古之長民者不防川不竇澤川氣之導也澤水之鍾也陂傳云陂澤障說文云阪也一曰池也尚書禹貢九澤既陂孔注九州之澤已陂障無決溢矣菡萏爾雅荷其花菡萏說文芙蓉花未發為菡􅣿已發為芙蓉埤雅云秀曰菡萏暢茂曰華字說云菡萏實若臽隨昏昕開闔儼韓詩作㜝薛君曰重頥也傳云矜莊貌六家詩名物疏卷二十七
