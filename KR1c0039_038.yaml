body:
  text: 六家詩名物疏卷三十五明馮復京撰小雅南有嘉魚之什二采芑篇芑陸疏云芑菜似苦菜莖青白色摘其棄白汁出肥可生食亦可蒸為茹西河雁門芑尤美胡人戀之不出塞是也朱傳云即今苦蕒菜宜馬食軍行采之人馬皆可食也本草云野苦蕒五六回拗後味甘滑于家苦蕒新田爾雅云二歲曰新田孫炎曰新田新成柔田也災爾雅云田一歲曰災孫炎曰災始災殺其草木也郭璞曰今江東呼初耕地反草為災孔仲達云災是殺草之名雖二歲之後耕而殺草亦名為災鉤膺朱傳云鉤膺馬婁頷有鉤而在膺有樊有膺也樊馬大帶纓鞅也疏云此鉤是金路或方叔為同姓或五官之長得乘金路矣不乘革路者以革路臨戰所乘此時受命率車未至戰時故不言戎車也周禮巾車玉路錫樊纓十有再就金路鉤樊纓九就象路朱樊纓七就革路龍勒條纓五就木路前樊鵠纓注云樊讀如鞶帶之鞶謂今馬大帶也鄭司農云纓謂當胸以削革為之玄謂纓今馬鞅玉路之樊及纓皆以五采罽飾之十二就就成也鉤婁頷之鉤也金路無錫有鉤亦以金為之其樊及纓以五采罽飾之而九成象路無鉤以朱飾勒而已其樊及纓以五采罽飾之而七成革路以白黑韋雜色為勒條讀為絛其樊及纓以絛絲飾之而五成木路無龍勒以淺黑飾韋為樊鵠色飾為纓前讀為翦淺黑色也就數與革路同大行人云上公樊纓九就侯伯七就子男五就既夕云薦馬纓三就注諸侯之臣飾纓以三色而三成此三色者蓋絛絲也禮記云大路樊纓一就次路樊纓七就注大路殷祭天之車也又云大路樊纓一就先路三就次路五就左傳鞶厲遊纓昭其數也注纓在馬胸前如索裙釋言云氂罽也舍人曰氂毛也罽胡人續羊毛而作禮書云鉤在膺前以金為之杜預曰纓在馬膺前如索裙則纓非鞅也樊然為鞅之飾耳巾車言五者之飾皆其首面頷膺之著者也故不及腹帶鄭康成以樊為鞶帶之鞶又以龍為尨條為絛前為剪非也纓蓋用組為之與冠纓同五采一匝為就與圭繅冕旒之就同中鄉鄭氏云中鄉美地名軧詳見秦風轂説文曰軧長轂也考工記云容轂必直陳篆必正注云容者治轂為之形容也篆轂約也蓋以皮纒之而上加以朱漆也詩詁云軧轂之旁出者也衡釋名云衡橫也橫馬頸上也考工記輿人為車輪崇車廣衡長參如一謂之參稱輈人為輈衡任者五分其長以其一為之圍注云衡任謂兩軛之間也烈祖箋云金飾錯衡之車禮書云衡長六尺六寸衡任之圍一尺三寸五分寸之一而其長與輪崇車廣等衡圍與軸圍等矣説文謂轅專持衡曰軓軛下曲曰軥軛軥曰䡣左傳稱庾公差追衛獻公射兩軥而還則軓在轅端衡在軛上軛軥䡣在衡下而軛與軥䡣一物也衡上有采以為飾詩曰錯衡是也軛上有環以貫轡爾雅曰載轡謂之轙是也命服箋云命服者命為將受王命之服也天子之服韋辨服朱衣裳疏云經云朱芾芾從裳色故知裳亦朱不用戎服素裳者以其命將非在軍不可純如之也亦變為美故雜祭服之飾蔥珩朱傳云珩佩首橫玉也玉藻云一命緼韍幽衡再命赤韍幽衡三命赤韍蔥珩注云衡佩玉之衡也幽讀為黝黑謂之黝青謂之蔥周禮公侯伯之卿三命其大夫再命其士一命子男之卿再命其大夫一命其士不命孔氏曰玉藻纍一命至三命而止而云蔥珩則三命而上至九命皆蔥珩也雅翼云蔥本白而末青青色尤美古者佩玉有蔥珩以玉色如蔥色得名隼爾雅云鷹隼醜其飛也翬郭云鼓翅翬翬然疾陸璣云隼鷂屬也齊人謂之擊征或謂題肩或謂雀鷹春化為布榖者是也考異郵云隂陽氣貪故題肩擊宋均云題肩有爪芒為隂中陽故擊殺也禽經云鳥之小而鷙者皆曰隼大而鷙者皆曰鳩又云鷹好峙隼好翔鷹以膺之鶻以搰之隼以尹之法言云麟之儀儀鳳之師師其至矣乎螭虎桓桓鷹隼䎒䎒未至也化書云烏反哺仁也隼憫胎義也韋昭云隼今之鶚李善云鷙擊之鳥通呼曰隼陸佃云準于文從水從隼今鷹之摶噬不能無失獨隼為有準每發必中或曰即今所呼為鶻者是雅翼云古今言隼未有的指其物者獨説文解隼云祝鳩也思允切又去鳥從十作隼則隼與隼通凡詩之翩翩者隼皆隼也又解淮南子烏力勝日而服于隼禮引爾雅謂之鵧鷑蠶時鳴人呵舍者鴻鳥皆畏之據許所説則今鴉䳔鴉䳔小于烏而逐烏郭氏解鵧鷑亦云小黑鳥鳴自呼江東名為烏䳔解詩隼者類引釋鳥隹其鳺鴀故遂以為祝鳩按隹字音錐此既從鳥自與隼通事不相與獨鷑鳩鵧鷑者是矣鉦説文云鉦鐃也鐃小鉦也似鈴柄中上下通鐲鉦也孔氏云鐲鐃俱得名鉦但鐲以節鼓非靜之義故知鉦以靜之指謂鐃也凡軍進退皆鼓動鉦止非臨陳獨然依文在陳師鞠旅之上是未戰時事周禮鼓人以金鐲節鼓以金鐃止鼓注云鐲鉦也形如小鐘軍行鳴之以為鼓節鐃如鈴無舌有秉執而鳴之以止擊鼓大司馬職云中春教振旅辨鼓鐸鐲鐃之用卒長執鐃公司馬執鐲以教坐作進退疾徐疏數之節中冬教大閲車徒皆作鼓行鳴鐲行及表乃止又三鼓車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初乃鼓車馳徒走及表乃止鼓戒三闋車三發徒三刺乃鼓退鳴鐃且卻及表乃止坐作如初樂記曰今夫古樂始奏以文復亂以武疏云武謂金鐃樂書云國語曰鼓丁寧韋昭曰丁寧鉦也蓋自其聲濁言之謂之鐲自其警人言之謂之丁寧自其正人言之謂之鉦周禮卒長執鐃以其聲譊譊然故以鐃名漢鼓吹曲有鐃歌所以退武舞也豈亦周之遺制與旅周禮云五百人為旅旅帥皆下大夫振旅爾雅云出為治兵尚威武也入為振旅反尊卑也孫炎曰出則幼賤在前貴勇力也入則尊老在前復常法也左傳云三年而治兵入而振旅穀梁傳云出曰治兵習戰也入曰振旅習戰也公羊傳云出曰祠兵入曰振旅其禮一也皆習戰也周禮中春教振旅蠻尚書三百里蠻注云以文德蠻來之不制以法風俗通云君臣同川而浴極為簡慢蠻者慢也爾雅六蠻李巡曰一曰天竺二曰咳首三曰焦僥四曰跂踵五曰穿胸六曰儋耳七曰狗軹八曰旁脊王制曰南方曰蠻雕題漆齒有不火食者矣周禮職方氏掌八蠻之人明堂位八蠻之國後漢傳平王東遷蠻侵暴中國頴首以西有蠻氏之戎留青日札云南方之人曰蠻從蟲䜌聲蛇種也荆元命包云軫星散為荊州分為楚國荆之言強也陽盛物堅其氣急悍也尚書禹貢云荆及衡陽惟荆州孔氏云北據荆山南及衡山之陽爾雅漢南曰荆州釋名云荆州取名于荆山也荆警也南蠻數為冦逆其民有道後服無道先強警備之也國語史伯曰當成周者南有荆蠻荊子熊嚴生子四人叔逃難于濮而蠻蠻芈蠻矣惟荊實有令德晉語叔向云昔成王盟諸侯于岐陽楚為荊蠻置茅蕝設望表與鮮牟守燎故不與盟穀梁傳云荆者楚也何為謂之荊狄之也何為狄之聖人立必後至天子弱必先叛故曰荆狄之也史記楚世家熊霜元年周宣王初立又曰荆楚僄勇輕悍好作亂乃自古記之矣元老禮記云五官之長出于諸侯曰天子之老霆爾雅疾雷為霆霓注雷之急擊者謂霹靂説文云霆雷餘聲也鈴鈴所以挺出萬物震劈歷振物者春秋傳曰震夷伯之廟五經通義云震與霆皆霹靂也春秋繁露云王言下不從則金不從革而秋多霹靂霹靂者金氣其音商故應霹靂莊子云陰陽錯行則天地大絯於是乎有雷有霆征伐孟子曰征者上伐下也敵國不相征也又云征者正也各欲正己也周禮大司馬以九伐之法正邦國馮弱犯寡則眚之賊賢害民則伐之暴內凌外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弒其君則殘之犯令凌政則杜之外內亂鳥獸行則滅之春秋左傳云有鐘鼓曰伐無曰侵公羊傳云粗者曰侵精者曰伐穀梁傳云苞人民驅牛馬曰侵斬樹木壞宫室曰伐車攻篇東互見國風王傳云東洛邑也周書度邑解武王曰我南望過于三塗我北望過于有嶽丕願瞻過于河宛瞻于伊洛無逺天室其曰茲曰度邑作雒解云周公將致政乃作大邑成周于土中城方千七百二十丈郛方十七里南繫于洛水北因于郟山以為天下之大湊制郊甸方六百里國西土為方千里史記婁敬云成王即位而營成周洛邑以此為天下之中也有德則易以王無德則易以亡通鑑外紀云成王使召公先相宅周公至洛師復卜申視營築謂之王城是為東都東京賦云召伯相宅卜惟洛食周公初基其繩則直泝洛背河左伊右瀍西阻九河東門於旋太室作鎮揭以熊耳底柱輟流鐔以大岯陸機洛陽記云洛陽城周公所制東西十里南北十三里城上百步有一樓櫓外有溝渠一統志河南河南府禹貢豫州之域武王定鼎郟鄏成王營洛為王城下都平王東遷乃居王城洛陽縣附郭本成周地居洛水之北故曰洛陽洛陽故城在府城東洛水北周公所營成周也田車季彭山云田車在周禮巾車謂之木路不鞔以革而但漆之蓋朴素渾堅之制也輿廣六尺六寸與兵車乘車同惟輪則田車小兵車乘車三寸説者以兵車乘車皆駕國馬而田車駕田馬故也然既差馬而齊之故四牡孔阜皆良馬也特以田車欲便于搏獸故其輪稍低所謂田馬雖不及龍馬之八尺蓋亦七尺之騋矣甫草鄭箋云甫田之草也爾雅十藪鄭有圃田郭云今滎陽中牟縣西圃田澤是也職方云河南曰豫州其澤藪曰圃田穆天子傳天子里甫田之路東至于房左傳皇武子曰鄭之有原圃猶秦之有具囿竹書紀年梁惠成王十年入河水于甫田又為大溝而引甫水水經注云渠水歷中牟縣之圃田澤澤多麻黃草故述征記曰踐縣徑便覩斯卉窮則知踰界詩所謂東有圃草也西限長城東極官渡北佩渠水東西四十許里南北二百許里中有沙岡上下二十四浦津津流徑通淵潭相接水盛則北注渠溢則南播為鄭隰之淵藪矣一統志圃田澤在河南開封府中牟縣西北七里其澤東西五十里南北二十六里西限長城東極官渡高者可耕窪者成滙今為澤者八若東澤西澤之類為陂者三十有六若大灰小灰之類其實一圃田澤耳苗傳云夏獵曰苗爾雅夏獵為苗郭璞曰為苗稼除害周禮中夏教茇舍如振旅之陳辨號名之用遂以苗田注云夏田為苗擇取不孕任者若治苗去不秀實者公羊傳云春曰苗獸説文云獸守備者也國語云獸三為羣爾雅云四足而毛謂之獸周禮庖人掌共六獸鄭司農云麋鹿熊麕野豕兔玄謂六獸當有狼而熊不屬又獸人掌罟田獸獸醫掌療獸病療獸痬服不氏掌養猛獸而教擾之穴氏掌攻蟄獸囿人掌囿遊之獸禁淮南子曰毛犢生應龍應龍生建馬建馬生麒麟麒麟生庶獸凡毛者生于庶獸敖箋云敖鄭地今近滎陽郡縣志敖山在鄭州滎澤縣西十五里水經濟水東徑敖山北注云詩薄獸于敖山上有城殷仲丁所遷秦置倉于其中亦曰敖倉城吕東萊云晉師救鄭在敖鄗之間設七覆於敖前則敖山之下平曠可以屯兵翳薈可以設伏東有甫草即此地郡國志河南滎陽有敖亭周宣王狩于敖一統志敖山在河南開封府鄭州河隂縣西北二十里金舄箋云金舄黃朱色也疏即禮之赤舄也加金為飾故謂金舄會互見沔水儀禮云諸侯覲于天子為宫方三百步四門壇十有二尋深四尺加方明于其上注此謂時會殷同也為宫者於國外王巡狩至方嶽諸侯會之亦為此宫以見之又云公侯伯子男皆就其旗而立四傳擯天子出拜日于東門之外反視方明禮日于南門外禮月與四瀆于北門外禮山川丘陵于西門外祭天燔柴祭山丘陵升祭川沈祭地瘞周禮大宗伯以賔禮親邦國時見曰會注云時見者言無常期諸侯有不順服者王將有征討之事則既朝覲王為壇於國外合諸侯而命事焉春秋傳曰有事而會不協而盟是也大司馬大會同帥士庶子而掌其政令小司馬凡小會同掌其事大行人時會以發四方之禁注云禁謂九伐之法司儀將合諸侯則令為壇三成宫旁一門詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓少儀云會同主詡晉叔向云明王之制歲聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明同周禮大宗伯云殷見曰同注殷猶衆也十二歲王如不巡狩則六服盡朝朝禮既畢王亦為壇合諸侯以命政焉所命之政如王巡狩殷見四方四時分來終歲則遍大行人云殷同以施天下之政注政謂邦國之九法按毛傳時見曰會殷見曰同此釋文則然耳其實宣王會諸侯於東都非必有征討又非十二年之事意者會諸侯之時亦曾為壇于國外如覲禮所云與然會者交會同者同聚則諸侯見天子或並得稱之乎拾三禮圖云者臂捍以朱韋為之謂之者所以遂弦也周禮繕人掌王之用決拾注拾謂韝扞也著左臂裏以韋為之禮書云拾亦謂之遂儀禮所謂袒決遂是也亦謂之捍內則所謂佩決捍是也鄉射記大夫與士射袒纁襦燕禮記君射袒朱襦蓋大夫與士射士則以拾蔽膚大夫斂衣而已君與大夫射大夫以拾蔽膚君斂衣而已鄭氏謂拾所以蔽膚斂衣者此也曲禮曰野外軍中無摯以纓拾矢可也則拾亦可以為摯與射夫孔氏云大射禮選羣臣為三耦若大夫不足以士充之三耦之外其餘衆士與射者各自取匹謂之衆耦射人説賔射之禮云王以六耦則天子大射亦六耦也故夏官大司馬職云若大射則合諸侯之六耦此其義也射人云諸侯四耦大射惟三耦者賔射對鄰國之君尊故四耦大射與已之臣子卑故降之天子尊無與敵無所差降大射賔射六耦之外亦當有衆耦徒爾雅云徒御不驚輦者也傳云徒輦也周禮鄉師云大軍旅會同治其輦注云輦人挽行所以載任器也止以為蕃營族師以時校登族之車輦縣師辨車輦之稽遂人遂師掌以時登其車輦稍人若有會同師田行役之事則以縣師之法作其輂輦司馬法曰夏后氏謂輦曰余車殷曰胡奴車周曰輜輦輦一斧一斤一鑿一梩周輦加二板二築夏后氏二十人而輦殷十八人而輦周十五人而輦庖周禮庖人掌共六畜六獸六禽辨其名物凡其死生鮮薧之物以共王之膳與其薦羞之物及后世子之膳羞共祭祀之好羞共喪紀之庶羞賔客之禽獻鄭玄云庖之言苞也裏肉曰苞苴禮記曰君子逺庖厨凡有血氣之物弗身踐也又曰獵之禮一為乾豆二為賔客三為充君之庖帝王世紀云太昊取犧牲以共庖厨吉日篇戊爾雅云太歲在戊曰著雍説文云戊中宫也象六甲五龍相拘絞也戊承丁象人脅釋名云戊茂也物皆茂盛漢書云豐茂于戊蔡雍云大撓探五行之情占斗綱所建於是始作甲乙以名日謂之幹作子丑以名日謂之支支幹相配以成六旬箋云戊剛日也伯夏官校人云春祭馬祖夏祭先牧秋祭馬社冬祭馬步注云馬祖天駟先牧始養馬者馬社始乘馬者馬步神為災害馬者爾雅云天駟房也孫炎曰龍為天馬故房四星謂之天駟孝經説云房為龍馬國語云農祥晨正土乃脈發韋氏曰農祥房星也晉書云房四星為明堂天子布政之宫也亦四輔也下第一星上將也次次將也次次相也上星上相也南二星君位北二星夫人位亦曰天駟為天馬主車駕南星曰左驂次左服次右服次右驂亦曰天廄又主開閉為蓄藏之所由也房星明則王者明驂星大則兵起星離民流禱説文云禱告事求福也禱禱牲馬祭也詩曰既禡既禱爾雅曰既伯既禱馬祭也注伯祭馬祖也將用馬力必先祭其先疏夏官馭夫春祭馬祖馬祖祭之在春其常也而將用馬力則又用彼禮以禱之周禮庾人祭馬祖祭間之先牧甸祝禱牲禱馬皆掌其祝號杜子春云禱禱也為馬禱無疾為田禱多獲禽牲庚爾雅云太歲在庚曰上章史記云庚者言隂氣庚萬物故曰庚漢書曰斂更于庚説文云位西方象秋時萬物庚庚有實也庚承已象人齎釋名云庚猶庚也堅強貌孔氏云曲禮外事以剛日擇馬亦用庚為剛日也午爾雅云太歲在午曰敦牂史記云午者陰陽交故曰午漢書曰咢布于午説文云午牾也五月隂氣午逆陽冒地而出孔氏曰擇馬用午日蓋於辰午為馬故也漢書翼奉云南方之情惡惡行廉貞寅午主之西方之情喜喜行寬大己酉主之二陽並行是以王者吉午酉也詩曰吉日庚午麀釋獸云鹿牡麚牝麀麌箋云麕牡曰麌爾雅云麕牡麌牝麜漆沮禹貢雍州漆沮既從導渭自鳥鼠同穴東會于灃又東會于涇又東過漆沮入于河孔安國曰漆沮二水名亦曰洛顔師古曰漆沮即馮翊之洛水也蔡傳云漆水寰宇記自耀州同官縣東北界來經華原縣合沮水沮水地志出北地郡直路縣東今坊州宜君縣西北境也寰宇記沮水自坊州升平縣北子午嶺出俗號子午水下合榆谷慈馬等川遂為沮水至耀州華原縣合漆水至同州朝邑縣東南入渭水經漆水出扶風杜陽縣俞山東北入于渭沮水出北地直路縣東過馮翊祋祤縣北東入于洛水經注鄭渠在太上皇陵東南濁水注焉俗謂之漆水又謂之柒沮其一水東出即沮水也故濁水得柒沮之名東北流注于洛水按漆沮二水名其源又各别故説者紛紛據孔安國顔師古之説漆沮即洛水也朱子亦云漆沮在西都畿內涇渭之北所謂洛水今洛水出陜西慶陽府環縣經延安府甘泉縣鄜州宜君縣子午嶺至中部縣入西安府界經耀州及同官縣至富平縣合沮水歷蒲城同州至朝邑縣東南入渭乃周官所云雍州其浸渭洛非伊洛之洛也寰宇記謂漆自同官來指此竊意漆水即洛水也與扶風杜陽之漆不同一統志不考乃云同官之漆出自鳳翔不知彼漆為涇汭所間豈能飛渡涇汭而來同官邪沮水出自延安府宜君縣至子午嶺合子午水歷中部縣東南流入西安府界至富平縣合漆水即洛也孔氏注禹貢漆沮亦曰洛水是也但不當以沮并為洛耳此馮翊之漆沮也即此漆沮之從天子之所與潛猗與漆沮是也蓋漆沮之會于同州者去鎬京三百餘里爾雅周之藪曰焦穫焦穫近於漆沮其山多獸其水多魚取魚狩獵之地當必此也書稱渭水東過漆沮亦是此漆沮若出扶風漆縣者則在灃之上流與經之次序不合矣其水經注所云濁水謂之漆沮者當在今臨潼縣界未知今之土俗亦名為漆沮否然濁水一小水注鄭渠者耳非詩人所咏也一漆水出鳳翔府麟遊縣西普潤廢縣故漢漆縣也流經岐山北大欒水自西北注之南與杜水合齊詩所謂自杜沮漆者也其沮之所在孔仲達云未聞此扶風之漆沮也綿詩云自土沮漆指此何者不窋徙居戎翟之間在今慶陽府公劉遷豳在今邠州淳化縣西廢三泉縣界當涇水之西其道甚便而沮在涇之東漆又在沮之東俱隔大山公劉初遷必不至馮翊之漆沮也及大王自豳遷岐踰梁山始至岐山北漆沮合流之處梁山在今西安府乾州城西北五里當豳之西南孔仲達綿詩疏云漆沮在豳地二水東流亦過周非也若漆沮在豳則公劉于豳斯館已有宫室大王何為陶復陶穴哉但以大王初至扶風之地故陶復陶穴云耳又一沮水出鞏昌府階州角弩谷東南入渭此别一水也寰宇記云合榆谷水榆谷在臨洮去渭源近正謂此沮水若延安沮水何由西行數百里至臨洮既至臨洮又何由至西安之耀州耶祁箋云祁當作麎爾雅云麋牡麔牝麎其子䴠其迹纒絶有力狄疏云麋總名也詩吉日云其麎孔有説文云麋鹿屬也冬至解角運斗樞云瑶光星散為麋獸人云夏獻麋醢人朝事之豆昌本麋臡菁菹麋臡左傳莊十七年多麋注云麋多則害五稼月令仲冬麋角解熊氏云鹿是山獸夏至得隂氣而解角麋是澤獸故冬至得陽氣而解角賈公彥云麋為隂獸情淫而遊澤冬至隂方退故解角從隂退之象鹿是陽獸情淫而遊山夏至得隂而解角從陽退之象若節氣早則麋角十一月解故夏小正云十一月麋角隕墜若節氣晚則十二月麋角解故小正云十二月隕麋角莊子云麋與鹿交又曰麋鹿食薦陶隱居云麋千百為羣多牝少牡人言一牡輒交十餘牝交畢即死其脂墮土中經年人得之方好名曰遁脂埤雅云白虎通曰熊為獸巧猛麋為獸迷惑故天子射熊諸侯射麋麋水獸也青黑色肉蹄一牡能乘十牝角自生至堅無兩月之久大者乃重二十餘斤其堅如石計一夜須生數兩此骨血之至強者客周禮大宗伯以饗燕之禮親四方之賔客大行人掌大賔之禮及大客之儀注云大賔要服以內諸侯大客謂其孤卿小行人大客則擯小客則受其幣而聽其辭疏云大客為要服以內諸侯之使臣小客謂蕃國諸侯之使臣孔疏云天子所賔客惟諸侯耳對文君為大賔臣為大客散則賔亦客也醴周禮酒正辨五齊之名二曰醴齊注云醴猶體也成而汁滓相將如今甜酒矣明堂位云殷尚醴韓詩説云醴甜而不泲也説文云酒一宿熟也孔疏云醴不可專飲天子於羣臣不徒設醴而已此言酌醴者左傳天子饗諸侯每言饗醴命之宥是饗醴者天子飲酒之敬故舉醴言之也六家詩名物疏卷三十五
