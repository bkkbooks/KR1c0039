body:
  text: 六家詩名物疏卷十九明馮復京撰國風王二君子陽陽篇簧傳云簧笙也説文云簧笙中之簧也笙十三簧象鳳之身正月之音物生故謂之笙釋名云笙生也象物貫地而生竹之貫匏以瓠為之故曰匏竽亦是也其中汚空以受簧也簧橫也於管頭橫施於中也以竹鐡作於口橫鼓之亦是也爾雅曰大笙謂之巢小者謂之和注巢者列管簧中施簧管端大者十九簧和十三簧者鄉射記曰三簧一和而成聲疏巢高也言其聲高小者名和李巡云小者聲少音相和也簧者笙管之中金薄鍱也笙管必有簧故或謂笙為簧白虎通云匏之言施也在十二月萬物始施而勞笙者太蔟之氣象萬物之生故曰笙有七正之節焉有六合之和焉天下樂之故謂之笙風俗通云笙長四寸世本云隨作笙禮記云女媧之笙簧周禮云笙師掌教吹竽笙以教裓樂凡祭祀饗射共其鐘笙之樂燕樂亦如之鄭司農云竽三十六簧蔡雍云季冬之月上丁入學集吹所以通氣也管簫笙竽塤箎皆以吹鳴者也樂書云匏之為物其性輕而浮其中虛而通笙以匏為母象植物之生焉其卦則艮其方東北之維其時春夏之交其聲尚議其律大吕太蔟其風融其音啾立春之氣也記曰歌者在上匏竹在下國語曰匏竹利制蓋匏竹相合以成聲得清濁之適故也案毛解簧為笙朱子云笙竽管中金葉則指簧體言之而不以為笙名矣然禮記曰女媧之笙簧又曰仲夏命樂師調笙竽竾簧言笙又言簧者豈簧别一物與漢武內傳許飛瓊鼓震靈之簧神仙傳王遙有五舌竹簧宋時民間有鐵葉簧皆非竽笙中簧也房釋名云房旁也在堂兩旁也疏云天子小寢如諸侯之路寢有左右房廬陵李氏云堂屋次棟之架曰楣後楣以北為室與房人君左右房大夫東房西室而已翿釋言云翿纛也李巡曰舞者所持纛也又云纛翳也璞云今之羽葆幢舞者所持以自蔽翳也禮書云舞者所建以為容非其所持者也釋名云翿陶也其貌陶陶下垂也案爾雅云纛翳也山海經云五采之鳥名翳疑即雉也簡兮所謂右手秉翟者郭以蔽翳釋之恐未然也敖箋云燕舞之位錢氏詩説云敖遊也因謂敖處為敖猶周禮云囿遊也案周禮大胥以六樂之會正舞位諸子掌凡樂事正舞位鄭注禮記云綴謂鄼舞者之位也兆其外營域也其舞于庭則文在東階武在西階其出入于學也則長者在先幼者在後所謂舞位者如此鄭以此篇之鼓簧為房中之樂故以敖為燕舞之位燕是燕息之燕非燕樂之燕也天子房中之樂以周南舞未詳此云執翿蓋文舞矣周禮旄人祭祀賔客舞其燕樂謂燕樂之時舞四夷之樂與此燕舞不同揚之水篇申鄭語史伯云當成周者南有申吕周語富辰云齊許申吕由太薑地里志南陽郡宛縣故申伯國括地志故申城在鄧州南陽縣北三十里箋云平王母家申國在陳鄭之南迫近強楚一統志河南南陽府南陽縣附郭周申伯國謝城在湖陽城北周申伯之都自申遷于此信陽縣在府城西南二百七十里周申伯所封縣境有謝城即申伯封邑有二冡相傳以為申伯冡案嚴坦叔云申國在宛謝城在棘陽宛今南陽縣也棘陽故城在鄧州境荆州記云棘陽東北百里有謝城則嚴説是也然則宣王之初申伯先受封于今之南陽後更邑于今之鄧州鄧州去郡治百二十里平王之母家申侯當是申伯之子若孫也甫書甫刑孔氏注吕侯後為甫侯故或稱甫刑唐世系表云宣王世改吕為甫左傳楚子重請取于申吕以為賞田史記云吕尚先祖為四嶽佐禹治水有功虞夏之際受封于吕徐廣云吕在宛縣玉海云郡國志汝南新蔡有大吕亭故吕侯國輿地廣記蔡州新蔡縣古吕國今以左傳考之楚有申吕時新蔡屬蔡非楚邑當以在宛縣為正一統志吕城在南陽府城西三十里虞夏時封吕望先祖于此今名董吕村蒲毛傳云蒲草也説文云蒲水草也可以作席蒻蒲子可以為平席周禮醢人深蒲醓醢鄭司農云深蒲蒲蒻入水深故云深蒲陸璣云蒲始生取其中心入地者名蒻大如匕柄正白生噉之甘脆煮而以苦酒浸之如食筍法埤雅云蒲似管而褊生于水崖輕揚善泛柔滑而溫可以為席故禮男執蒲璧言有安人之道也詩緝云斯干下莞箋云小蒲則莞精蒲粗周書云潤濕不穀樹之竹葦莞蒲礫石不可穀樹之葛木以為絺綌鄭箋云蒲蒲柳爾雅云楊蒲柳陸璣云蒲柳有兩種皮正青者曰小楊其一種皮紅者曰大楊其葉皆長廣于柳葉皆可以為箭幹故春秋傳曰董澤之蒲可勝既乎今又以為箕罐之楊也本草圖經云蒲柳其枝徑韌可為箭笴又謂之萑蒲即水楊也本草注云水楊葉圎闊而赤枝條短硬多生水岸古今注云蒲柳生水邊葉似青楊一名蒲楊枝徑細任矢用國䇿云夫楊橫樹之則生倒樹之亦生折而樹之又生世説顧悅云蒲柳之姿望秋而落詩緝云楊可為舟又可為屋材中谷有蓷篇蓷爾雅云萑蓷疏李巡曰臭穢草也云今茺蔚也廣雅名益母葉似荏方莖白華華生節間傳云蓷隼也陸璣云舊説及魏博士濟隂周元明皆云菴䕡是也韓詩及三倉説悉云益母故曾子見益母而感案本草云益母茺蔚也故劉歆曰蓷臭穢臭穢即茺蔚也本草經云茺蔚子一名益母一名益明一名大札一名貞蔚生海濵池澤陶隱居云葉如荏方莖子形細長三稜圖經云苗葉上節節生花實似雞冠子黑色衍義云茺蔚子葉至初春亦可煮作菜食凌冬不凋悴案毛傳云蓷隼大車傳云菼隼考本草諸書茺蔚子並無隼名豈毛以蓷為菼乎毛又云陸草生谷中傷于水據本草茺蔚正生海濵池澤非陸草也魏博士等以為菴䕡本草菴䕡生雍州川谷及上黨道邊春生苗葉如艾蒿高三二尺七月開花八月結實亦無蓷名不知古人何以云爾爰篇羅爾雅云鳥罟謂之羅郭云謂羅落之周禮羅氏掌羅烏鳥蠟則作羅襦中春羅春鳥獻鳩以養國老行羽物注襦細密之羅禮記曰鳩化為鷹然後設罻羅案鳥罟曰羅朱傳曰張羅本以取兔者蓋正釋則定散文亦通也周禮羅氏掌羅鳥而郊特牲言大羅氏天子之養鳥獸者諸侯貢屬焉莊子削格羅落罝罘之智多則獸亂于澤是取獸得稱羅也大東傳云畢所以掩兔而鴛鴦詩云畢之羅之罟謂之罝而西京賦云結罝百里實兼諸網罟而言之凡如此類並得通也罦罿釋器云繴謂之罿罿罬也罬謂之罦罦覆車也孫炎曰覆車網可以掩郭璞曰今之翻車也有兩轅中施罥以捕鳥展轉相解廣異語韓詩説云施羅于車上曰罿東漢書注云罦雉網葛藟篇滸爾雅云岸上滸又云滸水崖涘説文云涘水崖也爾雅云涘為崖郭注謂水邊漘爾雅云夷上灑下曰漘李巡曰夷上平上灑下峭下故名漘郭璞曰崖上平坦而下水深者為漘不發聲也昆爾雅云晜兄也注江東人通言晜采葛篇蕭爾雅云蕭荻説文云蕭艾蒿也陸璣云今人所謂荻蒿者是也或云牛尾蒿似白蒿白葉莖粗科生多者數十莖可作燭有香氣故祭祀以脂爇之為香許慎以為艾蒿非也禮王度記曰士蕭庶人艾蕭艾不同明矣周禮甸師祭祀共蕭茅郊特牲云既奠然後爇蕭合馨香祭義云見有蕭光以報氣也加以鬱鬯以報魄也雅翼云蕭生于春待秋三月乃成詩緝云蒿者總名蕭蒿之香者也艾爾雅云艾氷臺疏今艾蒿也本草經云艾葉味苦微溫無毒主灸百病一名氷臺一名醫草生田野圖經云初春布地生苗莖類蒿而葉皆白以苗短者為佳陳久方可用崔實四人月令云三月可採艾師曠占云歲欲疫病草先生病草艾也廣雅云天子祭以鬯諸侯以薰卿大夫以茝蘭士以蕭庶人以艾字説云艾可乂疾久而彌善故爾雅云艾長也艾歷也大車篇大車疏云巾車職云大夫乘墨車然則王朝大夫於禮當乘墨車以大夫出封如子男之服則乘諸侯之車此大車蓋革路也巾車云革路龍勒條纓五就建大白以即戎以封四衛注革路鞔以革無他飾龍也以白黑飾韋雜色為勒條應為絛以絛絲飾繁纓四衛四方諸侯守衛者又云服車五乘孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車庶人乘役車注墨車不畫毳衣周禮司服云王之吉服祀四望山川則毳冕子男之服自毳冕而下鄭注云毳畫虎蜼謂宗彛也其衣三章裳二章凡五衣三章宗彛也藻也皆繪粉米亦刺繡裳二章黼也黻也皆繡子男毳冕朝聘天子及助祭之服諸侯非二王後皆玄冕而祭于己釋名云毳芮也畫藻文于衣象水草之毳芮溫暖而潔也三禮圖云毳冕子男服以朝天子案毳冕子男朝聘天子之服此大夫四命其出封五命或本諸侯子男入為大夫其得服毳衣固也但非聽訟之服説文引此詩毳衣如菼菼作􅣞云帛隼色也毳衣如璊璊作􅨷云以毳為􅖯色如虋故謂之􅨷虋禾之赤苗也其解􅖯云西胡毳布解毳云獸細毛豈以毳布為衣其青者如隼帛赤者如禾之赤苗乎若然則與毳冕名同實異或云菼玄色言其衣如之璊纁色言其裳如之玄衣纁裳所謂大夫玄冕也上大夫卿故得服毳衣然玄冕亦所以朝聘王之大夫其祭于己即用爵辨不服玄冕况聽訟乎宗彛鄭以為虎蜼孔氏書傳云宗廟彛樽以山龍華蟲為飾古禮湮亡未知誰得其正璊説文云玉赬色也禾之赤苗謂之虋言璊玉色如之穴箋云謂塜壙中也禮記云合葬非古也自周公以來未之有改也丘中有麻篇麻爾雅云枲麻黂枲實莩麻母疏莩苴麻子之盛子者也周禮注云枲是雄麻苴是麻之有蕡實者本草圖經云麻黂麻子田圃所蒔繢其皮以為布者麻黂一名麻勃麻上花勃勃者七月七日採麻子九月採陶隱居以麻黂為牡麻牡麻則無實蘇恭以為蕡即實非花也案本經朱子云麻黂味辛麻子味甘此又似二物疑本草與爾雅禮記稱謂不同耳雅翼云麻之屬總名麻别而言之則有實者名苴無實者名枲子夏喪服傳曰苴絰者麻之有蕡者也牡麻者枲麻也蕡即實也牡即無實之名然亦通名麻枲麻實有文理故屬金為西方之穀明堂月令秋食麻與犬古者朝事之籩熬麻麥以實之謂之麷蕡于植物中最多子又有檾者亦麻類有實又胡麻亦有實本生大宛一名油麻淳黑者名巨勝亦曰一葉兩莢為巨勝枲麻與麥互相為候麥黃種麻麻黃種麥種枲太早則堅剛厚皮多節晚則皮不堅寧失于早不失于晚春秋説題辭云麻之為言微也隂精寢密女作纎微也麻生於夏夏衣物成禮儀故麻可以為衣陽成于三物以化故三變縷布也宋均曰麻枝葉成謂之衣三變生成形之變也漚取皮二變也績成為縷三變也月令云仲冬之月天子乃以犬嘗麻先薦寢廟周禮云典枲掌布緦縷紵之麻草之物以待時頒功而授齎及獻功受苦功以其賈揭而藏之以待時頒疏云苦功謂麻功謂盬粗之功吕覽云得時之麻必芒以長疏節而色陽小本而莖堅厚枲以均後熟多榮日夜死復生如此者不蝗管子云五沃之土其陽則安樹之五麻若高若下不擇疇所其麻大者如箭如葦大長以美其細者如雚如蒸欲有與各大者不類小者則治揣而藏之若衆練絲淮南子云汾水濛濁而宜麻四時纂要云種麻熟耕地從橫七遍已上生則無葉四民月令云二月三月可種苴荼留曹氏云留本邑名其大夫以為氏路史國名陶唐氏後云長子之後妘姓留也丘中有麻彼留子國者漢隸彭城子房之封案留古劉字説文有鎦而無劉漢因讖有卯金刀之説妄也丘中有麻王國之風所咏當為周地今河南緱氏縣有劉聚周大夫劉康公劉夏劉摯劉狄皆食采于此非彭城之留也食説文云食一米也從皀集聲周書云黃帝始蒸穀為飯烹穀為粥周禮膳夫王食用六穀食醫掌和王之六食禮記云食養隂氣也又云食齊視春時羮齊視夏時醬齊視秋時飲齊視冬時釋名云食殖也所以自生殖也古史考云神農時人方食穀加米于燒石之上而食之黃帝時始有釜甑火食之道成矣六家詩名物疏卷十九
