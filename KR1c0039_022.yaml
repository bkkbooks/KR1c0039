body:
  text: 六家詩名物疏卷十九明馮復京撰國風王二君子陽陽篇簧傳云簧笙也說文云簧笙中之簧也笙十三簧象鳳之身正月之音物生故謂之笙釋名云笙生也象物貫地而生竹之貫匏以瓠爲之故曰匏竽亦是也其中汚空以受簧也簧橫也於管頭橫施於中也以竹鐡作於口橫鼓之亦是也爾雅曰大笙謂之巢小者謂之和注巢者列管簧中施簧管端大者十九簧和十三簧者鄉射記曰三簧一和而成聲疏巢高也言其聲高小者名和李廵云小者聲少音相和也簧者笙管之中金薄鍱也笙管必有簧故或謂笙爲簧白虎通云匏之言施也在十二月萬物始施而勞笙者太蔟之氣象萬物之生故曰笙有七正之節焉有六合之和焉天下樂之故謂之笙風俗通云笙長四寸世本云隨作笙禮記云女媧之笙簧周禮云笙師掌教吹竽笙以教裓樂凡祭祀饗射共其鐘笙之樂燕樂亦如之鄭司農云竽三十六簧蔡邕云季冬之月上丁入學集吹所以通氣也管簫笙竽塤箎皆以吹鳴者也樂書云匏之爲物其性輕而浮其中虛而通笙以匏爲母象植物之生焉其卦則艮其方東北之維其時春夏之交其聲尚議其律大吕太蔟其風融其音啾立春之氣也記曰歌者在上匏竹在下國語曰匏竹利制蓋匏竹相合以成聲得清濁之適故也案毛解簧爲笙朱子云笙竽管中金葉則指簧體言之而不以爲笙名矣然禮記曰女媧之笙簧又曰仲夏命樂師調笙竽竾簧言笙又言簧者豈簧别一物與漢武内傳許飛瓊鼓震靈之簧神仙傳王遥有五舌竹簧宋時民間有鐵葉簧皆非竽笙中簧也房釋名云房㫄也在堂兩㫄也疏云天子小寢如諸侯之路寢有左右房廬陵李氏云堂屋次棟之架曰楣後楣以北爲室與房人君左右房大夫東房西室而已翿釋言云翿纛也李廵曰舞者所持纛也又云纛翳也璞云今之羽葆幢舞者所持以自蔽翳也禮書云舞者所建以爲容非其所持者也釋名云翿陶也其貌陶陶下垂也案爾雅云纛翳也山海經云五采之鳥名翳疑即雉也簡兮所謂右手秉翟者郭以蔽翳釋之恐未然也敖箋云燕舞之位錢氏詩說云敖遊也因謂敖處爲敖猶周禮云囿游也案周禮大胥以六樂之㑹正舞位諸子掌凡樂事正舞位鄭注禮記云綴謂鄼舞者之位也兆其外營域也其舞于庭則文在東階武在西階其出入于學也則長者在先㓜者在後所謂舞位者如此鄭以此篇之鼓簧爲房中之樂故以敖爲燕舞之位燕是燕息之燕非燕樂之燕也天子房中之樂以周南舞未詳此云執翿蓋文舞矣周禮旄人祭祀賔客舞其燕樂謂燕樂之時舞四夷之樂與此燕舞不同揚之水篇申鄭語史伯云當成周者南有申吕周語富辰云齊許申吕由太姜地里志南陽郡宛縣故申伯國括地志故申城在鄧州南陽縣北三十里箋云平王母家申國在陳鄭之南迫近强楚一統志河南南陽府南陽縣附郭周申伯國謝城在湖陽城北周申伯之都自申遷于此信陽縣在府城西南二百七十里周申伯所封縣境有謝城即申伯封邑有二冡相傳以爲申伯冡案嚴坦叔云申國在宛謝城在棘陽宛今南陽縣也棘陽故城在鄧州境荆州記云棘陽東北百里有謝城則嚴說是也然則宣王之初申伯先受封于今之南陽後更邑于今之鄧州鄧州去郡治百二十里平王之母家申侯當是申伯之子若孫也甫書甫刑孔氏注吕侯後爲甫侯故或稱甫刑唐世系表云宣王世改吕爲甫左傳楚子重請取于申吕以爲賞田史記云吕尚先祖爲四岳佐禹治水有功虞夏之際受封于吕徐廣云吕在宛縣玉海云郡國志汝南新蔡有大吕亭故吕侯國輿地廣記蔡州新蔡縣古吕國今以左傳攷之楚有申吕時新蔡屬蔡非楚邑當以在宛縣爲正一統志吕城在南陽府城西三十里虞夏時封吕望先祖于此今名董吕村蒲毛傳云蒲艸也說文云蒲水艸也可以作席蒻蒲子可以爲平席周禮醢人深蒲醓醢鄭司農云深蒲蒲蒻入水深故云深蒲陸璣云蒲始生取其中心入地者名蒻大如匕柄正白生噉之甘脆煑而以苦酒浸之如食筍法埤雅云蒲似筦而褊生于水崖輕揚善泛柔滑而溫可以爲席故禮男執蒲璧言有安人之道也詩緝云斯干下莞箋云小蒲則莞精蒲麄周書云潤濕不穀樹之竹葦莞蒲礫石不可穀樹之葛木以爲絺綌鄭箋云蒲蒲柳爾雅云楊蒲柳陸璣云蒲柳有兩種皮正青者曰小楊其一種皮紅者曰大楊其葉皆長廣于柳葉皆可以爲箭幹故春秋傳曰董澤之蒲可勝既乎今又以爲箕罐之楊也本草圖經云蒲柳其枝勁韌可爲箭笴又謂之萑蒲即水楊也本草注云水楊葉圎闊而赤枝條短硬多生水岸古今注云蒲柳生水邊葉似青楊一名蒲楊枝勁細任矢用國䇿云夫楊橫樹之則生倒樹之亦生折而樹之又生世説顧悦云蒲柳之姿望秋而落詩緝云楊可爲舟又可爲屋材中谷有蓷篇蓷爾雅云萑蓷疏李廵曰臭穢艸也云今茺蔚也廣雅名益母葉似荏方莖白華華生節間傳云蓷鵻也陸璣云舊説及魏博士濟隂周元明皆云菴䕡是也韓詩及三倉說悉云益母故曾子見益母而感案本草云益母茺蔚也故劉歆曰蓷臭穢臭穢即茺蔚也本草經云茺蔚子一名益母一名益明一名大札一名貞蔚生海濵池澤陶隱居云葉如荏方莖子形細長三稜圖經云苗葉上節節生花實似雞冠子黑色衍義云茺蔚子葉至初春亦可煑作菜食凌冬不凋悴案毛傳云蓷鵻大車傳云菼鵻考本草諸書茺蔚子竝無鵻名豈毛以蓷爲菼乎毛又云陸草生谷中傷于水據本草茺蔚正生海濵池澤非陸草也魏博士等以爲菴䕡本草菴䕡生雍州川谷及上黨道邊春生苗葉如艾蒿高三二尺七月開花八月結實亦無蓷名不知古人何以云爾爰篇羅爾雅云鳥罟謂之羅郭云謂羅落之周禮羅氏掌羅烏鳥蜡則作羅襦中春羅春鳥獻鳩以養國老行羽物注襦細宻之羅禮記曰鳩化爲鷹然後設罻羅案鳥罟曰羅朱傳曰張羅本以取兔者葢正釋則定散文亦通也周禮羅氏掌羅鳥而郊特牲言大羅氏天子之養鳥獸者諸侯貢屬焉莊子削格羅落罝罘之智多則獸亂于澤是取獸得稱羅也大東傳云畢所以掩兔而鴛鴦詩云畢之羅之罟謂之罝而西京賦云結罝百里實兼諸網罟而言之凡如此類並得通也罦罿釋器云繴謂之罿罿罬也罬謂之罦罦覆車也孫炎曰覆車網可以掩郭璞曰今之翻車也有兩轅中施罥以捕鳥展轉相解廣異語韓詩説云施羅于車上曰罿東漢書注云罦雉網葛藟篇滸爾雅云岸上滸又云滸水厓涘說文云涘水厓也爾雅云涘爲厓郭注謂水邊漘爾雅云夷上洒下曰漘李廵曰夷上平上洒下陗下故名漘郭璞曰厓上平坦而下水深者爲漘不發聲也昆爾雅云晜兄也注江東人通言晜采葛篇蕭爾雅云蕭荻說文云蕭艾蒿也陸璣云今人所謂荻蒿者是也或云牛尾蒿似白蒿白葉莖麄科生多者數十莖可作燭有香氣故祭祀以脂爇之爲香許慎以爲艾蒿非也禮王度記曰士蕭庻人艾蕭艾不同明矣周禮甸師祭祀共蕭茅郊特牲云既奠然後爇蕭合馨香祭義云見有蕭光以報氣也加以鬱鬯以報魄也雅翼云蕭生于春待秋三月乃成詩緝云蒿者緫名蕭蒿之香者也艾爾雅云艾氷臺疏今艾蒿也本草經云艾葉味苦微温無毒主灸百病一名氷臺一名醫艸生田野圖經云初春布地生苗莖類蒿而葉皆白以苗短者爲佳陳久方可用崔寔四人月令云三月可採艾師曠占云歲欲疫病艸先生病艸艾也廣雅云天子祭以鬯諸侯以薰卿大夫以茝蘭士以蕭庻人以艾字說云艾可乂疾久而彌善故爾雅云艾長也艾歴也大車篇大車疏云巾車職云大夫乘墨車然則王朝大夫於禮當乘墨車以大夫出封如子男之服則乘諸侯之車此大車葢革路也巾車云革路龍勒條纓五就建大白以即戎以封四衛注革路鞔以革無他飾龍也以白黑飾韋雜色爲勒條應爲絛以絛絲飾繁纓四衛四方諸侯守衛者又云服車五乘孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車庻人乘役車注墨車不畫毳衣周禮司服云王之吉服祀四望山川則毳冕子男之服自毳冕而下鄭注云毳畫虎蜼謂宗彛也其衣三章裳二章凡五衣三章宗彛也藻也皆繪粉米亦刺繡裳二章黼也黻也皆繡子男毳冕朝聘天子及助祭之服諸侯非二王後皆𤣥冕而祭于己釋名云毳芮也畫藻文于衣象水艸之毳芮温煖而潔也三禮圖云毳冕子男服以朝天子案毳冕子男朝聘天子之服此大夫四命其出封五命或本諸侯子男入爲大夫其得服毳衣固也但非聽訟之服說文引此詩毳衣如菼菼作􅣞云帛鵻色也毳衣如璊璊作􅨷云以毳爲􅖯色如虋故謂之􅨷虋禾之赤苗也其解􅖯云西胡毳布解毳云獸細毛豈以毳布爲衣其青者如鵻帛赤者如禾之赤苗乎若然則與毳冕名同實異或云菼𤣥色言其衣如之璊纁色言其裳如之𤣥衣纁裳所謂大夫𤣥冕也上大夫卿故得服毳衣然𤣥冕亦所以朝聘王之大夫其祭于己即用爵弁不服𤣥冕况聽訟乎宗彛鄭以爲虎蜼孔氏書傳云宗廟彛樽以山龍華蟲爲飾古禮湮亡未知誰得其正璊說文云玉䞓色也禾之赤苗謂之虋言璊玉色如之穴箋云謂塜壙中也禮記云合葬非古也自周公以來未之有改也丘中有麻篇麻爾雅云枲麻黂枲實莩麻母疏莩苴麻子之盛子者也周禮注云枲是雄麻苴是麻之有蕡實者本草圖經云麻黂麻子田圃所蒔繢其皮以爲布者麻黂一名麻勃麻上花勃勃者七月七日採麻子九月採陶隱居以麻黂爲牡麻牡麻則無實蘇恭以爲蕡即實非花也案本經朱子云麻黂味辛麻子味甘此又似二物疑本草與爾雅禮記稱謂不同耳雅翼云麻之屬總名麻别而言之則有實者名苴無實者名枲子夏䘮服傳曰苴絰者麻之有蕡者也牡麻者枲麻也蕡即實也牡即無實之名然亦通名麻枲麻實有文理故屬金爲西方之穀明堂月令秋食麻與犬古者朝事之籩熬麻麥以實之謂之䵄蕡于植物中最多子又有檾者亦麻類有實又胡麻亦有實本生大宛一名油麻淳黑者名巨勝亦曰一葉兩莢爲巨勝枲麻與麥互相爲候麥黄種麻麻黃種麥種枲太早則堅剛厚皮多節晚則皮不堅寧失于早不失于晚春秋説題辭云麻之爲言微也隂精寢宻女作纎微也麻生於夏夏衣物成禮儀故麻可以爲衣陽成于三物以化故三變縷布也宋均曰麻枝葉成謂之衣三變生成形之變也漚取皮二變也績成爲縷三變也月令云仲冬之月天子乃以犬嘗麻先薦寢廟周禮云典枲掌布緦縷紵之麻草之物以待時頒功而授齎及獻功受苦功以其賈掲而藏之以待時頒疏云苦功謂麻功謂盬麄之功吕覽云得時之麻必芒以長疎節而色陽小本而莖堅厚枲以均後熟多榮日夜死復生如此者不蝗管子云五沃之土其陽則安樹之五麻若高若下不擇疇所其麻大者如箭如葦大長以美其細者如雚如蒸欲有與各大者不類小者則治揣而藏之若衆練絲淮南子云汾水濛濁而宜麻四時纂要云種麻熟耕地從横七遍已上生則無葉四民月令云二月三月可種苴荼留曹氏云留本邑名其大夫以爲氏路史國名陶唐氏後云長子之後妘姓留也丘中有麻彼留子國者漢隷彭城子房之封案留古劉字說文有鎦而無劉漢因䜟有卯金刀之說妄也丘中有麻王國之風所咏當爲周地今河南緱氏縣有劉聚周大夫劉康公劉夏劉摯劉狄皆食采于此非彭城之留也食說文云食一米也从皀亼聲周書云黃帝始蒸穀爲飯烹穀爲粥周禮膳夫王食用六穀食醫掌和王之六食禮記云食養隂氣也又云食齊視春時羮齊視夏時醬齊視秋時飲齊視冬時釋名云食殖也所以自生殖也古史考云神農時人方食穀加米于燒石之上而食之黃帝時始有釜甑火食之道成矣六家詩名物疏卷十九
