body:
  text: 六家詩名物疏卷三十八明馮復京撰小雅節南山之什一節南山篇師尚書云立太師太傅太保兹惟三公論道經邦燮理隂陽官不必備惟其人大戴禮云天子不論先聖王之德不知君國畜民之道不見禮義之正不察應事之理不博古之典傳不閑威儀之數詩書禮樂無經學業不法凡是其屬太師之任也賈誼云師道之教訓宋書曰三公訓䕶人主導以德義天子加拜待以不臣之禮非人則闕尹春秋隠三年夏四月尹氏卒公羊傳云尹氏者何天子之大夫也其稱尹氏何貶曷為貶譏世卿世卿非禮也崧髙箋云尹官氏路史云子朝入尹周地尹氏采杜謂鞏西南偃師今汾州有吉甫墓記即其邑按偃師今屬河南府汾州平遥縣治東有尹吉甫墓昊天爾雅夏為昊天邢氏云元氣博大之貎尚書歐陽説云春曰昊天鄭𤣥云堯典羲和以昊天緫敕以四時故知昊天不獨春也吕氏春秋云西方昊天埤雅云夏曰昊天昊天者大以明與𤣥天反亞爾雅云兩壻相謂為亞郭璞云今江東人呼同門為僚壻釋名云兩壻相謂為亞者言每一人取姊一人取妹相亞次也又並來女氏則姊夫在前妹夫在後亦相亞也家朱傳云家氏左傳桓公八年天王使家父來聘杜氏云家氏父字何休公羊注云家采地父字也范寗穀梁注云家父天子大夫家氏父字古今姓纂云家姓京兆周大夫家父之後正月篇正月箋云夏之四月建巳之月純陽用事左傳曰正月朔慝未作孔氏云以易爻卦言之從建子之後每月一陽息一隂消至四月建已六隂消盡六陽並盛是為純乾之卦正陽之月也從建午之後每月一隂息一陽消至十月建亥六陽消盡六隂並盛是為純坤之卦正隂之月也臣僕傳曰古者有罪不入于刑則役之圜土以為臣僕周禮云大司寇以圜土聚教罷民凡害人者置之圜土而施職事焉以明刑恥之其能改者反于中國不齒三年司圜掌收敎罷民凡害人者弗使冠飾而加明刑焉任之以事而收敎之能改者上罪三年而舎中罪二年而舎下罪一年而舎其不能改而出圜土者殺孔氏云古者罪有等級重者入于肉刑輕者役于圜土晝則役之夜入圜土當役之時為臣僕之事故號之為臣僕箋云人有十等僕第九言罪及家之賤者白虎通云臣者堅也屬志自堅固廣雅云臣繕也孝經云不敢失于臣妾左傳云人有十等王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺朱傳云亡國所虜亦為臣僕書箕子云商其淪䘮我罔為臣僕占夢詳見大人周禮春官占夢中士二人蜴爾雅云蠑螈蜥蜴蜥蜴蝘蜓蝘蜓守宫也疏一物四名說文云榮蚖虵醫以注鳴者也在壁曰蝘蜓在草曰蜥蜴蜥蜴蝘蜓守宫也方言云秦晉西夏謂之守宫或謂之蠦􅫢或謂之蜤易在澤中謂之易蜴南楚謂蛇醫或謂蠑螈東徐海岱謂之蹏北燕謂之祝蜒桂林之中守宫大而能鳴謂之蛤解注蜤易南陽呼蝘蜒蹏斯侯二音似蜤易大而有鱗今所在通言虵醫蛤解似虵醫而短身有鱗采江東呼蛤蚖詩義疏云蜴一名蠑螈水蜴也或謂之號蜼蛇醫如蜤蜴青緑色大如指形狀可惡本艸石龍子一名蜤蜴一名山龍子一名守宫一名石蜴生平陽川谷及荆山石間陶隠居云其類有四種大形純黄色為蛇毉次似蛇毉小形長尾見人不動名龍子次有小形五色尾青碧可愛名蜤蜴不螫人一種喜縁籬壁名蝘蜓形小而黑乃言螫人必死而未嘗中人唐本注云蛇師生山谷頭大尾短小青黄或白斑者是蝘蜓似蛇師不生山谷在人家壁間名守宫又名􅙴虎其名龍子及五色者蜤蜴耳形皆細長尾與身相類似蛇四足古今注云蝘蜓一曰守宫一曰龍子善於樹上捕蟬食之其長細五色者名蜤蜴其短大者名蠑螈一曰虵毉大者長三尺色𤣥紺善魅人一曰𤣥蝘一曰縁螈考異郵云土勝水故守宫食蠆東方朔射守宫云以為龍又無角謂之為虵又有足跂跂脉脉善縁壁若非守宫即蜤蜴博物志云蜤蜴或蝘蜓以器養之食以朱砂體盡赤所食滿七斤𢷬萬杵以點女人支體終身不滅偶則落故號守宫箋云虺蜴之性見人則走三敎珠英云守宫鱗色如虵而四足亦與魚合埤雅云易十二時變色故曰易也舊說蜤易吐雹虵體有傷銜草傅之故有蛇醫之號考工記注云胸鳴榮原屬馬融周官作以胃鳴干寳周官作以骨鳴詩詁云守宫蜤蜴二物蜤蜴尾通于身如蛇而加足有黑色者有青緑色者常居草間守宫褐色四足有尾偃伏壁間故名蝘蜓亦謂守宫燎傳云火田為燎宗周書多方王來自奄至于宗周周官歸于宗周說文鎬武王所都在長安西上林苑中地里志初雒邑與宗周通封畿東西長而南北短短長相覆為千里孔氏曰正月云赫赫宗周謂鎬京也後平王居洛邑亦謂洛邑為宗周祭綂云即宫于宗周謂洛邑也吕氏云王者天下之所宗宗周初無定名隨所都而名耳褒水經注褒水又南逕褒縣故城東褒中縣也本褒國又南流入于漢南鄭縣故褒之附庸周顯王之世蜀有褒漢之地至六國楚人兼之懐王衰弱秦略取焉一綂志陜西漢中府褒城縣在府城西北四十五里古褒國漢置褒中縣以地在褒谷中故名古褒城在褒城縣境内鄭語云宣王之時有童謡曰檿弧箕服實亡周國宣王聞之有夫婦鬻是器者王使執而戮之府之小妾生女而非王子也懼而弃之此人也收以奔褒褒人褒姁有獄而以為女入于王王嬖是女使至于亂國姒禮緯云禹祖以吞薏苡生故姓姒氏國都城記云褒國姒姓夏同姓所封輔孔氏云輔是可解脫之物如今人縛杖于輻以防輔車也殽說文肴啖也徐鍇曰謂已修庖之可食也釋文云熟肉有骨曰殽大臠曰胾曲禮云進食之禮左殽右胾箋云凡非穀而食之曰殽鄰周禮遂人五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂鄰長五家則一人掌相糾相受凡邑中之政相贊徙于他邑則從而授之左傳晏子云非宅是小惟鄰是卜通鑑外紀云黄帝以井一為鄰鄰二為朋晉書云堯制八家為鄰三鄰為朋合璧事類云周禮大司徒曰五家為比遂人曰五家為鄰考之則在郊内者謂之比在郊外者謂之鄰釋文皆訓為近鄭𤣥云異其名者示相變耳十月之交篇朔釋名云朔月初之名也朔蘇也月死復蘇生也辛爾雅太嵗在辛曰重光史記云辛者言萬物之辛生漢書云悉新於辛釋名云辛新也物初新者皆有収成也推度災云辛者正秋之王氣卯爾雅太嵗在卯曰單閼史記云卯之為言茂也言萬物茂也漢書云茂茆於卯說文云卯冒也二月萬物冒地而出象開門之形故二月為天門推度災云卯者正春之臣位日食釋名云日月虧曰食稍稍侵虧如蟲食草木葉也周禮膳夫天地有烖則不舉太司樂日月食令去樂庭氏救日之弓救月之矢注云日食射太隂月食射太陽曾子問孔子云諸侯旅見天子諸侯相見日食廢大夫之祭日食廢昏義云男敎不修陽事不得謫見于天日為之蝕故日蝕則天子素服而修六官之職蕩天子之陽事書云乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走左傳士文伯云國無政不用善則自取謫于日月之災故政不可不慎也務三而已一曰擇人二曰因民三曰從時叔孫昭子云日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝公羊傳云日有食之以朱絲縈社穀梁傳云日有食之何也吐者外壤食者内壤闕然不見其壤有食之者也天子救日置五麾陳五兵五鼓諸侯置三麾陳三兵三鼓大夫擊門士擊柝凡有聲皆陽事也以厭隂氣也管子云日掌陽陽為德故日食則失德之國惡之聖王日食則修德按唐書志十月辛卯日食在幽王六年而國語載三川震岐山崩為幽王三年事三川者涇渭汭也即此詩之百川沸騰也岐山崩即山冢崒崩也蓋十月日食以前事而詩人追言之行箋云行道度也周髀云周天三百六十五度四分度之一日月皆右行于天日日行一度月日行十三度十九分度之七唐一行日議云日行黄道月有九道遇交則有薄蝕之變至如合朔如合璧則不食其交不軌道則食也月食易云月盈則食禮記云婦順不修隂事不得謫見於於天月為之蝕故曰食則后素服而修六宫之職蕩天下之隂事管子云月掌隂隂為刑故月食則失刑之國惡之聖人月食則修刑靈憲云當日之衝光常不合是謂闇虛在星則星㣲遇月則月蝕荆州占云月蝕后自提鼓階前擊鼓者三中良人諸御者宫人皆擊柝救之月已食后乃齋服縞素三日不從樂以應其祥新唐書厯志云月臣道也逺日益明近日益虧望而正于黄道是謂臣干君明則陽斯蝕之矣朔而正于黄道是謂臣壅君明則陽為之蝕矣電釋名云電殄也乍見則殄滅也說文云電隂陽激耀也易曰離為電雷電合而章時訓解云春分又五日雷乃發聲又五日始電不始電君無威震莊子云隂氣伏于黄泉陽氣上通于天隂陽分爭故為電大戴禮云隂陽之氣偏則風俱則雷交則電董仲舒云太平之世電不眴目宣示光輝而已物理論云風清熱之氣散為電易元包云噬嗑列缺搏䃸磹灼傳曰列缺搏雷之動也䃸磹灼電之耀也埤雅云電從申隂陽以申洩而為電故也記曰地載神氣神氣風霆風霆流形言萬物以風霆流形而風霆出於地之神氣也冢釋山云山頂冡孫炎曰謂山巔也釋名云冢腫也言冢起也崒釋山云崒者厜㕒郭璞曰謂山峰頭巉巖者卿士孔氏云六卿之外更為之都官緫綂六官之事兼襍為名故謂之卿士朱傳云或曰卿士蓋卿之士周禮太宰之屬有上中下士公羊所謂宰士左氏所謂周公以蔡仲為已卿士是也蓋以宰屬而兼總六官位卑而權重也左傳鄭武公莊公為平王卿士注云卿士王卿之執政者白虎通云卿之為言章善明理也伊尹曰九卿通寒暑番聚蹶楀箋云番棸蹶楀皆氏疏云蓋后氏之外親按番韓詩作繁漢有御史大夫繁延夀其字音皤漢又有游俠萭章音與楀同蹶周宣王時有蹶父為卿士蓋貴族也司徒尚書云百姓不親五品不遜汝作司徒敬敷五教在寛又曰司徒掌邦教敷五典擾兆民周禮大司徒卿一人掌建邦之土地之圖與其人民之數以佐王安擾邦國以土㑹之法辨五地之物生因此五物者民之常而施十有二教焉以土宜之法辨十有二土之民物以土均之法辨五物九等制天下之地征以土圭之法測土深正日景以求地中建王國焉凡建邦國以土圭土其地而制其域凡造都鄙制其地域而封溝之以荒政十有二聚萬民以保息六養萬民以本俗六安萬民施教法頒職事于邦國都鄙以鄉三物教萬民而賔興之以鄉八刑糾萬民大軍旅大田役以旗致萬民而治其徒庶之政令禮記云司徒修六禮以節民性明七教以興民德齊八政以防淫一道德以同俗養耆老以致孝恤孤獨以逮不足上賢以崇德簡不肖以絀惡韓詩外傳云君臣不正人道不和國多盜賊人怨其上則責之司徒管子云昔者黄帝得祝融辨南方故使為司徒家語云司徒之官以成德地宜不殖財物不蕃萬民饑寒教訓不行風俗淫僻人民流散曰危危則飭司徒宰箋云冢宰書云冢宰掌邦治綂百官均四海周禮太宰卿一人掌建邦之六典以佐王治邦國以八法治官府以八則治都鄙以八柄詔王馭羣臣以八綂詔王馭萬民以九職任萬民以九賦斂貨賄以九式均節財用以九貢致邦國之用以九兩繫邦國之民作大事則戒于百官贊王命王眡朝則贊聴治眡四方之聴朝亦如之嵗終令百官府各正其治受其㑹聴其致事而詔王廢置三嵗則大計羣吏之治而誅賞之家語云冢宰之官以成道官屬不理分職不明法政不一百事失紀曰亂亂則飭冢宰齊職儀云堯命羲和主隂陽之職即天官也后稷服事虞夏敬授民時尊稷為天官殷以其官為冢宰周公在豐為太宰召公又居之膳夫周禮天官膳夫上士二人中士四人下士八人掌王之食飲膳羞食用六穀膳用六牲飲用六清羞用百二十品珍用八物醬用百有二十罋王日一舉鼎十有二物皆有俎王齋日三舉大䘮大荒大札天地有災邦有大故則不舉王燕飲酒則為獻主掌后及世子之膳羞内史周禮春官内史中大夫一人掌王之八枋之法爵禄廢置殺生予奪執國法及國令之貳以攷政事以逆㑹計掌叙事之法受納訪以詔王聴治凡命諸侯及孤卿大夫則策命之凡四方之事書内史讀之王制禄則贊為之賞賜亦如之掌書王命家語子曰天子以内史為左右手趣馬周禮夏官趣馬下士皁一人掌贊正良馬而齊其飲食簡其六節掌駕說之頒辨四時之居治以聴馭夫師氏周禮地官師氏中大夫一人掌以美詔王以三德敎國子教三行居虎門之左司王朝掌國中失之事以教國子弟凡國之貴㳺子弟學焉凡祭祀賔客㑹同䘮紀軍旅王舉則從聴治亦如之使其屬帥四夷之隸各以其兵服守王之門外且蹕朝在野外則守内列艶妻魯詩曰閻妻扇方處谷永疏云閻妻驕扇日以不臧師古曰閻嬖寵之族也厲王無道内寵熾盛班健伃賦哀閻襃之為郵中候擿雒貳曰昌受符厲倡嬖期十之世權在相剡者配姬以放賢山崩水潰納小人家伯罔主異載震孔氏曰剡艶古今字以剡對姬剡為其姓汚疏云池停水之名禮記曰汚其宫而瀦焉是也萊孔氏云田廢生草謂之萊周禮以田易者為萊遂人注云萊休不耕者向孔氏云左傳桓王與鄭十二邑向在其中杜預云河内軹縣西有地名向上則向在東都畿内水經注云向城北向崗左傳襄十一年諸侯伐鄭師于向朱傳云都大邑周禮畿内大都方百里小都方五十里皆天子公卿所封也向在東都畿内今孟州河陽縣是也一統志向城在河南懐慶府濟源縣西南即周向國按路史國名紀謂皇父作都之向在沛國龍亢若然則不在東都畿内矣與鄭箋異不可從三有事詳見下三事大夫傳云有司國之三卿疏云太宰云施則於都鄙立其兩注兩謂兩卿明皇父當二卿今立三有事是自同畿外増一卿也六家詩名物疏卷三十八
